  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_003-1a, image: WYG0130/WYG0130-0019a.png}
body:
  text: 禮書卷三宋陳祥道撰諸侯及孤卿大夫之服書曰天命有德五服五章哉五服天子諸侯卿大夫士之服周禮上公九命其衣服以九為節侯伯七命其衣服以七為節子男五命其衣服以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其衣服亦如之凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男公之子如侯伯而執圭侯伯之子如子男而執璧子男之子與未誓者皆次小國之君執皮帛而朝會焉其賔之皆以上卿之禮公之孤四命其卿三命其大夫再命其士一命其衣服各眡其命之數司服公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服士之服自皮弁而下如大夫之服凡大祭祀大賔客共其衣服而奉之自公之衮冕至卿大夫之𤣥冕皆其朝聘天子及助祭之服諸侯非二王後其餘皆𤣥冕而祭於已雜記曰大夫冕而祭於公弁而祭於已士弁而祭於公冠而祭於已大夫爵弁自祭家廟惟孤耳其餘皆𤣥冠與士同𤣥冠自祭其廟者其服朝服𤣥端諸侯之自相朝聘皆皮弁服弁師掌王之五冕皆𤣥冕朱裏延紐五采繅十有二就皆五采玉十有二玉笄朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令行人上公冕服九章侯伯冕服七章子男冕服五章大車詩刺周大夫云大車檻檻毳衣如菼毛氏曰毳衣大夫之服天子大夫四命其出封五命如子男之服服毳冕以决訟箋云子男入為大夫者毳衣之屬衣繢而裳繡皆有五色其青者如鵻大車啍啍毳衣如璊璊赬也無衣美晉武公云豈曰無衣七兮又云豈曰無衣六兮毛氏曰侯伯之禮七命冕服七章天子之卿六命車旗衣服以六為節鄭氏曰七章之服晉舊有之非新命之服變七言六者謙也不敢必當侯伯得受六命之服列於天子之卿猶愈乎不禮記王制曰三公一命衮若有加則賜也禮器曰禮有以文為貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳天子之冕朱綠藻十有二旒諸侯九上大夫七下大夫五士三朱綠似夏商禮周禮天子五采藻禮有順而討也若天子十二公以九侯伯以七子男以五為節有放而文若天子之服服日月以至黼黻有放而不致若諸侯自山龍而下書大𫝊曰天子衣服其文華蟲作繢宗彝藻火山龍諸侯作繢宗彞藻火山龍大夫藻火山龍士山龍天子服五諸侯四次國服三大夫服二士服一鄭氏曰𤣥或疑焉上公龍衮繅九就前後九旒旒九玉共玉百六十二繅玉三采朱白蒼執桓圭侯鷩冕繅七就前後七旒旒七玉共王九十八繅玉皆三采執信圭伯鷩冕繅七就前後各七旒旒七玉共玉九十八繅玉皆三采執躬圭子毳冕繅五就前後各五旒旒五玉用玉五十繅玉皆三采執穀璧男毳冕繅玉采如子之數執蒲璧王之三公鷩冕繅八就前後各八旒旒八玉用五百二十八執圭射則執璧書曰周公秉圭以冕觀之葢執信圭先儒曰執桓圭王之孤毳冕繅六就前後各六旒旒六玉用玉七十二執皮帛王之卿毳冕繅六就前後各六旒旒六玉用玉七十二繅玉皆朱綠執羔王之大夫希冕繅四就前後各四旒旒四玉用玉三十二繅玉皆朱緑執鴈諸侯之孤希冕繅玉采如王之大夫執皮帛諸侯之卿𤣥冕繅三就前各三旒旒三玉用五十八執羔諸侯之大夫𤣥冕再命之大夫繅再就用玉八一命之大夫繅一就用玉二執鴈公卿大夫之命以四以六以八隂數也公侯伯子男之命以五以七以九陽數也典命上公九命衣服以九為節司服所謂公之服自衮冕而下如王之服是也侯伯七命衣服以七為節司服所謂侯伯之服自鷩冕而下如公之服是也王之三公八命其卿六命其大夫四命及其出封皆加一等葢八命加一等則是三公一命衮而衣服以九為節也其未出封則八命與侯伯同七章之服矣公與侯伯同七章之服則卿六命與子男同五章之服矣觀司服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服公之孤四命而服三章之希冕大國之卿三命大夫再命而服一章之𤣥冕則王之公卿大夫其衣服各降命數一等可知也詩言周大夫之服毳衣則王之上大夫卿也雜記曰大夫冕而祭於公則希冕𤣥冕也然則上公自衮冕而下其服五侯伯自鷩冕而下其服四子男自毳冕而下其服三孤自希冕而下其服二服雖不同而冕同賈公彦曰諸公繅玉同文惟有一冕以冠五服其説是也弁師諸侯繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄諸侯及孤卿大夫之冕各以其等為之鄭氏謂上公繅九就用玉百六十二侯伯用玉九十八子男繅五就玉五十繅皆三采弁師瑉玉三采鄭氏曰瑉故書作璑説文璑三采玉孤繅四就玉三十二三命之卿繅三就玉十八再命之大夫繅再就玉八繅玉皆朱綠考之聘禮諸侯朝天子圭繅朱白蒼大夫問諸侯圭繅朱綠則朱白蒼者君之繅朱綠者臣之繅冕繅之别葢亦如此鄭氏之説是也希冕三章鄭氏謂孤繅四就葢孤四命其宫室車旗衣服各眡其命之數則服雖三章而冕四斿斿四就無害其與服章異也晉武公之臣請服于周始曰無衣七兮次曰無衣六兮以示不敢上眡侯伯姑請六命之服列于天子之卿猶愈乎不也孔穎逹謂卿從車六乘旌旗六旒弁飾六玉冠六辟積然則卿服雖五章而冕繅六斿斿六就猶大夫之服三章而繅四斿斿四就也不特人臣之冕如此王服九章而繅十有二斿斿十有二就是繅斿與服章不必同也鄭氏又曰一命之大夫冕而無斿然典命言各眡其命之數果一命之冕無斿則眡其命之數云者為虚言也夫冕之有斿為蔽明也繅之就數固雖不同葢皆其垂過目而毎就非止一寸毎就一寸殆王之十有二就者然也賈公彦曰毎玉相去一寸十二玉則十二寸就成也以一玉為一成結之使不相并也射人三公執璧執璧則服毳冕而已葢王饗射降而服鷩冕則公於王射降而服毳冕矣鄭氏曰諸侯入為卿大夫各服本國服章與在朝仕者不同然卿大夫出則伸而加一等入則屈而降一等則各服本國服章之説無是理也書曰周公秉圭射人三公執璧葢圭乃公之常禮璧特射時所執也王之卿大夫其所執亦羔鴈特其飾與諸侯之卿大夫不同周語單子譏陳侯弃衮冕而南冠春秋伐楚之役許男卒而以衮斂夫陳侯有衮冕許男以衮斂者尊三恪而憂死王事者也左氏曰凡諸侯薨于朝會加一等死王事加二等書大𫝊曰天子衣服其文華蟲作繢宗彝藻火山龍諸侯作繢宗彝藻火山龍子男宗彝藻火山龍大夫藻火山龍士山龍故書曰天命有德五服五章哉又曰天子服五諸侯服四次國服三大夫服二士服一然大夫之服自𤣥冕而下士之服自皮弁而下固無藻火山龍矣既曰子男宗彝藻火山龍士山龍又曰次國服三大夫服二士服一是自戾也漢明帝時冕皆廣七寸長尺二寸前圜後方朱綠裏𤣥上前垂四寸後垂三寸繫白玉珠為十二旒三公諸侯服山龍九章冕七旒青王為珠卿大夫服用華蟲七章冕五旒黑玉為珠皆有前無後以承大祭然旒有前無後非古制也又古者大夫冕而祭於公士弁而祭於公則大夫以上助祭皆冕服也明帝之時百官不執事者袀𤣥以從失之矣褎衣褎衣雜記内子復諸侯復公襲皆有褎衣鄭氏曰内子褎衣者始為命婦見加賜之衣諸侯褎衣亦始命為諸侯及朝覲加賜之衣也王制曰三公一命衮若有加則賜孔頴逹謂九命龍衮之外君衣特賜雜記謂之褎衣是矣昔魯季氏取卞使公冶問襄公公與公冶冕服及疾聚其臣曰我死必無以冕服歛非德賞也然則復歛以褎衣者葢榮其德賞故也禮書卷三
