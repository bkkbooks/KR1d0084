body:
  text: 禮書卷一百十九宋陳祥道撰鍾虡磬虡詩曰虡業維樅賁鼓維鏞又曰設業設虡崇牙樹羽明堂位曰夏后氏之龍簨簴鬻子曰大禹為銘於筍簴教我以道者擊鼓教我以義者擊鍾教我以事者振鐸教我以憂者擊磬教以獄者揮鞀其言雖不經見然禹之時故有筍簴矣商之崇牙周之璧翣周官典庸器祭祀帥其屬而設筍簴大喪廞筍簴考工記曰梓人為筍簴臝者羽者鱗者以為虡厚脣弇口出目短耳大胸燿後大體短脰若是者謂之臝屬常有力而不能走其聲大而宏有力而不能走則於任重宜大聲而宏則於鍾宜若是者以為鐘虡是故擊其所縣而由其虡鳴銳喙决吻數目顅脰小體騫腹若是者謂之羽屬常無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清掦而逺聞則於磬宜若是者以為磬虡故擊其所縣而由其虡鳴小首而長搏身而鴻若是者謂之鱗屬以為筍爾雅曰木謂之虡大版謂之業傳曰秦始皇建千石之鍾立萬石之虡其髙三丈植者為虡横者為筍筍之上有崇牙鄭氏曰龍上刻畫之為重牙以掛縣紘虡之上設業孫紘曰刻之㨗業如鋸齒然業之上樹羽而有端有璧翣鄭氏曰畫繒為翣戴以璧舊圖為龍首及鶴銜璧鍾虡飾以臝屬磬虡飾以羽屬而筍皆飾以鱗屬飾以鱗屬若筍文然故謂之筍其所植者葢虚中焉故謂之虡先儒曰筍峻也虡舉也又曰虡神獸也鹿首虵身此不可考詩曰虡業維樅樅之為木松葉栢身身葉皆直則虡業者皆以直木為之也漢武帝時樂虡銅人生毛董卓壊銅人銅虡以充鑄則漢時以銅為之與古異矣漢魏相㳂虡為龍頭及鵳銜璧璧下有旄牛尾隋采周官漢魏之制筍虡並金博山皆飾以崇牙樹羽旅蘇其樂器天地之神示宗廟及殿庭則五采漆畫唐五郊樂縣各從其方色葢一時之所尚然也筍或作簨虡或作鐻莊周曰梓慶削木為鐻葢古字通用大鍾鍾之制旁有兩欒正有兩面而靣皆有帶間有枚則鍾體固不圓而衡角之間無帶矣賈公彦曰鍾如鈴而不圓是也鄭氏曰帶介於衡角之間誤也明堂位曰垂之和鍾世本曰垂作鍾傳曰伏犧之孫曰伯陵伯陵生鼓延鼓始為鍾又曰黄帝命伶倫與營援作十二鍾考工記六分其金而錫居一謂之鍾鼎之齊鳬氏為鍾兩欒謂之銑銑鍾口兩角銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞四者鍾體也于鍾脣之上祛也鼓所擊處舞上謂之甬甬上謂之衡二者鍾柄也鍾鐶謂之旋旋蟲謂之幹旋柄上鐶也旋以蟲為飾鍾帶謂之篆篆間謂之枚枚謂之景帶所以介其名也在于鼓鉦舞甬衡之間凡四則中二通上下畔為四也枚鍾乳也漢時鍾乳與舞處有九面三十六舉漢一帯有九古法亦當然也兩靣皆三十六也于上之攠謂之隧攠所擊之處也十分其銑去二以為鉦以其鉦謂之銑間去二分以為鼓間以其鼓間為之舞修去二分以為舞廣横為修從為廣以其鉦之長為之甬長以其甬長為之圍三分其圍去一以為衡圍衡又小於甬大鍾十分其鼓間以其一為之厚為遂六分其厚以其一為之深而圜之典同掌六律六同之和以辨天地四方陰陽之聲以為樂器凡聲髙聲䃂正聲緩下聲肆陂聲散險聲斂達聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石凡為樂器以十有二律為之數度以十有二聲為之齊量凡和樂亦如之樂記曰鍾聲鏗鏗以立號號以動衆國語曰景王將鑄無射為之大林單穆公曰先王之制鍾也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出伶州鳩曰樂器重者從細輕者從大是以金尚羽石尚角又曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀立百事之道法又曰細鈞有鍾無鎛昭其大也大鈞有鎛無鍾甚大無鎛鳴其細也左傳伶州鳩曰鍾音之器也小者不窕他刀大者不槬戶花則和於物今鍾槬矣爾雅曰大鍾謂之鏞其中謂之剽小者謂之棧書曰笙鏞以間詩曰賁鼓維鏞鏞鼓有斁晉時剡縣民於田中得一鍾長三寸口徑四寸銘曰棧盞唐時岑陽耕者得古鍾髙尺餘楊牧扣之曰此姑洗角也既劀拭有刻在兩欒果然孟子曰禹之聲尚文王之聲古者庭實龜為前列鍾次之以和居參之也大饗入門而金作示情也有功伐者亦刻銘焉晉克潞之役魏顆以身却秦于輔氏親止杜回其勲銘於景鍾又魯季武子以所得於齊之兵作林鍾而銘魯功典同凡為樂器以十有二律為之度數單穆公曰先王之制鍾也大不出鈞重不過石律度量衡於是乎生則樂器待律然後制而律度又待鍾然後生故有十二辰之鍾以應十二月之律十二月之鍾大鍾也大鍾特縣詩書爾雅所謂鏞是也非十二辰之鍾則編焉周禮所謂編鍾是也鍾體之别五銑于鼓鉦舞是也鍾磬之别二甬衡是也衡上有旋旋飾有蟲介于于鼓鉦舞之間有帶布於帶間有枚先儒曰銑金之澤者又曰銑小也鍾欒亦謂之銑以其類然也于則銑間之曲祛者也鼓則于上之待拁者也鉦則鼓舞之正中者也舞則聲之震動於此者也甬出舞上者也衡横甬上者也帶類篆故謂之篆乳有數故謂之枚然鍾之長短徑圍經無明證其言十分其銑去二以為鉦以其鉦為之銑間者鉦體之徑居銑間之八也去鉦二分以為之鼓間者鼓間之徑居銑間之六也以其鼓間為之舞修修舞之徑也舞徑亦居銑間之四也舞長四而徑間亦四舞鼔徑六而長亦六鄭氏以為此鍾口十其長十六也凡樂器以十有二律為之度數若黄鍾之律九寸十六之而銑取其十以為度則銑徑五寸有竒鉦鼓舞之所居者遞去二分則舞修三寸有竒舞廣二寸有竒林鍾之律六寸十六之而銑取其十以為度則銑徑三寸有竒鉦鼔舞之居者遞去二分則舞二寸有竒舞廣一寸有竒餘律之鍾亦然賈公彦曰律各倍半以為鍾舉一端也大鍾十分其鼓間以其一為之厚小鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚葢鉦體居銑之六與鼓間同鉦問又殺矣與鼓間異此所以各十分之以為厚薄鄭氏曰鼔鉦之間同方六而今宜異又十分之一猶太厚皆非也若言鼓外鉦外則近之鼓外二鉦外一以謂鼓外二間鉦外一間而十分之以其一為厚薄其說誤矣鳬氏曰以其鉦之長為之甬以其甬長為之圍三分其圍去一以為衡圍三分其甬長二在上一在下以設其旋鄭司農曰旋蟲者旋以蟲為飾又曰旋有蹲熊盤龍辟邪賈公彦曰鄭以漢法鍾旋之上以銅篆作蹲熊及盤龍辟邪亦獸名撞木鐸鳴自内鍾鳴自外先儒以謂撞鍾磬必以濡木以其兩堅不能相和也或曰海中有巨魚曰鯨巨獸曰蒲牢蒲牢畏鯨擊鯨則蒲牢大鳴後世繇是作蒲牢於鍾上而狀鯨魚以撞之欲其大鳴張衡東京賦曰發鯨魚鏗革鍾是也然經無明證其制不可以考文選曰撞之以筳豈能廢其聲韓退之曰有如寸筳撞巨鐘禮書卷一百十九
