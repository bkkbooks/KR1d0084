  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_036-1a, image: WYG0130/WYG0130-0214a.png}
body:
  text: 禮書卷三十六宋陳祥道撰璿璣玉衡書曰在璿璣玉衡以齊七政易曰觀乎天文以察時變周禮馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥匠人建國夜考之極星然則周之察侯蓋亦不過璿璣玉衡之法而巳禮無眀證不可考也荀卿曰璇玉瑤珠說文曰璿美玉也孔穎達曰以璿為璣以玉為衡璣為運轉衡為橫簫懸珠以象天而以衡窺之漢謂之渾天儀是也蔡雍謂衡長八尺孔徑一寸言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜有其名而無說周髀有其術而無驗惟渾天為近之後世候壺銅儀則其法也楊雄云或問渾天曰落下閎營之鮮于妄人度之耿中丞象之幾幾乎莫之能違問天曰蓋哉應難未幾也說者以蓋天為周髀則雄于二者特取渾天而已古之論周髀者謂天地中高外下北極所臨為天地中日月周行於旁日近為晝日逺為夜論渾天者謂地居中而天周焉日在地上為晝在地下為夜是以後漢張衡鄭康成陸績吳之王藩晉之姜岌葛洪江南皮延宗錢樂之徒皆祖渾天而傳之蓋其視精祲察災祥有足驗焉故也測景東表景夕多風西表景朝多隂南表景短多暑北表景長多寒中表尺有五寸土圭尺有五寸周官大司徒曰以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中玉人曰土圭尺有五寸以致日以土地馮相氏曰冬夏致日春秋致月以辨四時之序匠人曰晝參諸日景鄭康成曰晝漏半而置土圭表隂陽審其南北景短於土圭謂之日南則地於日為近南也景長於土圭謂之日北則地於日為近北也東於土圭謂之日東則地於日為近東也西於土圭謂之日西則地於日為近西也如是則寒暑隂風偏而不和是未得其所求凡日景於地千里而差一寸又曰景尺有五寸者南戴日下萬五千里地與星辰四遊升降於三萬之中是以半之而得地之中鄭司農曰夏至之日立八尺之表其景適與土圭等謂之地中今頴川陽城地為然傳曰冬至日置八神樹八尺之表日中視其景如度者嵗美人和晷不如度者嵗惡人僞神讀如引八引者樹􅍻於地四維四中引繩以正之晷進則水晷退則旱進尺二寸則月食退尺二寸則日食古者土圭必植五表地中植中表千里而南植南表千里而北植北表東西二表相去如之先儒謂天地相距八萬里其升降也不過三萬里之中日景於表移一千則於地差千里故於相距准表之度而表八寸以升降之半准土圭之度而圭尺有五寸是以夏至日在東井地升而南遊萬五千里則去日近矣故晝漏以半景尺五寸冬至日在牽牛地降而北遊亦萬五千里則去日逺矣故晝漏以半景丈三尺蓋有所傳然也至日以冬夏而書特於夏言敬致大司徒特於夏求地中者測景以夏為正也所謂日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂者於日為近南則南表之北得景尺四寸其地多暑於日為近北則北表之北得景尺四寸其地多寒於日為近東則晝漏以半日已夕矣其地多風於日為近西則晝漏以半日未中矣其地多隂先王以四表眀中表之正以中表定四方之中在地則無道里逺近之不均在天則無寒暑風隂雨之不和萬物得極其高大故至於阜得其宜由其道故至於安然後以建王國焉匠人所謂晝參諸日景夜考諸極星蓋如此也易言巽為風禮言東多風蓋風之所屬者東方也五行傳以風屬中央失之矣致日月之法禮曰大眀生於東月生於西詩曰日居月諸出自東方又曰東方之日東方之月蓋月之始則生於西其盛則生於東楊子曰月未望則載魄于西既望則終魄于東漢書謂日有中道月有九行中道黃道也黃道北至東井南至牽牛東至角西至婁夏至日在東井而北近極星則晷短故立八尺之表而景尺五寸冬至日在牽牛而南逺極星則晷長故立八尺之表而景丈三尺春分日在婁秋分日在角而中於極星則景中故立八尺之表而景七尺三寸六分日陽也陽用事則日進而北晝進而長陽勝故為溫為暑隂用事則日退而南晝退而短隂勝故為涼為寒若日失節於南則晷過而長為常寒失節於北則晷退而短為常燠此四時致日之法也月之九行在東西南北有青白赤黑之道各二而出於黃道之旁立春春分月循青道而春分上弦在東井圓於角下弦於牽牛立秋秋分循白道而秋分上弦在牽牛圓於婁下弦於東井立冬冬至北從黑道立夏夏至南從赤道古之致月者不在立春立秋而常在二分不在二分之望而常在弦者以月入八日與不盡八日得隂陽之正平故也考之於經仲夏平秩南訛敬致冬夏致日春秋致月則致日不於春秋致月不於冬夏而漢書有春秋致日之事蓋兼後世之法也然日之與月其隂陽尊卑之辨若君臣然觀君居中而佚臣旁行而勞臣近君則威損逺君則勢盛威損與君異勢盛與君同月逺日則其光盈近日則其明闕未望則出西既望則出東則曰有中道月有九行之說蓋足信也十日周官馮相氏掌十日之位曲禮曰外事用剛日內事用柔日則甲丙戊庚壬五奇剛日也乙丁己辛癸五偶柔日也甲木之剛已土之柔故已配甲乙木之柔庚金之剛故乙配庚丙火之剛辛金之柔故辛配丙壬水之剛丁火之柔故丁配壬戊土之剛癸水之柔故癸配戊其相生以相繼其相尅以相治故木旺則火相水廢金囚而土死火旺則土相木廢水囚而金死土旺則金相火廢木囚而水死金旺則水相土廢火囚而木死水旺則木相金廢土囚而火死施於一日則為旦暮夜之期施於一嵗則為春夏秋冬之侯施於一旬而五行之理亦具矣先王於內外之事可以不順之乎外事師田外祭之類故用剛日詩吉日維戊既伯既禱吉日庚午既差我馬春秋壬午大閲甲午治兵是也內事冠婚內祭之類故用柔日書丁未祀于周廟春秋已卯蒸乙酉吉禘于莊公丁丑作僖公主丁卯大事于太廟辛已有事于大廟辛已立武宫癸酉有事于武宫丁丑夫人姜氏入是也士之始虞再虞用柔日三虞卒哭他用剛日何也始虞再虞曰哀薦祫事三虞卒哭曰哀薦成事祫事則凶而已凶隂也故用柔日成事則變而之吉吉陽也故用剛日亦外剛內柔之意也郊外事也日用辛社內事也日用甲何也甲者日之始而主生辛者乾之位而主成萬物之生本乎社其成功則歸諸天故社用甲而郊用辛不可以內外拘之也然則先王之於十日以生五聲則戊癸為宫庚乙為商甲巳為角丙辛為徴壬丁為羽是也以配仁義則先甲後甲先庚後庚甲斷仁庚斷義是也以禮鬼神則以其至之日而享以其物以去天鳥則方書十日之號縣之於巢而動作注錯罔不奉順然後夫人之道盡矣夫有日必有辰日以辰為子辰以日為母母為幹子為支故日甲乙則辰寅卯日丙丁則辰午未日庚辛則辰申酉日壬癸則辰亥子日戊巳則辰戌丑未而甲子在人則始甲子次乙丑順而數之以陽主進故也在地則始甲戌次癸酉逆而數之以隂主退故也十二風保章氏以十有二風察天地之和命乖别之妖祥鄭氏曰十有二辰皆有風吹律以知和不春秋楚師伐鄭師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功是時楚師多凍其命乖别審矣服䖍曰北風無射夾鍾以北南風姑洗以南然考之傳記陽立于五極于九五九四十五則變矣故八風各四十五日艮為條風震為眀庶風㢲為清眀風離為景風坤為凉風兑為閶闔風乾為不周風坎為廣莫風卦不過八風亦八而已其言十二風者乾之風漸九月坤之風漸八月艮之風漸十二月㢲之風漸三月而四維之風皆主兩月此其所以為十二風也古人占風以知未然之事者蓋多矣若周之尹喜占風而知神人漢之張成候風角而知有赦則師曠之歌亦此類歟水平法為規識日法匠人建國水地以縣立王國若邦國者於四角立植而縣以水望其高下既定乃為位而平地置𣙗以縣視以景於所平之地中央樹八尺之𣙗以懸正之視其景將以正四方也為規識日出之景與日入之景日出日入之景其端則東西正也又為規以識之者為其難審也自日出而晝其景端以至日入既則為規測景兩端之內規之交乃審也度兩交之間屈之以指臬則南北正晝參諸日中之景夜考之極星以正朝夕日中之景最短者也極星謂北極正義曰於造城之處四角立四柱於柱四畔縣繩以正柱柱正然後去柱逺以水平之法遙望柱高下平髙就下也置𣙗以縣者欲取柱之景先須柱正欲取柱正當以繩縣而垂之於柱之四角四中以八繩縣之其繩皆附柱則其柱正矣然後視以景水地以縣則旁植四木而縣繩焉以水望其高下所以求地之平置𣙗以縣視以景則中植一𣙗而懸繩焉視其出入之景將以求四方之正視其出入之景可以正東西而已又為規以度兩交之間以求其南北則四方於是乎正然猶以為未也又晝參諸日中之景夜考諸極星以正朝夕四方與朝夕皆正然後可以建國禮書卷三十六
