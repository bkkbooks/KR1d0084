body:
  text: 禮書卷三十五宋陳祥道撰尚書中星正義曰四方七宿各成一形東方龍形西方虎形皆南首而北尾南方鳥形北方龜形皆西首而東尼仲春日在奎婁而入於酉地則初昏之時井鬼在午栁星張在已軫翼在辰是朱鳥七宿皆得見也月令中星春有三月既正仲春轉以推季孟之月亦可知也馬融鄭𤣥以為星鳥星火謂正在南方春分之昏七星中仲夏之昏心星中秋分之昏虚星中冬至之昏昴星中皆舉正中之星而星不為一方盡見此與孔異陽生於子故日之行也自北而西厯南而東冬至在牽牛春分在婁夏至在東井秋分在角月令正月在營室二月在奎三月在胃四月在畢五月在東井六月在栁七月在翼八月在角九月在房十月在尾十一月在斗十二月在婺女則婁井角以三仲月中言之也斗以仲冬月本言之也其餘或舉月本或舉月末不必皆月中也日遡於天故新春則見南夏則見東秋則見北冬則見西仲春日中星鳥則昏之時井鬼在午栁星張在已軫翼在辰仲夏日永星火則角亢在午氐房星在已尾箕在辰仲秋宵中星虚則奎婁在午胃昴畢在巳觜參在辰仲冬日短星昴則斗牛在午女虚危在已室壁在辰月令正月昏參中旦尾中二月昏弧中旦建星中三月昏星中旦牛中四月昏翼中旦女中五月昏亢中旦危中六月昏火中旦奎中七月昏建星中旦畢中八月昏牛中旦觜中九月昏虚中旦栁中十月昏危中旦七星中十一月昏壁中旦軫中十二月昏婁中旦氐中盖書之所言皆昏星也火房心也書於仲夏舉房心而月令舉亢書於仲秋舉虚而月令舉牛書於仲冬舉昴而月令舉壁則書之中星常在後而月令中星常在前盖月令舉月本書舉月中也考之漢志正月節昏畢中旦尾中正月中昏參中旦箕中二月節昏井中旦斗中二月中昏鬼中旦斗中三月節昏星中旦斗中三月中昏張中旦牽牛中四月節昏翼中旦婺女中四月中昏角中旦危中五月節昏亢中旦危中五月中昏氐中旦室中六月節昏火中旦奎中六月中昏尾中旦婁中七月節昏箕中旦胃中七月中昏斗中旦畢中八月節昏斗中旦參中八月中昏牽牛中旦井中九月節昏女中旦鬼中九月中昏虚中旦星中十月節昏危中旦張中十月中昏室中旦翼中十一月節昏壁中旦軫中十一月中昏奎中旦亢中十二月節昏婁中旦氐中十二月中昏胃中旦心中月令於四月五月十二月昏旦舉節氣之星於八月昏旦舉中氣之星於十月昏舉節氣之星於正月六月十月旦舉節氣之星於正月八月九月昏舉中氣之星於三月七月旦舉中氣之星或舉朔氣或舉中氣猶書於七星或舉其名或舉其次皆互見也昔王孝通詰傅仁均推步之法謂日短星昴以正仲冬七宿畢見舉中宿言而仁均専守昴中不亦謬乎又月令冬昏東壁中眀昴中非為常准若堯時昏昴昏中差至東壁然則堯前七千餘載冬至昏翼中日應在東井井極北去人最近故暑斗極南去人最逺故寒寒暑易位必不然也然則聖人南面視四星之中者豈徒然哉凡以授民時秩民事而已書傳曰主春者張昏中可以種穀主夏者火昏中可以種黍主秋者虚昏中可以種麥主冬者昴昏中可以收歛不特是也龍見而雩火流而授衣天根見而成梁水昏正而栽日至而畢則凡所以奉天順人莫不視乎此也月令二十四氣劉歆三統厯正月立春節雨水中二月驚蟄節春分中三月穀雨節清眀中四月立夏節小滿中五月芒種節夏至中六月小暑節大暑中七月立秋節處暑中八月白露節秋分中九月寒露節霜降中十月立冬節小雪中十一月大雪節冬至中十二月小寒節大寒中然月令孟春蟄蟲始振而非二月仲春始雨水而非正月仲夏小暑至而非六月孟秋白露降而非八月者鄭氏釋月令謂夏小正正月啟蟄漢始以啟蟄為正月中然則劉歆以驚蟄在二月盖謂蟄蟲正月始驚二月大驚故移驚蟄於二月也其他與月令不同者盖月令或原其始或要其終其實記時而已非必如厯之詳也考諸傳記五日為候二候為氣六氣為時四時為嵗嵗之氣二十有四而候七十有二然則一月之内六侯二氣朔氣常在前中氣常在後朔氣在晦則後月閏中氣在朔則前月閏朔氣有入前月而中氣常在是月中數周則為嵗朔數周則為年是年不必具四時而嵗必具十二月也二十四氣播於十二月之中一氣十有五度則二十四氣三百六十度其餘五度四分度之一度分為三十二則五度為百六十四分度之一又為八分總百六十八分布於二十四氣之中而氣得七分中朔大小不齊則氣有十六日者有十五日七分者是以三十三月巳後中氣有晦不置閏則中氣入後月矣挈壺漏刻之圖正月節晝四十八六分中晝五十八分夜五十一四分夜四十九二分二月節晝五十三三分中晝五十五八分夜四十六七分夜四十四二分三月節晝五十八三分中晝六十五分夜四十七分分夜三十九五四月節晝六十三四分中晝六十三九分夜三十七六分夜三十六一分五月節晝六十四九分中晝六十三夜三十五一分夜三十五六月節晝六十四七分中晝六十三八分夜三十五三分夜三十六二分七月節晝六十二三分中晝六十二分夜三十七七分夜三十九八分八月節晝五十七八分中晝五十五二分夜四十二二分夜四十四八分九月節晝五十二六分中晝五十三分夜四十七四分夜四十九七分十月節晝四十八二分中晝四十六七分夜五十一八分夜五十三三分十一月節晝四十五五分中晝四十五夜五十四五分夜五十五十二月節晝四十五八分中晝四十六八分夜五十四二分夜五十三二分壺箭周禮挈壺氏下士六人掌挈壺以令軍井凡軍事縣壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以日夜以火守壺者夜則視刻數也分以日夜者異晝夜刻也漏之箭晝夜共百刻冬夏之間有長短焉太史立成法有四十八箭挈壺謂結之於竿首挈挈然也及冬以火爨鼎水而沸之而沃之正義曰鄭謂太史立成法有四十八箭者此據漢法而言則以器盛四十八箭箭各百刻以壺盛水懸於箭上節而下之水淹一刻四十八箭者取倍二十四氣也雞人大祭祀夜嘑旦以嘂百官夜夜漏未盡雞鳴時也呼旦以警起百官使夙興凡國事為期則告之時齊詩東方未眀刺無節也朝廷興居無節號令不時挈壺氏不能掌其職也正義曰置箭壺内刻以為節而浮之水上今水漏而刻下以記晝夜昏眀之數也梁漏刻經云漏刻之作盖肇於皇帝之日宣乎夏商之代渾天儀制曰以銅為器再疊差置實以清水下各開孔以玉虬吐漏水入兩壺右為夜左為晝殷䕫漏刻法曰為器三重圓皆徑尺差立於方輿之上為金龍口吐水轉注之其鑄金為司辰具衣冠以兩手執箭李蘭刻漏法曰以銅為渇烏以引器中水以銀龍口中吐之周天之星二十有八而星之辰有十二辰之度三十有奇十二辰之度三百六十五有奇星辰循天而左旋日月五星遡天而右轉日陽也舒而遲故朞而周月隂也蹙以速故一月而周日月會於辰則為月十有二㑹則為嵗嵗三百有六旬有六日而日有長短参差不齊先王於是刻箭沃漏以揆之此挈壺氏所以設也盖日之行也斗建寅則出乙而漸北斗建午則出艮而漸南漸北則春既分而晝加長漸南則秋既分而晝加短長短不過百刻而已故晝長六十刻夜短四十刻晝短四十刻夜長六十刻然天之晝夜以日之出入為分人之晝夜以天之昏眀為節眀常先於日出昏常後於日入則日出之前二刻半為眀日入之後二刻半為昏損夜五刻以裨於晝故夏至晝六十五刻夜三十五刻冬至晝四十五刻夜五十五刻二分之晝五十五刻夜四十五刻自春分以至夏至晝所増者九刻有半自夏至以至秋分所減者亦然自秋分至於冬至晝所減者十刻有半自冬至以至春分所加者亦然挈壺之法盖為箭四十八以候二十四氣大率七日大半而易一箭孔穎達謂浮箭壺内以出刻為准賈公彦謂漏水壺内以沒刻為度盖各述其所聞而已雖浮沒不同大槩一也渾儀制曰鑄金銅人為胥徒居壺之左右以左手握箭右手指刻以别早晚則出刻之説與此合歟挈壺氏曰凡軍事懸壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以晝夜及冬則以火爨鼎水而沸之而沃之則以火爨鼎使之不凝以火守壺使之不差施之於軍事所以嚴警守施之於喪事所以嚴凶哀以至朝廷朝夕之禮亦常以是為節焉然春官雞人凡國事為期則告之時而齊詩特罪挈壺氏者盖天子備官挈壺掌漏雞人告之諸侯則掌漏告時一於挈壺氏而已禮書卷三十五
