body:
  text: 禮書卷一百二十八宋陳祥道撰行以肆夏趨以采薺之儀書傳曰天子左五鍾右五鍾出撞黃鍾右五鍾皆應然後太師奏登車告出也入撞㽔賓左右鍾皆應然後少師奏登堂就席告入也先儒謂比十二辰零鍾即鎛也然鏄小鍾非大鍾也爾雅曰堂上謂之行堂下謂之步門外謂之趨周禮樂師行以肆夏趨以采薺自其出言之也則黃鍾之鍾所以奏肆夏也禮記趨以采薺行以肆夏自其入言之也則㽔賓之鍾所以奏采薺也出撞陽鍾而隂鍾應之則動而節之以止也入撞隂鍾而陽鍾應之則止而濟之以動也動而節之以止則無過舉止而濟之以動則無廢功後世儒者或謂出當言左應入當言右應黃鍾陽升出則升部皆應㽔賓隂降入則降部皆應其説誤矣周禮鍾師以鍾鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏大司樂大祭祀宿縣遂以聲展之王出入令奏王夏尸出入令奏肆夏牲出入令奏昭夏大饗不入牲其他皆如祭祀大射王出入令奏王夏蓋王於祭祀大饗大射則出入奏王夏非此則行以肆夏而已肆夏非特施於王行也享牧伯亦行焉春秋傳稱三夏天子所以享元侯是也左傳曰金奏肆夏之三國語曰樂奏肆夏繁遏渠吕叔玉以肆夏為時邁繁遏為執競渠為思文杜預韋昭謂肆夏一名樊昭夏一名遏納夏一名渠鄭康成曰夏皆頌之族類樂崩則夏章亦從而亡之非特享牧伯也而送助祭者亦用焉禮記稱大饗其王事歟其出也肆夏送之是也諸侯之禮有肆夏無王夏大夫之禮有陔夏無肆夏故燕禮奏肆夏則諸侯有肆夏無王夏可知鄉飲酒奏陔夏以送賓而禮譏大夫之奏肆夏自趙文子始則大夫有陔夏無肆夏可知然周禮與禮記皆言行以肆夏趨以采薺大戴禮記則言步中采薺趨中肆夏誤也夫王食則以樂侑之言則以樂歌之行則以肆夏采薺以節之登車則有鸞和以和之然則王之所以言語飲食行趨登車之際無非樂音樂以樂之禮以節之則純和之志不內散而非僻之心無自入焉所謂禮樂不可斯須去身者此也前漢志曰漢高祖時叔孫通制宗廟樂皇帝入廟門奏永至以為行步之節猶古采薺肆夏也六年作昭容禮容樂昭容猶古之昭夏也主出武德舞禮容者主出文始五行舞入無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以禮樂終也然周禮王與賓尸出入皆有樂漢之昭容禮容特主出樂而已何承天曰今舞出樂謂之階步步階賓皆作舞封人歌舞牲及毛炮之豚鼓人凡祭祀百物之神鼓兵舞帗舞者帗列五采繒為之有秉皆舞者所執舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞師而舞四方之祭祀教皇舞帥而舞旱暵之事羽析白羽為之形如帗鄭司農曰玄謂皇析五采羽為之亦如帗韎師舞者十有六人大司樂以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武此周所存六代之樂黃帝曰雲門大卷黃帝能成名方物以眀民共財言其德如雲之出民得以有族類大咸咸池堯禪均刑法以儀民言其德無所不施大㲈舜樂也言其德能紹堯之道也大夏禹樂也禹治水敷土言其德能大中國也大濩湯樂也湯以寬治民而除暴言其德能使天下得其所也大武武王樂也以六律六同五聲八音六舞大合樂以致鬼神雲和之琴瑟雲門之舞冬日至於地上圜丘奏之空桑之琴瑟咸池之舞夏日至於澤中方丘奏之龍門之琴瑟九德之歌九㲈之舞于宗廟中奏之樂師掌國學之政以教國子小舞內則曰十三舞勺成童舞象二十舞大夏凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞鄭司農云帗舞者全羽羽舞者析羽皇舞者以羽冒覆頭上衣飾翡翠之羽旄舞者氂牛之尾干舞者兵舞人舞者手舞社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人舞大胥掌學士之版春入學舍菜合舞秋頒學合聲以六樂之會正舞位以序出入舞者籥師掌教國子舞羽吹籥祭祀則鼓羽籥之舞賓客饗食亦如之司干掌舞器祭祀舞者既陳則授舞器既舞則受之賓饗亦如之大祝來瞽令皋舞女巫掌嵗時祓除釁浴旱暵則舞雩諸子掌國子之倅大祭祀正六牲之體凡樂正舞位授舞器司兵祭祀授舞者兵司戈盾祭祀授旅賁殳故士戈盾授舞者兵亦如之禮記郊特牲諸侯之宫縣而祭以白牲擊玉磬朱干設錫冕而舞大武乘大路諸侯之僣禮也眀堂位升歌清廟下管象朱干玉戚冕而舞大武樂記凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂干戚之舞非備樂也其治民勞者其舞行綴逺其治民逸者其舞行綴短故觀其舞知其德然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理詩言其志也歌詠其聲也舞動其容也樂者非謂黃鍾大吕弦歌干揚也樂之末節也故童者舞之先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱然後鍾磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也且夫武始而北出再成而滅商三成而南四成而南國是強五成而分周公左召公右六成復綴以崇天子祭統君致齋於外夫人致齊於內然後會於大廟君純冕立於阼夫人副褘立於東房君執圭瓉裸尸大宗執璋瓉亞裸及舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟內樂之冕而總干率其羣臣以樂皇尸此與竟內樂之之義也武舞六成之位舞有表有綴兆鄭氏曰綴謂鄼舞者之位也兆其外營城也周官大胥以六樂之會正舞位樂記曰武始而北出再成而滅商三成而南四成而南國是強五成而周公左召公右六成復綴以崇天子又曰先鼓以警戒三步而見方再始以著往復亂以飭歸先儒謂立四表於郊丘廟廷舞人自南表向二表為一成自二表至三表為二成自三表至北表為三成乃轉而南向自一表至二為四成自二表至三為五成自三表至南表為六成則天神皆降若八變則又自南而北為七成自二表至三為八成則地祗皆出若九變又自三表至北表為九成人鬼可得而禮焉蓋周都商之西南商都周之東北故舞始而北出則至二表矣此三步以見方者也再成而滅商則至三表矣此再始以著往者也三成而南則至四表矣家語曰三成而南反四成而南國是強則又自北而南至二表矣五成而分周公左召公右則至三表矣此復亂以飭歸者也六成復綴以崇天子家語曰以崇其天子則復初表矣此樂終而德尊也蓋武始而北出則出表之東北以商居東北故也三成而南則入表之西南以周居西南故也強南國然後可得而分治分治然後可得而復綴分治繫於臣故散而為二復綴統於君故合而為一樂記言復綴以崇天子繼以夾振之而駟伐者又本其始也何則武舞四表所以象司馬之四表也夾振之而駟伐所以象司馬振鐸師徒皆作也夾振之而駟伐詩所謂駟騵彭彭是也復亂以飭歸國語所謂布憲施令謂之羸亂以優柔容民是也司馬之四表三表百步一表五十步始則行而不驟趨中則趨而不馳走及四表則馳走之時也故五十步而已舞之四表蓋不必然禮書卷一百二十八
