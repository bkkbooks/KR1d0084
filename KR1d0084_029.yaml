body:
  text: 禮書卷二十九宋陳祥道撰耕藉鄭氏曰藉之言借也韋昭亦曰藉借也借民力以治之然則甸師掌帥其屬而耕耨王藉則王一耕之而使庶人終之故孟子曰諸侯耕助以共粢盛此所謂借也應邵曰藉者帝王典藉之常也臣瓚曰藉蹈藉也非是甸師掌帥其屬而耕耨王藉以時入之以共齊盛其屬府史胥徒也王以孟春躬耕帝藉天子三推三公五推卿諸侯九推庶人終於千畝庶人謂從三百人藉之言借也王一耕之而使庶人藝芓終之內宰上春詔王后帥六宫之人而生穜稑之種而獻之於王古者使后宫藏種以其有傳類蕃孳之祥必生而獻之示能育之使不傷敗且以佐王耕事共禘郊也月令孟春之月乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒元辰蓋郊後吉辰也耒耜之上曲也保介車右也置來於車右與御者之間明已勸農非農者也人君之車必使勇士衣甲居右而參乘備非常也保猶衣也介甲也樂記曰耕藉然後諸侯知所以敬祭義曰天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛於是乎取之敬之至也又曰耕藉所以教諸侯之養也祭統曰天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也表記子言之君子之所謂義者貴賤皆有事於天下天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子詩載芟春藉田而祈社稷也國語曰宣王不藉千畝虢文公諫曰不可夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生日月底于天廟天廟營室也土乃脉發先時九日太史告稷曰自今至于初吉初吉二月朔也陽氣俱蒸土膏其動稷以告王乃使司徒咸戒公卿百吏庶民司空除壇于藉命農大夫咸戒農用先時五日王即齊宫百官御事各即其齊三日及期王裸鬯乃行百吏庶民畢從及藉后稷監之膳夫農正陳藉禮太史贊王敬從之王耕一墢班三之班次也王耕一墢一耦之發也耜廣五寸二耜為耦一耦之發廣尺深尺三之下各三其上也王一墢公三卿九大夫二十七也庶民終于千畝畢宰夫陳饗膳宰監之膳夫贊王王歆太牢班嘗之庶人終食廩于藉東南鍾而藏之又曰王治農於藉耨穫亦於藉習民數者也春秋書御廩災穀梁曰災不志此其志何也以為惟未易災之餘而嘗可也志不敬也天子親耕以共粢盛后親蠶以共祭服國非無良農工女也以為人之所盡事其祖禰不若以已所自親者也藉田南郊記曰天子諸侯莫非耕也王后夫人莫非蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也然則天子為藉千畝於南郊正陽之位也冕而朱紘則朱者正陽之色也諸侯為藉百畝於東郊少陽之位也冕而青絃則青者少陽之色也其時則中春春秋傳曰啓蟄而郊郊而後耕國語曰日月底于天廟至于初吉韋昭曰二月之吉先時五日告協風至即齊宫三日乃行是也其日則剛日曲禮曰外事用剛日月令曰乃擇元辰是也其祭則祈社稷于內享先農于外詩曰春藉田而祈社稷國語曰膳夫農正陳藉禮是也韋昭曰陳藉禮而祭其神自漢以來皆祀先農則古可知其禮則后帥六宫贊事於內司空后稷太史瞽師鬱人犧人膳夫農正司徒太師贊事于外周禮內宰詔后帥六宫之人生穜稑之種獻之于王國語曰太史告稷司空除壇之類是也親載耒耜猶農者之出疆也載必措于保介之御間又明勸農者也王必三推即所謂一墢也三公五推卿諸侯九推即所謂班三之也王以一人而發其土三公三人卿九人大夫二十七人繼之則月令所言者推數也國語所言者人數也庶人終于千畝甸師所帥之徒也既事則王歆太牢班嘗之庶人終食反執爵于大寢公卿諸侯大夫皆御命曰勞酒此春耕之終事也若夫夏耨秋穫王又至焉國語所謂耨穫亦於藉是也後世月或用孟春月令孟春蓋秦禮也孔頴逹釋詩序曰月令孟春耕藉仲春命民社大司馬搜田祭社祈社與藉田雖異月以俱在春時故序以春總之其說與國語不同漢章晉隋皆用正月特漢明及梁天監中唐開元禮用二月日或用亥鄭氏釋月令謂元辰吉辰也孔頴達曰以亥為天倉故用之晉武宋文北齊皆用𤣥或用乙漢章以乙耕於乙地耕或於東漢文章晉武及唐東耕時隋耕于國南或於東南宋文北齊皆於東南或於近宋文帝度宫之辰地八里之外隋於國南十四里或於遠漢明東巡耕於下邳章帝北巡耕於懷縣衣或以通天冠青幘青衮宋文時禮耜或以黛唐禮耕或盡壠唐𤣥宗進耕五十餘步盡壠而止壇或祭先農或祭社歷代皆祭先農唐神龍初用祝欽明之說改先農壇為帝社壇開元中親祠神農于東郊勾芒配祭或以太牢或以羊此歷代之禮所尚異也考之於禮蠟合萬物而索饗之則羣小祀也其禮主先嗇先嗇先農也王以𤣥冕祭之則耕藉之祭先農其服𤣥冕可知也唐以希冕享先農𤣥冕蠟祭百神小司徒凡小祭祀奉牛牲羞其肆鄭氏謂小祭祀王𤣥冕所祭者則祭先農用牛牲可知也王之藉掌以甸師而諸侯亦有甸人文王世子曰公族有罪罄于甸人則諸侯之禮與王略同矣耕車周禮木路不鞔以革漆之而已漢志耕車三蓋東京賦曰農輿路木薛綜曰所謂耕根車也然晉武及梁乘木路宋文及唐乘耕根車三重蓋而唐志木路黑質耕車青質則木路與耕根車少異耳考之周禮田僕掌馭田路以田以鄙鄭氏曰田路木路也田田獵也鄙循行縣鄙然則耕藉於郊蓋木路歟耕壇掌次掌凡邦之張事則耕壇蓋有幕也國語曰司空除壇于藉而宋有御耕壇於中阡東陌北將耕宿青幕于耕壇之上北齊於藉田一頃地中通阡陌作祠壇又外設御耕壇後梁有親耕臺在壇東帝親耕畢登臺以觀公卿之推而晉及北齊隋唐皇后躬蠶亦有桑壇然則古者躬耕田有耕壇司空除壇不特除農壇而已先農壇國語曰司空除壇于藉漢舊儀春始東耕官祠先農以一太牢先儒謂先農神農也立壇於田所祠之其制度如社之壇後漢藉田儀正月始耕常以乙日祠先農已享乃就耕位晉以太牢祀先農宋元嘉中度宫之辰地整制千畝中開阡陌立先農於中阡西陌南御耕壇於中阡東陌北將耕宿青幕于耕壇之上耕日以太牢祠先農如帝社儀後魏太武天興中祭先農用羊一北齊藉田作祠壇於陌南阡西廣三十尺四陛三壝四門正月上辛後吉亥祠先農神農氏於壇上無配太宗親祭先農藉于千畝武后改藉田壇為先農壇神龍初祝欽明奏曰祭法王自為立社曰王社先儒以為其社在藉田之中詩序云春藉田而祈社稷是也乃改先農壇為帝社然則先農即禮所謂先嗇也歷代所祭或以太牢或以羊或以乙日或以亥日要皆不遠於禮其改先農壇為帝社此於經無見特傅㑹詩序為之說神倉亦曰御廩别而言之圜曰廩方曰倉倉明堂位曰有虞氏之米廩鄭氏曰虞帝上孝今藏粢盛之委焉詩曰亦有髙廩國語曰廩于藉東南鍾而藏之春秋書御廩災公羊曰御廩粢盛之所委也穀梁曰甸粟而納之三宫三宫米而藏諸御廩月令季秋藏帝藉于神倉廩亦謂之倉者周禮廩人掌九榖之數以待國之匪頒賙賜稍食倉人掌粟人之藏辨九榖之物以待邦用而廩人下大夫二人上士四人中士八人下士十有六人徒三百人倉人中士四人下士八人徒四十人鄭氏謂藏米曰倉廩人以粟為主廩人者舍人倉人司祿官之長說文曰廩而取之故謂之廩倉黃取而藏之故謂之倉或曰方曰倉圜曰廩倉廩之别雖不可得其詳然詩言乃求干斯倉則言倉之多言亦有高廩萬億及秭則言藏之多又周禮廩人掌九穀之數倉人掌九穀之物而廩人為倉人之長則廩固大於倉矣詩曰曾孫之庾月令曰修囷倉考工記曰囷窖倉城逆墻六分鄭氏曰囷圜倉穿地曰窖荀卿曰垣窖倉廩財之末也吳語曰囷鹿空虛韋昭曰圓曰囷方曰鹿爾雅曰廩廯也然則倉也廩也廯也囷也窖也鹿也皆禾穀之所藏露積曰庾地藏曰窖窖或作窖鹿或作麁晉天文志危星主天倉胃三星主倉廩隋天文志天困十三星在胃南主給御糧天廩四星在昂南一曰天廥畜黍稷以供饗祀六星在婁南倉榖所藏西南四星曰天庾積厨粟之所人耦齊語曰夫農首戴茅蒲身衣襏襫韋昭曰茅蒲簦襏襫蓑襞衣也牛耦詩曰十千維耦周禮里宰合耦于鋤匠人二耜為耦一耦之伐廣尺深尺謂之甽月令季冬命農計耦耕事語曰長沮桀溺耦而耕鄭氏釋周禮謂古者耜一金兩人併發之又謂合人耦則牛耦亦可知王弼釋易亦曰牛者稼穡之資而孔子之時冉耕字伯牛則古者耦耕不特以人亦以牛也然史稱漢趙過始教民牛耕而王鄭且云爾者賈公彥曰或周兼有牛耦至漢趙過乃絶人耦専用牛耦於義或然土牛月令季冬命有司大難旁磔出土牛以送寒氣出猶作也作土牛者丑為牛牛可牽止也送猶畢也正義曰其時月建丑又土能尅水特水之隂氣故特作土牛以畢送寒氣也唐月令曰季冬命有司出土牛以示農耕之早晚若立春在十二月晦則䇿牛人近前示其農早也立春在正月晦及二月朔則䇿牛人當中示其農平也立春近正月望則牛人近後示其農晚也後漢志冬之月立土牛六頭於國都郡縣城外丑地以送大寒月令章句是月之㑹建丑丑為牛寒將極是故出其物類形像以示送違之且以升陽也土勝水牛善耕勝水故可以勝寒氣善耕故可以示農耕之早晚月令季冬之月大難旁磔然後出土牛則出土牛驅除之終事也既乃告民出五種命農計耦耕事則出土牛又農耕之始事也後世土牛之法以嵗之幹色為首甲至癸為十幹甲乙木其色青丙丁火其色赤戊己土其色黃庚辛金其色白壬癸水其色黑支色為身寅至丑為十二支寅卯木其色青巳午火其色赤申酉金其色白亥子水其色黑辰戌丑未土其色黃納音色為腹若甲子乙丑金其色白丙寅丁卯火其色赤他皆放此以立春日幹色為角耳尾支色為脛納音色為蹄設令甲子嵗甲為幹其色青則青為牛首子為支其色黑則黑為身納音金其色白則白為腹又若丙寅日立春丙為幹其色赤則赤為角耳尾寅為支其色青則青為脛納音火其色赤赤為蹄其說蓋有所𫝊然也禮書卷二十九
