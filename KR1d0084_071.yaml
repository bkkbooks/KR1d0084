body:
  text: 禮書卷七十二宋陳祥道撰時祭之祫君子以義處禮則祭不至於數煩以仁處禮則祭不至於疏怠悽愴發於霜露之既降怵惕生於雨露之既濡此所以有四時之享也商禮春曰礿夏曰禘而五年之禘為大禘詩頌長𤼵大禘是也周禮春曰祀夏曰礿而五年之禘不稱大焉詩頌雍禘太祖是也然四時之享皆前期十日而齋戒前祭一日而省眡祭之日禮交動乎上樂交應乎下自再祼以至九獻其禮非一舉自致神以至送尸其樂非一次以一日而厯七廟則日固不足而强有力亦莫善其事矣若日享一廟前祭視牲後祭又繹則彌月之間亦莫既其事矣考之經傳葢天子之禮春則犆祭夏秋冬則合享犆祭各於其廟合享同於太廟王制曰天子犆礿祫禘祫嘗祫烝諸侯礿犆禘一犆一祫是天子春犆而三時皆祫諸侯亦春犆而冬皆祫其異於天子者禘一犆一祫而已禘一犆一祫而嘗烝皆祫是始年再祫次年三祫也天子言犆礿諸侯言礿犆天子言祫禘祫嘗祫烝諸侯言嘗祫烝祫此特變文而已非有異也鄭氏曰天子先祫而後時祭諸侯先時祭而後祫凡祫之嵗春一礿而已孔頴達云皇氏以為虞夏祫祭毎年為之又云三時祫者夏秋冬或一祫焉按禘祫志云祫於秋於冬於夏則夏殷三時俱殷祭皇氏之説非也其言皆無所據楚茨之詩始言以往烝嘗終言神具醉止儀禮大夫三廟筮止丁亥之一日而言薦嵗事于皇祖禮記言嘗禘之禮所以仁昭穆則㑹羣神於烝嘗而具醉者祫也合三廟於一日而薦于皇祖者亦祫也嘗禘所以仁昭穆亦祫也祫有三年之祫有時祭之祫時祭之祫小祫也士虞禮曰薦此祫事則時祭謂之祫宜矣三年之祫大祫也時祭有小禮有大禮小禮春也大禮夏秋冬也公羊傳曰大事者何大祫也則眀時祭之祫為小祫矣禮記曰大嘗周禮曰大烝則眀春祀為小禮矣葢小祫止於未毁廟之主大祫已及於毁廟之主禮記曰周旅酬六尸又曰祫于太廟祝迎四廟之主夫天子旅酬止於六尸諸侯迎主止於四廟非小祫而何月祭時享周禮大宗伯以肆獻祼饋食享先王以春祠夏禴秋嘗冬烝享先王祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧祧有一為有二祧享嘗乃止諸侯五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止然則周禮有時祭無月祭祭法有月祭無時祭周語祭公謀父曰甸服者祭侯服者祀賓服者享要服者貢日祭月祀時享嵗貢楚語觀射父曰先王日祭月享時類嵗祀諸侯舎日卿大夫舍月士庶人舍時韋𤣥成韋昭之徒則曰天子日祭於祖考月祭於曽高時享於二祧嵗貢於壇墠此與漢法日祭於寢月祭於廟時祭於便殿其事相類而甸侯賓要荒五服之制與禹貢相合葢夏商之禮如此故左丘眀荀卿司馬遷皆得以傳之也周禮小宗伯凡天地之大烖類社稷宗廟為位則類於宗廟者無常時與所謂王時類者異矣王制庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈則薦於四時者有常物與所謂庶人舎時者異矣然則玉藻言天子聴朔於南門之外諸侯聴朔於太廟春秋文公六年書閏月不告朔猶朝于廟論語曰子貢欲去告朔之餼羊鄭氏釋玉藻謂天子聴朔於眀堂以特牲告其帝及神配以文王武王釋論語謂人君每月告朔有祭謂之朝享然周禮朝享非謂告朔而聴朔於眀堂以特牲告其帝及神配以文王武王無所經見要之告朔於廟餼以特牲謂之月祭此先王之禮也魯文公不行告朔之禮但身至廟拜謁而已故春秋譏之穀梁言天子告朔于諸侯諸侯受于禰廟禮也又曰閏月不以告朔然受朔于禰則異於玉藻閏月不告朔則異於左氏左氏曰閏以正時時以作事事以厚生生民之道於是乎在不告朔棄時政也祭法諸侯月祭不及祖考其説與穀梁同不知何據然也三代祭時夏祭其闇商祭其陽周祭日以朝及闇祭義曰夏后氏祭其闇商人祭其陽周人祭日以朝及闇檀弓曰夏后氏大事用昏商人大事用日中周人大事用日出然則春秋書之大事于太廟傳稱國之大事在祀與戎則祭亦大事也夏尚黒用昏故祭其闇商尚白用日中故祭其陽周尚赤用日出故祭以朝及闇鄭氏謂陽讀為曰雨曰𤾉之𤾉以朝及闇謂終日有事葢三代正朔之所尚正則夏以建寅商以建丑周以建子朔則夏以平旦商以雞鳴周以夜半是皆夏據其末商周探其本則祭之早晏亦若此也少牢大夫之祭宗人請期曰旦眀行事子路祭於季氏質眀而始行事晏朝而退孔子取之此周禮也然禮與其失於晏也寧早則周雖未眀之時祭之可也故曰以朝及闇周官雞人凡國事為期則告之時宗伯祭之日告時于王葢雞人告于宗伯宗伯告于王然後行事天子諸侯卜祭於廟堂大夫士卜祭於廟門周官有大卜龜人占人簭人凡國之大事先簭而後卜表記則曰天子無筮禮器言諸侯以龜為寳表記則曰諸侯有守筮葢天子主於龜而未嘗無筮諸侯主於筮而未嘗無龜鄭康成謂天子至尊大事皆用卜此皆指其所主者言之也周官凡祭祀之禮肆師於卜日宿為期大宰大宗伯帥執事而卜日大史與執事卜日郊特牲曰卜郊受命於祖廟作龜于禰宫龜筴傳曰王者𤼵軍行將必鑚龜廟堂之上以決吉凶儀禮特牲少牢士冠皆筮於廟門之外士卜葬亦於廟門之外則人君卜於禰宫之内大夫士筮於禰門之外也鄭氏釋士冠禮謂筮不於堂者嫌蓍之靈由廟神失之矣考之於禮大夫士有筮無卜筮則有筮史卜則請於君故臧氏居蔡孔子所譏駟乞請卜子産弗與則士又可知矣記曰易抱龜南面天子卷冕北面少牢大夫朝服而祭亦朝服而筮特牲士冠端𤣥而祭亦冠端𤣥而筮則卜筮之嚴與祭同也然大夫士筮則主人西面筮史亦西面天子之卜則易南面天子北面何也北者正隂之位西者少隂之方天子求兆於正隂大夫士則求兆於少隂而已猶之天子藉於正陽之南郊諸侯藉於少陽之東郊也然天子之卜易雖抱龜南面受命及其卜也亦北面觀士喪禮筮宅筮者南面受命然後北面筮之則天子之卜葢亦然也士筮宅以筮而卜日又以龜豈非請於君乎卜郊郊特牲曰郊之用辛也周之始郊日以至周官大司樂凡樂冬日至於地上之圜丘奏之天神皆降可得而禮凡以神仕者以冬日至致天神人鬼則周之始郊乃周正月之郊也周正月之郊以冬日至則非始郊者用辛矣家語曰冬至之月用辛此王肅傳㑹之之論也春秋成十七年書九月辛丑用郊定十一年五月辛丑郊哀元年四月辛丑郊穀梁曰我以十二月下辛卜正月上辛如不従則以正月下辛卜二月上辛如不従則以二月下辛卜三月上辛如不従則不郊矣郊三卜禮也四卜非禮也五卜强也考之於禮卜筮不過三則僖襄之四卜郊成之五卜郊其為非禮與强可知也然詩曰春秋匪懈享祀不忒皇皇后帝皇祖后稷眀堂位曰孟春乗大輅祀帝于郊配以后稷左氏曰啟蟄而郊郊而後耕則魯郊固在夏之孟春矣啖氏曰以周二月卜三月上辛不吉則卜中辛又不吉則卜下辛此説是也穀梁謂自夏正月至三月郊之時也皆卜上辛然考之儀禮少牢饋食筮旬有一日若不吉則及逺日又筮日如初曲禮曰旬之外曰逺日是古人踰旬則卜未聞踰月乃卜也社用甲郊用辛者甲者日之始辛者乾之方生物者社也故用甲成功者天也故用辛鄭氏謂用辛者凡為人君當齋戒自新若然是祭祀之卜日其義不在神而在人也公羊傳曰禘嘗不卜郊何以卜魯郊以周公之故不為非禮禮書卷七十二
