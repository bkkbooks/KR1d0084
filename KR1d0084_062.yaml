body:
  text: 禮書卷六十三宋陳祥道撰九族書堯典曰克明俊徳以親九族九族既睦平章百姓以睦高祖𤣥孫之親臯陶謨曰惇叙九族庻明勵翼仲虺之誥曰志自滿九族乃離詩葛藟刺平王也周室道衰棄其九族焉九族者據巳上至高祖下及𤣥孫之親其詩曰終遠兄弟謂他人父終遠兄弟謂他人母終遠兄弟謂他人昆頍弁諸公刺幽王也不能燕樂同姓親睦九族其詩曰豈伊異人兄弟匪他豈伊異人兄弟甥舅角弓父兄刺幽王也不親九族而好讒侫其詩曰兄弟昬姻無胥逺矣行葦忠厚也能内睦九族外尊事黄耉其詩曰戚戚兄弟莫遠具爾䘮服小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣巳上親父下親子三也以父親祖以子親孫五也以祖親高祖以孫親𤣥孫九也三族周禮小宗伯掌三族之别以辨親疎其正室皆謂之門子掌其禁令三族父子孫人屬之正名小記曰親親以三為五以五為九禮記仲尼燕居曰閨門之内有禮故三族和三族父子孫也士昬禮請期曰惟是三族之不虞使某也請吉日三族謂父昆弟巳昆弟子昆弟虞度也不億度謂卒有死喪此三族者巳及子皆為服期期服則踰年欲及今之吉也雜記曰大功之末可以冠子嫁子史記秦紀襄公二十年法初有三族之誅張晏曰父母兄弟妻子也如淳曰父族母族妻族也前漢張耳傳趙相貫高曰人情豈不各愛其父母妻子哉今吾三族皆以論死豈以王易吾親哉宗族周禮大宰宗以族得民宗繼别為大宗收族者大宗伯以飲食之禮親宗族兄弟脤膰以親兄弟之國甸師王之同姓有罪則死刑焉文王世子曰公族有死罪則磬於甸人司士正朝儀之位王族故士虎士在路門之右王族故士故為士晚退留宿衛者未嘗仕雖同族不得在王宫大僕王眡燕朝則正位燕朝朝於路寝之庭王圖宗人之嘉事則燕朝巾車金路封同姓文王世子庻子之正於公族者教之以孝悌睦友子愛明父子之義長㓜之序其朝於公内朝則東靣北上臣有貴者以齒其登餕獻受爵則以上嗣庻子治之雖有三命不踰父兄其公大事則以其喪服之精麤為序雖於公族之喪亦如之以次主人若公與族燕則異姓為賔膳宰為主人公與父兄齒族食世降一等其在軍則守於公禰公若有出疆之政庻子以公族之無事者守於公宫五廟之孫祖廟未毁雖為庻人冠取妻必告死必赴練祥則告族之相為也宜弔不弔宜免不免有司罰之至于賵賻承含皆有正焉公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人公族無宫刑公與族燕則以齒而孝弟之道達矣其族食世降一等親親之殺而君臣之道著矣公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖遠之也素服居外不聼樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也大傳上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭穆别之以禮義人道竭矣同姓從宗合族屬異姓主名治際㑹繫之以姓而弗别綴之以食而弗殊雖百世而㛰姻不通者周道然也親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴坊記君子因睦以合族杕杜詩曰晉人刺其君不親九族左傳曰庻人工商各有分親皆有等衰文七年宋昭公欲去羣公子樂豫曰公族公室之枝葉也不可縱尋斧焉叔向曰公族將卑其宗族枝葉先落根本從而亡也華亥欲代其兄合比為右師譛之於平公而逐之左師曰汝夫也必亡汝喪而宗室於人何有人亦於汝何有既而華亥果亡書與詩序皆言九族特周禮小宗伯儀禮士昬禮記仲尼燕居特言三族者三族父子孫也九族高祖至𤣥孫也三族舉其本九族極其末舉三族則九族見矣白虎通夏侯歐陽何琦如淳之徒以父族四母族三妻族二為九族其説蓋以詩之葛藟刺平王不親九族而言謂他人父謂他人母頍弁刺幽王不親九族而言豈伊異人兄弟甥舅角弓亦刺不親九族而言兄弟㛰姻無胥逺矣則所謂九族者非特内宗而巳是惡知詩人之所主者因内宗而發哉彼謂父族四者父之姓為一族父女昆弟適人者子為二族巳女昆弟適人者子為三族巳女適人者子為四族母族三者母之父母為一族母之昆弟為二族母之女昆弟為三族妻族二者妻之父為一族妻之母為二族然於母之父母則合而為一族妻之父母則離而為二可乎爾雅於内宗皆曰族於母妻曰黨而巳又禮小功之末可以嫁娶妻之黨固無妨於嫁娶昏禮不容慮其不虞也然則九族之説當從孔安國鄭康成為正何則小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣此九族隆殺之差也蓋已上親父下親子三也以父親祖以子親孫五也以祖親曾高以孫親曾𤣥九也然己之所親以一為三祖孫所親以五為七記不言者以父子一體而高𤣥與曾同服故不辨異之也服父三年服祖朞則曾祖宜大功高祖宜小功而皆齊衰三月者不敢以大小功旁親之服加乎至尊故重其衰麻尊尊也减其日月恩殺也此所謂上殺服適子三年庻子朞適孫朞庻孫大功適孫傳重者也冇適子者無適孫則長子在皆為庻孫也則曾孫宜五月而與𤣥孫皆緦麻三月者曾孫服曽祖三月曽祖報之亦三月曽祖尊也故加齊衰曾孫卑也故服緦麻此所謂下殺服祖朞則世叔宜大功以其與父一體故加以朞從世叔則疏矣加所不及故服小功族世叔又疏矣故服緦麻此𤼵父而旁殺者也祖之兄弟小功曾祖兄弟緦麻高祖兄弟無服此發祖而旁殺者也同父至親朞同祖為從大功同曽祖為再從小功同高祖為三從緦麻此發兄弟而旁殺者也父為子朞兄弟之子宜九月不九月而朞者以其猶子而進之也從兄弟之子小功再從兄弟之子緦麻此𤼵子而旁殺者也祖為孫大功兄弟之孫小功從兄弟之孫緦麻此發孫而旁殺者也蓋服有加也有報也有降也祖之齊衰世叔從子之朞皆加也曽孫之三月與兄弟之孫五月皆報也若夫降有四品則非五服之正禮耳族燕之禮周禮大宗伯以飲食之禮親宗族兄弟禮記曰若公與族燕則異姓為賔膳宰為主人公與父兄齒族食世降一等又曰公族無宫刑公與族燕則以齒而孝弟之道達矣其族食世降一等親親之殺而君臣之道著矣大傳曰旁治昆弟合族以食序以昭穆别之以禮義人道竭矣常棣燕兄弟也詩曰儐爾籩豆飲酒之飫儐陳飫私也不脱履升堂謂之飫箋云私者圖非常之事若議大疑於堂則有飫禮焉兄弟既具和樂且孺妻子好合如鼓瑟琴王與族人燕則宗婦内宗之屬亦從后於房中兄弟既翕和樂且湛正義曰飫私釋言文孫炎曰飫非公朝私飫酒也周語有王公立飫又曰立成禮蒸而巳飫既為私不在公朝在路門内也酒肉所陳不宜在庭則在堂矣燕禮云皆脱屨乃升堂少儀云堂上無跣燕則冇之是燕由坐而脱屨明飲立則不脱矣故云不脱屨升堂謂之飫知飫禮為圖非常議大疑者以周語云王公之有飫禮將以講事成體建大徳昭大物講事昭物是有所謀矣明圖非常議大疑而為飫禮也周語曰王公立飫則有房蒸親親燕饗則有殽蒸又曰飫以顯物燕以合好則飫燕禮異序曰燕兄弟此陳飫者圖非常議大疑乃有飫禮則飫大於燕天子燕宗族之禮亡所以知王與族人燕則宗婦内宗從后者湛露曰厭厭夜飲不醉無歸傳曰夜飲私燕也宗子將有事族人皆侍不醉而出是不親也醉而不出是渫宗也箋云天子燕諸侯之禮亡此假宗子與族人燕為説耳然則天子燕同姓諸侯之禮猶宗子燕族人則天子燕宗族兄弟為朝廷臣者如宗子於族人可知案特牲饋食禮祭末乃曰徹庻羞設於西序下注云為將餕去之庻羞主為尸非神饌也尚書傳曰宗室有事族人皆侍終日大宗巳侍於賔奠然後燕私燕私者何也巳而與族人飲也此徹庻羞置西序下者為將以燕飲與然則自尸祝至於兄弟之庻羞宗子與族人燕飲於堂内賔宗婦之庻羞主婦以燕飲於房也鄭以彼特牲是宗子之祭禮族人及族婦皆助故經云宗婦執兩籩宗婦賛豆是宗婦及族人俱助宗子之祭及祭末族人既為宗子所燕明宗婦亦主宗婦之燕可知也湛露天子燕諸侯也詩曰湛湛露斯在彼豐草厭厭夜飲在宗載考夜飲之禮在宗室同姓諸侯則成之於庻姓其讓則止正義書傳曰既侍其宗然後得燕燕私者何而與族人飲飲而不醉是不親醉而不出是不敬與此傳同毛伏俱大儒當各有所據而言也燕禮曰宵則庻子執燭於阼階上甸人執大燭於庭閽人為燭於門外是兩階門庭皆有燭也楚茨詩曰諸宰君婦廢徹不遲諸父兄弟備言燕私箋云祭祀畢歸賔客之祖同姓則留與之燕所以尊賔客親骨肉也樂具入奏以綏後禄爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君壽考同姓之臣燕巳醉飽皆再拜稽首曰神乃欲嗜君之飲食使君壽且考此其慶辭先王之於同姓有時燕焉有因祭而燕焉國語曰時燕不淫此時燕也詩曰諸宰君婦廢徹不遲諸父兄弟備言燕私坊記曰因其酒肉聚其宗族以教民睦此因祭而燕也其禮之詳雖不可考要之服皮弁服即於路寢王皮弁以日視朝詩刺不能宴同姓而曰有頍者弁則皮弁也宰夫為主異姓為賔王與族人燕於堂后帥内宗之屬燕於房其物餚烝所以合好也其食世降一等所以辨親疏也昭穆以序之所以明世次也夜飲以成之所以别異姓也若夫几席之位升降之儀脱屨而坐立監相禮羞庻羞以盡愛爵樂無算以盡驩其大率蓋與諸侯燕禮不異諸侯燕族人與父兄齒雖王之尊蓋亦不以至尊廢至親也特牲饋食禮祝告利成徹庻羞設於西序下鄭氏引書傳曰宗室有事族人皆侍終日大宗巳侍於賔奠然後燕私燕私者何也巳與族人飲也此徹庻羞置西序下者為將以燕飲與然則自尸祝至於兄弟之庶羞宗子以與族人燕飲於堂内賔宗婦之庻羞主婦以燕飲于房由是觀之燕族之禮不特天子諸侯而巳族飫之禮周語定王謂晉隨㑹曰郊禘之事則有全烝王公立飫則有房烝禮之立成者為飫親戚燕饗則有餚烝餚烝升體節觧折之爼也謂之折爼今汝非他也而叔父使士季實來唯是先王之宴禮欲以貽女余一人敢設飫禘焉夫王公諸侯之有飫也將以講事成章章章程也建大徳昭大物也大徳大功也大物大器也故立成禮烝而已立成不坐也烝升也升其滿物而巳飫以顯物宴以合好顯物示物傋也故歲飫不倦時宴不淫敬王十年萇𢎞欲城周衛彪徯見單穆公曰萇𢎞其不没乎周詩有之曰天之所支不可壞也周詩飫時所歌也支枉也其所壞亦不可支也昔武王克殷而作詩作此以為飫歌名之曰支以遺後之人使永監焉夫禮之立成者為飫昭明大節而巳少典與焉其詩樂少章典威儀少皆類也是以為之日惕其欲教民戒也然則夫支之所道者必盡知天地之為也不然不足以遺後之人今萇劉欲支天之所壞不亦難乎魯語公父文伯之母祭悼子康子與焉胙不受徹俎不宴宗不具不繹繹不盡飫則退昭謂立曰飫坐曰宴言宗具則與繹繹畢而飲不盡飫禮而退恐有醉飽之失皆所以遠嫌也公父文伯之母欲室文伯饗其宗老請守龜卜室之族師亥聞之曰善哉男女之饗不及宗臣宗室之謀不過宗人古者合族之禮方其平居無事則有燕以申好及其有大疑謀則有飫以圖事燕則脱屨升堂坐而不立其牲體折節而殽烝所以致愛飫不脱屨升堂立而不坐其牲體半解而房烝所以致嚴周語曰王公之有飫禮將以講事成章建大徳昭大物故立成禮烝而巳又曰歲飫不倦然則飫以圖事非必歲為之也國語言歲飫時燕蓋明其䟽數之異而巳衛彪徯曰武王克商作詩以為飫歌名之曰支以遺後之人使永監焉以其戒慎尤在於厭飫之時也公父文伯之母祭悼子康子與焉繹不盡飫而退則飫非若燕禮之多儀也禮書卷六十三
