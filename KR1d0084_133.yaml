body:
  text: 禮書卷一百三十四宋陳祥道撰青旌鄭氏曰青青雀水鳥鳶鳴則將風鴻取飛有行列也虎取其有威勇也貔貅亦摯獸也鳴鳶飛鴻虎皮貔貅挈壺挈轡挈畚附禮記曰前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅考之周禮挈壺氏掌挈壺以令軍井挈轡以令舎挈畚以令糧春秋傳曰前茅慮無兵法行則持五旍溝坑揭黄衢路揭白水潤揭黒林木揭青野火揭赤此水載青旌塵載鳴鳶車騎載飛鴻士載虎皮摯載貔貅之意也葢青雀習水者也鳶知風者也飛鴻則有列虎皮則有威貔貅則有猛皆各象其所見然也先儒謂青雀鳴鳶飛鴻皆畫於旌而載之虎皮貔貅或舉其皮或畫其狀葢禮無眀説故兩存之書曰如熊如羆如虎如貔詩曰獻其貔皮爾雅曰貔白狐其子豰大卜字林曰貔豹屬郭璞曰一名執夷虎豹之屬陸機疏曰貔似虎或曰似熊遼東人謂之白熊則白熊白狐執夷皆貔之異名徽織鄭氏曰徽織旌旗之細綴於膊上今城門僕射所被及亭長著絳衣皆其舊象周官司常國之大閲賛司馬頒旗物王建太常諸侯建旂孤卿建旜大夫建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌皆畫其象焉官府各象其事州里各象其名家各象其號大司馬中夏教茇舎辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事司馬中秋教治兵辨旗物之用王載太常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉事名號者徽織所以題别衆臣樹之於位朝各就焉徽織之書則云某某之事某某之名某某之號今大閲禮象而為之兵凶事若有死事者亦當以相别也詩曰織文鳥章白斾央央織徽織也鳥章鳥隼之文章将帥以下衣皆著焉記曰殊徽號左傳曰揚徽者公徒也昭二十一年九旗之物既畫號名事之象而又書以述之畫之則略書之則詳司常於大閲頒旗物則言畫大司馬於治兵辨旗物之用則言書者頒旗物建以閲之而已辨旗物則載而用焉此治兵大閲之别也兵法夜戰多火鼓晝戰多旌旗是晝之相視者以象夜之相聞者以聲故旗物有龍虎鳥龜之文所以待晝事有號名事所以待夜事也詩曰元戎十乗以先啟行織文鳥章白斾央央鄭氏以周禮之號名詩之織文鳥章皆為徽織謂徽織旌旗之細若銘旌然在朝則植之於位在軍則衣之於身然覲禮諸侯各就其斾而立司常凡祭祀各建其旗㑹同賓客亦如之則朝覲所建無旌旗之細者也傳曰揚徽者公徒也説文卒從衣士卒之衣固有旌旗之細者為之題識然非九旗之號名事也司常辨九旗之名物各有屬此建旗者之屬非衣徽也鄭氏以九旗之號名事與九旗之名物各有屬皆為衣徽其説誤矣昔晉攻狄叔虎被羽先登克之國語漢光武擊青犢賈復亦被羽先登敗之然則後世之被羽蓋古衣徽之遺制爾韋昭以被羽為繫飛鳥於背若今負眊是也章懐太子以被羽為執旌旗誤矣招大夫士以旌旂之禮孟子曰招虞人以皮冠大夫以旌士以旂庶人以旃蓋田獵用皮冠斿車載旌諸侯建旂孤卿建旃虞人掌田獵之事者也故招以皮冠大夫従游燕之樂者也故招以旌士君之所禮者也故招以旂庶人孤卿之所治者也故招以旃春秋之時齊侯田于沛眧二十五年招虞人以弓不進辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人其言與孟子不同者王制曰上大夫卿則孤卿上大夫也弓聘士之物也詩曰翹翹車乗招我以弓則招大夫以旃士以弓以其所當用者招之而已非必先王之禮然也禮書卷一百三十四
