body:
  text: 禮書卷一百四十九宋陳祥道撰喪禮括髮問喪曰親始死雞斯徒跣扱上衽檀弓曰始死羔裘𤣥冠者易之而已則始死有易冠無去冠者有易裘無袒衣矣儀禮小斂之節主人髻髮袒婦人髽于室問喪曰三日而斂袒而踊之檀弓曰主人既小斂袒括髮又曰袒括髮變也袒括髮去飾之甚也又曰叔孫武叔之母死既小斂舉者出戶出戶袒且投其冠子游曰知禮喪大記曰小斂主人袒說髦括髮以麻則小斂投冠脫髡髻髮而袒矣蓋人子之於始喪其幸生之心未巳故未忍去飾焉及小斂則已矣然後髻髮而袒叔孫武叔既小斂舉者出戶袒而投其冠子游嗤之則投冠髻髮宜在未舉出戶之前歟曽子問曰女改服布深衣以趨喪鄭氏曰婦人始喪未成服之服然則男子始喪蓋亦曰白布深衣也雞斯之喪不可以考鄭氏改雞斯為笄纚謂始死將斬衰者笄纚將齊衰者素冠婦人將斬衰者去笄而纚將齊衰者骨笄而纚孔穎達之徒遂謂始死去冠而有笄縱將小斂則去笄縱著素冠視斂其說無據喪服小記曰斬衰括髮以麻為母括髮以麻免而以布則小斂奉尸出堂主人拜賓之時為母括髮以麻與父同也尸出堂訖降自西階即位復位之時為母不括髮而免以與父異也儀禮男女奉尸俟于堂訖主降自西階東即位主人拜賓即位踊襲絰于序東復位也奔喪禮至家升階殯東西面坐哭括髮袒降堂東即位襲絰絞帶反位皆如初於又哭括髮袒成踊三哭亦括髮袒成踊又哭明日朝也三哭又其明日朝也奔母之喪西面哭括髮袒降堂東即位襲免於又哭不括髮奔喪不及殯先之墓括髮遂冠歸入門哭括髮袒於又哭三哭皆括髮袒為母所以異於父者一括髮其餘免以終事其義皆與小記同也喪大記曰君大夫之喪子辨絰雜記曰小斂環絰君大夫士一也則大夫以上素辨士素委貌皆加環絰也孔穎達曰斬衰男子括髮齊衰男子免皆斂殯之時耳非斂殯則大夫以上加素辨士加素冠皆於括髮之上天子七日成服諸侯五日成服大夫三日成服於理或然免問喪曰冠者不肉袒何也曰冠至尊也不居肉袒之體也故為之免以代之也又曰免者以何為也不冠者之所服也儀禮小斂主人括髮袒衆主人免于房喪服小記曰為母括髮以麻免而以布又曰男子免而婦人髽大記曰小斂主人即位襲帶絰踊母之喪即位而免奔喪曰奔母喪一括髮其餘以免終事小記又曰緦小功虞卒哭則免既葬而不報虞則雖主人皆冠及虞則皆免為兄弟既除喪已及其葬也反服其服報虞卒哭則免如不報虞則除之逺葬者反哭者皆冠及郊而后免反哭君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免又曰主人未除喪有兄弟自它國至則主人不免而為主問喪曰秃者不免童子惟當室緦緦者其免也當室則免而杖矣儀禮曰朋友在它邦則袒免歸則已大傳曰四世而緦服之窮也五世袒免殺同姓也文王世子曰族之相為也宜弔不弔宜免不免有司罰之鄭氏曰免狀如冠而廣一寸蓋有所傳然也然則免於括髮為輕故為父括髮為母免於冠飾為重故緦小功之虞卒哭逺葬者之及郊反哭主人之於君弔必免然則袒免非喪服之常有時用之而已齊衰而下小斂皆袒免是有常服者必袒免止於袒免者無常服故施於五世焉秃者不免於疾也童子不免未可加以成人之服也髽喪服女子子在室為父布總箭笄髽衰三年女子子適人者為其父母婦為舅姑惡笄有首以髽士喪禮小斂婦人髽于室既夕禮曰丈夫髽散帶垂即位鄭氏曰此互文以見喪小記曰男子冠而婦人笄男子免而婦人髽奔喪曰婦人奔喪東髽檀弓曰南宫縚之妻之姑之喪夫子誨之髽曰爾無總總爾爾無扈扈爾又曰婦人髽而弔自敗於臺鮐始也鄭氏釋喪大記曰去纚大紒曰髽釋喪服曰髽露紒也猶男子之括髮斬衰括髮以麻則髽亦用麻以麻者自項而前交於額上郤繞紒如著慘頭焉蓋其所傳然也其狀則母從從爾不至於縱而高也無扈扈爾不至於卑而大也爾雅曰卑而大扈則從從為縱而高可知也小斂主人括髮袒衆主人免于房婦人髽于室奔喪男子東括髮婦人東髽又小記曰男子免而婦人髽則婦人之髽猶男子之括髮免也故括髮以麻則髽以麻矣免而以布則髽以布矣髽以麻則斬衰也髽以布則齊衰也小斂齊之髽不言笄則未成服之髽無笄矣女子子適人者為其父母婦為舅姑惡笄有首以髽孔子言髽而繼之以榛笄則成服之髽有笄矣又儀禮言髽衰三年小記言齊衰惡笄以終喪則斬衰齊衰之髽皆終喪矣孔穎達曰常服之髽不用麻布然則啓殯之髽雖在成服之後蓋亦無笄以對男子之袒而免故也男子之袒免及於五世婦人之髽不及於大功者以髽不特對免而又上同於括髮故也秃者不髽以疾也弔者不髽以疏也皇氏以麻髽布髽露紒為三髽然則髽雖麻與布之不同其為露紒一也笄儀禮女子子在室為父箭笄髽衰三年傳曰箭笄長尺吉笄尺二寸女子子適人者為其父母婦為舅姑惡笄有首以髽卒哭子折笄首以笄布總傳曰笄有首者惡笄之有首也惡笄者櫛笄也折笄首者折吉笄之首也吉笄者象笄也何以言子折笄首而不言婦終之也妾為女君君之長子惡笄有首齊衰惡笄以終喪男子冠婦人笄檀弓曰南宫縚之妻之姑之喪夫子誨之髽蓋榛以為笄然則喪笄有三箭笄也櫛笄也折首笄也箭笄櫛笄長尺折首笄長尺二寸箭笄為重櫛笄次之折首笄為輕斬衰笄以箭齊衰笄以櫛女子子在室為父箭筓則斬衰之笄以箭矣女子子適人者為其父母婦人為舅姑惡笄而女子子在室亦如之則齊衰以櫛矣箭笄惡不足以言之櫛笄言惡以其木之無文故也古者櫛以樿樿白理而無文則櫛笄用樿無樿則榛可矣故檀弓曰蓋榛以為笄也儀禮曰卒哭子折笄首折笄首者折吉笄之首也言子不言婦終之也蓋惡笄有首吉笄折首吉笄則父而不子折其首别子而不婦以其不可全於子故吉笄以其不可全於婦故折其首儀禮曰女子子在室為父箭笄三年小記曰齊衰惡笄以終喪則惡笄不終喪而吉笄折其首者特子之適人者而已鄭氏曰笄有首者若今時刻鏤摘頭矣觀古無字則笄之形制可知竹杖削杖記曰斬衰貌若苴齊貌若枲喪服有苴絰有牡麻絰傳曰苴絰麻之有蕡者也牡麻者枲麻也爾雅曰蕡枲實也孫氏曰蕡麻子也蓋枲之有蕡者其色苴惡故謂之苴無實者其色反是故謂之牡麻苴絰苴帶以苴麻名之也苴衰苴杖因絰帶名之也杖之制下本其大如經其長齊心苴杖竹也削杖桐也為父竹杖為母桐杖蓋竹之為物堅貞而不變桐之為物柔脆而易雕為父斬為母齊斬者常伸而三年齊者或屈以期月此竹杖桐杖所以不同也杖雖主於父母凡斬衰皆杖為妻期亦杖為長子亦杖期服必杖而有所不杖童子婦人不杖有所必杖孔穎達曰婦人不杖謂童女也其授也有官周禮肆師之類其授之也有日其執之輯之去之使人執之也有時其棄之也有所虞杖不入室祔杖不升堂練則筮日筮尸視濯要絰杖而已蓋杖所以輔病者也喪久而平則杖不用矣鄭氏曰大祥除衰杖禮書卷一百四十九
