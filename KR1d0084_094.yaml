body:
  text: 禮書卷九十五宋陳祥道撰雞彛鳥彛斚彛黃彛虎彛蜼彜犧尊象尊壺尊著尊大尊山尊周禮酒正凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數惟齊酒不二酌器所用注尊中者數量之多少未聞鄭司農云齊酒不二為尊者質不敢副益也幂人掌共巾幂祭祀以疏布巾幂八尊以疏布者天地之神尚質以畫布巾幂六彛宗廟可以文畫者畫其文氣小宗伯辨六彛之名物以待裸將辨六尊之名物以待祭祀賔客鬱人掌裸器裸器謂彛及舟與瓉凡祭祀賔客之裸事和鬱鬯以實彛而陳之及葬共其裸器遂貍之遣奠之彛與瓉也司尊彛掌六尊六彛之位詔其酌辨其用與其實春祠夏禴裸用雞彛鳥彛皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬蒸裸用斚彛黃彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享裸用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也雞彜鳥彛謂刻而畫之為雞鳯凰之形皆有舟皆有罍鄭司農云舟尊下臺若今時承槃象尊或曰以象骨飾尊明堂位曰犧象周尊也春秋傳曰犧象不出門尊以裸神罍臣之所飲也詩曰瓶之罄矣維罍之恥斚讀為稼稼彛畫禾稼也黃彛黃目尊也明堂位曰夏后氏以雞彛商以斚周以黃目爾雅曰彛卣罍器也著尊著地無足明堂位曰著商尊也壺者以壺為尊春秋傳曰尊以魯壺大尊太古之瓦尊山尊山罍也明堂位曰泰有虞氏之尊也山罍夏后氏之尊也𤣥謂黃目以黃金為目郊特牲曰黃目鬱氣之上尊黃者中也目者氣之清明也言酌於中而清明於外蜼禺屬卭鼻而長尾山罍亦刻而畫之為山雲之形凡六彛六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌大喪存奠彛司約凡太約劑書於宗彛書於宗廟之六彛禮記禮運夫禮之初汙尊而杯飲汙尊鑿地為尊杯飲手掬之也禮器犧尊疏布冪樿杓此以素為貴也又曰五獻之尊門外缶門內壺君尊瓦甒此以小為貴也又曰君西酌犧象夫人東酌罍尊郊特牲黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌於中而清明於外也明堂位季夏六月以禘禮祀周公於太廟尊用犧象山罍鬱尊用黃目泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也灌尊夏后氏以雞彛殷以斚周以黃目祭統勤大命施于蒸彛鼎玉藻凡尊必上𤣥酒惟君靣尊夫人側尊用棜士側尊用禁詩曰犧尊將將書曰宗彛藻火又曰班宗彛作分器左傳藉談曰有勳而不廢撫之以彛器昭十五年左臧武仲曰大伐小取其所得以作彛器襄十八年爾雅彛卣罍器也小罍謂之坎又曰卣中尊也詩正義曰犧尊之字春官司尊彛作獻尊鄭司農云獻讀為犧犧尊飾以翡翠象尊以象鳯凰或曰以象骨飾尊此傳曰犧尊者沙羽飾與司農飾以翡翠意同則皆讀為娑傳言沙即娑之字也阮諶禮圖云犧尊飾以牛象尊飾以象於尊腹之上畫為牛象之形王肅云將將盛之美也太和中魯郡於地中得齊大夫子尾送女器有犧尊以犧牛為尊然則象尊尊為象形也王肅此言以二尊形如牛象而背上負尊皆讀犧為犧與毛鄭義異未知孰是先儒謂祫祭備五齊禘祭備四齊時祭備二齊尊之為言尊也彛之為言常也尊用以獻上及於天地彛用以裸施於宗廟而已故尊於祭器獨名尊彛於常器均名彛籍談曰有勳而不廢撫之以彛器昭十五年左臧武仲曰大伐小取其所得以作彛器襄十九年左則彛之為常可知矣司尊彛春祠夏禴裸用雞彛鳥彛其朝踐用兩獻尊其再獻用兩象尊秋嘗冬蒸裸用斚彛黃彛其朝獻用兩著尊其饋獻用兩壺尊追享朝享祼用虎彛蜼彛其朝踐用兩大尊其再獻用兩山尊明堂位曰泰有虞氏之尊也山罍夏后氏之尊也著商尊也犧象周尊也灌尊夏后氏以雞彛商以斚周以黃目蓋虞氏尚陶故泰尊瓦則山罍亦瓦矣商人尚梓故著尊木則犧象亦木矣書稱宗彞絺繡而宗彞在周為毳衣則虎彛蜼彛有虞以前之彛也說文稱壺昆吾尊昆吾祝融之後則壺尊商以前之尊也春秋傳曰燕人以斚耳賂齊則斚固有耳矣記曰黃目鬱氣之上尊黃者中也目者清明之氣也則黃其色也目其象也蓋先王制器或逺取諸物或近取諸身其取之也有義其用之也以類雞鳥虎蜼之彛取諸物也斚耳黃目取諸身也春祠夏禴彛以雞鳥尊以犧象以雞鳥均羽物犧象均大物故也秋嘗冬蒸彛以耳目尊以著壺以耳目均人體著壺均無足故也追享朝享彛以虎蜼尊以山大以虎蜼均毛物山大均瓦器故也夫雞東方之物仁也而牛大牲也膏薌宜於春鳥南方之物禮也而象大獸也産於南越此王者所以用祠禴也周彛黃則商彛白矣白者陰之質義也黃者陰之美信也著以象陽降而著地壺以象陰周而藏物此先王所以用嘗蒸也太𤣥曰陽氣潛萌於黃宫信無不在乎中則冬之為信可知矣虎義獸也蜼智獸也自禰率而上之至于祖因合食焉義也及於祖之所自出義之至也審其昭穆尊卑不使紊焉智也皆升而合食乎其所出智之至也泰則象道之見於事業山則象道之顯於仁夫道之見於事業而顯諸仁則可以王天下可以王天下則可以禘祫矣此先王所以用追享朝享然雞鳥虎蜼黃目犧象山罍之飾或刻或畫不可得而知也詩與禮記左傳國語皆言犧詩曰犧尊將將記曰君西酌犧象犧尊疏在冪左傳曰犧象不出門國語曰犧人薦醴特司尊彛言獻尊則犧者尊之飾獻者尊之鳥也先儒讀犧為娑讀斚為稼或云犧飾以翡翠象飾以象骨或曰犧飾以鳯凰斚飾以禾稼皆臆論也王肅謂昔魯郡於地中得大夫子尾送女器有犧尊以犧牛為尊則象尊尊為象形耳此又不可考也尊之為物其上有蓋其面有鼻其下有足少牢司宫啓二尊之蓋冪奠于棜上特祀禮覆兩焉蓋在南玉藻曰惟君西尊少儀曰尊壺者靣其鼻此尊之形制也其無足者著與壺耳觀投壺之壺有頸與腹而無足則壺尊無足可知矣先儒謂壺有足誤也大射尊于東楹之西兩方壺膳尊甒在南皆𤣥尊酒在北少牢尊兩甒于房戶之間甒有𤣥酒特牲尊于戶東𤣥酒在西記亦曰凡尊必上𤣥酒則兩尊之設一以盛𤣥酒一以盛齊矣春則雞彛盛明水鳥彛盛鬱鬯夏則鳥彛盛明水雞彛盛鬱鬯而斚黃虎蜼之相為用亦若此也此先儒謂雞彛虎彛專盛明水鳥黃蜼彛專盛鬱鬯恐不然也尊彛之量先儒謂尊實五斗彛實三斗此雖無所經見然彛祼而已其實少尊則獻酬酢焉其實多此尊所以大於彛歟蒸彛尊亦謂之彛彛亦謂之尊故黃目彛也禮器曰鬱氣之上尊雞斚皆彛也明堂位曰灌尊然彛之為器不特飾以雞鳥黃目虎蜼之象而已凡邦國之約劑書於此司約大約劑書於宗彛是也凡臣之有功銘於此祭統勤大命施于蒸彛鼎是也蓋臣之有功祭於大蒸故勤大命者施于蒸彛鼎則三時之彛不預也禮書卷九十五
