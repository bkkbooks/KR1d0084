body:
  text: 禮書卷一百十二宋陳祥道撰弓臂弣蔽簫隈淵茭附説文曰弓象形史記曰揮作弓弓以木為身以角為靣筋所以為深絲所以為固張則筋外而角内弛則角外而筋内弣把中也簫弓端也隈其曲也茭其接也弣或作拊又曰質旁曰撻中曰蔽簫或作弰又曰弭曰彆方結反曰峻弓人曰挺臂中有柎焉故剽又曰凡為弓方其峻而髙其柎長其隈而薄其蔽又曰茭解中有變焉故校廣雅曰柎柄也鄭康成曰茭讀為骹茭解謂接中也賈公彦曰隈簫角接處也説文曰彆弓戾也詩曰象弭魚服爾雅曰弓無縁者謂之弭左傳曰左執鞭弭葢無縁之弓以骨飾其弭而已故亦謂之弭杜子春曰隈弓之淵鄭司農曰蔽謂弓人所握持者毛氏曰弭所以解紛曲禮曰凡遺人弓者張公尚筋弛弓尚角右手執簫左手承弣則右手執簫矣簫之飾不特以骨而已爾雅曰以金者謂之銑以蜃者謂之珧以玉者謂之珪爾雅曰蜃小者珧郭璞曰珧小蚌也弓韔明堂位曰載弧韣月令曰𤣥鳥至乃禮天子所御帶以弓韣既夕禮弓有韣詩曰虎韔鏤膺交韔二弓又曰抑鬯弓忌又曰彤弓弨兮受言櫜之又曰載櫜弓矢説文曰弢弓衣也左傳曰右屬櫜鞬杜氏曰櫜以受矢鞬以受弓韔弢韣櫜鞬皆弓衣也亦曰弓室鄭氏釋既夕禮謂之緇布為之覲禮言包干戈以虎皮詩言虎韔而韔韣皆從韋則古之弓衣以皮為之也明器之弓以緇布葢鄭氏以漢禮言之耳内則曰歛簟而襡之樂記曰包干戈以虎皮名曰建櫜則韣櫜之名不獨施於弓也詩言虎韔鏤膺交韔二弓又言二矛重弓重弓則一韔之内皆二弓以備毁折弓檠荀子曰接人用枻韓氏云枻者檠枻正弓弩之器揚子曰見弓之張兮弛而不失其良兮亦檠之而已矣蘇氏傳曰檠弓弩説文曰檠榜也亦作則枻榜皆檠之異名考工記弓人為弓寒奠體氷析灂寒奠體則不流冰析灂則審環葢奠體者納之檠而已析灂者下於檠而復納之也弓柲既夕明器弓有柲詩曰竹閉緄縢考工記曰恒角而達譬如終紲葢柲以竹為之狀如弓然約於弓裏命之曰柲所以備損傷也緄繩也縢約之也柲以閉之故亦謂之閉緄以繫之故亦謂之紲如此則納之韣中足以定往來之體袪翩反之病矣柲亦作䪐依撻既夕禮曰弓設依撻鄭氏曰依纒弦也撻弣側矢道也皆以韋為之賈公彦曰依今弓􅲌也撻所以撻矢令出也生者以骨死者以韋禮書卷一百十二
