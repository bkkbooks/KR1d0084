body:
  text: 禮書卷一百六宋陳祥道撰畿內諸侯熊侯中與上下躬上下個與天子熊侯之制同豹侯上中下躬上下個與天子豹侯之制同司裘諸侯大射共熊侯豹侯鄭康成曰諸侯謂三公及王子弟封於畿內者熊侯諸侯所自射豹侯羣臣所射是也侯步之制蓋與天子熊侯豹侯同與畿外之熊侯參侯異逺近屈伸之勢然也射人諸侯二侯四耦亦畿內諸侯耳畿內卿大夫麋侯中與上下躬上下個同豹侯司裘卿大夫射共麋侯侯道五十弓侯中十尺鵠三尺三寸有竒天子諸侯之射與臣異侯尊君也大夫之射與臣同侯避君也士事人非事與人者也故有僚友而無臣故無大射擇士之禮畿外諸侯大侯中亦廣崇丈八尺上下躬個亦與天子大侯同參侯中躬個廣修與麋侯同干侯中躬個廣修與參侯同詩曰大侯既抗天子之侯也大射禮大侯九十諸侯之侯也天子大侯九十步而諸侯大侯亦如之參侯以眂天子熊侯干侯以眂天子豹侯則步中躬舌之制可知大侯之崇見鵠於參參見鵠於干干不及地武鄭氏曰中人之足長尺二寸以犴侯計之參侯去地一丈五寸少半寸大侯去地二丈二尺少半寸是也何則干侯中十尺上下躬舌名二尺為八尺則丈八尺矣又下不及地尺二寸則犴侯上綱去地丈九尺二寸矣參侯中丈四尺上下躬舌八尺則二丈二尺矣鵠居侯中三分之一則參鵠之下與犴侯上綱埓此所謂見鵠於犴也大侯中丈八尺上下躬舌八尺則二丈六尺矣鵠居侯中三分之一則大鵠之下與參侯上綱埓此所謂見侯於參也諸侯如此則天子虎侯見鵠於熊熊侯見鵠於豹豹不及地武又可知也天子虎侯五正熊侯五正豹侯三正梓人曰張五采之侯則逺國屬五采之侯即五正之侯也然則射人王以六耦射三侯五正以至士以三侯射一侯二正皆賔射也鄭氏曰五正之侯中朱次白次蒼次黃而𤣥居其外三正損𤣥黃正二去白蒼而畫以朱緑賈公彥謂中朱以下皆以相尅為次南為首故先朱考之聘禮記繅藉三采朱白蒼二采朱緑則三正去𤣥黃二正朱緑理或然也司裘諸侯大射二侯射人諸侯賔射亦二侯畿內諸侯也若畿外則三侯矣二侯四耦則三侯六耦矣儀禮大射畿外諸侯之制也三耦射畢然後公射又三耦射畢然後公再射乃獲飲觶則三侯亦六耦也獻服不獻釋獲者之後又命五耦然不作射不作取矢以其非正禮故也昔晉范獻子聘於魯魯侯享之射者三耦公臣不足取於家臣蓋方是時公室卑矣不能如禮諸侯熊侯五正豹侯三正鄉射記君國中射則皮樹中於郊則閭中於境則虎中先儒謂國中燕射也境賔射也然諸侯賔射不特於境而已其在國中亦皮樹中魯襄公享晉范獻子射者三耦此諸侯賔射歟大夫麋侯二正士犴侯二正士有賔射而不預王之賔射故射人無士之摰位士無大射而與王之大射故司裘豹侯士射焉鄉射記言鄉侯之逺近廣狹而不言其侯鄭康成謂鄉射當張麋侯二正禮書卷一百六
