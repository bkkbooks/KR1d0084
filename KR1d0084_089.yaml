body:
  text: 禮書卷九十宋陳祥道撰旅祭掌次王大旅上帝則張氊案設皇邸大旅上帝祭天於圜丘國有大故而祭亦曰旅此以旅見儀也大宗伯國有大故則旅上帝及四望故謂凶烖旅陳也陳其祭祀以祀焉禮不如祀之傋上帝五帝也司尊彛大喪存奠彛大旅亦如之旅者國有大故之祭也亦存其奠𦵏則陳之不即徹典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望大祭祀大旅凡賔客之事共其王器而奉之眡瞭大喪廞樂器大旅亦如之旅非常祭乃興造其樂器笙師大喪廞其樂器大旅則陳之龜人若有祭事則奉龜以徃旅亦如之職金旅于上帝則共其金版禮器一獻之禮不足以大旅大旅具矣不足以饗帝書荆岐既旅蔡蒙旅平九山刋旅論語曰旅於泰山爾雅曰旅陳也旅非常祭也國有大故然後旅其羣神而祭之則荆岐既旅蔡蒙旅平九山刋旅者以水災耳權此則凡所遭大故皆凶災之類也考之於禮天子所次之位則張氊案設皇邸所奠之圭則四圭有邸所用之版則金版職金旅上帝則用金版旅諸侯亦如之至於司奠彛之存奠彛笙師之陳樂器眡瞭之廞樂器皆如大喪之禮言奠則非純乎祭也言存則非即徹之也陳樂而不懸廞樂而不鼓則旅非以其凶災耶周官或言大旅或言旅葢故有大小而旅亦隨異也然大旅之禮不若祀天之為至也故記曰大旅具矣不足以饗帝若夫旅四望山川則所次不以氊案皇邸所用不以金版而所奠之圭則兩圭有邸而已先儒以旅之廞樂器為明器以皇邸為後版恐不然也其言旅上帝於圜丘其義或然類祭書曰類于上帝詩曰是類是禡周禮小宗伯兆五帝於四郊四望四類亦如之四類日月星辰運行無常以氣類為之兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊凡天地之大烖類社稷宗廟則為位禱祈禮輕類者依其正禮而為之肆師類造上帝則為位大祝六祈一曰類二曰造類上帝大㑹同造于廟詛祝掌類造之祝號禮記曰天子將出類于上帝造于廟則類者類其神而造之也造者即而祭之也類之所施或於上帝或於日月星辰或於社稷或於宗廟類之所因或以巡狩或以大師或以大烖造則或於上帝或於祖廟凡此皆有所祈也不若大旅之有所告而已故大祝六祈有類告而無旅焉鄭康成以宗伯之四類為日月星辰葢以四類在四郊四望之下而知之也爾雅以詩之是類是禡為師祭葢以大祝大師類上帝而知之也社稷宗廟非大烖則無類祭上帝非巡狩之所至則無造祭書言至於岱宗柴詩言巡狩告祭柴望此葢造上帝之禮也巡狩於其將出則類上帝於其所至則造上帝大師於其將出亦類上帝於其所至特禡於所征之地而已昔武王伐紂既事而退柴於上帝成王營洛位成之後用牲于郊牛二此葢類禮也何則書於舜之既受命則類乎上帝於湯之既受命則告于上天是既事則必祭而祭必以類禮也於舜之既受命言類則湯之既受命而類可知既受命而類則師之既事邑之既成又可知也類造之禮其詳不可得而知要之劣於正祭與旅也觀祀天旅上帝而大宗伯掌之類造上帝小宗伯肆師掌之則禮之隆殺著矣四類日月星辰於四郊則類上帝葢南郊乎雩祀周禮舞師掌教皇舞帥而舞旱暵之事旱暵之事謂雩也暵熱氣也鄭司農曰皇舞蒙羽舞𤣥謂皇析五采羽為之亦如帗司巫掌羣巫之政令若國大旱則帥而舞雩雩旱祭也天子於上帝諸侯於上公之神鄭司農云魯僖公欲焚巫尫以其舞雩而不得雨女巫旱暵則舞雩使女巫舞旱祭崇隂也鄭司農云求雨以女巫故檀弓曰嵗旱穆公召縣子而問焉曰吾欲暴巫而奚若曰天則不雨而望之愚婦人無乃已疏乎凡邦之大烖歌哭而請有歌者有哭者以異悲哀感神靈也大司徒以荒政十有二聚萬民十有一曰索鬼神雲漢之詩所謂靡神不舉靡愛斯牲也黨正春秋祭禜禜謂雩禜水旱之神蓋亦為壇位如祭社稷云稻人旱暵共其雩歛稻急水者也大祝國有大故天烖彌祀社稷禱祠大故兵冦也天災疫癘水旱也小祝掌小祭祀逆時雨寧風旱禮記檀弓嵗旱穆公召縣子而問焉天久不雨吾欲暴尫而奚若曰天則不雨而暴人之疾子虐毋乃不可與然則吾欲暴巫而奚若曰天則不雨望之愚婦人於以求之毋乃己疏乎徙市則奚若曰為之徙市不亦可乎徙市者庶人之喪禮今徙市是憂戚於旱若喪月令仲夏命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鍾磬柷敔為將大雩帝習樂也命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟以求雨之祭也雩帝謂為壇南郊之旁雩五精之帝配以先帝也自鞀鞞至柷敔皆作故曰盛樂凡他雩用歌舞而已百辟卿士古者上公若勾龍后稷之類也春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦修雩禮以求雨因著正雩此月失之矣天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩正義曰雩音近吁又女巫凡邦之大灾歌哭而請旱又是大烖故須吁嗟求雨注春秋者以雩為逺非鄭義也云雩帝謂為壇南郊之旁雩五精之帝者以雩是祭天當以陽位以五天總祭不可徧在四方故知在南郊也以自外主者無主不止當以人帝配之大皥配靈威仰炎帝配赤熛怒黄帝配含樞紐少皥配白招拒顓帝配叶光紀故云配以先帝也祭法雩禜祭水旱也詩噫嘻春夏祈榖于上帝祈猶禱也月令孟春祈榖于上帝夏則龍見而雩桓五年左傳文郊特牲郊之祭也大報天而主日書傳云祀上帝於南郊所以報天徳然則郊所以報天而云祈穀者以人非神之徳不生為郊祀以報其已徃又祈其将來故祈報兩言也襄七年左傳曰郊祀后稷以祝農事故啟蟄而郊郊而後耕是郊為祈報之事也案禮記大傳注云王者之先祖皆感大微五帝之精以生蒼則靈威仰皆用正嵗之正月郊祭之然則夏正郊天祭所感一帝而已月令注云雩祀五精之帝則雩祭五帝矣郊雩所祭其神不同此序并云祈榖于上帝者以其所郊之帝亦五帝之一同有五帝之名故一名上帝可以兼之也月令孟春祈穀于上帝注云上帝大微五帝者亦謂祈榖所祭是大微之一不言祈榖總言五帝論語曰浴乎沂風乎舞雩詠而歸荀子曰雩而雨何也曰無何也猶不雩而雨也日月食而救之天旱而雩小筮而後决大事非以為得求也以文之也故君子以為文而百姓以為神以為文則急以為神則凶又曰湯旱而禱曰政不節與使民疾與何以不雨至斯極也宫室崇與婦謁盛與何以不雨至斯極也苞苴行與讒夫興與何以不雨至斯極也桓五年秋大雩僖十一年秋大雩十三年秋九月大雩成三年秋大雩七年冬大雩襄五年秋大雩八年九月大雩十六年秋大雩十七年九月大雩二十八年秋八月大雩昭三年八月大雩六年秋九月大雩八年九月大雩十六年秋八月大雩二十五年七月上辛大雩季辛又雩定元年九月大雩七年秋大雩十二年秋大雩九月大雩桓五年左傳曰凡啟蟄而郊龍見而雩龍見建已之月過則書莊十年傳曰魯公子偃伐宋師出自雩門魯城南門公羊曰大雩者何旱祭也雩旱請雨祭名不解大者言大雩大旱可知也君親之南郊以六事謝過自責然則何以不言旱言雩則旱見言旱則雩不見何以書記災也趙子曰凡祈澤曰雩稱大國徧雩也勤民之祀也故志之爾雅曰雩號祭也爾雅曰雩號祭也鄭氏曰雩吁嗟求雨之祭也女巫凡邦之大烖歌哭而請則爾雅鄭氏之説是也杜預以雩為逺誤矣春秋書雩二十有一皆在七月以後左氏曰龍見而雩過則書葢龍見建巳之月而建巳乃陽亢之時陰氣所以難達也故雩祀作焉過此而後雩此春秋所以譏也大雩禮之盛也猶所謂大旅大饗趙氏謂雩稱大國徧雩誤矣詩序曰夏祈穀於上帝月令曰大雩帝則雩祀昊天上帝及五帝也鄭氏謂雩祀五精之帝然周禮稱上帝與五帝不同則上帝非止五帝也月令曰命百縣雩祀百辟卿士則百辟卿士之祭亦曰雩也鄭氏曰天子雩上帝諸侯雩上公然周禮小祝小祭祀逆時雨寧風旱則百辟亦天子所祀也祭法有雩禜之壇春秋之時魯以南門為雩門先儒皆以魯之舞雩在城南鄭氏曰雩為壇於南郊之旁其説葢有所受也古者雩歛在稻人雩樂以皇舞以女巫皇與女陰也則舞所以逹陽中之陰而已董仲舒祈雨之術閉南門縱北門葢亦古者達陰之意也然則雩祀上帝必升煙後世乃謂用火不可以祈水而為坎以瘞就陽不可以求陰而移壇於東梁禮雩必自郊徂宫後世或祈山林川澤羣廟百辟卿士然後及於上帝亦梁禮也北齊及唐皆然雩樂以舞為盛後世或選菩謳者歌詩而已皆非古也北齊禮祭日祭月周禮大宗伯實柴以祀日月星辰典瑞王搢大圭執鎮圭繅藉五采五就以朝日王朝日者示有所尊也訓民事君也天子常春分朝日秋分夕月又曰圭璧以祀日月星辰圭其邸為璧取殺於上帝小宗伯兆五帝於四郊四望四類亦如之先為壇之營域四類日月星辰兆日於東郊兆月於西郊掌次朝日祀五帝則張大次小次設重幣重案鼓人以雷鼓鼓天神大司樂乃奏黄鍾歌大吕舞雲門以祀天神天神謂五帝及日月星辰又曰凡樂六變而致天神月令孟冬祈來年于天宗天宗日月星辰之類郊特牲曰郊之祭也大報天而主日配以月玉藻曰𤣥端而朝日於東門之外祭義曰祭日於東祭月於西祭法曰王宫祭日夜明祭月王宫日壇王君也日稱君宫壇營域也夜明月壇也左傳曰日月星辰雪霜風雨之不時於是乎崇之國語曰大采朝日少采夕月大采繅席五采五就古者之祀日月其禮有六郊特牲曰郊之祭大報天而主日配以月一也玉藻曰朝日於東門之外祭義曰祭日於東祭月於西二也大宗伯四類於四郊兆日於東郊兆月於西郊三也大司樂樂六變而致天神月令孟冬祈來年于天宗天宗者日月之類四也覲禮拜日於東門之外反祀方明禮日於南門之外禮月於北門之外五也雪霜風雨之不時於是乎禜之六也夫四郊蜡而祀之非正祀也類禜而祀之與覲諸侯而禮之非常祀也春分朝之於東門之外秋分夕之於西門之外此祀之正與常者也日言朝則於日出之朝朝之也月言夕則於月出之夕夕之也日壇謂之王宫以其有君道故也月壇謂之夜明以其昱於夜故也其次則大次小次設重帟重案其牲體則實柴其服則𤣥冕𤣥端其圭之繅藉則大采少采禮之之玉則一圭邸璧祀之之樂則奏黄鍾歌大吕舞雲門玉藻十有二旒龍衮以祭𤣥端以朝日於東門之外則龍衮𤣥端皆言其衣也衣𤣥冕之衣則用𤣥冕矣鄭氏改𤣥端為𤣥冕不必然也虞氏釋國語謂朝日以𤣥冕然祀上帝以衮冕而朝日以圭璧與張次設帟一切殺於上帝則其不用衮冕可知矣周禮於掌次之次帟案於典瑞之大圭鎮圭繅藉言朝日而已則夕月之禮又殺乎此也漢武帝因郊泰畤朝出行宫東向揖日其夕西向揖月則失東西郊之禮也魏文帝正月祀日於東門之外則失春分之禮也齊何佟之曰王者兄日姊月馬鄭用二分盧植用立春佟之以為日者太陽之精月者大隂之精春分陽氣方永秋分隂氣向長天地至尊故用其始而祭以二至日月次天地故祭以二分則融與康成得義矣魏薛靖曰朝日宜用仲春之朔夕月宜用仲春之朏此尤無據也後周於東門外為壇以朝日焟燎如圜丘於西門外為壇於坎中方四丈深四尺以夕月燔燎如朝日隋唐壇坎之制廣狹雖與後周差異大槩因之而已禮書卷九十
