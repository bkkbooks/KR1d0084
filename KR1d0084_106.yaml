body:
  text: 禮書卷一百七宋陳祥道撰天子熊侯白質諸侯麋侯赤質大夫布侯士布侯鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質鄭氏曰此所謂獸侯也白質赤質皆謂采其地其地不采者白布也蓋白德之成赤事之著故天子之侯白質諸侯之侯赤質天子諸侯言質而不言布大夫士言布畫而不言質則大夫士其地不采可知也君陽而竒故畫一臣陰而耦故畫二畫非特其首而已鄭氏之徒為六獸皆正正靣畫其首於正鵠之處猶貍首射不來者之首也然天子歌騶虞大夫歌采蘋士歌采蘩三詩皆為射節而無射事孰謂貍首必射不來者之首耶考工記曰張獸侯以息燕鄭氏以息為休農息老物於義或然古者燕服黃衣狐裘蠟亦黃衣狐裘燕蠟同服則射之同侯不亦可乎主皮之射周禮鄉大夫以鄉射之禮五物詢衆庶有主皮之射鄉射記曰禮射不主皮主皮之射者勝者又射不勝者降鄭氏釋周禮曰庶民無射禮因田獵分禽則有主皮釋鄉射曰禮射大射賔射燕射也不主皮者貴其容體比於禮其節比於樂不待中為備也言不勝者降則不復升射也主皮者無侯張獸皮而射之主於獲也尚書大傳曰戰鬭不可不習故於搜狩以間之也間之者貫之也貫之者習之也凡祭取餘獲陳於澤然後卿大夫相與射也中者雖不中也取不中者雖中也不取所以貴揖讓之取也而賤勇力之取嚮之取也於囿中勇力之取也今之取也於澤宫揖讓之取也澤習禮之處非所以行禮其射又主中此主皮之射與蓋主皮之射庶人之禮也卿大夫或用之於澤宫卿大夫或用之以詢衆庶用之以詢衆庶在和以容之後則主皮之射雖君子之所不廢亦非其所尚也晚周之時射尚主皮故孔子譏之曰射不主皮為力不同科古之道也貫革之射司弓矢王弓弧弓以授射甲革椹質者弓人曰往體寡來體多謂之王弓之屬利射革與質禮記曰散軍而郊射左射貍首名射騶虞而貫革之射息也春秋傳曰楚使潘尫之黨與養由基蹲甲而射之徹七扎焉杜預曰黨潘尫之子蹲聚也一發逹七扎言其能陷堅成十六年鄭氏釋司弓矢曰甲革革甲也釋弓人曰革謂干盾釋樂記曰貫革穿革甲也考之國語有三革之制齊語曰定三革韋曰甲胄盾也則射革非特甲也射服大夫鷩冕燕射皮辨司服王祀先公饗射則鷩冕賈公彥曰王饗食在廟故服鷩冕大射在西郊虞庠亦服鷩冕燕射在寢則朝服燕禮記燕朝服於寢賔射在朝則皮辨服然王燕以朝服則燕射亦皮辨也詩以有頍者辨刺幽王之不宴同姓以側辨之峩刺幽王之飲酒無度此燕射用皮辨之證也射人掌國之三公孤卿大夫之位三公北靣孤東靣卿大夫西靣其摰三公執璧孤執皮帛卿羔大夫鴈諸侯在朝則皆北靣蓋大射賔射燕射之位一也大射王服七章之鷩冕故三公執五命子男之璧執五命子男之璧則五章之毳冕矣王降衮冕以接賔三公降鷩冕以從王卿大夫而下不降故執其等之摰服其等之服撲鄉射記曰楚撲長如笴刋本尺又曰射者有過則撻之蓋衆之所在非威不足以制之故古者閭胥於鄉小胥於學有觥撻司市於市有撲罰司徒於誓田亦有撲書稱撲作教刑以記之禮稱夏楚二物收其威也則射之有撲宜矣鄉射司射既誘射乃適階西取撲搢之及升堂告賔則去撲降而及位則搢撲升而去撲所以敬尊也降而搢撲所以威重也禮書卷一百七
