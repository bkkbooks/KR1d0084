body:
  text: 禮書卷三十二宋陳祥道撰禹貢五服自甸至荒五千里書益稷曰弼成五服至于五千禹貢曰五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米五百里侯服百里采二百里男邦三百里諸侯五百里綏服三百里揆文教二百里奮武衛五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流東漸于海西被于流沙朔南暨聲教周九服五千五百里周禮大司馬以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿職方氏乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰蕃服行人邦畿方千里其外方五百里謂之侯服歲一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢材物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寶為贄國語先王之制邦內甸服邦外侯服侯衛賔服夷蠻要服戎狄荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享嵗貢終王先王之訓也有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修德序成而有不至則修刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有文告之詞布令陳詞而又不至則增修於德而無勤兵於逺是以近無不聽逺無不服荀子曰諸夏之國同服同義蠻夷戎狄之國同服不同制封內甸服封外侯服至荒服終王已上與國語周紀同夫是之謂視形勢而制械用稱逺近而等貢獻是王者之事也王制曰千里之內曰畿甸千里之外曰采曰流注甸者服治田出穀稅采者九州之內地取其美物以當穀稅夏之服甸侯綏要荒周語曰邦內甸服又曰先王規方千里以為甸服王制千里之內曰甸自甸至荒凡五服服五百里則靣二千五百里矣靣二千五百里則為方五千里矣書曰弼成五服至于五千周之服侯甸男采衛蠻夷鎮蕃自侯至蕃凡九服服五百里則靣二千七百五十里矣靣二千七百五十里則為方五千五百里矣蓋夏服先甸後侯而甸即畿也周服先侯後甸而畿非侯也夏之侯以當周之侯甸而綏以當周之男采周之衛蠻以當夏之要而夷鎮以當夏之荒特蕃服在禹貢之外然則周之斥大中國不過增夏五百里而已書曰弼成五服至于五千此夏五服之域也東漸于海西被于流沙朔南暨聲教此夏五服之外也孔安國司馬遷王肅之徒其說皆然特鄭康成謂堯之舊制服五百里及禹輔而成之服加五百里則靣相距為方萬里故禹㑹諸侯於塗山執玉帛者萬國是不知經傳凡言萬國者舉盈數也孔頴達謂地理志言漢之土境東西九千三百二里南北萬三千三百六十八里其言山川不出禹貢之域而數不同者直而計之以鳥迹曲而量之以人迹異耳此說是也王制曰西不盡流沙東不盡東海南不盡衡山北不盡常山凡四海之內斷長補短方三千里此蓋漢儒記六國之時地域然也然則康成之誤不特禹貢而已其言夏衰夷蠻戎狄內侵國數損少商湯承之中國方三千里周公復唐虞之舊域要服之內方七千里者四十九其一為畿內餘四十八八州各方千里者六設法一州方五百里不過四方四百里者不過六方三百里者不過十一方二百里者不過二十五餘方百里者謂之小國又餘方百里者四十一附庸地也然職方之法蓋兼附庸言之安有四十六國之外復有百里者四十一為附庸乎周之設法州建百四十六國而附庸在焉王制州二百一十國諸侯之附庸不與非周制也王制言凡四海之內九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以祿仕以為閒田然後總之以凡九州千七百七十三國天子之元士諸侯之附庸不與則一代之禮也康成以八州州二百一十國為商禮以天子之縣內九十三國為夏禮惑矣天子之地或曰甸或曰畿曰圻或曰縣曰寰而後世猶有縣官之稱孰謂畿獨施於商周而縣獨施於夏乎康成溺於禹㑹萬國之說嘗曰夏縣內四百國又曰夏縣內九十三國是自戾也侯國及采邑貢賦之法大司徒諸公之地其食者半侯伯之地其食者三之一子男之地其食者四之一鄭司農以食者半為半入於公半入於王三之一為一入於侯伯二入於王則大國貢輕小國貢重康成以食者半為王食其半三之一為王食其一則大國貢重小國貢輕然春秋傳曰天子班貢輕重以列列尊貢重周之制也卑而貢重甸服也由此言之以為大國貢輕則異夫列尊貢重矣以為小國貢輕則又有卑而貢重矣二者之說皆非周制鄭氏又謂采地食者皆四之一百里之國凡四都而王稅以一都王十里之國凡四縣王稅以一縣二十五里之國凡四甸王稅以一甸不知何據而言也然則所謂食者半則食不食之地各半也其食者三之一則不食之地二食之地一也其食者四之一則不食之地三食之地一也先王制地不必其實如此蓋以德尊者國大而祿重故其地媺德卑者國小而祿輕故其地惡於是要其大率而為之法耳然則所謂食不食者非制貢之數也此與大司馬上地食者三之二中地食者半下地食三之一司勳凡頒賞地三之一食其受地之法同賦稅征斂之辨周官司書言賦而終之以凡稅斂掌交言九稅而餘官言九賦司徒言征而繼之以賦載師言征亦終之以賦則征賦者稅斂之總名征稅者賦之別稱斂者賦征稅之事而已荀卿曰刀布之斂田野之稅關市之征此又對言之然也周法邦中之賦則園㕓二十而一四郊之賦則近郊十一逺郊二十而三邦甸家削邦縣邦都之賦皆無過十二若夫關市山澤之賦蓋十一而已凡此非出於口率也鄭康成釋太宰謂賦口率出泉也今之算泉或謂之賦然算泉之法特出於後世先王之時無有也卿大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之征之者役之也與禮記所謂征於鄉征於學之征同義康成亦以征之為口率非是禮書卷三十二
