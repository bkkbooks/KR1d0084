body:
  text: 禮書卷四十五宋陳祥道撰扆覲禮天子設斧依於戸牖之間左右几天子衮冕負斧依依如今綈素屏風也有繡斧文所以示威也司几筵凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉左右玉几斧謂之黼其繡白黒采以絳帛為質依其制如屏風然依前設席左右有几優至尊也士虞禮佐食無事則出户負依南靣書曰狄設黼扆綴衣扆置户牖間復設幄帳象平生所為牖間南鄉詩公劉曰俾筵依几既登乃依箋云公劉既登當負扆而立曲禮曰天子當依而立諸侯北靣而見天子曰覲明堂位曰天子負斧依南鄉而立荀卿曰居則設張容負依爾雅曰牖户之間謂之扆容謂之防形如今床頭小曲屏風唱射者所以自防隠釋名曰依倚也考工記曰白與黑謂之黼爾雅曰戸牖之間謂之扆黼或作斧扆或作依則依欲其有所依黼明其有所斷也賈公彦曰依如屏風以絳為質高八尺為斧文舊圖從廣八尺畫斧無柄設而不用之意朝於寢覲於廟射於郊學朝於明堂皆於户牖之間設之其制則左右有張容焉荀卿曰居則設容負張扆容之為物葢若唱射之容爾雅曰容謂之防郭璞謂如曲屏風觀此則天子張容之制可知矣然禮言負黼依則張容可畫黼矣詩曰既登乃依士虞禮佐食無事出户負依南靣葢諸侯至士皆有依焉或畫或否不可考也掌次王大旅上帝張氊案設皇邸鄭司農曰皇羽覆上邸後版也鄭康成謂後版屏風與染羽象鳳毛色而為之孔頴達謂大方版於坐後此不在寢廟無扆不得云扆故别名皇邸然皇邸非扆類也其説誤矣宁爾雅曰門屏之間謂之宁詩曰俟我於著記言天子春朝當宁而立則著宁一也大夫以簾士以帷則無屏矣詩曰俟我於著而大夫士預焉者葢簾帷之為蔽限亦謂之屏庭詩曰不入我陳又曰中唐有甓爾雅曰廟中路謂之唐堂途謂之陳堂與陳皆堂下至門之徑特廟堂異其名耳考工記曰堂涂十有二分鄭氏曰堦前若今令辟械也分其督旁之修以二分為峻葢令辟即甓也械其道也中央為督峻其督所以去水戺書曰四人執戈夾階戺鄉飲酒設工席于堂簾聘禮陪鼎當内簾鄭氏曰側邊曰簾孔安國曰堂簾曰戺垂書曰一人執戣立于東垂一人執瞿立于西垂史曰坐不垂堂孔安國曰東西垂者東西下之階上檐明堂位曰複廟垂檐爾雅曰檐謂之樀士喪禮為銘置于宇西階鄭氏曰宇梠也説文曰齊人謂之檐楚人謂之梠樀宇梠同實異名也夫轑末謂之宇疆境亦謂之土宇又謂之邊垂則宇與垂皆檐之窮也故轑末疆境取名也自屋言之曰檐自堂言之曰垂檐亦作䦲位周禮司士正朝儀之位爾雅曰中庭左右謂之位禮記曰立而無序則亂於位家語曰列而無次序則亂於著左傳曰朝有著國語曰恪位著以敬其官又曰位宁有官師之典則著所以著其位者也人君之行也過位然後登車其入也過位則下典禮曰下卿位是也人臣過此必加敬焉語曰過位色勃如也屏攝㑹有表朝有著祭有屏攝皆明其位也周禮太史祭之日執書以次位常左傳稱鄭火子産使子寛子上巡羣屏攝至于大宫楚語曰屏攝之位韋昭曰屏屏風也攝如要扇皆所以明尊卑為祭祀之位近漢亦然鄭氏釋檀弓曰翣以布衣木如攝與釋喪大記曰漢禮翣以木為筐廣三尺高二尺四寸方兩角高衣以白布柄長五尺是漢亦名翣無攝也霤月令曰其祀中霤先儒曰中霤猶中室也古者複穴是以名室為中霤坊記曰喪禮毎加以逺浴於中霤飯於牖下小歛於户内大歛於阼阼遠於户内户内逺於牖下牖下逺於中霤則中霤為中室可知昔齊諸大夫之陳乞之家乞使力士舉巨囊至于中霤亦中室也然禮有東霤燕禮設篚當中霤有門内霤燕禮賔執脯以授鍾人於門内霤檀弓曾子弔於季氏設内霤有重霤檀弓池内重霤重霤非屋霤也鄭氏注云堂有承霤以木為之用行水亦宫之飾也今宫中有承霤以銅為之孔穎達曰天子則四注四靣為重霤諸侯四注重霤則差降去後餘三大夫惟餘前後二士則唯一在前禮書卷四十五
