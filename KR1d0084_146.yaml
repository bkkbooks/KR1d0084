body:
  text: 禮書卷一百四十七宋陳祥道撰馬鄉師以時辨其車馬之物均人民牛馬車輦之力政縣師辨其六畜車輦之稽遂人以嵗時登其夫家之衆寡及其六畜車輦遂師以時登其六畜車輦遂大夫以嵗時稽其六畜田野甸祝禱牲禱馬皆掌其祝號杜子春云禱禱也為馬禱無疾大司馬喪祭奉詔馬牲馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也綱惡馬凡受馬於有司者書其齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更其外否馬及行則以任齊其行若有馬訟則聽之禁原蠶者齊右王乘則持馬凡有牲事則前馬道右王出入則持馬王式則下前馬馭夫分公馬而駕治之校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役凡頒良馬而養乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廄廄一僕夫六廄成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫良善也善馬五路之馬鄭司農云四匹為乘養馬為圉故春秋傳曰馬有圉牛有牧𤣥謂二耦為乘師趣馬馭夫僕夫帥之名也趣馬下士御夫中士則僕夫上士也自乘至廄其數二百一十六匹易乾為馬此應乾之策也至校變為言成者眀六馬各一廄而王馬小備也校有左右則良馬一種者四百三十二匹五種合二千一百六十匹駑馬三之則為千二百九十六匹五良一駑凡三千四百五十六匹然後王馬大備詩曰騋牝三千此謂王馬之大數與麗耦也駑馬自圉至馭夫凡馬千二十四匹與三良馬之數不相應八皆宜為六字之誤也師十二匹趣馬七十二匹則馭夫四百三十二匹矣然後而三之既三之無僕夫者不駕於五路卑之也天子十有二間馬六種邦國六間馬四種家四間馬二種降殺之差每廄為一間諸侯有齊馬道馬田馬大夫有田馬各一間其駑馬則皆分為三焉凡馬特居四之一欲其乘之性相似也物同氣則心一鄭司農云四之一者三牝一牡春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬步獻馬講馭夫趣馬掌贊正良馬而齊其飲食簡其六節巫馬掌養疾馬而乘治之相醫而藥攻馬疾受財于校人牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊庾人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圍馬正校人員選馬八尺以上為龍七尺以上為騋六尺以上為馬圉師掌教圉人養馬春除蓐釁廄始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔圉人掌養馬芻牧之事以役圉師凡賓客喪紀牽馬而入陳廞馬亦如之小行人圭以馬玉人大璋中璋邊璋天子以巡守宗祝以前馬曲禮曰效馬效羊者右牽之國君下齊牛式宗廟大夫士下公門式路馬乘路馬必朝服載鞭䇿不敢授綏左必式步路馬必中道以足蹙路馬芻有誅齒路馬有誅孔子之衛遇舊館人之喪入而哭之哀出使子貢說驂而賻之子貢曰於門人之喪未有所說驂說驂於舊館無乃已重乎檀弓曰敝帷不棄為埋馬也月令駕蒼龍季春乃合纍牛騰馬遊牝於牧纍騰皆乘匹之名犧牲駒犢舉書其數夏駕赤駵中央駕黃駵秋駕白駱季秋班馬政命僕及七騶咸駕冬駕鐵驪玉藻年不順成大夫不得造車馬眀堂位夏后氏駱馬黑鬛商人白馬黑首周人黃馬蕃鬛少儀賵馬入廟門賻馬與其幣大白兵車不入廟門馬則執靮皆右之學記始駕馬者反之車在馬前周易乾為良馬為老馬為瘠馬為駁馬震其於馬也為善鳴為馵足為作足為的顙坎其於馬也為美脊為亟心為下首為薄蹄為曳詩漢廣言秣其馬六尺以上曰馬言秣其駒五尺以上曰駒干旄素絲紕之良馬四之四之者見之夥也素絲組之良馬五之素絲祝之良馬六之四馬六轡碩人四牡有驕朱幩鑣鑣翟茀以朝大叔于田乘乘馬執轡如組兩驂如舞乘乘黃四馬皆黃兩服上襄兩驂鴈行乘乘鴇驪白雜毛曰鴇兩服齊首兩驂如手駟鐵孔阜六轡在手遊于北園四馬既間習其四種之馬小戎四牡孔阜六轡在手騏騮是中騧驪是驂黃馬黑喙曰騶箋云赤身白鬛曰駵俴駟孔羣俴駟四介馬也株林駕我乘馬說于株野乘我乘駒朝食于株馬五尺以上曰駒東山皇駁其馬黃白曰皇駵白曰駮四牡騑騑周道倭遲四牡騑騑嘽嘽駱馬白馬黑鬛曰駱駕彼四駱載驟駸駸皇皇者華我馬維駒六轡如濡我馬維騏六轡如絲我馬維駱六轡沃若采薇戎車既駕四牡業業駕彼四牡四牡騤騤四牡翼翼象弭魚服六月戎車既飭四牡騤騤載是常服比物四驪間之維則物毛物也四牡修廣其大有顒四牡既佶既佶且間車攻我車既攻我馬既同四牡龎龎駕言徂東田車既好四牡孔阜駕彼四牡四牡奕奕四黃既駕兩驂不猗吉日田車既好四牡孔阜吉日庚午既差我馬白駒皎皎白駒食我場苗皎皎白駒食我場藿裳裳者華我覯之子乘其四駱乘其四駱六轡沃若采菽雖無豫之路車乘馬載驂載駟君子所屆角弓老馬反為駒不顧其後嵩高四牡蹻蹻鉤膺濯濯王遣申伯路車乘馬韓奕四牡奕奕駉頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧薄言駉者有騅有駓有騂有騏以車伾伾思馬斯才薄言駉者有驒有駱有駵有雒思馬斯作薄言駉者有駰有騢有驒有魚以車袪袪思馬斯徂有駜駜彼乘黃駜彼乘牡駜彼乘駽青驪曰駽爾雅曰騊駼野馬駮如馬倨牙食虎豹騉駼枝蹄趼善升甗小領盜驪絶有力駥膝上皆白惟馵四骹皆白驓四蹢皆白首前足皆白騱後足皆白翑前右足白啓左白踦後右足白驤左白馵駵馬白腹騵驪馬白跨驈白州驠尾本白騴尾白駺馰顙白顛白達素縣面顙皆白惟駹回毛在膺宜乘在肘後減陽在幹茀方在背闋廣逆毛居馻騋牝驪牡𤣥駒驂牡曰隲牝曰騇駵駁駁黃曰騜駵馬黃脊騝驪馬黃脊騽青驪駽青驪驎驒青驪繁鬛騥驪白雜毛鴇黃白雜毛駓隂白雜毛駰蒼白雜毛騅彤白雜毛騢白馬黑鬛駱白馬黑脣駩黑喙騧一目白瞷二目白魚既差我馬差擇也宗廟齊毫戎事齊力田獵齊足天子十二間邦國六間家四間先王之時國馬足以行軍公馬足以稱賦則周禮鄉師以時辨其馬牛之物均人均牛馬之力政縣師辨其六畜車輦之稽遂人遂師以時登其六畜車輦遂大夫以時稽其六畜而牛馬與焉及其用之則司馬法甸出長轂一乘牛三頭馬四匹此國馬也校人掌王馬之政辨種戎齊道田駑之六馬此公馬也蓋天子十二間馬六種每焉一圉每乘一師三乘馬十二匹三皂為繫三十六匹六繫為廏二百一十六匹六廏成校校有左右則十二廏合三千四百五十六匹種各一廏廏有左右則一種四百三十二匹良馬五種則合二千一百六十匹又駑馬一種三良馬一種之數則為千二百九十六匹五良一駑凡三千四百五十六匹邦國六間四種家四間二種蓋諸侯及大夫廏無左右則良馬三居三廏合六百四十八匹駑馬三良馬一種之數居三廏亦六百四十八匹凡千二百九十六匹家四間二種一良居一廏二百一十六匹駑三之居三廏為六百四十八凡八百六十四匹春秋之時晉悼公使程鄭為乘馬御六騶屬焉諸侯六間成十八年彼衛文公之騋牝三千齊景公之馬千駟三千則近於天子十二間之數而千駟又過之是皆僭侈而違禮者也校人駑馬麗馬一圉八麗一師八師一趣馬八趣馬一馭夫鄭氏謂八宜為六者蓋自圉至馭夫以八計之則為千二十四匹與三良馬之數不合以六計之則適四百三十二匹矣然後而三之既三之無僕夫以駑馬不駕五路卑之也然則周天子之馬不過三千四百五十六匹而已漢之養馬有五監六廏而武帝之時馬至四十萬匹唐置八使五十六監麟德間馬至七十萬開元間至四十五萬匹而與周之馬數相逺者蓋周制凡軍之馬出於民而校人所養者特給公家之用而已漢唐則不然行軍之馬一出於公此多寡所以異也六馬車四馬車二馬車一馬騎二馬駢說文駢駕二馬三馬驂四馬駟古者軍容則有騎記曰前有車騎春秋傳曰齊魯遇于野井以鞍為几史曰趙靈王胡服騎射國容則車而已大夫以上駕四士則駕二而已儀禮公贈士以兩馬春秋之時衛良士乘衷甸兩牡哀十年左陳成子以乘車兩馬賜顔涿聚之子襄二十七年魯君以乘車二馬遺孔子家語蓋諸侯之大夫大事駕四小事駕二觀春秋傳以兩牡為衷甸則四牡為上乘矣後世有大駕中駕小駕之說蓋此類也杜預以衷甸兩牡為卿車誤也詩四牡言使臣之事曰四牡騑騑駕彼四駱采芑言方叔之事曰乘其四騏四騏翼翼是大夫駕四也車攻吉日言宣王之事曰四牡龎龎四牡孔阜是天子亦駕四也周官校人掌王馬之政乘馬一師四圉詩言諸侯獻馬於王皆布乘黃朱則天子亦駕四也特夏書曰若朽索之御六馬荀卿曰六馬仰秣六馬不調列子曰二十四蹄無遺跡公羊亦曰天子駕六白虎通曰天子之馬六示有事於天地四方蓋言夏禮也史記曰秦始皇以水數制乘六馬漢儒曰今帝者駕六此秦漢制耳石慶為御景帝問車中幾馬慶以䇿數馬畢舉手曰六馬張衡西京賦曰天子駕雕軫六駿又曰六元蚪之奕奕商周損之以四而後世又復之以六觀商頌言八鸞鎗鎗則商亦駕四眀矣先儒謂天子駕六諸侯與卿駕四大夫駕三士駕二庶人駕一又謂夏后氏駕兩謂之麗商益以一騑謂之驂周又益以騑謂之駟蓋傳聞之誤也昔晏子解左驂以遺越石父孔子解左驂以弔館人陽處父釋左驂以贈孟眀光武釋左驂以賜賈復言左則有右未聞三馬可以行車也干旄之詩曰良馬五之毛萇曰三馬五轡亦謂大夫駕三豈詩人之意然耶皇皇者華之詩曰我馬維駒株林之詩曰乘我乘駒毛氏以為大夫乘車於理或然何則馬八尺以上為龍七尺以上為騋六尺以上為馬六尺以下為駒覲禮月令天子所乘皆言龍衛詩諸侯所畜則言騋是天子乘龍諸侯乘騋也兵車乘車之輪六尺有六寸田車之輪六尺有三寸輪崇則馬崇輪庳則馬庳是乘兵車則駕騋以上田車則駕馬也天子所駕下止於馬諸侯所畜上止於騋則大夫乘駒可知矣四馬八轡而詩每言六轡者蓋駕馬之法有游環以止驂馬之外出有脅驅以止驂馬之外入有脅驅矣則驂馬之內轡無所施也繫於軾前而已此詩所以言六轡也禮書卷一百四十七
