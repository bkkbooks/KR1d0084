body:
  text: 禮書卷一百四十七宋陳祥道撰馬鄉師以時辨其車馬之物均人民牛馬車輦之力政縣師辨其六畜車輦之稽遂人以嵗時登其夫家之衆寡及其六畜車輦遂師以時登其六畜車輦遂大夫以嵗時稽其六畜田野甸祝禂牲禂馬皆掌其祝號杜子春云禂禱也為馬禱無疾大司馬喪祭奉詔馬牲馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也綱惡馬凡受馬於有司者書其齒毛與其賈馬死則旬之内更旬之外入馬耳以其物更其外否馬及行則以任齊其行若有馬訟則聴之禁原蠶者齊右王乗則持馬凡有牲事則前馬道右王出入則持馬王式則下前馬馭夫分公馬而駕治之校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役凡頒良馬而養乗之乗馬一師四圉三乗為皁皁一趣馬三皁為繫繫一馭夫六繫為廐廐一僕夫六廐成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫良善也善馬五路之馬鄭司農云四匹為乗養馬為圉故春秋傳曰馬有圉牛有牧𤣥謂二耦為乗師趣馬馭夫僕夫帥之名也趣馬下士御夫中士則僕夫上士也自乗至廐其數二百一十六匹易乾為馬此應乾之筴也至校變為言成者眀六馬各一廐而王馬小備也校有左右則良馬一種者四百三十二匹五種合二千一百六十匹駑馬三之則為千二百九十六匹五良一駑凡三千四百五十六匹然後王馬大備詩曰騋牝三千此謂王馬之大數與麗耦也駑馬自圉至馭夫凡馬千二十四匹與三良馬之數不相應八皆宜為六字之誤也師十二匹趣馬七十二匹則馭夫四百三十二匹矣然後而三之既三之無僕夫者不駕於五路卑之也天子十有二閑馬六種邦國六閑馬四種家四閑馬二種降殺之差毎廐為一閑諸侯有齊馬道馬田馬大夫有田馬各一閑其駑馬則皆分為三焉凡馬特居四之一欲其乗之性相似也物同氣則心一鄭司農云四之一者三牝一牡春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬歩獻馬講馭夫趣馬掌賛正良馬而齊其飲食簡其六節巫馬掌養疾馬而乗治之相醫而藥攻馬疾受財于校人牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事賛焚萊庾人掌十有二閑之政教以阜馬佚特教駣攻駒及祭馬祖祭閑之先牧及執駒散馬耳圍馬正校人員選馬八尺以上為龍七尺以上為騋六尺以上為馬圉師掌教圉人養馬春除蓐釁廐始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔圉人掌養馬芻牧之事以役圉師凡賓客喪紀牽馬而入陳廞馬亦如之小行人圭以馬玉人大璋中璋邊璋天子以巡守宗祝以前馬曲禮曰効馬効羊者右牽之國君下齊牛式宗廟大夫士下公門式路馬乗路馬必朝服載鞭䇿不敢授綏左必式步路馬必中道以足蹙路馬芻有誅齒路馬有誅孔子之衛遇舊館人之喪入而哭之哀出使子貢説驂而賻之子貢曰於門人之喪未有所説驂説驂於舊館無乃已重乎檀弓曰敝帷不棄為埋馬也月令駕蒼龍季春乃合累牛騰馬遊牝於牧累騰皆乗匹之名犧牲駒犢舉書其數夏駕赤駵中央駕黄駵秋駕白駱季秋班馬政命僕及七騶咸駕冬駕鐵驪玉藻年不順成大夫不得造車馬眀堂位夏后氏駱馬黒鬛商人白馬黒首周人黄馬蕃鬛少儀賵馬入廟門賻馬與其幣大白兵車不入廟門馬則執靮皆右之學記始駕馬者反之車在馬前周易乾為良馬為老馬為瘠馬為駁馬震其於馬也為善鳴為馵足為作足為的顙坎其於馬也為美脊為亟心為下首為薄蹄為曳詩漢廣言秣其馬六尺以上曰馬言秣其駒五尺以上曰駒干旄素絲紕之良馬四之四之者見之夥也素絲組之良馬五之素絲祝之良馬六之四馬六轡碩人四牡有驕朱幩鑣鑣翟茀以朝大叔于田乗乗馬執轡如組兩驂如舞乗乗黄四馬皆黄兩服上襄兩驂鴈行乗乗鴇驪白雜毛曰鴇兩服齊首兩驂如手駟鐵孔阜六轡在手遊于北園四馬既閑習其四種之馬小戎四牡孔阜六轡在手騏騮是中騧驪是驂黄馬黒喙曰騶箋云赤身白鬛曰駵俴駟孔羣俴駟四介馬也株林駕我乗馬説于株野乗我乗駒朝食于株馬五尺以上曰駒東山皇駁其馬黄白曰皇駵白曰駮四牡騑騑周道倭遲四牡騑騑嘽嘽駱馬白馬黒鬛曰駱駕彼四駱載驟駸駸皇皇者華我馬維駒六轡如濡我馬維騏六轡如絲我馬維駱六轡沃若采薇戎車既駕四牡業業駕彼四牡四牡騤騤四牡翼翼象弭魚服六月戎車既飭四牡騤騤載是常服比物四驪閑之維則物毛物也四牡修廣其大有顒四牡既佶既佶且閑車攻我車既攻我馬既同四牡龎龎駕言徂東田車既好四牡孔阜駕彼四牡四牡奕奕四黄既駕兩驂不猗吉日田車既好四牡孔阜吉日庚午既差我馬白駒皎皎白駒食我場苗皎皎白駒食我場藿裳裳者華我覯之子乗其四駱乗其四駱六轡沃若采菽雖無予之路車乗馬載驂載駟君子所屆角弓老馬反為駒不顧其後崧高四牡蹻蹻鉤膺濯濯王遣申伯路車乗馬韓奕四牡奕奕駉頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭思無疆思馬斯臧薄言駉者有騅有駓有騂有騏以車伾伾思馬斯才薄言駉者有驒有駱有駵有雒思馬斯作薄言駉者有駰有騢有驒有魚以車袪袪思馬斯徂有駜駜彼乗黄駜彼乗牡駜彼乗駽青驪曰駽爾雅曰騊駼野馬駮如馬倨牙食虎豹騉駼枝蹄趼善陞甗小領盜驪絶有力駥膝上皆白惟馵四骹皆白驓四蹢皆白首前足皆白騱後足皆白翑前右足白啟左白踦後右足白驤左白馵駵馬白腹騵驪馬白跨驈白州驠尾本白騴尾白駺馰顙白顛白達素縣面顙皆白惟駹回毛在膺宜乗在肘後減陽在幹茀方在背闋廣逆毛居馻騋牝驪牡𤣥駒驂牡曰隲牝曰騇駵駁駁黄曰騜駵馬黄脊騝驪馬黄脊騽青驪駽青驪驎驒青驪繁鬛騥驪白雜毛鴇黄白雜毛駓隂白雜毛駰蒼白雜毛騅彤白雜毛騢白馬黒鬛駱白馬黒脣駩黒喙騧一目白瞷二目白魚既差我馬差擇也宗廟齊毫戎事齊力田獵齊足天子十二閑邦國六閑家四閑先王之時國馬足以行軍公馬足以稱賦則周禮鄉師以時辨其馬牛之物均人均牛馬之力政縣師辨其六畜車輦之稽遂人遂師以時登其六畜車輦遂大夫以時稽其六畜而牛馬與焉及其用之則司馬法甸出長轂一乗牛三頭馬四匹此國馬也校人掌王馬之政辨種戎齊道田駑之六馬此公馬也蓋天子十二閑馬六種每焉一圉每乗一師三乗馬十二匹三皁為繫三十六匹六繫為廏二百一十六匹六廏成校校有左右則十二廏合三千四百五十六匹種各一廏廏有左右則一種四百三十二匹良馬五種則合二千一百六十匹又駑馬一種三良馬一種之數則為千二百九十六匹五良一駑凡三千四百五十六匹邦國六閑四種家四閑二種葢諸侯及大夫廏無左右則良馬三居三廏合六百四十八匹駑馬三良馬一種之數居三廏亦六百四十八匹凡千二百九十六匹家四閑二種一良居一廏二百一十六匹駑三之居三廏為六百四十八凡八百六十四匹春秋之時晉悼公使程鄭為乗馬御六騶屬焉諸侯六閑成十八年彼衛文公之騋牝三千齊景公之馬千駟三千則近於天子十二閑之數而千駟又過之是皆僭侈而違禮者也校人駑馬麗馬一圉八麗一師八師一趣馬八趣馬一馭夫鄭氏謂八宜為六者蓋自圉至馭夫以八計之則為千二十四匹與三良馬之數不合以六計之則適四百三十二匹矣然後而三之既三之無僕夫以駑馬不駕五路卑之也然則周天子之馬不過三千四百五十六匹而已漢之養馬有五監六廏而武帝之時馬至四十萬匹唐置八使五十六監麟徳間馬至七十萬開元間至四十五萬匹而與周之馬數相逺者葢周制凡軍之馬出於民而校人所養者特給公家之用而已漢唐則不然行軍之馬一出於公此多寡所以異也六馬車四馬車二馬車一馬騎二馬駢説文駢駕二馬三馬驂四馬駟古者軍容則有騎記曰前有車騎春秋傳曰齊魯遇于野井以鞍為几史曰趙靈王胡服騎射國容則車而已大夫以上駕四士則駕二而已儀禮公贈士以兩馬春秋之時衛良士乗衷甸兩牡哀十年左陳成子以乗車兩馬賜顔涿聚之子襄二十七年魯君以乗車二馬遺孔子家語葢諸侯之大夫大事駕四小事駕二觀春秋傳以兩牡為衷甸則四牡為上乗矣後世有大駕中駕小駕之説蓋此類也杜預以衷甸兩牡為卿車誤也詩四牡言使臣之事曰四牡騑騑駕彼四駱采芑言方叔之事曰乗其四騏四騏翼翼是大夫駕四也車攻吉日言宣王之事曰四牡龎龎四牡孔阜是天子亦駕四也周官校人掌王馬之政乗馬一師四圉詩言諸侯獻馬於王皆布乗黄朱則天子亦駕四也特夏書曰若朽索之御六馬荀卿曰六馬仰秣六馬不調列子曰二十四蹄無遺跡公羊亦曰天子駕六白虎通曰天子之馬六示有事於天地四方葢言夏禮也史記曰秦始皇以水數制乗六馬漢儒曰今帝者駕六此秦漢制耳石慶為御景帝問車中㡬馬慶以䇿數馬畢舉手曰六馬張衡西京賦曰天子駕雕軫六駿又曰六元蚪之奕奕商周損之以四而後世又復之以六觀商頌言八鸞鎗鎗則商亦駕四眀矣先儒謂天子駕六諸侯與卿駕四大夫駕三士駕二庶人駕一又謂夏后氏駕兩謂之麗商益以一騑謂之驂周又益以騑謂之駟葢傳聞之誤也昔晏子解左驂以遺越石父孔子解左驂以弔館人陽處父釋左驂以贈孟眀光武釋左驂以賜賈復言左則有右未聞三馬可以行車也干旄之詩曰良馬五之毛萇曰三馬五轡亦謂大夫駕三豈詩人之意然耶皇皇者華之詩曰我馬維駒株林之詩曰乗我乗駒毛氏以為大夫乗車於理或然何則馬八尺以上為龍七尺以上為騋六尺以上為馬六尺以下為駒覲禮月令天子所乗皆言龍衛詩諸侯所畜則言騋是天子乗龍諸侯乗騋也兵車乗車之輪六尺有六寸田車之輪六尺有三寸輪崇則馬崇輪庳則馬庳是乗兵車則駕騋以上田車則駕馬也天子所駕下止於馬諸侯所畜上止於騋則大夫乗駒可知矣四馬八轡而詩每言六轡者葢駕馬之法有游環以止驂馬之外出有脅驅以止驂馬之外入有脅驅矣則驂馬之内轡無所施也繫於軾前而已此詩所以言六轡也禮書卷一百四十七
