body:
  text: 禮書卷五十八宋陳祥道撰幣帛帛錦附儀禮士冠禮乃醴賔以一獻之禮主人酬賔束帛儷皮士婚禮納吉用鴈如納采禮納徵玄纁束帛儷皮婚禮用玄纁者象隂陽備也束帛十端也周禮曰凡嫁子取妻入幣舅饗送者以一獻之禮酬以束錦送者女家有司也爵至酬賔又從之以束錦姑饗婦人送者酬以束錦婦人送者𨽻子弟之妻妾凡饗速之若異邦則贈丈夫送者以束錦納徴執皮攝之內文兼執足左首隨入西上參分庭一在南攝猶辟也兼執足者左手執前兩足右手執後兩足左手象生曲禮曰執禽者左手隨入為門中厄狹西上中庭位併賔致命釋外足見文主人受幣士受皮者自東出於後自左受遂坐攝皮逆退適東壁賔致命主人受幣庭寶所用為節若不親迎則婦入三月然後壻見主人醴以一獻之禮主婦薦奠酬無幣無幣異於賔客士相見之禮凡執幣者不趨容彌蹙以為儀聘禮宰書幣命宰夫官具及期夕管人布幕於寢門外官陳幣皮北首西上加其奉於左皮上馬則北面奠幣於其前史讀書展幣受享束帛加璧受夫人之聘璋享玄纁束帛加琮皆如初享獻也既聘又一獻所以厚恩惠也帛今之璧色繒也入境斂旜乃展布幕賔朝服立於幕東西靣介皆北靣東上賈人北靣坐拭圭遂執展之上介北靣視之退復位退圭圭璋尊不陳之陳皮北首西上又拭璧展之會諸其幣加於左皮上上介視之退馬則幕南北靣奠幣於其前展夫人之聘享亦如之賈人告於上介上介告於賔展夫人聘享上介不視貶於君也賈人既拭璋琮南靣告於上介上介於是乃東靣以告賔有司展羣幣以告羣幣私覿及大夫有司載幣者自展自告及郊又展如初及館展幣於賈人之館如初賔至於近郊君使卿朝服用束帛勞賔賔用束錦儐勞者賔禓奉束帛加璧享擯者入告出許庭實皮則攝之毛在內內攝之入設也賔止也賔執梁與湆之西序端不敢食於尊處主人辭賔反之卷加席主人辭賔反之辭幣降一等主人從從辭賓降受侑幣再拜稽首主人送幣亦然徹也辭於主人降一等主人從辭謂辭具臨巳食卒食徹于西序端亦親徹東靣再拜降出拜亦拜卒食其他皆如公食大夫之禮若不親食則公作大夫朝服以侑幣致之覲禮至於郊王使人皮辨用璧勞侯氏侯氏束帛乘馬儐使者再拜受侯氏再拜送幣儐使者所以致尊敬也天子賜舍侯氏再拜稽首受館儐之束帛乘馬饗禮乃歸禮謂食燕也王或不親以其禮幣致之略言饗禮互文也掌客職曰上公三饗三食三燕侯伯再饗再食再燕子男一饗一食一燕士虞禮卒哭明日以其班祔鄭氏曰卒哭成事而後主各反其廟然則士之皇祖於卒哭亦反其廟無主則反廟之禮未聞以其幣告之乎太宰之職以九賦斂財賄九曰幣餘之賦祀五帝及祀之日贊玉幣爵之事玉幣所以禮神玉與幣各放其方之色祀大神示亦如之朝覲會同贊玉幣玉獻玉幣諸侯享幣也其合亦如小行人所合六幣小宰凡祭祀贊玉幣爵之事凡賔客贊祼凡受幣之事大府幣餘之賦以待賜豫職幣掌式法以斂官府都鄙與凡用邦財者之幣振掌事者之餘財皆辨其物而奠其録以書楬之以詔上之小用賜豫內宰凡建國佐后立市出其度量淳制純制天子巡狩禮所云制幣丈八尺純四􅡥與大宗伯孤執皮帛以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其器之色幣以從爵若飲酒有酬幣若國有貞則奉玉帛以詔號大賔客受其將幣之齎謂所齎束貢獻之財物肆師之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲占人凡卜筮既事則繫幣以比其命歲終則計其占之中否杜子春云繫幣者以帛書其占繫之於龜也玄謂既卜筮史必書其命龜之事及兆於䇿繫其禮神之幣而合藏焉大祀六曰幣號幣云量幣挍人凡賔客受其幣馬賔客之幣馬來朝聘而享王者凡國之使者共其幣馬使者所用私覿行人凡大國之孤執皮帛以繼小國之君若有四方之大事則受其幣聽其辭小行人凡諸侯入王則逆勞于畿及郊勞視館將幣為承而擯合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故司儀將合諸侯則令為壇三成及其擯之各以其禮公於上等侯伯於中等子男於下等其將幣亦如之其禮亦如之將幣享也致饔餼還圭饗食致贈郊送皆如將幣之儀此六禮者惟饗食速賔耳其餘主君親往親往者賔為主人主人為賔君如有故不親饗食則使大夫以酬幣侑幣致之凡諸侯之交各稱其邦而為之幣以其幣為之禮象胥凡軍旅會同受國客幣而賔禮之掌訝待賔客及將幣為前驅道之以如朝曲禮幣曰量幣檀弓曰伯高之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯高王制曰布帛精粗不中數幅廣狹不中量不粥於市錦文珠玉成器不粥於市月令曰仲春之月祀不用犧牲用圭璧更皮幣禮運列祭祀瘞繒埋牲曰瘞幣帛曰繒禮器圭璋特琥璜爵郊特牲曰旅幣無方所以别土地之宜而節逺邇之期也束帛加璧往德也曾子問曰天子將出告于祖禰以幣帛皮圭諸侯適天子告于社稷宗廟山川用牲幣又曰君薨太子生大祝裨冕執束帛升自西階升奠幣于殯東几又曰凡告用牲幣反亦如之牲當為制字之誤也制幣一丈八尺禮器曰大廟之內敬矣君親牽牲夫人贊幣而從鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣飲之而有幣酬幣也食之而有幣侑幣也正義曰此解飲食而有幣帛之意言飲有酬賔送酒之幣食有侑賔勸飽之幣故皆有幣也飲食必酬侑之者案公食大夫禮賔三飯之後公受宰夫束帛以侑注云主國君以為食賔殷勤之意未至復發幣以勸之欲其深安賔也是禮食用幣之意也饗禮亡凖此亦安賔而酬之焉案聘禮云君不親食使大夫朝服致之以侑幣又曰致饗以酬幣亦如之是親食有侑幣不親食則以侑幣致之然則不親饗以酬幣致之明親饗有酬幣矣故知飲之而有幣謂酬幣也鄭以飲為饗者以飲食連之若飲食為一則食禮不主於飲若飲為燕禮不宜又在食上且饗食相對之物有食不宜無饗其幣所同公食大夫用束帛以侑其酬幣則無文故聘禮注云酬幣饗禮酬賔勸酒之幣所用未聞也禮幣用束帛乘馬亦不是饗所用幣無正文也禮幣用束帛乘馬謂聘享之幣聘享止用束帛乘馬而巳侑幣又用束帛故云亦不是過言諸侯於大夫酬幣不過是也其天子酬諸侯及諸侯自相酬幣不必用束帛乘馬故聘禮注又引禮器曰琥璜爵蓋天子酬諸侯也必疑琥璜為天子酬諸侯之幣者以琥璜非爵名而云爵明以送爵也食禮無爵可送則琥璜饗酬所用也謂饗時酬賔以琥璜將幣耳大夫合六幣琥以繡璜以黼則天子酬諸侯以黼繡而琥璜特之既天子饗諸侯之酬幣與諸侯異則食禮天子侑諸侯其幣不必束帛無文以言之此唯言享食之幣不言燕幣燕禮亦當有焉但今燕禮唯有好貨無幣故文不顯言之左氏昭五年公如晉自郊勞至于贈賄無失禮又晉韓宣子如楚楚薳啓疆曰宴有好貨飱有陪鼎入有郊勞出有贈賄禮之至也十年晉葬平公鄭子皮將以幣行子産曰喪焉用幣用幣必百兩百兩必千人二十六年申豐以幣錦二兩縳一如瑱適齊定六年陽虎使孟懿子往報晉夫人之幣晉語晉侯使隨會聘于周定王享之肴蒸范子曰此何禮也王召士季曰女今我王室之一二兄弟體解節折而飲食之酬幣宴貨以示容合好定王使劉康公聘於魯發幣於大夫晉厲公克楚使郤至告慶於周未將事王叔簡公飲之酒交酬好貨皆厚交酬飲酬之幣飲酒燕語相悅也晉羊舌肹聘于周發幣於大夫及單靖公靖公享之儉而敬賔禮贈餞視其上而從之魯語哀薑至公使大夫宗婦覿用幣用幣與大夫同幣吳伐越使來好聘獲骨焉節專車賔好幣於大夫及仲尼爵之既徹俎而宴獻酬禮畢徹俎而宴飲也客執骨而問晉語王饗禮命公胙侑胙賜祭肉侑侑幣祭祀用幣之禮肆師立大祀用玉帛牲牷立次祀用牲幣立小祀用牲先儒謂大祀天地宗廟也次祀日月星辰社稷五祀五嶽也小祀司中司命風師雨師山川百物也然典瑞祀日月星辰有圭璧祀山川有璋邸射小宰凡祭祀皆贊玉幣爵之事則用玉特大祀用幣不特次祀而巳肆師掌立國祀之禮而玉帛牲幣用否不同如此蓋始立國祀與凡祭祀異矣用幣之禮其色則天地四方各象其類大宗伯曰各放其器之色是也宗廟則玄纁雜焉聘禮制玄纁是也鄭康成曰玄纁之率玄居三纁居二其數則十端為束曾子問執束帛升聘禮玄纁束是也其長則丈八尺天子巡狩禮謂制幣長丈八尺是也其奠則或於几上或於几下曽子問奠於殯東几上聘禮奠于室中几下是也其埋則廟階之間曽子問斂幣玉藏諸兩階之間聘禮埋于西階東是也天子則職之以太宰小宰周禮太宰小宰贊幣是也諸侯則小宰曽子問世子生小宰舉幣是也大夫則祀而巳聘禮祝入取幣是也先儒謂有燔瘞之幣有禮神之幣有從爵之酬幣禮神之幣則帛在牲上若大祀用玉帛牲牷是也從爵之幣則帛在牲下若牲幣各放其器之色是也然牲幣各放其器之色則禮神者也酬幣之説於賔客有之不聞祭祀有是禮也賈公彥曰鄭以獻尸從爵之幣無文故以生人飲酒之禮况之案聘禮饗時有酬幣則獻尸後酬尸時亦有幣之從爵也饗食燕用幣之禮聘禮公於賔一食再饗燕與羞俶獻無常數賔介皆明日拜于朝上介一食一饗若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐致饗以酬幣亦如之大夫於賔一饗一食上介若食若饗若不親饗則公作大夫致之以酬幣致食以侑幣公食大夫禮賔三飯公受宰夫束帛以侑西鄉立賔降辭幣升聽命降拜公辭賔升再拜稽首受幣賔降公再拜介逆出賔北靣揖執庭實以出公降立上介受賔幣從者訝受皮若不親食使大夫各以其爵朝服以侑幣致之大夫相食侑幣束錦也若不親食則公作大夫朝服以侑幣致之郊特牲曰禮有以少為貴者圭璋特琥璜爵左氏曰虢公晉侯朝王王饗醴命之宥皆腸玉五玨馬三匹又曰王饗禮命晉侯宥又曰秦后子享晉侯歸取酬幣終事八反又曰宴有好貨詩鹿鳴曰我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將序曰既飲食之又實幣帛筐篚以將其厚意周語晉隨會聘于周定王享之肴蒸范子私於原公曰吾聞王室之禮無毁折今何禮也王曰親戚宴饗則有肴蒸酬幣宴貨以示容合好周語王叔簡公飲郤至酒交酬好貨皆厚食有侑食故有侑幣饗有酬爵故有酬幣儀禮公食大夫侑以束帛而庭實以皮大夫相食以束錦此食有侑幣也聘禮公於賔若不親食使大夫致之以侑幣致饗以酬幣亦如之大夫於賔若不親饗則公作大夫致之以酬幣致食以侑幣士婚禮舅饗送者以一獻之禮酬以束錦姑饗婦人送者酬以束錦春秋之時虢公晉侯朝王王饗醴命之宥皆賜玉五玨馬三匹秦后子享晉侯歸取酬幣終事八反魯侯享范獻子莊叔執幣此饗有酬幣也燕禮無用幣之文特鹿鳴之詩燕羣臣嘉賔言承筐是將序曰既飲食之又實幣帛筐篚以將其厚意則所謂飲食者燕與食耳此燕有酬幣也孔頴達以飲食為饗食非詩意也春秋之時定王謂隨會曰酬幣宴貨以示容合好薳啓疆曰宴有好貨又晉郤至告慶于周王叔簡公飲之酒交酬好貨皆厚飲酒宴語相説則古人燕賔未嘗不用酬幣特燕禮之文不備耳禮器曰琥璜爵鄭氏以為天子酬諸侯諸侯相酬之禮又王饗虢公晉侯皆玉五玨馬三匹左氏不譏其物而譏其數之不異是天子饗諸侯諸侯相饗酬幣用玉也諸侯食大夫大夫相食以皮帛與錦則侑幣固有差矣然公食大夫三飯而後侑則每舉不侑秦后子享晉侯歸取酬幣終事八反而每爵必酬非禮也酬幣亦謂之侑侑幣不謂之酬故春秋傳享醴皆曰宥以侑者勸酬之通稱也公食大夫飲酒實觶舂人凡饗食共其米􅐪人凡賔客共其簠簋之實饗食亦如之則食非無酒饗非無食特其所主者異耳禮書卷五十八
