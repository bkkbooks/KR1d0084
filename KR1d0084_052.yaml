body:
  text: 禮書卷五十三宋陳祥道撰大琮玉人曰大琮十有二寸射四寸厚寸是謂内鎮宗后守之鄭氏曰琮體八方射其外鉏牙賈公彦曰八角鋒各出二寸兩相并四寸也然地體方而四隅有維葢所射者四角而巳考工記曰土以黄其象方則八角之説未之聞也天子鎮圭以禮鬼神宗后内鎮其用無所經見不可考也禮大圭不瑑而大琮謂之内鎮葢亦刻鎮山以為飾而與大圭不類也夫王尊而不親故為天下之所君后親而不尊故為天下之所宗觀祀天以璧祭地以琮則后固有宗道矣故謂之宗后王駔琮后駔琮玉人駔琮五寸宗后以為權駔琮七寸鼻寸有半寸天子以為權鄭司農云以為權故有鼻也鄭康成云駔讀為組以組繫之因名焉然則駔琮與駔圭璋璧琮之駔同以為權則與璧羡起度之意同璧羡起度而度不以璧駔宗起權而權不以琮書言闗石和鈞月令言正權石荀卿言衡石稱懸此權不以琮而以石也班固言圜而環之令肉倍好此權不以琮之方而以圜也禮曰天子與后猶日之與月隂之與陽相須而後成者也故建國則王立朝后立市祭祀則王耕以共粢盛后蠶以為祭服王獻尸后亞裸王親牽射牲后親薦豆籩賔客則王裸獻后亞之王致酒后致飲玉亦王有鎮后有内鎮王有駔琮七寸后有駔琮五寸駔琮以為權而后有之者以其立市故也上公桓圭侯信圭伯躬圭子糓璧男蒲璧書曰輯五瑞修五玉如五器卒乃復周禮大宗伯以玉作六瑞以等邦國公執桓圭侯執信圭伯執躬圭子執糓璧男執蒲璧典瑞公執桓圭侯執信圭伯執躬圭繅皆三采三就子執糓璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同于王諸侯相見亦如之小行人成六瑞公用桓圭侯用信圭伯用躬圭子用糓璧男用蒲璧玉人命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之雜記曰圭公九寸侯伯七寸搏三寸厚半寸剡上左右各寸半鄭氏曰公二王之後及王之上公雙植謂之桓桓宫室之象所以安其上也信當為身身與躬圭葢皆象以人形為瑑飾文有麤縟耳欲其慎行以保身也糓所以養人蒲為席所以安人璧皆徑五寸不執圭者未成國也葢桓强立不撓而以安上為任故公圭瑑之身伸而躬屈伸者尊足以侯外而蔽内屈者卑足以長人而巳故侯伯之圭瑑之子不足以長人而可以養人故璧瑑以糓男不足於養人而可以安人故璧瑑以蒲圭者天之用璧者天之體盡其用者必盡其體得其體未必盡其用此圭璧所以不同也然王之三公八命其服七章之鷩冕其執七寸之信圭及大射則王服鷩冕故公降服毳冕降服毳冕則執躬圭而巳此禮所謂曲而殺也五玉亦謂之五器亦謂之五瑞亦謂之摰左氏曰男摰大者玉帛大宗伯作六瑞自王以下皆言執小行人成六瑞自王以下皆言用則執者自人言之也用者自玉言之也執之所以行禮用之所以合符宗伯典瑞行人皆言執特小行人言用則行禮非小行人所專掌特掌其合符之事而已若夫不施於行禮合符則寶而守之此玉人所以又言守之也覲禮侯氏入門坐奠圭拜取圭升致命王受之玉侯氏降擯者延之升成拜乃出葢於是時安玉崇玷之上明堂位所謂崇玷康圭者此也若夫壇壝宫之禮則諸侯升受王玉王授之於宰矣賈公彦曰壇上無玷當約聘禮側授宰玉其説或然易曰艮其身止諸躬也爾雅曰身我也躬身也葢屈身為躬信躬為身言信圭則身可知鄭氏改信為身不必然也桓説文作巘介圭書曰太保承介圭上宗奉同瑁詩崧高曰錫爾介圭以作爾寶韓奕曰以其介圭入覲于王爾雅曰介大也又曰圭大尺有二寸謂之玠夫王之大圭長三尺則尺有二寸所以錫諸侯者也諸侯之圭長不過九寸錫以尺有二寸使寶之而已書於介圭言太保承之於瑁言上宗奉之書之介圭即大圭也王朝日執鎮圭搢大圭見諸侯則執瑁圭而大圭不搢則太保承之耳此承與奉所以不同也孔安國以書之介圭為王之守圭長尺二寸者毛氏以崧髙韓奕之介圭為公之守圭九寸者鄭氏以崧髙之介圭為所錫之圭尺二寸者以韓奕之介圭為享玉者然王與公之守圭曰鎮圭桓圭而已不謂之介其義當從鄭氏之説王繅五采五就公侯伯繅三采三就子男繅朱緑二采再就聘王繅三采六就問諸侯繅二采再就典瑞王搢大圭執鎮圭繅藉五采五就公執桓圭侯執信圭伯執躬圭繅皆三采三就子執糓璧男執蒲璧繅皆二采再就瑑圭璋璧琮繅皆二采一就以覜聘玉人琬圭九寸而繅以象徳大璋中璋九寸邊璋七寸有繅雜記贊行人曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等藻薦玉者也三采六等以朱白蒼畫之再行也子男執璧作此贊者失之矣覲禮侯氏奠圭於繅上聘禮記曰所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白蒼問諸侯朱緣繅八寸皆𤣥纁繫長尺絢組又曰凡執玉無藉者襲曲禮執玉有藉者則裼無藉則襲左氏曰藻率鞞鞛昭其數也鄭氏謂繅所藉玉以韋衣木而畫之廣袤如其玉之大小一匝為一就葢玉之藉以繅而繅之長眡玉采以象徳之文就以象文之成君子以貞剛之質存乎内而以柔順藉之於外又有文焉然後可以行禮矣玉五采五就色不過五也公侯伯皆三采三就降殺以兩也子男二采而大夫聘王亦二采者禮窮則同也繅或作藻冕繅織絲為之則圭繅亦然鄭氏與杜預皆謂以韋為之亡據也繅可垂可屈則廣於玉矣鄭氏謂各眡其玉之大小亦亡據也雜記贊行人曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等然子男執璧則博剡者公侯伯之圭而已子男之繅二采再就則三采六等者公侯伯之繅而已鄭氏曰作此贊者失之矣其説是也然則圭繅皆有組以繫之聘禮所謂皆𤣥纁繫長尺絢組是也璧繅葢亦然春秋傳所謂楚康王再拜皆厭璧紐是也先儒以垂繅為有藉屈繅為無藉此説非也考之於禮王有以繅為之藉有以束帛為之藉有藉則裼無藉則襲特施於束帛而巳聘禮賔襲執圭公襲受玉及享則賔裼奉束帛加璧葢聘特用玉而其禮嚴享藉以帛而其禮殺此裼襲所以不同玉人曰天子圭中必則與繅之絢組異矣先儒以絢組為必是必者人有之也豈禮意哉國語曰大采朝日少采夕月韋昭謂朝日繅五采夕月三采禮書卷五十三
