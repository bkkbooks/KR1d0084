body:
  text: 禮書卷一百二十五宋陳祥道撰柷敔止籈樂記曰聖人作為椌楬書曰戛擊鳴球合止柷敔詩曰鼗鼓柷圉荀卿曰鞉柷拊椌楬似萬物眀堂位曰揩擊周禮小師掌教播鼗柷敔蓋柷敔以椌楬為體椌楬以戛揩擊為用故椌楬戛揩擊先儒皆謂之柷敔也爾雅曰所以鼓柷謂之止所以鼓敔謂之籈先儒謂柷如漆桶方二尺四寸深二尺八寸中有椎柄連底撞之令左右擊止者其椎名也敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其戛名也此以漢大豫樂言之本朝依唐制以竹為籈長二尺四寸破一端為十二筮樂將止先擊其首次三戛之蓋鼓柷謂之止欲戒止於其早也鼓敔謂之籈欲修潔於其後也柷方二尺四寸隂也敔二十七齟齬陽也樂作陽也以隂數成之樂止隂也以陽數成之固天地自然之理也聲之所出以虛為本桐虛而不實故為琴瑟糠虛而不實故為搏拊虛以虛然後可設椌以空然後可擊及其止則歸於實焉故敔為伏虎之形則實而已牘應笙師掌教舂牘應雅以教裓樂鄭司農曰牘以竹大五六寸長七尺短者一二尺虛中筒無底其端有兩空肆畫以兩手築地應長六尺五寸其中有椎竽笙禮記曰女媧之笙簧世本曰隨作笙儀禮曰二笙一和而成聲周禮笙師掌教吹竽笙爾雅曰大笙謂之巢小者謂之和先儒謂笙列管匏中施簧管端大者十九簧小者十三簧竽三十六簧笙長四尺竽長四尺二寸簧金鐷為之蓋衆管在匏有巢之象故大笙曰巢大者倡小者和小笙曰和後世雅樂和皆二十七簧外設二管不定置謂之義管每變均易調則更用焉由是定置二管於匏中為十九簧書曰笙鏞以間笙師祭祀饗食共笙鍾之樂鄭氏曰與鍾相應之笙國語曰金石以動之絲竹以行之則笙鏞雖間作其動之於始則金石而已韓非曰竽者五聲之長故竽先則鍾瑟皆隨竽唱則諸樂皆和蓋後世之樂然也簫大者一十四管小者十六管小師掌教簫管絃歌笙師掌教吹竽笙塤籥簫箎書曰笙鏞以間簫韶九成詩簫管備舉禮從以簫管書於簫言樂成詩於簫言備舉禮凡言簫多在笙竽之後則簫之奏蓋後於笙矣爾雅曰大簫謂之言小者謂之筊廣雅曰籟謂之簫莊周三人籟比竹是已荀卿曰鳳凰于飛其翼若干其聲若簫蓋簫比竹為之其狀鳳翼其聲鳳聲言與籟皆其異名也郭璞曰言二十三管長四尺筊十六管長尺二寸風俗通曰簫十管長二尺易說長尺四寸鄭氏曰簫象鳥翼鳥火禽也火生數二成數七夏時火用事二七一十四簫之長由此也舊圖雅簫長一尺四寸二十四彄頌簫長尺二寸十彄博雅云簫大者二十四管無底小者十六管有底蔡雍曰簫編竹有底長則濁短則清以密窒其底而增損之則和蓋皆述其傳然也漢元帝云吹洞簫謂之洞簫蓋無底耳禮書卷一百二十五
