body:
  text: 禮書卷一宋陳祥道撰冕服書曰天命有德五服五章哉又曰豫欲觀古人之象日月星辰山龍華蟲作會宗彞藻火粉米黼黻絺繡以五采彰施于五色作服汝明孔氏曰日月星為三辰宗廟彝尊亦以山龍華蟲為飾火為火字粉若粟米米若聚米黼若斧形黻為兩已相背葛之精者曰絺五色備曰繡周禮典絲凡祭祀共黼畫組就之物典命上公九命其衣服以九為節侯伯七命其衣服以七為節子男五命其衣服以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其衣服亦如之公之孤四命以皮帛視小國之君其卿三命其大夫再命其士一命其衣服各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其衣服各視其命之數司服掌王之吉凶衣服辨其名物與其用事王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕鄭氏曰古天子冕服十二章至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也而冕服九章登龍於山登火於宗彝尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆希以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彝也其衣三章裳二章凡五也希刺粉米無畫也其衣一章裳二章凡三也𤣥者衣無文裳則刺黻而已是以謂𤣥焉凡冕服皆𤣥衣纁裳公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服大夫之服自𤣥冕而下如孤之服士之服自皮辨而下如大夫之服凡大祭祀大賔客共其衣服而奉之辨師掌王之五冕皆𤣥冕朱裏延紐五采繅十有二就皆五采玉十有二玉筓朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉筓諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令節服氏掌祭祀朝覲衮冕六人維王之太常諸侯則四人其服亦如之郊祀裘冕二人執戈送逆尸從車行人以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賔客上公之禮冕服九章侯伯冕服七章子男冕服五章考工記曰白與黑謂之黼黑與青謂之黻五采備謂之繡土以黃其象方天時變火以圜山以章水以龍鳥獸蛇禮記王制曰制三公一命卷若有加則賜也不過九命有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老禮運曰五色六章十二衣還相為質也冕辨兵革藏於私家非禮也家語作兵車禮器曰管仲鏤簋朱紘君子以為濫矣禮有以文為貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳天子之冕朱緑藻鄭氏曰朱緑似夏商禮周禮天子五采藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也郊特牲曰祭之日王被衮以象天鄭氏謂有日月星辰之章此魯禮也周祀昊天工帝則大裘而冕戴冕璪十有二旒則天數也玉藻曰天子玉藻十有二旒前後邃延龍卷以祭𤣥端而朝日於東門之外聽朔於南門之外諸侯𤣥端以祭裨冕以朝學記曰不學雜服不能安禮明堂位曰君衮冕立于阼夫人副禕立于東房冕而總干率其羣臣以樂皇尸王后蠶於北郊以共純服夫人蠶於北郊以共冕服祭義曰易抱龜南面天子卷冕北面天子為藉千畝冕而朱紱躬秉耒諸侯為藉百畝冕而青紘躬秉耒樂記曰食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也魏文侯曰吾端冕而聽古樂武王克商散軍而郊射裨冕搢笏而虎賁之士說劔也雜記曰大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已公襲卷衣一𤣥端一朝服一素積一纁裳一爵辨二𤣥冕一褎衣一哀公問曰冕而親迎郊特牲曰𤣥冕齊戒鬼神隂陽也周辨殷冔夏收朱干設錫冕而舞大武諸侯之僣禮也明堂位曰朱干玉戚冕而舞大武皮辨素積裼而舞大夏曾子問曰大祝裨冕諸侯將適天子冕而出視朝詩大車曰毳衣如菼毳衣如璊終南曰黻衣繡裳九罭曰我覯之子衮衣繡裳采菽曰又何豫之𤣥衮及黼文王曰厥作裸將常服黼冔韓奕曰王錫韓侯𤣥衮赤舄論語曰禹致美乎黻冕又曰麻冕禮也今也純儉又曰服周之冕周語單襄公曰陳侯棄衮冕而南冠以出不亦簡彝乎又曰襄王使大宰賜晉文侯命晉侯端冕以入武宫大宰以王命命冕服魯語公父文伯之母曰王后親織𤣥紞公侯之夫人加之以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服世本曰黃帝作冕服史記曰放勛黃收純衣大戴禮曰公冠四加𤣥冕家語同黃帝黼黻大帶家語曰黃帝與炎帝戰克之始垂衣裳作黼黻又曰將郊天子皮辨以聽祭報郊之日天子大裘以黼之被裘象天既至泰壇王脫裘矣服衮以臨燔柴戴冕璪十有二旒則天數也左傳臧哀伯曰衮冕黻珽帶裳幅舄衡紞紘綖昭其度也火龍黼黻昭其文也桓公二年公與公冶冕服以卿服之冕賞之及疾聚其臣曰我死必無以冕服斂非德賞也襄二十九年子太叔曰為九文六采五章以奉五色昭二十五年伐楚之役許男卒而以衮衣斂穀梁曰辨冕雖舊必加於首公羊曰已練可以辨冕荀卿曰天子袾裷衣冕諸侯𤣥裷衣冕又曰天子山冕諸侯𤣥冠爾雅曰黼黻彰也又曰衮黻也書大𫝊曰天子衣服其文華蟲作繢宗彝藻火山龍諸侯作繢宗彝藻火山龍子男宗彝藻火山龍大夫藻火山龍士山龍又曰山龍青也華蟲黃也作繢黑也宗彝白也藻火赤也天子服五諸侯服四次國服三大夫服二士服一鄭氏曰𤣥或疑焉許慎曰衮龍繡於下幅一龍蟠阿上鄉後漢輿服志曰上古穴居而野處衣毛而冒皮後世聖人觀翬翟之文榮華之色乃染帛以效之成以為服見鳥獸有冠角􅐖胡之制遂作冠冕纓蕤凡十二章至周九章秦滅去禮學郊祀之服皆以袀𤣥蔡氏獨斷曰袀紺繒也吳都賦曰袀皂服也漢承秦故至顯宗初服旒冕衣裳文章赤舄絇屨衣裳𤣥上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇屨以承大祭冕冠垂旒前後邃延玉藻孝明皇帝永平二年初召有司采周官禮記尚書皋陶篇乘輿服從歐陽氏說公卿以下從大小夏侯氏說冕皆廣七寸長尺二寸前圜後方朱緑裏𤣥上前垂四寸後垂三寸係白玉珠為十二旒以其綬采色為組纓三公諸侯七旒青玉為珠卿大夫五旒黑玉為珠皆有前無後各以其綬采色為組纓旁垂黈纊郊天地宗祀明堂則冠之後魏明帝以公卿衮衣黼黻之文擬於至尊復損略之宋齊皆王公平冕九旒衣山龍以下九章卿七旒衣華蟲以下七章後周設司服之官掌皇帝十二服祀昊天上帝則蒼衣蒼冕祀東方上帝及朝日則青衣青冕祀南方上帝則朱衣朱冕祭皇地祇中央上帝則黃衣黃冕祀西方工帝及夕月則素衣素冕祀北方上帝祭神州社稷則𤣥衣𤣥冕享先皇加元服納后朝諸侯則象衣象冕十有二章衮冕自龍以下凡九章山冕八章鷩冕七章冕通十有二旒諸公之服九一曰方冕二曰衮冕九章三曰山冕八章四曰鷩冕七章五曰火冕六章六曰毳冕五章七曰韋辨八曰皮辨九曰𤣥冠諸侯服自方冕而下八無衮冕山冕八章鷩冕七章火冕六章毳冕五章俱八旒諸伯自方冕而下七又無山冕鷩冕七章毳冕五章火冕以下俱七等俱七旒諸子服自方冕而下六又無鷩冕火冕六章毳冕五章毳冕以下俱六等俱六旒諸男服自方冕而下五又無火冕毳冕五章冕五旒三公之服九一曰祀冕二曰火冕六章三曰毳冕五章四曰藻冕四章五曰繡冕三章六曰爵辨七曰韋辨八曰皮辨九曰𤣥冠三孤之服自祀冕而下八無火冕毳冕五章藻冕四章繡冕三章公卿之服自祀冕而下七又無毳冕藻冕四章繡冕三章上大夫之服自祀冕而下六又無藻冕繡冕三章中大夫之服自祀冕而下五又無皮辨繡冕三章下大夫之服自祀冕而下四又無爵辨繡冕三章士之服三一曰祀辨二曰爵辨三曰𤣥冠𤣥冠皆𤣥衣其裳上士以𤣥中士以黃下士雜裳雜裳謂前𤣥後黃也庶士之服一𤣥冠隋改後周制度乘輿衮冕垂白珠十有二旒服十二章皇太子衮冕垂白珠九旒服九章王國公開國公三公衮冕青珠九旒服九章侯鷩冕八旒服七章伯鷩冕七旒服七章子毳冕六旒服五章男毳冕五旒服五章唐制天子之服十四大裘冕者祀天地之服也廣八寸長一尺二寸以版為之黑表纁裏無旒衮冕廣一尺二寸長二尺四寸金飾玉簮導垂白珠十二旒鷩冕八旒七章絺冕六旒三章𤣥冕五旒裳刺黼皇太子之服六衮冕白珠九旒羣臣之服二十有一衮冕者一品之服也九旒青􅋒為珠貫三采玉鷩冕者二品之服也八旒毳冕者三品之服也七旒絺冕者四品之服也六旒𤣥冕者五品之服也以羅為之五旒衣韍無章裳刺黻一章平冕者郊廟武舞郎之服也黑衣絳裳爵辨者六品以下九品以上從祀之服也以紬為之無旒十二章之服冕十二旒旒十二王前後各用五百四十有四繅玉五采冕服之作尚矣書稱舜曰豫欲觀古人之象作服日月星辰山龍華蟲作繪宗彞藻火粉米黼黻絺繡則黼黻而上象服也象服有冕禮記曰有虞氏皇而祭夏后氏收而祭殷人冔而祭周人冕而祭則皇收而下皆冕也孔子稱禹致美乎黼冕書稱伊尹以冕服奉嗣王詩稱商之孫子常服黼冔則夏商服章蓋與古同矣古之服章十有二而日月星辰山龍華蟲繪於衣宗彝藻火粉米黼黻繡於裳則星五星也辰十二次也鄭氏釋大宗伯保章氏皆謂星五緯辰十二次華蟲雉也宗彞虎彝蜼彝也粉米粉其米也黼白黑文也黻黑青文也蓋日月星辰在天成象者也山龍華蟲虎蜼藻火粉米黼黻在地成形者也在天成象者道之運乎上在地成形者道之散乎下道固始終於東北故山龍而降始山終黻莫不有序何則山居東北冬春交也龍春也華蟲夏也虎秋也蜼冬也周而復始則藻春也火夏也粉米中央也黼秋冬交也黻冬春交也龍與華蟲陽之陽也故繪而在衣虎與蜼陽之隂也故繡而在裳然則古者合三辰以在服備十二章以則天數故章與四時相順後世判三辰以在旗而服止九章以法陽數故章與四時相變鄭康成謂周服九章登龍於山升火於宗彝以尊其神明理或然也觀周禮稱衮冕禮記稱天子龍衮又曰龍衮卷以祭上服言龍衮而不言山則升龍於山可知也司服五章之服則毳冕毳毛物毛物虎蜼也五章言毳冕而不言藻則升火於宗彞可知也升春物於冬春交之上升夏物於春之前則章與四時相變可知也禮記曰王被衮以象天則龍行天之物變化不測天道之象也康成釋禮記謂被衮有日月星辰與司服之說不同是自惑也左傳臧僖伯曰三辰旗旗昭其明也火龍黼黻昭其文也子大叔曰為九文六采五章以奉五色夫僖伯言服止於火龍大叔言色止於九文則周之衮服止於九章而無日月星辰明矣詩曰𤣥衮及黼又曰𤣥衮赤舄康成謂凡冕服皆𤣥衣纁裳特荀卿謂天子袾裷衣冕諸侯𤣥裷衣冕考之於禮王之五冕皆𤣥冕朱裏王之始冠𤣥冠丹組纓聘禮釋幣𤣥纁束昏禮納幣亦𤣥纁束聘禮之簋𤣥被纁裏昏禮之笲緇被纁裏方相氏𤣥衣朱裳銘物亦緇工頳末則𤣥緇所以體道丹黃所以象事體道者常在上象事者常在下故易稱垂衣裳以取乾坤天𤣥地黃而纁赤黃色則六服皆𤣥衣纁裳矣荀卿天子袾裷之說豈其所傳者異耶荀卿又曰天子山冕諸侯𤣥冠蓋山冕即衮冕也衮冕自登龍言之也山冕本山龍言之也考工記曰火以圜山以章水以龍爾雅釋丘曰上正章丘釋山曰上正章山禮記曰龍卷然則火圜山上正而龍卷曲矣周禮交龍為旗覲禮天子載大旗升龍降龍衣章之飾蓋亦如此則龍之一升一降乃不為亢君德之象也司服公之服自衮冕而下如王之服則公衮亦有升龍矣康成改章為獐謂天子有升龍降龍公衮無升龍誤也司尊彝有雞彞鳥彞斝彝黃彝虎彝蜼彝明堂位曰雞彝夏后氏之尊也斝彝商尊也黃目周尊也則虎彝蜼彝為有虞以前之彝可知矣先儒謂華非蟲粉非米宗彝有山龍華蟲之飾而服無宗彝之文山龍至華蟲尊者在上藻火至黼黻尊者在下皆臆論也五色備為繡葛之精者為絺孔頴達申安國之傳謂古者尚質絺纁而繡之以為祭服後代無用絺者此說是也康成讀絺為薾豈非溺於後代以疑古歟史記亦曰舜被絺衣鼓琴大裘而冕冕十二旒旒十二玉前後各采用玉百四十有四繅玉五周禮司裘掌為大裘以共王祀天之服鄭同農云大裘黑羔裘服以祀天示質止義曰以其祭天地之服故以大言之非謂裘禮侈大則義同於大射也四時祀天皆共之不限六天之大小直言祀天祭地之禮與天同則崑崙神州用大裘可知司服祀昊天上帝則大裘而冕祀五帝亦如之辨師掌王之五冕皆𤣥冕朱裏延紐冕服有六而言五冕者大裘之冕蓋無旒不聨數也節服氏郊祀裘冕二人執戈送逆尸從車裘冕者亦從尸服也裘大裘凡尸服卒者之上服禮記玉藻曰唯君有黼裘以誓省大裘非古也僣天子也天子祭上帝則大裘而冕省當為獮國君有黼裘誓獮田之禮時大夫猶有大裘禮不盛服不充故大裘不裼乘路車不式家語曰大裘以黼之既至泰壇王脫裘服衮以臨燔柴著大裘象天鄭志大裘之上又有𤣥衣梁五經博士陸瑋等大裘之制宜以黑繒為之其制式如裘其裳以纁皆無文繡冕則無旒隋始詔虞世基等憲章古制定輿乘服合八等按周禮大裘之冕無旒其服羔裘也凖禮圖以羔正黑者為之取同色繒以為領袖其裳用纁而無章飾絳襪赤舄祀圓丘感帝封禪五郊明堂雩祀皆服之今文大裘冕無旒冕廣八寸長一尺六寸深青表纁裏金飾玉簮導以組為纓色如其綬裘以黑羔皮為之黑領褾緣朱裳周官司裘掌為大裘以共王祀天之服司服祀昊天工帝則服大裘而冕祀五帝亦如之享先王則衮冕禮記曰郊之祭王被衮以象天戴冕藻十有二旒則天數也鄭司農曰大裘黑羔裘服以祀天示質也然則合周官禮記而言之王之祀天內服大裘外被龍衮龍衮所以襲大裘也記曰裘之裼也見美也服之襲也充美也禮不盛服不克故大裘不裼則襲衮可知也議者以司裘言大裘祀天而不及衮司服言大裘而冕祀昊天上帝在衮冕之上又節服氏衮冕六人維王之太常裘冕二人執戈送逆尸是衮冕與裘冕不同謂之大裘而冕則不加衮矣是不知先王祀天以冬至之日為正而裘又服之本也故取大裘以名之猶之朝服緇衣羔裘而詩獨稱羔裘如濡羔裘豹袪羔裘逍遙燕服𤣥端蠟服黃衣皆狐裘而詩獨稱狐裘以朝狐裘蒙茸狐裘黃黃則裘之上未嘗無衣也裘之上未嘗無衣而衣之下有不用裘故屨人曰凡四時之祭祀以宜服之則凡春夏秋之祀不必服裘所以適時之宜而已月令孟冬天子始大裘然則先儒謂服裘以祭地示亦非由是觀之衮冕以維太常者不必有裘裘冕以送逆尸者必有衣也記曰尸襲而不裼送逆尸者象之鄭氏曰裘冕後尸服則裘冕加衮又可知也古者犬羊之裘不裼必襲之也表裘不入公門必裼之也是裘有裼之而不襲有襲之而不裼未有表之而不裼襲者則徒服大裘而無襲非禮意也語曰䙝裘長則凡行禮之裘短矣果徒服大裘而加長焉其與䙝裘奚異哉褻衣帶下尺明衣長下膝則凡祭祀之裘蓋與明衣齊鄭志謂大裘之上又有𤣥衣此尤無據也禮記唯君黼裘以誓省大裘非古也則戒誓省視用黼裘而後世服大裘焉故記者譏之家語謂大裘黼文以象天王至泰壇脫裘服衮張融又易之以為王至泰壇脫衮服裘蓋王肅託孔子以信其說張融疑王肅以變其論然記曰郊之日王皮辨以聽祭報則前祭未嘗服大裘也又大裘無文與黼不同二者之說誤矣裘以大名之猶所謂大羹大圭取其質也夫先王祀天有文以示外心之勤有質以示內心之敬故因丘掃地陶匏藁秸疏冪樿杓素杓素車之類此因其自然以示內心之敬者也執鎮圭繅藉五采五就旗龍章而設日月四圭有邸八變之音黃鐘大吕之鈞此致其文飾以示外心之勤者也然則內服大裘以因其自然外被龍衮戴冕藻以致其文飾不以內心廢外心不以自然廢文飾然後事天之禮盡矣不特此也以神事之則有五齊以人養焉則有三酒致敬不壇而有壇焉禮曰泰壇祭天是也至質不裸而有鬯焉大宗伯凡祀大神享大鬼祭大示涖玉鬯禮記曰親耕粢盛秬鬯以事上帝是也孰謂祀天之禮一於無文哉衮冕冕十二旒旒十二玉前後各用玉百四十有四繅玉五采辨師掌王之五冕皆𤣥冕朱裏延紐五采繅十有二就皆五采玉十有二玉笄朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄鄭氏謂繅不言皆有不皆者則衮冕十二斿鷩冕九斿毳冕七斿希冕五斿𤣥冕三斿觀辨師於王言冕之表裏延紐而不及玉瑱於諸侯言玉瑱而不及冕之表裏延紐於王言繅不言斿於諸侯言繅斿不言玉數止言瑉玉三采言繅斿皆就而不言采數公之五冕皆三采言玉笄而不言紘是皆約辭以互發之則五采繅十有二就不言皆者其斿如康成之說信矣春秋傳曰上物不過十二郊特牲曰戴冕璪十有二旒則天數也玉藻曰天子玉藻十有二旒龍卷以祭是王之衮冕十有二旒也典命曰上公以九為節則上公之衮冕九旒九玉也辨師言繅十有二就以見斿亦十有二言繅斿九就以見斿與玉亦九於玉舉衮冕於諸侯舉上公之冕皆指其盛者言之也孔子曰麻冕禮也記曰玉藻前後邃延漢孫叔通之冕制版廣八寸而長倍之後方前圜後仰前俯則版質而麻飾之上𤣥為延下朱為裏約之以武設之以紐貫之以笄固之以紘五采玉則朱白蒼黃𤣥也皇氏沈氏謂五采玉依飾射侯之次從上而下初以朱次白次蒼次黃次𤣥五采玉貫偏周而復始其二采者先朱次白次蒼二色者先朱從緑玉十有二則每玉間以寸也其𤣥朱方圜俯仰如此先儒謂前低寸而辨物之德應物之事不變之體無方之用莫不該存乎其間命之曰冕者禮為應物而設故也然服飾於下隂也故司服之服六冕飾於上陽也故辨師之冕五而已猶王后之服六而追師之首飾三而已副編次則大裘衮衣同冕猶三翟同副也康成謂大裘無衮其冕無旒於經無據玉藻曰龍卷以祭其文在朝日聽朔之上則祭昊天五帝先王之類皆以玉藻龍卷此又與郊特牲象天則天數之說合矣蓋先王祭服其內明衣加以中衣其中繡黼丹朱然後加裘衮焉則大裘之所著見者領而已衮服𤣥衣纁裳而九章則龍也山也華蟲也火也宗彝也繪於衣藻也粉米也黼也黻也繡於裳前後邃延則前十二旒其玉百四十有四後十二旒玉亦百四十有四鄭氏曰旒十有二前後邃延者言皆出冕前後而坐也釋名口冕𤣥上纁下前後垂珠有文飾也其韍朱韍其帶素帶朱裏朱緑終辟執鎮圭搢大圭朝諸侯則執瑁圭佩白玉而𤣥組綬赤舄鷩冕九旒旒十三玉共玉二百一十六繅玉五采鷩冕七章鷩雉也雉之為物五色備而成章故曰夏翟亦曰華蟲猶中國謂之夏亦謂之華也司服又謂之鷩者別其名也考工記曰鳥獸蛇鳥而類於獸蛇者指其文也鄭氏曰華蟲之毛鱗有文采鷩冕以祀先公饗射然先公尊矣所服止於此者非卑之於先王以為祭則各以其服授尸尸服如是而王服衮以臨之非所以為敬故弗敢也其制亦五采繅十有二就五采玉十有二前後皆九斿共玉二百一十六𤣥衣纁裳繪於衣者華蟲火宗彝也繡於裳者藻粉米黼黻也紱帶圭佩綬舄與衮冕同然則饗射亦以鷩冕者王朝覲諸侯以衮冕故饗與賔射以鷩冕祭祀以衮冕故大射亦以鷩冕以饗與賔射殺於朝覲而大射殺於祭祀故也燕射於寢則皮辨而已賈公彥於賔射服皮辨燕射服朝服然鄭氏釋司服謂鷩冕饗射者饗食賔客與諸侯射則賔射不以皮辨矣又皮辨即王之朝服耳離而二之其說誤也左傳曰五雉為五工正爾雅有鸕諸雉鷮雉鳪音卜雉鷩雉秩秩海雉鸐山雉雗汗雉鵫雉翬雉鷂雉南方曰􅔧儔東方曰鶅北方曰鵗西方曰鷷而衣章之所取者特鷩與翬鷂耳以其文尤著故也禮書卷一
