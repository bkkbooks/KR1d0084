body:
  text: 禮書卷六十宋陳祥道撰贄儀書曰三帛二生一死贄大宗伯曰以禽作六贄以等諸臣孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞膳夫凡祭祀之致福者受而膳之以贄見者亦如之司約曰治贄之約行人曰蕃國各以其所貴寳為贄士相見禮贄冬用雉夏用腒左頭奉之下大夫相見以鴈飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結于靣左頭如麛執之聘禮賓既將公事復見之以其贄禮記曰凡贄天子鬯諸侯圭卿羔大夫鴈士雉庻人之贄匹童子委贄而退野外軍中無贄婦人之贄椇榛脯脩棗栗國語曰為贄幣瑞節以鎮之春秋之時哀姜至莊公使宗婦覿用幣左傳曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也孟子曰出疆必載質又曰庻人不傳質為臣則不敢見諸侯荀卿稱周公曰吾所執贄而見者十人還贄而相見者三十人禮云無辭不相接也無禮不相見也欲民之無相瀆也又云君子於其所尊不敢贄也故貴至於邦君賤至於庻人以至婦人童子相見不依贄不足以為禮贄而不稱徳不足以為義此玉帛禽鳥榛栗棗脩之用所以不一也儀禮士於士無辭贄有還贄大夫於士無還贄終辭贄君於其臣則受之於外臣則使儐還之大夫於常為臣者亦然士贄授受於庭貴者授於堂大夫士於君壻於舅則奠摯士常臣於大夫亦奠摯左傳言委質為臣荀卿言錯質之臣童子於所尊則委質此禮之殺也周官膳夫祭祀致福者受而膳之以贄見者亦如之則受之所以納其徳也膳之所以用其徳也然膳夫之所受膳者特禽鳥而已若玉帛則非膳夫之所受也聘禮賔見主君以圭璋不以贄訝者訝賔亦不以贄及賔即館訝將公事乃見之以其贄賔既將公事復見之以其贄鬯天子無客禮於天下而有贄禮於鬼神禮記凡贄天子鬯周禮鬯人凡王吊臨共介鬯則天子之鬯以介致之而巳鄭氏引檀弓曰臨諸候畛於鬼神曰有天王某父此王適四方舍諸侯祖廟祝告其神之辭介於是進鬯其說是也然以此為檀弓之文誤也天子宗廟之灌以圭瓉廵狩之灌以大璋中璋邊璋則贄鬯之器蓋圭璋也天子之贄不特鬯耳其執鎮圭以朝日猶諸侯執圭璧以朝君皆贄瑞也皮帛虎皮王之孤飾贄以虎豹皮公之孤飾贄以豹孤希冕書之言贄有三帛周禮言贄亦三帛周禮之三帛則王與公之孤諸侯適子之未誓者書之三帛孔安國以為諸侯世子執纁公之孤執𤣥附庸之君執黄其言雖無經見然天子廵狩卿大夫士皆以贄見於方岳之下附庸宜亦有贄矣孔氏之説蓋有所受之也鄭氏以為高陽氏之後用赤繒高辛氏之後用黒繒其餘諸侯皆用白繒然二氏之與諸侯贄以五玉而巳其謂用繒誤也大宗伯射人孤執皮帛典命曰凡諸侯之適子未誓則以皮帛繼子男公之孤四命以皮帛眡小國之君行人曰凡大國之孤執皮帛以繼小國之君玉人曰繼子男執皮帛然則古者制幣其長文有八尺其束十端其色或素或𤣥纁故婚禮納徴𤣥纁束帛聘禮釋幣與享大夫亦𤣥纁束帛享君束帛則素而巳周禮三帛之色不可以考觀天子之卿大夫飾羔鴈以繢諸侯之卿大夫飾羔鴈以布則天子之孤與公之孤其贄帛之色宜不同矣郊特牲曰虎豹之皮示服也鄭氏謂天子之孤飾贄以虎皮公之孤飾以豹皮理或然也士婚禮納徵奉帛於堂實皮於庭攝之内文兼執足左首隨入西上參分庭一在南賔致命釋外足見文主人受幣士受皮者自東出於後自左受遂坐攝皮逆退適東壁聘禮致享亦奉玉帛於堂實皮於庭攝之毛在内賔致命張皮士受皮者自後右客賔出當之坐攝之公側授宰幣皮如入右首而東孤之贄禮蓋亦類此以皮不可以上堂故也羔鴈曲禮曰飾羔鴈者以繢士相見禮下大夫相見以鴈飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結於靣左頭如麛執之先儒謂飾以繢者天子之卿大夫也飾以布者諸侯之卿大夫也諸侯之卿大夫以布則士以下無布矣昔魯侯㑹晉師于瓦范宣子執羔趙簡子中行文子皆執鴈魯於是始尚羔蓋魯禮之失至此乃復正也吕氏春秋言得伍員者位執圭漢之曹參始封執帛後遷執圭陳寔父子同時旌命羔鴈成羣魏司空征南將軍與卿校同執羔明帝詔之以執璧則先王贄禮㳂厯漢魏其大畧尚存也然周禮三公一命衮其在朝則服鷩冕服鷩冕則執信圭及王服鷩冕以大射然後公降服毳冕而執璧魏以三公執璧為常禮誤矣禮書卷六十
