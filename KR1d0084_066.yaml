body:
  text: 禮書卷六十七宋陳祥道撰廟制書舜典曰禋于六宗張髦曰六宗三昭三穆商書曰七世之廟可以觀德周禮小宗伯掌建國之神位右社稷左宗廟辨廟祧之昭穆守祧掌守先王先公之廟祧其遺衣服藏焉其廟則有司修除之其祧則守祧黝堊之祭僕大喪復于小廟始祖曰大廟髙祖以下曰小廟考工記匠人營國左祖右社廟門容大扄七個闈門容小扄三個禮記王制曰天子七廟三昭三穆與太祖之廟而七此周制七者太祖及文王武王之祧與親廟四太祖后稷商則六廟契及湯與二昭二穆夏則五廟無大祖禹與二昭二穆而已正義曰鄭氏之意天子立七廟唯謂周也鄭必知然者案禮緯稽命徴云唐虞五廟親廟四始祖廟一夏四廟至子孫五商五廟至子孫六鉤命決云唐堯五廟親廟四為始祖五禹四廟至子孫五商五廟至子孫六周六廟至子孫七鄭據此為說故謂七廟周制也周所以七者以文王武王受命其廟不毀以為二祧并始祖后稷及髙祖以下親廟四故為七也若王肅則以為天子七廟者謂髙祖之父及髙祖之祖廟為二祧并始祖及親廟四為七故聖證論肅難鄭云周文武受命之王不遷之廟權禮所施非常廟之數商之三宗宗其德而存其廟亦不以為數凡七廟者皆不稱周室禮器云禮有以多為貴者天子七廟孫卿云有天下者事七世又云自上以下降殺以兩今使天子諸侯立廟並親廟四而止則君臣同制尊卑不别名位不同禮亦異數況其君臣乎又祭法云王下祭殤五及五世來孫則下及無親之孫而祭上不及無親之祖不亦詭哉穀梁傳曰天子七廟諸侯五家語云子羔問尊卑立廟制孔子云禮天子立七廟諸侯立五廟大夫立三廟又曰逺廟為祧有二祧焉又儒者難鄭云祭法逺廟為祧鄭注周禮云遷主所藏曰祧違經正文鄭又云先公之遷主藏於后稷之廟先王之遷主藏於文武之廟便有三祧何得祭法云有二祧難鄭之義凡有數條大略如此不能具載鄭必為天子七廟唯周制者馬昭難正義云案喪服小記王者立四廟又引禮緯夏無太祖宗禹而巳則五廟商人祖契而宗湯則六廟周尊后稷宗文王武王則七廟自夏及周少不減五多不過七禮器云周旅酬六尸一人發爵則周七尸七廟眀矣今使文武不在七數既不同祭又不享嘗豈禮也哉漢侍中盧植說云二祧謂文武曽子問當太廟無虛主禮器天子七廟堂九尺王制七廟盧植云皆據周言也穀梁傳天子七廟尹更始說天子七廟據周也漢書韋𤣥成四十八人議皆云周以后稷始封文武受命石渠論白虎通云周以后稷文武特七廟又張融謹案周禮守祧職奄八人女祧每廟二人自大祖以下與文武及親廟四用七人姜嫄用一人適盡若除文武則奄少二人曽子問孔子說周事而云七廟無虛主若王肅數髙七祖之父髙祖之祖廟與文武而九主當有九孔子何云廟無虛主乎故云以周禮孔子之言為本穀梁說及小記為枝葉韋𤣥成白虎通為證驗七廟并言𤣥說為長是融申鄭之意且天子七廟者有其人則七無其人則五若諸侯廟制雖有其人不得過五此天子諸侯七五之異也王肅云君臣同制尊卑不别其義非也又王下祭殤五者非是别立殤廟七廟外親盡之祖禘祫猶當祀之而王肅云下祭無親之孫上不及無親之祖又非通論且家語云先儒以為肅之所作未足可依案周禮唯存后稷之廟不毁案昭七年傳云余敢忘髙圉亞圉注云周人不毀其廟報祭之似髙圉亞圉廟亦不毁者此是不合鄭說故馬融說立周人所報而不云廟諸侯五廟二昭二穆與大祖之廟而五大祖始封之君王者之後不為始封之君廟大夫三廟一昭一穆與大祖之廟而三大祖别子始爵者大傳曰别子為祖謂此雖非别子始爵者亦然士一廟謂諸侯之中士下士名曰官師者上士二廟禮器曰禮有以多為貴者天子七廟諸侯五大夫三士一祭法曰王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟一壇適士二廟一壇官師一廟小記曰王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之曽子問曰非禘則七廟五廟無虛主又曰諸侯相見祝史告于五廟荀子曰有天下者事七世有一國者事五世有五乘之地者事三世有三乘之地者事二世持手而食者不得立宗廟所以表積厚者流澤廣積薄者流澤狹也春秋書震夷伯之廟穀梁曰夷伯魯大夫也因此以見天子至于士皆有廟天子七廟諸侯五大夫三士二蓋德厚者流光德薄者流卑是以貴始德之本也始封必為祖書世室屋壞公羊曰周公稱太廟魯公稱世室羣公稱宫世室猶世室也世世不毁也記曰魯公之廟文世室武公之廟武世室家語曰衛將軍文子將立先君之廟於其家使子羔訪於孔子孔子曰公廟設於私家非古禮之所及天子七廟諸侯五大夫三士二庶人無廟四時祭於寢自虞至周所不變也天子七廟廟所以象生之有朝也寢所以象生之有寢也建之觀門之內不敢逺其親也位之觀門之左不忍死其親也家語曰天子七廟諸侯五廟自虞至周之所不變也是故虞書禋于六宗以見大祖周官守祧八人以兼姜嫄之宫則虞周七廟可知矣伊尹言七世之廟商禮也禮記荀卿穀梁皆言天子七廟不特周制也則自虞至周七廟又可知矣然存親立廟親親之至恩祖功宗德尊尊之大義古之人思其人而愛其樹尊其人則敬其位况廟乎法施於民則祀之以勞定國則祀之况祖宗乎於是禮以義起而商之三宗周之文武漢之孝文孝武唐之神堯文皇其廟皆在三昭三穆之外歷世不毁此所謂不遷之廟非謂祧也鄭康成之徒以喪服小記言王者立四廟則謂周制七廟文武為二祧親四廟而巳則文武不遷之廟在七廟內是臆說也王肅聖證論曰禮自上以下降殺以兩使天子諸侯皆親廟四則是君臣同等尊卑不别也又王祭殤五而下及無親之孫上不及無親之祖不亦詭哉王舜中劉歆論之於漢韓退之論之於唐其言皆與肅同蓋理之所在者無異致也諸侯五廟王制曰諸侯五廟二昭二穆與太祖之廟而五鄭氏曰太祖始封之君王者之後不為始封之君廟蓋諸侯不敢祖天子故王之子弟始為諸侯不得立出王之廟後世子孫祖其始封者而巳其或有大功德特命祀其祖先則立廟可也魯有姜嫄文王之廟鄭祖厲王是也若王者之後始封之君非有功德不可為祖則祖其先代之王者宋祖帝乙是也孔穎達曰若異姓始封如太祖之屬得立五廟從諸侯禮然王者始受命所立不過四廟諸侯初封蓋亦廟止髙祖而已謂得立五廟無是理也玉藻曰皮辨以聽朔於太廟而朔祭有牲是月祭及太祖也祭法謂王考皇考月祭之顯考祖考享嘗乃止非禮意也穀梁曰諸侯受朔于禰廟其說無據附庸五廟公侯伯子男其衣服宫室車旗等衰雖殊其立五廟一也附庸之封雖不能五十里亦國君爾故亦五廟春秋書紀季以酅入于齊公羊傳曰紀季請復五廟以存姑娣妹則附庸之廟與諸侯同可知也大夫三廟王制大夫三廟一昭一穆與太祖之廟而三鄭氏曰太祖别子始爵者雖非别子始爵者亦然鄭志答趙商謂王制商制故雖非諸侯之别子亦得立太祖之廟周制别子為太祖若非别子之後雖為大夫但立父祖曽祖三廟隨時而遷不得立始爵者為太祖也然左氏曰大夫有二宗荀卿曰大夫士有常宗則大夫有百世不遷之大宗有五世則遷之小宗是大祖之廟常不遷也特祭法曰大夫三廟考與王考皇考有廟顯考祖考無廟而鄭氏遂以為周大夫之制誤也孔穎達曰大夫三廟天子諸侯之大夫同卿即大夫也故春秋殺卿皆曰大夫其三公之廟與諸侯同於理或然適士二廟官師一廟王制士一廟祭法適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟鄭氏謂考當作皇考有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼鄭氏謂官師中士下士也上士異廟中士下士祖禰同廟然喪服傳曰都邑之士則知尊禰學士大夫則知尊祖是都邑之士立一禰廟而已其曰禰祖共廟非所聞也賈公彥曰鄭氏言諸侯之中士下士一廟則天子之士皆二廟禮言八十一元士而不别上下是以知其皆二廟也禮書卷六十七
