body:
  text: 禮書卷一百三十一宋陳祥道撰旗制周禮司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌物名者所畫異物則異名也屬謂徽識也大傳謂之徽號今城門僕射所被及亭長著絳衣皆其舊象通帛為大赤從周正色無飾雜帛者以帛素飾其側白商之正色全羽析羽皆五采繫之於旞旌之上所謂注旄於干首也凡九旗之帛皆用絳及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而已大夫雜帛言以先王正道佐職也師都六鄉六遂大夫也畫熊虎者鄉遂出車賦象其守猛莫敢犯也州里縣鄙鄉遂之官互言之鳥隼象其勇捷也龜蛇象其扞難辟害也道車象路也王以朝夕燕出入斿車水路也王以田以鄙全羽析羽五色象其文德也大閲王乘戎路建大常玉路金路不出也皆畫其象焉官府各象其事州里各象其名家各象其號事名號者徽識所以題别衆臣植之於位朝各就焉三者旌旗之細也畫畫雲氣也異於在國軍事之飾凡祭祀各建其旗王祭祀之車則玉路㑹同賔客亦如之凡軍事建旌旗及致民置旗弊之甸亦如之凡射共獲旌考工記龍旗九斿以象大火也交龍為旗諸侯之所建也大火蒼龍宿之心其屬有尾尾乃九星鳥旟七斿以象鶉火也鳥隼為旟州里之所建鶉火朱鳥宿之栁其屬有星星乃七星熊旗六斿以象伐也熊虎為旗師都之所建伐屬白虎宿與參連體而六星龜蛇四斿以象營室也龜蛇為旐縣鄙之所建營室𤣥武宿與東璧連體而四星弧旌枉矢以象弧也覲禮曰侯氏載龍旗弧韣則旌旗之屬皆有弧也弧以矢縿之幅有衣謂之韣又為設矢象弧星有矢也妖星有枉矢者蛇行有毛目此云枉矢蓋畫也夏采以乘車建綏復于四郊𤣥謂有虞氏之旗夏后氏之緌則旌旗有是綏者當作緌緌以旄牛尾為之綴於幢上所謂注旄於干首者王祀四郊乘玉路建太常今以之復去其旒異之於生亦因先王有徒緌者大司徒大軍旅大田役以旗致萬民旗畫熊虎者也鄉師凡四時之田以旗物辨鄉邑而治其政令司徒致衆庶者以熊虎之旗此又以之明為司徒考之大夫致衆當以鳥隼之旟陳之以旗物以表正其行列遂人若起野役以遂之大旗致之遂之大旗熊虎山虞及弊田植虞旗于中致禽而珥焉山虞有旗以其主山得畫熊虎澤虞及弊田植虞旌以屬禽澤虞有旌以其主澤澤鳥所集故得注析羽肆師表粢盛告潔表謂徽識正義曰於六粢之上皆為徽識小旌書其黍稷之名以表之典命上公九命其車旗衣服皆以九為節侯伯七命皆以七為節子男五命皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其車旗衣服亦如之公之孤四命其卿三命其大夫再命其士一命侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其車旗衣服各視其命之數巾車玉路建太常十有二斿以祀太常九旗之畫日月者正幅為縿斿則屬焉金路建大旗以賔同姓以封畫交龍者象路建大赤以朝異姓以封大赤通帛革路建大白以即戎以封四衛大白商之旗猶周大赤蓋象正色也木路建大麾以田以封蕃國大麾不在九旗中以正色言之則黑夏后氏所建大司馬中春教振旅司馬以旗致民中夏教茇舍辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事凡要名號徽識所以相别正義曰即上注旌旗之細皆綴於膊上中秋教治兵王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉凡旌旗有軍衆者畫異物無者帛而已書當為畫事也號也皆畫以雲氣乎中冬教大閲司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者以旌為左右和之門旗居卒間以分地節服氏祭祀朝覲衮冕六人維王之太常維之以縷玉旌十二斿兩兩以縷綴連旁三人持之禮天子旌曳地諸侯則四人田僕令獲者植旌以告獲也行人上公建常九斿侯伯建常七斿子男建常五斿曲禮曰武車緌旌緌舒垂之德車結旌前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅青青雀水鳥鳶鳴則將風鴻取飛有行列行前朱鳥而後𤣥武左青龍而右白虎招搖在上急繕其怒以此四獸為軍陳象天也畫招搖於旌旗上檀弓曰銘明旌也以死者為不可别已故以其旗識之孔子之喪公西赤為識焉設崇商也綢練設旐夏也崇崇牙旌旗飾也綢練以練綢旌之杠此旌葬乘車所建也旌之旒緇布廣充幅長尋曰旐爾雅說素錦綢杠明堂位曰魯君孟春乘大路載弧韣旗十有二旒日月之章祀帝于郊弧旌旗所以張幅也又曰有虞氏之旗夏后氏之綏商之大白周之大赤綏當為緌有虞氏當言緌夏后氏當言旗緌謂注旄牛尾於扛首所謂大麾書曰武王秉白旄以麾又曰有虞氏之緌夏后氏之綢練商之崇牙周之璧翣夏綢其扛以練為之旒商又刻繒為重牙以飾其側亦飾彌多湯以武受命以牙為飾也大傳曰殊徽號徽號旌旗之名樂記曰龍旗九旒天子之旌也所以贈諸侯也雜記曰諸侯死於道以其綏復綏當為緌緌謂旌旗之旄也去其旒而用之異於生也詩干旄曰孑孑干旄注旌於干首大夫之旃也孑孑干旟鳥隼為旟孑孑干旌析羽為旌出車曰設此旐矣建彼旄矣龜蛇曰旐旄干旄箋云設旐者屬之於干旄而建之戎車彼旟旐斯胡不斾斾鳥隼曰旟斾斾旒垂貌出車彭彭旗旐央央交龍為旗央央鮮明也六月曰織文鳥章白斾央央鳥章錯革鳥為章也白斾繼旐者也央央鮮明貌箋云織徽織也鳥章鳥隼之文章將帥以下衣皆著焉車攻曰建旐設旄搏獸于敖蕭蕭馬鳴悠悠斾旌采芑曰方叔涖止旗旐央央無羊曰牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱采菽曰君子來朝言觀其旗其旗淠淠鸞聲嘒嘒桑柔曰四牡騤騤旟旐有翩韓奕曰王錫韓侯淑旗綏章交龍為旗綏大綏也載見曰龍旗陽陽和鈴央央泮水曰魯侯戾止言觀其旗其旗茷茷閟宮曰龍旗承祀六轡耳耳𤣥鳥龍旗十乘大糦是承爾雅曰素錦綢杠以白地錦韜旗之竿纁帛縿纁帛絳也縿衆旒所著素升龍于縿畫白龍於縿令上向練旒九練絳練也飾以組用綦組飾旒之邉也維以縷用朱縷維連持之不欲令曵地周禮曰衮冕六人維王之大常是也緇廣充幅長尋曰旐帛全幅長八尺繼旐曰斾帛績旐末為燕尾者義見詩注旄首曰旌載旄於竿頭如今之幢亦有旒有鈴曰旗縣鈴於竿頭畫交龍於旒錯革鳥曰旟此謂合剝鳥皮毛置之竿頭即禮記云載鴻及鳴鳶因章曰旃以帛練為旒因其文章不復畫之周禮云通帛為旃國語吳王陳士卒百人以為徹行十行一嬖大夫建旌提鼓挾經秉枹十旌一將軍載常建鼓挾經秉枹萬人以為方陳皆白裳白旗素甲白羽之矰望之如荼王親秉鉞載白旗以中陳而立左軍亦如之皆赤裳赤旟丹甲朱羽之矰望之如火右軍亦如之皆𤣥裳𤣥旗黑甲鳥羽之矰望之如墨綏明堂位曰有虞氏之綏鄭注謂綏注旄牛尾于杠首蓋方是時未有旒縿杠旗竿飾以朱釋名曰旗期也言與衆期於下明堂位曰有虞氏之綏夏后氏之綢練商之崇牙則其制有自矣司常日月為常交龍為旗熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌則其等有辨矣然熊虎為旗而九旗亦謂之旗經傳凡言旌旗是也日月為常而諸侯之旗亦謂之常行人公侯伯子男建常是也交龍為旗天子之常亦謂之旗覲禮天子載大旗是也析羽為旌天子至大夫士之旗亦謂之旌樂記龍旗天子之旌鄉射旌各以其物是也爾雅曰素錦綢杠纁帛縿素升龍于縿練旒九飾以組維以縷蓋揭旗以枉綢杠以錦正幅為縿屬縿為旒旒亦曰斾縿以纁則旒綪矣左傳曰綪茷是也升龍素則降龍青矣曲禮曰左青龍是也蓋青陽也素隂也陽在上而降隂在下而升交泰之道也覲禮曰天子載大旗升龍降龍周禮曰交龍為旗又曰諸侯建旗則天子諸侯之旗龍章一也司馬法謂旗章夏以日月上明商以虎上威周以龍上文先儒謂諸侯畫交龍一象其升朝一象其下復然商頌曰龍旗十乘則商不聞其以虎也天子之旗亦升龍降龍不象其升朝下復也先儒又謂天子之旌高九仞仞尺諸侯七仞大夫五仞士三仞死者以尺易仞天下九尺諸侯七尺大夫五尺士三尺射禮無物則翿旌杠三仞士喪禮無銘則緇銘而杠三尺其說蓋有所受也舊圖杠首為龍首銜結綬及鈴蓋承唐制然歟太常周禮日月為常又曰建太常十有二斿周禮司常日月為常巾車王乘玉路建大常十有二斿以祀覲禮天子乘龍載大旗象日月升龍降龍郊特牲曰旗十有二旒龍章而設日月象天也魯頌與明堂位言魯用天子之禮亦曰龍旗承祀旗十有二旒日月之章左傳曰三辰旗旗昭其明也然則常有三辰升龍降龍設崇牙備弧矢弧以張縿也鄭氏謂崇牙者為重牙以飾旒之側飾之以旄垂之以鈴人臣有功則書於其上考工記曰弧旌枉矢以象弧鄭氏曰畫枉矢恐不然也明堂位曰乘大路載弧韣覲禮侯氏載龍旗弧韣左傳曰錫鸞和鈴爾雅曰有鈴曰旗書曰厥有成績紀于太常司勳凡有功者銘書於王之太常觀此則太常之制可知矣太常不特祀天而已至於拜日禮月祀方明禮四瀆禮山川秋治兵冬大閲皆載焉祀方明遂會諸侯則所㑹之旗與朝之大赤異矣治兵大閲然後田則治兵大閲之旗與田之大麾異矣鄭氏謂春夏之田用大麾秋冬建太常王之自將建大常不自將建大白然則治兵非即戎也治兵大閲未即田也孰謂行師而不建大白田而不建大麾乎然常之三辰則日月北斗而已與衣服之畫星辰不同觀曲禮曰招搖在上穆天子傳稱天子葬盛姬建日月七星蓋旗以指物則所畫者不過北斗耳漢郊祀歌曰招搖靈旗則後世旗亦畫北斗也國朝㑹要建隆中將郊祀陶榖建議取天文角攝提列星之象作攝提旗及北斗旗二十八宿旗十二辰旗龍墀十三旗五方神旗五方鳯旗四瀆旗時有貢黃鸚鵡白兔及馴象自來又作金鸚鵡玉兔馴象旗太祖又詔别造大黃龍負圖旗一黃龍負圖旗一大神旗六日旗一月旗一君王萬歲旗一天下太平旗一師子旗二金鸞旗一金鳯旗一五龍旗五凡二十一旗皆有架南郊用之其制與古異矣旗司常交龍為旗諸侯建旗巾車建大旗以賔同姓以封覲禮侯載龍旗弧韣考工記曰龍旗九斿以象大火樂記曰龍旗九旒天子之旌也詩曰龍旗陽陽龍旗承祀龍旗十乘淑旗綏章左傳曰分魯公以大路大旗史記曰龍旗九旒所以養信也爾雅曰素升龍于縿練旒九又曰有鈴曰旗先儒以為王之大常曵地諸侯之旗齊軫卿大夫齊較士齊肩觀大常之旒使人維之則曵地可知矣旒多者曵地旒少者至於齊肩侯伯建常七斿子男五斿而均於齊軫以其皆君故也春秋之時楚令尹為王旌以田芉尹無宇斷之齊欒高伐虎門公使王黑以靈姑鉟率告請斷三尺而用之以其不可與君同制則諸侯齊軫可知矣家語曰鈴旗繽紛下蟠於地後漢志龍旗九斿以齊軫熊旗五仞以齊肩龜蛇四仞以齊首禮書卷一百三十一
