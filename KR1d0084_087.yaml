front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_087-1a, image: WYG0130/WYG0130-0550c.png}
body:
  text: 禮書卷八十八宋陳祥道撰天帝之辨上周禮太宰祀五帝則掌百官之誓戒祀大神示亦如之五帝謂天神示謂天地掌次王大旅上帝則張氊案設皇邸大旅上帝祭天於圜丘國有大故而祭亦曰旅此以旅見祀也正義云下經言祀五帝則知此是昊天上帝與司服及宗伯昊天上帝一也朝日祀五帝則張大次小次司裘掌為大裘以共王祀天之服大司徒祀五帝奉牛牲羞其肆充人掌祭祀之牲牷祀五帝則繫于牢芻之三月大宗伯以禋祀祀昊天上帝以蒼璧禮天牲幣各放其器之色此禮天以冬至謂天皇太帝在北極者也凡祀大神享大鬼祭大示帥執事而卜曰宿視滌濯涖玉鬯省牲鑊奉玉齍若王不與祭祀攝位國有大故則旅上帝及四望小宗伯兆五帝於四郊大災執事禱祠于上下神示肆師類造上帝封于大神類禮依郊祀而為之封謂壇也大神社及方嶽也典瑞四圭有邸以祀天旅上帝祀天夏正郊天也上帝五帝所郊亦猶五帝殊言天者尊異之也司服祀昊天上帝則服大裘而冕祀五帝亦如之大司樂乃奏黃鍾歌大吕舞雲門以祀天神天神謂五帝及日月星辰也王者又各以夏正月祀其所受命之帝於南郊凡樂圜鍾為宫黃鍾為角大簇為徵姑洗為羽若樂六變則天神皆降可得而禮矣天神則主北辰祭法曰周人禘嚳而郊稷此謂祭天圜丘以嚳配之大祝掌六祈一曰類二曰造辨六號一曰神號神號若皇天上帝正義曰皇天北辰曜魄寶上帝大微五帝大師類上帝凡以神仕者掌三辰之法以猶鬼神示之居辨其名物以冬日至致天神人鬼致人鬼於祖廟蓋用祭天地之明日大司冦若禋祀五帝則戒之日涖誓百官小司冦凡禋祀五帝實鑊水納亨亦如之士師祀五帝則沃尸及王盥洎鑊水職金旅于上帝則共金版玉人四圭尺有二寸以祀天禮記曰大雩帝又曰以共皇天上帝之祠又曰因吉土以饗帝子郊祭帝于郊所以定天位郊社所以事上帝天子親耕粢盛秬鬯以事上帝聖人為能饗帝帝牛必在滌三月易曰王用享于帝吉先王以作樂崇德殷薦之上帝聖人亨以享上帝帝出乎震詩曰昭事上帝帝謂文王上帝臨女有皇上帝皇皇后帝昊天上帝書曰伊尹格于皇天伊陟格于上帝肆類于上帝以昭受上帝天其申命用休敢昭告于上天神后鯀堙洪水帝乃震怒不畀洪範九疇天乃錫禹洪範九疇惟天不畀允罔固亂惟帝不畀惟我下民秉為周禮有言祀天有言祀昊天上帝有言上帝有言五帝者言天則百神皆預言昊天上帝則統乎天者言五帝則無預乎昊天上帝言上帝則五帝兼存焉周官司裘掌為大裘以共王祀天之服典瑞四圭有邸以祀天大司樂若樂六變天神皆降凡以神仕者以冬日至致天神此總天之百神言之也大宗伯以禋祀祀昊天上帝司服大裘而冕以祀昊天上帝此指統乎天者言之也司服言祀昊天上帝祀五帝亦如之則五帝異乎昊天上帝也大宰祀五帝掌百官之誓戒祀大神示亦如之則五帝異乎大神也肆師類造上帝封于大神則上帝又異乎大神也掌次大旅上帝張氊案設皇邸祀五帝張大次小次則上帝異乎五帝也典瑞四圭有邸以祀天旅上帝則上帝異乎天也上帝之文既不主於天與昊天上帝又不主於五帝而典瑞旅上帝對旅四望言之旅者會而祭之之名則上帝非一帝也上帝非一帝而周禮所稱帝者昊天上帝與五帝而已則上帝為昊天上帝及五帝明矣孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝則明堂之祀上帝其為昊天上帝及五帝可知也易曰先王以作樂崇德殷薦之上帝以配祖考以配祖者天也以配考者兼五帝也合天與五帝而謂之上帝則易孝經之於周禮其義一矣周禮明其祀之大小輕重故天帝之辨如此詩書之文未嘗有稱五帝而書亦未嘗有稱昊天上帝者其稱天及上帝類皆泛言之而巳此固不可援之以議周禮也且周人明堂之制有金木水火土之五室自漢以來皆於五室以祭五帝惟晉泰始及唐顯慶中嘗議除之後亦遂復則明堂之祀五帝其來逺矣鄭康成以上帝為五帝而不及天王肅以上帝為昊天上帝而不及五帝二者之説皆與禮經不合不足信也昊天上帝之名厯代不同漢初曰上帝曰太一元始間曰皇天上帝魏初元間曰皇皇天帝梁曰天皇大帝惟西晉後齊後周隋唐乃曰昊天上帝而鄭氏以星經推之謂昊天上帝即天皇大帝名雖不同其實一也今之南郊既以昊天上帝位乎其上而壇第一等又有皇天大帝是離而兩之也宜講求以正之天帝之辨下五帝與昊天同稱帝不與昊天同稱天猶諸侯與天子同稱君不與天子同稱王周官祀五帝之禮有與天同以極其隆有與天異以致其辨故皆禋祀皆服大裘此其所同也祀帝於圜丘兆五帝於四郊此其所異也鄭氏之徒謂四圭之玉黃鍾大吕之樂夏至以祀感帝於南郊蒼璧之玉六變之樂冬日至禮天皇大帝在北極者於圜丘大皇大曜魄寶也五帝太微之帝也晉書天文志中宫鈎陳口中一星曰天皇天帝其神曜魄寶史記天官書太微三光之庭其內五星五帝坐分郊與丘以異其祀別四帝與感帝以異其禮王肅嘗攻之矣然肅合郊丘而一之則是以五帝為人帝則非夫有天地則有五方有五方則有五帝月令之五人帝伏犧神農黃帝少昊顓頊而巳春大皥夏炎帝中央黃帝秋少皥冬顓頊魏相曰太昊乘震執規司春炎帝乘離執衡司夏少皥乘兑執矩司秋顓頊乘坎執權司冬黃帝乘坤艮執繩司下土素問謂春陽氣柔而中矩秋隂升陽氣降有髙下而中衡冬陽氣居下而中權然則魏相言五帝之所司則是言五帝之所執以夏為衡以秋為矩則誤矣果以是為五帝則前此其無司四時者乎古者祀五帝必配以五人帝從以五人臣月令之五人臣春勾芒夏祝融中央后土秋蓐收冬玄冥春秋傳曰少皥氏有四叔曰重曰該曰修曰熙重為司芒該為蓐收修及熙為玄冥顓氏有子曰黎為祝融共工氏有子曰勾龍為后土然則大皥少皥以春秋之氣言之也炎帝以火土之性色言之也萬物之象勾芒於春而其氣祝融於夏其榮也以秋而蓐其發也以秋而收色以冬而玄體以冬而冥后土居中夾以君之此五人帝五人臣命名之不同也春夏秋中央之臣皆一人耳而冬有修與熙者蓋冬於方為朔於卦為艮於腎有左右於器有權衡於物有龜蛇於色有青黑則官有修熙宜矣司馬遷不紀少皥以黃帝顓頊髙辛唐虞為五帝孔安國以少昊顓氏髙辛唐虞為五帝其説與四時五行之理不合當以月令為正圜丘方丘詩序曰郊祀天地記曰因吉土以饗帝于郊兆於南郊就陽位也於郊故謂之郊又曰為髙必因丘陵為下必因川澤至敬不壇掃地而祭燔柴於泰壇祭天也瘞埋於泰折祭地也周禮郊祀二人送逆尸凡樂圜鍾為宫冬日至於地上之圜丘奏之若樂六變則天神皆降凡樂函鍾為宫夏日至於澤中之方丘奏之若樂八變則地示皆出爾雅曰邑外謂之郊又曰非人為謂之丘祀天於南郊而地上之圜丘者南郊之丘也丘圜而髙所以象天此所謂為髙必因丘陵也祭地於北郊而澤中之方丘者北郊之丘也丘方而下所以象地此所謂為下必因川澤也泰壇南郊之壇也以之燔柴泰折北郊之坎也以之瘞埋言壇則知泰折之為坎言折則知泰壇之為圜言泰則大之至也言壇折則人為之也祭祀必於自然之丘所以致敬燔瘞必於人為之壇折所以盡文宗廟之禮瘞埋於兩階之間則壇必設於圜丘之南坎必設於方丘之北矣燔柴以升煙瘞埋以達氣則燔必於樂六變之前瘞必於樂八變之前矣先王燔瘞於郊丘其牲角繭栗其牲體全脀國語曰郊禘之事有全脀其羮其器犧尊疏布冪禪杓豆登鼎爼簠簋匏爵之類詩曰于豆于登記曰器用陶匏大宗伯凡祀大神祭大示涖玉鬯省牲鑊奉玉齍記又曰以其上帝之粢盛國語曰天子親舂郊禘之盛則郊有簠簋可知也其藉蒲越藁秸記曰莞簟之安藳秸之尚其樂歌黃鍾大簇奏大吕應鍾其舞雲門咸池其鼓靁鼓靈鼓其車玉路素車其旗太常其服大裘衮冕其搢執則大圭鎮圭其位則神南靣王北靣示北靣王南靣而日月從祀則日居東月居西記言祭社之禮君南鄉於北牖下答隂之義惟此則圜丘之上王北鄉可知也記又曰大明生於東月生於西郊主日而配月則日月之位固東西設矣郊主日猶王燕則主膳夫王嫁女則主諸侯古法見君則主侍人皆致嚴於尊而郊禮於卑也其禮不過因其自然以報本反始教民嚴上而已古者郊祀大略如此而巳更秦則興鄜密上下之四畤以祠五帝至漢則增之以北畤以祠五帝秦之祠天不於圜丘謂天好隂而兆於髙山之下其祠地不於方丘謂地貴陽而兆於澤中之圓丘漢之祠天不於南郊而於甘泉其祠地不於北郊而於汾隂河東以至壇有八觚後世壇有八陛祀天其上奏樂其下非先王掃地而祭之意席有六采樂有玉女車有鸞路騂駒龍馬一切侈靡而匡衡劉向之徒邪正異同之論蜂起一時元始之間繆戾尤甚春則天地同牢於南郊冬夏則天地分祭於南郊光武兆南郊於雒陽之陽兆北郊於雒陽之隂其禮儀度數一遵元始之制而先王之禮隳廢殆盡良可悼也禮書卷八十八
