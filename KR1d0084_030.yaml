body:
  text: 禮書卷三十宋陳祥道撰后躬蠶周禮内宰中春詔后帥外内命婦始蠶于北郊以為祭服蠶于北郊婦人以純隂為尊馬質禁原蠶天文辰為馬蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣月令季春天子乃薦鞠衣于先帝為將蠶求福祥之助也鞠衣黄桑之服先帝大皡之屬正義曰依禮祭五帝帝自服大裘今薦鞠衣葢薦於神坐以其言先不言上故知非天惟太皡之屬云之屬者以蠶功既大非獨祭太皡故何氏云總祭五方之帝其所祭之處王權賀瑒熊氏等並以為在明堂是月也命野虞無伐桑柘鳴鳩拂其羽戴勝降于桑蠶將生之候也具曲植籧筐后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事后妃親桑示帥先天下也東鄉鄉時氣也是明其不常畱養蠶也畱養皆所卜夫人與世婦婦謂世婦及諸臣之妻也夏小正曰妾子始蠶執養宫事母觀去容飾也婦使縫線組紃之事蠶事既登分繭稱絲効功以共郊廟之服季夏蠶事既畢后妃獻繭乃收繭税内外命婦獻繭于后收稅者内外命婦雖就公桑蠶室其夫亦當有祭服收以近郊之稅正義曰公桑在國北近郊唐月令三月之節天子乃薦鞠衣于先帝進於太廟三月中氣后妃齋戒享先蠶而躬桑以勸蠶事季春吉已皇后享先蠶先蠶天駟也祭義曰古者天子諸侯必有公桑蠶室近川而為之築宫仭有三尺棘墻而外閉之及大昕之朝君皮弁素積下三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之歳既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副褘而受之因少牢以禮之及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱綠之𤣥黄之以為黼黻文章大昕季春朔日之朝也風戾之蠶性惡濕嵗單三月月盡之後也三盆手者三淹也凡繅毎淹大總而手振之以出緒也正義曰近川而為之取其浴蠶種便也七尺曰仭仭有三尺高一丈也棘墻者謂墻上置棘外閉謂扇在戸外閉也又曰月令三月后妃親東鄉躬桑此云二月與彼不同者按馬質云禁原蠶彼注天文辰為馬引蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣故此仲春始蠶者亦謂浴種至三月臨生蠶時又浴種乃生之故設之有異天子親耕於南郊以供粢盛王后蠶於北郊以共純服諸侯耕於東郊亦以共粢盛夫人蠶於北郊以共冕服天子諸侯莫非耕也王后夫人莫非蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也榖梁曰天子親耕以共粢盛后親蠶以供祭服國非無良農女工也以為人之所盡事其祖禰不若以已所自親者也公桑蠶室近川為之天子諸侯之禮文而有辨故耕於南郊東郊王后夫人之禮質而少變故皆蠶於北郊公桑蠶室近川為之以其便於浴蠶也築宫仭有三尺棘墻而外閉之所以謹於養蠶者也其始也天子薦鞠衣于先帝以告將蠶内宰詔后帥内外命婦以趨蠶事而后之首飾以編服以鞠衣屨以黄屨車以翟車貝靣組總有握及郊享先蠶然後東鄉而躬桑焉鄭氏曰東鄉者嚮時氣也是明其不常畱養而畱養者所卜夫人與世婦也考之祭義諸侯卜三宫之夫人世婦之吉者使入蠶室則后不常畱養可知也及繭之成夫人副褘受之三盆手則后亦副褘受之而三盆手可知也躬桑后夫人之事耳天子必薦鞠衣君必皮弁素積卜三宫夫人世婦使入蠶室者内外相成之義也故建國則王立朝后立市祭祀則王祼獻后亞之賔客則王致酒后致飲以至王耕藉后獻種王射牲后舂盛則后夫人之躬桑王與諸侯不可不與之也躬桑不過鞠衣而受繭必以副褘者重繭之成也繅必三盆手者禮成於三也三盆手猶王藉之三推也然後布于三夫人世婦之吉者使繅遂朱緣之𤣥黄之以為祭服猶庶人之終畝也晉制後乘載鉤筐後周皇后採桑三條公主五條鄉縣以下九條此齊及隋亦如之然則採桑三條與三推同其載鉤筐以後車親載耒耜不類是不純乎古也後漢蠶于東郊晉蠶于西郊宋齊蠶于西北而漢制后乘鸞輅載龍旂千乘萬騎鼓吹鉦鉞莫不咸備晉后著十二笄步搖衣青衣乘油畫雲母安車而女尚書著貂蟬佩璽後周之時后乘翠輅皆非古制薦鞠衣之禮月令季春天子薦鞠衣于先帝鄭氏曰先帝大皡之屬孔頴達曰薦鞠衣置於神坐前熊氏之徒謂其祭在明堂李林父曰進鞠衣於太廟此不可考后乘翟車巾車曰翟車貝靣組總有握鄭氏曰以翟飾車之側有握則此無葢矣如今軿車是也后所乘以出桑巾車王后五路有重翟厭翟安車翟車輦車四車有葢而翟車無葢有握鄭氏曰翟車不重不厭以翟飾車之側后所乘以出桑先蠶壇吕氏月令言薦鞠衣于先帝不言享先蠶唐月令言薦鞠衣于先帝又言享先蠶考之于古食必祭先倉竈必祭先炊視學祭先聖先師養老祭先老射祭侯師祭禡則將蠶而享先蠶葢禮然也漢儀以中牢羊豕祭蠶神曰苑窳婦人寓氏公主凡二神晉武帝時先蠶壇高一丈方二丈四出陛陛廣五尺在皇后採桑壇東南帷宫外門之外而東南去帷宫十丈在蠶室西南桑林在其東北齊為蠶壇高四尺方丈四出陛陛各廣八尺置蠶壇於桑壇東南大路東横路南壇高五尺二丈四陛陛各五尺外兆方四十步靣開一門毎嵗季春榖雨後吉日使公卿以一太牢祠先蠶黄帝氏於壇上無配如祀先農禮訖皇后乃躬桑後周皇后至蠶所以一少牢親進祭奠先蠶西陵氏神二嬪為亞獻終獻隋制先蠶壇於宫兆三里為壇高四尺季春上巳皇后服鞠衣以太牢制幣祭先蠶用一獻之禮唐制亦皇后上已享先蠶遂以親桑李林父釋月令曰先蠶天駟也先蠶之神或以為苑窳婦人寓氏公主或以為皇帝或以為西陵氏或以為天駟歴代儒者議論不一然則蠶其首馬首其性喜温惡濕其浴火月而再養則傷馬此固與馬同出於天駟矣然天駟可謂蠶祖而非先蠶者也蠶婦人之事非黄帝也史記黄帝娶西陵氏而西陵氏始蠶於志無見漢視苑窳婦人寓氏公主二人此或有所傳然也其壇或在桑壇東南或在桑壇之西其祭或少牢或太牢或一獻或三獻歴代之所尚異也然禮必皇后親享北齊使公卿祠之非古也躬桑壇國語曰司空除壇于藉藉而有壇則躬桑有壇矣掌次掌凡邦之張事而異時有宿幕于耕壇之上然則桑壇葢亦張幕歟蠶月詩曰蠶月條桑周禮仲春后帥内外命婦始蠶月令季春后妃齋戒躬桑祭義大昕之朝君卜三宫之夫人世婦之吉者使入蠶室奉種浴于川又曰嵗既單矣世婦卒蠶鄭氏曰大昕季春朔日之朝也嵗單三月月盡之後也孔穎達謂中春浴種季春再浴之理或然也荀卿賦曰夏生而惡暑則蠶有四月生者有三月生者不特春生而已然蠶馬無兩盛故原蠶者馬質禁之曲植曲薄也植槌也正義曰案方言云宋魏陳江淮之間謂之曲或謂之趨自關而西謂之薄故云曲薄方言注槌縣蠶薄柱也宋魏陳楚江淮之間謂之植自闗而西謂之槌齊謂之牂禮書卷三十
