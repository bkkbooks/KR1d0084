body:
  text: 禮書卷十五宋陳祥道撰深衣帶深衣曰帶下毋厭髀上毋厭脅當無骨者玉藻曰紳三尺三分帶下紳居二焉然則人長八尺紳三尺而居帶下之二則大帶以髙為貴而帶下四尺五寸矣考工記車人之事一柯有半謂之磬折鄭氏曰大帶以下四尺五寸磬折立則上俯故玉藻曰三分帶下紳居二焉深衣之帶當無骨者以適便為貴則其下無四尺五寸儀禮士朝祭皆緇帶則天子諸侯大夫朝祭無異帶矣深衣之帶其飾蓋若大帶歟童子錦紳玉藻曰童子錦紳并紐肆束及帶勤者有事則收之走則擁之然則童子之帶非必全錦也錦紳而已錦紳非以其有備成之文也親在致飾而已肆伸之也束組紐也紳束及帶所以為容有事則收之走則擁之所以便事鄭氏以肆為肄鞶鑑內則曰婦事舅姑衣紳又曰女鞶絲左傳桓二年王豫鄭伯以后之鞶鑑定六年衛公叔文子曰定之鞶鑑杜預曰鞶帶以鏡為飾今西方羌胡猶有之然則漢孝惠時郎侍中皆貝帶其飾蓋類婦人歟率帶雜記率帶諸侯大夫皆五采士二采鄭氏曰此謂襲尸之大帶襲事成於帶變之所以異於生布帶雜記曰大夫卜宅與葬曰有司麻衣布衰布帶因喪屨緇布冠鄭氏曰有司卜人也麻衣白布深衣而著衰焉及布帶緇布冠此服非純吉亦非純凶也蓋非純吉故布衰因喪屨布帶非純凶故深衣緇布冠斬衰腰絰象大帶絞帶象革帶公士大夫之衆臣為其君斬衰絰布帶齊衰衰以下皆絰布帶以衆臣厭於天子諸侯齊衰以下輕於斬衰故象革帶者布而已王冕服赤舄黑絇繶純皮辨服白舄青絇繶純冠辨服黑舄赤絇繶純后褘衣玄舄黃絇繶純揄狄青舄白絇繶純闕狄赤舄黑絇繶純鞠衣黃屨白絇繶純展衣白屨黑絇繶純褖衣黑屨青絇繶純周禮屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青句素屨葛屨辨外內命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之士冠禮屨夏用葛玄端黑屨青絇繶純純博寸素積白屨以魁拊之緇絇繶純純博寸爵辨纁屨黑絇繶純純博寸冬皮屨可也不屨繐屨士喪禮夏葛屨冬皮屨皆緇絇繶純組綦結于踵綦屨係也所以拘止屨也詩云玄衮赤舄又曰赤芾金舄又曰赤舄几几檀弓曰有子絲屨春秋傳曰楚子豹舄莊子曰屨方屨者知地形漢書曰孝文革舄東方朔傳鄭氏釋周禮謂復下曰舄禪下曰屨凡屨舄各象其裳之色舄有三等赤舄為上冕服之舄下有白舄黑舄后惟祭服有舄褘衣之舄下有青舄赤舄鞠衣以下皆屨耳絇繶純者同色今云赤繶黃繶青絇雜玄言之明舄屨衆多反覆以見之凡舄之飾如繢之次赤繶者王黑舄之飾黃繶者王后玄舄之飾青絇者王白舄之飾言繶必有絇純言絇亦有繶純三者相將王及后之赤舄皆黑飾后之青舄皆白飾凡屨之飾如繡次也黃屨白飾白屨黑飾黑屨青飾古者衣象裘色韠象裳色而士冠禮三屨皆象其裳之色則王及后之舄屨各象其裳之色可知也玄黃青白赤黑對方者為繢次青赤赤白白黑黑青比方者為繡次而冠禮黑屨青絇繶純白屨緇絇繶純皆比方之色特爵辨纁屨黑絇繶純絇拘也以為行戒狀如刀衣鼻在屨頭繶縫中紏也純即緣也蓋尊祭服之屨故飾從對方之色爵辨韍不曰韠而曰韎韐衣不以布而以純蓋皆尊祭服之故也則凡舄之飾如繢次屨之飾如繡次可知也絇青緇黑而繶純如之則繶從絇色可知也由是推之王之吉服九而舄三赤舄配冕服而黑絇繶純白舄配皮辨服而青絇繶純黑舄配冠辨服而赤絇繶純后之吉服六而舄屨各三玄舄配褘衣而黃絇繶純青舄配揄狄而白絇繶純赤舄配闕狄而黑絇繶純黃屨配鞠衣而白絇繶純白屨配展衣而黑絇繶純黑屨配褖衣而青絇繶純司服言舄止於赤黑言繶止於赤黃言句止於青有素屨而無飾屨有葛屨而無皮屨鄭氏謂雜玄反覆以見之理固然也觀辨師於王言冕之表裏延紐而不及玉瑱言繅而不言斿於諸侯言玉瑱而不及冕之表裏延紐言繅斿而不及玉數言繅斿皆就而不及采數禮書卷十五
