body:
  text: 禮書卷五十九宋陳祥道撰燔瘞大宗伯以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤司巫凡瘞事守瘞鄭氏曰埋牲玉也詩曰芃芃棫朴薪之槱之又曰圭璧既卒上下奠瘞詩序曰巡狩告祭柴望也書曰至于岱宗柴禮記曰天子適四方先柴又曰柴于上帝又曰燔柴於泰壇祭天也瘞埋於泰圻祭地也又曰列祭祀瘞繒韓詩外傳曰天子奉玉升柴加於牲上而燔之爾雅曰祭天曰燔柴祭地曰瘞埋祭山曰庪縣祭川曰浮沉山海經曰懸以吉玉春秋之時晉公子投璧于河鄭駟帶與子上盟用兩圭質于河王子朝用成周之寶圭于河蔡侯及漢執玉而沈曾子問曰天子將出必以幣帛皮圭告于祖禰遂奉以出反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也君薨而世子生太祝執束帛升奠幣于殯東几上遂朝奠小宰升舉幣鄭氏曰舉而下埋之階間則宗廟之瘞在既事之後矣祭天曰燔柴祭地曰瘞埋又周人尚臭而升煙瘞埋乃臭氣也則天地之燔瘞柴在行事之前矣崔靈恩謂祭天以燔柴為始祭地以瘞血為先賈公彥謂天神中非直有升煙玉帛牲亦有禮神者地示中非直有瘞埋玉帛牲亦有禮神者以為燔瘞在作樂降神之後而禮神又燔瘞之後則燔瘞之與禮神固有二玉二帛二牲矣然記曰禮有以少為貴者祭天特牲帝牛不吉以為稷牛書曰用牲于郊牛二則帝牛與稷牛凡二而巳謂帝牛有二殆不然也晉賀循謂燔牲左胖漢用牲首唐用牲脅九箇其制不一以宗廟之祭考之升首所以報陽則天地燔瘞固用首矣漢用牲首蓋禮意也周官羊人凡釁積共其羊牲犬人凡祭祀共其犬牲伏瘞亦如之鄭康成曰積柴禋祀槱燎實柴鄭司農曰瘞謂埋祭祭地曰瘞埋則燔瘞用羊犬矣此豈施於天地之從祀與夫次祀小祀者乎周魏之間燔柴皆於祭末郭璞云祭天既祭積柴燒之祭地既祭埋藏之恐先王之時祭祀事畢亦有燔瘞之禮其詳不可考也詩曰圭璧既卒書金縢稱周公曰爾之許我我其以璧與圭歸俟爾命則禮神之玉其終固燔瘞矣守瘞司巫凡祭事守瘞鄭氏云瘞謂若祭地祗有埋牲玉者守之者以祭禮未畢若有事然祭禮畢則去之其說是也唐之守瘞者至於六旬非古也釋幣聘禮賓朝服釋幣于禰天子諸侯將出告羣廟大夫告禰而已凡釋幣設洗盥如祭有司筵几于室中祝先入主人從入主人在右再拜祝告又再拜釋幣制𤣥纁束奠于几下出𤣥纁之率𤣥居三朝貢禮云純四尺制丈八尺主人立于户東祝立于牖西少頃之間示有俟於神又入取幣降卷幣實于笲埋于西階東又釋幣于行行者之先其古人之名未聞天子諸侯有常祀在冬大夫三祀曰門曰行曰厲喪禮有毁宗躐行出于大門則行神之位在廟門外西方不言埋幣可知也遂受命上介釋幣亦如之如其於禰與行覲禮侯氏裨冕釋幣于禰釋幣者告將覲也其釋幣如聘大夫將受命釋幣于禰之禮既則祝藏其幣歸乃埋之於祧西階之東曾子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南大祝裨冕執束帛升自西階盡等不升堂命毋哭諸侯之卿大夫所服裨冕絺冕也𤣥冕也士服爵辨服大祝裨冕則大夫祝聲三告曰某之子生敢告升奠幣于殯東几上哭降几筵於殯東明繼體也遂朝奠反朝夕哭位小宰升舉幣舉而下埋之階間凡告用牲幣反亦如之牲當為制字之誤也制幣一丈八尺諸侯相見必告于禰道近或可以不親告祖朝服而出視朝命祝史告于五廟所過山川山川所不過則不告貶於適天子也覲禮侯氏將朝王釋幣于禰聘禮賓將受命釋奠于禰于行皆幣而已則釋幣猶釋菜耳牲牢酒齊不預也聘禮有司筵几于室中祝先入主人從入主人在右祝告釋幣制𤣥纁束奠于几下出主人立于户東祝立于牖西又入取幣降卷幣實于笲埋于西階東覲禮侯氏釋幣于禰鄭氏謂如聘大夫釋幣于禰之禮既則祝藏其幣歸乃埋之於祧西階之東蓋聘賓釋幣于廟故舉幣而埋之侯氏釋幣于行主故舉幣而藏之行主祖之遷主也謂之禰者親之也文王世子所謂公禰與此同意曾子問曰天子諸侯將出必以幣帛皮圭告于祖禰所告蓋有用牲者矣其言止於幣帛皮圭者以其無遷主而奉此以出也曾子問又曰凡告必用牲幣反亦如之肆師凡師甸用牲于社宗則為位則不用牲者肆師不為位也蓋道或有逺近禮或有重輕故告有特用幣有兼牲幣非一端也太祝大師冝于社造于祖大會同造于廟冝于社過大山川用事焉反行釋奠鄭氏引曾子問曰凡告必用牲幣及釋曾子問則改牲幣為制幣是自惑也孔潁達曰天子諸侯出入有告有祭故告用制幣卿大夫惟入祭而已故聘禮既使而反祭用牲也然禮凡告朔告至必用牲也孰謂天子諸侯之告不皆用牲耶皇氏熊氏謂天子告用牲諸侯不用牲此尤無據告雖或用牲而其他不用牲者多矣若國大貞則奉玉帛而詔號春秋傳曰凡天災有幣無牲月令仲春之月祀不用犧牲用圭璧更皮幣以至晉侯謀以息民魏絳請祈以幣更齊饑孔子請祈以幣玉家語十凡此視其事與時而已筐詩曰不盈頃筐頃筐塈之女執懿筐維筐及筥筐之筥之承筐是將序曰實幣帛筐篚以將其厚意易曰女承筐無實儀禮公食大夫簋實實于筐聘禮夫人使大夫餼賔上介米八筐衆介米六筐記曰凡餼大夫黍梁稷筐五斛禮記曰蠶則績而蟹有筐又曰具曲植籧筐又曰熬君八筐大夫六筐士四筐毛氏曰筐畚屬說文曰方曰筐圓曰籧蓋筐有頃筐有懿筐有大筐有小筐頃筐其淺者也懿筐其深者也大筐實五斛小筐實績熬幣帛簋實而巳篚正也其深淺大小雖殊而其制皆方篚詩序曰實幣帛筐篚禹貢厥篚𤣥纁而織文絲縞之類皆以篚儀禮罍洗之西皆有篚又有上篚下篚膳篚之辨則上篚在堂下篚在庭膳篚特饌君爵而已篚之為物可以盛幣帛可以盛勺觶可以盛苴茅士虞苴刌茅長五寸束之實于篚可以代昕俎士虞佐食受肺脊實于篚可以實黍稷肆師大朝覲佐儐共設篚罋此篚之實黍者也公食大夫豆實實于罋簋實實于篚而篚者筐類也其用以實簋實宜矣鄭氏曰篚其筐字之誤歟不必然也鄭氏又曰篚竹器如笭說文曰篚如竹篋篋有蓋是以舊圖篚亦有蓋禮書卷五十九
