body:
  text: 禮書卷一百三十八宋陳祥道撰戎路周禮車僕掌戎路之萃廣車之萃蘋車之萃輕車之萃戎路革路也晉欒針曰吾有二位於戎路襄十四年左晉侯獻楚俘王賜以戎路之服僖二十八年左乾時之戰魯莊公喪戎路莊九年漢淮之軍楚鬭丹獲戎車桓公八年皆其君之所乘者也然周之鋒車曰元戎秦之兵車曰小戎則自廣車而下皆戎車也特不謂之戎路爾車僕凡師共革車㑹同亦如之戎僕掌馭戎車凡巡守及兵車之㑹亦如之㑹同巡守王雖不乘戎車猶共以從不失備也廣車車僕掌廣車之萃春秋之時齊伐衛有先驅申驅二廣啓胠大殿襄二十三年鄭人賂晉侯有廣車軘車襄十一年晉楚之戰有左右廣宣十二年鄭射大御廣而行襄二十四年史皇乘廣而死定四年鄭氏曰廣車橫陳之車闕車車僕掌闕車之萃邲之戰楚子使潘黨帥游闕四十乘從唐侯為左拒則游闕者游車補闕也蘋車車僕掌蘋車之萃鄭氏曰蘋猶屏也對敵之車也孫子八陳有蘋車之陳輕車輶車車僕掌輕車之萃鄭氏曰輕車馳敵致師之車孫武曰馳車千駟革車千乘則馳車輕車也詩曰輶車鸞鑣爾雅曰輶輕也鄭氏以輶車為田僕所設驅逆之車又以王制佐車為驅逆之車然田車以木戎車以革則驅逆之輕車與馳敵致師之輕車異也臨車衝車詩曰臨衝間間崇墉言言毛氏曰臨車衝車也蓋臨車髙衝車大髙則可以臨下大則可以突前故兵書有作臨車衝車之法墨子有備衝之篇荀卿曰渠衝入穴而求利揚子曰衝不薺皆言衝車之大也衝或作䡴說文曰陷陳車孫武曰攻城之法修其櫓輼轒輼四輪車蓋衝車之類也楚子使解楊登樓車以告宋人蓋臨車之類禮書卷一百三十八
