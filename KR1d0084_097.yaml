body:
  text: 禮書卷九十八宋陳祥道撰盞斚爵觚觶角散説附太宰祀之日贊玉幣爵之事爵所以獻齊酒不用玉爵尚質也祀大神示亦如之享先王亦如之贊玉几玉爵宗廟獻用玉爵大朝覲會同贊玉幣玉獻玉几玉爵玉爵王禮諸侯之酢爵小宰凡祭祀贊玉幣爵之事祼將之事凡賔客贊祼凡受爵之事內宰大祭祀后祼獻則贊瑶爵亦如之瑶爵謂尸卒食王既酳尸后亞獻之其爵以瑶為飾凡賔客之祼獻瑶爵皆贊謂王同姓及二王之後來朝覲為賔客者王饗燕亞王獻賔也瑶爵所以亞王酬賔也鬱人大祭祀與量人受舉斚之卒爵而飲之量人凡卒祭與鬱人受斚厯而皆飲之司士凡祭祀掌士之戒令詔相其法事及賜爵呼昭穆而進之賜爵神惠及下也梓人為飲器勺一升爵二升觚三升獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也禮記曲禮飲玉爵者弗揮月令反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒禮運醴盞以獻薦其燔炙又曰盞斚及尸君非禮也是謂僭君禮器琥璜爵又曰有以小為貴者宗廟之爵貴者獻以爵賤者獻以散尊者舉觶卑者舉角郊特牲卒爵而樂闋孔子屢歎之又曰舉斚角詔妥尸明堂位爵用玉盞仍雕加以璧散璧角又曰殷以斚少儀客爵居左其飲居右介爵酢爵僎爵皆居右祭義執爵而酳祭統尸飲五君洗玉爵獻卿尸飲七以瑤爵獻大夫尸飲九以散爵獻士及羣有司又曰尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也玉藻君若賜之爵則越席相拜稽首受登席祭之飲卒爵而俟君卒爵然後授虛爵君子之飲酒也受一爵而色灑如也二爵而言言斯禮已三爵而油油以退儀禮燕禮主人以觚獻賔賔以觚酢主人主人以象觚獻于公主人媵觚酬于賔下大夫二人媵爵二人卒觶以象觶送公公取以酬賔主人以觚獻卿又請二大夫媵爵如初二人以象觶送公公又行一爵若賔若長惟公所酬射人乃升主人獻公以爵射人遂為司正卒角觶徹爼皆坐主人以觶獻士賔媵觚于公賔卒爵以象觶奠于薦南公取之惟所賜無膳尊無膳爵大射主人以觚獻賔賔以觚酬主人主人以象觚獻公主人媵觚而酬于賔立媵爵二人媵賔爵者卒角觶以象觶送公公取以酬賔主人以觚獻大夫大夫媵爵如初以象觶送公惟公所賜主人以觚獻大夫乃獻工以爵獻不用觚工賤異之也立司正卒角觶立司射司馬遂射以觶飲不勝者侍射者飲角觶以象觶飲公司正洗散獻服不散容五升王耦及公卿大夫復射公又舉奠觶惟公所賜乃徹爼而燕主人以觶獻士賔以象觚送公公取惟所賜旅無算爵無算樂禮畢聘禮禮賔實觶以醴賔坐啐醴士冠父醮子士昏主人禮賔婦見舅姑醴皆用觶士喪斂塗朔月之奠既夕厥明之奠皆觶士虞陰厭奠觶獻尸主人廢爵主婦足爵賔長繶爵繐爵口足之間有篆特牲陰厭亦奠觶主人酳尸獻祝佐食以角獻賔兄弟以爵主婦獻尸祝佐食及賔獻尸皆以爵主人主人酬賔兄弟旅於酬尸嗣舉奠皆以觶長兄弟加獻觚利獻以散少牢主人主婦賔獻尸皆以爵有司徹主人主婦賔侑尸亦以爵酬賔用觶鄉飲鄉射獻以爵其他皆用觶燕禮主人獻酬賔賔酢主人皆以觚獻爵二人卒觶之後公象觶酬諸臣主人以爵獻工司正卒角觶之後徹爼皆坐王以觶獻士公以象觶賜諸臣大射立司正之前與燕禮同既射勝者以象觶飲公司馬正以散獻服不主人以觶獻士公以象觚惟公所賜聘禮禮賔以醴而用觶公食大夫亦酳以醴而用觶明堂位曰爵夏后氏以盞商以斚周以爵考之爾雅鍾之小者謂之棧音盞晉元興中剡縣民井中得鍾長三寸口徑四寸銘曰棧則棧卑而淺矣夏爵命之以盞蓋其制若棧然也祭統尸酢夫人執柄夫人受尸執足柄其尾也有足而尾命之以爵蓋其制若雀然也盞象棧爵象雀而斚有耳焉則三者之制可知矣明堂位言玉盞周禮言玉爵春秋傳言瓘斚則三者之飾可知矣儀禮士虞主人獻尸以廢爵主婦以足爵賔長以繶爵鄭氏謂繶爵者口足之間有篆則爵之繶猶屨之繶也主人廢爵而未有足主婦足爵而未有篆賔長則篆口足而已以虞未純吉故也然則吉禮之爵蓋全篆歟明堂位曰爵用玉盞仍雕仍雕則雕之不在夏而在周矣詩曰洗爵奠斚周禮鬱人大祭祀與量人受舉斚之卒爵而飲之盞斚先王之器也惟魯與二王之後得用焉諸侯用之則僭矣故記曰盞斚及尸君非禮也夫天下之理莫之爵者常大為物所爵者常小禽之名爵以小故也火之名爝亦以小故也爵資於導而所入者小其實一升而巳此所以謂之爵也梓人曰爵一升觚三升獻以爵而酬以觚韓詩説一升曰爵二升曰觚三升曰觶四升曰角五升曰散而爵量與梓人同觚量與梓人異者儀禮少牢有司徹皆獻以爵酬以觶鄉飲鄉射亦獻以爵酬以觶鄭氏釋梓人謂觚當為觶古書觶從角氏角氏與觚相涉故亂之耳其説是也然梓人曰獻以爵酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也一獻而三酬者獻以一升酬以三升也并而計之為四升四升為豆豆雖非飲器其計數則然鄭氏改豆為斗誤也凡獻皆以爵而燕禮大射主人獻賔獻公以觚特牲禮主人初獻以爵者禮器曰宗廟之器以小為貴貴者獻以爵賤者獻以散尊者舉觶卑者舉角特牲主婦獻以角與爵而佐食加獻以散祭統尸飲五君洗玉爵獻卿尸飲九以散爵獻士大射主人以觚獻賔及公而司馬以散獻服不是貴者以小賤者以大或獻尸或受獻一也士祭初獻以角下大夫也燕禮大射主人獻以觚下饗禮也饗禮惟不入牲其他皆如祭祀則用爵以獻可知也明堂位加以璧散璧角則天子自觶而上用玉可知也燕禮大射以象觚象觶獻公則諸侯之爵用象可知也燕禮司正飲角觶而士喪禮奠亦角觶蓋大夫飾以角士木而已喪奠用角觶攝盛也觶中觴也鄉飲鄉射記曰其他皆用觶觀士冠禮父醮子士婚主人禮賔婦見舅姑醴皆以觶聘禮禮賔士虞及吉祭與大夫吉祭陰燕之奠皆以觶公食大夫無尊亦以觶則觶之為用非適於一也先儒言諸觴皆形制同而升數異然爵如雀觚不圜孔子曰觚不觚觚哉觚哉古者破觚為圜殳體八觚壇有八觚則諸觴形制安得而同哉書稱上尊奉同王受同三宿三祭三吒則周之爵又謂之同也先儒謂爵盡也足也觚寡也觶適也角觸也散訕也又謂總名曰爵其實曰觴觴餉也此不可考要之爵觚觶角皆示戒也禮書卷九十八
