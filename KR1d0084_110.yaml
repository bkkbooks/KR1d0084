body:
  text: 禮書卷一百十一宋陳祥道撰椹質司弓矢王弓弧弓以授射甲革椹質者又曰澤共射椹質之弓矢圉師曰射則充椹質荀卿曰質的張而弓矢至焉鄭氏曰質正也植椹以為射正射甲與椹試弓習武也射義曰天子將祭必先習射於澤澤者所以擇士也射於澤而後射於射宫澤共椹質之弓矢則射於射宫不用椹質矣射椹質必以王弓弧弓充椹質必使圉師者葢椹質以强弓而後入圉師以所習而使共也先儒謂澤是宫名以其擇士於此故謂之澤葢於寛閒之處近水澤而為之其射宫天子則在廟也書傳曰嚮之取也於囿中勇力之取今之取也於澤揖讓之取則澤固有宫矣其言射宫在廟不可考也左氏昭八年習射于射宫并夾周禮射鳥氏射則取矢矢在侯高則以并夾取之鄭氏曰王射則射鳥氏主取其矢并夾鍼箭具夾讀為甲司弓矢大射燕射共弓矢如數并夾鄭氏曰并夾矢籋也賈公彦曰司弓矢有大射燕射則賔射亦同矢籋之言出於漢時也攷之儀禮大射則取矢以小臣鄉射則取矢以子弟其取矢也皆司射揖弓命之則射鳥氏之取矢葢亦如此然則取矢必以射鳥氏者以其視高者審歟弩發弦之處謂之機説文曰弩弓之臂者周禮曰司弓矢掌六弓四弩八矢之法凡弩夾庾利攻守唐大利車戰野戰凡矢枉矢絜矢利火射用諸守城車戰殺矢鏃矢用諸近射田獵矰矢茀矢用諸弋射恒矢痺矢用諸散射鄭氏曰攻守相迫近弱弩疾發也車戰野戰進退非强則不及弩無王弧恒服弦往體少者使矢不疾八矢弓弩各有四焉枉矢殺矢矰矢恒矢弓所用也絜矢鍭矢茀矢痺矢弩所用也荀卿曰魏氏之武卒操十二石之弩負矢五十箇晁錯曰平陵相逺川谷居間仰高臨下此弓弩之地也又曰弩不可以及逺與短兵同則弩特施於兵事而已繕人掌王之用弓弩則兵事亦王之所預也易曰樞機之發書曰若虞機張則機弩牙也矢人夾其陰陽以設其比夾其比以設其羽弓矢比在槀兩旁弩矢比在上下則比括也彫弓彤弓黑弓易曰弦木為弧剡木為矢書曰和之弓垂之竹矢弓人取榦之道七柘為上檍檿桑橘木𤓰荆次之竹為下禹貢荆州貢杶榦榦柘也栝栢惟箘簵楛楛可為矢考工記荆之榦妢胡之笴家語曰南山之竹不揉自直羽而鏃之傳曰董澤之蒲可勝既乎古者弓矢之材以木若竹弓以木為上以竹為下矢以竹為常以楛為異弓材謂之榦矢材謂之槀弓之長短視人之形體弓之强弱因人之志氣矢之安危以濟弓之强弱故人有上士中士下士之別則弓有六尺六寸六尺三寸六尺二寸之制往體寡來體多者王弓弧弓也往體多來體寡者夾弓庾弓也往體來體若一唐弓大弓也材强則往體寡材弱則往體多强弱中則體若一材强故利射革與質往體寡故合九而後成規材弱故利射侯與弋往體多故合五而成規强弱中故利射深體若一故合七而成規王弧王之弓唐大諸侯之弓夾庾大夫之弓王弧則彫之詩曰敦弓既堅毛氏曰敦弓畫弓也正義曰敦畫之弓王弧也荀卿何休曰天子彫弓是也唐大則彤之荀卿何休曰諸侯彤弓是也司弓矢以唐大弓授使者勞者詩以彤弓錫有功諸侯平王以彤弓錫晉文侯襄王以彤弓錫晉文公則唐大彤之可知儀禮大射鄉射大夫士用夾庾荀卿曰大夫黑弓則夾庾黑之可知然士合三而成規則六弓之外弊弓也司弓矢勾者謂之弊弓儀禮士亦用夾庾者葢士之鄉射有大夫存焉非鄉射則弊弓而已先儒謂士不用合三成規之弓周禮託士而言其説無據明堂位穀梁曰大弓天子之戎器公羊曰弓繡質繡質繡其拊也葢魯之大弓亦彫天子之弓亦繡質不然不可謂之天子之戎器也天子諸侯大夫士之弓以强弱辨其等以安危因其躬辨其等所以明分因其躬所以利用然王之田獵未嘗不以夾庾學射未嘗不以唐大所謂合九合七合五合三者其大致然也禮書卷一百十一
