body:
  text: 禮書卷四十九宋陳祥道撰孰説文曰閭里門也爾雅曰門側之堂謂之孰尚書大傳曰大夫七十而致仕老其鄉里大夫為士師士為少師嵗事已畢餘子皆入學距冬至四十五日始出學傅農事上老平明坐於右孰庶老坐於左孰餘子畢出然後歸夕亦如之上老父師也庶老少師也食貨志亦曰春將出民里胥平旦坐於右孰鄰長坐於左孰畢出然後歸夕亦如之蓋古者合二十五家而為之門孰坐父師少師於此所以教之學也坐里胥鄰長於此所以教之耕也書言先路在左孰之前次路在右孰之前先路象路也次路木路也象路貴於木路而象路在左孰木路在右孰則左孰者東孰也里胥尊於鄰長而里胥在右孰鄰長在左孰則右孰者西孰也何則自內視外則左東而右西自外視內則左西而右東也曲禮曰主人入門而右客入門而左此左西而右東也又曰公事自闑東私事自闑西此左東而右西也然則書言左孰史言右孰皆西孰也自內外言之異耳漢之時閭里亦有門史稱石慶入里門是也庠鄉有庠序州有序孟子曰庠者養也序者射也鄉飲酒尊兩壺于房户之間鄉射尊于賔席之東蓋鄉飲在庠而庠有房室故尊于房户之間鄉射在序而序無房室故尊於賔席之東而已鄉射禮豫鄭氏曰今文豫為序則鉤楹內堂則由楹外堂序也序則物當棟堂則物當楣是於其有室則所揖所履之位淺而前於其無室則所揖所履之位深而後爾雅曰東西墻謂之序序之名蓋本於此鄉官書考之法閭胥聚民無常時族師屬民有常月族師嵗屬以月吉與春秋黨正嵗屬以孟吉與正嵗州長嵗屬以正月之吉與春秋然後卿大夫三年大比之以卑者其職煩尊者其事簡也由黨正而下有所讀有所書州長則有所讀無所書而有所考鄉大夫則考而興之無所讀敬敏任恤易知者也故閭師書之孝悌睦姻有學難知者也故族師書之德行則非特孝悌也道藝則非特有學也故黨正書之書之者易考之興之者難故書之止於黨正考之在州長興之在鄉大夫以卑者其責輕尊者其任重也凡此皆教之有其術養之有其漸方其在學也一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達強立而不反謂之大成此中年考校之法也大胥掌國學士之版春合舞秋合聲於其合聲則頒次其所學而辨異之諸子掌國子之倅春合諸學秋合諸射以考其藝而進退之此比年考校之法也學之考校如此鄉之考察又如彼所掌非一人所積非一日此人人所以莫不激昂奮勵以趨上之所造也齊桓公為軌里連鄉之法正月之朝鄉長復事君親問焉曰於子之鄉有居處好學慈孝於父母聰惠質仁發聞於鄉里者有則以告有而不以告者謂之蔽明其罪五有司已事而竣桓公又問曰於子之鄉有拳勇股肱之力秀出於衆者有則以告有而不以告者謂之蔽賢其罪五有司已事而竣桓公又問曰於子之鄉有不慈孝於父母不長悌於鄉里驕淫暴戾不用上令者有則以告有而不以告者謂之下比其罪五有司已事而竣是故鄉長退而修德進賢桓公親見之遂使役官及五屬大夫復事其言亦然此亦古者鄉舉之遺意也秀選俊造進士升論之法王制曰命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之蓋秀於一鄉謂之秀士升於所選謂之選士俊士以其德之敏也造士以其材之成也進士以其將進而用之也選士升於司徒而不征於鄉俊士升於學而不征於司徒俊士亦謂之造士蓋學至於此材成德敏非可一名命之也傳曰十人曰選百人曰俊此論其大致然也古之六卿其分職也未嘗不通其聫事也未嘗不分司徒掌邦教司馬掌邦政未嘗不分也有發則司徒教士以車甲升造士則司馬辨論官材未嘗不通也周官大司馬之屬司士曰以德詔爵此司馬辨論官材之謂也尚書大傳曰古之帝王者必立大學小學使公卿之太子大夫元士之適子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故入小學知父子之道長幼之序入大學知君臣之義上下之位故小師取小學之賢者登之大學大師取大學之賢者登之天子以為左右漢志曰八嵗入小學學六甲五方書計之事始知室家長幼之節十五入大學學先聖禮樂而知朝廷君臣之禮其有秀異者移鄉學于庠序庠序之異者移國學于少學諸侯嵗貢少學之異者於天子學于大學命曰造士行同能偶則别之以射然後爵命焉凡此其言詳略與王制雖少異其實皆先王之遺迹也簡不帥教之法王制曰命鄉簡不帥教者以告耆老皆朝于庠元日習射上功習鄉上齒大司徒帥國之俊士與執事焉不變命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右如初禮不變移之郊如初禮不變移之遂如初禮不變屏之遠方終身不齒又曰王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉屏之遠方西方曰棘東方曰寄終身不齒然則鄉簡不帥教者至于四不變然後屏之小樂正簡國子之不帥教止於二不變則屏之者先王以匹庶之家為易治膏梁之性為難化以其易治故鄉遂之所考常在三年大比之時以其難化故國子之出學常在九年大成之後三年而考故必在於四不變然後屏之九年而簡焉則雖二不變屏之可也古之學政其輕者有觥撻其重者不過屏斥而已若夫萬民之不服教其附于刑者歸于士禮書卷四十九
