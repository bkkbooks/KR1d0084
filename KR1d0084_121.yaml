body:
  text: 禮書卷一百二十二宋陳祥道撰晉鼓考工記韗人為皋陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正先儒以為晉鼓其説是也鼓人之六鼓有靁鼔靈鼔路鼔鼖鼓晉鼔皋鼓而路鼔以上不特左右端兩面而已鼖鼔不特長六尺六寸而已則長六尺六寸左右端廣六寸其為晉鼓可知鼔人以晉鼓鼓金奏鎛師掌金奏之鼓鍾師以鼓奏九夏此所以謂懸鼓也詩曰應田懸鼔眀堂位曰周人懸鼔禮器曰懸鼓在西然司馬春振旅軍將執晉鼓吳與越戰載常建鼓韋昭曰將軍執晉鼓晉鼓建謂為楹而植之葢晉鼓建之於軍猶路鼓建之於寢非此則不建矣靁鼓靈鼓路鼓鼓人靁鼓鼔神祀靈鼓鼓社祭路鼓鼓鬼享大司樂靁鼓靁鼗靈鼓靈鼗路鼓路鼗鄭康成曰靈鼔八面靈鼓六面路鼓四面葢以韗人為晉鼓鼛鼔鼖鼔三者非祭祀之鼔而兩面則路鼔宜四面靈鼓宜六面靁鼔宜八面亦或有所傳然也鄭司農曰靁鼓六面靈鼓四面路鼔兩面葢靁天聲也靁鼔鼔神祀而救日月亦天事也鼓人救日月則詔王鼔先儒以為鼓用靁鼓是也靈地徳也靈鼔鼔社祭而攻猛獸亦地事也㝠氏攻猛獸以靈鼓毆之是也路鼔鼔鬼享而田獵達窮者與遽令亦用之司馬振旅王執路鼓大僕建路鼓于大寢之門外以待達窮者與遽令是也晉鼓鼓金奏而田獵亦用之司馬振旅將軍執晉鼓是也鼓人言詔王鼓大僕言軍旅田役贊王鼓戎右詔贊王鼓鄭氏曰王通鼔佐擊其餘面賈公彥曰王擊一面大僕戎右佐擊兩面惟前一面不擊由此觀之則路鼔四面又可知也蓋詔則不賛詔賛則不特詔而已大僕戎右皆言賛王鼓則與鼔人所謂詔者異矣鼖鼔韗人鼔長八尺鼓四尺四尺鼓面也中圍加三之一謂之鼖鼔鼔人鼖鼓鼓軍事司馬中春振旅諸侯執鼖鼔司馬法曰十人之長執鉦百人之師執鐸千人之師執鼙萬人之師執大鼔鎛師凡軍之夜三鼜皆鼔之鄭氏謂鼔之以鼖鼔司馬法曰昏鼓四通為大鼜夜半三通為晨戒平旦五通為𤼵眀此所謂三鼜也掌固亦曰夜三鼜以戒號葢鼖鼓之於軍晝以作衆夜以警之書言鼖鼔在西序詩言鼖鼔維鏞則此鼖鼔與鼓軍事者異矣是以周人尚之沈約宋書樂志曰長丈二尺曰鼜鼔凡守備及役事鼓之然鄭氏云鼖鼔長八尺鼜鼔長丈二尺鼜鼔役事不謂之鼜則沈約之言誤矣提鼔大司馬春振旅師帥執提鄭氏曰馬上鼔有曲木提持鼔立馬髦上者故謂之提賈公彦曰鄭氏據當時有單騎舉以況周其實周時無騎法也然左傳稱齊魯相遇以鞍為几禮記稱前有車騎史記稱趙靈王胡服騎射葢古者國容以車軍容或有騎禮書卷一百二十二
