body:
  text: 禮書卷一百二十二宋陳祥道撰晉鼓考工記韗人為皋陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正先儒以為晉鼓其說是也鼓人之六鼓有靁鼓靈鼓路鼓鼖鼓晉鼓皋鼓而路鼓以上不特左右端兩面而已鼖鼓不特長六尺六寸而已則長六尺六寸左右端廣六寸其為晉鼓可知鼓人以晉鼓鼓金奏鎛師掌金奏之鼓鍾師以鼓奏九夏此所以謂懸鼓也詩曰應田懸鼓眀堂位曰周人懸鼓禮器曰懸鼓在西然司馬春振旅軍將執晉鼓吳與越戰載常建鼓韋昭曰將軍執晉鼓晉鼓建謂為楹而植之蓋晉鼓建之於軍猶路鼓建之於寢非此則不建矣靁鼓靈鼓路鼓鼓人靁鼓鼓神祀靈鼓鼓社祭路鼓鼓鬼享大司樂靁鼓靁鼗靈鼓靈鼗路鼓路鼗鄭康成曰靈鼓八面靈鼓六面路鼓四面蓋以韗人為晉鼓鼛鼓鼖鼓三者非祭祀之鼓而兩面則路鼓宜四面靈鼓宜六面靁鼓宜八面亦或有所傳然也鄭司農曰靁鼓六面靈鼓四面路鼓兩面蓋靁天聲也靁鼓鼓神祀而救日月亦天事也鼓人救日月則詔王鼓先儒以為鼓用靁鼓是也靈地德也靈鼓鼓社祭而攻猛獸亦地事也冥氏攻猛獸以靈鼓毆之是也路鼓鼓鬼享而田獵達窮者與遽令亦用之司馬振旅王執路鼓大僕建路鼓于大寢之門外以待達窮者與遽令是也晉鼓鼓金奏而田獵亦用之司馬振旅將軍執晉鼓是也鼓人言詔王鼓大僕言軍旅田役贊王鼓戎右詔贊王鼓鄭氏曰王通鼓佐擊其餘面賈公彥曰王擊一面大僕戎右佐擊兩面惟前一面不擊由此觀之則路鼓四面又可知也蓋詔則不贊詔贊則不特詔而已大僕戎右皆言贊王鼓則與鼓人所謂詔者異矣鼖鼓韗人鼓長八尺鼓四尺四尺鼓面也中圍加三之一謂之鼖鼓鼓人鼖鼓鼓軍事司馬中春振旅諸侯執鼖鼓司馬法曰十人之長執鉦百人之師執鐸千人之師執鼙萬人之師執大鼓鎛師凡軍之夜三鼜皆鼓之鄭氏謂鼓之以鼖鼓司馬法曰昏鼓四通為大鼜夜半三通為晨戒平旦五通為發眀此所謂三鼜也掌固亦曰夜三鼜以戒號蓋鼖鼓之於軍晝以作衆夜以警之書言鼖鼓在西序詩言鼖鼓維鏞則此鼖鼓與鼓軍事者異矣是以周人尚之沈約宋書樂志曰長丈二尺曰鼜鼓凡守備及役事鼓之然鄭氏云鼖鼓長八尺鼜鼓長丈二尺鼜鼓役事不謂之鼜則沈約之言誤矣提鼓大司馬春振旅師帥執提鄭氏曰馬上鼓有曲木提持鼓立馬髦上者故謂之提賈公彥曰鄭氏據當時有單騎舉以況周其實周時無騎法也然左傳稱齊魯相遇以鞍為几禮記稱前有車騎史記稱趙靈王胡服騎射蓋古者國容以車軍容或有騎禮書卷一百二十二
