body:
  text: 禮書卷一百四十宋陳祥道撰軫軫一曰收一曰車枕輿後横木也軫圍尺一寸六分車廣以一為之軫圍其厚與轐共七寸其長六尺輿人謂輿為車輪人以軫名輿則輿可謂之車亦可謂之軫故鄭氏謂軫輿後横木又謂軫輿也輈人以軫方對葢圓則方軫方輿也秦詩以俴收為淺軫淺輿也孔穎達謂車前後横木皆曰軫自後軫至前軫淺於乗車故曰俴然考之於禮車前有軌有隂而已不聞其有軫也説文亦曰軫輿後横木轐轐輿下銜軸者也一曰伏兔一曰車屐賈公彦曰軸上有伏兔伏兔尾後上載車軫軫始有輿則軸去地三尺三寸與伏兔及軫七寸總四尺也伏兔尾戴而輈踵亦承軫則軫之所乗者三木也伏兔之下則有革説文謂音閔是也伏兔之前則輈有漆輈人所謂良輈環灂自伏兔不至軓七寸是也轂有賢有軹有藪有篆有幬老子曰三十輻共一轂考工記曰轂也者以為利轉也望其轂欲其眼魚懇也進而眡之欲其幬疇之廉也椁其漆内而中詘之以為之轂長以其長為之圍輪之漆内六尺四寸是為轂長三尺二寸圍徑一尺三分寸之一五分其轂之長去一以為賢去三以為軹容轂必直陳篆必正施膠必厚施筋必數幬必負榦三分其轂長二在外一在内以置其輻轂長三尺二寸者令輻廣三寸半則輻内九寸半輻外一尺九寸則轂長三尺二寸圍徑一尺三分寸之二三分轂長二在外一在内以置其輻其穿大者謂之賢小者謂之軹其當輻菑者謂之藪藪亦謂之壺中賢嚮内軹嚮外皆金為之五分其轂之長去一以為賢去三以為軹鄭氏謂去一當為去二去二則金厚一寸大穿徑四寸五分寸之二小穿徑二寸十五分寸之四如是乃與藪相稱理或然也轂之飾施膠筋漆而采以約之謂之篆詩所謂約軧是也革以幔之謂之幬所謂幬必負榦是也軹在外轂之大穿曰賢小穿曰軹則軹轂末也亦謂之轊轊或作衛又謂之軓少儀曰祭左右軓范鄭氏謂軓軹同謂轊頭輿人三分較圍去一以為軹圍三分軹圍去一以為轛圍則軹又輢之衡植者也與轂末之軹不同輻輪崇六尺有六寸轂徑一尺三分寸牙圍尺一寸則輻長二尺有奇矣藪徑三寸九分寸之五而輻廣如之則輻圍九寸有奇矣記曰望其輻欲其揱蕭爾而纎也進而眡之欲其肉稱也眡其綆欲其蚤之正也綆輪葅也察其菑蚤不齵五溝反則輪雖敝不匡凡輻量其鑿深以為輻廣故竑其輻廣以為之弱鄭氏曰弱菑也今人謂蒲本為弱三分其輻之長而殺其一則雖有深泥亦弗之溓也三分其股圍去一以為骹圍則輻之入牙者謂之爪近牙謂之骹入轂謂之菑近菑謂之股菑亦謂之弱則股菑𢎞而骹爪殺矣骹爪殺故望之則揱爾而纎用之則雖有深泥而弗之溓𢎞殺稱故謂之肉稱牙考工記言凡揉牙則牙揉木為之矣六分其輪崇以其一為之牙圍則牙圍尺一寸矣三分其牙圍而漆其二則漆者七寸三分寸之一不漆者三寸三分寸之二矣記又曰眡其綆欲其蚤之正也綆三分寸之二鄭氏謂綆闗東謂之餅輪箄也葢鑿牙而其孔向外侵三分寸之二則輻股外箄輻股外箄則車不淖矣牙亦謂之罔亦謂之渠亦謂之輮行澤者仄輮行山者仄輮仄輮則木心在外而泥不溓反輮則表裏相依而沙石不能以破碎禮書卷一百四十
