  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_004-1a, image: WYG0130/WYG0130-0026a.png}
body:
  text: 禮書卷四宋陳祥道撰諸侯祭服𤣥冕三旒繅就與玉如其命之數𤣥端衣祭統曰夫人蠶于北郊以共冕服又曰君純冕立于阼玉藻曰諸侯𤣥端以祭裨冕以朝鄭氏謂諸侯祭宗廟之服惟魯及二王之後衮冕餘皆𤣥冕考之雜記大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已以其致隆于公不敢與已同其服則諸侯以鷩毳希冕祭于王端冕祭于已宜矣然玉藻𤣥端以祭言其服也𤣥端無章則三旒之冕可知鄭氏易端為冕過矣𤣥端素端如之其色不同周禮司服其齊服有𤣥端素端鄭司農云衣有襦裳者為端鄭康成云變素服言端者明異制端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫已上侈之侈之者蓋半而益一焉半而益一則其袂三尺三寸袪尺八寸正義曰衣袂二尺二寸喪服記文故云衣二尺有二寸注云此謂袂中也言衣者明與身參齊是謂𤣥端之身長二尺二寸今兩邊袂亦各屬一幅幅長二尺二寸上下亦廣二尺二寸故云屬幅廣袤等袤則長也言皆者𤣥端素端二者同也云其袪尺二寸者據玉藻深衣之袪尺二寸而言也云大夫已上侈之侈之者蓋半而益一焉半而益一則其袂三尺三寸袪尺八寸者此亦無正文按雜記云凡辨絰服其衰侈袂少牢主婦衣綃衣亦云侈袂侈大也鄭以侈為大即以意為半而益一以解之也孔子大袂單衣亦如此也內則曰子事父母冠緌纓端韠紳端𤣥端士服也玉藻天子𤣥端而朝日於東門之外端當為冕卒食𤣥端而居諸侯𤣥端以祭端亦當為冕朝𤣥端夕深衣謂大夫士也無君者不二采大夫去位宜服𤣥端衮衣小記除殤之喪者其祭也必𤣥冠𤣥端黃裳而祭不朝服未純吉也於成人為釋襌之服樂記魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧端𤣥衣也雜記曰端衰喪車皆無等喪者衣衰及所乘之車貴賤同衣衰言端者𤣥端吉時常服喪之衣衰當如之子羔之襲素端一公襲卷衣一儀禮士冠緇布冠𤣥端𤣥裳黃裳雜裳可也緇帶爵韠此暮夕於朝之服𤣥端則朝服之衣易其裳耳上士𤣥裳中士黃裳下士雜裳賔如主人服贊者𤣥端從之冠者既冠乃易服服𤣥冠𤣥端爵韠見于君見於鄉大夫鄉先生易服不朝服者非朝事也特牲饋食禮主人冠端𤣥論語公西華曰宗廟之事如㑹同端章甫願為小相焉荀卿曰端衣𤣥裳絻而乘路志不在於食葷大戴禮曰武王端冕而受丹書左氏劉定公曰吾端委以治民臨諸侯禹之力也晏平仲端委以立于虎門晉語董安于曰臣端委以隨宰人周語曰晉侯端委以入武宫韋昭曰此士服也諸侯之子未受爵命服士服也榖梁曰免牲者為之緇衣纁裳有司𤣥端奉送至于南郊僖三十一年吳夷狄之國也被髮文身欲因魯而請冠端而襲襲衣冠端𤣥端鄭氏釋士冠禮謂爵辨純衣絲衣也餘衣皆用布惟冕與爵辨用絲耳賈公彥曰此據朝服皮辨服𤣥端服及深衣長衣之等皆布為之是以雜記云朝服十五升布𤣥端亦朝服之類皮辨亦是天子朝服深衣或名麻衣故知用布也素端司服言及諸侯孤卿大夫士之服而繼之以其齊服有𤣥端素端則𤣥端素端非特士之齊服而已鄭氏曰端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之侈之者蓋半而益一則其袂三尺三寸袪尺八寸然謂之端則衣袂與袪廣袤等矣無大夫士之辨也果士之袪殺於袂尺非端也大夫之袪侈以半而益一亦非端也深衣之袂圜長衣之袂長弔祭及餘衣之袂侈司服凡弔事辨絰服雜記凡辨絰服其衰侈少牢主婦衣綃衣侈袂儒行曰孔子衣逢掖之衣荀卿曰共衣逢則𤣥端之袂端可知矣古者端衣或施之於冕或施之於冠大戴禮曰武王端冕而受丹書樂記曰魏文侯端冕而聽古樂荀卿曰端衣𤣥裳絻而乘路此施於冕者也冠禮冠者𤣥端緇布冠既冠易服服𤣥冠𤣥端特牲禮主人冠端𤣥內則子事父母冠緌纓端黻韠劉定公曰吾端委以治民董安于曰臣端委以隨宰人公西華曰宗廟之事如會同端章甫以至晉侯端委以入武宫晏平仲端委以立于虎門此施之於冠者也蓋𤣥端齊服也諸侯與士以為祭服玉藻𤣥端以祭特牲冠端𤣥是也大夫士以為私朝之服玉藻朝𤣥端是也天子至士亦以為燕服玉藻天子卒食𤣥端而居內則事父母端韠是也然則端衣所用固不一矣記曰齊之𤣥也以隂幽思也故祭之冕服皆𤣥齊之端衣亦𤣥若夫朝服天子以素諸侯以緇未聞以𤣥端也儀禮大夫祭以朝服士祭以𤣥端冠禮主人朝服既冠冠者服𤣥端雜記公襲朝服一𤣥端一襚禮自西階受朝服自堂受𤣥端則朝𤣥端異矣𤣥端皆𤣥裳或黃裳雜裳可也鄭氏曰上士𤣥裳中士黃裳下士雜裳雜裳前𤣥後黃荀卿曰端衣𤣥裳絻而乘路志不在於食葷蓋齊則衣裳皆𤣥非齊則裳不必𤣥未聞以素裳也鄭氏釋儀禮謂𤣥端即朝服之衣易其裳耳釋玉藻曰朝服冠𤣥端素裳此說無據服𤣥端者冠則緇布冠齊則𤣥冠特天子齊用冕燕則𤣥冠而已然齊或用素端則其冠不𤣥矣鄭氏曰素端為札荒有所禱請是也綖鄭氏曰延冕之覆在上辨師掌王之五冕皆𤣥冕朱裏延紐禮記天子玉藻十有二旒前後邃延左傳曰衡紞紘綎國語曰夫人織紘綖先儒謂延冕上覆古者績麻三十升布上𤣥下朱以表裏冕版三十升則麻之尤精者也書稱康王麻冕黼裳卿士邦君麻冕蟻裳太保太史太宗皆麻冕彤裳孔子曰麻冕禮也今也純儉顔淵問為邦孔子曰服周之冕則古者五冕皆麻至孔子時乃去麻用純然郊冕猶用麻所以示復本也故荀卿曰郊之麻冕喪服之先散麻一也武鄭氏曰武冠卷也古者冠卷殊紐辨師五冕皆紐鄭氏曰紐小鼻在武上笄所貫也蓋武冠卷也古者居冠屬武則非燕居武不屬於冠也喪冠條屬則非冇喪者纓武異材也鄭氏曰條屬者通屈一條繩若布為武垂下為纓屬之冠子姓之冠縞冠𤣥武不齒之冠𤣥冠縞武則非子姓與不齒者冠武同色也雜記曰委武𤣥縞而后㽔鄭氏謂秦人曰委齊東曰武則武亦謂之委以其若冠之足故曰武以其委於下故曰委蓋古者施冠於首然後加武以約之觀喪大記弔者襲裘加武則武之所設所以約冠也紐垂於冕之兩旁其長及武笄以貫之繅鄭氏曰繅雜文之名合五采絲為之繩垂於延之前後各十二所謂邃延此王者之制也諸侯而下有差辨師掌王之五冕五采繅十有二就皆五采玉繅雜文之名也合五采絲為之繩垂於延之前後各十二所謂邃延也就成也繩之一匝而貫五采玉十二斿則十二玉也每就間蓋一寸朱紘以朱組為紘也紘一條屬兩端於武繅不言皆有不皆者此謂衮衣之冕十二斿則用玉二百八十八鷩衣之冕繅九斿用玉二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玉百二十𤣥衣之冕三斿用玉七十二諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄侯當為公字之誤也三采朱白蒼也其餘謂延紐皆𤣥覆朱裏與王同也出此則異繅斿皆就皆三采也每繅九成則九旒也公之冕用玉百六十二玉瑱塞耳者故書瑉作璑鄭司農云繅當為藻繅古字也藻今字也同物同音璑惡玉名諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令各以其等繅斿玉璂如其命數也冕則侯伯繅七就用玉九十八子男繅五就用玉五十繅玉皆三采孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫繅再就用玉八繅玉皆朱緑韋辨皮辨則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采典絲凡祭祀共黼畫組就之物以給衣服冕旒及盥中之屬禮器曰天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也朱緑似夏商禮郊特牲曰王被衮以象天戴冕璪十有二旒則天數也天之大數不過十二玉藻曰天子玉藻十有二旒前後邃延龍卷以祭雜采曰藻天子以五采藻為旒旒十有二前後邃延者言皆出冕前後而垂也天子齊肩辨師王之五冕五采繅十有二就諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就諸侯及孤卿大夫之冕各以其等為之掌其禁令鄭氏曰繅雜文之名也合五采絲為之繩垂於延之前後各十二所謂邃延也繩每一匝貫五采玉諸侯繅斿皆就皆三采也每繅九成則九旒也侯伯繅七就子男繅五就孤繅四就卿繅三就大夫繅再就理或然也然冕五而已未有不設繅斿者鄭氏謂大裘之冕無旒爵辨如冕亦無旒此不可考禮器天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三其制與辨師不同異代之禮也蓋藻潔而文衆采如之故曰藻水流趨下旗冕之垂者如之故曰旒藻或作繅以絲為之或作璪以玉貫之也繅旒或謂之繁露以其象然也漢制天子繅旒前長後短諸臣繅旒有前無後非古也禮書卷四
