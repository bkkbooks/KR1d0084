body:
  text: 禮書卷一百三十宋陳祥道撰四夷舞周禮韎師下士二人舞者十有六人旄人下士四人舞者無數鄭氏曰韎讀如韎韐之韎旄舞者所持以指揮周禮韎師掌教韎樂祭祀則帥其屬而舞之舞之以東夷之舞大饗亦如之旄人掌教舞散樂舞夷樂散樂野人為樂之善者若今黃門倡矣自有舞夷之樂亦皆有聲歌及舞凡四方之以舞仕者屬焉凡祭祀賓客舞其燕樂鞮鞻氏掌四夷之樂與其聲歌四夷之樂東方曰韎南方曰任西方曰株離北方曰禁詩云以雅以南是也王者必作四夷之樂一天下也言與其聲歌則云樂者主於舞也祭祀則吹而歌之燕亦如之吹之以管籥為之聲正義曰四夷樂名出於孝經緯鉤命決故彼云東夷之樂曰韎持矛助時生南夷之樂曰任持弓助時養西夷之樂曰株離持鉞助時殺北夷之樂曰禁持楯助時藏皆於四門之外右辟是也按眀堂位亦有東夷之樂曰韎南夷之樂曰任又按虞傳云陽伯之樂舞株離則東夷之樂亦名株離者東夷樂有二名亦名株離鄭注云株離舞曲名言象萬物生株離若詩云彼黍離離是物生亦曰離云王者必作四夷之樂一天下者也按白虎通曰王者制夷狄樂不制夷狄禮禮者所以均中國不制禮恐夷人不能隨中國禮也禮記曰昧東夷之樂也任南蠻之樂也納夷蠻之樂於太廟言廣魯於天下也周禮韎師掌教韎樂詩曰以雅以南以籥不僣廣大也詩曰以雅以南以籥不僣為雅為南也舞四夷之樂大德廣所及也東夷之樂曰昧南夷之樂曰南西夷之樂曰株離北夷之樂曰禁以為籥舞若是為和而不僣矣孔穎達詩正義云然則言昧者物生根也南者物懷任也秋物成而離其根株冬物藏而禁閉於下故以為名焉言南而得總四夷者以周之德先致南方故秋官立象胥之職以通譯四夷是言南可以兼四夷也然則舞不立南師而立昧師者以象胥曲以示法昧四夷之始故從其常而先立之也史記魯定公會齊景公於夾谷孔子攝相事齊有司趨進曰請奏四夷樂於是旌旄羽仗矛戟劍撥鼓譟而至孔子趨進厯階而登舉袂大言曰吾兩君為好會夷狄之樂何為請有司却之齊侯乃麾而去晉樂志後漢天子受朝賀舍利從西來戲於殿前擊水化成魚潄水作霧又化成龍出水遊戲以兩大繩兩頭相去數丈兩倡女對行於繩上也王者舞先王之樂眀有法也舞當代之樂眀有制也舞四夷之樂眀有懷也周禮韎師掌教韎樂祭祀則帥其屬而舞之大饗亦如之旄人掌教舞夷樂凡祭祀賓客掌其燕樂鞮鞻氏掌四夷之樂與其聲歌祭祀則吹而歌之燕亦如之蓋四夷之樂東曰韎南曰任西曰侏離北曰禁或以其服色名之或以其聲音名之服色則韎是也聲音則侏離是也漢書曰語言侏離其他不可以考鞮鞻氏掌四夷之樂旄人掌教四夷之樂韎師則掌教東夷之樂而已然韎師之樂施於祭祀大饗而旄人鞮鞻之樂施於祭祀與燕者蓋東於四夷為長饗於燕為重觀韎師曰師旄人鞮鞻曰人與氏師序於前而人與氏序於後則夷樂之别可知矣然詩曰以雅以南記曰胥鼓南而掌四夷者亦以象胥名官則周人於南夷之樂又其所樂者也先儒推四時之理以釋四樂之名以韎為晦昧任為懷任侏離為離根禁為禁閉且曰韎樂持矛助時生任樂持弓助時養侏離持鉞助時殺禁樂持盾助時藏白虎通又以侏離為東樂昧為南樂南樂持羽西樂持戟班固又以侏為兜以禁為伶以韎為侏賦曰伶侏兜離蓋各述其所傳者然也然周禮掌教夷樂者皆以所服所執所履名之鄭氏亦以韎為韎韐之韎則韎為服色眀矣學者可以捨經而任傳乎先王之於夷樂雖或用之然夷不可以亂華哇不可以雜雅蓋亦後之而弗先外之而弗內也觀夾谷之會侏儒之樂奏於前而孔子誅之東漢元日撣徒丹國之樂作於庭而陳禪非之則魯納夷蠻之樂於太廟蓋陳之於門而已唐之時皆奏於四門之外豈古之遺制歟舞衣書曰胤之舞衣孔安國曰胤國所為舞者之衣皆中法然古者舞大夏則皮辨素幘舞大武則冕服其他無所經見特漢舞者之衣法五方色謂之五行之舞蓋亦古之遺制魏景初以來祭天地宗廟武舞執干戚著平冕黑介幘黝衣裳白領袖中衣絳合幅袴袾黑韋鞮文舞執羽籥冠委貌服同上其奏於朝廷武舞武辨赤介幘生絳袍單衣練領袖巾衣虎文畫合幅袴白衣袾黑韋鞮文舞著進賢冠黑介幘生黃袍單衣白合幅袴服同上晉因魏舊不改其制唐則不然趙慎言曰今祭器茵褥總隨五方五神衣服獨乖其色舞者常持卓飾工人皆服絳衣臣愚竊不便之其舞人工人衣服請依方色宗廟黃色仍各以其所主褾袖朱干周禮司兵掌五兵五盾以待軍事禮記曰朱干設錫詩曰龍盾之合又曰蒙伐有苑春秋傳曰狄虒彌建大車之輪以為櫓國語曰官師奉文犀之渠以為盾先儒以櫓為大盾以伐為中干則盾見於經傳者曰櫓曰干曰伐曰渠而已其他不可考也今曰旁牌盾之為物以革為之其背曰瓦左傳曰中其楯瓦其瓦設錫白金朱質而繪以龍龍之外又繪以雜羽蒙雜羽也其繫之也以繡韋其屬繡韋也以紛書曰敿乃干則敿者繫以紛也國語曰輕罪贖以鞼盾則鞼者繡韋也鞼丘位反古之舞者或以干配戚禮言朱干玉戚舞大武是也或以干配戈司戈盾祭祀授舞者兵文王世子春夏學干戈是也漢迎秋樂亦用之隋初武舞三十二人執戈三十二人執戚皆配以盾而半執龍盾半執龜盾盾蓋惑於鄭氏錫傳其背如龜之説然也是不知所謂如龜者其背耳非其飾也玉戚詩曰取彼斧斨又曰既破我斧又缺我斨又曰干戈戚揚書曰左杖黃鉞又曰一人執劉廣雅曰鉞戚斧也六韜曰大柯斧重八斤一名天鉞毛氏謂斧隋銎斨方銎戚斧也揚鉞也孔安國謂劉斧屬孔穎達曰劉鑱斧也蓋鉞也揚也戚也斨也劉也皆斧也斧莫重於鉞而揚戚戕劉皆其次者也書言黃鉞以金飾其柄也禮言玉戚以玉飾其柄也楚工尹曰先王命剝圭以為戚柲則黃與玉為柄之飾可知也考工記車人柯長三尺博三寸厚一寸有半五分其長以其一為之首則六寸矣蓋斧之為物黑所以體道白所以象義而有剛斷之材焉故軍禮與其葬皆用之觀先王繡於冕服之裳中衣之領畫於所負之扆所履之席所幂之巾則君之所以剛斷者未嘗或忽也司兵祭祀授舞者兵鄭氏曰授以朱干玉戚之屬翟詩曰左手執籥右手秉翟周官舞師教羽舞帥而舞四方之祭祀鄭氏曰羽析白羽為之形如帗也樂師教國子小舞有羽舞春秋書考仲子之宫初獻六羽何休曰鴻羽也詩曰無冬無夏值其鷺羽蓋古之羽舞以翟或鷺何休以為鴻羽不可考也南齊鄭義秦更以翟為笛説曰笛籥皆應用竹笛飾以旄籥飾以羽梁武帝曰翟者五雉之一耳寧謂羌笛耶遂改其制禮書卷一百三十
