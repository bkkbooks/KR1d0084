body:
  text: 禮書卷八十四宋陳祥道撰五齊泛齊醴齊盎齊緹齊沈齊三酒事酒昔酒清酒周禮酒正凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數惟齊酒不二皆有器量司尊彛掌六尊六彛之位詔其酌辨其用與其實春祠夏禴祼用雞彛鳥彛皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬蒸祼用斝彛黃彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也凡六彛六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌儀禮特牲壺禁在東序尊于户東玄酒在西又尊兩壺于階東西方亦如之少牢尊兩甒于房户之間甒有玄酒禮運玄酒在室醴盞在户粢醍在堂澄酒在下坊記醴酒在室醍酒在堂澄酒在下禮器罍尊在阼犧尊在西君西酌犧象夫人東酌罍尊君親制祭夫人薦盎君親割牲大夫薦酒祭統宗婦執盎從夫人薦涗水濁莫如五齊清莫如三酒祭祀有五齊以神事之也三酒以人養之也酒正共五齊三酒以實八尊皆陳而弗酌所以致事養之義也非此八尊所實而皆有二者大祭所酌度用一尊則以三尊副之中祭所酌度用一尊則以兩尊副之小祭所酌度用一尊則以一尊副之皆酌而獻所以致事養之用也酒正言凡祭祀則天地宗廟社稷諸神之祭皆有五齊三酒司尊彛朝踐用犧尊再獻用象尊皆有罍蓋犧象所實泛與醴也罍尊所實盎以下也君西酌犧象夫人東酌罍尊君親制祭夫人薦盎盎齊涗酌而宗婦執盎從夫人薦涗水是罍尊之所實者盎而盎之上泛醴而巳則犧象實泛醴可知也司尊彛言醴而不及泛言盎而不及緹沈鄭氏謂泛從醴緹沈盎則罍之所實盎之下又可知也然則夫人酌罍而薦盎則君制祭朝事之時也及君割牲饋食則夫人薦酒而巳儀禮大夫尊兩甒于房户之間士尊於户東禮記罍尊在阼犧尊在西北皆所酌而非所設也若夫玄酒在室醴盞在户粢醍在堂澄酒在下此則設而弗酌也醴盞在户而坊記言醴酒在室蓋有不同而其設亦異爾齊之作也始則其氣泛然次則有酒之體中則盎然而浮久則赤終則沈室者隂之幽户者隂陽之交堂者隂陽之辨堂下者陽之顯而道以幽玄醇厚為上以顯著清美為下泛齊在室以其未離於道故也醴盞在户以其離道未逺故也粢醍在堂則道與事之間者也澄酒在下則純於事而巳觀此則先王所辨齊酒之位意可知矣夫醴齊縮酌則以茅縮而後酌此記所謂縮酒酌用茅明酌是也盎齊涗酌則以酒涗而後酌此記所謂盞酒涗于清是也黍稷别而言之則稷曰粢曲禮稷曰明粢是也合而言之皆曰粢禮凡言粢盛是也記於醍齊言粢醍指其材爾鄭氏改粢為齊誤也鄭氏又以明酌為事酒而澄酒或謂三酒或謂五齊於酒正坊記儀禮則曰澄酒三酒也於禮運則曰澄酒沈酒也祫備五齊禘備四齊時祭備二齊朝用醴齊饋用盎齊諸臣自酢用凡酒然記曰夫人薦盎則醴以上君所酌盎以下夫人所酌而無君饋薦盎之禮矣酒正曰凡祭祀以五齊三酒實八尊則中祭小祭皆備五齊而無四齊二齊之制矣鬱鬯鬱草十二花狀如紅藍秬鬯秬黑黍也一稃二米周禮鬱人凡祭祀賔客之祼事和鬱鬯以實彛而陳之築鬱金煮之以和鬯酒鄭司農云鬱草名十葉為貫百二十貫為築以煮之鐎中停於祭前鬱為草若蘭正義曰司農云十築為貫百二十貫為築者未知出何文云以煮之鐎中停於祭前者此似直煮鬱停之無鬯酒者文略其實和鬯酒也云鬱為草若蘭則蘭芝以其俱是香草故比類言之案王度記云天子以鬯諸侯以熏大夫以蘭芝士以蕭庶人以艾此等皆以和酒諸侯以熏及謂未得圭瓉之賜得賜則以鬱爾王度記云天子以鬯禮緯云鬯草生庭皆是鬱金之草以其鬯酒因號為鬯草也鬯人掌共秬鬯而飾之秬鬯不和鬱者飾之謂設巾也大喪共其釁鬯釁尸以鬯酒凡王之齊事共其秬鬯給淬浴凡王弔臨共介鬯祝告其神之辭介於是進鬯大宗伯凡祭大神享大鬼祭大示涖玉鬯肆師祭之日及果築鬻築煮築香草煮以為鬯也大喪大渳以鬯則築鬻禮記曰鬱合鬯又曰暢臼以掬杵以梧正義曰掬柏也梧桐也以柏香桐潔白搗鬱鬯於神為冝又曰天子親耕粢盛秬鬯以事上帝正義曰案小宰云天地大神至尊不祼此祭上帝有秬鬯者凡鬯有二若和之鬯謂之鬱鬯鬱人所掌是也祭宗廟而灌也若不和鬯謂之秬鬯鬯人所掌是也謂五齊之酒以秬黍為之以芬芳調暢言秬鬯故得以事上帝詩旱麓曰瑟彼玉瓚黃流在中箋云黃流秬鬯也正義曰以秬鬯為黃流者秬黑黍一秠二米者也秬鬯者釀和為酒以鬯金之草和之使之芬芳調暢故謂之秬鬯草名鬱金則黃如金色酒在器流動故謂之黃流云江漢曰釐爾圭瓚秬鬯一卣秬黑黍也鬯香草也築煮合而鬱之曰鬯箋云秬鬯黑黍酒也謂之鬯者芬香條鬯也正義曰禮有鬱者築鬱金之草而煮之以和秬黍之酒使之芬香條鬯故謂之鬱鬯鬯非草名而此傳言鬯草者以其可和秬鬯謂之鬯草毛言鬯草蓋亦然也言築煮合而鬱之謂築此鬱草久煮之乃與秬鬯之酒合和而鬱積之使氣味相入乃名曰鬯言合而鬱積之非草名如毛此意言鬯者必和鬱乃名鬯未和不為鬯與鄭異也箋以毛解鬯其言不明似必和鬱乃名為鬯故辨之明黑黍之酒自名為鬯不待和鬱也春官鬯人注云秬鬯不和鬱者是黑黍之酒即名鬯也和者以鬯人掌秬鬯鬱人掌和鬱鬯明鬯人所掌未和鬱也故孫育云鬱是草名今之鬱金煮以和酒者也鬯是酒名以黑黍秬一秠二米作之芬香條鬯故名之曰鬯鬯非草名古今書傳香草無稱鬯者用箋説為長生民詩曰維秬維秠毛云秬黑黍秠一稃二米正義曰皆爾雅文唯彼糜作虋音同耳李巡曰黑黍一名秬郭璞曰秠亦黑黍但中米異耳漢和帝時任城生黑黍或三四實實二米得黍三斛八斗則秬是黑黍之大名秠是黑黍之中有二米者别名之為秠故禮經異其文而爾雅釋之若言秬秠皆黑黍矣而周禮鬯人注云釀秬為酒秬如黑黍一秠二米言如則是黑黍一米者多秬為正稱二米則秬中之異並見之以明秬有二等也秬有二等則一米亦可為秬鬯人之注必言二米者以宗廟之祭惟祼為重二米難得之物鬯酒宜當用之故以二米解鬯其實秬為總名故云釀秬為酒耳爾雅云秠一稃二米鬯人注云一秬二米文不同者鄭志答張逸云秬即皮其稃即亦皮也爾雅重言以曉人然則秠稃古合語之異故鄭引爾雅得以稃為秠周語宣王不藉千畝虢文公諫曰瞽告協風至王即齊宫及朝鬱人薦鬯犧人薦醴王祼鬯饗醴乃行魏略曰大秦多蘇合薰陸鬱金藝膠十二種香許慎説文曰鬯以秬釀鬱草芬芳攸服以降神也中象米匕所以扱之易曰不喪匕鬯凡鬯之屬皆從鬯鬱芳草也十葉為貫百二十葉為築以煮之一曰鬱鬯百草之華遠方鬱人所貢芳草合釀之以降神鬱今鬱林郡也開寶本草木部中品鬱香味苦溫無毒陳藏器云其香十二葉為百草之英按魏略云生大秦國二月三月有花狀如紅藍四月五月採花即香也嘉祐本草圖經云鬱金本經不載所出州土蘇恭云生蜀地及西戎胡人謂之馬茱今廣南江西州郡亦有之然不及蜀中者佳四月初生苗似薑黃花白質紅末秋出莖心無實根黃赤木部中品有鬱金香云生大秦國二月三月十月有花狀如紅藍其花即香也陳氏云為百草之英乃是草類又與此同名而在木部非也今人不復用亦無辨之者故但附於此耳禮或言秬鬯或言鬱鬯蓋秬一稃二米天地至和之氣所生謂之鬯以言和氣之條鬯也謂之鬱鬯以其鬻鬱草和之也鄭司農曰鬱十葉為貫百二十貫為築以煮之其言蓋有所受也禮曰諸候未賜圭瓚資鬯於天子則諸侯受封未嘗不資鬯而後祭也傳曰天子以鬯諸侯以薰誤矣特牲少牢大夫士有奠而無祼傳又曰大夫以蘭芝士以蕭庶人以艾不可考也鬯之所用不特達臭氣以求神而巳故王齊則以鬯淬浴王弔喪臨諸侯則以鬯為摯大喪則以鬯釁尸六飲水漿醴涼醫酏五飲水漿酒醴酏膳夫掌王之食飲飲用六清酒正辨四飲之物一曰清二曰醫於巳反三曰漿四曰酏掌其厚薄之齊以共王之四飲之饌及后世子之飲清謂醴之泲者醫內則所謂或以酏為醴凡醴濁釀酏為之則少清矣醫之字從殹從酉省也漿今之酨漿也酏今之粥內則有黍酏酏飲粥稀者之清也鄭司農説以內則曰飲重醴稻醴清􅙤黍醴清􅙤粱醴清􅙤或以酏為醴漿水醷后致飲于賔客之禮有醫酏糟糟音聲與􅙤相似醫與醷亦相似文字不同記之者各異耳此皆一物也共后之致飲于賔客之禮醫酏糟皆使其士奉之糟醫酏不泲者泲曰清不泲曰糟后致飲無醴醫酏不清者與王同體屈也歲終則會惟王及后之飲酒不會漿人掌共王之六飲水漿醴涼醫酏入于酒府共賔客之稍禮共夫人致飲于賔客之禮清醴醫酏糟而奉之凡飲共之食醫掌和王之六食六飲凡飲齊視冬時內則曰飲重醴稻醴清糟黍醴清糟粱醴清糟或以酏為醴釀粥為醴黍酏酏粥漿酢酨醷梅漿濫以諸和水也濫涼也玉藻曰五飲上水漿酒醴酏又曰惟水漿不祭若祭為巳偞卑少儀曰客爵居左其飲居右凡齊執之以右居之以左齊謂食羮醬飲有齊和者也曲禮曰酒漿處右處羮之右此宫酒若羮耳兩有之則左酒右漿此大夫士與賔燕食之禮其禮食則宜放公食大夫禮云公食大夫飲酒漿飲俟于東房漿飲酨漿也其俟奠與豐上也漿飲先宫漿别於六飲也賔三飯宰夫執觶漿飲與其豐以進宰夫設其豐于稻酒在東漿在西是所謂左酒右漿上大夫庶羞酒飲漿飲庶羞可也士冠禮側尊一甒醴在服北既冠贊者洗于房中側酌醴加柶覆之靣葉冠者以柶祭醴三乃醴賔以一獻之禮醴賔不用柶者泲其醴內則曰飲重醴稻醴清糟黍醴清糟粱醴清糟凡醴事質者用糟文者用清孟子曰簞食壺漿詩曰或以其酒不以其漿莊子曰十漿之家五漿先饋酒正四飲清醫漿酏而無水醴涼漿人六飲水漿醴涼醫酏而無清內則有醴清糟酏漿醷濫而無水涼醫玉藻有水漿酒醴酏而無涼醫者鄭氏曰清謂醴之泲者則酒正之清與漿人之醴一也內則重醴稻醴清糟黍醴清糟粱醴清糟三醴皆有清糟則糟醴之濁者也醴內則所謂或以酏為醴闕內則所謂黍酏也醫內則所謂醷也涼內則所謂濫也鄭氏曰醫與醷相似濫以諸和水也以周禮六飲校之則濫涼也紀莒之間名諸為濫水涼之味薄非酒正之所辦酒在飲中非用漿人之法內則無水涼亦以其薄而略之也夫飲之齊必寒飲齊視冬時其設必重泲者為清醇者為糟糟用柶清不用柶后致飲于賔客則醇者而巳故酒正曰醫酏糟則醫酏皆糟也夫人飲于賔客則有清焉故漿人曰清醴醫則醴清而醫酏皆糟也夫人致三飲后致二飲屈於王也漿人六飲始水玉藻五飲亦上水貴其本也六飲無酒五飲有酒異代之禮也古者之於六飲用醴為多鄭氏曰五齊正用醴為飲者醴恬與酒異也其飲四齊味皆似酒其説是也然儀禮士冠醴子醴賔士昏醴賔醴婦聘禮醴賔士喪既夕士虞皆有醴而公食燕禮大射鄉飲酒特牲少牢皆不用醴何也蓋禮之質者尚醴文者尚酒冠禮醴子昏禮醴婦禮賔厚其親也聘禮醴賔厚其私覿也士喪及虞醴神存其養也非此無所事醴則用酒而巳儀禮祭以柶玉藻言水漿不祭若祭為巳偞卑則水漿與醴雖均曰飲其厚薄甘淡故有間也禮書卷八十四
