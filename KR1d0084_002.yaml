body:
  text: 禮書卷二宋陳祥道撰毳冕七旒旒十二玉共玉百六十八繅玉五采毳冕五章説文毳獸細毛也宗彝有虎蜼之飾而毳衣有宗彝之章故書謂之宗彝周禮謂之毳冕毳冕王所祀四望山川之服也五采繅十有二就五采玉十有二前後皆七旒共玉百六十有八繪於衣則宗彝藻粉米也繡於裳則黼黻也韍帶圭佩綬舄與鷩冕同詩曰毳衣如菼菼之初生其色𤣥則如菼言其衣也又曰毳衣如璊璊之為玉其色赤説文璊玉赬色則如璊言其裳也劉熈釋名以毳為藻文鄭司農以毳為罽衣與宗彝之制不合不足信也爾雅曰蜼卬鼻而長尾郭璞曰蜼似猴而色黑尾數尺鼻上向雨則以尾若兩指窒其鼻葢虎取其義蜼取其智希冕五旒旒十二玉共玉百二十繅玉五采希冕三章王祭社稷五祀之服非卑之於饗射也以社稷五祀之所上止於利人故衣粉米而巳謂之希以其章少故也鄭氏以希為絺以絺為刺謂希刺粉米無書然畫陽事也在衣繡隂功也在裳希衣之粉米固亦畫矣繡而不畫則與餘章之在衣者不類其説非也唐以希冕為繡冕葢亦襲鄭氏之失歟希冕亦五采繅十有二就五采玉十有二前後皆五旒共玉百二十賈公彦謂天子九章侯伯七章大章也章各依命數數章也則九章章皆十二七章章皆七若然則舜十二章之服日月星辰之類皆十二乎不必然也考之於禮升龍降龍為一章虎彝蜼彝為一章則山火而下葢皆左右畫繡之也𤣥冕三旒旒十二玉共王七十二繅玉五采𤣥冕一章王祭羣小祀之服其衣𤣥而無文裳黻而巳其章不足道也故以𤣥名之𤣥冕亦五采繅十有二就五采玉十有二前後三斿共玉七十二而玉之齊服亦用焉荀卿曰絻而乘路即𤣥冕也諸侯之齊以𤣥冠不以𤣥冕及親迎則𤣥冕齊戒攝盛故也宗彝於十二章之服在裳於九章之服在衣粉米於七章之服在裳於五章之服在衣葢次服之首章上服固巳升之矣夫乾居西北而天事武故黼之色白黒艮居東北而成始終故黻之色青黒天下之理歸於所斷成於所辨故服章以黻終焉觀易隂陽之相代歸於復小而辨於物卦象之相推終於未濟之辨物居方舜命九官終於黜陟分北周官六計終於廉辨皆六服終黻之意也然剛斷者先王之所沉濳非鄉向而上之也故黼依設於後席用黼純設於下而中衣繡黼設於中皆六服後黼之意也詩曰𤣥衮及黼黻衣繡裳常服黼冔書曰麻冕黼裳語曰致美乎黻冕記曰諸侯黼大夫黻爾雅曰衮黻也凡此皆舉其章之末者則餘章著矣裨冕裨冕覲禮侯氏裨冕會子問曰太祝裨冕執束帛又曰太宰太宗太祝皆裨冕玉藻曰諸侯裨冕以朝樂記曰裨冕搢笏而虎賁之士説劒也荀卿曰大夫裨冕鄭康成釋覲禮曰裨之言埤也天子大裘為上其餘為裨釋玉藻曰裨冕公衮侯伯鷩子男毳是也鄭司農釋周禮特以鷩為裨衣拘矣日月日月古者日月星辰畫於衣至周登三辰於旂左氏曰三辰旂旗是也王肅謂舜時三辰亦畫於旌旗然明堂位曰有虞氏之綏夏后氏之旂虞氏之綏尚未有交龍之制謂有日月星其説無據星辰星辰周禮大宗伯以實柴祀日月星辰保章氏掌天星以志星辰日月之變動鄭氏謂星五緯辰日月所㑹之次孔安國釋書厯象日月星辰謂星四方中星辰日月所㑹鄭氏於書亦以星辰為一孔頴逹曰敬授人時無取五緯之義鄭氏觀文為説也然則衣之所畫葢五星與十二次也若旂則畫日月北斗七星而已故禮記言招搖在上穆天子𫝊稱天子𦵏盛姬建日月七星山山古者衣韍尊圭楶皆有山飾考工記曰山以章荀卿曰天子山冕諸侯𤣥冠書大傳曰山龍青也龍龍古者衣韍旂旃儀禮有龍旃簨虡盾輴勺帷大記有龍輴皆飾以龍周禮曰交龍為旂覲禮曰升龍降龍爾雅曰升白龍于縿曲禮曰左青龍書大傳曰山龍青也龍有升降白者升于襂則青者降矣白隂而升青陽而降此交泰之道也許愼曰卷龍繡於下幅一龍蟠阿上鄉然龍繪於上幅非繡於下幅愼之説誤矣華蟲華蟲華蟲翟也翟不特施於王服而后之車服亦有焉所謂褘翟揄翟闕翟重翟厭翟是也不特后之車服而舞與喪禮亦用焉書與周禮言羽舞詩言秉翟大記言揄絞是也孔安國顧氏以華蟲為二章非是宗彝宗彝書曰班宗彝作分器周禮大約劑書於宗彝則宗彝宗廟之彝也先王致孝有尊有彝而衣特以彝為章者以虎蜼在焉故也書謂之宗彝周禮謂之毳冕康成穎逹之徒謂毳畫虎蜼因號虎蜼為宗彝其實虎蜼而已此説非也書大傳曰宗彝白葢宗彝白而虎蜼各象其色耳鄭司農以毳為罽孔安國謂宗彝亦以山龍華蟲為飾皆臆論也藻藻水草也施於衣與棁而巳冕旒與玉繅亦曰藻皆取其文而且潔也書大𫝊曰藻火赤鄭氏釋巾車曰藻水草蒼色今藻色兼蒼赤葢伏鄭各舉其一偏耳火火左𫝊曰火龍黼黻昭其文也喪大記曰火三列明堂位曰殷火周龍章則火之所施多矣考工記曰火以圜鄭司農曰圜形似火鄭康成曰形如半環是也大傳曰火赤孔安國謂火為火字其説與考工記不合粉米粉米鄭氏以粉米為一章則粉其米也粉其米散利養人之義也孔安國曰粉若粟米米若聚米顧氏曰粉取潔白米取能養然粉亦米為之一物而為二章與章不類其説非也黼黼考工記曰白與黒謂之黼黼即斧也刃白而銎黑有剸斷之義故裘裳席巾中衣顈禪之領冒之殺覆椁之幕檀弓曰加兊于椁上飾棺用焉黻黻考工記曰黑與青謂之黻施於衣與荒翣見大記其文兩巳相戾葢左青而右黑此相辨之義也黻亦作茀而韍亦作黻左𫝊曰火龍黼黻昭其文也又曰衮冕黻珽昭其度也則黻珽之黻乃韍也白虎通曰黻譬君臣可否相濟見善改惡賈公彦曰黻取臣民背惡向善禮書卷二
