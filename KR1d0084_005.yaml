front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_005-1a, image: WYG0130/WYG0130-0032a.png}
body:
  text: 禮書卷五宋陳祥道撰紘鄭氏曰屈組為紘垂為飾纓二組屬於笄順頤而下結之謂之纓纓之垂者謂之緌辨師掌王之五冕朱紘朱紘以朱組為紘也紘一條屬兩端於武士冠禮緇布冠缺項青組纓屬于缺皮辨笄爵辨笄緇組纁邊缺讀如有頍者辨之頍緇布冠無笄者著頍圍髮際結項中隅為四綴以固冠也項中有􅕒亦由固頍為之耳今未冠笄者著卷幘頍象之所生也滕薛名蔮為頍屬猶著有笄者屈組為紘垂為飾無笄者纓而結其條纁邊組側赤也禮器曰管仲鏤簋朱紘君子以為濫矣朱紘天子冕之紘也諸侯青組紘大夫士當緇組紘纁邊祭義曰天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒玉藻曰玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也玄冠丹組纓諸侯之齊冠也玄冠綦組纓士之齊冠也説文曰紘冠卷也纓冠系也緌系冠纓也左傳桓二年衡紞紘綖昭其度也僖二十八年楚子玉瓊辨玉纓哀十五年子路結纓而死喪禮斬衰繩纓齊衰以下布纓大功長殤絰纓緦澡纓後漢輿服志聖人見鳥獸有冠角􅏋胡之制遂作冠冕纓緌以為首飾旒冕皆以其綬色為組纓乘輿黃赤綬諸侯王赤綬公侯將軍紫綬九卿青綬千石六百石黑綬百石青紺綬唐制天子大裘冕組帶纓色如其綬衮冕朱組帶為纓皇太子衮冕紅組為纓羣臣之服皆以組為纓色如其綬緌詩曰葛屨五兩冠緌雙止檀弓曰范則冠而蟬有緌緌謂蜩蝝長在腹下郊特牲曰太古冠布齊則緇之其緌也孔子曰吾未之聞也玉藻曰緇布冠繢緌諸侯之冠也縞冠素紕既祥之冠也垂緌五寸惰遊之士也自天子下達有事然後緌大帛不緌玄冠紫緌自魯桓公始也雜記曰大白冠緇布之冠皆不㽔委武玄縞而㽔秦人曰委齊東曰武內則子事父母冠緌纓辨師王之五冕皆朱紘禮記天子為藉冕而朱紘諸侯為藉冕而青紘士冠禮緇布冠青組纓皮辨笄爵辨笄緇組紘纁邊蓋朱者正陽之色天子以為紘青者少陽之色諸侯以為紘緇者隂之色而士以為紘卿大夫冕辨之紘無所經見禮器曰管仲鏤簋朱紘君子以為濫鄭氏謂大夫士當緇組紘纁邊理或然也一組繫於左笄繞頤而上屬於右笄垂餘以為飾謂之紘二組屬於筓順頥而下結之謂之纓纓之垂餘謂之緌檀弓曰蟬有緌鄭氏曰緌謂蜩蝝長在腹下喪冠緇布冠纓而不緌冕辨紘而不纓春秋之時楚子玉瓊辨玉纓自漢以來冕纓各象其綬色冕辨而有纓非古制也夫縣鐘磬者亦謂之紘繫車蓋者亦謂之紘佩容臭者亦謂之纓馬之膺飾亦謂之纓旌旗之旒亦謂之緌禪被之識亦謂之紞則紘纓緌之名非特施於冠冕也天子諸侯瑱玄紞黃纊卿大夫瑱玄紞青纊士瑱玄紞素纊周禮辨師諸侯之繅斿九就玉瑱玉笄詩旄丘曰叔兮伯兮褎如充耳君子偕老曰玉之瑱也瑱塞耳也淇奧曰有匪君子充耳琇瑩會辨如星充耳謂之瑱琇瑩美石也天子玉瑱諸侯以石著曰俟我於著乎而充耳以素乎而毛曰素象瑱鄭曰以素為充耳謂所以懸瑱者或名為紞人君五色臣則三色此言素者自所先見而云尚之以瓊華乎而毛曰瓊華美石士之服也鄭曰飾之以瓊華者謂縣紞之末所謂瑱也人君以玉為之瓊華石色似瓊也俟我於庭乎而充耳以青乎而毛曰青青玉鄭曰青紞之青尚之以瓊瑩乎而毛曰瓊瑩不似玉卿大夫之服也鄭曰石色似瓊瑩也俟我於堂乎而充耳以黃乎而毛曰黃黃玉鄭曰黃紞之黃尚之以瓊英乎而毛曰瓊英美石似玉者人君之服也禮記檀弓曰練角瑱瑱充耳也吉時以玉人君有瑱士喪禮瑱用白纊既夕記曰瑱塞耳楚語楚靈王虐白公子張驟諫王曰不穀雖不能用吾憗瑱置之於耳憗猶願也對曰賴君用之也故言賴特也不然巴浦之犀犛兕象其可盡乎其又以規為瑱也犛犛牛也規諫也瑱所以塞耳言四獸之牙角可以為瑱難盡而又以規諫為之乎魯語曰王后親織玄紞紞所以懸瑱當耳者也左傳曰衡紞紘綖昭其度也又曰縳之如一瑱家語大戴皆曰紞絖塞耳東方朔傳曰黈纊塞耳禮緯曰旒垂目纊塞耳示不聽讒不視非也後漢輿服志曰旁垂黈釋名曰瑱鎮也不使妄聽自鎮重也吳語吳王斬有罪者以徇曰莫如此以環瑱相問也瑱以充耳紞以垂瑱周官辨師王之五冕皆玉瑱詩於衛夫人言玉之瑱也於衛武公言充耳琇瑩於衛之臣言褎如充耳齊詩言充耳以素以青以黃尚之以瓊華瓊瑩瓊英則瑱不特施於男子也婦人亦有之不特施於冕也辨亦有之故詩言充耳琇瑩繼之以會辨如星喪禮士無冕而瑱用白纊則辨亦有之可知也士瑱用白纊即詩所謂充耳以素者也人君用黈纊即詩所謂充耳以黃者也毛氏以充耳以素為士之服充耳以青為卿大夫之服充耳以黃為人君之服於説是也然以素為象瑱青為青玉黃為黃玉而用瓊華以飾象則是士瑱用二物與餘瑱不類非禮意也鄭氏以素為素紞青為青紞黃為黃紞人君五色人臣三色然魯語王后織玄紞夫人加紘綖內子為大帶命婦成祭服列士之妻加以朝服則夫人以至士妻特有所加而已其織玄紞一矣未聞有五色三色之别也又紞所以垂充耳而充耳不在紞謂紞為充耳非也春秋傳曰縛之如一瑱則縛纊以為瑱自古然也其制蓋皆玄紞以垂之瓊玉以承之承之詩所謂尚之也梁制垂以珠瑱班固賦曰雕玉瑱以居楹礎石亦謂之瑱則瑱居纊下可知也賈公彥曰古者瑱不用纊士死則用白纊然士之襲禮皮辨褖衣緇帶韎韐竹笏之類皆用生時之物孰謂瑱用白纊特死者之飾哉檀弓小祥用角瑱楚語曰巴浦之犀犛兕象其可盡乎其又以規為瑱則古者之瑱亦以象與角為之衡鄭氏曰衡玉為之祭服有衡垂于副之兩旁當耳其下以紞懸瑱周官追師掌王后之首服為副編次追衡笄左傳曰衡紞紘綖昭其度也鄭司農曰衡繼持冠者鄭康成曰王后之衡笄皆玉為之惟祭服有衡垂于副之兩旁當耳其下以紞垂瑱孔頴達曰婦人首服有衡則男子首服亦然王后之衡以玉則天子之衡亦玉諸侯以下未聞然則左傳言衡則繼以紞辨師士冠禮言笄則繼以紘是衡有紞笄有紘也笄鄭氏曰笄卷髮者玉為之長尺二寸鬠笄桑為之長四寸纋中禮記內則子事父母櫛縰笄總辨師掌王之五冕玉笄諸侯之繅旒九就玉辨士冠禮皮辨笄爵辨笄同篋笄今之簪有笄者屈組為紘垂為飾無笄者纓而結其絛士喪禮鬠笄用桑長四寸纋中長四寸不冠故也纋笄之中央以安髮鬠用組乃笄國語范武子以杖擊其子折其委笄荀子曰鬠而不笄婦人笄曲禮曰女子許嫁笄而字以許嫁為成人檀弓南宫縚之妻之姑之喪夫子誨之髽蓋榛以為笄長尺內則婦事舅姑櫛縰笄總男女未冠笄者櫛纚拂髦女子十有五而笄二十而嫁其未許嫁二十則笄喪服小記齊衰惡笄以終喪男子冠而婦人笄雜記女雖未許嫁年二十而笄禮之婦人執其禮雖未許嫁年二十亦為成人矣禮之酌以成之言婦人執其禮明非許嫁之笄燕則鬈首既笄之後去之猶古之女有鬌紒也問喪親始死雞斯徒跣雞斯當為笄纚聲之誤也親始死去冠二日乃去笄纚括髮也今時始喪者邪巾貊頭笄纚之存象也追師掌王后之首服為副編次追衡笄士昏禮女次純衣纁袡立于房中南靣姆纚笄宵衣在其右女從者畢袗玄纚笄被顈黼在其後夙興婦沐浴纚笄宵衣以見舅姑記女子許嫁笄而禮之稱字許嫁已受納徴禮也笄女之禮猶冠男也使主婦女賔執其禮喪服女子在室為父箭笄女子適人者為其父母婦為舅姑惡笄有首以髽卒哭子折笄首以笄布總言以髽則髽有著笄者明矣傳曰笄有首者惡笄之有首也惡笄者櫛笄也折笄首者折吉笄之首也吉笄者象笄也何以言子折笄首而不言婦終之也櫛笄者以櫛之木為笄或曰榛笄有首者若今時刻鏤摘頭矣卒而喪之大事卑女子可以歸於夫家而著吉笄吉笄尊變其尊者婦人之義也折其首者為其大飾也據在夫家宜言婦終之者終子道于父母之恩士喪記其母之喪則內御者浴鬠無笄無笄猶大夫之不冠也特牲饋食禮主婦纚笄宵衣詩君子偕老副笄六珈筓衡笄也珈笄飾之最盛者所以别尊卑楚語司馬子期欲以妾為內子訪之左史倚相曰吾有妾而願欲笄之其可乎辨師掌王之五冕五采繅十有二就皆玉笄諸侯繅旒皆就玉笄士冠皮辨爵辨笄則冕辨有笄也國語范文子以杖擊其子折委笄則冠有笄也士喪服婦人吉笄有首尺二寸吉笄象笄也男子之笄亦或尺二寸大夫士之笄亦或象為之歟禮王祀以玉路朝以象路王玉爵諸侯象觚王玉笏諸侯象笏皆象次于玉然則諸侯玉笄大夫士用象可知賈公彥釋士冠禮大夫士笄當用象鄭氏釋士冠禮謂有笄者屈組為紘垂為飾無笄者纓而結其絛無笄蓋指緇布冠言之也雜記曰緇布不㽔則緇布非特無笄又纓而不緌矣古者笄亦謂之簪易曰朋盍簪鄭氏謂笄今之簪是也荀卿針賦曰簪以為父則簪形似針而巨也考之士喪禮鬠笄用桑長四寸纋中其母之喪內御者浴鬠無笄則鬠笄與冠辨之笄異矣鬠笄四寸所以安髮男子婦人皆有之男子死有髻笄而無冠辨之笄以其不冠故也婦人死不特無冠辨之笄亦無鬠笄以其不以髮為猶男子之冠故也家語曰孔子之喪襲而冠此王肅附會之論也荀子亦曰鬠而不笄禮書卷五
