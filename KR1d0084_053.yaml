  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_053-1a, image: WYG0130/WYG0130-0337c.png}
body:
  text: 禮書卷五十四宋陳祥道撰四圭有邸蒼璧大宗伯蒼璧禮天黃琮禮地典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望玉人四圭尺有二寸以祀天兩圭五寸有邸以祀地旅四望鄭氏謂蒼璧禮天冬至祀天皇大帝在北極者也四圭祀天夏至祀感生帝於南郊者黃琮禮地者崑崙之示兩圭祀地者神州之示賈公彥謂黃琮以禮崑崙之示於夏至則兩圭以祀神州之示宜於七月然感生帝與崑崙神州之說不見於經又分郊以異於丘别感生之禮以異於五帝王肅嘗考之矣要之蒼璧禮天冬至之郊也四圭有邸非必冬至之郊也黃琮禮地夏至之祭也兩圭有邸非必夏至之祭也冬至用蒼璧夏至用黃琮牲幣亦如之所謂牲幣各放其氣之色是也非冬至則四圭非夏至則兩圭而牲幣蓋用騂黝矣所謂陽祀用騂牲陰祀用黝牲是也禮神之玉蓋皆植於神位之前書曰植璧秉圭是也或曰大司樂言樂六變八變然後神示可得而禮又言歌黃鍾太簇之類以祀天神地示則禮之固在降神之後祀之又在禮之之後璧琮禮天地四圭兩圭祀天地蓋皆一祭兼用之也是不然何則青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方則四方有禮玉無祀玉圭璧以祀日月星辰璋邸射以祀山川則日月星辰山川有祀玉無禮玉周官之書雖或簡略不應如是之缺也然則祀之乃所以禮之康成以祀為禮其神於義或然書曰𢎞璧在西序爾雅曰璧大六寸謂之瑄漢郊祀志言皇帝始郊見泰一雲陽有司奉瑄玉蓋與周之禮天者異矣然則冬至禮天必以璧何也蒼春天之色圜鍾春律之管樂以圜鍾玉以蒼璧而牲幣皆蒼以冬至者陽氣之始故也兩圭有邸黃琮大宗伯曰黃琮禮地典瑞曰兩圭有邸以祀地旅四望玉人兩圭五寸有邸以祀地旅四望爾雅曰邸謂之柢鄭氏謂四圭有邸中央為璧圭末四出兩圭有邸僢而同邸圭璧者圭其邸為璧賈公彥曰四圭兩圭及下璋邸皆言邸鄭皆以邸為璧圭璧不言邸故鄭還以邸解璧也然璧天象也祀天則四圭邸璧琮地象也祀地必兩圭邸琮日月星辰天類也必一圭邸璧山川地類也必一璋邸琮謂地與山川皆邸璧非所稱也四圭則無所不達尺有二寸天之備數也兩圭則能地而巳五寸天地之中數也玉人言玉之制其長不過大圭之三尺其短不過瑁圭之四寸由四寸而上之則祀地之兩圭祀日月星辰之圭璧宗后之駔琮皆五寸侯伯之信圭躬圭巡守之邊璋起軍治兵之牙璋中璋王之駔琮聘女之穀圭諸侯聘女之大璋皆七寸眺聘之瑑圭璋享夫人之瑑琮皆八寸公之桓圭象德之琬圭除慝易行之琰圭享天子之璧琮巡守之大璋皆九寸璧羡度尺而鎮圭四圭裸圭大琮玉案皆十有二寸土圭尺有五寸則大圭三尺三才之道也土圭尺有五寸夏至之景也其餘長短不倫各有所稱豈茍異哉圭璧典瑞圭璧以祀日月星辰璋邸射以祀山川以造贈賔客公羊傳曰璋判白則璋於圭璧半於兩圭兩圭半於四圭以禮有隆殺故玉有等衰也先王以大采朝日少采夕月日月星辰有合祭有異祭有正祭有禱祈其禮雖不一而用圭璧一也璋邸射典瑞璋邸射以祀山川以造贈賔客玉人璋邸射素功以祀山川以致稍餼王制曰五嶽視三公四瀆視諸侯書大傳曰其餘山川視伯小者視子男周禮諸侯為賔諸臣為客山川賔客等衰雖殊其祀與造贈用邸射一也賔至致飱如致積致饔致贈如將幣聘賔所過之邦餼之以其禮所聘之邦則卿致館宰夫朝服設飱賔既聘享君使卿韋辨歸饔餼夕夫人使下大夫韋辨歸禮蓋於是時用璋邸射歟璋邸射索功以其刮摩之功略也鄭氏以素功為無瑑飾若然是四圭圭璧之類有瑑飾乎玉人大琮大璋中璋皆射四寸牙璋亦射四寸特璋邸射不言寸數其詳不可以考青圭赤璋白琥𤣥璜大宗伯以蒼璧禮天以黃琮禮地青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方蓋璧圜以象天而天以始事為功故以蒼璧方以象地而地以終功為事故以黃東生物之方也故圭鋭以象春西殺物之方也故虎嚴以象秋南正陽也隂居其半故璋以半圭北正隂也陽居其半故璜以半璧覲禮方明東方圭南方璋西方琥北方璜天府季冬陳玉以貞來歲之媺惡龜有天地四方玉有六器皆其類也六玉之制不同而虎特取其形者以形成於秋故也古者鹽為虎形以示武敔為虎形以止樂亦此意歟然則禮神則璧琮重於圭璋圭璋無間於琥璜朝聘則圭璋重於璧琮而璧特重於琥璜而巳何也圭璋二王之後所以享王與后也璧琮五等諸侯所以享王與后也琥璜子男所以享諸侯者也又圭璋特達不加於束帛琥璜將送酬爵而巳此六玉輕重之別也至於禮神則上下四方各象其類以求之與朝聘之禮異矣昔成王賜伯禽以夏后氏之璜定四年左明堂位曰大璜天子之器則陽虎所竊之寶杜預所謂大璜是也公羊曰璋判白誤矣昭公疾賜子家子雙琥公薨子家子反賜於府人則雙琥亦魯之所寶也說文曰琥發兵瑞玉為琥又白虎通曰璜以徵召然先王之時發兵用牙璋徵守以鎮圭召人以瑗後世發兵乃用銅虎符不知說文白虎通何據而言然牙璋中璋典瑞曰牙璋以起軍旅以治兵守玉人曰牙璋中璋七寸厚寸以起軍旅以治兵守鄭司農曰牙璋瑑以為牙牙齒兵象故以牙璋發兵鄭康成曰牙璋中璋皆有鉏牙之飾於琰側先言牙璋有文飾也賈公彥曰軍多用牙璋軍少用中璋中璋亦有鉏牙但牙璋文飾多故得牙名而先言也春秋之時宋司馬請瑞哀十四年左以命其徒攻桓氏杜預曰瑞符節以發兵魏有兵符漢有銅虎符以發郡國兵豈牙璋之類歟白虎通曰璋位南方南方陽極而陰生兵亦陰也故以兵起於義或然禮書卷五十四
