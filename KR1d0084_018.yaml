body:
  text: 禮書卷十八宋陳祥道撰宵衣染之以黑士昏禮女次純衣纁袡立于房中南面姆纚笄宵衣在其右特牲禮主婦纚笄宵衣立于房中少牢禮主婦被錫衣侈袂主婦贊者一人亦被錫衣侈袂鄭氏釋昏禮曰宵讀為素衣朱綃之綃綃綺屬也姆亦𤣥衣以綃為領釋特牲謂其繒曰宵染之以黑記有𤣥宵衣釋少牢曰被錫讀為髲鬄古者或剔賤者刑者之髮以被婦人之紒為飾因名髲鬄焉此周禮所謂次也不纚笄者大夫妻亦衣綃衣而侈其袂耳侈者蓋半士妻之袂以益之衣三尺三寸袪尺八寸玉藻士褖衣或作稅衣曽子譏子羔之襲稅衣纁袡則女次純衣纁袡者褖衣也昏禮之姆特牲禮之主婦皆纚笄宵衣則宵衣不以純矣少牢禮之主婦與贊者一人被錫衣侈袂則錫衣非宵衣矣玉藻曰王被衮士昏禮曰女從者畢袗𤣥纚笄被顈黼孟子曰被袗衣則被者服之也不特首飾而已鄭以被為首飾以少牢之被錫為髲髢以詩被之僮僮為髲髢誤矣不特此也釋追師則以侈袂為侈褖衣之袂釋少牢則以侈袂為侈宵衣之袂釋昏禮謂姆宵衣以綃為領釋特牲謂主婦宵衣以綃為領禮文殘缺鄭氏自惑學者據經可也禮有錫衰錫冪史有阿錫蓋錫布之細者也少牢大夫朝服以布則其妻以錫不亦宜乎若助祭之類則申上服內司服曰辨外內命婦之服鞠衣展衣褖衣素沙凡祭祀賓客凡命婦共其衣服鄭氏謂外命婦惟王祭祀賓客以禮佐后得服此上服自於其家則降焉然則諸侯之卿大夫妻以禮佐夫人蓋亦視此袗𤣥衣顈黼黑士昏禮女從者畢袗𤣥纚笄被顈黼在其後鄭氏曰袗同也顈禪也詩云素衣朱襮爾雅云黼領謂之襮考工記曰白與黑謂之黼天子諸侯后夫人狄衣卿大夫之妻刺黼以為領如今偃領矣士妻始嫁施禪黼於領上假盛飾也然論語曲禮皆曰袗絺綌孟子曰被袗衣則袗設飾也說文曰褧檾也枲屬顈與褧檾通用則袗𤣥者設飾以𤣥也顈黼者顈枲為領而刺黼也從者畢袗𤣥女與姆之衣𤣥可知從者顈黼則女與姆之領不以枲可知袗𤣥而黼領此表衣耳與黼領之中衣異也士冠禮主人之兄弟與昏禮婦人從者均於畢袗𤣥鄭氏以袗為同曲禮曰袗絺綌鄭氏又以袗為禪是自戾也景衣白褧衣白士昏禮女次純衣乘婦以几姆加景乃驅鄭氏曰景之制蓋如眀衣加之以為行道禦塵令衣鮮眀景亦眀也然則乘車而加之以景猶衣景而加之以褧也景以禦塵褧以晦其文玉藻曰禪為絅則景蓋亦禪歟衣錦尚褧夫人始嫁之服庶人始嫁亦有服之者攝盛也唐志景作憬副編次追師掌王后之首服為副編次追衡笄為九嬪及外內命婦之首服以待祭祀賓客詩曰副笄六珈左傳曰衡紞紘綖禮記曰夫人副褘立于東房士昏禮女次純衣鄭氏曰副之言覆所以覆首為之飾其遺象若今步搖矣服之以從王祭祀編列髮為之其遺象若今假紒矣服之以桑也次次第髮長短為之所謂髲髢服之以見王王后之燕居亦纚笄而總王后惟祭服有衡垂于副之兩旁當耳其下以紞垂瑱外內命婦衣鞠衣袒衣者服編衣褖衣者服次孔頴達曰王后衡笄皆玉為之惟祭服有衡垂于副之兩旁當耳其下以紞垂瑱若編次則無衡於笄言珈以玉飾之惟后夫人有焉夫人六珈后之多寡無文漢之步搖以金為鳳下有邸前有笄綴五采玉以垂下行則動搖魏晉因之隋改為花樹之數唐加大花十二樹象𤣥冕十二旒司馬彪續漢志云步搖有黃山題貫白珠為桂枝相糾八雀九華赤能天鹿笄獸翠羽為飾副者翟之配以配褘翟則禮所謂副褘是也以配揄狄則詩所謂副笄六珈其之翟也是也褖衣之配禮所謂女次純衣是也然則編為鞠衣展衣之配可知矣禮男子冠婦人笄男子免婦人髽婦人之飾不過以髮與笄而已則副之覆首若步搖編之編髮若假紒次之次第其髮為髲髢云者蓋有所傳然也莊子曰秃而施髢詩曰鬒髮如雲不屑髢也左傳曰衛莊公髠己氏之妻髮以為吕姜髢說文曰髲益髮也蓋髢所以益髮而鬒髮者不屑焉詩曰被之僮僮則被之者不特髲鬄也少牢曰主婦被錫衣侈袂則被錫者非髲髢也鄭氏皆以為髲髢非是纚笄婦人首飾副也編也次也纚笄也觀士昏禮女次純衣姆纚笄宵衣特牲禮主婦纚笄宵衣則副編次之下纚笄其飾也楚語司馬子期欲以妾為內子訪之左史倚相曰吾有妾而願欲笄之其可乎蓋古之為妾者不笄士姆纚笄亦攝盛也鄭氏曰王后之燕居亦纚笄總而已此不可考象揥詩曰象之揥也又曰佩其象揥毛氏曰所以摘髮也劉熙曰揥摘也孔頴達曰以象骨搔首因以為飾名之曰揥蓋有事則因以為飾無事則佩之禮書卷十八
