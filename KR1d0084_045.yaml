body:
  text: 禮書卷四十六宋陳祥道撰碑碑石為之鄭氏釋聘禮曰設碑近如堂深公食大夫禮庶羞陳于碑内庭實陳于碑外燕禮賔自碑内聽命聘禮醯醢百甕夾碑十分以為列賔自碑内聽命祭義曰君牽牲入廟門麗于碑士昏禮賔入廟門鄉飲酒賔入庠門鄉射賔入序門皆三揖至于階而三揖之中有當碑揖則諸侯大夫士之宫皆有碑矣鄭氏曰宫必有碑所以識日景引陰陽也凡碑引物者宗廟則麗牲焉其材宫室以石窆用木禮天子之窆豐碑諸侯桓楹大夫二碑士無碑喪大記魯之季也公室視豐碑三家視桓楹鄭氏曰豐碑斵大木為之形如石碑於椁前後四角桓之穿中於間為鹿盧天子四碑前後各重鹿盧也桓楹斵之如大楹耳四植謂之桓窆碑如桓楹則宫室碑制可知隅阿雉春秋書墮郈墮費公羊曰邑無百雉之城雉者何五板而堵五堵而雉百雉而城記曰都城不過百雉鄭叔叚居京祭仲曰都城過百雉國之害也先王之制大都不過三國之一鄭伯之城方五里積千五百步大都三國之一則五百步也五百步為百雉則雉五步也步六尺則五步三丈也書傳曰雉長三丈鄭康成謂雉長三丈則板六尺是連五堵而為三丈也今夫雉之所處各有分域而飛不過三丈古者所以立雉制葢取此也毛氏曰一丈為板五板為堵韓詩傳曰八尺為板五板為堵五堵為雉何休曰堵四十尺雉二百尺此皆不可以考鄭氏曰長三丈髙一丈然板廣二尺而雉高一丈此先儒之所同也考工記曰王宫門阿之制五雉髙五丈宫隅之制七雉城隅之制九雉門阿之制以為都城之制宫隅之制以為諸侯之城制葢門阿外也故庳宫隅内也故崇都城近也故庳以屈諸侯逺也故崇以伸垣墉墻壁序爾雅曰墻謂之墉詩曰崇墉言言易曰乗其高墉則墉墻之高者也儀禮於房室言墉士冠禮陳服于房中西墉下大射西夾六豆設于西墉下既夕記士東首于北墉下於堂下言壁墻之卑者也鄉飲酒俎由東壁自西階升士虞禮饍爨在東壁特牲禮饍爨在西壁士冠禮冠者降自東階適東壁書有東序西序爾雅曰東西墻謂之序則序堂上之東西墻也詩曰之子于垣百堵皆作書曰既勤垣墉春秋傳曰子産使盡壞其舘之垣納車馬焉則垣宫室之外墻也考工記曰墻厚三尺崇三之則墻者垣墉之總名歟門制爾雅柣于結謂之閾棖謂之楔樞謂之椳樞達北方謂之落時門持樞者或達北檼以為固落時謂之􅩖樴謂之􅍻在地謂之臬又曰橛謂之闑門橛楣謂之梁葢界于門者榍也亦曰柣曰閾中于門者閫也亦曰闑曰橛旁于門者楔也亦曰棖所以開闔者樞也亦曰椳樞上之横梁楣也樞達北棟落時也月令曰以修闔扇爾雅曰闔謂之扉公羊曰齒著于門闔左氏曰以枚數闔越語曰乃闔左闔荀卿曰子貢觀於魯廟之北堂復瞻九葢彼皆繼耶葢即闥也則扇也闔也扉也其實一也鄭氏釋月令謂木曰闔竹􅓗曰扇葢對而言之然也禮君入中門上介拂闑大夫中棖與闑之間士介拂棖入以自高為戒故賔不履閾君入中門諸侯相朝之禮也賔入不中門諸侯來聘之禮也凡入門而右由闑東左由闑西曲禮曰大夫士出入君門由闑右燕禮大夫皆入門右臣統於君也聘禮賔入門左賔伉於主也聘享公事也故入門而左所以致敬覿靣私事也故入門而右所以致親賔館周禮小行人凡諸侯入王則逆勞于畿及郊勞眂館將幣為承而擯司儀凡諸公相為賔主君郊勞交擯三辭車逆拜辱三揖三辭拜受致館亦如之鄭氏曰使大夫授之君又以禮親致焉諸公之臣相為國客則三積皆三辭拜受及大夫郊勞旅擯三辭拜辱三讓登聴命下拜登受賔使者如初之儀鄭氏曰賔登堂聴命也賔為擯勞用束帛擯用束錦及退拜送致館如初之儀鄭氏曰如郊勞也不擯耳侯伯之臣致館于庭不言致飡者君於聘大夫不致飡也環人掌送逆邦國之通賔客以路節達諸四方舎則授館遺人五十里有市市有候館候館有積詩曰于豳斯館聘禮大夫帥至于館卿致館賔迎再拜卿致命賔再拜稽首卿退賔送再拜記曰卿館於大夫大夫館於士士館於工商雜記曰凡為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫以下之家也禮運曰天子適諸侯必舍其祖廟覲禮侯氏至朝天子賜舍鄭氏曰賜舍猶致館也所使者司空與小行人為承擯曰伯父女順命于王所賜伯父舍此致館辭侯氏再拜稽首擯之束帛乗馬王使人以命致館無禮猶擯之者尊王使也侯氏受館於外既則擯使者於内國語曰襄王使太宰文公及内史興賜晉文公命晉侯郊勞館諸宗廟韋昭曰尊王命也單襄公曰敵國賔至卿出郊勞司里授館聘禮卿致館左傳襄三十一年子産相鄭伯以如晉晉侯未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之子産曰僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢圬人以時塓館宫室諸侯賔至甸設庭燎僕人巡宫賔至如歸今銅鞮之宫數里而諸侯舍於𨽻人門不容車而不可踰越若又勿壞是無所藏幣以重罪也趙文子曰信晉侯見鄭伯有加禮乃築諸侯之館古者天子巡守館於諸侯之祖廟禮記曰天子適諸侯舍於祖廟是也王人出聘亦館於諸侯之廟國語曰襄王使太宰文公及内史興賜晉文公命文公館諸宗廟是也若侯氏之朝王列國之相朝聘則不必館於廟故覲禮侯氏至天子賜舍春秋傳曰文公之為盟主也崇大諸侯之館館如公寢聘禮記曰卿館於大夫大夫館於士士館於工商雜記曰凡為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫以下之家是也鄭氏曰館者必於廟拘矣禮既授賔館則從而致之故諸侯相朝主君致館諸臣相聘卿致館主君致館必有幣賔繼主君亦然司儀云諸公相為賔主君郊勞三辭拜受拜受受幣也致館亦如之賔繼主君皆如主國之禮是也若天子之於侯氏賜舍則無幣而侯氏猶儐賜舍者以束帛乗馬尊王使也諸侯之於聘賔致館亦無幣而賔亦不儐致館者降君禮也鄭氏釋司儀謂致館如郊勞不儐耳及釋聘禮則曰主人以上卿禮儐之賈公彦於司儀言致館無束帛賔亦無儐於聘禮言以上卿禮明有束帛可知是自戾也庭燎詩庭燎美宣王因以箴之而言夜未央庭燎之光夜未艾庭燎晰晣夜向晨庭燎有煇毛氏曰庭燎大燭也郊特牲曰庭燎之百由齊桓公始也庭燎之差公葢五十侯伯子男三十正義曰此數出大戴記也百者皇氏云作百炬列於庭也或云百炬共一束也又曰鄉為田燭田燭田首為燭也少儀曰主者執燭抱燋周禮宫正宫中廟中則執燭司烜氏凡邦之大事共墳燭庭燎墳大也樹於門外曰大燭於門内曰庭燎正義曰庭燎所作依慕容所為以葦為中心以布纒之飴蜜灌之若今蠟燭百者或以百根一處設之或百處設之若人所執者用荆燋為之執燭抱燋曲禮云燭不見跋是也周語太宰文公及内史興賜晉文公命上卿逆於境晉侯郊勞館諸宗廟饋九牢設庭燎單子謂定王曰敵國賔至甸人積薪火師監燎火師司火燎庭燎也左傳曰諸侯賔至甸設庭燎燕禮甸人執大燭於庭在手曰燭在地曰燎故禮於燭言執於燎言設而已古者祭祀朝覲賔客皆用庭燎而司烜凡邦之大事共墳燭庭燎則非大事之所用者不必司烜所共也庭燎之差天子百公五十侯伯子男皆三十此葢其所設之數也先儒謂庭燎所作依慕容所為以葦為中心以布纒之飴蜜灌之若人所執者用荆燋為之於理或然漢志秦以十月上宿郊見通權火張晏曰權火㷭火也其法類稱故謂之權火漢祀五畤於雍五十里一㷭火而後世祭祀或祖而用焉非古也市制易曰古者日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑内宰凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以陰禮左立朝而右立市陰陽相成之義次思次也叙介次也祭之以陰禮市中之社先后所立社也遺人五十里有市市有候館司市掌市之治教政刑量度禁令以次叙分地而經市次謂吏所治舍思次介次也若今市亭然叙肆行列也經界也以陳肆辨物而平市以政令禁物靡而均市以商賈阜貨而行布以量度成價而徵儥以質劑結信而止訟以賈民禁偽而除詐以刑罰禁虣而去盜以泉府同貨而歛賒大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主凡市入則胥執鞭度守門市之羣吏平肆展成奠賈上旌于思次以令市市師涖焉而聴大治大訟胥師賈師涖于介次而聴小治小訟質人掌成市之貨賄人民牛馬兵器珍異廛人掌歛市絘布總布質布罰布廛布而入于泉府胥師各掌其次之政令而平其貨賄賈師各掌其次之貨賄之治司虣掌憲市之禁令司稽掌巡市而察其犯禁者與其不物者而摶之胥各掌其所治之政執鞭度而巡其前肆長各掌其肆之政令泉府掌以市之征布歛市之不售貨之滯於民用者司關掌國貨之節以聫門市量人營軍之壘舍量其市朝州涂軍社之所里匠人營國靣朝後市市朝一夫禮記檀弓曰歳旱穆公召縣子而問曰徙市則奚若曰為之徙市不亦可乎王制曰有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精麤不中數幅廣狹不中量不粥於市姦聲亂正色不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鼈不中殺不粥於市冡宰齋戒受質大樂正大司冦市三官以其成從質於天子家語衞莊公改舊制變宗廟易朝市高子問於孔子曰周禮繹祭於祊祊在廟門之西前朝而後市今衛君欲其事事一更之如之何孔子曰繹之於庫門内祊之於東方朝市於西方失之矣左氏昭二年鄭子晢請以印為禇師杜預曰市官也孟子曰古之為市也以其所有易其所無者有司治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣風俗通曰市恃也言交易而退恃以不匱也古史考云神農作市高陽氏衰市官不修祝融修市又市巷謂之闤市門謂之闠巷門謂之閎市中空地謂之廛市樓謂之旗亭西京賦云旗亭五里先王之居也左聖向仁右義背藏嚮仁故靣朝背藏故後市朝王所建市后所立市之制其廣一夫其位三方其旁有門分之以廛列之以肆有泉府以歛賖有思次介次以治訟其祭有禮其徙有時古之言市者必曰市井若詩曰歌舞於市井士相見禮曰在邦曰市井之臣齊語曰處商就市井揚子曰市井相與言以市必同井故也何休曰因井田以為市風俗通曰人有所鬻必濯於井上然後至市二説不知何據然也賈公彦曰三市皆於一院内為之大市於中朝市於東夕市於西則市之所設豈非陰陽自然之理哉衞之時朝市之於西方失之矣古之治市也毎肆一長二肆一胥五肆一司稽十肆一司虣二十肆一賈師一胥師其法有治教政刑量度禁令而君夫人世子命夫命婦不得過屬遊飲食者不得行鬭囂虣亂出入相陵犯者不得作圭璧金璋犧牲祭器戎器與不中度量不中殺伐之類不得粥其犯禁者司門舉之於門質人舉之於市摶之以司稽察之以胥師然後治於司市其附于刑則歸于士凡以阜民財一民行而已此所謂以義為利不以利為利也然市不特立於國中而巳遺人五十里有市市有候館量人營車之壘舍量其市朝州涂軍社之所里則道路之與軍師亦有市矣天文心為明堂東北曲十二星曰旗旗中四星曰天市中星衆者實其中虛則耗此市之象也禮書卷四十六
