body:
  text: 禮書卷五十一宋陳祥道撰笏玉藻曰笏天子以球玉諸侯以象大夫以魚須文竹士竹本象可也球美玉也文猶飾也大夫士飾竹以為笏不與君並用純物也見於天子與射無説笏入太廟説笏非古也言凡吉事無説笏也太廟之中唯君當事説笏也小功不説笏當事免則説之免悲哀哭踊之時不在於記事也小功輕不當事可以説笏也既搢必盥雖有執於朝弗有盥矣凡有指畫於君前用笏造受命於君前則書於笏笏畢用也因飾焉笏度二尺有六寸其中傳三寸其殺六分而去一殺猶杼也天子杼上終葵首諸侯不終半葵首大夫士又杼其下首廣二寸又曰天子搢珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也又曰將適公所史進象笏書思對命又玉藻曰年不順成君衣布搢本搢本去珽荼佩士笏也內則曰子事父母韠紳搢笏樂記曰武王散軍而郊射禆冕搢笏而虎賁之士説劒也儀禮士緇帶韎韐竹笏禮器曰大圭不瑑周禮王搢大圭執鎮圭藻藉五采五就以朝日考工記曰大圭長三尺杼上終葵首天子服之荀卿曰天子御珽諸侯御荼大夫服笏管子曰天子執玉笏以朝日釋名曰笏忽也君有命則書其上備忽忘也或曰簿可以簿疏物也徐廣車服儀制曰笏即手板也蜀志秦密見太守以簿繫頰則漢魏以來皆執手板故云若今吏之持簿天下之事常修治於人之所慎而廢弛於人之所忽先王於是制為之笏或執或搢而畢用之使人稽其名以見其義觀其制以思其德庸有臨事而失者乎天子之笏以玉諸侯以象大夫以魚須文竹士竹本象可也蓋玉德之美象義之辨竹禮之節天子尚德諸侯貴義大夫士則循禮而已此笏所以異也魚須文竹竹而以魚須文之也竹本象可也竹本而象飾之也大夫近尊而其勢屈士遠尊而其體伸此飾所以異也禮大夫沐稷而君與士皆沐梁大夫之臣曰私人而君與士之臣皆曰私臣大夫祭則堂之上下共尊而君與士則堂下異尊大夫內子拜尸西而君與士之妻則北面大夫之於主婦不致爵而君與士則致爵大夫嗣子不舉奠而君與士之嗣則舉奠大夫賔尸尸酢主人乃設席而君與士則先酢而設席大夫前祭一日筮尸而君與士則前祭三日筮尸大夫祭之日視濯而君與士則前祭一日視濯凡此皆順而托之之禮則其飾笏以象不亦可乎天子之於天下體無所屈故珽必方正諸侯之於天子則謹度以臣之於臣民則制度以君之故荼必前屈後直大夫於其君則為臣於天子則為陪臣故笏必前屈後屈士笏之制無所經見觀其飾之以象疑亦前屈後直歟天子之朝日執鎮圭搢大圭則所執者摯也所搢者笏也諸侯之朝大夫之聘蓋亦如此則諸侯執命圭者必搢荼大夫執聘圭者必搢笏及其合瑞而授圭則執其所搢而已此所謂見於天子無説笏也見天子也入太廟也射也皆禮之不可忽者故不説笏小功則禮可以勝情故亦不説笏當事而免則事可以勝禮故説之小功不説笏則大功以上説之可知大圭三尺杼上終葵首杼殺也考工記曰凡為輪行澤者欲杼典瑞王搢大圭執鎮圭繅藉五采五就以朝日玉藻曰笏天子以球玉又曰天子搢珽方正於天下也左氏曰衮冕黻珽昭其度也禮器曰大圭不琢玉人曰大圭長三尺杼上終葵首天子服之鄭氏釋玉藻曰珽亦笏也或謂之大圭球美玉也禹貢雍州厥貢球琳琅玕爾雅釋地西北之美者有昆崙之璆琳琅説文曰球或從翏則璆與球同釋玉人曰大圭或謂之珽杼殺也終葵椎也賈公彥曰齊人謂椎為終葵為椎於杼上明無所屈也蓋天子之笏其玉以球其不琢也謂之大圭其方正也謂之珽其實一也終葵首六寸相玉書曰珽玉六寸明自照是也典瑞曰搢大圭玉藻曰搢珽玉人曰天子服之荀子曰天子御珽然則搢之者服之也御者進之也天子諸侯之笏必以人進之大夫士則服之而已玉藻曰史進象笏諸侯之禮也然王朝日禮神執鎮圭而搢大圭既禮神矣宜置鎮圭而用大圭歟玉藻言笏度二尺有六寸其中博三寸具殺六分而去一然天子之笏長三尺而六寸為椎首而計之則於二尺六寸為有餘去椎首而計之則於二尺六寸為不足蓋玉藻所言非天子之笏孔頴達曰二尺六寸短於天子蓋諸侯以下度分皆然諸侯荼前詘後直玉藻曰笏諸侯以象又曰諸侯荼前詘後直讓於天子也荀子曰諸侯御荼鄭氏曰荼讀為舒遲之舒舒懦者畏在前也詘謂圜殺其首不為椎頭觀考工記弓人曰斫目必荼鄭司農曰荼徐也書大傳曰陽盛則吁荼萬物而養之史日月朓則王侯其荼蓋古者荼舒通用荼之度二尺六寸其中博三寸其殺六分而去一大夫笏大夫之笏以魚須文竹鄭氏曰文猶飾也庾氏曰以鮫魚須飾竹以成文考之書大傳曰東海魚須目鄭氏曰魚須今以為簮司馬相如賦曰靡魚須之橈旃張揖曰以魚須為旃柄則大夫以之飾笏宜矣陸德明讀須為班蓋竹取其堅貞有節也前詘後詘無所不讓也以魚須飾之卑者不敢用純也王天子用全上公用龍侯用瓉伯用將亦卑者不敢用純之意士竹本儀禮士竹笏玉藻曰士竹本象可也蓋竹本尢堅貞而有節者也士以節義為尚故笏用焉象諸侯所以為笏者也士卑而伸故飾笏用焉玉藻曰年不順成君搢本蓋竹本也先儒謂士竹本象者以象飾其本誤矣天子之笏曰珽諸侯曰荼大夫以下曰笏者尊者文其名卑者命其實故車天子諸侯曰路大夫以下曰車寢天子諸侯曰宫大夫以下曰寢妻諸侯曰夫人大夫曰孺人士曰婦庶人曰妻死諸侯曰薨大夫曰卒士曰不祿庶人曰死意與此同禮書卷五十一
