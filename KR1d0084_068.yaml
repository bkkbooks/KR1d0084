body:
  text: 禮書卷六十九宋陳祥道撰大寢小寢詩曰奕奕寢廟又曰寢廟奕奕周禮隸僕掌五寢之掃除糞灑之事祭祀修寢大喪復于小寢大寢鄭氏曰五寢五廟之寢周天子七廟唯祧無寢詩曰寢廟繹繹相連貌也小寢高祖以下廟之寢始祖曰大寢爾雅曰室有東西廂曰廟無東西廂曰寢左傳曰民有寢廟又曰子大叔之廟在道南其寢在道北月令曰乃修闔扇寢廟畢備詩曰寢廟奕奕鄭氏釋周禮謂寢廟繹繹相連貌也蓋古詩之文或作繹繹又春秋之時子大叔之廟在道南其寢在道北此古者前廟後寢之遺象也漢自眀帝詔遵儉約無起陵寢藏主於世祖廟更衣自此魏立二廟文武之髙祖處士曽祖髙皇大皇帝共一廟考太祖皇帝特一廟晉宋齊隋及唐皆一廟異飾非古制也廟飾眀堂位曰山節藻棁復廟重簷刮楹達鄉反坫出尊崇玷康圭疏屏天子之廟飾也山節刻欂盧為山也藻帨畫侏儒柱為藻文也復廟重屋也重簷重承壁材也刮刮摩也鄉牖屬謂夾戶窗也春秋書丹桓宫楹刻桓宫桷穀梁謂天子諸侯黝堊大夫蒼士黈丹楹非禮也天子之桷斫之礱之加密石焉晉語書大傳皆曰天子之室斫其椽而加密石焉諸侯之桷斫之礱之大夫斫之士斫本斫之蓋稜之也傳曰大夫達稜士首本刻桷非正也天子之楹刮之而飾以黝堊天子之桷礱之加密石而無飾黝黑飾也堊白飾也爾雅地謂之黝牆謂之堊穀梁之言黝堊則楹而巳范寧以黝堊為黑飾誤也子貢觀魯廟之北堂問於孔子彼皆斫耶匠過之耶孔子曰非無良材也蓋在貴久也魯廟如此則天子之廟可知矣後世禮廢趙文子之室斫而礱之僣於諸侯臧文仲管夷吾山節藻棁又僣於天子寢廟薦新上檀弓曰有薦新如朔奠重新物為之殷奠王制大夫士宗廟之祭有田則祭無田則薦有田者既祭又薦新祭以首時薦以仲月士薦牲用特豚大夫以上用羔所謂羔豚而祭百官皆足詩曰四之日其蚤獻羔祭韭庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈月令仲春天子乃鮮羔開冰先薦寢廟鮮當為獻聲之誤也獻羔謂祭司寒也祭司寒而出冰薦於宗廟乃后賦之季春天子始乘舟薦鮪于寢廟進時美物孟夏天子乃以彘嘗麥先薦寢廟麥之新氣尤盛以彘食之散其熱也彘水畜仲夏天子乃以雛嘗黍羞以含桃先薦寢廟含桃櫻桃也孟秋天子嘗新先薦寢廟天子必親往視漁明漁非常事也此時魚潔美少儀未嘗不食新嘗謂薦新物於寢廟周禮漁人春獻王鮪王鮪鮪之大者月令季春薦鮪于寢廟詩七月四之日其蚤獻羔祭韭月令仲春天子乃獻羔開冰先薦寢廟潛詩曰季冬薦魚春獻鮪也冬魚之性定春鮪新來薦獻之者謂於宗廟也儀禮士喪禮朔月奠用特豚魚臘陳三鼎有薦新如朔奠徹朔奠先取醴酒其餘取先設者既夕禮朔月若薦新不饋于下室以其殷奠有黍稷也漢惠帝時叔孫通者曰古者有春嘗果方今櫻桃熟可獻遂獻宗廟諸果之獻由此興魏初高堂隆按舊典天子諸侯月有祭事其孟月則四時之祭也三牲黍稷時物咸備其仲月季月皆薦新之祭也大夫以上將之以羔或加以犬而已不備三牲也士以豚庶人則唯其時宜魚鴈可也皆有黍稷禮器曰羔豚而祭百官皆足太牢而祭不必有餘羔豚則薦新之禮也後魏詔曰有邑之君祭以首時無田之士薦以仲月漢舊儀嘗韭之屬皆於廟而不在寢故韋玄成傳以為廟嵗二十五祠而薦新在焉自漢至隋唐因仍其失薦新雖在廟然皆不出神主韋彤五禮精義所説但設神座後漢詔書亦以薦新味多非其節或鬱養強熟或穿掘萌芽味無所至而夭折生長自今當奉祠陵寢皆須時乃上唐四時各以孟月享太廟室各用一太牢若品物時新堪進御者有司先送太常令尚食相知簡擇務令潔淨仍以滋味與新相宜者配之太常卿及少卿一人奉薦太廟有司行事不出神主仲春薦冰亦如之人子之於親飲食與藥必先嘗而後進四時新物必先獻而後食寢廟之薦新蓋亦推其事先之禮以盡其誠敬而已先儒謂廟藏神主而祭以四時寢衣冠几杖之具而祭之以新物然國語曰大寒取名魚登川禽嘗之寢廟月令四時新物皆先薦寢廟者蓋有寢者薦於寢無寢者薦於廟非謂薦止於寢也月令雜記秦禮秦出寢於陵則月令所謂寢廟豈皆廟後之寢乎古者掌外事之兆有典祀掌廟有守祧掌寢有隸僕故典祀若以時祭祀則帥其屬而修除徴役于司隸而役之守祧其廟則有司修除之其祧則守祧黝堊之鄭氏曰廟祭此廟也隸僕祭祀修寢祭義孝子將祭宫室既修牆屋既設百物既備然後夫妻齋戒又曰孝子將祭以修宮室以治百事祭祀修寢則薦新蓋亦修焉觀詩序言薦魚獻鮪而詩言以享以祀月令言以共寢廟之祀則薦新亦謂之祀也祭僕大喪復于小廟隸僕大喪復于小寢大寢小寢高祖以下之寢廟也大寢始祖之寢也復于廟則小廟而已於寢則及大寢者以廟嚴於寢故也寢廟薦新下古者祭必卜日而薦新不擇日祭有尸而薦無尸以至不出神主奠而不祭有時物而無三牲黍稷此薦新之大略也漢及隋唐薦新不出神主韋彤五禮精義言薦新但設神座鄭氏釋王制謂大夫士祭以首時然祭以致禮有常月薦以仲月祭以致孝而無常時周禮王者享蒸之畋皆在仲月是祭有常月也月令王者薦新或於孟月或於仲季唯其時物而已是薦無常時也魏高堂隆謂天子諸侯月有祭事其孟月則四時之祭也其仲月季月薦新之祭也豈非惑於鄭氏之説然耶漢舊儀嘗韭之屬皆於廟而不在寢故韋玄成傳以為廟嵗二十五祠而薦新在焉唐禮使太常卿一人奉薦新物有司行事然薦非盛禮一之於廟失之太瀆有司行事失之太輕既夕禮朔月薦新不饋于下室檀弓亦曰薦新如朔奠古人之重薦新如此則躬薦可知庶人祭於寢王制曰庶人祭於寢寢適寢也又曰庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈庶人無常牲取與新物相宜而已曽子問曰無祿者稷食祭法曰庶士庶人無廟死曰鬼庶士府史之屬凡鬼薦而不祭楚語曰庶人有魚炙之薦籩豆脯醢則上下共之以多少為差也不羞珍異不陳庶侈又曰庶人食菜祀以魚又曰士庶人舍時庶人之死曰鬼寢而不廟薦而不祭故春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈取其與新物相宜而已國語曰庶人有魚炙之薦而不及豚鴈者舉其所易者言之也然言庶人舍時則與王制異矣古之貴者有正寢有燕寢正寢在外燕寢在內然則庶人祭於寢蓋亦在外之適寢歟聘禮記卿館於大夫大夫館於士士館於工商鄭氏曰官師以上有廟有寢工商則寢而巳寢所以館士則在外可知昭穆周禮小宗伯辨廟祧之昭穆冢人先王之葬居中以昭穆為左右小史掌邦國之志奠繫世辨昭穆大祭祀史以書敘昭穆之俎簋司士凡祭祀賜爵呼昭穆而進之祭統曰凡賜爵昭為一穆為一昭與昭齒穆與穆齒此之謂長幼有序又曰祭有昭穆昭穆者所以别父子逺近長幼親疏之序而無亂也是故有事於大廟而羣昭羣穆咸在而不失其倫此之謂親疏之殺仲尼燕居曰嘗禘之禮所以仁昭穆也中庸曰宗廟之禮所以序昭穆也王制天子七廟三昭三穆與大祖之廟而七諸侯五廟二昭二穆與大祖之廟而五大夫三廟一昭一穆與大祖之廟而三士一廟大傳曰合族以食序以昭穆人道竭矣喪服小記曰妾祔於妾祖姑亡則中一以上而祔必以昭穆雜記曰士不袝大夫袝大夫之昆弟無昆弟則從其昭穆婦祔於其夫之所祔之妃無妃則亦從其昭穆之妃妾祔於妾祖姑無妾祖姑亦從其昭穆之妾士虞禮記曰眀日以其班祔春秋書大事於大廟躋僖公穀梁曰先親而後祖逆祀也逆祀則是無昭穆也無昭穆則是無祖也無祖則無天也君子不以親親害尊尊春秋之義也國語曰夏父弗忌為宗蒸將躋僖公宗有司曰非昭穆也曰我為宗伯眀者為昭其次為穆何常之有有司曰夫宗廟之有昭穆也以次世之長幼而等胄之親疏也夫祀昭孝也各致齊敬於其皇祖昭孝之至也故工史書世宗祝書昭穆猶恐其踰也弗聽遂躋之左傳宫之奇曰大伯虞仲大王之昭虢仲虢叔王季之穆富辰曰管蔡郕霍文之昭也邗晉應韓武之穆也曹侯曰曹叔振鐸文之昭也先君唐叔武之穆也記曰庶子不祭殤與無後者殤與無後者從祖袝食劉歆曰孫居王父之處正昭穆則與祖相代此遷廟之殺也張純曰父子不並坐而孫從王父決疑要注曰凡昭穆父南面故曰昭昭眀也子北面故曰穆穆順也杜佑曰太祖于室中之奧西壁下東面太祖之子南面為昭次之昭之子北面相對為穆張純曰元始中禘禮父為昭南向子為穆北面父子不並坐父以眀察下故曰昭昭如字晉諱昭字音韶子以敬事上故曰穆宗廟有迭毁昭穆則一成而不可易春秋傳言大王之昭王季之穆又言文之昭武之穆此世序之昭穆不可易也周官冢人掌公墓之地先王之葬居中以昭穆為左右此葬位之昭穆不可易也儀禮曰卒哭眀日以其班祔禮記曰祔必以其昭穆亡則中一以上此袝位之昭穆不可易也司士凡祭祀賜爵呼昭穆而進之祭統凡賜爵昭為一穆為一昭與昭齒穆與穆齒此賜爵之昭穆不可易也大傳曰合族以食序以昭穆此合食之昭穆不可易也生而賜爵合食死而葬袝皆以世序而不可易則廟之昭穆可知矣其制蓋祖廟居中而父昭在左子穆在右始死者昭耶則毁昭廟始死者穆耶則毁穆廟昭與昭為列而無嫌乎子加於父穆與穆為列而無嫌乎父屈於子猶之賜爵也子與祖齒而無嫌乎卑者先父與孫齒而無嫌乎尊者後猶之立尸也子無嫌乎南面而坐父無嫌乎北面而事之則昭穆之不互易不足怪也先儒謂周藏先公木主於后稷之廟先王木主穆在文王廟昭在武王廟於理或然禮書卷六十九
