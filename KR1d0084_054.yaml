body:
  text: 禮書卷五十五宋陳祥道撰圭瓉璋瓉大璋中璋邊璋鬱人凡裸玉濯之陳之以贊裸事詔裸將之儀與其節裸玉謂圭瓉璋瓉大喪及葬共其裸器遂埋之遣奠之彛與瓉也典瑞裸圭有瓉以肆先王以裸賔客鄭司農云於圭頭為器可以挹鬯裸祭詩曰瑟彼玉瓉黃流在中國語謂之鬯圭以肆先王裸先王祭也玄謂肆解牲體以祭因以為名爵行曰裸漢禮瓉槃大五升口徑八寸下有槃口徑一尺玉人裸圭尺有二寸有瓉裸謂始獻酌奠也瓉如槃其柄用圭有流前注大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬射琰出者也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也玄謂鼻勺流也凡流皆為龍口也衡古丈橫假借字也衡謂勺徑也三璋之勺形如圭瓉天子巡守有事山川則用灌馬於大山川則用大璋加文飾也於中山川用中璋殺文飾也於小山川用邊璋半文飾也王制賜圭瓉然後為鬯未賜圭瓉則資鬯於天子郊特牲周人尚臭灌用鬯鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致陰氣也明堂位曰灌用玉瓉大圭祭統曰君執圭瓉裸尸大宗執璋瓉亞裸大宗亞裸容夫人有故攝馬詩棫朴曰濟濟辟王左右奉璋箋云璋璋瓉也祭祀之禮王裸以圭瓉諸臣助之旱麓曰瑟彼玉瓉黃流在中玉瓉圭瓉也黃金所以飾流鬯也九命然後錫以秬鬯圭瓉箋云瑟潔鮮貌黃流秬鬯也圭瓉之狀以圭為柄黃金為勺青金為外朱中央圭瓉謂之玉瓉黃金所以飾流鬯可知矣江漢曰釐爾圭瓉秬鬯一卣告于文人卣器也九命錫圭瓉文人文德之人也箋云王賜召虎以鬯酒一尊使以祭其宗廟告其先祖謂有德美見記也正義曰秬鬯一卣者祭時在彛未祭在卣賜時未祭故卣盛之書文侯之命曰平王錫晉文侯秬鬯圭瓉又曰用賚爾秬鬯一卣魯語魯飢文侯以鬯圭與玉磬如齊告糴白虎通言九錫之禮曰孝道備者錫以秬鬯圭瓉宗廟之盛禮也玉以象德金以配情芬香條鬯以通神靈玉飾其末君子之性金飾其中君子之道金者和之至也玉者德美之至也鬯者芬香之至也君子有玉瓉秬鬯乎鄭氏釋小宗伯云天子圭瓉諸侯璋瓉既不得鬯則用薰故王度記云天子以鬯諸侯以薰圭以象陽之生物璋以象陰之成事王之肆先王禮賔客以裸圭后之亞祼與王之巡守以裸璋此王與后陰陽尊卑之分而宗廟賔客山川內外隆殺之辨也裸圭尺有二寸陽以偶成也大璋中璋九寸邊璋七寸陰以竒立也圭璋其柄也瓉其勺也柄則圭璋純玉為之勺則玉多石少者可矣鄭康成許慎所謂瓉四玉一石是也圭瓉璋瓉則玉為之三璋之勺則飾以金焉玉人所謂黃金勺青金外是也三璋射四寸厚寸勺鼻寸衡四寸有繅則鼻寸所以流鬯也衡四寸勺徑也繅藉也圭璋瓉制蓋亦如此先儒謂凡流皆為龍口瓉槃大五升口徑八寸下有槃口徑一尺然古者有圭瓉璋瓉而無下槃有鼻而無龍口先儒之説蓋漢制歟周之時典瑞掌裸圭之名物鬱人掌祼事之儀節涖玉鬯則大宗伯贊祼將則小宰而內宰贊后之裸獻大宗伯攝后之載裸此王與后祭祀賔客之裸禮也惟天地之神無所用裸故典瑞裸圭止於肆先王玉人裸圭止於祀廟則天地無裸可知禮曰諸侯賜圭瓉然後為鬯故旱麓詩曰瑟彼玉瓉黃流在中江漢詩曰釐爾圭瓉秬鬯一卣而魯晉之國皆用焉以其有功於民者也祭統所謂君執圭瓉裸尸大宗執璋瓉亞裸鄭曰容夫人有故攝焉此諸侯用圭瓉之禮也周衰禮廢而臧文仲以鬯圭如齊告糴豈知先王所以康周公之意哉書曰王入大室裸記曰既灌而後迎牲則尸入裸之然後后再裸焉后再裸則大祭祀而已凡小祭祀蓋一裸也內宰大祭祀后裸獻觀周官行人裸侯伯子男一裸則小祭祀一祼可知記言諸侯相朝灌用鬱鬯此亦賜圭瓉者之禮也未賜圭瓉必資鬯於天子宗廟禮神之玉大宗伯有禮天地四方之玉典瑞玉人有祀天旅上帝祀地旅四望祀日月星辰山川之玉特於宗廟言裸圭有瓉以肆先王裸圭尺有二寸有瓉以祀廟則裸圭非禮先王之玉也賈公彥釋大宗伯謂天地有神玉無鬱鬯宗廟有鬱鬯神玉裸用圭璋用玊氣也則宗廟之玉裸圭而已然考之大宰祀五帝贊玉幣爵之事祀神示享先王亦如之大宗伯祀大神享大鬼祭大示涖玉鬯鄭氏皆以玉為禮神之玉又書稱周公之禱大王王季文王而植璧秉圭曾子問稱天子諸侯將出以幣帛皮圭告于祖廟反必設奠斂幣玉藏諸兩階之間則宗廟之玉非特圭而巳且裸以求神及神之格斯然後可得而禮則裸圭非禮神之物也裸之所不用者天地而已其餘祼以圭璋又禮以玉而賔客之儀猶且祼與造贈異玉况先王乎然則典瑞玉人不言宗廟有禮神之玉者特其文不備耳穀圭大璋典瑞曰穀圭以和難以聘女玉人曰穀圭七寸天子以聘女蓋穀圭以穀為文以善為義故可和難以釋仇聘女以納徴也圭貴於璋璋貴於皮天子納徵以穀圭諸侯以大璋士以儷皮此尊卑之所別也然皆玄纁束帛以將之此尊卑之所同也士婚禮納徵玄纁束帛周禮凡嫁子取妻入幣純帛無過五兩雜記曰納幣一束束五兩兩五尋是也蘇秦傳曰錦繡千純犀首傳曰文繡千純裴駰曰純端名則周禮所謂純帛者匹帛也鄭氏改純為緇與士婚禮玄纁之制不類其説非也考之經傳大璋有三爾雅璋大八寸謂之琡玉人大璋中璋九寸邊璋七寸射四寸厚寸天子以巡守而諸侯聘女之璋如邊璋制亦謂之大璋則九寸八寸皆可以大璋命之也琬圭琰圭書曰琬琰在西序典瑞曰琬圭以治德以結好琰圭以易行以除慝玉人曰琬圭九寸而繅以象德琰圭九寸判規以除慝以易行行人曰時聘以結諸侯之好殷眺以除邦國之慝鄭康成謂琬圭王使之瑞節諸侯有德王命賜之及諸侯使大夫來聘既而為壇會之使大夫執以命事焉琰圭亦王使之瑞節除慝亦於諸侯使大夫來眺既而使大夫執而命事於壇調人讎弗辟則與之瑞節而以執之鄭康成曰瑞節琰圭也説文曰琰璧上起美色也蓋琬圭圜而宛之也琰圭剡而有鋒也圜而宛之仁也故以治德以結好剡而有鋒義也故以易行以除慝琰圭判規則圭上圜而判之與凡圭之琰上寸半者異矣康成謂琰圭琰半以上又半為瑑飾賈公彥曰判半也又云規明半以上琰至首規半以下為瑑飾可知然琬琰之有瑑飾於經無見此不可考禮書卷五十五
