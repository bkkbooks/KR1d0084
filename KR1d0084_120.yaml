body:
  text: 禮書卷一百二十一宋陳祥道撰鼓制鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役音聲五聲合和者教為鼓而辨其聲用以雷鼓鼓神祀雷鼓八面鼓也神祀祀天神以靈鼓鼓社祭靈鼓六面鼓也社祭祭地示以路鼓鼓鬼享路鼓四面鼓也以鼖鼓鼓軍事大鼓謂之鼖鼖鼓長八尺以鼛鼓鼓役事鼛鼓長丈二尺以晉鼓鼓金奏晉鼓長六尺六寸金奏謂樂作擊編鍾以金錞和鼓錞錞于也圜如碓頭大上小下樂作鳴之與鼓相和以金鐲節鼓鐲鉦也形如小鍾軍行鳴之以為鼓節司馬職曰軍行鳴鐲以金鐃止鼓鐃如鈴無舌有秉執而鳴之以止擊鼓司馬職曰鳴鐃且卻以金鐸通鼓鐸大鈴也振之以通鼓司馬職曰司馬振鐸凡祭祀百物之神鼓兵舞帗舞者兵謂干戚也帗列五采繒為之有秉皆舞者所執凡軍旅夜鼓鼜鼜夜戒守鼓也司馬法曰昏鼓四通為大鼜夜半三通為晨戒旦明五通為發昫軍動則鼓其衆田役亦如之救日月則詔王鼓救日月食王必擊鼓者聲大異春秋傳曰非日月之青不鼓大喪則詔大僕鼓大司樂靁鼓靁鼗冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣靈鼓靈鼗夏日至於澤上之方丘奏之若樂八變則地示皆出可得而禮矣路鼓路鼗於宗廟之中奏之若樂九變則人鬼可得而禮矣王大食三宥皆令奏鍾鼓樂師凡國之小事用樂者令奏鍾鼓饗食諸侯序其樂事令奏鍾鼓令相如祭之儀燕射帥射夫以弓矢舞樂出入令奏鍾鼓大師下管播樂器令奏鼓朄朄小鼓也先擊小鼓乃擊大鼓小鼓為大鼓先引故曰朄朄讀為道引之引玄謂鼓朄猶言擊掦詩云應朄縣鼓大饗亦如之小師掌教鼓鼗出音曰鼓鼗如鼓而小持其柄搖之旁耳邏自擊下管擊應鼓應鼙也應與朄及朔皆小鼓也其所用未聞凡小祭祀小樂事鼓朄瞽矇掌播鼗眂瞭凡樂事播鼗鼓賔射皆奏其鍾鼓鍾師凡樂事以鍾鼓奏九夏鎛師凡軍之夜三鼜皆鼓之守鼜亦如之籥章掌土鼓豳籥杜子春曰土鼓以瓦為匡以革為兩面可擊也中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之凡國祈年于田祖吹豳雅擊土鼓以樂田畯國祭蠟則吹豳頌擊土鼓以息老物大司馬中春教振旅辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙提謂馬上鼓有曲木提持鼓立馬髦上故謂之提考工記韗人為皋陶鄭司農云皋陶鼓木也玄謂鞠則陶字從革長六尺有六寸左右端廣六寸中尺厚三寸版中廣頭狹為穹隆也鄭司農云謂鼓木節判者其兩端廣六寸而其中央廣尺也如此乃得有腹穹者三之一鄭司農云穹讀為志無空邪之空謂鼓木腹穹隆者居鼓三之一也玄謂穹讀如穹蒼之穹穹隆者居鼓面三分之一則其鼓四尺者版穹一尺三寸三分寸之一也倍之為二尺六寸三分寸之二加鼓四尺穹之徑六尺六寸三分寸之二也此鼓合二十版上三正鄭司農云謂兩頭一平中央一平也玄謂三謂當為參正直也參直者穹上一直兩端又直各居二尺二寸不弧曲也此鼓兩而以六鼓差之賈侍中云晉鼓大而短近晉鼓也以晉鼓鼓金奏鼓長八尺鼓四尺中圍加三之一謂之鼖中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺三寸三分寸之一也今亦合二十版則版穹六寸三分寸之二耳大鼓謂之鼖以鼖鼓鼓軍事鄭司農云鼓四尺謂革所蒙者廣四尺也為皋鼓長尋有四尺鼓四尺倨句磬折以皋鼓鼓役事磬折中曲之不參正也中圍與鼖鼓同以磬折為異凡冒鼓必以啓蟄之日啓蟄孟春之中也蟄蟲始聞雷聲而動鼓所以取象也冒蒙鼓以革良鼓瑕如積環革調急也鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞大僕建路鼓于大寢之門外而掌其政禮記王制天子賜諸侯之樂則以柷將之賜伯子男則以鼗將之月令仲夏之月命樂師修鞀鞞鼓禮運夫禮之初蕢桴而土鼓禮器曰廟堂之下縣鼓在西應鼓在東學記鼓無當於五聲五聲弗得弗和樂記會守拊鼓鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣然後聖人作為鞉鼓椌楬塤箎此六者德音之音也大射建鼓在阼階西南鼓應鼙在其東南鼓西階之西頌磬東面其南鍾鎛一建鼓在其南東鼓朔鼙在其北一建在西階之東南面簜在建鼓之間爾雅釋樂曰大鼓謂之鼖小鼓謂之應大鼗謂之麻小鼗謂之料徒擊鼓謂之咢詩曰擊鼓其鏜坎其擊鼓鼉鼓逄逄又曰應田縣鼓鼗鼓淵淵置我鞉鼓風俗通曰鼓者郭也春分之音萬物皆鼓甲而出故謂之鼓易通卦驗曰冬至鼓用馬革圓徑八尺一寸夏至鼓用牛皮圓徑五尺一寸鄭氏曰馬坎類也荀卿曰鼓象地堯有敢諫鼓禹以五聲聽治曰教寡人以道者擊鼓左氏曰分唐叔以密須之鼓上林賦建靈鼉之鼓土鼓蕢桴禮記曰夫禮之初始諸飲食蕢桴土鼓猶若可以致其敬於鬼神又曰土鼓蕢桴葦籥伊耆氏之樂世本曰夷作鼓周禮籥章春秋擊土鼓吹豳詩以逆暑迎寒祈年吹豳雅擊土鼓以樂田畯祭蠟吹豳頌擊土鼓以息老物蓋樂之作本於籥始於土鼓而周家王業之興本於豳逆暑迎寒祈年皆本始民事蠟息老物則息使復本反始而已故所擊者土鼓所吹者豳籥也禮記曰伊耆氏始為蠟周禮伊耆氏掌共王之杖咸以老者待杖然後安猶老物待蠟然後息也伊耆氏以有功於耆老著矣故後世以其官為姓周人以其姓名官先儒為其始制鼓籥又始為蠟於是以為古王者之號然古之制法者隸首造厯大撓作甲子倉頡造書之類豈皆古王者哉果伊耆氏實古王者之號周人固應尊異而神之不宜列於銜枚氏壺涿氏而以下士之官名之也土鼓築土為之也杜子春曰土鼓以瓦為皋陶以革為面然禮運土鼓起於未合土之前與壺涿氏炮土之鼓異矣禮運眀堂位皆言蕢桴蕢或作蒯蓋結草以為桴也鄭氏改蕢蒯為凷其説非也鄭氏釋籥章舉眀堂位曰蒯桴白虎通曰鼓震音也風俗通曰鼓春分之音唐樂志曰鼓者冬至之音當從唐樂志為正韋昭曰正北曰坎為革足鼓鼓其聲象雷其大象天其於樂象君故凡鼓瑟鼓琴鼓鍾鼓簧鼓缶皆謂之鼓以五音非鼓不節也眀堂位曰夏后氏之鼓足鄭康成曰足謂四足考之於禮夏后氏尚黑商尚白周尚赤則三代鼓色可知矣春秋之時楚伯棼射王鼓跗然則兵車之鼓亦有足歟楹鼓商頌曰置我鞉鼓眀堂位曰商之楹鼓禮公執桓圭諸侯之葬有桓楹鄭氏釋周禮曰雙植謂之桓釋禮記曰四植謂之桓則桓楹四稜圭之所顯者雙稜而已楹鼓蓋為一楹而四稜焉貫鼓於其端周禮大僕建路鼓于大寢之門外儀禮大射建鼓在阼階西南鼓則其所建楹也莊子曰負建鼓以亡求亡子建鼓可負則以楹貫之可知魏晉以後復商制而樹之謂之建鼓隋制又棲翔鷺於其上或曰鵠也取其聲逺聞也或曰鷺鼓精也越王勾踐建大路於康宫之端門有雙鷺啄之而去此其象也或曰詩云振振鷺鷺于飛鼓咽咽醉言歸後世悲周之衰故飾鼓以鷺欲其風流存焉國朝沿唐制其高六尺六寸中植以柱設重斗方蓋蒙以朱網張以絳紫繡羅四角六龍竿皆銜流蘇璧璜五采羽為飾于首亦為翔鷺傍又扶二小鼓左曰鞞右曰應然詩言應田縣鼓則周制王之應田在縣鼓之側不在建鼓傍矣禮書卷一百二十一
