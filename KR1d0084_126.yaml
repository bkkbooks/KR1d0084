body:
  text: 禮書卷一百二十七宋陳祥道撰堂上樂圖書曰戛擊鳴球搏拊琴瑟以詠下管鼗鼓合止柷敔笙鏞以間而繼之以擊石拊石夫戛擊柷敔也鳴球玉磬也拊搏鼔類也是舜之時堂上有戛擊堂下有柷敔堂上有鳴球堂下有石磬堂上有拊摶堂下有鼗鼓也詩言設業設簴崇于樹羽應田縣鼓鞉磬柷圉簫管備舉皆在周之庭儀禮樂虡皆在兩階之間此堂下之樂也啇頌曰鞉鼓淵淵嘒嘒管聲既和且平依我磬聲以言堂下之管鼓依我堂上之磬聲也詩注玉磬也觀周書有天球春秋之時齊國佐以玉磬賂晉魯饑文仲以玉磬告糴于齊荀卿曰懸一鍾而尚拊大戴禮曰懸一磬而拊搏則自虞至周堂上皆有玉磬矣有磬必有鍾此荀卿所以有一鍾之説也燕禮鄉射大射皆席工于西階上北面東上則堂上之樂葢皆西陳而北面也儀禮工入則瑟先歌後獻工亦瑟先歌後而樂正常立于西階東周禮登歌先擊拊是樂正居東歌在瑟西而瑟又在拊西其他不可考也周禮鼔人以晉鼔鼓金奏鎛師掌金奏之鼓鍾師以鍾鼓奏九夏記曰入門而懸興春秋傳曰入門而金作國語曰金不過以動聲又曰金石以動之先儒謂凡樂先擊鍾次擊鼓是也小胥下管播樂器令奏鼓朄瞽矇眡瞭凡樂事先播鼗朄則引大鼔者也鼗兆鼓者也觀眡瞭播鼗擊頌磬笙磬詩言鼗磬柷圉儀禮大射鼗倚于頌磬西紘言鼗必及磬設鼗必倚磬之紘是鍾磬作則鼗作矣及下管播樂器而樂具作焉乃鼓朄以先之是鼗常在前而朄常在後也先王賜諸侯樂則以柷將之賜子男則以鼗將之以鼗不以朄則鼗先於朄可知矣鍾磬之應歌者曰頌鍾頌磬其應笙者曰笙鍾笙磬春秋傳有歌鍾與頌鍾頌磬之義同周禮有鍾笙笙師祭祀饗射共其鍾笙之樂與笙鍾笙磬之意同先儒謂磬在東曰笙笙生也在西曰頌頌或作庸庸功也豈其然歟然頌磬在西笙磬在東朔鼙在西應鼙在東是堂下之樂貴西也堂下之樂貴西堂上之樂上東者貴西所以禮賓上東於西階之上亦以其近賓故也觀鄉飲酒鄉射之用樂皆樂正告備于賓特燕禮告備于公以眀君臣之分而已則樂為賓設可知矣樂縣樂縣見於經者尤略今姑推儀禮大射燕禮鄉射鍾磬之位存其大槩於此王宫縣諸侯軒縣諸侯大射之縣鄉飲樂周禮小胥王宫縣諸侯軒縣卿大夫判縣士特縣凡縣鍾磬半為堵全為肆葢縣鍾十二為一堵二堵為一肆堵言合是以為宫肆言全而後可以陳列也宫縣象宫室軒縣闕其南判縣左右之合特縣於東方或階間而已諸侯之卿大夫半天子之卿大夫諸侯之士半天子之士則天子之卿大夫判縣東西各一肆東西各有鍾磬諸侯之卿大夫判縣東西各一堵東磬西鍾天子之士特縣南一肆諸侯之士特縣南一堵有磬無鍾考之儀禮大射樂人宿縣于阼階東笙磬西面其南笙鍾其南鎛皆南陳建鼓在阼階西南鼓應鼙在其東南鼓西階之西頌磬東面其南鍾先儒謂不言頌鍾䝉上文其南鎛皆南陳一建鼓在其南東鼓朔鼙在其北一建鼔在西階之東南面簜在建鼓之間鼗倚于頌磬西紘此於羣臣備三面而已非軒縣也先儒以為宫縣四面皆鍾磬鎛軒縣三面亦鍾磬鎛判縣有鍾磬而無鎛特縣有磬而無鍾大射避射位北方鼓而已此説是也然則諸侯非大射則阼階之建鼓葢在東而南陳應鼙在其北與朔鼙相應然則大射阼階北方之鼔非其常位也禮器曰廟堂之下懸鼓在西應鼓在東是也北齊之制宫懸各設十二鍾於其辰位四面設編鍾編磬各一虡合二十架設建鼔於四隅郊廟㑹同用之此或髣髴古制歟鄉射笙入立于縣中西面則東縣磬而已鄉飲磬階縮霤笙入磬南則縮縣磬而已此士特縣之制也鄉射避射位故縣在東鄉飲非避射位故縣在南鄉射有卿大夫詢衆庶之事鄉飲酒乃卿大夫之禮皆特縣者以詢衆庶賓賢能非為已也故皆従士制燕禮諸侯之禮而工止四人以從大夫之制其意亦若此歟鄭康成曰鍾磬二八在一虡為一堵杜預曰縣鍾十六為一肆服䖍曰一縣十九鍾十二鍾當十二辰更加七律後周以鍾磬七正七倍而縣十四梁武帝以濁倍三七而縣二十一後魏公孫崇以鍾磬正倍㕘縣之正聲十二倍聲十二而縣二十四隋牛洪據周官鄭康成之説及樂緯宫為君商為臣君臣皆尊各置一枚故後周十四而縣十六唐制分大小二調以二十四枚為大調各有正倍轉通諸均天地宗廟蜡祭大架用之十六枚為小調正通黄鍾林鍾二均釋奠小廟等小架用之至於登歌燕樂亦縣十四或七枚為一格國朝因前代之制止用十六枚以十二枚為正鍾四枚為清鍾然考之於經先王之樂以十有二律為之度數以十有二聲為之齊量國語伶州鳩曰古者神瞽考中聲而量之以制度律均鍾紀之以三平之以六成於十二天之道也唐段安節樂府雜録曰雅部十二鍾每架各編鍾十二各依律吕然則州鳩安節之所述皆與禮合是古者凡縣鍾磬不過十二而旋宫備矣後世増之以至十四十六十九二十一二十四唐兼用之以二十四為大調而其下止於七枚而已葢皆惑於清倍之法然也或曰左氏云中聲以降五降之後不容彈矣則降用半律為清聲矣國語武王以夷則之上宫畢陳以廣鎛之下宫布戎則上宮聲高為清聲矣以至晉師曠師延之時亦有清角清徴晉人笛法正聲應黄鍾下徴應林鍾則清聲所由來逺矣特其用多寡不同故有十三管之和十九管之巢三十六簧之竽二十五絃之瑟則清聲寓於其中可知矣後世儒者以漢成帝犍為郡水濱得古磬十六枚正始中徐州薛城送玉磬十六枚於是多宗鄭氏二八之説用四清聲以謂夷則南吕無射應鍾四宫管短則減黄鍾大吕太簇姑洗四管之半以為清聲而應之則樂音諧矣禮書卷一百二十七
