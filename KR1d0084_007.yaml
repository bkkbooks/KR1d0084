body:
  text: 禮書卷七宋陳祥道撰五色間色考工記曰東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黃染人春暴練夏纁𤣥秋染夏鍾氏染羽以朱湛丹秫三月而熾之淳而漬之三入為纁五入為緅七入為緇爾雅曰一染謂之縓再染謂之緅三染謂之纁鄭氏曰緅今禮作爵如爵頭色又染以黑乃成緇矣凡𤣥色在緅緇之間其六入者歟又曰三入為纁四入為朱歟爵冠色葢青赤𤣥黄白黑正色也綠紅碧紫纁緅緇間色也五行之理有相生者有相尅者相生為正色相尅為間色故甲已合而為綠則綠者青黃之雜以木尅土故也丙辛合而為紅則紅者赤白之雜以火尅金故也乙庚合而為碧則碧者青白之雜以金尅木故也丁壬合而為紫則紫者赤黑之雜以水尅火故也孔子曰君子不以紺緅飾淮南子曰以湼染紺則黑於湼湼黑色也禮文緅或作爵説文緅為青赤色紺為深青色則紺黑於緅矣鄭賈之徒謂纁入黑則為紺紺入黒則為緅不可考也説文又曰緇黒色綠青黃色綘大赤也纁淺綘也縓赤黃色紅赤白色綼蒼艾色綼與綦同紫青赤色紫青赤色而與緅色不異其説誤也然則考工記繢事則青白赤黑𤣥黃而對方繡事則青赤赤白白黑黑青而比方何也繢陽事也輕青而在衣繡隂功也重濁而在裳陽則尊而不親故對方而不比隂則親而不尊故比方而不對緣爾雅曰緣謂之純曲禮曰父母存冠衣不純素孤子當室冠衣不存采深衣具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂縁純邊廣各寸半曲禮又曰大夫士去國素衣素裳素冠徹縁司凡筵莞筵紛純繅席畫純次席黼純士昏禮主人爵弁纁裳緇袘袘謂縁袘之言施以緇縁裳象陽氣下袘女次純衣纁袡袡亦縁也袡之言任也以纁縁其衣象隂氣上任也既夕禮明衣縓綥緆在幅曰綥在下曰緆緇純飾衣曰純謂領與袂衣以緇裳以縓象天地也士冠禮黑屨青絇繶純純博寸純縁也白屨緇絇繶純純博寸纁屨黒絇繶純純博寸既夕記曰攝白絇攝縁也記曰縞冠素紕既祥之冠也純縁邊也又曰童子緇布衣錦縁雜記韠紕以爵韋六寸不至下五寸純以素紃以五采在旁曰紕在下曰純子羔之襲也税衣纁大夫而以纁為之縁非也史曰褾襈襈縁也古者衣裳冠帶韠屨席有縁而純袘紕綼緆袡襈攝皆縁名也特其所施者異耳深衣之縁錦青若素長衣之縁素爵弁纁裳之縁緇明衣之縁縓緇中衣黼領之縁丹朱童子緇布衣之縁錦婦人褖衣縁纁周禮褖衣作緑衣屨之縁或青或緇或黑帶之緣或朱綠或𤣥華席之縁或紛或黼或繪韠之縁爵與素矢服之縁白絇其他不可考也喪服無縁至練然後練衣黃裏縓縁既祥然後縞冠素紕大夫士去國徹縁以喪禮處之也公子為其母麻衣縓縁為妻亦麻衣縓縁以父厭殺之也虞皇鄭氏曰皇冕屬畫羽飾焉凡冕屬其服皆𤣥夏收商冔世本云黃帝造冕史記云堯黃收純衣王制云有虞氏皇而祭夏后氏收而祭商人冔而祭郊特牲與冠禮記云周弁商冔夏收鄭氏釋王制謂皇冕屬也畫羽飾焉釋冠禮記謂弁名出於槃槃大也言所以自光大也冔名出於幠幠覆也言所以自覆飾也收言所以收歛髮也白虎通曰弁攀也攀持其髮此雖不可以考然周禮掌次之皇邸樂師之皇舞皆以鳯凰之羽為之則皇冕畫羽飾可知也王制以皇收冔對冕言之又孔子稱禹致美乎黻冕詩稱商之孫子常服黼冔黼冔云者猶所謂黼冕也冠禮記與郊特牲以收冔對弁言之者三王共皮弁素積則夏商而上非無弁也然世之文質煩簡不同故夏商之用冕者周或用弁而已檀弓曰周人弁而𦵏商人冔而𦵏范氏曰爵弁一名冕廣八寸長尺二寸繪其上似爵頭色有收持笄所謂夏收殷冔者也其説不可考青綠甲乙之中赤縓丙丁之中白庚辛之中黑紫碧壬癸之中黃戊已緅乙丙紅丁庚右五色間色陳氏本諸考工記繢畫之事而參以傳記所載可謂詳且密矣或者又采取十干以為據其説不為無所本今附之本卷以待明禮之君子折衷焉禮書卷七
