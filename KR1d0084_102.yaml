body:
  text: 禮書卷一百三宋陳祥道撰棘畢桑畢爾雅曰濁謂之畢濁畋器也郭氏曰掩兔之畢畋器曰畢祭器亦曰畢皆象畢星也詩曰兕觥其觩角弓其觩有救棘匕有救天畢救者曲而長也則畢之狀可知矣鄭氏曰畢狀如乂雜記言朼用桑長三尺畢用桑長三尺刋其柄與末詩言棘匕特牲記亦言棘心匕刻喪匕用桑而畢亦桑則吉匕用棘而畢亦棘此鄭氏所以言匕畢同材也然桑黃棘赤各致其義舊圖謂匕畢皆漆之誤矣特牲主人及佐食舉牲鼎宗人執畢先入贊者錯俎加匕鄭氏曰主人親舉則宗人執畢導之以畢臨匕載備失脫也少牢及虞禮無文何哉少牢大夫不親舉虞祭主人未執事其說是也大射司馬正東靣以弓為畢鄭氏曰畢所以教助執者則畢又可用以指教歟醴柶色白鉶柶色赤說文曰柶匕也鄭氏曰柶如匕士冠士婚醴柶皆用角士喪醴柶皆用木以木質于角故也士喪東方之饌用木柶既夕厥明奠用木柶王府大喪共角柶士喪楔齒用角柶以角貴于木故也柶施於醴亦施於鉶公食大夫少牢饋食鉶柶不言其材蓋亦角為之歟其制則先儒以為枋長尺㯿博三寸醴柶之㯿淺鉶柶之㯿深理或然也柶之所用有多有寡授柶之禮有靣枋有靣葉公食大夫設柶鉶而柶扱上鉶少牢羞二鉶皆有柶蓋仁於賔者以同為樂仁於神者以異為敬故也冠禮贊者既酌靣葉以授賔賔靣枋以授冠者冠者靣葉以扱祭昏禮贊者既酌靣葉以授主人主人靣枋以授賔賔亦靣葉以扱祭聘禮宰夫既酌靣枋以授公公靣枋以授賔而授公不靣葉蓋冠之賔昏之主人必訝受而公不訝受故也鼓記曰獻粟米者操量鼓左傳曰晉國以一鼓鐵鑄刑鼎荀子曰瓜桃棗李一本數以盆鼓管子曰釡鼓滿則人溉之隱義云東海樂浪人呼容十二斛為鼓王肅注家語曰三十斤謂之鈞鈞四謂之石石四謂之鼓夫五量終于斛而鼓又十二之秉又十六之蓋五者數之備過是者亦推此而已槩律厯志以子榖秬黍中者千有二百實其籥以井水准其槩月令仲春正權槩荀子曰勝斛敦槩者所以為嘖也又曰水盈不求槩管子曰釡鼓滿則人槩之曲禮曰食饗不為槩考工記曰槩而不稅說文曰稅平也謂斗槩則槩以竹木或為之五量資之以為平也考工記釜亦謂之釡重一鈞容六斗四升律厯志釜重二鈞容十斗史及家語曰黃帝設五量考工記㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之量之以為釜深尺者內方尺而圜其外其實一釜其臀一寸其實一豆其耳三寸其實一升重一鈞其聲中黃鍾之宫槩而不稅前漢律厯志量者籥合升斗斛也本起于黃鍾之籥以子穀秬黍中者千有二百實其籥以井水凖其槩合籥為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為合籥其狀似爵以縻爵祿上三下四參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十聲中黃鍾始于黃鍾而反覆焉春秋傳昭三年齊舊四量豆區烏侯反管子作鏂釡鍾四升為豆各自其四以登于釡釡十則鍾區十六升釡六斗四升鍾六斛四斗爾雅曰掬二升二掬為豆豆四升四豆曰區四區曰釡二釡四有半曰庾周禮凡萬民之食人四釜上也人三釜中也人二釜下也聘禮十斗曰斛十六斗曰藪鄭氏曰今文藪為逾十藪曰秉十六斛論語曰冉子為子華之母請粟孔子與之釡請益曰與之庾冉子與之粟五秉月令仲春仲秋角斗甬鄭氏曰甬今斛也管子曰斗斛也甬量也謂之法甬亦量器之名又曰釡鏂之數不得為侈弇爾雅曰坎律銓量也㮚氏以釜為量而法止于三則升豆釜是也律厯志以斛為量而法備于五籥合升斗斛是也法止于三故自升而上登之以四則升四而豆豆四而釜故釜六斗四升法備于五故自合而上登之以十則合十為升升十為斗斗十為斛故斛十斗然㮚氏之釜深尺內方尺而圜其外其重一鈞律厯志之斛亦方尺而圜其外其重二鈞其方尺圜外則同而所容之多寡所權之輕重不同何也周禮璧羡之制從十寸橫八寸皆為度尺釜亦如之則外深尺者十寸之尺也內方尺者八寸之尺也自方八寸而八之則為方六十四寸漢無八寸之尺斛之內方皆十寸也故言方尺而不言深尺自方十寸而十之則為方百寸此其實所以不同也㮚氏之制旁為升臀為豆腹為釜律厯志之制左耳為升石耳為合籥臀為斗腹為斛蓋內方所以取數外圜所以利用耳高而小臀卑而博故因其小者為升合因其博者為斗豆則古之制器尚象豈徒然哉周禮上年人食四釜則二斛五斗六升中年人食三釜則一斛九斗二升食貨志人月一石五斗五人終嵗為九十石然則四釜三釜云者亦月食也其多寡不同皆其大率然也律厯志五量止于斛左傳釡十則鍾聘禮十六斛曰藪十藪曰秉四秉曰筥其法亦起于斛故也月令曰角斗甬管子曰甬量也皆謂之法則月令之甬管子之甬皆量器也鄭康成以甬為斛而飲器四升曰甬豈此類歟經傳釜或作釡庾或作逾區或作謳升或作勝蓋古字通用禮書卷一百三
