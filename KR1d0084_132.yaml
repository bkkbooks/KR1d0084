body:
  text: 禮書卷一百三十三宋陳祥道撰司常中冬大閲王太常諸侯旗孤卿旜大夫士物師都旗師都師帥也鄭氏云鄉遂大夫州里州里州所里也爾雅曰里邑也鄭氏云州長里宰縣鄙旐司馬中秋治兵王太常諸侯旗軍吏旗師都旜師都師帥也鄭氏云遂大夫鄉遂物鄉大夫遂大夫也鄭氏云鄉大夫郊野旐郊野縣師也鄭氏云州長縣正百官旟司常國之大閲王建太常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐司馬中秋治兵王載太常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟何也大閲軍實而已治兵則軍法在焉師都所以治徒役者也軍吏所以將卒伍者也大閲以治徒役為主故有師都而無軍吏治兵以將卒伍為主亦有治徒役者也故有軍吏又有師都大閲師都之所建治兵軍吏之所載皆熊虎之旗則大閲所以威衆者師都也治兵所以威衆者軍吏也二者蓋皆孤卿為之故其序在州里鄉遂之上謂之吏則任以事也謂之師則帥其衆也謂之都則自采邑言之也鄉師出田法于州里州長考州里之治則州里州所里也縣師掌邦國都鄙稍甸郊里之地域若有軍旅㑹同田役之戒則受法于司馬以作其衆庶㑹其車人之卒伍以嵗時徴野之貢賦則郊野縣師也大閲有師都而鄉遂乃鄉遂大夫也百官軍中之百官也禮曰羔豚而祭百官皆足孟子曰百官以事舜於畎畝之中凡此所謂百官者非卿大夫也治兵之百官蓋亦如此鄭氏以大閲之師都為鄉遂大夫以治兵之師都為遂大夫以鄉遂為鄉大夫以郊野為州長縣正以州里為州長與里宰以百官為卿大夫然以師都為鄉遂大夫又以為遂大夫是離師都而二之也鄉遂則鄉大夫與遂大夫也以鄉遂為鄉大夫是合鄉遂而一之也有鄉遂則州縣在所統矣孰謂郊野乃州長縣正乎鄙五百家然後為一旅而有旐孰謂里宰有所建乎使其有所建其可踰於縣鄙之旐而建旟乎軍行卿大夫不為將師則守國而已孰謂百官乃卿大夫乎旞鄭氏曰全羽析羽皆五采繫於旞旌之上所謂注旄於干首旌司常全羽為旞析羽為旌道車載旞斿車載旌道車象路也斿車木路也象路建大赤以朝木路建大麾以田而有旞旌者蓋朝則建大赤燕出入則載旞田則建大麾鄙則載旌旞旌皆注旄而旄與羽又注於旗則羽可以飾旗又可以為旗也書曰羽畎夏翟考工記鍾氏染羽以朱湛丹秫三月而熾之淳而漬之蓋古人於羽固用其自然者也不足則染以充之夏采言建綏眀堂位言有虞氏之綏於官言夏采於旗言建綏則所謂綏者旌旞而已復于四郊豈非其燕出入之地歟鄭氏釋眀堂位曰有虞氏當言綏夏后氏當言旗於義或然其以綏為大麾則與夏采不合龍旜鄉射記曰君射於竟則龍旜鄭氏曰畫龍旜尚文章也通帛為旜翿旌白羽與朱羽糅以鴻脰韜杠上二尋鄉射禮君國中射則皮樹中以翿旌獲白羽與朱羽糅於郊則閭中以旌獲於竟則虎中龍旜大夫兕中以其物獲士以翿旌獲又曰旌各以其物無物則以白羽與朱羽糅杠長三仞以鴻脰韜上二尋鄭氏謂此翿旌也不命之士無物然則君於國中燕射也於郊大射也於竟賓射也翿旌之羽白與朱而已不若旌之備文旌之備文不若龍旃之備德故與羣臣燕射則以翿旌擇士而大射則以旌於鄰國君射則以龍旃龍旃蓋亦絳帛為之先儒以為斾如燕尾今姑存之詩曰值其鷺翿毛氏曰值持也顔師古曰立之而舞然春秋傳曰舞師題以旌夏則鷺翿蓋若今大樂二工執之以引舞者也值者遭之也詩曰左執翿周禮鄉師葬則執纛治役爾雅曰翿纛翳也郭璞曰翿葆幅也則纛可以引舞可以習射亦可以治葬役也士射之獲與君同豈非順而托者歟禮書卷一百三十三
