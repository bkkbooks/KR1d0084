body:
  text: 禮書卷四十七宋陳祥道撰五席王大朝覲大饗射封國命諸侯祀先王酢席皆三次席黼純繅席畫純莞筵紛純諸侯祭祀席二莞席紛純蒲筵繢純諸侯酢筵國賔席二繅席畫純莞筵紛純公食大夫席二萑席玄帛純蒲筵緇布純大夫鄉飲士鄉射席一蒲筵緇布純周禮大宰大朝覲會同贊玉几玉爵司几筵掌五几五席之名物辨其用與其位凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几祀先王酢席亦如之諸侯祭祀席蒲筵繢純加莞席紛純右雕几酢席莞筵紛純加繅席畫純筵國賔于牖前亦如之左彤几甸役則設熊席左漆几凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几吉事變几凶事仍几書狄設黼扆綴衣牖間南嚮敷重篾席黼純華玉仍几西席東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席玄紛純漆仍几詩行葦曰肆筵設席授几有緝御篤公劉曰或肆之筵或授之几公食大夫禮蒲筵常緇布純加萑席尋玄帛純上大夫蒲筵加萑席其純皆如下大夫純鄉飲酒鄉射禮蒲筵緇布純燕禮司宫筵賔于戶西東上無加席席用蒲筵緇布純也無加席燕私禮臣屈也諸侯之官無司几筵小臣設公席于阼階上西鄉設加席大射小臣設公席于阼階上西鄉司宫設賔席于戶西南靣有加席聘禮賔立接西孰几筵既設擯者出請命有几筵者以其廟受宜依神也賔請覿宰夫徹几改筵將禮賔徹神几改神席更布也公食大夫禮曰蒲筵常緇布純加萑席尋玄帛純此筵上下大夫也周禮筵國賔于牖前莞筵紛純加繅席畫純左彤几者則是筵孤也孤彤几卿大夫漆几公出迎賔以入公升側受几于序端宰夫內拂几三奉兩端以進以進自東箱來授君公東南鄉外拂几三卒振𬒮中攝之進西鄉擯者告賔進訝受几于筵前東靣候未設也公一拜送賔以几辟北靣設几公食大夫禮宰夫設筵加席几公不賔至授几者親設湆醫可以略此司宫具几與蒲筵常緇布純加萑席尋玄帛純皆卷自末丈六尺曰常半常曰尋必長筵者以左右饌也宰夫筵出自東房上大夫蒲筵加萑席其純皆如下大夫純謂三命大夫也孤為賔則莞筵紛純加繅席畫純士虞禮素几葦席在西序下祝布席于室中東靣右几尸出執几席從尸出門右南靣席設于尊西北東靣几在南特牲禮几席陳于西祝筵几于室中東靣少牢禮司宫筵于奧祝設几于筵上右之西南隅曰奧近南為右有司徹司宫筵于户西南靣又筵于西序東靣主人降受宰几周禮大宰贊玉几玉爵二手橫執几揖尸升主人西靣左手執几縮之以右𬒮推拂几三二手橫執几進授尸于筵前尸進二手受于手間主人退尸還几縮之右手執外廉北靣奠于筵上左之南縮不坐主人陽長左鬼神陰長右不坐奠之者几輕卒𧃊有司官徹饋饌于室中西北隅南靣如饋之設右几厞用席曲禮曰羣居五人則長者必異席席以四人為節為人子者坐不中席母踖席升席必由下也奉席如橋衡請席何鄉請祍何趾席南鄉北鄉以西方為上東鄉西鄉以南方為上若非飲食之客則布席席間函丈主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐侍坐於所尊敬無餘席客至於寢門則主人請入為席虛坐盡後食坐盡前有憂者側席而坐側特也不在接人不布他靣席有喪者專席而坐單席禮器曰禮有以多為貴者天子之席五重諸侯之席三重大夫再重有以少為貴者鬼神之祭單席莞簟之安而稿鞂之設郊特牲曰大饗君三重席而酢焉三獻之介君專席而酢焉莞簟之安而蒲越稿鞂之尚明之也玉藻曰登席不由前為躐席浴出履蒯席君賜之食越席再拜受登祭之論語曰席不正不坐鄭康成曰鋪陳曰筵藉之曰席紛如綬有文而狹者繅席削蒲蒻展之編以五采次席桃枝席有次列成文莞小蒲席孔安國曰篾桃枝竹也底蒻蘋也豐莞也筍蒻竹也爾雅曰莞符籬郭璞曰西人呼蒲為莞司几筵之席莫貴於次席而次席黼純畫之席莫貴於篾席而篾席亦黼純孔安國以篾席為桃枝席鄭氏以次席為桃枝席蓋有所傳然也司几筵王筵有莞而無蒲純有黼而無繢諸侯筵有蒲與莞席有莞繅而無次純有繢而無黼則蒲不如莞繢不如紛紛不如畫而斷割之義又王之所獨也司几筵王席三諸侯席三鄉飲鄉射大夫士一而巳禮器曰禮有以多為貴者天子之席五重諸侯三重大夫再重郊特牲曰大饗君三重席而酢焉舉重數也司几筵王之朝祀席皆三諸侯祭祀席二禮器曰禮有以少為貴者鬼神之祭單席非祀廟之禮也司几筵諸侯筵國賔莞筵紛純加繅席畫純公食大夫蒲筵常緇布純加萑席尋玄帛純鄭氏釋聘禮謂蒲筵萑席筵上下大夫也莞筵繅席筵孤也公食大夫大射賔有加席燕禮之賔無加席鄭氏曰燕禮私臣屈也筵席之制短不過尋長不過常中者不過九尺公食大夫蒲筵常萑席尋匠人明堂度九尺之筵純緣之制上不過黼下不過緇布其卷之也必自末其奉之也如橋衡敷必請鄉升必由下主人敬客則請為席客敬主人則徹重席侍所尊者敬無餘席為人子者坐不中席食坐則前席虛坐則後席有喪者側席有憂者專席此禮之大略然也司几筵大朝覲大饗射凡封國命諸侯祀先王無異席則祀先公亦用之矣賈公彥釋禮器謂天子大祫席五重禘祭四重時祭三重上公大祫四重諸侯大祫三重禘與時祭同二重其言無所經見然書皆言敷重席毛氏釋詩亦曰設重席則王之次席繅席皆重焉與莞筵而五諸侯繅席亦重焉與蒲筵而三其數適與禮器合矣熊席司几筵甸役設熊席鄭氏謂王甸有司祭表貉所設席然經言甸役不言甸役之祭則熊席之設位蓋王也王師田掌次張幕設重帟重案司几筵設熊席皆野外之禮也蓋大田簡衆大役任衆涖之不可以無威故席以熊皮為之葦席萑席爾雅曰菼騅也又曰葭蘆菼薍郭璞曰蘆葦也薍似葦而小實中毛氏曰薍為萑葭為葦孔頴達曰菼長為薍成為萑葭長為蘆成為葦然詩於霜降之時言兼葭蒼蒼於物長之時言敦彼行葦則葭非必初生之名葦非必已成之稱也萑似葦而小則葦席粗於萑矣故司几筵喪禮葦席柏席用萑黼純鄭司農以柏席為迫地之席鄭康成以柏席為椁中之席二者皆不可考然士喪禮始死與小斂之奠設於地大斂然後有席特未有几士虞素几葦席則斂之席亦葦席也司几筵言凡喪事設葦席右素几則虞亦喪事也檀弓曰虞而立尸有几筵者連言之也諸侯而上喪有几越席藁秸禹貢甸服三百里貢秸服秸藁也禮器言大路素而越席郊特牲曰蒲越藁秸之尚明之也蒲越稿秸藉神席也明之者神明之也左傳曰大路越席昭其儉也越席結草荀卿曰大路越席所以養體越席剪蒲席也禮器曰禮有以多為貴者天子之席五重諸侯之席三重大夫再重又曰禮有以少為貴者鬼神之祭單席正義曰熊氏云天子祫席五重此文是也禘則冝四重也時祭三重司几筵職是也受神酢席亦然祭天則蒲越稿鞂郊特牲云是也自天地以外日月山川五祀則鬼神之祭單席是也祭統曰鋪筵為依神也淮南子曰越席不緣漢儀云高皇帝配天紺席祭天用六綵綺席六重成帝初即位丞相衡御史大夫談奏言饗帝之義掃地而祭尚質也其牲用犢其席稿秸其器陶匏皆因天地之性貴誠上質不敢修其文也以為神祗功德至大雖修精微而備庶物猶不足以報功唯至誠為可故上質不飾以章天德天子從焉後漢書志光武隴蜀平後乃增廣郊祀凡用席二百一十六枚皆莞簟宋書志南郊皇天神座太祖坐蒯席各二不設茵蓐古者席稿晉江左用蒯梁南郊席用稿秸五帝以上悉用蒲席稿薦開元禮皇帝冬至祀圜丘設昊天上帝神座席以稿鞂高祖神堯皇帝席以莞五方帝日月席皆以稿鞂五星十二辰河漢及內官五十五座席皆以莞祭天服大裘乘素車器用陶匏冪用疏布杓用樿牲用犢凡皆以為德産之致精微盡天下之物無以稱其德故特報以內心之誠而已則藉用稿鞂越席不亦宜乎稿鞂本於自然越席出於人為人為者不若自然之尤質故大路用焉則越不施於天神可知矣唐禮冬至祀圜丘設昊天上帝神座席以稿鞂髙祖神堯皇帝席以莞亦古之遺制歟衽周官玉府掌王之燕衣服祍席曲禮曰請席何鄉請衽何趾鄭氏曰祍卧席也卧席北趾然請衽何趾則趾特未定謂之北趾拘矣管子曰俶衽則請有常則否則請以何趾者以其始衽故也昏禮御衽于奧媵衽良席在東北趾玉藻曰君子之寢常東首喪大記曰疾病寢東首於北牖下論語曰疾君視之東首蓋寢東首者庸禮也昏寢南首斯須禮也其他不必皆然至疾病則復其庸禮以正終焉此所以特言東首於北牖下鄭司農釋玉府云衽單席也賈公彥曰下莞上簟內則云斂枕篋簟席襡器而藏之則卧之簟席也然衽於文從衣非簟也蒯席玉藻浴出履蒯席鄭氏曰蒯席澀便於足考之經傳草席亦謂之蓐春秋傳曰蓐食又曰軍行左追蓐是也蓐亦謂之兹爾雅周紀衛康叔布兹春秋傳諸侯病曰負兹是也禮書卷四十七
