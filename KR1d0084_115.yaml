body:
  text: 禮書卷一百十六宋陳祥道撰㦸㦸或作棘春秋傳曰子都拔棘明堂位言越棘周禮言棘門則㦸棘一也考工記㦸廣寸有半寸内三之四寸半胡四之六寸援四之七寸半倨勾中矩與刺重三鋝葢㦸有三鋒刺則鋒之直前者也胡則正方中短而下垂者也援則磬折而上達者也賈公彦曰必知三鋒胡向下者三鋒皆向上者無用也觀春秋傳言衛公㦸其肘史言㦸手罵之則援嚮上可知也晉人以㦸鈎欒樂而殺之宋狂狡倒㦸以出鄭人於井則胡之下垂可知也楚武王荆尸授師孑而先儒謂之㦸書一人執戣一人執瞿而先儒以謂㦸屬則㦸之異名多矣後世有棨㦸天子二十四諸侯十二或韜以赤油或韜以黻繡或施於公門或設於私家故漢杜詩秦彭唐李晟韋綬皆有棨㦸以代斧鉞甲釺甲裳考工記曰燕無函非無函也夫人而能為函也函人為甲犀甲七屬兕甲六屬合甲五屬鄭氏曰屬讀如灌注之注謂上旅下旅札續之數也革堅者其札長賈公彦曰一葉謂一札犀甲夀百年兕甲夀二百年合甲夀三百年凡為甲必先為容然後制革權其上旅下旅而重若一鄭司農云上旅腰以上下旅腰以下賈公彦曰以札衆多故言旅上旅衣也下旅裳也春秋傳曰棄其甲裳書曰甲胄起戎孔氏曰甲鎧胄兠鍪又曰善敹乃甲胄無敢不弔詩清人曰駟介彭彭小戎曰俴駟孔羣毛氏曰俴駟四介馬也鄭氏曰俴淺也謂以薄金為介之札介甲也成二年左傳曰齊侯與晉戰不介馬而馳之魯頌曰具胄朱綅毛氏曰具胄飾也綅以朱綅綴之説文曰綅綫也孔子家語曰家不藏甲禮記曰兵革藏於私家非禮也又曰國家靡敝甲不組以組飾之及矜帶詩云具胄朱綅亦鎧飾也又曰煇者甲吏之賤者周書曰年登甲則纓縷繩甲不以俎左傳曰楚子重使鄧廖帥組甲三百以侵吳服氏曰以組綴甲又曰犀兕尚多棄甲則那吕氏春秋曰邾之故為甲常以帛公息忌曰不若以組榖梁曰作丘甲非正也夫甲非人所能為禮記曰甲若有以前之則執以將命無以前之組櫜奉胄櫜韜甲之衣叔孫之甲有幟幟記識也管子曰輕過贖以犀甲一㦸説文曰首鎧謂之兠鍪亦曰胄臂鎧謂之釺頸鎧謂之錏鍜魏武卒負三屬之甲荀子及漢刑法志荀子曰楚人鮫革犀兕以為甲吳語伐越有白裳素甲望之如荼赤裳丹甲望之如火𤣥裳黑甲望之如墨吳語又曰羌衣水犀之甲甲亦曰介曰函曰鎧則甲猶植物之有甲也介猶互物之有介也函所以周其身鎧所以制其愷經言甲而不及鎧則古者之甲以革為之後世乃用金耳管子曰蚩尤以金為鎧不可考也甲之制腰以上為上旅腰以下為下旅革堅者扎長故其屬少其次扎短故其屬多扎其葉也左傳曰射中七扎屬其續也㑹衆扎謂之旅上旅為衣下旅為裳其鍛欲摰其鑽欲小其裏欲易其朕為直飾之以組衣之以櫜國語曰甲不解纍考工記曰櫜之欲其約也禮記組櫜鄭司農云卷置櫜中在首謂之胄在臂謂之釺在頸謂之錏鍛此甲之大略然也古之甲有至五屬而魏之武卒則甲三屬甲以犀甲兕甲合甲而楚人加之以鮫革則後世之制尤堅矣春秋作丘甲非人所能為杜預以為使丘出甲失之矣井田之法四丘為甸乃出長轂一乘甲士三人哀公用田賦不過十二之法而已豈成公之時其法也重於十二乎公羊曰譏始丘使也榖梁曰丘作甲非正也其説可取古者介胄有不可犯之色介者不拜葢介者所以服人拜者所以服於人服人者無所服於人故不拜焉不拜而周禮謂之肅拜是亦不拜之拜也兵法曰軍容不入國國容不入軍軍容入國則民徳廢國容入軍則民徳弱兵車不式危事不齒介者不拜不以國入軍也鄢陵之戰郤至不拜楚使崤之役蹇叔之子不拜其父細栁之屯周亞夫不拜其君可謂知此矣胄兠以兠之猶史所謂兠笭也鍪以蒙之猶荀子所謂冠有鍪者也甲曰鎧胄亦曰鎧説文曰首鎧曰胄是也胄曰兠鍪亦曰鞮鍪長楊賦曰鞮鍪生蟣蝨是也魯人之胄綴以朱綫飾以貝文則古者胄制葢亦類此張儀傳曰虎賁之士跿跔科頭科頭不被胄也胄首飾也故長子亦曰胄子介駟詩曰駟介彭彭又曰俴駟孔羣左傳曰不介馬而馳之鄭氏曰俴淺金也秦人以淺金介馬古或用革與否不可考也禮書卷一百十六
