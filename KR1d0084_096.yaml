body:
  text: 禮書卷九十七宋陳祥道撰圜壺方壺書曰簞食壺漿詩曰清酒百壺周禮秋嘗冬蒸其饋獻用兩壺尊掌客上公壺四十侯伯三十二子男二十有四左𫝊曰樽以魯壺禮記五獻之尊門內壺特牲禮視壺濯尊兩壺于阼階東又曰覆兩壺焉蓋在南鄉飲酒尊兩壺于房戶間鄉射兩壺斯禁主人州長聘禮陳饔或八壺或六壺燕禮鄉大夫兩方壺士旅兩圜壺公尊瓦大大射膳尊兩壺鄉大夫方壺士旅圜壺少牢尊兩甒士喪大斂兩瓦甒虞兩甒說文曰壺昆吾尊也象形圜圜者君之道方者臣之德燕禮大射鄉大夫皆方壺以其近尊而屈也士旅皆圜壺以其逺尊而伸也先儒謂方壺腹圜而足口方圜壺腹方而足口圜然方者腹圜圜者腹方則名實不稱矣鬯人禜門用瓢齎用齎而已與壺異也莊周曰大瓠慮以為樽爾雅曰康瓠謂之甈賈誼弔屈原曰斡棄周鼎而實康瓠兮郭璞曰康瓠壺也蓋壺之為器也其體有大小其制有方圜非必皆瓠為之特取名於壺瓠而巳廢禁飾以朱棜禁大夫曰棜士曰禁飾以朱豐飾以朱周禮司尊彛彛皆有舟禮器曰天子諸侯之尊廢禁大夫士棜禁此以下為貴也廢猶去也棜斯禁也謂之棜者無足有似於棜大夫斯禁士用棜禁如今方案隋長局足高三寸玉藻曰大夫側尊用棜士側尊用禁士冠禮尊于房戶之間兩甒有禁𤣥酒在西名之為禁為酒戒也士婚禮尊于室中北牖下有禁鄉飲酒尊兩壺于房戶間斯禁𤣥酒在西主人諸侯鄉大夫也鄉射尊于賔席之東兩壺斯禁左𤣥酒皆加勺鄉射主人州長鄉大夫若在稱鄉大夫燕禮司宫尊于東楹之西兩方壺公尊瓦大兩有豐尊士旅食于門西兩圜壺豐形似豆卑而大大射司宫尊于東楹之西兩方壺膳尊兩甒在南尊士旅食于西䥬之南公食大夫禮無尊飲酒實于觶加于豐既夕厥明陳衣設棜于東堂下齊于坫饌于其上士虞禮尊于室中北牖下當戶兩甒醴酒在東無禁特牲禮陳鼎于門外棜在其南實獸于其上棜之制如今木輿上有四周下有足壺禁在東序少牢司宫尊兩甒于房戶之間同棜棜無足禁者酒戒也大夫去足改名優尊者不為之戒然也司容啓二尊之蓋冪奠于棜上司尊彛六彛皆有舟燕禮公尊瓦大有豐聘禮亦瓦大有豐少牢禮兩甒有棜鄉飲鄉射尊皆有斯禁士冠婚特牲禮尊皆有禁禮器曰天子諸侯之尊廢禁大夫士棜禁玉藻大夫側尊用棜士側尊用禁蓋天子諸侯之禁無足而卑大夫之棜士之禁有足而高無足謂之廢禁猶儀禮所謂廢敦廢爵也大夫之棜亦謂之斯禁士之禁亦謂之棜蓋禁棜同制特其足之高下異耳天子諸侯廢禁之制不見於經特燕禮以尊有豐鄭康成謂豐似豆而卑其他不可得而知也豐公食大夫大射鄉射以之承觶爵棜士既夕以之饌衣特牲以之實獸蓋先王制器苟可以便於禮者皆用之也然則謂之舟欲其不溺也謂之禁欲其不放也棜欲其屬厭而已不可益也豐欲其豐盛而已不可過也鄭康成曰廢猶去也棜如今之木輿上有四周下有足禁如今方案隋長局一足高三寸又言大夫改斯禁名棜優尊也若不為之戒然謂天子諸侯去禁而燕禮有豐謂棜無足而既夕棜齊于坫謂優尊者若不為之戒而鄉飲鄉射謂之斯禁何耶舊圖刻人形謂豐國之君嗜酒亡國於是狀之以為酒戒此又不可考也士喪禮凡奠以至虞祭皆無禁蓋禁吉器也冠禮醴尊無禁酒尊有禁蓋醴非飲醉之物不設戒也彛舟司尊彛曰彛皆有舟尊皆有罍舟以庪彛而罍非庪尊言彛有舟以見尊有禁也天子諸侯之尊廢禁廢禁無足以下為貴則彛舟之為物蓋象舟之形而已先儒以廢禁為去禁謂舟若漢承縏圜而崇尺恐不然也禮書卷九十七
