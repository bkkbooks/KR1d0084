body:
  text: 禮書卷四十四宋陳祥道撰王六寢后六宫諸侯三寢夫人三宫卿大夫士二寢卿大夫士之妻二寢周官宫人掌王宫六寢之修女御掌御序於王之燕寢大僕掌建路鼓於大寢之門外春秋書莊公薨於路寝僖公薨于小寝書西宫災公羊曰路寝正寝也西宫小寝也有西宫則有東宫以有西宫知諸侯之有三宫也玉藻曰君日出視朝退適路寝聴政使人視大夫大夫退然後適小寝釋服左傳曰齊人遷襄公殯于大寝宋大尹盟于小寝之庭文王世子曰正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室内則公庶子生就側室内宰正嵗令于王之北宫以隂禮教六宫又曰王后帥六宫之人昏義曰古者天子后六宫祭義曰諸侯卜三宫之夫人使蠶穀梁曰甸粟而納之三宫䘮大記曰大夫世婦卒於適室内子未命死于下室遷尸于寝上士之妻皆死于寝士䘮禮士死適室朔月若薦新則不饋于下室葢王六寝后六宫諸侯三寝夫人三宫王大寝一小寝五諸侯大寝一小寝二大寝謂之路寝又謂之正寝小寝謂之燕寝又謂之少寝大寝聴政嚮明而治也故在前小寝釋服燕息也故在後先儒謂王小寝五而一寝在中四寝於四角春居東北夏居東南秋居西南冬居西北土王之月居中后之六宫亦正宫在前五宫在後其制如王之五寝諸侯小寝二而東西建焉春夏居東寝秋冬居西寝夫人三宫亦正宫在前二宫在後其制如諸侯之三寝自卿以下二寝正寝居前燕寝居後其妻二寝亦如之理或然也何則諸侯三宫而有東宫西宫則正寝在中可知退適小寝則小寝在後可知魯定公之時有髙寝葢變亂禮法而名其寝耳何休曰諸侯三寝一曰髙寝二曰路寝三曰小寝妄也士庶子宿衛制鄭康成云衛王宫者必居四角四中徼候便也次其宿衛所在舍其休沐之處鄭司農云在内為次在外為舍小宰掌建邦之宫刑以治王宫之政令凡宫之糾禁正嵗以宫刑憲禁于王宫其有不共國有大刑宰夫正嵗則以法警戒羣吏令修宫中之職事書其能者與其良者以告于上宫正掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之辨外内而時禁稽其功緒糾其徳行幾其出入均其稍食去其淫怠與其竒衰之民㑹其什伍而敎之道藝月終則㑹其稍食嵗終則㑹其行事凡邦之大事令于王宫之官府次舍無去守而聴政令宫伯掌王宫之士庶子凡在版者掌其政令行其秩叙作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之月終則均秩終嵗則均叙以時頒其衣裳掌其誅賞大胥凡祭祀之用樂者以鼓徴學士序宫中之事士師掌國之五禁之法一曰宫禁漢中郎將分掌三宇郎有議郎中郎侍郎郎中凡四等皆秦官無員多至千人皆掌門户出充車騎故卿校尉牧守待價於此公車特徴賢良方正敦樸有道髙節公府椽曹試博士者亦充兹位其下第白衣試博士者皆拜郎中中郎者有五宫左右三將郎中有車户騎三將如淳曰主車曰車郎主衛曰户郎漢舊儀曰郎中令主郎中左右車将主左右車郎左右户將主左右户郎凡郎官皆主更直執㦸宿衛諸殿門惟議郎不在直中郎官故事令出錢市財用給文書乃得出號曰山郎凡三宇郎官二漢並屬光禄勲光禄選三宇郎有行應四科者嵗舉茂才二人四行二人又上兼吏六人為長理劇明帝時舘陶公主為子求郎帝不許賜錢千萬曰郎官上應列宿出宰百里有非其人民受其殃後代親衛之府一曰親府勲衛之府二一曰勲一府二曰勲二府翊衛之府二一曰翊一府二曰翊二府凡五府武徳貞觀世重資䕃二品三品子補親衛二品曾孫三品孫四品子職事官五品子若孫勲官三品以上有封及國公子補勲衛及率府親衛四品孫五品及上柱國子補翊衛及率府周禮宫正掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡為之版以待宫伯掌王宫之士庶子凡在版者鄭康成曰官府之在宫中者若膳夫玉府内宰内史之屬士謂王宫中諸吏之適子也庶子其支庶也鄭司農曰庶子宿衛之官司農以庶子為夏官之諸子康成固不取之矣諸吏之適子或未為士不可謂之士康成以士為諸吏之適子亦誤也葢士衛士也庶子國子之倅未為士者也上言士下言庶子則國子舉矣宫正掌凡宫中之官府次舍之衆寡宫伯掌士庶子授次舍之職事則宫伯所掌皆宿衛之人宫正所掌不特宿衛者而已次其宿衛所在也舍其休沐所在也八次八舍布於王宫四角四中則逺邇節而徼候便矣士庶子非王族則功臣之世賢者之類王以自近而衛焉則上下親而内外察矣又宫正稽其功緒糾其徳行㑹其什伍而敎之道藝宫伯掌其政令誅賞使之學問日進職業日修足以備顧問謹侍衛則王之左右前後孰非多聞直諒之士乎秦有郎中令掌宫殿門户漢武帝更名光禄勲其屬有議郎中郎侍郎郎中凡四等謂之三宇郎而中郎以下更直執㦸内謹門禁外充車騎類取經明行修者充之至于公車特起賢良方正敦樸有道髙節公府掾曹試博士者多在此選而劉向霍光張安世東方朔揚雄之徒皆與焉是以董仲舒欲使列郡守二千石各擇其吏民之賢者嵗貢二人以給宿衛且以觀大臣之能舘陶公主為子求郎明帝曰郎官上應列宿出宰百里有非其人民受其殃則宿衛之選可謂重矣魏晉以後無復三宇郎而光禄不復在禁中至梁改為光禄卿北齊曰光禄寺兼掌膳食帳幕而已唐為三衛五府以品官之子弟使父兄任保而後處之亦古之遺制也虎士五𨽻守衛之制周垣下為區廬周禮虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人虎賁氏掌先後王而趨以卒伍舍則守王閑王在國則守王宫為周衛國有大故則守王門司𨽻掌五𨽻之法掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁罪𨽻其守王宫與其厲禁者如蠻𨽻之事蠻𨽻掌校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁夷𨽻其守王宫者與其守厲禁者如蠻𨽻之事貉𨽻其守王宫者與其守厲禁者如蠻𨽻之事師氏凡祭祀賓客㑹同䘮紀軍旅王舉則從聴治亦如之使其屬帥四夷之𨽻各以其兵服守王之門外且蹕朝在野外則守内列保氏凡祭祀賓客㑹同䘮紀軍旅則從聴治亦如之使其屬守王闈衛尉秦官掌門衛屯兵漢因之漢舊儀曰衛尉寺在宫内胡廣云主宫闈之内衛士於周垣下為區廬者若今之仗宿屋景帝更名中大夫令後復為衛尉又有長樂建章甘泉衛尉皆掌其宫職畧同而不常置張衡西京賦曰衛尉八屯李善曰衛尉率吏士周宫外於四方四角立八屯隋衛尉掌軍器儀仗帳幕以監門衛掌宫内屯兵唐龍朔二年改為司衛寺正卿咸亨中復舊唐之宿衛以府兵其畨上宿衛者惟給弓矢横刀而已兵部以逺近給畨五百里為五畨千里七畨一千五百里八畨二千里十畨外為十二畨皆一月上若簡留直衛者五百里為七畨千里八畨二千里十畨外為十二畨亦月上髙宗武后時天下久不用兵府兵之法寖壊畨役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛更號曰彍騎自是諸府士益各不補折衝將又積嵗不得遷士人皆耻為之十三年始以彍騎分𨽻十二衛總十二萬為六畨每衛萬人自天寳以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可敎李林甫遂請停上下魚書其後徒有兵額官吏故時府人目畨上宿衛者曰侍官言侍衛天子至是衛佐悉以假人為童奴而人人恥之至相罵辱必曰侍官而六軍宿衛皆市人富者販繒綵食梁肉壮者為角觝㧞河翹木扛䥫之戱及禄山竊發皆不能受甲矣古之守衛王宫者不特士庶子而已有虎賁之虎士司𨽻之五𨽻虎士有卒伍而四翟之𨽻有兵國有大故則守王門舍則守王閑而司戈盾軍旅㑹同授旅賁及虎士戈盾則王之在國在野可謂嚴矣然必使四翟之𨽻者以著王之所守在四夷也或使師氏之屬帥之者以著王之使武以文也四𨽻所守皆如蠻𨽻之事者周之時以南方為逺尤貴其來也掌四夷之官曰象胥而奏樂亦以南詩曰以雅以南記曰胥鼓南則周人之意可知矣士庶子所直在四中四角而虎士五𨽻之所直於經無見漢之衛士於周垣下為區廬而張衡有八屯之説則先王之制葢亦如此禮書卷四十四
