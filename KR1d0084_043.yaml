body:
  text: 禮書卷四十四宋陳祥道撰王六寢后六宫諸侯三寢夫人三宫卿大夫士二寢卿大夫士之妻二寢周官宫人掌王宫六寢之修女御掌御序於王之燕寢大僕掌建路鼓於大寢之門外春秋書莊公薨於路寢僖公薨于小寢書西宫災公羊曰路寢正寢也西宫小寢也有西宫則有東宫以有西宫知諸侯之有三宫也玉藻曰君日出視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服左傳曰齊人遷襄公殯于大寢宋大尹盟于小寢之庭文王世子曰正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室內則公庶子生就側室內宰正嵗令于王之北宫以隂禮教六宫又曰王后帥六宫之人昏義曰古者天子后六宫祭義曰諸侯卜三宫之夫人使蠶穀梁曰甸粟而納之三宫喪大記曰大夫世婦卒於適室內子未命死于下室遷尸于寢上士之妻皆死于寢士喪禮士死適室朔月若薦新則不饋于下室蓋王六寢后六宫諸侯三寢夫人三宫王大寢一小寢五諸侯大寢一小寢二大寢謂之路寢又謂之正寢小寢謂之燕寢又謂之少寢大寢聽政嚮明而治也故在前小寢釋服燕息也故在後先儒謂王小寢五而一寢在中四寢於四角春居東北夏居東南秋居西南冬居西北土王之月居中后之六宫亦正宫在前五宫在後其制如王之五寢諸侯小寢二而東西建焉春夏居東寢秋冬居西寢夫人三宫亦正宫在前二宫在後其制如諸侯之三寢自卿以下二寢正寢居前燕寢居後其妻二寢亦如之理或然也何則諸侯三宫而有東宫西宫則正寢在中可知退適小寢則小寢在後可知魯定公之時有髙寢蓋變亂禮法而名其寢耳何休曰諸侯三寢一曰髙寢二曰路寢三曰小寢妄也士庶子宿衛制鄭康成云衛王宫者必居四角四中徼候便也次其宿衛所在舍其休沐之處鄭司農云在內為次在外為舍小宰掌建邦之宫刑以治王宫之政令凡宫之糾禁正嵗以宫刑憲禁于王宫其有不共國有大刑宰夫正嵗則以法警戒羣吏令修宫中之職事書其能者與其良者以告于上宫正掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之辨外內而時禁稽其功緒糾其德行幾其出入均其稍食去其淫怠與其竒衰之民會其什伍而教之道藝月終則會其稍食嵗終則會其行事凡邦之大事令于王宫之官府次舍無去守而聽政令宫伯掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之月終則均秩終嵗則均敘以時頒其衣裳掌其誅賞大胥凡祭祀之用樂者以鼓徴學士序宫中之事士師掌國之五禁之法一曰宫禁漢中郎將分掌三宇郎有議郎中郎侍郎郎中凡四等皆秦官無員多至千人皆掌門户出充車騎故卿校尉牧守待價於此公車特徴賢良方正敦朴有道髙節公府椽曹試博士者亦充兹位其下第白衣試博士者皆拜郎中中郎者有五宫左右三將郎中有車户騎三將如淳曰主車曰車郎主衛曰户郎漢舊儀曰郎中令主郎中左右車將主左右車郎左右户將主左右户郎凡郎官皆主更直執戟宿衛諸殿門惟議郎不在直中郎官故事令出錢市財用給文書乃得出號曰山郎凡三宇郎官二漢並屬光祿勳光祿選三宇郎有行應四科者嵗舉茂才二人四行二人又上兼吏六人為長理劇明帝時館陶公主為子求郎帝不許賜錢千萬曰郎官上應列宿出宰百里有非其人民受其殃後代親衛之府一曰親府勳衛之府二一曰勳一府二曰勳二府翊衛之府二一曰翊一府二曰翊二府凡五府武德貞觀世重資蔭二品三品子補親衛二品曾孫三品孫四品子職事官五品子若孫勳官三品以上有封及國公子補勳衛及率府親衛四品孫五品及上柱國子補翊衛及率府周禮宫正掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡為之版以待宫伯掌王宫之士庶子凡在版者鄭康成曰官府之在宫中者若膳夫玉府內宰內史之屬士謂王宫中諸吏之適子也庶子其支庶也鄭司農曰庶子宿衛之官司農以庶子為夏官之諸子康成固不取之矣諸吏之適子或未為士不可謂之士康成以士為諸吏之適子亦誤也蓋士衛士也庶子國子之倅未為士者也上言士下言庶子則國子舉矣宫正掌凡宫中之官府次舍之衆寡宫伯掌士庶子授次舍之職事則宫伯所掌皆宿衛之人宫正所掌不特宿衛者而已次其宿衛所在也舍其休沐所在也八次八舍布於王宫四角四中則逺邇節而徼候便矣士庶子非王族則功臣之世賢者之類王以自近而衛焉則上下親而內外察矣又宫正稽其功緒糾其德行會其什伍而教之道藝宫伯掌其政令誅賞使之學問日進職業日修足以備顧問謹侍衛則王之左右前後孰非多聞直諒之士乎秦有郎中令掌宫殿門户漢武帝更名光祿勳其屬有議郎中郎侍郎郎中凡四等謂之三宇郎而中郎以下更直執戟內謹門禁外充車騎類取經明行修者充之至于公車特起賢良方正敦朴有道髙節公府掾曹試博士者多在此選而劉向霍光張安世東方朔揚雄之徒皆與焉是以董仲舒欲使列郡守二千石各擇其吏民之賢者嵗貢二人以給宿衛且以觀大臣之能館陶公主為子求郎明帝曰郎官上應列宿出宰百里有非其人民受其殃則宿衛之選可謂重矣魏晉以後無復三宇郎而光祿不復在禁中至梁改為光祿卿北齊曰光祿寺兼掌膳食帳幕而已唐為三衛五府以品官之子弟使父兄任保而後處之亦古之遺制也虎士五𨽻守衛之制周垣下為區廬周禮虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人虎賁氏掌先後王而趨以卒伍舍則守王間王在國則守王宫為周衛國有大故則守王門司𨽻掌五𨽻之法掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁罪𨽻其守王宫與其厲禁者如蠻𨽻之事蠻𨽻掌校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁夷𨽻其守王宫者與其守厲禁者如蠻𨽻之事貉𨽻其守王宫者與其守厲禁者如蠻𨽻之事師氏凡祭祀賓客會同喪紀軍旅王舉則從聽治亦如之使其屬帥四夷之𨽻各以其兵服守王之門外且蹕朝在野外則守內列保氏凡祭祀賓客會同喪紀軍旅則從聽治亦如之使其屬守王闈衛尉秦官掌門衛屯兵漢因之漢舊儀曰衛尉寺在宫內胡廣云主宫闈之內衛士於周垣下為區廬者若今之仗宿屋景帝更名中大夫令後復為衛尉又有長樂建章甘泉衛尉皆掌其宫職略同而不常置張衡西京賦曰衛尉八屯李善曰衛尉率吏士周宫外於四方四角立八屯隋衛尉掌軍器儀仗帳幕以監門衛掌宫內屯兵唐龍朔二年改為司衛寺正卿咸亨中復舊唐之宿衛以府兵其畨上宿衛者惟給弓矢橫刀而已兵部以逺近給畨五百里為五畨千里七畨一千五百里八畨二千里十畨外為十二畨皆一月上若簡留直衛者五百里為七畨千里八畨二千里十畨外為十二畨亦月上髙宗武后時天下久不用兵府兵之法寖壞畨役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛更號曰彍騎自是諸府士益各不補折衝將又積嵗不得遷士人皆耻為之十三年始以彍騎分𨽻十二衛總十二萬為六畨每衛萬人自天寶以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可教李林甫遂請停上下魚書其後徒有兵額官吏故時府人目畨上宿衛者曰侍官言侍衛天子至是衛佐悉以假人為童奴而人人恥之至相罵辱必曰侍官而六軍宿衛皆市人富者販繒綵食梁肉壯者為角抵拔河翹木扛鐵之戲及祿山竊發皆不能受甲矣古之守衛王宫者不特士庶子而已有虎賁之虎士司𨽻之五𨽻虎士有卒伍而四翟之𨽻有兵國有大故則守王門舍則守王間而司戈盾軍旅會同授旅賁及虎士戈盾則王之在國在野可謂嚴矣然必使四翟之𨽻者以著王之所守在四夷也或使師氏之屬帥之者以著王之使武以文也四𨽻所守皆如蠻𨽻之事者周之時以南方為逺尤貴其來也掌四夷之官曰象胥而奏樂亦以南詩曰以雅以南記曰胥鼓南則周人之意可知矣士庶子所直在四中四角而虎士五𨽻之所直於經無見漢之衛士於周垣下為區廬而張衡有八屯之説則先王之制蓋亦如此禮書卷四十四
