body:
  text: 禮書卷一百三十六宋陳祥道撰重翟先儒謂重翟當玉路右從王祭祀先王先公羣小祀所乘者也衛侯夫人始嫁翟茀以朝蓋厭翟也則王后始嫁重翟可知厭翟厭翟當金路右從王賓饗諸侯者也行人上公再祼侯伯而下皆一祼則再祼者后亞之一祼者后不與內宰云賓客之祼獻瑤爵皆贊鄭氏云謂王同姓及二王之後是也王姬下嫁於諸侯車不繫其夫下王后一等不得乘重翟則上公與侯伯夫人皆乘厭翟可知安車后朝王之車然則諸侯夫人亦應乘此以朝君翟車王后出桑及三夫人與三公夫人同乘翟車九嬪與孤妻同乘夏篆二十七世婦與卿妻同乘夏綬女御與大夫妻同乘墨車士妻攝乘乘亦墨車非攝則棧車而已諸侯以下夫人祭祀賔饗出桑赤朝君皆可知也唐制翟車青質青紬纁朱裏通幰繡紫絡帶及帷厭翟質紫紬纁朱裏通幰紅錦絡帶及帷翟車黃紬纁黃裏通幰白車錦絡帶及帷三帛皆金飾朱輪畫朱牙箱飾翟羽朱絲絳綱鞶纓色皆從車質輦車輦車無面飾無蔽幄則漆之而已説文曰有輻曰輪無輻曰輇鄭氏釋巾車曰輦車輇輪釋雜記曰輇崇蓋半乘車之輪巾車王右之五路重翟錫面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋翟車貝面組總有握輦車組挽有翣羽蓋者重翟重其羽而不厭厭翟次其羽而不重翟車則不重不厭以羽飾之而已五路言翟言車而不言路二翟言翟而不言車者不言路避王也不言車車不足以名之也孤言夏篆卿言夏縵至墨車以下然後言車是亦飾盛者以飾名飾殺者以車名也重翟錫面厭翟勒面安車雕面翟車貝面鄭司農曰錫馬面錫鄭康成曰勒面如玉龍勒之韋為當面飾然則錫面者錫飾馬面也勒面雕面貝面蓋亦若此勒面以韋則錫面雕面貝面以韋可知也錫必鏤之則雕面亦鏤錫可知也錫面雕面以金貝面以貝則勒面有錫亦可知也或言勒或言雕互備也馬飾莫隆於錫勒飾莫殺於貝故巾車於王之玉路言錫樊纓儀禮於士之喪車貝勒此重翟厭翟安車所以錫面而翟車所以貝面也重翟朱總厭翟繢總安車鷖總翟車組總鄭司農曰鷖總者青黑色以繒為之總著馬勒直兩耳與兩鑣康成曰朱總繢總其施之如鷖總車衡輨亦宜有焉考之於詩曰朱幩鑣鑣毛氏曰人君以朱纒鑣扇汗且以為飾此蓋朱總也組總則纒鑣而已非必扇汗也施之直馬耳與衡輨不可得而知也朱色純繢色雜鷖色青黑安車之轡取象於鷖者以其在涇在沙而安故也三車取飾於翟者以其守死而不犯分被文以相質故也翟車有幄則無容蓋輦車有翣蓋則無蔽安車則無翣無蔽輦車無面飾無蔽幄漆之而已隆殺之節然也婦人不立乘謂之安車則五路皆安車也特於無翣無蔽者命之曰安車以其不飾以羽與四者異也鄭氏曰重翟從王祭祀厭翟從王饗賓安車朝王翟車出桑輦車從容於宫中以謂祭祀賓客行禮也故有容蓋出桑適逺也故有幄朝王不必蔽翣宫中不必蔽幄理或然也詩述衛夫人之朝君則曰翟茀以朝者以其始來乘之也故安車未用焉禮書卷一百三十六
