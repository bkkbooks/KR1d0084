body:
  text: 禮書卷十六宋陳祥道撰繶士虞禮曰足有緣之爵謂之繶爵則繶緣也鄭司農曰赤繶黃繶以赤黃之絲為下緣鄭康成曰繶縫中紃正義曰繶者互底相接之縫綴絛於其中絇屨人作句士冠士喪禮作絇說文曰纑布縷也纑繩絇也鄭釋屨人曰絇謂之拘狀如刀衣鼻著屨舄之頭以為行戒釋士喪禮曰綦結于跗連絇者絇在屨頭以餘組連之止足折也賈公彥曰絇謂屨頭以絛為鼻或謂用繒一寸屈之為絇絇所以受繫穿貫者也蓋絇以絲為之所以自拘戒猶幅所以自福束也童子不絇未能戒也喪屨無絇去飾也鄭氏曰小功以下吉屨無絇人臣去國鞮屨不絇以喪禮處之也純儀禮曰純博寸鄭康成曰純緣也正義曰純以為口緣綦儀禮組綦繫于踵又曰綦結于跗連絇內則曰屨著綦莊周曰正緳繫屨鄭氏曰綦屨繫也所以絇止屨也綦讀如馬絆綦之綦蓋綦屬于跟後以兩端嚮前而結之特死者連絇止足折也鞮屨鞮屨以革為之周禮有鞮屨氏曲禮曰鞮屨素簚鄭氏曰鞮屨無絇之菲也用屨脫屨之節儀禮士相見禮若君賜之爵升席祭卒爵退坐取屨隱辟而后屨鄉飲酒禮司正請坐于賓賓主人介衆賓皆降說屨揖讓如初升坐說屨主人先左賓先右乃羞鄉射大射儀並倣此燕禮賓及卿大夫皆說屨升就席正義曰直云賓及卿大夫說屨不云君降說屨則君說在堂上席側是以記云排闔說屨於户內者一人而已士虞禮曰尸坐不說屨侍神不敢燕惰也曲禮曰户外有二屨言聞則入言不聞則不入毋踐屨侍坐於長者屨不上於堂解屨不敢當階就屨跪而舉之屏於側鄉長者而屨跪而遷屨俯而納屨內則曰屨著綦綦屨繫也玉藻曰禮已三爵油油以退退則坐取屨隱辟而後屨坐左納右坐右納左又曰在官不俟屨少儀曰排闔說屨於户內者一人而已矣有尊長在則否凡祭於室中堂上無跣燕則有之祭不跣主敬也燕則有跣為歡禮凡祭于室中堂上無跣燕則有之故特牲少牢饋食自主人以至凡執事之人自迎尸以至祭末旅酬無算爵與夫尸謖餕食之節皆不說屨而尸坐亦不說屨以其侍神不敢燕惰也若夫登坐於燕飲侍坐於長者無不說屨以其盡歡致親不敢不跣也故在堂則屨不上於堂在室則屨不入於户排闔說屨於户內者一人而已有尊長在則否然則君屨不下於堂不出於室矣解屨必屏於側取屨必隱辟納屨必鄉長者遷之必跪納之必俯說之必主人先左賓先右納之必坐左納右坐右納左則屨之說納皆有儀矣昔褚聲子襪而登席其君㦸手而怒之此知說屨而不知跣也後世人臣說履然後登堂此知致敬而不知非坐不說屨也漢魏以後朝祭皆跣襪惟蕭何劒履上殿魏武亦不解履上殿宋志南郊皇帝至南階脫舄升壇入廟脫舄升殿朝士詣三公尚書丞郎詣令僕射尚書並門外下車履梁天監中尚書參議清廟崇嚴既絶常禮凡有履行者應皆跣襪詔可隋志諸非侍臣皆脫履升殿臺官詣三公至黃閣下履過閭還著履唐志元正冬至受朝賀上公一人詣西階席脫舄置於席升開寶通禮太廟晨祼饋食并禘祫皇帝至東階下解劒脫舄襪左傳曰襪而登席則屨有襪矣史曰張釋之為王生結襪傳曰文王左右無結襪之士則襪有繫矣梁天監間尚書參議按禮跣襪事由燕坐今極恭之所莫不皆跣清廟崇嚴既絶常禮凡有禮行者應皆跣襪蓋方是時有不跣襪者故議者及之童子服緇布衣錦緣錦紳并紐錦束髮童子屨白屨無絇士冠禮將冠者采衣紒曲禮父母存冠衣不純素童子不衣裘裳內則十年學書計不帛襦袴玉藻童子緇布衣錦緣錦紳并紐錦束髮皆朱錦也肆束及帶勤者有事則收之走則擁之童子不裘不帛不屨絇無緦服聽事不麻見先生從人而入然則童子緇布衣錦緣此冠禮所謂采衣也不裘為其消隂氣也不衣裳為其未預事也不屨絇未拘之以行戒也無緦服聽事不麻絰未責之以盡恩也問喪曰童子不緦惟當室緦緦者其免也當室則免而杖矣則不緦不麻不當室者之禮也既夕禮朔月童子執帚從徹者而入卒奠從執燭者而東入則燭先而徹者後出則徹者先而執燭者後童子常在成人之後故出入不同少儀曰適有喪者曰比童子曰聽事公卿之喪曰聽役於司徒則聽與立主人之比者皆適有喪者之事也夫童者未有知未有與也先王制禮則寬之而不嚴略之而不詳故名而不字紒而不冠見先生則從人而入遭先生於道則拱手而立摯則委而不授坐則隅而不正喪則不哀不踊不杖不菲不廬豈特無緦服聽事不麻而已哉雜記童子不哀不踊不菲不杖不廬凡皆以為不可以預成人之禮也彼闕黨之童見譏於論語仍叔之子取譏於春秋蓋不知此禮書卷十六
