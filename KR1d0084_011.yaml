body:
  text: 禮書卷十一宋陳祥道撰諸侯中衣制如深衣其領繡黼大夫士中衣其領丹長衣與深衣同以布中衣與長衣同掩袂深衣中衣用於吉凶長衣用於凶而已詩曰素衣朱襮又曰素衣朱繡禮曰繡黼丹朱中衣大夫之僣禮也爾雅曰黼領謂之襮蓋素以為衣繡黼以為領丹朱以為緣諸侯之服也鄭氏謂讀朱繡為朱綃誤矣禮曰以帛裏布非禮也蓋爵辨而上則衣以帛而中衣亦帛皮辨𤣥冠則衣以布而中衣亦布故大夫祭於家而中衣必布士祭於公而中衣亦帛以其所以裏朝服與爵辨服異也檀弓曰練練衣黃裏鄭氏曰練中衣以黃為裏則中衣亦有裏歟皇侃說凡祭服先加明衣次加中衣冬則次加袍夏則用葛次加祭服若朝服亦先以明衣次加中衣冬則次加裘裘上加裼衣裼衣之上加朝服如侃之說是中衣施於裘葛之下也然裘上之裼衣即朝服耳其言裼衣之上又有朝服是襲鄭氏之論也禮言繡黼丹朱中衣詩素衣朱襮朱繡說者皆以為諸侯禮而天子領緣之制無聞漢明帝始以單紗為之謂之中單范曄輿服志曰長冠以祀宗廟諸祀則冠之皆服袀𤣥絳緣領袖為中衣絳袴襪晉志天子祀天地宗廟冕服中衣以絳緣其領袖釋奠先聖則皂紗袍絳緣中衣其朝服通天冠絳紗袍皂緣中衣佟之議公卿以下祭服裏有中衣即今之中單衣明帝初詔有司採周官禮記尚書乘輿服從歐陽說公卿以下服從大小夏侯說祭服絳緣袖領為中衣絳袴襪示其赤心奉神今中衣絳緣足有所明無俟於袴遂除之後齊天子平冕十二章緣絳中單又有通天冠絳紗袍皂緣中單朝服冠幘絳紗單衣白紗中單皂領袖皂襈隋志天子衮冕白紗內單黼領青褾襈裾祀圓丘方澤感帝明堂五郊宗廟社稷則服之通天冠絳紗袍白紗內單黼領青褾襈朔日受朝元㑹及冬諸祭還則服之自王公已下祭服白紗內單黼領青襈襈裾鷩冕已下內單青領爵辨從九品以上助祭則服之白絹內單青領褾襈裾朝服亦絳紗單衣白紗內單皂領袖皂襈唐志天子之服大裘冕白紗中單皂領青褾襈裾衮冕白紗中單黼黻領青褾襈裾通天冠者冬至受朝賀祭還燕羣臣養老之服也絳紗袍白紗中單朱領褾襈裾皇太子衮冕白紗中單黼領青褾襈裾逺遊冠者元日朔日入朝釋奠之服也絳紗袍黃裳白紗中單黑領褾襈裾羣臣之服衮冕者一品之服也白紗中單黼領青褾襈裾絺冕中單青領爵辨中單青領褾襈裾衽儀禮喪服傳曰衽二尺有五寸衽所以掩裳際也二尺五寸與有司紳齊也上正一尺燕尾二尺五寸凡用布三尺五寸玉藻曰衽當旁衽謂裳幅所交裂也凡衽者或殺而下或殺而上是以小要取名焉衽屬衣則垂而放之屬裳則縫之以合前後上下相齊深衣曰續衽鉤邊鉤讀如鳥啄必鉤之鉤鉤邊若今曲裾正義謂以布若帛三尺五寸上下正各一尺其中一尺五寸邪裂之而得兩衽衽各二尺五寸兩旁皆有以掩裳際朝喪祭服之衽廣上狹下而屬於衣深衣之衽狹上廣下而屬於裳是以或殺而下或殺而上對之若小要然問喪曰親始死扱上衽大記小斂大斂祭服不倒皆左衽詩曰薄言袺之薄言襭之爾雅曰執衽謂之袺扱衽謂之襭書曰四夷左衽論語曰被髮左衽韓詩外傳曰衣成必缺衽管子曰振衽掃席鄭氏釋喪服傳曰婦人不殊裳其服如深衣而無衽考工記曰終嵗衽不敝說文曰衾交也史曰斂衽而朝衽所以掩裳際也深衣連裳故衽屬衣餘衣不連裳故衽屬裳衣裳雖殊垂而放之一也故有事則或扱或執是衽未嘗縫之以合也棺之小要謂之衽以其掩縫若衣衽然非為小要而名之是衣衽皆狹上廣下未嘗有殺上殺下之異也詩言婦人之采芣莒或袺衽或襭衽是婦人之服未嘗無衽也衽之辨有上下其用有左右生者上右記曰親始死扱上衽是也死者與夷狄上左記曰小斂大斂祭服不倒皆左衽書曰四夷左衽語曰被髮左衽是也士喪禮重冪用葦席左衽是亦死者上左之意歟纚緇色內則子事父母雞初鳴咸盥漱櫛縰笄總拂髦冠緌纓男女未冠笄者漱櫛縰拂髦總角士冠禮緇纚廣終幅長六寸贊者坐櫛設纚賓坐正纚特牲禮主婦纚笄宵衣鄭氏曰纚今之幘梁也纚一幅長六尺足以韜髦而結之蓋櫛以理髦而後纚以纚為紒然後笄古之言纚笄者未有先笄而後纚也問喪曰親始死雞斯徒跣蓋雞斯云者哭聲然也鄭氏改雞斯為笄纚恐不然也纚亦作縰髦角羈角夾囱曰角羈午違曰羈詩曰髧彼兩髦毛氏曰髧者兩髦之貌髦者髮至眉子事父母之飾內則子事父母櫛縰笄總拂髦冠緌纓男女未冠笄者櫛縰拂髦總角髦用髮為之象幼時鬌其制未聞子生三月之末擇日剪髮為鬌男角女羈否則男左女右鬌所遺髮也夾囱曰角午違曰羈揚子曰羈角哺果許慎曰髦髮至眉左傳曰豈若辨髦因而敝之玉藻曰親沒不髦喪大記曰諸侯小斂脫髦既夕禮士既殯脫髦孔穎達曰髦者事父母之飾也父母有先死者於死三日脫之服闋又著之若父母俱沒則因去之子之幼也父母翦髮為之鬌及其長也因以為飾謂之髦幼存而不忍棄所以順父母之心長而不忘幼所以示人子之禮及親死始而猶幸其生焉未忍脫之三日之後則幸生之心巳矣脫之可也故喪大記諸侯小斂脫髦既夕禮士既殯脫髦髦毛長而特出者也故凡物長毛皆謂之髦禮記所謂髦長詩所謂譽髦皆長毛也總組總錦總布總內則曰櫛纚笄總則纚韜髮也總束髮也玉藻曰童子錦束髮喪服女子子在室為父布總六寸女子子適人者為其父母婦為舅姑妾為女君君之長子布總檀弓曰南宫縚之妻為姑總八寸士喪禮鬠用組乃笄然則總或以錦或以布或以組吉凶之禮異也謂之總以既束其本又總其末也孔穎達曰朞總八寸大功總亦八寸緦麻小功同一尺吉總當尺二寸此不可考明衣明衣之裳孔子曰齊必有明衣布士喪禮陳襲事於房中明衣裳用布又曰明衣不在算記曰明衣裳用幕布袂屬幅長下膝鄭氏曰幕布帷幕之布升數未聞屬幅不削幅也長下膝又言裳長蔽下膝深也有前後裳不辟長及觳觳足跗也縓縪緆一染曰縓飾裳在幅曰縪在下曰緆緇純飾衣領袂曰純衣以緇裳以縓象天地也然則明衣之袂屬幅而不削明衣之裳前三後四而不辟積衣之長也下膝與要廣者異矣喪服傳衣帶下足裳之長也及足跗與無見膚者異矣古者將祭而齊明衣布死以齊終亦明衣布然則凡親身之衣不以布歟禮書卷十一
