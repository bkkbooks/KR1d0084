body:
  text: 禮書卷二十一宋陳祥道撰觿或以象或以角禮曰子事父母婦事舅姑左佩小觿右佩大觿詩曰童子佩觿毛氏曰觿所以解結鄭氏曰觿貌如錐以象骨為之説文曰觿佩角鋭專可以解結然則佩觿成人之服也衛惠公服成人之服而有童子之行故詩刺之韘韘沓極一物而三名以朱韋為之詩曰童子佩韘毛氏曰韘玦也鄭氏曰韘之言沓也説文韘亦作弽弽射決也考之射禮右巨指著決所以鉤弦食指中指無名指著沓所以放弦左臂著拾所以遂弦士喪禮決用正王棘若擇棘則大夫用骨天子諸侯用象矣鄭氏釋大射及繕人云大射朱極三士喪纊極二則韘生者以韋死者以纊矣韘謂之極以其中於指也謂之沓以其沓於指也毛氏許慎以韘為決誤矣捍禮曰右佩玦捍捍韝臂也以韋為之可以捍弦亦謂之拾亦謂之遂則捍拾遂一物而三名餘見射門紛帨詩曰無感我帨兮內則曰女子設帨於門右昏禮母施襟設帨內司服后之喪共內具之物鄭氏曰內具紛帨之屬然則帨佩巾也佩巾雖女子之事而男子亦有之故禮曰子事父母左佩紛帨鄭氏曰紛帨拭物之巾也今齊人有言紛者蓋自巾言之謂之紛與帉同義先儒曰巾謂之帉自拭物言之謂之帨與捝同義儀禮既祭皆帨手唐制天子紛廣二寸四分長六尺四寸色如綬皇太子公服紛廣二寸四分長六尺四寸色如綬羣臣進賢冠者紛廣四寸長六尺六寸色如綬此又因以為飾也礪金青色禮曰左佩刀礪詩曰取厲取鍛書曰礪砥砮丹又曰若金用汝作礪漢書曰泰山若礪又曰瑊功玄厲莊子曰新發於硎鄭氏曰礪礱也則礪謂之硎亦謂之礱又謂之砥孔安國曰砥細於礪遰刀鞘禮曰右佩遰遰刀鞞也瞻彼洛矣詩曰鞞琫有珌公劉詩曰鞞琫容刀左傳曰藻率鞞鞛昭其數也毛氏釋瞻彼洛矣曰鞞刀鞞也琫上飾珌下飾天子玉琫而珧珌諸侯璗琫而璆珌大夫鐐琫而鏐珌士珕琫而珕珌釋云公劉曰下曰鞞上曰琫劉熙亦曰刀室曰削室口之飾曰琫琫捧也下末之飾曰琕琕卑也蓋琕琫珌皆刀削之飾而琕尤在其下也蜃謂之珧蜃屬謂之珕黃金謂之璗其美者謂之璆白金謂之銀其美者謂之鐐爾雅此天子至士鞞飾所以不同也説文珧蜃甲珕蜃屬杜預云上飾曰鞞下飾曰鞛與毛氏之説不同不可考也削遰皆刀室之異名削亦作鞘鞞亦作琕琫亦作鞛金燧木燧鑒古者燧人取火周官司烜氏掌以夫遂取眀火於日以鑒取眀水於月以共祭祀之眀齍眀燭共眀水內則左佩金鐩右佩木燧考工記曰金錫半謂之鑒燧之齊淮南子曰陽燧見日則然而為火方諸見月則津而為水王充論衡曰陽燧取火於日方諸取水於月相去甚逺而火至水來者氣感之也鄭司農釋周禮謂夫發聲鄭康成謂夫遂陽遂也鑒鏡屬世謂之方諸然則鑒金為之則夫遂亦金矣內則以夫遂為金遂是也鑒之體方則夫遂圜矣世謂鑒為方諸是也蓋離者陽中之隂於物為火坎者隂中之陽於物為水以金遂取火則以陽為隂以方諸取水則以隂召陽以陽召隂夫道也故謂之夫夫能遂事故謂之遂夫遂以義言鑒以體言於取火言夫遂於取水言鑒互相備也高誘曰方諸隂燧大蛤也熟摩向月則水生以銅盤受之下水數石觀漢之飲酎夕牲以鑒諸取水於月以陽燧取火於日漢書儀唐之李恭真嘗八九月中取蛤尺二寸試之得水數斗劉氏唐志則取水亦以大蛤矣或謂之方珠蓋其類也莊子曰木與木相摩則然文子曰木中有火不鑽不發故四時變國火者春取榆栁夏取棗杏季夏取桑柘秋取柞楢冬取槐檀而木燧取火蓋不必然先儒謂晴則取火以金燧隂則取火以木燧然金燧以取眀火特施於致嚴之時而已則凡取火皆木燧耳孰謂木燧有間於隂晴耶禮書卷二十一
