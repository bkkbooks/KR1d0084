body:
  text: 禮書卷三十七宋陳祥道撰天子五門路門一名畢門應門皋門雉門庫門諸侯三門周禮閽人掌守王宫之中門之禁鄭司農曰王有五門外曰皋門二曰雉門三曰庫門四曰應門五曰路門一曰畢門𤣥謂雉門三門也師氏居虎門之左司王朝虎門路寢門也王日視朝於路寢門外畫虎焉以眀猛勇司士王族故士虎士在路門之右大僕大右大僕從者在路門之左大僕建路鼓于大寢之門外而掌其政匠人營國方九里旁三門路門不容乘車之五个應門二徹㕘个路門者大寢之門王正門謂之應門王宫門阿之制五雉詩曰迺立皋門皋門有伉迺立應門應門將將王之郭門曰皋門伉高貌王之正門曰應門將將嚴正也美大王作郭門以致皋門作正門以致應門焉箋云諸侯之宫外門曰皋門朝門曰應門内有路門天子之宫加以庫雉書曰二人雀弁執恵立于畢門之内路寢門一名畢門康王之誥王出在應門之内太保率西方諸侯入應門左畢公率東方諸侯入應門右記曰君復於庫門四郊既卒哭宰夫執木鐸以命于宫曰舎故而諱新自寢門至于庫門庫門宫外門軍有憂則素服哭於庫門之外魯莊公之喪既葬而絰不入庫門仲尼與蜡賓事畢出遊於觀上喟然而嘆觀闕也天子諸侯臺門此以高為實也臺門而旅樹大夫之僭禮也獻命庫門之内戒百官也庫門在雉門之外入庫門則至廟門外矣眀堂位九采之國應門之外正門謂之應門庫門天子皋門雉門天子應門天子五門皋庫雉應路魯有庫雉路則諸侯三門郊特牲曰繹之於庫門内祊之於東方朝市之於西方失之矣月令季春餧禽之藥毋出九門天子九門者路門也應門也雉門也庫門也皋門也城門也近郊門也逺郊門也闗門也春秋僖二十年新作南門穀梁曰南門法門也定二年雉門及兩觀災冬新作雉門及兩觀穀梁曰有加其度也春秋傳曰齊晏子端委立於虎門鄭子良伐虎門爾雅正門謂之應門觀謂之闕門側之堂謂之塾月令曰毋出九門先儒謂天子外門四關門逺近郊門國門也内門五皋庫雉應路也諸侯外門四與天子同内門三則庫雉路而與天子異詩以天子之禮追大王之事眀堂謂以魯之門取天子之制皆稱皋門應門又書康王之誥周禮考工記爾雅互稱應門路門郊特牲王聴誓命曰庫門之内戒百官也則天子之門謂之皋庫應路著矣特雉門之説不見於經然周禮閽人掌中門之禁則中門豈雉門歟雉門謂之中門猶應門書謂之南門爾雅謂之正門路門書謂之畢門師氏謂之虎門盖中於五門謂之中門前於路門謂之南門發政以應物謂之應門門畢於此謂之畢門畫虎於此謂之虎門則門之名豈一端而已哉皋門之内外朝也朝士建其法小司寇掌其政列三槐與九棘設嘉石與肺石而朝諸侯聴訟詢大事在焉應門之内治朝也司士正其位宰夫掌其法大僕正王之位而王日視朝在焉路門之内燕朝也大僕正其位掌擯相而族人朝焉玉藻曰朝服以視朝退適路寢聴政然則王日視朝於治朝而退聴政於燕朝矣雉門之外縣治象所以待萬民應門之外設宗廟社稷所以嚴神位路門之外則九室九卿朝焉路寢之内亦九室九嬪居焉眀堂位曰庫門天子皋門故魯莊公既葬而絰不入庫門衛莊公繹於庫門之内檀弓曰君復於庫門四郊又曰卒哭而諱宰夫執木鐸以命于宫自寢門至於庫門又曰軍有憂哭於庫門之外則諸侯之外門庫門也魯公周公之故猶不可以稱皋門應門特為皋應之制而已況非魯乎閽人掌王宫之中門之禁喪服凶器不入宫潛服賊器不入宫司寇凡民之有獄訟入束矢鈞金于朝朝士凡得獲貨財人民六畜者委于朝是禁施於雉門之内而不於雉門之外故庶民得以造外朝而奇服怪民得以入皋門庫門若然縣法於中門宜矣禮運曰仲尼與蜡賓事畢出遊於觀之上榖梁曰女嫁父送之不下堂母不祭門諸母不出闕門諸候之朝在闕門内則天子可知鄭氏釋閽人謂廟在中門之外其説無據路門路大也王之路車路馬路寢路鼓皆曰路則大寢之門謂之路門宜矣路門書謂之畢門師氏謂之虎門春秋之時齊晏子端委於虎門鄭子良伐虎門葢末世諸侯之門亦放其名耳應門應門發政以應物也眀堂位南門之外亦曰應門盖眀堂之南門猶路門故南門之外門亦謂之應門皋門左傳曰魯人之皋杜氏曰皋緩也皋鼓皋舞皆以皋為緩則門之緩者謂之皋宜矣毛氏以皋門為郭門非也雉門春秋書新作雉門及兩觀公羊傳曰五板為堵五堵為雉盖城雉之制是也何休曰天子外闕兩觀諸侯内闕一觀然天子外闕於經無見庫門曲禮曰在府言府在庫言庫天文東璧為文府西奎為武庫漢書於府言財物之府於庫言武庫則庫門兵庫在焉觀門爾雅曰觀謂之門禮運曰出遊於觀之上禮器曰天子諸侯臺門郊特牲曰臺門而旅樹大夫之僭禮也周禮縣法于象魏莊周曰心遊魏闕之下左氏曰季桓子御公立于象魏之外又曰鄭伯享王于闕西辟盖謂之觀以其可觀也謂之闕以其闕中也釋名曰觀在門兩旁中央闕然為道也謂之魏以其巍巍也謂之象謂以其有象也臺門以其髙於垣墉若臺然也諸侯有臺門無兩觀魯有兩觀為周公故也春秋傳新作雉門及兩觀譏加其度耳子家駒以魯設兩觀為僭誤矣先王之時門皆南嚮漢有北闕東闕非古也漢志未央宫東闕罘思災先儒謂屏為罘思罘思小樓也城隅闕上皆有之屏上亦然故稱屏曰罘思然則先王觀闕之制宜亦如此屏廟屏詩曰俟我於著乎而毛氏曰門屏之間曰宁爾雅曰門屏之間謂之中屏謂之樹小牆當門中詩曰四方為屏之屏之翰論語曰邦君樹塞門管氏亦樹塞門荀子曰天子外屏不欲見外也諸侯内屏不欲見内也孔子曰吾恐季孫之憂不在顓㬰而在蕭牆之内也鄭氏曰蕭之言肅也牆屏也君臣相見至屏而加肅敬是以謂蕭牆禮緯曰天子外屏諸侯内屏大夫以簾士以帷郊特牲曰臺門而旅樹大夫之僭禮也眀堂位曰疏屏天子之廟飾也鄭氏釋眀堂位曰屏今浮思也刻之為雲氣蟲獸如今闕上為之矣孔頴達曰漢時謂屏為罘思天子外屏人臣至屏俯伏思念其事則罘思小樓也故城隅闕上皆有之然則屏上亦為屋以覆屏牆故稱曰罘思漢書五行志曰東闕罘思災罘思闕之屏晉天文志屏曰星在端門之外近右執法所以壅蔽帝庭也古者門皆有屏天子設之於外諸侯設之於内禮臺門而旅樹旅道也當道而設屏此外門之屏也治朝在路門之外天子當宁而立宁在門屏之間此路門之屏也國語曰吳王背屏而立夫人向屏此寢門内之屏也魯廟疏屏天子之廟飾此廟門之屏也月令天子田獵整設于屏外此田旁之屏也疏屏疏通之也穀梁曰亡國之社以為廟屏戒也其屋亡國之社不得上達也然記曰亳社屋之不受天陽也亳社北牖使隂眀也公羊曰蒲社揜其上棧其下則亡國之社屋之三面幽閉設牖於北而已與記所謂疏屏者異矣春秋傳曰間于兩社為公室輔則亡國之社葢位于東而非廟屏也爾雅曰屏謂之樹語曰吾恐季孫之憂在蕭牆之内則屏謂之樹又謂之蕭牆漢之時東闕罘思災鄭康成釋眀堂位曰屏若今浮思釋匠人曰城隅角浮思孔穎達謂浮思小樓城隅及闕皆有之而屏亦然則屏又謂之浮思孔子以管仲樹塞門為不知禮禮記以旅樹為大夫之僭而禮緯謂大夫以簾士以帷於理或然天文屏四星在端門之内近右執法然則先王設屏非茍然也禮書卷三十七
