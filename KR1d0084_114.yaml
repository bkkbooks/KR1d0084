body:
  text: 禮書卷一百十五宋陳祥道撰五兵易曰弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌周禮曰司兵掌五兵五盾各辨其物與其等以待軍事五盾干櫓之屬其名未盡聞也等謂治功上下鄭司農云五兵者戈殳戟酋矛夷矛及授兵從司馬之法以頒之及其受兵輸亦如之及其用兵亦如之祭祀授舞者兵授以朱干之屬軍事建車之五兵會同亦如之車之五兵鄭司農所云者是也步卒之五兵則無夷矛而有弓矢司戈盾掌戈盾之物而頒之司弓矢掌六弓四弩八矢之法辨其名物考工記燕無函秦無廬函鎧也廬謂矛戟柄竹攢祕函人為甲矢人為矢廬人為廬器戈祕六尺有六寸殳長尋有四尺車戟常酋矛常有四尺夷矛三尋凡兵無過三其身弗能用也而無己又以害人禮記月令季秋天子乃教田獵以習五戎五戎謂五兵弓矢殳矛戈戟也書曰善敹乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善二人執惠惠三隅矛四人執戈上刃一人執劉劉鉞屬一人執戣一人執瞿戣瞿皆戟屬詩清人曰二矛重英重英矛有英飾二矛重喬重喬纍荷也箋云喬矛於近上及室題所以縣毛羽小戎曰龍盾之合盡龍其盾也又曰厹矛鋈錞蒙伐有苑厹三隅矛也錞鐏也蒙討羽也伐中干也苑文貌箋俴淺也謂以薄金為介之札介甲也蒙尨也討雜也畫雜羽之文於伐故曰尤伐虎韔鏤膺交韔二弓竹閉緄縢篤公劉曰弓矢斯張干戈戚揚戈句干戟也管子幼官篇春兵尚矛象春物之芒鋭夏兵尚戟象夏物之森聳秋兵尚劔象金之利冬兵尚脅盾象時物之閉盾或著之於物故曰脅盾鴻列子曰凡有血氣之蟲舍牙戴角前爪後距有角者觸有齒者噬有毒者螫有蹄者趹喜而相戲怒而相害天之性也人有衣食之情而物弗能足也故羣居雜處分不均求不贍則爭爭則強脅弱而勇侵怯人無筋骨之強爪牙之利故割革而為甲爍鐵而為刃貪昧叨餮殘賊天下莫不搔動莫寧其所有聖人勃然而起乃討強暴平亂世夷險除穢以濁為清以危為寧故不得不中絶中絶謂若殷王中相絶滅兵之所由來者逺矣時訓曰春其兵矛夏其兵戟中央其兵劔秋其兵戈冬其兵鎩孝經緯云東夷之樂曰韎持矛助時生南夷之樂曰任持弓助時養西夷之樂曰株離持鉞助時殺北夷之樂曰禁持楯助時藏皆於四門之外右辟夫兵之原發於人之爭心而五兵之制有象自然之物類要之各適其用而已先儒者以矛屬春戟屬夏戈屬秋鎩屬冬有以弓助夏鉞助秋盾助冬有以兵助秋甲鍪助冬不可考也周官司兵軍事會同建車之五兵則兵有車之五兵有步之五兵車之五兵戈殳戟酋矛夷矛也步之五兵無夷矛而有弓矢也然夷矛雖不施於步而弓矢未嘗不設於車故兵車射者人處左御者處中戎右處右則車上固有弓矢矣廬人攻國之兵欲短守國之兵欲長則攻國不以夷矛守國不以殳酋矛也司馬法弓矢圍殳矛守戈戟助者蓋以殳對矛則殳可以攻矛可以守以弓矢對殳矛則殳矛可以守弓矢可以攻也若夫戈戟則為之助而已五兵之用長以衛短短以救長則人持其一矣盾則夫人而有之書曰比爾干干欲其比則夫人有之可知也然五兵之所以便於用者戈而已其祕短而易持其胡援廣而易入可以摏可以斬可以擊可以鈎觀富父終甥以戈摏僑如之喉狼瞫以戈斬秦囚子南以戈擊子哲長魚矯以戈殺駒伯則戈之於用可知矣詩曰荷戈與祋書曰稱爾戈周官有司兵又有司戈盾司戈盾祭祀授於賁殳故士戈盾軍旅會同授二車戈盾建乘車之戈盾授旅賁及虎士戈盾而戎武戡伐戰戮皆從戈則戈奚適而不用哉殳考工記曰廬人為廬器殳長尋有四尺又曰􅌛兵同強舉圍欲細凡為殳五分其長以其一為之被而圍之三分其圍去一以為晉圍五分其晉圍去一以為首圍蓋舉則取而提之也被則操而用之也晉則矜於搢者也首則上而鐏者也殳長丈有二尺五分其長以其一為之被而圍之則所操者二尺四寸圜之也三分其圍去一為晉圍則其趨尊者又殺也五分其晉圍去一以為首圍則其如鐏者愈殺也圍其所操則非所操者有稜矣鄭氏謂矜八觚是也細而能􅌛則非竹不可許慎謂積竹為之是也詩曰伯也執殳為王前驅又曰彼候人兮荷戈與祋祋亦殳也蓋殳雖建之於車及王行則州執而前驅賔客往來則候人荷而趨説文秦書有殳書徐鍇曰殳體八觚隨其勢而書之酋矛夷矛厹矛廬人酋矛常有四尺夷矛三尋凡為酋矛三分其長二在前一在後而圍之五分其圍去一以為晉圍三分其晉圍去一以為刺圍説文曰矛象形然則自考工言之則為刺兵自説文言之則為勾兵蓋矛之為器上鋭而旁勾上鋭所以象物生之芒旁勾所以象物生之勾酋言其就夷言其易短者其體就長者其體易此矛之辨也詩曰二矛重喬又曰二矛重弓朱英緑縢毛氏曰重英矛有英飾也重喬纍荷也鄭氏曰二矛酋矛夷矛也各有畫飾喬矛矜在上及室題所以縣毛羽又二矛重弓備折壞也孔穎逹曰矜謂矛柄也室謂矛之銎二毛於其上頭縣毛羽以題識之如重纍相負荷言矛有毛羽鄭氏以時事言之猶今之鵝毛矟也則矛之飾以朱而矜室之間飾以羽毛矣鄭氏曰矛戟柄竹欑柲則矛之柄亦以竹矣然詩厹矛鋈鐓記曰進矛戟者前其鐓鄭氏曰鋭底曰鐏乎底曰鐓爾雅曰厹矛三隅書曰二人執惠一人執鋭孔安國曰惠三隅矛鋭矛屬説文曰鋌小矛也風俗通曰矛長八尺謂之矟則矛之制固不一矣戈考工記四分其金而錫居一謂之戈戟之齊戈柲六尺有六寸車戟常戈廣二寸內倍之胡三之援四之已倨則不及已勾則不決長內則折前短內則不疾是故倨勾外博重三鋝又曰勾兵欲無彈又曰勾兵椑椑隋圜也記曰進戈者前其鐏蓋胡則曲而下垂者也援則直而上達者也內則戈柲所以受胡者也鋝則六兩三分兩之二也倍之四寸三之六寸四之八寸則其長也已倨已勾長內短內則其病也明乎倨勾外博然後可以為戈明乎稗而無彈而後可以為戈祕書曰執戈上刃則戈之刃與胡同嚮矣然戈勾兵也或謂之雞鳴或謂之擁頸皆指其胡名之也禮書卷一百十五
