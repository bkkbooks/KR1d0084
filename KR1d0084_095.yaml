body:
  text: 禮書卷九十六宋陳祥道撰卣書曰秬鬯二卣詩與左傳曰秬鬯一卣爾雅曰彛卣罍器也又曰卣中尊郭氏曰不大不小葢卣盛鬯之器也古者人臣受鬯以卣不以彛則鬯之未祼也實卣則將祼則實彛矣周禮鬯人廟用修者謂始禘時自饋食始修漆尊也修讀曰卣卣中尊謂獻尊之屬尊者彛為上罍為下然卣盛鬯而獻尊之屬盛齊酒則卣與獻象異矣其飾或漆或畫不可考也祀天犧象幂人疏布巾幂八尊畫布巾幂六彛禮記曰犧尊疏布鼏樿杓以素為貴又曰器用陶匏以象天地之性孔頴達謂祭天地以瓦為尊畫犧於上或曰夏商禮然明堂位曰犧象周尊也非夏商尊其以瓦為之畫犧於上理或然也山罍金罍金飾龜目大罍周禮鬯人凡祭祀社壝用大罍大罍瓦罍司尊彛春祠夏禴其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬烝其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也諸臣獻者酌罍以自酢不敢與王之神靈共尊大尊太古之瓦尊山尊山罍也亦刻而畫之為山雲之形詩曰我姑酌彼金罍毛氏曰人君黄金罍又曰泂酌彼行潦挹彼注兹可以濯罍又曰缾之罄矣維罍之恥禮記曰廟堂之上罍尊在酌犧尊在西君西酌犧象夫人東酌罍尊又曰山罍夏后氏之尊也儀禮燕大射設洗于阼階東南罍水在東孔頴達曰韓詩説金罍大夫器也天子以玉諸侯大夫皆以金士以梓毛詩説金罍酒器也諸臣之所昨人君以黄金飾尊大一碩金飾龜目葢刻為雲罍之象謹案韓詩説天子以玉經無明文謂之罍者取象雲雷博施如人君不及諸臣韓詩説士以梓士無飾言其木體則以上同用梓而加飾耳毛詩説黄金罍謂天子也周南王者之風故皆以天子之事言焉爾雅曰彛卣罍器也小罍謂之坎説文曰罍龜目尊以木為之郭璞曰罍形似壺大者受一斛司尊彛犧象之尊王與后之所獻罍諸臣之所昨則罍賤於尊矣先儒曰彛上尊罍下尊記曰五獻之尊門内壺君尊瓦甒燕禮君尊瓦大卿大夫士旅以壺大射膳尊兩甒卿大夫士旅亦以壺士喪奠以兩甒而祭以壺則壺賤於瓦尊矣有汙尊鑿土為尊然後有瓦大有瓦大然後有山罍罍或作櫑許慎曰罍龜目尊以木為之則罍非特以瓦也詩曰我姑酌彼金罍毛氏謂人君黄金罍孔頴達謂金飾龜目葢刻為雲雷之象周南王者之風則黄金罍為天子也於理或然韓詩謂天子罍以玉大夫以金士以梓此不可考罍之别有五山罍金罍大罍小罍水罍也周禮鬯人祭祀社壝用大罍則盛鬯者也儀禮罍水在洗東則盛水者也然則罍之為器豈施於一哉周禮天子禮諸侯如諸侯之相為賔春秋之時齊侯將享魯侯孔子曰犧象不出門則諸侯相饗用犧象矣燕禮君尊瓦大卿大夫壺大射膳尊瓦甒卿大夫壺則諸侯燕臣用壺矣昔周王燕晉荀躒樽以魯壺則天子燕諸侯之臣亦以壺也詩言我姑酌彼金罍其饗臣之禮歟禮器五獻之尊門内壺君尊瓦甒鄭氏曰壺大一石瓦甒五斗觀喪大禮棺槨之間大夫容壺士容甒則壺大於甒可知矣漢梁孝王有罍樽直千金後世寶之其制葢侈於古也禮書卷九十六
