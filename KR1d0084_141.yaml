body:
  text: 禮書卷一百四十二宋陳祥道撰輹易曰壯于大輿之輹又曰輿説輹左氏曰車説其輹説文曰輹軸縳也或者以為伏兔然兔謂之轐非輹也易於輿説輹言中無尤左傳於車説輹言不利行師然輻不能行也説輹不行而已非不能行也左氏斷章取義猶禮記以不耕穫不菑畬為凶荀卿以括囊無咎無譽為腐儒輿較軾轛軫説文曰較車軨前横木轛横軨也轖音嗇車籍交錯也軨車轖横木也軨或作䡼禮記曰君車已駕僕展軨或曰軨車欄也或曰軨轄頭轊也然僕之展軨非特轊耳鄭司農鄭康成皆以幦為覆苓則二鄭亦以苓為欄也軫輢軹造車始於輿而車制始於輿廣故詩以權輿為始輿人之法皆以車廣起度車廣六尺六寸三分車廣去一以為隧則輿深四尺四寸矣三分其隧一在前二在後以揉其式則式深一尺四寸三分寸之二矣以其廣之半為之式崇則式三尺三寸矣以其隧之半為之較崇則較出於式二尺二寸矣軫圍尺一寸式圍七寸三分寸之一較圍四寸九分寸之八軹圍三寸二十七分寸之七轛圍二寸八十一分寸之十四其數廣狹大小崇庳皆起於輿廣此輿人所以以輿名車而兼數材也車制輿在下輢在兩相式在前軨在後較則輢上出式者也説文車輢上曲銅軹則衡植於輢者也轛則衡植於式者也式必曲為之所謂揉其式是也較有重之者所謂猗重較兮是也孔穎逹曰重較侯伯之車賈公彦曰天子與其臣乗重較之車諸侯之車不重禮無明文故二説不同也較後世亦謂之平鬲輢後世亦謂之輒説文輒車兩輢也兵車之行五兵皆建於輢葢以䥫圍範邪置於輢之上下乃植而建之則出先刃入後刃此所謂既建而迆迆邪倚也軓大馭軷祭䡄少儀祭范考工記曰䡄前十尺而䇿半之古書作􅓶則軓范一也鄭康成曰䡄法也謂輿下三面之材輢式之所植持車正也鄭司農曰䡄式前也葢三面之材輢式之所植而其面出於式前矣杜子春亦曰􅓶謂車軾前任正輈人任正者十分其輈之長以其一為之圍衡任者五分其長以其一為之圍則任正者輿下三面材也衡任者兩軛間之材也輈長丈四尺十分其輈之長以其一為任正之圍則任正之圍八尺四寸五分寸之二矣五分其輈之長以其一為衡任之圍則衡任之圍一尺五分寸之一矣禮書卷一百四十二
