body:
  text: 禮書卷六十六宋陳祥道撰昏禮婦見舅姑禮士昏禮夙興婦沐浴纚笄宵衣以俟見質眀贊見婦于舅姑席于阼舅即席席于房外南面姑即席婦執笄棗栗自門入升自西階進拜奠于席舅坐撫之興答拜婦還又拜降階受笲腶修升進北面拜奠于席姑坐舉以興拜授人記曰笲緇被纁裏加于橋舅答拜宰徹笲雜記曰婦見舅姑兄弟姑姊妹皆立于堂下西面北上是見己見諸父各就其寢然則婦於嫁夕次純衣纁袡厥眀則纚笲宵衣以見舅姑者以盛飾可以施於嫁夕不可施於厥眀也棗栗腵修贄也見舅以棗栗見姑以腵修者以棗栗者天所産腵修人所成也棗栗進於舅而舅拜之腵修進姑而姑拜之以禮無不答猶冠禮母拜也燕禮君答臣祭禮尸答主人也見必立於堂下而拜必于階上者立於堂下婦之所以尊尊也拜於階上姑舅所以親親也若舅姑沒則有奠菜之禮焉後漢晉魏以來有拜時三日之婦張華曰拜時之婦盡恭於舅姑三日之婦成吉於夫氏準於古義可以成婦江應元等曰未廟見之婦死則反葬女氏之黨以此推之貴其成婦不係成妻眀拜舅姑為重節夫為輕所以然者陳針子曰先配而後祖是不為夫婦誣其祖矣非禮也此春秋眀義拜時重於三日之證也醴婦饗婦禮冠必醴子昏必醴女以至主人醴賓舅姑醴婦皆致其誠敬而示以質也醴婦必席于戶牖間其酌以觶其薦以脯醢其禮有祭而拜送拜答則贊者而巳若夫饗婦則不然故舅洗在庭姑洗在北堂則所與行禮者舅姑也然則醴與饗必於戶牖間猶冠者之醮於客位也婦降自阼階猶冠者之冠于阼也庶婦則使人醮之猶庶子之冠不醴也舅姑饗送者昏禮舅饗送者以一獻之禮酬以束錦姑饗婦人送者酬以束錦若異邦則贈丈夫送者以束錦鄭氏曰丈夫送者女家有司也婦人送者隸子弟之妻妾也凡饗速之蓋嫁女之禮父送不下堂母送不出門則其送者非尊者也春秋之時齊侯送姜氏左氏譏之曰非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之然則士使有司送之可知也古者大夫束修之問不出境聘弓鍭矢不行國中故大夫無外娶欲一致於其君而不外交也春秋之時紀履繻莒慶齊高固娶于魯公子圍娶于鄭襄仲娶于莒蓋不知此公羊曰大夫越境逆女非禮也若士卑不嫌故有異邦送者媵姪娣易歸妹曰其君之袂不如其娣之袂良詩江有汜曰有嫡不以其媵備數媵遇勞而無怨韓奕曰諸娣從之祁祁如雲春秋莊十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟成八年衛人來媵九年晉人來媵十年齊人來媵公羊曰公子結媵陳人之婦于鄄遂及齊侯宋公盟媵者何諸侯娶一國則二國往媵之以姪娣從從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶晉人來媵録伯姬也齊人來媵録伯姬也三國來媵非禮也曷為皆以録伯姬之辭言之婦人以衆多為侈也穀梁曰衛人來媵媵淺事也不志此其志何也以伯姬之不得其所故盡其事也何休曰禮適夫人無子立右媵右媵無子立左媵左媵無子立嫡姪娣嫡姪娣無子立右媵姪娣右媵姪娣無子立左媵姪娣質家親親先立娣文家尊尊先立姪左氏曰衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否杜預曰古者諸侯取適夫人及左右媵各有姪娣皆同姓之國國三人昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天子之內治周禮天官序官有九嬪世婦女御曲禮天子有后有夫人有世婦有嬪有妻有妾公侯有夫人有世婦有妻有妾又曰國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾檀弓曰舜葬於蒼梧之野蓋三妃未之從也鄭氏曰帝嚳立四妃象后妃四星其一眀者為正妃其三小者為次妃帝堯因焉至舜不告而娶不立正妃但三夫人而已夏后氏增以三三而九為十二人商人又增以三九二十七合三十九人周人上法帝嚳立正妃又三二十七為八十一人以增之合百二十一人毛氏釋衛詩曰古者后夫人必有女史彤管之法后妃羣妾以禮御於君所女史書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之著于左手既御著于右手周禮九嬪以時序于王所鄭氏曰羣妃御見之法卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕后當一夕亦十五日而遍云自望後反之論語曰管氏有三歸古者天子有后有夫人有嬪有世婦有妻有妾諸侯有夫人有世婦有妻有妾天子自御妻而上其數百二十有一諸侯夫人而下其數不可考也諸侯娶一國二國媵之國三人則夫人與二媵各有姪娣凡九女而天子國媵之數不可考也孔子譏管仲三歸之不儉而不以為不知禮則大夫一娶三女矣士昏禮女從者畢袗𤣥鄭氏曰從者謂姪娣然則士亦有姪娣也春秋之時衛人齊人晉人來媵伯姬譏三國媵之也左氏曰諸侯嫁女同姓媵之異姓則否然國語曰王御不參一族是丘眀前後自惑也趙氏曰媵不異姓則莒姓已邾姓曹此二國姓至少如嫁女孰為媵乎恐此禮難行今則不取致女曲禮曰納女於天子曰備百姓於國君曰備酒漿於大夫曰備掃灑鄭氏曰納女猶致女不親迎則女之家遣人致之此其辭也春秋晉韓宣子叔向如楚送女左氏曰上卿及上大夫致之魯季孫行父如宋致女其辭蓋亦如曲禮云爾還車之禮士昏禮主人爵辨纁裳從車二乘婦車亦如之谷風詩曰以爾車來以我賄遷鵲巢詩曰百兩御之百兩將之何彼穠矣詩曰衣服不繫其夫下王后一等鄭氏謂士妻之車夫家共之大夫以上嫁女則自以車送之然諸侯夫人百兩御之則特有送之之車而已送車繼又乘之以歸故泉水詩有還車言邁之嘆鄭氏曰還車者嫁時乘來今思乘以歸春秋之時齊高固子叔姬有反馬之禮此皆古之遺制也昏姻之時周禮媒氏令男三十而娶女二十而嫁二三者天地相承覆之數易曰三天兩地而倚數焉禮記內則曰男三十而有室始理男事女十有五年而笄二十而嫁有故二十三年而嫁家語曰男子二十而冠有為人父之端女子十五許嫁有適人之道於此而往則自昏矣楊氏曰元氣起於子人之所生也男從子左行三十女從子右行二十俱至於巳古者男三十而娶女二十而嫁法於此也越語女十七不嫁丈夫二十不娶父母有罪周禮媒氏仲春之月令㑹男女之無夫家者詩曰士如歸妻逮冰未泮家語曰霜降而婦功成嫁女者行焉冰泮農業起昏禮殺於此孫卿曰霜降送女冰泮殺內毛氏釋東門之楊曰不逮秋冬鄭氏曰女春盛而不嫁至夏則衰禮曰男子三十而娶非必三十也以謂三十不娶則非也女二十而嫁非必二十也以為二十不嫁則非也故家語曰男二十而冠有為人父之端女子十五許嫁有適人之道於此而往則自昏矣譙周亦曰男自二十以及三十女自十五以至二十皆得以嫁娶其說是也若夫嫁娶之時則詩言逮冰未泮而家語荀卿皆以冰泮為期則仲春之月㑹男女而無夫家者蓋昏禮殺於正月至仲春則極矣毛鄭釋詩或期以秋冬或期以仲春皆指一端言之也禮書卷六十六
