body:
  text: 禮書卷一百二宋陳祥道撰鑊錡釡鍑周禮亨人共鼎鑊以給水火之齊小宗伯祭之日逆齎省鑊小司冦禋祀五帝實鑊水士師祀五帝洎鑊水少牢饔人陳三鼎在羊鑊之西二鼎在豕鑊之西詩傳曰有足曰錡無足曰釡又曰鬲釡屬説文曰江淮之間謂釡曰錡又曰鑊鐫也鍑釡大口者又曰朝鮮謂釡曰錪鬵大釡也一曰鼎上大下小若甑曰鬵爾雅曰疑足謂之鬲蓋鑊也鐫也釡也鬵也錡也鬲也錪也鍑也皆烹飪之器也錡有足者也鬲空足者也鬵大釡也鍑釡口大者也詩以錡釡湘菜以釡鬵烹魚周禮儀禮以鑊烹牲則鑊又大于釡矣鬲考工記陶人鬲實五觳厚半寸脣寸爾雅窽足謂之鬲郭璞曰鼎曲腳也然先儒皆以􅑆為空太史自序曰實中其聲者謂之端實不中其聲者謂之􅑆則􅑆非曲也喪禮有重鬲蓋亦取名於鼎鬲歟甗鄭司農曰甗無底甑鄭康成曰如甑一孔甑匕穿考工記陶人為甗實二釜厚半寸脣寸盆實二釜厚半寸脣寸甑實二釜厚半寸脣寸匕穿少牢禮雍人溉鼎匕廪人溉甑甗爾雅甑謂之鬵鬵鉹也孫炎曰關東謂甑為鬵涼州謂甑為鉹方言曰自關而東或謂之甗或謂之鬵或謂之酢餾甗陶器也春秋之時齊有玉甗則其所以實者也鬵大釡也毛氏許慎以鬵為釡屬而爾雅方言以鬵為甑則其名同者也考工記豆實三而成觳則觳之所容斗二升矣庾實二觳則二斗四升也聘禮十六斗曰庾申豐曰粟五十庾杜預亦曰庾十六斗昭二十六年左則庾固有大小者也鄭司農曰甗無底甑鄭康成釋儀禮曰甗如甑一孔蓋無底則一孔而已實菹醢者豆而量容四升亦曰豆容六升謂之庾而容二斗四升亦謂之庾有臀謂之釡而無足亦謂之釡則釡屬謂之鬵甑亦謂鬵可也謂鼎上大下小若甑曰鬵則鬵非特名甑而已黍匕挑匕疏匕桑匕雜記云朼以桑長三尺或曰五尺易曰不喪匕鬯詩曰有救棘匕特牲禮棘心匕刻少牢饋食禮雍人溉鼎匕俎于雍㸑廪人溉甑甗匕與敦于廪㸑有司徹司馬以二手執挑匕枋以挹湆注于疏匕若是者三又云雍正雍府加匕于鼎東枋雍人覆二疏匕于俎上蓋匕之別有四有黍稷之匕有牲體之匕有疏匕有喪匕三匕以棘喪匕以桑廪人之所溉黍稷之匕也雍人之所溉牲體之匕也牲體之匕挑匕也其制則黍稷之匕小于挑匕挑匕小于疏何則敦之量不過三豆而髙不過一尺則黍稷之匕小矣挹之以挑匕然後注于疏匕者三則疏匕大矣詩于角弓兕觥皆言其觩于天畢與匕皆言有救則匕之制非挺然也儀禮或作朼或作匕所謂執匕溉匕取匕加匕覆匕自匕言之也所謂朼魚朼者乃朼長朼卒朼自用匕言之也特牲少牢有司徹公食昏禮舉鼎執匕俎皆異其人士喪禮執匕執俎皆舉鼎者為之吉禮尚文喪禮尚略故也特牲右人于鼎北匕肉左人于鼎西載諸俎士虞禮則右人載者以吉禮尚右喪禮尚左故也禮書卷一百二
