body:
  text: 禮書卷六宋陳祥道撰皮辨縫中貫玉以為飾其衣用布十五升而裳素積司服視朝則皮辨服視朝視內外朝之事皮辨之服十五升白布衣積素以為裳王受諸侯朝覲於廟則衮冕辨師王之皮辨會五采玉璂象邸玉笄故書會作䯤鄭司農云讀如馬會之會謂以五采束髮也玄謂會讀如大會之會會縫中也璂讀如薄借綦之綦綦結也皮辨之縫中每貫結五采玉十二以為飾謂之綦詩云會辨如星又曰其辨伊綦是也邸下柢也以象骨為之諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令韋辨皮辨則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉三采掌皮掌秋斂皮冬斂革春獻之遂以式法頒皮革于百工士冠禮皮辨服素積緇帶素韠此為君視朔之服也皮辨者以白鹿皮為冠象上古也積猶辟也以素為裳辟蹙其要中皮辨之衣用布亦十五升其色象焉皮辨笄爵辨笄緇組紘纁邊同篋賔受皮辨右執項左執前進周辨殷冔夏收辨名出於槃大也言所以自光大也三王共皮辨素積質不變聘禮賔皮辨聘服皮辨者朝聘主相尊敬也諸侯視朝皮辨服公側受宰玉裼降立玉藻曰裘之裼也見美也又曰麛裘青犴褎絞衣以裼之論語曰素衣麛裘皮辨時或素衣其裘同可知也君使卿韋辨歸饔餼五牢變皮辨服韋辨敬也韋辨韎韋之辨兵服也而服之者皮辨同類取相近耳其服蓋韎布以為衣而素裳君使卿皮辨還玉于館玉圭也君子於玉比德焉以之聘重德也還之者德不可取於人相切厲之義也覲禮至於郊王使人皮辨用璧勞侯氏亦皮辨迎于帷門之外再拜士喪禮陳襲事于房中爵辨服純衣皮辨服詩淇澳曰會辨如星皮辨所以會髮箋云會謂辨之縫中飾之以玉皪皪而處狀似星也天子之朝服皮辨以日視朝鳲鳩其辨伊騏箋云騏當作􅋒以玉為之頍辨有頍者辨實維伊何箋云禮天子諸侯朝服以宴天子之朝皮辨以日視朝賔之初筵側辨之俄屢舞傞傞禮記檀弓周人辨而葬商人冔而葬曽子問諸侯相見皮辨禮運冕辨兵革藏於私家非禮也郊特牲祭之日王皮辨以聽祭報示民嚴上也皮辨素服而祭素服以送終也玉藻天子皮辨以日視朝遂以食三王共皮辨素積諸侯皮辨以聽朔於太廟皮辨下天子也君衣狐白裘錦衣以裼之天子狐白之上衣皮辨服與明堂位朱干玉戚冕而舞大武皮辨素積裼而舞大夏小記諸侯弔必皮辨錫衰學記大學始教皮辨祭菜示敬道也皮辨天子之朝服也祭菜禮先聖先師雜記大夫卜宅與葬曰有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮辨有司占人也麻衣白布深衣而著衰焉及布帶緇布冠此服非純吉亦非純凶皮辨則純吉之尤者也子羔之襲也皮辨一爵辨一孔子曰尸辨冕而出卿大夫士皆下之祭義君皮辨素積朔月月半君巡牲古者天子諸侯必有公桑蠶室大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入于蠶室書曰王與大夫盡辨以啓金縢之書四人綦辨執戈上刃夾兩階戺綦文鹿子皮辨亦士後漢輿服志委貌冠皮辨冠同制長七寸髙四寸制如覆柸前髙廣後卑鋭所謂夏之母追商之章甫者也委貌以皂絹為之皮辨以鹿皮為之行大射禮於辟雍公卿諸侯大夫行禮者冠委貌衣玄端素裳執事者冠皮辨衣緇麻衣皂領袖下素裳所謂皮辨素積者周禮辨師王之皮辨會五采玉璂象邸玉笄諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之儀禮士冠爵辨服纁裳純衣緇帶皮辨笄爵辨笄緇組紘纁邊同篋賓受皮辨右執項左執前鄭康成曰皮辨者以白鹿皮為之蓋皮辨存毛順物性而制之文質具焉韋辨去毛違物性而又染之文而已凡在下者為是基可以託宿者為邸玉璂則縫中貫玉而施於下者也象邸則下柢用象而託以皮者也爾雅邸謂之柢賈公彥曰邸下柢也謂於辨內項上以象骨為柢然謂之柢不特施於項上魏臺訪議曰邸以象骨周緣辨下根柢然則魏武所作辨抵或古之遺制歟諸侯及孤卿大夫之韋辨皮辨各以其等為之鄭康成曰侯伯璂飾七子男璂飾五玉亦三采孤璂飾四三命之卿璂飾三再命大夫璂飾二玉亦二采於理或然推此則公之玉九天子之五十有二又可知也詩曰會辨如星言其玉也説文引詩䯤辨如星謂骨擲之可會髮者此不可據又曰其辨伊騏書曰綦辨執戈言其文也毛氏曰騏文也孔安國曰綦文鹿子皮説文綦蒼艾色蓋綦者隂陽之雜故禮以綦組纓為士之齋冠綦組綬為世子佩詩以綦巾為女巾皆其未成德者之服也則士辨以綦宜矣辨師言卿大夫之冕辨各以其等為之則士辨無玉飾康成讀玉璂為綦以綦為結是臆説也記曰三王共皮辨素積語曰素衣麑裘則素衣其衣也素積其裳也士冠禮皮辨素積緇帶禮記雜帶君朱緑大夫玄華士緇辟則士之皮辨緇帶與君大夫皮辨之帶異矣士冠禮皮辨笄爵辨笄緇組紘纁邊辨師王朱紘禮記天子朱紘諸侯青紘則士皮辨緇組紘與天子諸侯皮辨之紘亦異矣蓋皮辨天子以視朝以宴詩曰側辨之俄以聽祭報以舞大夏諸侯以聽朔以巡牲以卜夫人世婦以迎王之郊勞以待聘賔卿大夫以王命勞侯氏以聘於鄰國以卜宅士以冠學士以釋菜凡大夫士之朔月皆皮辨服則皮辨之所施者衆矣蓋人為者多變自然者不易皮辨因其自然而已此所以三王共皮辨素積而周天子至士共用之也然喪服小記諸侯弔必皮辨錫衰郊特牲大蠟皮辨素服葛帶榛杖以送終則辨雖與吉禮同而服與吉服不同韋辨爵辨鄭云冕之次也其色赤而微黑如爵頭然用三十升布為之亦長尺六寸廣八寸前圓後方無旒而前後平周禮司服凡兵事韋辨服韋辨以韎韋為辨又以為衣裳春秋傳曰晉郤至衣韎韋之跗注是也今時五伯緹衣古兵服之遺色辨師諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令韋辨皮辨則諸侯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采聘禮君使卿韋辨歸饔餼變皮辨服韋辨敬也其服蓋韎布以為衣而素裳夕夫人使下大夫韋辨歸禮荀子曰士韋辨士冠禮爵辨服纁裳純衣緇帶韎韐此君與祭之服雜記曰士辨而祭於公爵辨者冕之次其色赤而微黑如爵頭然或謂之緅其布三十升皮辨笄爵辨笄緇組紘纁邊同篋爵辨皮辨緇布冠各一匴昏禮主人爵辨纁裳緇袘書曰二人雀辨執惠立于畢門之內爵韋辨禮記檀弓天子之哭諸侯也爵辨絰䊷衣雜記大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已辨爵辨也冠玄冠也祭於公助君祭也大夫爵辨而祭于已唯孤爾士辨而親迎然則士辨而祭於已可也子羔之襲也皮辨一爵辨一公襲爵辨二成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣喪大記復士以爵辨後漢輿服志爵辨一名冕廣八寸長尺二寸如爵形前小後大繒其上似爵頭色有收特笄所謂夏收商冔者也辨師諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之司服凡兵事韋辨服聘禮君使卿韋辨歸饔餼鄭氏釋周禮謂以韎韋為衣裳春秋傳曰晉郤至衣韎韋之跗注是也釋聘禮謂韎布以為衣而素裳既曰韎韋為衣又曰韎布為衣既曰韎韋為裳又曰素裳蓋以軍國之容不同故也然賈服之徒謂韎韋之跗注者袴屬於足跗也袴屬於足跗則非衣也詩於兵服曰制彼裳衣與子同袍與子同裳載是常服春秋傳曰袀服振振則兵事上下同服矣詳不可知也或曰周禮有韋辨無爵辨書與冠禮禮記有爵辨無韋辨士之服止於爵辨而荀卿曰士韋辨孔安國曰雀韋辨也劉熙釋名亦曰以爵韋為之謂之韋辨則爵辨即韋辨耳觀辨師司服韋辨先於皮辨書雀辨先於綦辨孔安國曰綦辨皮辨也士冠禮次加皮辨三加爵辨而以爵辨為尊聘禮主卿贊禮服皮辨及歸饔餼服韋辨而以韋為敬則皮辨之上非韋辨則爵辨耳此所以疑其為一物也爵辨士之祭服而王服之者王哭諸侯服爵辨而即戎服之辨士冠禮爵辨服纁裳純衣緇帶昏禮主人爵辨纁裳緇袘檀弓天子哭諸侯爵辨䊷衣書二人雀辨執惠立于畢門之內雜記復諸侯以褎衣冕服爵辨服子羔之襲皮辨一爵辨一玄冕一釁廟祝宗人宰夫雍人皆爵辨純衣則爵辨雖士之祭服而天子諸侯大夫皆服之鄭氏謂爵辨冕之次制如冕但無繅耳其布三十升然古文辨象形則其制上鋭若合手然非如冕也韋其質也爵其色也其笄紘玉飾各以其等為之如皮辨制鄭氏釋士冠禮謂爵辨赤而微黑如爵頭然則赤多黑少矣釋巾車又曰雀飾黑多赤少然雀之色固赤多而黑少鄭氏為之二説是自惑也其言韋辨赤亦無據裳裳有纁有素黃有玄有雜纁裳緇袘明衣之裳縓緣其餘推此可知易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤詩緑衣曰緑衣黃裳終南曰君子至止黻衣繡裳七月曰八月載績載玄載黃我朱孔陽為公子裳祭服玄衣纁裳九罭曰我覯之子衮衣繡裳東山曰制彼裳衣勿士行枚裳衣兵服也曲禮童子不衣裘裳大夫士去國素衣素裳玉藻曰衣正色裳間色特牲曰三王共皮辨素積以素為裳辟蹙其要中書曰王麻冕黼裳卿士邦君麻冕蟻裳太保太史太宗皆麻冕彤裳蟻色玄彤纁也士冠禮主人玄冠朝服玄冠委貌也朝服者十五升布衣而素裳也衣不言色者與冠同也爵辨服纁裳純衣皮辨服素積玄端玄裳黃裳雜裳可也玄端即朝服之衣易其裳耳上士玄裳中士黃裳下士雜裳者前玄後黃易曰夫玄黃者天地之雜也天玄而地黃昏禮主人爵辨纁裳緇袘袘緣也特牲饋食禮及筮日主人冠端玄特牲記其服皆朝服玄冠緇帶緇韠唯尸祝佐食玄端玄裳黃裳雜裳可也皆爵韠喪服凡衰外削幅裳內削幅幅三袧袧者謂辟兩側空中央也祭服朝服辟積無數凡裳前三幅後四幅也若齊裳內衰外齊緝也凡五服之衰一斬四緝緝裳者內展之緝衰者外展之爾雅曰裳削幅謂之襆削殺其幅深衣之裳明衣裳見明衣門深衣裳見深衣門深衣之裳十有二幅短母見膚長母被土喪服裳內削幅幅三袧士喪記明衣有前後裳不辟長及觳鄭氏曰袧者辟兩側空中央也祭服朝服辟積無數凡裳前三幅後四幅賈公彥曰前為陽後為隂前三後四象隂陽也然則明衣裳不辟喪裳三袧則吉裳不特三袧而已明衣長及觳則凡裳不特及觳而已明衣有前後裳則凡裳前三後四以象隂陽可知也明衣裳縓綼緆緇純士昏禮爵辨纁裳緇袘曲禮素衣素裳素冠徹緣則凡裳有緣可知也玉藻曰衣正色裳間色然冕服玄衣纁裳皮辨服素衣素裳諸侯朝服緇衣素裳士爵辨服緇衣纁裳玄端服有玄裳黃裳雜裳玄端服惟三裳而已士昏禮使者玄端鄭氏曰有司緇裳無據深衣長衣裳之色同三翟三衣亦衣裳之色同緇衣非正色也黃素之裳非間色也蓋衣之玄緇所以象天道裳之黃所以象地德素隂之正也亦可以為裳纁陽之間也不可以為衣是衣之色常尊裳之色常卑非必衣色皆正裳色皆間也記且云爾者豈非以玄為天之正色纁非地之正色乎書言王麻冕黼裳卿士邦君皆麻冕蟻裳太保太史太宗皆麻冕彤裳孔安國曰蟻裳玄彤裳纁詩曰毳衣如璊又曰載玄載黃我朱孔陽為公子裳蓋裳以纁為主纁赤黃色以土無正位必託於火故也若夫玄裳素裳之類各象其事而服之孔頴達曰書之卿士邦君非執事者也故玄裳太保太史太宗執事者也故彤裳其説是也爾雅曰裳削幅謂之襆郭氏曰削殺其幅深衣之裳然喪服裳亦削幅其不削幅者帷裳而已孔子曰非帷裳必殺之詩曰斬車帷裳雜記曰緇布裳帷則車與捾之飾音曰帷裳孰謂深衣之裳乃削幅耶禮書卷六
