body:
  text: 禮書卷一百十四宋陳祥道撰投壺投壺之籌曰矢勝算則以馬贊其禮則以司射實其算則以射中弦其詩則以射節之貍首鼓其節則以射鼓之半而釋算數算勝飲不勝皆與射禮相類則投壺亦兵象也蓋兵凶戰危人情之所惡飲酒相樂人情之所欲先王因其所欲而寓其所惡者於其中使樂為之不憚則平日之所習乃異日之所用也昔晉侯與齊侯宴投壺祭遵臨戎雅歌投壺然則投壺之樂豈間於貴賤軍國之間乎其用鹿中者投壺輕於射禮故用中之下禮而已鄭氏謂鹿中者大夫士之禮是以射禮言投壺也恐不必然主人請投賔固辭主人授矢拜送賔拜受矢之儀禮記曰投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢哨壺請以樂賔賔曰子有旨酒嘉肴某既賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賔曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賓曰某固辭不得命敢不敬從賓再拜受主人般還曰辟主人阼階之上拜送賓般還曰辟拜送送矢也辟亦於其階上已拜受矢進即兩楹間退及位揖賔就筵蓋古者諸侯之射必先行燕禮鄉大夫之射必先行鄉飲酒之禮投壺射之類必先行燕飲焉此賓所以辭曰子有旨酒嘉肴某既賜矣又重以樂也主人位於阼階之上然後奉矢三請於兩楹之間既受則退而拜送既拜送自受矢既受矢則進而示有事又退而揖賓就筵則主人再即楹間而再復位矣賓位於西階之上再辭乃從然後受矢於兩楹之間退而拜於其位則賓一即楹間而一復位矣樂人及使者童子皆屬主黨司射庭長及冠士立者皆屬賓黨蓋主人以仁接賓則樂人樂賓者也使者及童子事人者也故屬主黨司射作人者也鄉射禮司射作三耦射庭長正人者也鄉飲酒將旅使相為司正在庭中立於觶南故知長司正也冠士行禮者也立者觀禮者也故屬賓黨壺以授矢致樂者也故主黨執之中以盛算取勝者也故賓黨奉之然黨雖有賓主之辨而主黨之樂人必位於西階之上使人執壺亦立於司射之側凡皆所以就賓也鄉射司射升自西階西面北上北面告於賔鄉射鄉飲拜受爵送爵皆北面然則司射奉中賔主拜送矢受矢皆北面可知也司射執矢奉中北面則使人執壺亦北面可知也鄉射射在脫屨升坐之前燕禮射在脫屨升坐之後燕禮取爼以出卿大夫皆降賔反入反卿大夫皆脫屨升就席乃告射則大司正為司射矣投壺所以樂賓也類於燕禮故鄭氏謂燕飲酒既脫屨升坐主人乃請投壺也矢枉則不直壺哨則不正大戴哨作峭然則小戴作哨誤矣設壺釋矢之儀數算立馬之儀投壺曰司射進度壺間以二矢半反位設中東面執八算興請賔曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之命弦者曰請奏貍首間若一大師曰諾左右告矢具請拾投有入者則司射坐而釋一算焉賔黨於右主黨於左卒投司射執算曰左右卒投請數二算為純一純以取一算為竒遂以竒算告曰某賢於某若干純竒則曰竒鈞則曰左右鈞司射奉中於西階上乃進度壺於簷前蓋於是時受壺於使人而進焉然則使人執壺在司射之西矣射之中南當楅西當西序東靣司射反西階之位而設中則投壺之中亦東面矣投矢之禮以本入為順末中為逆故曰順投為入拾投取勝然後可數比投自樂不足為工故比投不釋算射禮主人為下射賓為上射釋算上射於右下射於左投壺之釋算亦如之則賓黨為上投主黨為下投矣射禮之數右獲一純以取實於左手十純則縮而變之每委異之有餘則畫諸純下一算為竒竒則縮諸純下然後兼斂左算實于右手一純以委十則異之其他如右獲投壺之數算亦如之然則賔黨之算自地數之以實於手主黨之算自手數之以委於地矣觥角觥射禮既數獲司射適堂西命弟子設豐弟子奉豐升設于西楹之西乃降勝者之弟子洗觶升酌南面坐奠于豐上勝者皆襜決遂執張弓不勝者皆襲説決拾郤袒左手右加弛弓于其上遂以執弣司射作升飲者勝者先升堂少右不勝者進北靣坐取豐之上觶興少退立卒觶進坐奠于豐下興揖先降投壺禮命酌曰請行觴酌者曰諾此與弟子洗觶升酌者類也當飲者皆跪奉觴此與不勝者取觶少退立卒觶者類也獻之屬莫重於祼不勝者曰賜灌所以重勝者之禮已也酒所以養老與病勝者跪曰敬養所以矜不勝者之養於已也然則使酌者行觴特賔主黨之禮而已少儀曰侍投則擁矢勝則洗而以請客亦如之則卑者之於尊長主人之於客必親洗而酌焉此使酌者異矣侍投之禮罰不以角則凡投以角不以觶矣以角不以觶則無用豐為鄭氏曰酌奠于豐於經無見馬投壺飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬又曰馬各直其算蓋射禮三耦而已投壺之禮賔主亦三而已每一勝則立一馬故三勝者立三馬然一黨不必皆三勝或主黨一勝賔黨再勝則以一勝之馬從二馬以明一勝不足以為功三勝足以兼人也馬各直其算則立於中之西算之東矣多馬有慶則偶必親酌矣鄭氏曰飲慶爵者偶親無豐以謂勝者不親爵而使弟子酌者不親受而奠于豐所以賤無能也慶賢者則不然是以偶親酌而無豐然投壺之罰有豐此特鄭氏惑於射禮而言然也漢人格五之法有功馬散馬皆刻馬象而植焉鄭氏釋周禮火弊獻禽謂旌弊爭禽而不審者罰以假馬投壺之馬蓋亦如此少儀曰侍投則擁矢勝則洗而以請客亦如之不角不擢馬蓋洗則勝而以遺尊長與客其禮同不角不擢馬特施於尊長而已客不與焉鄭氏亦以不角為待客禮誤矣籌先王制禮未嘗無所因焉故室必用几而因几以度室堂上必用筵而因筵以度堂野外必用步而因步以度野投壺用指而已故因指以度籌春秋傳曰膚二寸而合其説先儒則謂之側手為膚鋪四指為扶一指案寸則膚扶一也投或于室或于堂或于庭籌之扶或以五或以七或以九者所以隨日之早晏視地之廣狹也算投壺算長二尺射箭籌長尺有握握布四指則射籌長投算矣然射矢不曰籌故箭算曰籌投矢曰籌故箭籌曰算大戴謂算大八分壺壺頸修七寸腹修五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也先儒釋大戴禮謂壺高尺二寸併頸腹言之然則壺固無足矣觀司尊彛壺尊與著尊同列則壺之無足可知鼓或方或圓與投壺篇所畫同投壺命絃者曰請奏貍首間若一而其節之也有鼓鼙故記者有魯鼓薛鼓之制鄭氏謂圓者擊鼙方者擊鼓也射禮天子奏騶虞諸侯奏貍首卿大夫奏采蘋士大夫奏采蘩而投壺特奏貍首者蓋取其樂會時也大戴之言投壺則曰嗟爾不寧侯為爾不朝于王所故抗而射汝強飲強食貽爾曾孫諸侯百福其言與諸侯射禮相類則小戴所記不特大夫士之禮而已先儒以小戴所記稱主人請賔與鄉射鄉飲稱主者同與燕禮大射稱公者異於是以為士大夫之禮然聘禮亦稱主人者接賔之辭固無間於諸侯大夫士也諸侯奏貍首可也大夫士亦奏之者其猶鄉射大夫歌騶虞歟禮書卷一百十四
