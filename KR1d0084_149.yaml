body:
  text: 禮書卷一百五十宋陳祥道撰喪服絰帶喪服有二帶絰帶象大帶絞帶象革帶斬衰絰帶絞帶皆以麻齊衰以下絰帶以麻絞帶以布然絰帶之麻有苴者有牡者有澡者有不澡者有有本者有純本者其施之於身有散者有不散者斬衰苴絰齊衰大功繐衰小功牡麻絰殤而小功澡麻苴者麻之有蕡者也牡者枲麻也藻者治莩垢者也苴色惡澡色潔牡則不惡不潔而適輕重之中此所以自齊衰至小功皆用之也儀禮謂叔父之下殤適孫之下殤昆弟之下殤大夫庶子為適昆弟之下殤為姑姊妹女子子之下殤為人後者為其昆弟從父昆弟之長殤皆澡麻絰帶小記曰下殤小功澡麻不絶其本屈而反以報之服問曰麻之有本者變三年之葛鄭氏曰有本謂大功以上小功以下澡麻斷本既練遇麻斷本者於免絰之又曰小功之麻不變大功之葛以有本為稅則大功以上有本小功以下絶本小功雖絶本而不澡特下殤之在小功者澡之下殤在小功者澡之則於小功為絰以其在所降者不絶其本則於小功為重以其本非小功也儀禮為人後者為其昆弟從父昆弟之長殤亦澡麻而小記特言下殤小功指其本宗者言之也儀禮正小功無澡麻小記小功下殤有澡麻無斷本鄭氏曰小功以下澡麻斷木失之矣小記曰君吊雖不當免時也主人必免不散麻雜記曰大功以上散帶玉藻曰五十不散送荀子曰喪之散麻則凡喪大斂以前既啓之後皆免而散帶免必散帶而有所不散帶則君弔免而不散麻是也凡服有受故大功以上成服之後又絞其帶之垂者殤之服無受故摎垂殤之帶不摎垂屈而反以報之則下殤屈反絞之與長中異乎其有所糾而合者下殤小功凡此皆麻帶之别也記曰斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同大功之葛與小功之麻同小功之葛與緦之麻同此練而受以葛者也喪服記曰公子為其妻縓冠葛絰帶此服輕而用葛者也衰辟領負板之制儀禮衰外削幅裳內削幅若齊裳內衰外負廣出於適寸適博四寸出於衰衰長六尺博四寸削殺也適辟領也外削則縫其殺者外嚮也衰博四寸當心辟領博四寸出於衰則綴於兩廂各去衰二寸以其去衰二寸并辟領四寸與衰四寸此所謂與濶八寸兩之為尺六寸也辟領及濶中尺六寸負出於辟領外旁一寸則負廣尺八寸矣廣尺八寸而長稱之則辟領之長蓋與衰齊衰用三升布則負與辟領之布亦三升倚廬間傳曰父母之喪居倚廬寢苫枕塊齊衰之喪居堊室苄翦不納大功之喪寢有席小功緦麻牀可也又曰父母之喪既虞卒哭柱楣翦屏芐翦不納期而小祥居堊室寢有席又期而大祥居復寢中月而禫禫而牀鄭氏曰倚木為廬在中門外東方北戶蓋倚廬之制橫木於地以為楣倚木於牆以為椽覆之以苫不翦不塗其位中門之外雜記謂在堊室之中非時見乎母是也不入門問喪謂成壙而歸不敢入處室居於倚廬哀親之在外是也其方東壁士喪既夕謂衆主人皆西面于東方主人揖就次是也古者於中門之外自漢以來於中門之內以其近殯也唐禮於殯堂東廊下近南承漢禮者也君障之大夫士不障喪大記謂君為廬宫之大夫士袒之是也庶子而下廬於東南喪大記謂凡非適子者自未葬於隱者為廬是也先儒曰諸子各一廬既虞卒哭則翦所覆之屏以齊其苫亂葛洪變除云屏廬前屏也卒哭除其屏更作外障然大夫士廬前無屏葛説誤也柱迫地之楣以易其戶廬北戶柱楣西戶塗不於顯而無事乎飾君與大夫皆宫之而不使袒皆所以即變也廬立於既殮先儒曰殮之眀日成服而立廬毁於既練寢苫枕塊不説帶絰不與人坐此居廬之大略然也廬男子之事成人之禮也故婦人與童子不廬唐禮婦人不為廬設次西房若殯堂後施下麻坐廬嚴者也故疏衰不廬疏衰不廬非服母者也服母雖疏衰廬堊室周禮宫正授廬舍鄭氏曰舍堊室也喪服既練舍外寢鄭氏曰外寢堊室也又士喪既夕主人揖就次而堊室預焉則次舍外寢皆堊室之異名也其制則鄭氏謂屋下壘土為之不塗塈屋下則其屋雨下與廬之倚木異矣不塗塈則既祥堊矣爾雅曰地謂之黝牆謂之堊或曰父喪既祥而母亡嫡居父喪而祖父母亡嫡居祖父喪而母亡其所居有異乎禮輕者包重者特父喪既祥而母亡則毁堊室立廬是包輕也嫡之於祖所以繼體也父喪既廬而祖父母亡宜别立廬以受弔者示傳重也居祖父喪而母亡二喪殊位則亦宜别立廬也然則父為長子出後之子為父母出妻長子為父母與為出嫁母庶子為其母所居有辨乎先儒謂父為長子不被髮不徒跣為次於內不啜粥立廬於內可也凡杖者則廬廬則禫為人後者為父母不杖則堊室而不廬可也出妻之子非廬於母之家則廬於别室可也父亡母嫁有服而已不廬可也庶子父在為其母不禫固不廬矣若君母在亦不廬也然小記云父不為衆子次於外則長子固次於外矣或曰聞喪而不得奔可以立廬乎廬者所以示哀之發於居處也其設不必為殯也則問喪而不得居不可不廬於其所居也貴賤親疏廬堊室之辨宫正大喪則授廬舍辨其親疏貴賤之居雜記曰大夫次於公館以終喪士練而歸大夫居廬士居堊室士間傳父母之喪居倚廬齊衰居堊室大功寢有席小功緦麻床可也鄭氏釋官正謂親者貴者居倚廬疏者賤者居堊室賈公彥曰親謂大功已上疏為小功緦麻貴謂大夫已上賤謂士也蓋大夫貴矣雖與王疏不居堊室雖賤與王親亦居廬鄭氏又釋雜記曰士居堊室謂邑宰也朝廷之士亦居廬然邑宰與朝廷之士皆士也而朝廷之士居廬於禮無見不可考也雜記大功居堊室而大喪大功居廬蓋凡喪與大喪異歟含襚賵賻贈之别玉貝曰含衣服曰襚車馬曰賵貨財曰賻玩好曰贈蓋卒洗而含將斂而襚賵賻賵在既祖薦馬之後贈在匱至邦門之時襚以遂之賵以覆之賻以助之贈贐之則含襚贈所以送死而賵賻所以佐生也士喪禮卒洗實貝柱右齻左含若及時則敵者親含如魯桓公卒諸侯請含是也不及時則使人執含以往雜記使者執璧委于殯東是也襚在及事則士喪禮所謂君使人襚徹帷襚者入衣尸出親者襚不將命以即陳庶兄弟襚使人以將命于室委衣于尸東牀上朋友襚親以進是也若不及事雜記所謂襚者執冕服左執領右執要委衣于殯東襚降授爵辨服於門內霤受皮辨服於中庭自西階受朝服自堂受玄端將命是也臣襚於君則曰致廢衣於賈人而曰君無襚者受之不以即陳也敵者曰襚而君於臣有襚之者自敵以下皆曰襚也士含以貝天子諸侯含以玉士賵以兩馬大夫而上賵以乘馬襚雖以衣服而有車焉雜記所謂以後路與冕服襚也賵雖以貨財而有馬焉少儀所謂賵馬不入廟門是也賵雖以車馬而有玉焉雜記所謂上介賵執圭將命是也襚賵北面將命而賻専於生者不必北面士喪禮若賻賓東面致命是也襚賻坐委之若無器則不必坐委士喪禮所謂捂受是也士喪禮襚賵不同日而雜記謂含襚賵皆同日而畢事者鄰國相弔之禮也檀弓曰讀賵非古也是再告也雜記大夫之喪包奠而讀書既夕禮主人之史請讀賵周人尚禮之文也若夫春秋之時天王使宰父歸桓公仲子之賵徐使容居弔邾婁公欲坐含魯人之贈也三玄二纁廣尺長終幅此含賵贈之失禮歟禮書卷一百五十
