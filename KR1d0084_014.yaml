front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_014-1a, image: WYG0130/WYG0130-0081c.png}
body:
  text: 禮書卷十四宋陳祥道撰天子素帶素為帶朱裏竟帶之身辟積焉飾以朱緑帶之結處有組又以組貫其紐而約之垂長三尺與帶廣四寸約紐組廣三寸其飾朱上緑下諸侯素帶素帶不以朱裏亦朱緑飾終辟廣長與天子同大夫素帶素帶不終辟飾以𤣥華大夫以上素帶士練帶弟子縞帶皆帛為之士練帶練帶辟積其朱三寸其廣不至四寸紳組長三尺鄭氏謂士以下皆襌而率然雜記於諸侯亦言率帶則率不特施於襌也大戴禮曰黃帝黼黻衣大帶詩曰其帶伊絲又曰垂帶而厲晉語曰內子為大帶荀子曰逢衣淺帶淺帶博帶雋不疑傳曰褒衣博帶釋名曰帶蒂也內則子事父母韠紳搢笏婦事舅姑笄總衣紳玉藻曰天子素帶朱裏終辟而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組三寸長齊于帶紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉紳韠結三齊大夫大帶四寸雜帶君朱緑大夫𤣥華士緇辟二寸再繚四寸凡帶有率無針功雜記曰公襲卷衣一朱絲帶申加大帶於上朱緑帶者襲衣之帶飾之雜以朱緑異於生也此帶亦以素為之申重也重於革帶也革帶以佩韍必言重加大帶者明雖有變必傋此二帶也又曰率帶諸侯大夫皆五采此襲尸之帶左傳曰鞶厲游纓昭其度也左桓二年深衣曰帶上毋厭髀下毋厭脅當無骨者左傳曰樂桓子請帶於季武子武子召使者裂裳帛與之曰帶其褊矣昭元年古者革帶大帶皆謂之鞶內則所謂男鞶革帶也春秋傳所謂鞶厲大帶也易言鞶帶揚子言鞶帨以至許慎服䖍杜預之徒皆以鞶為帶特鄭氏以男鞶革為盛帨之囊誤也詩言垂帶而厲毛萇杜預之徒皆以厲為帶之垂者特鄭氏以而厲為如裂亦誤也辟猶冠裳之辟積也率縫合之也天子諸侯大帶終辟則竟帶之身辟之大夫辟其垂士辟其下而已雜飾也飾帶君朱緑大夫𤣥華士緇故儀禮士冠主人朝服緇帶冠者爵辨皮辨緇布冠皆緇帶則士帶練而飾以緇也士辟下二寸則所辟其下端二寸也再繚四寸則結處再繚屈之四寸也天子至士帶皆合帛為之或以素或以練或終辟或辟垂或辟下其飾或朱緑或𤣥華蓋素得於自然練成於人功終辟則所積者傋辟垂辟下則所積者少朱者正陽之色緑者少陽之雜禮器冕朱緑璪雜記公襲朱緑帶聘禮問諸侯朱緑必皆取正色𤣥與緇者隂之體華者文之成天子體陽而兼乎下故朱裏而裨以朱緑諸侯雖體陽而不兼乎上故飾以朱緑而不朱裏大夫體隂而有文故飾以𤣥華士則體隂而已故飾以緇然於大夫言帶廣四寸則其上可知而士不必四寸也於士言紳三尺則其上可知而有司止於二尺五寸也凡帶有率無針功則帶繂而巳無刺繡之功也以至并紐約組三寸再繚四寸紳韠結三齊皆天子至士所同也夫所束長於所飾則失之太拘所飾長於所束則失之太文紳韠結三齊叔向曰衣有禬帶有結然後為稱則有司之約韠蓋亦二尺五寸歟古者於物言華則五色傋矣書云華蟲華玉於文稱凡則衆禮該矣鄭氏以華為黃以凡帶為有司之帶以率為士與有司之帶以辟為裨以二寸為士帶廣以至大夫以上用合帛士以下襌而不合皆非經據之論也隋志曰乘輿大帶素帶朱裏紕其外上以朱下以緑王公侯伯子男素帶不朱裏皆紕其外上以朱下以緑正三品已上帶紕其垂外以𤣥內以黃紐約皆用青組唐開元禮儀羅白大帶三品巳上青帶不朱裏皆紕其外上以朱下以緑五品已下紕其垂外以𤣥內以黃紐約皆用青組六品已下練帶紕其垂內外以緇約用青組其制多襲鄭氏之說革帶內則曰男鞶革莊子曰帶死牛之脅玉藻曰革帶博二寸士喪禮韐帶搢笏鄭氏曰韐帶韎韐緇帶不言韎緇者欲見韐自有帶韐帶用革笏搢於帶之右旁然則革帶其博二寸其用以繫佩韍然後加以大帶而佩繫於革帶笏搢於二帶之間矣晉語寺人勃鞮曰乾時之役申孫之矢集於桓鉤鉤近於袪而無怨言則革帶有鉤以拘之後世謂之鉤䚢丑列阮諶云䚢螳蜋鉤以相拘帶謂之鉤䚢唐以玉為鉤䚢與古異矣然革帶用於吉而已荀卿曰搢紳而無鉤帶是也古者裼衣象裘色韠屨象裳色而革帶與韠其用相因則革帶豈亦與韠同色歟居士錦帶弟子縞帶書大傳曰古之帝王必有命民能敬長憐孤取舍好讓舉事力者命於其君然後得乘飾車駢馬衣文錦民之未命者不得衣不得乘乘者有罰鄭氏釋之曰居士錦帶然則所謂居士即命民也居士錦帶以其有備成之文也弟子縞帶以其有受道之質也縞薄繒也與素帶不同吳季札以縞帶遺子産蓋吳地之所宜者縞也荀卿曰古之處士德盛者也知命者也今之處士無能而云能者也離蹤而跂訾者也然則處士即居士也古之所謂處士有守節而不仕者有成材而未仕者鄉飲酒禮主人就先生而謀賓介鄭氏謂賓介處士也鄉射禮徵唯所欲以告於先生君子可也鄭氏謂君子處士也此蓋處士之未仕者歟禮書卷十四
