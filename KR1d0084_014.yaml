  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_014-1a, image: WYG0130/WYG0130-0081c.png}
body:
  text: 禮書卷十四宋陳祥道撰天子素帶素為帯朱裏竟帯之身辟積焉飾以朱緑帯之結處有組又以組貫其紐而約之垂長三尺與帯廣四寸約紐組廣三寸其飾朱上緑下諸侯素帯素帯不以朱裏亦朱緑飾終辟廣長與天子同大夫素帯素帯不終辟飾以𤣥華大夫以上素帯士練帯弟子縞帯皆帛為之士練帯練帯辟積其朱三寸其廣不至四寸紳組長三尺鄭氏謂士以下皆襌而率然雜記於諸侯亦言率帯則率不特施於襌也大戴禮曰黄帝黼黻衣大帯詩曰其帯伊絲又曰垂帯而厲晉語曰内子為大帯荀子曰逢衣淺帯淺帯博帯雋不疑傳曰褒衣博帶釋名曰帶蔕也内則子事父母韠紳搢笏婦事舅姑笄總衣紳玉藻曰天子素帶朱裏終辟而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組三寸長齊于帯紳長制士三尺有司二尺有五寸子游曰三分帯下紳居二焉紳韠結三齊大夫大帶四寸雜帯君朱緑大夫𤣥華士緇辟二寸再繚四寸凡帶有率無箴功雜記曰公襲卷衣一朱絲帶申加大帶於上朱緑帯者襲衣之帯飾之雜以朱緑異於生也此帯亦以素為之申重也重於革帯也革帯以佩韍必言重加大帯者明雖有變必傋此二帯也又曰率帯諸侯大夫皆五采此襲尸之帯左傳曰鞶厲游纓昭其度也左桓二年深衣曰帯上毋厭髀下毋厭脅當無骨者左傳曰樂桓子請帯於季武子武子召使者裂裳帛與之曰帯其褊矣昭元年古者革帯大帯皆謂之鞶内則所謂男鞶革帯也春秋傳所謂鞶厲大帯也易言鞶帯揚子言鞶帨以至許慎服䖍杜預之徒皆以鞶為帯特鄭氏以男鞶革為盛帨之囊誤也詩言垂帯而厲毛萇杜預之徒皆以厲為帯之垂者特鄭氏以而厲為如裂亦誤也辟猶冠裳之辟積也率縫合之也天子諸侯大帯終辟則竟帯之身辟之大夫辟其垂士辟其下而已雜飾也飾帯君朱緑大夫𤣥華士緇故儀禮士冠主人朝服緇帯冠者爵弁皮弁緇布冠皆緇帯則士帶練而飾以緇也士辟下二寸則所辟其下端二寸也再繚四寸則結處再繚屈之四寸也天子至士帯皆合帛為之或以素或以練或終辟或辟垂或辟下其飾或朱緑或𤣥華葢素得於自然練成於人功終辟則所積者傋辟垂辟下則所積者少朱者正陽之色緑者少陽之雜禮器冕朱緑璪雜記公襲朱緑帯聘禮問諸侯朱緑必皆取正色𤣥與緇者隂之體華者文之成天子體陽而兼乎下故朱裏而裨以朱緑諸侯雖體陽而不兼乎上故飾以朱緑而不朱裏大夫體隂而有文故飾以𤣥華士則體隂而已故飾以緇然於大夫言帯廣四寸則其上可知而士不必四寸也於士言紳三尺則其上可知而有司止於二尺五寸也凡帯有率無箴功則帯繂而巳無刺繡之功也以至并紐約組三寸再繚四寸紳韠結三齊皆天子至士所同也夫所束長於所飾則失之太拘所飾長於所束則失之太文紳韠結三齊叔向曰衣有禬帯有結然後為稱則有司之約韠葢亦二尺五寸歟古者於物言華則五色傋矣書云華蟲華玉於文稱凡則衆禮該矣鄭氏以華為黄以凡帯為有司之帯以率為士與有司之帯以辟為裨以二寸為士帯廣以至大夫以上用合帛士以下襌而不合皆非經據之論也隋志曰乘輿大帯素帯朱裏紕其外上以朱下以緑王公侯伯子男素帯不朱裏皆紕其外上以朱下以緑正三品已上帯紕其垂外以𤣥内以黄紐約皆用青組唐開元禮儀羅白大帯三品巳上青帯不朱裏皆紕其外上以朱下以緑五品已下紕其垂外以𤣥内以黄紐約皆用青組六品已下練帯紕其垂内外以緇約用青組其制多襲鄭氏之說革帯内則曰男鞶革莊子曰帯死牛之脅玉藻曰革帯博二寸士喪禮韐帯搢笏鄭氏曰韐帯韎韐緇帯不言韎緇者欲見韐自有帯韐帯用革笏搢於帯之右旁然則革帯其博二寸其用以繫佩韍然後加以大帯而佩繫於革帯笏搢於二帯之間矣晉語寺人勃鞮曰乾時之役申孫之矢集於桓鉤鉤近於袪而無怨言則革帯有鉤以拘之後世謂之鉤䚢丑列阮諶云䚢螳蜋鉤以相拘帯謂之鉤䚢唐以玉為鉤䚢與古異矣然革帯用於吉而已荀卿曰搢紳而無鉤帯是也古者裼衣象裘色韠屨象裳色而革帯與韠其用相因則革帯豈亦與韠同色歟居士錦帯弟子縞帯書大傳曰古之帝王必有命民能敬長憐孤取舎好讓舉事力者命於其君然後得乘飾車駢馬衣文錦民之未命者不得衣不得乘乘者有罰鄭氏釋之曰居士錦帯然則所謂居士即命民也居士錦帯以其有備成之文也弟子縞帯以其有受道之質也縞薄繒也與素帯不同吳季札以縞帯遺子産葢吳地之所宜者縞也荀卿曰古之處士徳盛者也知命者也今之處士無能而云能者也離蹤而跂訾者也然則處士即居士也古之所謂處士有守節而不仕者有成材而未仕者鄉飲酒禮主人就先生而謀賓介鄭氏謂賓介處士也鄉射禮徵唯所欲以告於先生君子可也鄭氏謂君子處士也此葢處士之未仕者歟禮書卷十四
