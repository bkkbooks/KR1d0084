body:
  text: 禮書卷一百四十四宋陳祥道撰軌轍車迹為轍轍廣為軌左傳曰下而視其轍此車迹也考工記曰經途九軌此轍廣也轍廣曰軌而兩轊亦曰軌少儀曰祭左右軌猶之兩轊曰軹兩軻下木亦曰軹也考工記曰應門容二轍三箇二轍之間八尺而車人轍廣六尺者以貴賤之車不同故也說文曰䡮車迹也則轍亦曰䡮音蹤軒左傳曰齊侯斂諸大夫之軒定九年又曰齊侯得敝無存與之犀軒定九年又曰衛公鶴有乘軒又曰乘軒者三百人又許太子謂渾良夫曰茍使我入國乘軒齊桓公遺衛夫人以魚軒則軒大夫以上之車也許慎曰軒曲輈藩車也蓋輈有三制獨國馬之輈為深輈深則軒故謂之軒軒必有藩故魚軒犀軒皆皮為之藩也詩曰如輊如軒考工記曰既節軒摯之任漢書曰居前不能令人輊居後不能令人軒則車又以前高為軒後至地為輊茵簀小戎詩曰文茵暢轂毛氏曰文茵虎皮也釋名曰文茵車中所坐也然則戎車有文茵則乘車有茵可知若大路則越席而已大車則簀而已禮記曰蒲越之尚左傳荀卿曰大路越席說文曰轑大車簀也乘石隸僕王行則洗乘石詩曰有扁斯石履之卑兮則乘石王與后乘車於是登降也鄭氏謂王登車於大寢西階之前反降於阼階之前則乘石固設於兩階矣禮記曰下卿位賈公彥以為凡王出則過卿位而登車入則見卿位而降車若迎賓則登車於大寢西階之前反降於阼階之前或者下卿位為諸侯禮樂師趍以采薺行以肆夏謂天子禮然漢去古不逺丞相進見御座為起乘輿為下則天子見卿而後下非過其位則然也果過其位則然豈優至尊之道哉考之於禮尸與始嫁者乘以几其餘所乘無所經見綏曲禮曰凡僕人之禮必授人綏若僕者降等則受不然則否僕已駕奮衣由右上取二綏乘路馬必朝服不敢授綏少儀曰僕於君子君子升下則授綏執君之乘車僕者負良綏申之面拖諸幦以散綏升說文曰緌車中把也其飾則有采章其等有貴賤詩曰淑旗綏章此綏之之飾也少儀君綏曰良綏曲禮少儀僕右綏曰二綏散綏此綏之等也君子之登車也受綏其既登也正立執綏及致敬然後俯而式焉正立執綏所以備隊耳昔范鞅逆魏舒請參乘而持帶亦備隊之意也夫禮有六藝馭居一焉故司徒以之教萬民保氏以之教國子詩以執轡如組為賢孔子以執馭為能而周官大馭戎僕田僕齊僕之官皆大夫上士為之則馭非賤者之事而已故有以同等為之僕者有以降等為之僕者有以弟子為師之僕者有以貴者為賤人之僕者禮曰若僕降等則受不然則否此同等降等者為之僕也君命召雖賤人大夫士必自馭之此貴者為賤人之僕也論語或稱冉有僕或稱樊遲御此弟子為師之僕也禮書圖卷一百四十四
