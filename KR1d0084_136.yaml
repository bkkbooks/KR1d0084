body:
  text: 禮書卷一百三十七宋陳祥道撰夏篆鄭氏曰夏篆五采畫轂約也夏縵亦五采畫無篆爾墨車不畫也棧車不革鞔而漆之役車方箱可載任器夏縵説文縵繒無文也漢律曰賜衣者縵表白裏然則夏縵以其無篆文故也墨車棧車役車輪人曰陳篆必正禮記曰丹漆彫㡬之美又曰國家靡敝車不彫㡬則篆者彫篆之文也夏篆者篆其車而五采畫之也夏縵五采畫之而不篆墨車墨漆之而不畫棧車素之而不漆考工記曰飾車欲侈棧車欲弇以尊者侈而伸卑者弇而屈故也春秋傳曰晉絳人謂山崩川竭君降服乗縵則縵車無文非夏縵也吳起曰縵輪籠轂詩曰有棧之車行彼周道則士車非役車也周禮曰庶人乗役車則乗以供役非特載任器也鄭氏釋詩以棧車為役車釋周禮以棧車飾以漆役車載任器又以篆為畫以畫為畫轂其説誤也役車牛車也棧亦作轏齊逢丑父寢於轏中是也大車大車牛車也鄭氏曰大車平地載任之車轂長半柯者也説文曰轏大車簣也柏車鄭氏曰柏車山車羊車鄭司農曰羊車謂車羊門也𤣥謂羊善也羊車若漢定張車較長七尺書曰肇牽牛車輈人曰大車轅直必縊其牛則大車牛車也牛車大則柏車中車羊車小車也大車以行澤柏車以行山羊車以行宫中車人所謂行澤者欲短轂行山欲長轂行澤者反輮史謂下澤車行山者仄輮此大車柏車之辨也鄭氏謂羊車若漢定張車宫内所用蓋有所受之也大車兩轅也故車人言凡為轅三其輪崇徹廣六尺鬲長六尺轍廣六尺則與駟車八尺之轍不同鬲長六尺則與六尺六寸之衡不同是兩轅之車一牛在轅内故衡短而轍狹一轅之車兩服在轅外故衡長而轍廣也大車轂長尺五寸圍尺五寸輻長四尺五寸渠圍二丈七尺輪崇九尺牙圍尺五寸綆一寸轅二丈七尺柏車轂長二尺圍二尺輻長三尺渠圍一丈八尺輪崇六尺牙圍尺二寸綆大半寸轅一丈八尺大車輪髙轅長柏車輪卑轅短輪髙轅長而轂短小輪卑轅短而轂長大者以其行山澤不同故也大車牝服二柯有三分柯之二則八尺矣羊車二柯有三分柯之一則七尺矣柏車二柯則六尺矣柏車較短而轂輻牙長羊車較長而轂輻牙小者以其行山與宫中不同故也輪人之牙車人謂之渠海物有曰車渠蓋以其象名之也輿人之較車人謂之牝服詩曰終日牽牛不以服箱毛氏曰服牝服也輿人之衡車人謂之鬲輿人之為車起度於輿廣車人之為車起度於柯長輿人之車其箱廣而不方廣六尺六寸隧四尺四寸車人之車箱方而不廣則其制之異可知矣語曰大車無輗小車無軏先儒以大車為牛車小車為羊車羊車轄耑曰軏牛車轅耑曰輗説文輗亦作理或然也詩曰役車其休周禮曰士乗棧車庶人乗役車先儒以役車為牛車是也以棧之車為役車非也禮書卷一百三十七
