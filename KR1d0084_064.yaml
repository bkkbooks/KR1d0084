body:
  text: 禮書卷六十五宋陳祥道撰婚周禮大宗伯以昏冠之禮親成男女大司徒荒政十曰多昏黨正凡其黨之昏冠教其禮事媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡娶判妻入子者皆書之中春之月令㑹男女於是時也奔者不禁若無故而不用令者罰之司男女之無夫家者而會之凡嫁女娶妻純帛無過五兩禁遷葬者與嫁殤者凡男女之隂訟聴之于勝國之社其附于刑者歸之于士遂人以樂昏擾甿典瑞穀圭以和難以聘女玉人穀圭七寸天子以聘女大璋諸侯以聘女禮記曲禮三十曰壯有室女子許嫁纓非有大故不入其門娶妻不娶同姓買妾不知其姓則卜之男女非有行媒不相知名非受幣不交不親故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也賀娶妻者曰某子使某聞子有客使某羞不斥主人者昏禮不賀納女於天子曰備百姓於國君曰備酒漿於大夫曰備埽灑正義曰成九年夏季孫行父如宋致女此云納女故注云納女猶致女也知壻不親迎嫁女之家使人致女者以成九年二月伯姬歸於宋時宋公不親迎故魯季孫行父如宋致女是也而天子亦有親迎以否者異義云戴禮説天子親迎左氏説天子不親迎使上卿迎之諸侯亦不親迎使上大夫迎之鄭駮異義云文王娶大姒親迎于渭又引孔子答哀公合二姓之好以繼先聖之後以為天地宗廟社稷之主冕而親迎君何謂巳重乎此天子諸侯有親迎也若不親迎則宜致女云備百姓也曽子問昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而后嫁之禮也女之父母死壻亦如之曽子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服於外次女入改服於内次然後即位而哭曽子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何反於初孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭於禰成婦之義也曽子問曰女未廟見而死則如之何孔子曰不遷於祖不袝於皇姑壻不杖不菲不次歸葬于女氏之黨示未成婦也曽子問曰娶女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之郊特牲曰天地合而後萬物興焉夫昏禮萬世之始也取於異姓所以附逺别厚也幣必誠辭無不腆告之以直信信事人也信婦徳也一與之齊終身不改故夫死不嫁男親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執摯以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道也壻親御授綏親之也親之也者親之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始也婦人從人者也幼從父兄嫁從夫夫死從子夫也者夫也夫也者以知帥人者也𤣥冕齋戒鬼神隂陽也將以為社稷主為先祖後而可以不敬乎共牢而食同尊卑也故婦人無爵從夫之爵坐以夫之齒器用陶匏尚禮然也三王作牢用陶匏厥明婦盥饋舅姑卒食婦餕餘私之也舅姑降自西階婦降自阼階授之室也昏禮不用樂幽隂之義也樂陽氣也昏禮不賀人之序也大傳曰其庶姓别于上而戚單于下婚姻可以通乎繋之以姓而弗别綴之以食而弗殊雖百世而婚姻不通周道然也雜記大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以娶婦已雖小功既卒哭可以冠娶妻大殤小功則不可納幣一束束五兩兩五尋婦見舅姑兄弟姑姊妺皆立於堂下西面北上是見已見諸父各就其寢女雖未許嫁年二十而笄禮之婦人執其禮燕則鬈首經解曰婚姻之禮廢則夫婦之道苦而淫辟之罪多矣哀公問孔子曰非禮無以别男女父子兄弟之親婚姻䟽數之交也大婚為大大婚至矣大婚既至冕而親迎親之也親之也者親之也哀公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進孔子曰天地不合萬物不生大婚萬世之嗣也君何謂已重焉孔子遂言曰内以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物恥足以振之國恥足以興之為政先禮禮其政之本歟坊記男女無媒不交無幣不相見恐男女之無别也以此坊民民猶有自獻其身子云婚禮壻親迎見於舅姑舅姑承子以授壻恐事之違也以此坊民民猶有不至者婚義曰婚禮納采問名納吉納徴請期皆主人筵几於廟而拜迎於門外入揖讓而升聴命於廟所以敬慎重正婚禮也父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執鴈入揖讓升堂再拜奠鴈蓋親受之於父母也降出御婦車而壻授綏御輪三周先俟于門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也夙興婦沐浴以俟見質明賛見婦於舅姑婦執笲棗栗腵修以見賛醴婦婦祭脯醢祭醴成婦順也舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也是以古者先嫁三月祖廟未毁教于公宫祖廟既毁教于宗室教以婦徳婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也詩桃夭曰后妃不妬忌則男女以正婚姻以時國無鰥民也鵲巢夫人之徳也曰之子于歸百兩御之百兩將之百兩成之摽有梅男女及時也野有死麕白茅包之有女懐春吉士誘之何彼禯矣羙王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等碩人其頎衣錦褧衣國君夫人瞿衣而嫁今衣錦者在塗之服也四牡有驕朱幩鑣鑣翟茀以朝有狐刺時也古者國有凶荒則殺禮而多昏㑹男女之無夫家者所以育人民也丰刺亂也婚姻之道缺陽倡而隂不和男行而女不隨衣錦褧衣裳錦褧裳庶人之妻嫁服也士妻緇衣纁袡著刺時也時不親迎也俟我於著乎而充耳以素乎而士之服也俟我於庭乎而充耳以青乎而卿大夫之服也俟我於堂乎而充耳以黄乎而人君之服也綢繆刺晉亂也國亂則婚姻不得其時也東門之楊刺時也婚姻失時男女多違親迎女猶有不至者也大明文定厥祥親迎于渭造舟為梁不顯其光天子造舟諸侯維舟大夫方舟士特舟韓奕曰韓侯迎止于蹶之里諸娣從之祁祁如雲春秋隠八年鄭公子忽如陳逆婦媯先配後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育莊公二十四年夏公如齊逆女秋哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎文四年夏逆婦姜于齊卿不行非禮也君子是以知出姜之不允于魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壊其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也七年穆伯為襄仲于莒聘焉穆伯如莒涖盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之宣元年春公子遂如齊逆女尊君命也三月遂以夫人歸姜至自齊尊夫人也成八年夏宋公使公孫壽來納幣禮也衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否昭元年春楚公子圍聘于齊且娶于公孫段氏伍舉為介將入館鄭人惡之使行人子羽與之言乃館于外既聘將以衆逆子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聴命命太宰伯州犂對曰圍布几筵告於莊共之廟而來若野賜之是委君貺於草莽也是寡大夫不得列於諸卿也唯大夫圖之鄭徐吾犯之妹美公孫楚聘之矣公孫黒又使强委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請女擇焉皆許之子晳盛飾入布幣而出子南戎服入左右射超乗而出女自房觀之曰子晳信姜矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒欲殺之子南執戈逐之子晳傷而歸二年四月韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊謂陳無宇非卿執諸中都少姜為請曰送從逆班畏大國也猶有所易是以亂作三年齊侯使晏嬰請繼室於晉曰寡君使嬰曰寡人願事君朝夕不倦不腆先君之適以備内官焜燿寡人之望則又無禄早世隕命寡人失望君若不忌先君之好恵顧齊國辱収寡人徼福於大公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡人不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請君有辱命恵莫大焉若恵顧敝邑撫有晉國賜之内主豈唯寡君舉羣臣實受其貺昭五年晉韓宣子如楚送女叔向為介及楚楚子朝其大夫曰晉吾仇敵也苟得志焉無恤其他薳啟疆曰晉之事君臣曰可矣求諸侯而麇至求婚而薦女君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然柰何楚子終厚禮之成十一年聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁於齊管于奚生二子而寡以歸聲伯聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷子將若何曰不能死亡婦人遂行生二子於郤氏郤氏亡晉人歸之施氏施氏逆諸河沈其二子婦人怒曰不能庇其伉儷而亡之又不能字人之孤而殺之將何以終遂誓施氏襄十二年靈王求后于齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹姑姊妹則曰先守某公之遺女若而人齊侯許婚王使隂里結之哀十二年昭公夫人孟子卒昭公娶于吳故不書姓死不赴故不稱夫人不反哭故不言葬小君二十四年公子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝恵娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為太子國人始惡之公羊隠二年紀履緰來逆女何以不稱使婚禮不稱主人然則曷稱稱諸父兄師友宋公使公孫夀來納幣則其稱主人何辭窮也辭窮者何無母也然則紀有母乎曰有有則何以不稱母母不通也外逆女不書此何以書譏始不親迎也始不親迎昉於此乎前此矣前此則曷為始乎此託始焉爾春秋之始也又曰女在其國稱女在塗稱婦入國稱夫人伯姬歸于紀其言歸何婦人謂嫁曰歸桓三年公子翬如齊逆女齊侯送姜氏于讙何以書譏諸侯越境送女非禮也比入國矣何以不稱夫人自我言齊父母之於子雖為鄰國夫人猶曰吾姜氏八年祭公來遂逆王后于紀遂者何生事也大夫無遂事此其言遂何成使乎我也其成使乎我柰何使我為媒可則因用是往逆矣女在其國稱女此其稱王后何王者無外其辭成矣九年春紀季姜歸于京師其辭成矣則其稱紀季姜何自我言紀父母之於子雖為天王后猶曰吾季姜莊元年單伯逆王姬何以不稱使天子召而使之也逆之者何使我主之也曷為使我主之天子嫁女乎諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之秋築王姬之館于外築之禮也于外非禮也于外何以非禮築于外非禮也其築之何以非禮主王姬者必為之改築於路寢則不可小寢則嫌羣公子之舍則以卑矣其道必為之改築者也二十四年夫人姜氏入其言入何難也其難柰何夫人不僂不可使入與公有所約然後入大夫宗婦覿用幣用者不宜用也見用幣非禮也然則曷用棗栗云乎腵脩云乎二十七年杞伯姬來其言來何直來曰來大歸曰來歸莒慶來逆叔姬何以書譏大夫越境逆女非禮也僖八年禘于大廟用致夫人用者不宜用也致者不宜致也禘用致夫人非禮也夫人何以不稱姜氏貶譏以妾為妻也其言以妾為妻奈何葢脇于齊媵女之先至者也九年伯姬卒此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之三十一年杞伯姬來求婦其言來求婦何兄弟辭也其稱婦何有姑之辭也文二年公子遂如齊納幣譏喪娶也娶在三年之外何譏乎喪娶三年之内不圖婚吉禘于莊公譏然則曷為不祭焉譏三年之恩疾矣非虚加之也以人心為皆有之以人心為皆有之則曷為獨於娶焉譏娶者大吉也非常吉也其為吉者主於已以為有人心焉者則宜於此焉變矣四年逆婦姜于齊何略之也高子曰娶乎大夫者略之也八年宋人殺其大夫司馬宋司城來奔司馬司城皆官舉也曷為皆官舉宋三世無大夫三世内娶也十五年齊人來歸子叔姬其言來何閔之也此有罪何閔爾父母之於子雖有罪猶若其不欲服罪然十八年夫人姜氏歸于齊成八年衛人來媵媵不書此何以書錄伯姬也九年杞伯來逆叔姬之喪以歸内辭也脇而歸之伯姬歸于宋季孫行父如宋致女未有言致女者此其言致女何錄伯姬也晉人來媵錄伯姬也襄十五年劉夏逆王后于齊外逆女不書此何以書過我也穀梁桓三年公子翬如齊逆女逆女親者也使大夫非正也齊侯送姜氏于讙禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎従爾舅之言母戒之曰謹慎従爾姑之言諸母般申之曰謹慎従爾父母之言送女踰境非禮也公㑹齊侯于讙無譏乎曰為禮也齊侯來也公之逆而㑹之可也夫人姜氏至自齊其不言翬之以來何也公親受之于齊侯也子貢曰冕而親迎不已重乎孔子曰合二姓之好以繼萬世之後何謂巳重乎八年祭公來遂逆王后于紀其不言使焉何也不正其以宗廟之大事即謀於我故弗與使也遂繼事之辭也其曰遂逆王后故略之也或曰天子無外王命之則成矣九年紀季姜歸于京師為之中者歸之也十八年公㑹齊侯于濼公與夫人姜氏遂如齊濼之㑹不言及夫人何也以夫人伉弗稱數也莊元年單伯逆王姬其不言如何也其義不可受於京師也曰躬君弑於齊使之主婚姻與齊為禮其義固不可受也築王姬之館于外主王姬者必自公門出於廟則巳尊於寢則已卑為之築節矣築之外變之正也築之外變之為正何也仇讎之人非所以接婚姻也衰麻非所以接弁冕也其不言齊侯之來逆何也不使齊侯得與吾為禮也十九年公子結媵陳人之婦于鄄遂及齊侯宋公盟媵淺事也不志此其志何也辟要盟也何以見其辟要盟媵禮之輕者也盟國之重也以輕事遂乎國重無説其曰陳人之婦略之也其不日數渝惡之也夫人姜氏如莒婦人既嫁不踰境踰境非正也二十二年公如齊納幣納幣大夫之事也禮有納采有問名有納徴有告期四者備而後娶禮也公之親納幣非禮也故譏之二十四年公如齊逆女親迎恒事也不志此其志何也不正其親迎於齊也公至自齊迎者行見諸舎見諸先至非正也丁丑夫人姜氏入内弗受也日入惡入者也何用不受也以宗廟弗受也娶仇人子弟以薦舎於前其義不可受也戊寅大夫宗婦覿用幣禮大夫不見夫人不言及不正其行婦道故列數之也男子之贄羔鴈雉腒婦人之贄棗栗腵脩用幣非禮也大夫國體也而行婦道惡之故謹而日之也二十七年莒慶來逆叔姬諸侯之嫁子於大夫主大夫以與之來者接内也不正其接内故不與夫婦之稱也文四年逆婦姜于齊為其禮成乎齊也其逆者誰親迎而稱婦或者公與何其速婦之也曰公也其不言公非成禮於齊也曰婦有姑之辭也其不言氏貶之也夫人與有貶也十二年子叔姬卒其曰子叔姬貴也公之母姉妹也其一傳曰許嫁以卒之也男子二十而冠冠而列丈夫三十而娶女子十五而許嫁二十而嫁成十四年僑如以夫人婦姜氏至自齊大夫不以夫人以夫人非正也刺不親迎也僑如之挈由上致之也春秋桓八年祭公來遂逆王后于紀襄十五年劉夏逆王后于齊啖子曰古儒者或言天子當親迎或言不當親迎二説不眀未敢定也然春秋所載皆譏也趙子曰康成據毛詩義以文王親迎為證據文王乃非天子不可為證考之大體固無自逆之道王者之尊海内莫敵故嫁女即使諸侯主之適諸侯諸侯莫敢有其室若屈萬乗之尊而行親迎之禮則何莫敢敵之有乎曰夫子對哀公云為天地社稷宗廟之主非謂天子乎答曰魯有郊天地之禮故云爾何得言天子乎桓三年公子翬如齊逆女莊二十四年夏公如齊逆女文四年夏逆婦姜于齊宣元年公子遂如齊逆女成十四年秋叔孫僑如如齊逆女啖子曰諸侯親迎皆常事不書穀梁云親迎常事不志是也公子翬公子遂叔孫僑如為君逆夫人皆以非禮翬遂公子而行婚禮尤不可也左氏以卿逆為合禮殊誤矣公穀並云譏不親迎莊十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟成八年衛人來媵九年晉人來媵十年齊人來媵啖子曰凡媵常事不書公子結為遂事起本也三國來媵非禮也故書公羊云媵不書穀梁云媵淺事也不志此説皆是左氏云凡諸侯嫁女同姓媵之異姓則不若然則莒姓巳邾姓曹此二國同姓至少如嫁女孰為媵乎恐此禮難行令則不取趙子曰左氏云異姓則否啖子難之誠為當矣若寔異姓不合媵則成十年直云齊人來媵足知非禮何假先書衛晉乎所以先書二國者眀九女巳足而又來媵所以為失禮非謂譏異姓來媵其義甚眀婚有六禮納采問名納吉納徴請期親迎而納采者擇其族類問名者詢其誰氏問名然後卜之故納吉納吉則其禮成矣故納徴然則納采問名同一使納吉納徴請期皆異使納采問名納吉請期以禽贄納徴以圭璋皮帛由徴以前慮其或不受也故皆言納既納徴則聴命而巳故於期言請焉曲禮曰日月以告君齋戒以告鬼神春秋之時楚公子娶於鄭曰告於莊共之廟而來鄭公子忽先配後祖君子譏之故士婚禮既納采問名然後歸卜於禰既卜然後納吉而卜常在告廟之日禮説曰卜郊受命于祖廟作龜于禰宫尊祖親考之義也鄭氏謂受命退乃卜卜婚之禮葢亦如之然則告廟始於納采問名之後矣白虎通曰娶妻告廟者示不必人女此臆説也異義云戴禮説天子親迎左氏説天子不親迎上卿迎之諸侯亦不親迎使上大夫迎之鄭駮異義云文王娶大姒親迎於渭又孔子答哀公合二姓之好以繼先聖之後以為天地宗廟社稷之主冕而親迎何謂巳重乎此天子諸侯有親迎也然考之於經著之詩刺不親迎而充耳以黄者人君之飾又文王迎于渭韓侯迎于蹶而春秋紀裂繻來逆女公羊曰譏不親迎也公子翬如齊逆女穀梁曰逆女親者也使大夫非正也莊公如齊逆女穀梁曰親迎常事也不志此其志何不正其親迎於齊也凡此皆言諸侯親迎之禮若天子則不然趙氏曰王者之尊海内莫敵故嫁女則使諸侯主之適諸侯諸侯莫敢有其室若屈萬乗之尊而行親迎之禮則何莫敢敵之有乎孔子對哀公曰為天地社稷宗廟之主以魯有郊祀天地之禮故云爾非為天子發也左氏謂諸侯不親迎公羊謂天子亦親迎其説不能全與經合當従趙氏之論為正漢恵帝納后納采鴈璧乗馬束帛聘黄金二萬斤十二匹其後桓帝納后悉依其故事北齊皇帝納后之禮納采至納徴訖告圓丘方澤及廟是日皇帝臨軒命太尉為使司徒副之持節詣后行宫東向奉璽綬唐皇帝納后卜日告天地並如開元禮然皆不聞有親迎者葢其傳襲於古然也納采問名禮言婚禮下達而繼之以納采納采辭曰吾子有恵貺室某也某有先人之禮使某也謀納采則納采之前已達其言矣納采于廟賓受主人鴈訖降出擯者出請賓執鴈請問名入授如初禮擯者出請醴賓主人迎于廟門外揖讓如初一使而二鴈三入廟而再迎之則問名因於納采故其禮略也士昏贄用鴈者不以死贄亦攝盛也觀其所乗大夫之墨車所衣助祭之爵弁而女必次純衣纁袡腊必用鮮魚必殽全則攝贄以鴈不為過也鄭氏曰用鴈取其順隂陽來往理必不然納吉納徴士納吉用鴈如納采禮納徴𤣥纁束帛儷皮如納吉禮鄭氏曰徴成也使使者納幣以成昏禮用𤣥纁者象隂陽備也束帛十端也周禮曰凡嫁子娶妻入幣純帛無過五兩儷兩也執束帛以致命兩皮為庭實皮鹿皮釋周禮曰純實緇字也古緇以才為聲士大夫乃以𤣥纁束帛天子加以穀圭諸侯加以大璋雜記納幣一束束五兩兩五尋然則每端二丈賈公彦曰庻人用緇無纁其大夫無冠禮有婚禮若試為大夫及幼為大夫者依士禮若五十而爵改娶者昏禮𤣥纁及鹿皮則同於士餘有異者無文以言之也然考之于史曰錦繡千純蘇秦傳又曰文繡千純張儀傳則純匹帛也周禮所謂純帛乃匹帛也鄭改以為緇誤矣匹帛無過五兩則庶人不必五兩大夫士不得過焉非謂庻人用緇大夫用𤣥纁也先王之制婚禮其用財不過如此則婦人之所飾可知矣以為合二姓之好上以事宗廟下以繼後世而不在財也是以梁鴻鄙孟光之綺繡袁隗却馬倫之囊裝王通亦曰婚娶論財夷虜之道也後世之俗有以金幣相髙葢不知此請期納采以至納徴主人不辭而請期辭者以期在夫家而不在主人也請期曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日葢惟父之昆弟已與子之昆弟無死喪之凶然後可以行禮焉其言止於三族而不及母妻之黨者雜記曰大功之末可以冠子嫁子妻之父母小功也故不避焉親迎將迎則齋戒居外鬼神隂陽也及期則初婚之時父醮而命之曰往迎爾相承我宗事勉帥以敬先妣之嗣子諾乃行至于門外主人筵于戶西西上右几女立于房中南面主人迎于門外賓執鴈従至于廟門揖入升階奠鴈稽首降出婦従降自西階主人不降送壻御婦車授綏婦乘以几壻先俟于門外此所謂男帥女女従男夫婦之義由此始也納幣必以使而春秋之時有親行之者莊公如齊納幣是也逆女必親而春秋之時或以使公子翬公子遂如齊逆女是也應親而不親不應親而親之此春秋所以譏耳禮必親迎若不親迎則有婦入三月壻見之儀存焉禮書卷六十五
