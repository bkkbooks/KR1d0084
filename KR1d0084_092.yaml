body:
  text: 禮書卷九十三宋陳祥道撰蠟臘蠟主先嗇而祭司嗇則先嗇居主位而司嗇居配位矣蠟祭及天宗而天宗者日月之類日月雖尊非其所主故記言大蠟八而日月不與也鄉飲酒禮僎固尊矣不居正位與此意同周禮黨正國索鬼神而祭祀則以禮屬民而飲酒于序鼓人凡祭祀百物之神鼓兵舞帗舞者大宗伯以疈辜祭四方百物司服祭羣小祀則玄冕大司樂凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神籥章國祭蠟則吹豳頌擊土鼓以息老物羅氏蠟則作羅襦考工記梓人張獸侯以息燕鄭氏曰休農息老物月令孟冬天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀勞農而休息之鄭氏曰此周禮所謂蠟也郊特牲曰天子大蠟八伊耆氏始為蠟蠟也者索也嵗十二月合聚萬物而索饗之也蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也迎貓為其食田鼠也迎虎為其食田豕也祭坊與水庸事也皮辨素服而祭素服以送終也葛帶榛杖喪殺也黃衣黃冠而祭息田夫也祭謂既蠟臘先祖五祀也八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息已故既蠟君子不興功息民與蠟異則黃衣黃冠而祭為臘必矣禮運曰昔者仲尼與於蠟賔事畢出逰於觀之上喟然而歎明堂位曰大蠟天子之祭也雜記子貢觀蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也孔子曰百日之蠟一日之澤非爾所知也傳曰夏曰嘉平商曰清祀周曰大蠟秦初曰臘後曰嘉平左氏曰虞不臘矣揚子曰若牛羊用人則狐狸螻蚓不膢臘也蠟之為祭所以報本反始息老送終也其服王玄冕而有司皮辨素服葛帶榛杖其牲體疈辜其樂六樂而奏六變吹豳頌擊土鼓舞兵舞帗舞其所致者山澤川陵以至土示天神莫不與焉則合聚萬物而饗之者非特八神也而所重者八以其尤有功於田故也其神之尊者非特先嗇也而主先嗇以其始有事於田故也鄭氏曰先嗇若神農者司嗇后稷是也農田畯也郵表畷田畯所以督約百姓於井間之處也爾雅曰畯農夫也然則蠟之八神則先嗇也司嗇也百種也農也郵表畷也禽獸也坊也水庸也古者蠟則飲于學黨正屬民飲酒于序是也既蠟則臘先祖五祀于廟仲尼與於蠟賔事畢出逰於觀之上是也然則臘亦謂之蠟矣先儒以郊特牲言皮辨素服而祭又言黃衣黃冠而祭則二祭之服不同月令言祈來年于天宗割祠于公社又言臘先祖五祀則祈臘之名不同於是謂皮辨素服而祭與祈來年於天宗蠟也黃衣黃冠而祭與臘先祖五祀臘也蠟以息老物臘以息民息民固在蠟後矣此記所以言既蠟而收民息已也周蠟於十有二月秦臘於孟冬皆建亥之月也晉侯以十二月滅虢遂襲虞宫之竒曰虞不臘矣則臘在蠟月可知矣古者臘有常月而無常日祖在始行而無常時繇漢以來溺於五行之説以王曰祖以衰曰臘其失先王之禮逺矣後周兼五天帝五人帝與百神而蠟於五郊唐不祭五天帝五人帝特蠟百神於南郊而闕其方之不登者然蠟因其順成之方以報神因其州之序以樂民則唐一於南郊非也蠟及天宗則日月星辰之類而已後唐兼天帝而祭之亦非也先儒謂蠟六奏樂而禮畢東方之祭則用太簇姑洗南方㽔賔西方夷則無射北方則黃鍾為均於理或然釁禮天府上春釁寶鎮及寶器小子掌珥於社稷祈于五祀玄謂珥讀為衈祈或為刉用毛牲曰刉羽牲曰衈刉珥社稷五祀謂始成其宫兆時士師凡刉珥則奉犬牲此刉珥正字與釁邦器及軍器大司馬涖釁主及軍器軍器鼓鐸之屬凡師既受甲迎主于廟及社主祝奉以從殺牲以血塗主及軍器皆神之龜人上春釁龜釁者殺牲以血之神之也月令孟冬釁祀龜䇿羊人釁積共其羊牲圉師春除蓐釁廄雞人凡祭祀靣禳釁共其雞牲釁廟用羊門夾室皆用雞大祝隋釁逆牲逆尸令鐘鼓右亦如之隋釁謂薦血也凡血祭曰釁既隋釁後言逆牲容逆鼎小祝大師掌釁祈號祝釁謂釁鼓也春秋傳曰君以軍行袚社釁鼓祝奉以從之女巫掌嵗時袚除釁浴釁浴謂以香薰草藥沐浴鬯人大喪共其釁鬯釁尸以鬯灑使之香美士師凡刉珥則奉犬牲犬人凡幾珥沈辜用駹可也玄謂幾讀為刉珥當為衈刉珥者釁禮之事司約若有訟者則珥而辟藏玄謂殺雞取血釁其尸雜記曰成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣雍人拭羊宗人視之宰夫北靣于碑南東上雍人舉羊外屋自中中屋南靣刲羊血流于前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室又曰路寢成則考之而不釁釁屋者交神明之道也凡宗廟之器其名者成則釁之以豭豚春秋傳曰君以軍行袚社釁鼓祝奉以從又曰魯叔孫為子孟鍾饗大夫以落之孟子曰牛何之將以釁鐘説文曰釁血祭也象祭竈也文王世子曰始立學者既興器用幣注興當為釁唐制鐘鼓新成使羊豕一釁之皇太子親戎及大將出師則豭豕一釁鼓釁者塗釁以血交神明之道也廟成則釁室成不釁以室不可以神之也宗廟之器其名者釁非名者不釁以非名者不足以神之也記曰成廟之釁其禮祝宗人宰夫雍人皆爵辨純衣雍人拭羊宗人視之宰夫北靣于碑南東上雍人舉羊升屋自中中屋南靣刲羊血流于前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室然則周官羊人釁共羊牲將以釁廟也雞人釁共雞牲將以釁門及夾室也犬人幾珥用駹禮記言宗廟之器釁之以豭豕則釁牲不特釁羊而已賈公彥曰或犬或羊俱得為釁是也小子珥于社稷祈于五祀羊人之祈衈犬人之幾珥士師之刉珥司約之珥鄭氏皆以為釁禮謂祈幾皆當為刉而珥當為衈毛牲曰刉羽牲曰衈其説蓋以禮記言釁而繼之以珥皆以屋下於是以祈珥為釁其詳不可考也羊人凡祈珥共羊牲士師凡刉珥奉犬牲犬人凡幾珥用駹雜記廟用羊門用雞皆云衈則衈非特用牲矣鄭之説誤也古之用釁者多矣若天府釁寶鎮及寶器小子釁邦器及軍器龜人釁龜圉人釁廄以至社稷五祀與夫師行之主藏約之户或釁於始成或釁於將用其禮豈一端哉然釁有司行事而君不親記曰有司事畢反命于寢君于門內朝服既反命乃退鄭氏曰君朝服者不至廟也犬羊為牲而牛馬不預有司爵辨而不冕牲駹而不純則釁之為禮也小矣後世有以牛釁鐘而甚者有叩人鼻以衈社此先王之所棄也大祝隋釁令鐘鼓鄭氏曰隋釁謂薦血也凡祭血曰釁女巫掌嵗時袚除釁浴鄭氏曰釁浴謂以香薰草藥沐浴也然釁浴之於釁禮名同而實異若夫隋釁則挼與釁也鄭氏合之以為薦血誤矣禮書卷九十三
