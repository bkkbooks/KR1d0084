  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_008-1a, image: WYG0130/WYG0130-0049a.png}
body:
  text: 禮書卷八宋陳祥道撰冠制司服凡甸冠弁服甸田獵也其服緇布衣亦素積以為裳諸侯為朝服曲禮父母存冠衣不純素深衣曰具父母衣純以青孤子當室冠衣不純采三十壯有室有代親之端不為孤也當室適子也深衣曰孤子衣純以素大夫士去國素衣素裳素冠徹縁厭冠不入公門檀弓曰古者冠縮縫今也衡縫今冠横縫以其辟積多故喪冠之反吉非古也亡大縣邑公卿大夫士厭冠哭於太廟將軍文子之喪既除喪越人来弔主人深衣練冠待于廟叔孫武叔之母死既小斂舉者出户出户袒且投其冠括髮冠素委貌范則冠而蟬有緌范蜂也蟬蜩也緌謂喙長在腹下文王世子曰文王有疾武王不説冠帶而養禮器曰晏平仲澣衣濯冠以朝君子以為隘矣郊特牲黄冠而祭息田夫也野夫黄冠黄冠草服也始冠緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也内則子事父母鷄初鳴笄總拂髦冠緌纓玉藻始冠緇布冠自諸侯下達冠而敝之可也𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也垂緌五寸惰游之士也𤣥冠縞武不齒之服也居官屬武自天子下達有事然後緌大帛不緌𤣥冠紫緌自魯桓公始也小記男子冠而婦人笄男子免而婦人髽雜記喪冠條屬以別吉凶三年之練冠亦條屬右縫小功以下左緦冠繰纓大白冠緇布之冠皆不蕤委武𤣥縞而右蕤委武冠卷也秦人曰委齊東曰武𤣥𤣥冠也縞縞冠也大夫冕而祭於公弁而祭於巳士弁而祭於公冠而祭於巳大記弔者襲裘加武武吉冠之卷也儒行孔子曰丘少居魯衣逢掖之衣長居宋冠章甫之冠儒有衣冠中動作慎儀禮士冠主人𤣥冠朝服緇帶素韠𤣥冠委貌也緇布冠缺項青組纓屬于缺缺讀如有頍者弁之頍緇布冠無笄者著頍圍髪際結項中隅為四綴以固冠也項中有􅕒亦由固頍為之耳今未冠笄者著卷幘頍象之所生也冠者易服服𤣥冠𤣥端爵韠奠摰見于君委貌周道也章甫殷道也母追夏后氏之道也委猶安也言所以安正容貌章明也商質言以表明丈夫也母發聲也追猶堆也夏后氏質以其形名之三冠皆所服以行道其制之異同未聞喪服斬衰裳苴絰冠纓纓條屬右縫冠六升外畢齊衰冠布纓公子為其母練冠麻衣為其妻縓冠斬衰冠六升受冠七升齊衰冠七升受冠八升既夕記冠六升外縪纓條屬厭特牲禮主人冠端𤣥𤣥端𤣥冠晉語范文子暮退於朝武子擊之以杖折委笄論語曰羔裘𤣥冠不以弔詩素冠曰庶見素冠兮南山曰葛屨五兩冠緌雙止甫田曰未幾見兮突而弁兮弁冠也孟子問陳相曰許子奚冠曰冠素曰自織之與曰否以粟易之萬章問招虞人何以曰以皮冠荀子曰其冠進其衣縫其容良是父兄之容也其冠進其衣縫其容慤是子弟之容也其冠絻其纓禁緩其容簡連是學者之嵬也又曰天子山冕諸侯𤣥冠大夫裨冕士韋弁禮也又曰哀公問於孔子曰章甫絇屨紳而搢笏者比賢乎孔子曰居今之俗服古之服舎此為非者雖有不亦鮮乎又曰魯哀公問舜冠於孔子孔子曰古之王者有務而拘領者也其政好生而惡殺焉務尚書大傳作冒莊子曰冠圜冠者知天時後漢志委貌冠皮弁冠同制長七寸髙四寸制如覆柸前髙廣後卑鋭所謂夏之毋追商之章甫者也委貌以皂絹為之皮弁以鹿皮為之進賢冠古緇布冠也公侯三梁中二千石以下至博士兩梁自博士以下至小史私學弟子皆一梁唐志緇布冠天子五梁三品以上三梁五品以上二梁九品以上一梁説文曰冠絭髮也白虎通曰冠者惓也所以卷持其髮冠制有梁有武有纓有緌有純荀卿稱魯公問舜冠於孔子孔子曰古者有務而拘領書大傳務作冒拘作句漢輿服志曰上古衣毛而冒皮後世聖人見鳥獸有冠角􅏋胡之制遂作冠冕纓緌以為首飾則古者冒而已及冠冕纓緌之作皆有所象也檀弓曰古之冠也縮縫今也衡縫故喪冠之反吉非古也雜記曰三年之練冠亦條屬右縫吉冠不條屬者通屈一條繩若布為武垂下為纓屬之冠吉冠則纓武異材右縫者右辟而縫之小功以下左左辟象吉輕也葢一幅之材順經為辟積則少而質順緯為辟積則多而文順經為縮縫順緯為衡縫古者吉凶之冠皆縮縫今吉冠衡縫而喪冠縮縫是喪冠與吉反矣故記者譏之右為隂左為陽凶隂事也大功以上右辟而縫之所以明凶也吉陽禮也小功以下左辟而縫之所以趨吉也其飾有縁其貫有笄其束有武其係有纓其垂有緌記曰素冠徹縁又曰縞冠素紕則冠有縁矣國語曰范文子擊其子折委笄則冠有笄矣居冠屬武則凡非居冠不屬矣喪冠不緌則凡吉冠皆緌矣古之冠其飾不過纓武縁其名不過母追章甫委貌而巳後世有長冠通天逺遊髙山竹皮進賢方山巧士却非却敵之制而其異有若鷸冠鶡冠其怪者有漉酒墊角之類非古也母追冠狀如覆柸郊特牲士冠禮記曰委貌周道也章甫商道也毋追夏后氏之道也鄭氏謂委猶安也言所以安正容貌章明也所以表明大丈夫也母發聲也追猶堆也夏后氏質以其形名之三冠皆所服以行道白虎通曰夏十三月為正其飾最大故曰母追母追言其追大也商十二月為正其飾微大故曰章甫章甫者尚未與極其本相當也周十一月為正萬物萌小冠飾最小故曰委貌委貌委曲有貌也漢輿服志曰委貌冠皮弁冠同制長七寸髙四寸制如覆柸前髙廣後卑鋭所謂夏之母追商之章甫者也委貌以皂繒為之然考白虎通所言則三冠之制異輿服志所言則三冠之制同禮文殘缺其制度名義莫究其詳大抵吉冠左辟喪冠右辟吉冠内畢喪冠外畢吉冠圜喪冠厭吉冠𤣥喪冠素吉冠不條屬喪冠條屬吉冠縁喪冠不縁吉冠𤣥喪冠不縁居冠屬武非居冠不屬武此其略也禮圖謂母追有覆柸之狀於義或然鄭司農釋周禮言夏后氏之牟追葢古者牟母通用也内則有敦以牟巵匜而牟乃食器則覆柸之説蓋有所傳也記曰大古冠布則母追章甫委貌不以布矣孔穎達謂三冠皆緇布為之誤也漢用皂繒記曰幼名冠字五十以伯仲死謚周道也毁宗躐行出于大門商道也直情而徑行戎狄之道也則所謂委貌周道章甫商道母追夏后氏之道者義亦若此鄭氏謂服以行道誤也章甫冠論語曰端章甫儒行曰孔子冠章甫之冠莊子曰孔子冠枝木之冠蓋枝木之冠即章甫也枝木其邸也古者喪冠厭而無邸吉冠邸而不厭章甫之邸枝木猶皮弁之邸象歟委貌冠釋名曰委貌上小下大論語曰羔裘𤣥冠不以弔左傳劉定公謂趙孟吾與子弁冕端委以治民臨諸侯晏平仲端委立于虎門國語晉侯端委以入武宫董安于曰臣端委以隨宰人蓋端衣委貌士以為祭服大夫士以為朝服私朝服之天子至士亦以為齋服故劉定公晉侯董安于皆得以服之范文子以杖擊其子折委笄士冠禮緇布冠有纓無笄則委貌與緇布異矣緇布冠不緌後世緇布冠有緌儀禮緇布冠缺項青組纓屬于缺賓筵前坐正纚右手執項左手執前郊特牲曰太古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也玉藻曰始冠緇布冠諸侯下達曰緇布冠繢緌諸侯之冠雜記曰大白緇布之冠不蕤又曰大夫卜宅與葬日緇布冠不蕤詩曰彼都人士臺笠緇撮蓋緇布冠有前有項纓屬于缺無緌焉後世以尊者不可以無飾故加繢緌玉藻曰緇布冠繢緌諸侯之冠則卑者無緌可知也緇布冠葢用之於始冠及大夫之卜宅與葬日而已庶人或以為常服也用之於始冠則𤣥端𤣥裳黄裳雜裳緇帶爵韠用之於卜宅與葬日則有司麻衣布衰布帶因喪屨若庶人則深衣焉賈氏曰庶人雖服委貌而儉者服緇布其詳不可考也鄭氏謂緇布缺項者缺讀如有頍者弁之頍緇布冠無笄者著頍圍髮際結項中隅為四綴以固冠然詩以頍為弁之貌則頍非缺資項矣鄭氏説缺項之制蓋有所傳讀缺項為頍無所經見緇布冠謂之緇撮則無梁矣漢志謂緇布冠為進賢冠公侯三梁中二千石至博士兩梁私學弟子一梁唐制天子五梁三品以上三梁五品以上二梁九品以上一梁非古也禮書卷八
