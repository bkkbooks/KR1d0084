body:
  text: 禮書卷三十四宋陳祥道撰九州冀禮河內曰冀州兖書濟河惟兖州禮河東曰兖州青書海岱惟青州禮正東曰青州徐書海岱及淮惟徐州揚書淮海惟揚州禮東南曰揚州荆書荆及衡陽惟荆州禮正南曰荆州豫書荆河惟豫州禮正南曰豫州梁書華陽黑水惟梁州雍書黑水西河惟雍州禮正西曰雍州禮言共工霸九州黃帝書言地有九州則堯以前九州耳至舜之時洪水泛濫通道阻塞乃釐下土方設居方肇十有二州分冀為幽并分青為營州封十有二山建十有二牧然後政教之所加貢賦之所出有所統焉及水土既平禹又即舊域而辨之以為九州故書言禹別九州傳言貢金九牧則肇十有二州不在治水之後矣孔安國言禹治水之後始制十有二州誤也禹貢先冀次兖以治水始於近也周官先揚次荆以治地先於逺也商書言九有之師商頌言奄有九有式于九圍王制於商亦言九州千七百七十三國則商之九州蓋亦襲夏而已先儒以爾雅之九州為商制於義或然然禹貢有徐梁而無幽并爾雅有幽營徐而無梁并青周禮有幽并而無徐梁則周之時徐梁入於青兖而析冀於幽并矣至漢武帝南置交趾北置四方之州兼徐梁幽并夏周之制改雍曰梁改梁曰益凡十三部則地域之判合因革固不常也班固曰冀州民多懻忮李巡曰兖信也徐舒也揚輕也荆強也豫舒也雍壅也冀近也謂兩河之間情性相近其論俗方之情性大槩或然然以冀為近則與班異矣蓋民生天地之間其剛柔緩急繫水土之風謂之風好惡取舍隨君上之情欲謂之俗故太平之人仁丹穴之人智太蒙之人信倥侗之人武秦人上氣力先獵射燕人少思慮多輕薄凡此皆地使之然也陳楚之信巫重祀衛之亟會流淫魏之薄恩生分周之高富下仕韓之椎剽跕屣燕之輕色急人齊之侈詐不悁吳粵之好劍輕死朝鮮貴正信而尚禮嚴重亷恥而尚禮義宋多君子而好稼穡凡此皆俗使之然也班固以鄭俗流淫繫於狹險之所居以揚州多士本於淮南王之所化是不和鄭風所刺之由職方氏所辨之異也九州所宜冀州土白壤男三女田中中羊其利松柏稷其民五其畜牛其穀黍兖州土黑墳魚田中下二貢漆絲其利蒲其民男三女篚織文擾其畜六其穀四種青州土白墳利田上下其貢鹽絺海物絲其蒲魚民二男二女篚檿其畜雞狗稻其穀宜麥徐州其赤埴墳篚玄纎縞田上中幽貢土五色周禮有州無徐州揚州土塗泥織田下下利貢金三品簜篚貝其金錫竹箭瑤琨篠其民二男五女其其畜宜鳥獸穀宜稻荆州土塗泥玄田下中品篚纁璣組貢羽毛齒革革金三其利丹銀齒其民一男二女穀其畜宜鳥獸其宜稻豫州土惟壤下土墳壚利田中上枲貢漆枲絺紵篚纎纊其林漆絲其民二男三女穀其畜六擾其五種梁州土青黎織田下上禮貢璆鐵銀鏤砮磬熊羆狐狸皮周有并無梁州爾雅無梁并青雍州土黃壤石田上上三貢琳球琅玕織皮馬其利玉其民男二女其畜牛其穀宜黍稷五地所宜山林毛物皂物民毛而方川澤鱗物膏物民黑而津丘陵羽物核物民專而長墳衍介物莢物民晳而瘠原隰裸物叢物民豐肉而庳書禹貢冀州厥土惟白壤厥田中中兖州厥土黑墳厥田中下厥貢漆絲厥篚織文青州厥土白墳田上下貢鹽絺海物惟錯岱畎絲枲鉛松怪石厥篚檿絲徐州厥土赤埴墳田上中貢土五色厥篚玄纎縞揚州厥土塗泥田下下貢金三品厥篚織貝豫州厥土惟壤下土墳壚田中上貢漆枲絺紵厥篚纎纊錫貢磬錯梁州厥土青黎田下上貢璆鐵銀鏤砮磬熊羆狐貍織皮雍州厥土黃壤田上上貢球琳琅玕周禮職方氏揚州其利金錫竹箭其民二男五女其畜宜鳥獸其穀宜稻荆州其利丹銀齒革其民一男二女其畜宜鳥獸其穀宜稻豫州其利林漆絲枲其民二男三女其畜宜六擾其穀宜五種青州其利蒲魚其民二男二女其畜宜雞狗其穀宜稻麥兖州其利蒲魚其民二男三女其畜宜六擾其穀宜四種雍州其利玉石其民三男二女其畜宜牛馬其穀宜黍稷幽州其利魚鹽其民一男三女其畜宜四擾其穀宜三種冀州其利松柏其民五男三女其畜宜牛羊其穀宜黍稷并州其利布帛其民二男三女其畜宜五擾其穀宜五種大司徒以土會之法辨五地之物生一曰山林其動物宜毛物其植物宜皂物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黑而津三曰丘陵其動物宜羽物其植物宜核物其民専而長四曰墳衍其動物宜介物其植物宜莢物其民晳而瘠五曰原隰其動物宜裸物其植物宜叢物其民豐肉而庳以土均之法辨五物九等制天下之地征九等騂剛赤緹之屬載師掌任土之法以物地事物物色之以知其所宜土均掌平土地之政以均地守以均地事以均地貢草人掌土化之法以物地相其宜而為之種凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕疆㯺用蕡輕爂用犬土方氏以辨土宜土化之法而授任地者土宜謂九穀植稚所宜也土化地之輕重糞種所宜用也任地者載師之屬鴻列子曰土地各以其類生是故山氣多男澤氣多女障氣多喑風氣多聾林氣多癃木氣多傴岸下氣多腫石氣多力險阻氣多癭暑氣多天寒氣多夀谷氣多庳丘氣多狂衍氣多貪輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重堅土人剛弱土人肥壚土人大沙土人細息土人美耗土人醜汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而宜黍漢水重安而宜竹江水肥仁而宜稻平土之人慧而宜五穀爾雅曰太平之人仁丹穴之人智太蒙之人信倥侗之人武禮記王制凡居民材必因天地寒暖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜修其教不異其俗齊其政不易其宜中國戎夷五方之民皆有性也不可推移東方曰夷被髮文身有不火食者矣南方曰蠻雕題交趾有不火食者矣西方曰戎被髮衣皮有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣中國夷蠻戎狄皆有安居和味宜服利用備器五方之民言語不通嗜欲不同達其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯大司徒以土會之法辨五地之物生以土宜之法辨十有二土之名物以相民宅而知其利害辨十有二壤之物而知其種以教稼穡樹藝鄭氏曰以萬物自生焉則言土土猶吐也以人所耕而種藝焉則言壤壤和緩之貌也孔安國曰無塊曰壤蓋無塊其質也和緩其性也禹貢冀州白而壤雍州黃而壤豫州厥土惟壤則壤色非一而已壤與墳埴塗泥雖殊而墳埴塗泥亦壤中之小别耳此所以禹貢總言三壤而周官總言十二壤也墳其起者也埴其黏者也壚其疏者也禹貢有墳壚孔安國鄭康成皆以壚為疏蓋有傳然也禹貢墳壤塗泥青黎各繫一州此言其大致而已然則草人土化之法凡地預有之也凡地高者宜黍稷下者宜稻麥山氣多男澤氣多女東南多絲纊西北多織皮先王之於民因其地以施教順其俗以行政山者不使居川澤者不使居中原居山者不以魚鱉為禮居澤者不以豕鹿為禮騂剛之地糞種不以羊赤緹之地糞種不以牛然後五方之民各安其性樂其業而無偏弊之患此大司徒土均載師土方氏草人所以有功於天下也十二分天有十二次日月之所躔地有十二辰王侯之所國周官大司徒辨十有二土十有二壤保章氏以星土辨九州所封封域皆有分星以觀妖祥蓋九州十二域或繫之北斗或繫之二十八宿或繫之五星則雍主魁冀主樞青兖主機揚徐主權荆主衡梁主開陽豫主搖光此繫之北斗者也星紀吳越也玄枵齊也娵訾衛也降婁魯也大梁趙也實沉晉也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也此繫之二十八宿者也嵗星主齊吳熒惑主楚越鎮星主王子太白主大臣辰星主燕趙代此繫之五星者也然吳越南而星紀在丑齊東而玄枵在子魯東而降婁在戌東西南北相反而相屬何耶先儒以謂古者受封之日嵗星所在之辰其國屬焉觀春秋傳凡言占相之屬以嵗之所在為福嵗之所衝為災故師曠梓慎禆竈之徒以天道在西北而晉不害嵗在越而吳不利嵗淫玄枵而宋鄭飢嵗棄星紀而周楚惡嵗在豕韋而蔡禍嵗及大梁而楚凶則古之言星次者未嘗不視嵗之所在也梓慎曰龍宋鄭之星也宋大辰之虛也陳太皞之虛也鄭祝融之虛也皆火房也衛髙陽之虛也其星為大水以陳為火則大皞之木為火母故也以衛為水則高陽水行故也子産曰高辛氏有二子伯曰閼伯季曰實沉居於曠林而不相能后帝不臧遷閼伯於商丘主辰商人是因故辰為商星遷實沉于大夏主參唐人是因故參為晉星然則十二域之所主亦若此也班固曰丙丁江淮海岱戊已中州河濟庚卒華山以西壬癸常山以北一曰甲齊乙東夷丙楚丁南夷戊魏已韓庚秦辛西夷壬燕趙癸壯夷子周丑翟寅趙卯鄭辰邯鄲已衛午秦未中山申齊酉魯戌吳越亥燕代北又以方位辨周土也禮書卷三十四
