body:
  text: 禮書卷八十宋陳祥道撰田獵周禮大宰田役以馭其衆小宰田役之聯事聽師田以簡稽獸人掌罟田獸辨其名物時田則守罟及弊田令禽注于虞中凡田獸者掌其政令幕人田役共其帷幕幄帟綬掌次師田則張幕設重帟重案諸侯師田則張幕設案大司徒大田役以旗致萬民而治其徒庶之政令鄉師凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟州長若國作民而師田行役之事則帥而致之掌其戒令與其賞罰黨正凡作民而師田行役則以其法治其政事族師若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰縣師若將有軍旅會同田役之戒則受法于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至遂人以歲時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施舍者以頒職作事以令師田凡事致野役而師田作野民帥而至掌其政治禁令遂師軍旅田獵平野民掌其禁令比叙其事而賞罰縣正若將用野民師田行役移執事則帥而至治其政令稍人若有㑹同師田行役之事則以縣師之法作其同徒輂輦帥而至治其政令以聽於司馬山虞若大田獵則萊山田之野及弊田植虞旗于中致禽而珥焉澤虞若大田獵則萊澤野及弊田植虞旌以屬禽迹人凡田獵者受令焉大宗伯大田之禮簡衆也小宗伯若大甸則帥有司而饁獸于郊遂頒禽凡王之㑹同甸役之禱祠肄儀為位肆師凡師田用牲于社宗則為位凡四時之大甸獵祭表貉則為位獮之日涖卜來歲之戒司几筵甸役則設熊席右漆几司服凡甸冠辨服甸祝掌四時之田表貉之祝號師甸致禽于虞中乃屬禽及郊饁獸舍奠于祖禰巾車木路前樊鵠纓建大麾以田司常凡軍事建旌旗及致民置旗弊之甸亦如之大司馬中春教振旅司馬以旗致民平列陳如戰之陳辨鼓鐸鐲鐃之用遂以搜田有司表貉誓民鼓遂圍禁火弊獻禽以祭社中夏教苃舍如振旅之陳遂以苗田如搜之法車弊獻禽以享礿中秋教治兵如振旅之陳遂以獮田如搜田之法羅弊致禽以祀祊中冬教大閲前期羣吏戒衆庶修戰法虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐羣吏聼誓于陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼓車馳徒走及表乃止鼓戒三闋車三發徒三刺乃鼓退鳴鐃且郤及表乃止坐作如初遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主既陳乃設驅逆之車有司表貉于陳前中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳及所弊鼓皆駴車徒皆譟徒乃弊致禽饁獸于郊入獻禽以享蒸田僕掌馭田路以田以鄙掌佐車之政設驅逆之車令獲者植旌及獻比禽凡田王提馬而走諸侯晉大夫馳司弓矢夾矢庾矢以授射鳥獸者殺矢鍭矢用諸近射田獵曲禮曰國君春田不圍澤大夫不掩羣士不取麛卵王制曰天子諸侯無事則歲三田一為乾豆二為賔客三為充君之庖三田者夏不田蓋夏時也無事而不田曰不敬田不以禮曰暴殄天物天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵獺祭魚然後魚人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛不卵不殺胎不妖夭不覆巢季春之月田獵置罘羅網畢翳餧獸之藥毋出九門孟夏之月毋大田獵季秋之月天子乃教田獵以習五戎班馬政五戎謂五兵弓矢殳矛戈㦸也命僕及七騶咸駕載旌旐授車以級整設于屏外屏所田之地門外之蔽司徒搢撲北靣誓之天子乃厲飾執弓挾矢以獵厲飾謂戎服尚威武也命主祠祭禽于四方郊特牲曰季春出火為焚也然後簡其車賦厯其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變而流示之禽而鹽諸利以觀其不犯命也求服其志不貪其得大羅氏天子之掌鳥獸者也諸侯之貢屬焉草笠而至尊野服也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國仲尼燕居曰以之田獵有禮故戎事間也大叔于田曰叔在藪火烈具阜還刺荒也哀公好田獵從禽獸而無厭盧令刺荒也襄公好田獵畢弋而不修民事駟鐡美襄公也始命有田狩之事詩曰公曰左之舍拔則獲左之者從禽之左射之也舍拔則獲言公善射豳詩曰一之日于貉取彼䝖貍為公子裘二之日其同載纘武功言私其豵獻豜于公大獸公之小獸私之車攻詩曰徒御不驚大庖不盈不驚驚也不盈盈也一曰乾豆二曰賔客三曰充君之庖故左膘而射之逹于右腢為上殺射右耳本次之射左膘逹于右骼下殺靣傷不獻踐毛不獻不成禽不獻禽雖多擇三十馬其餘以與大夫士以習射於澤宫田雖得禽射不中不得取禽田雖不得禽射中則得取禽古者以辭讓取不以勇力取吉日美宣王田也吉日維戊既伯既禱戊剛日也吉日庚午既差我馬外事以剛日差擇也公羊桓四年春公狩于郎狩者何田狩也春曰苗苗毛也明當毛物取未懷任者秋曰搜搜簡擇也簡擇幼稚取其大者冬曰狩狩猶獸也冬時禽獸長大遭獸可取不以夏田者春秋之制也諸侯曷為必田狩一曰乾豆一者第一之殺也自左膘射之逹于右腢中心死疾鮮潔故乾而豆之薦于宗廟二曰賔客二者第二之殺也自左膘射之逹于右髀逺心死難故以為賔客三曰充君之庖三者第三之殺也自左膘射之逹于右骼中腸􅠛汚泡死遲故以充君之庖厨巳有三牲必田狩者孝子之意以為巳之所養不如天地自然之牲逸豫肥美禽獸多則傷五穀因習兵事又不空設故因以捕禽獸所以供承宗廟示不忘武備又因以為田除害莊四年冬公及齊人狩于郜公曷為與微者狩齊侯也齊侯則其稱人何諱與讐狩也穀梁桓四年春公狩于郎四時之田皆為宗廟之事也春曰田夏曰苗秋曰搜冬曰狩四時之田用三焉唯其所先得一為乾豆二為賔客三為充君之庖昭八年秋搜于紅正也因搜狩以習用武事禮之大者也艾蘭以為防置旃以為轅門以葛覆質以為槷流旁握御轚者不得入車軌塵馬候蹄掩禽旅御者不失其馳然後射者能中過防弗逐不從奔之道也靣傷不獻不成禽不獻禽雖多天子取三十焉其餘與士衆以習射於射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也春秋傳曰惟君用鮮衆給而巳是天子諸侯有四時田獵之禮大夫士不與焉故鄭豐卷將祭請田而子産止之周官四時之田春搜以教振旅夏苖以教茇舍秋獮以教治兵冬狩以教大閲鄉師於凡田前期出田法于州里簡其兵器修其卒伍山虞萊山田之野澤虞萊澤野而大閲之禮為表百步則一表為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物帥民而致質明弊旗誅後至者羣吏聽誓于陳前教以坐作進退之節遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之既陳乃設驅逆之車有司表貉于陳前中軍以鼙令鼓銜枚而進獲者取左耳然則虞人所萊之野穀梁所謂艾蘭以為防是也毛氏曰艾草以為防以旌為左右和之門穀梁所謂置旗旃以為轅門葛覆質為槷是也毛氏曰褐纒梅為門裘纒質以為槷其未田也教戰于此及田則驅禽以入天子發則抗大綏諸侯發則抗小綏諸侯發然後大夫士發置虞於其中以致禽焉小宗伯帥有司而饁獸于郊遂頒禽則饁獸于郊者月令所謂既田命祠祭禽四方是也頒禽詩傳及穀梁所謂擇取三十焉其餘以豫大夫士是也田之服則冠辨服車則木路旗則大麾弓則夾弓庾弓矢則鍭矢殺矢其出也用牲于社宗而載之行其止也張幕設重帟重案而於是臨誓先王之於田宜社造廟祭馬祖繼之以饁于郊慎之至也詩傳言天子諸侯發則抗大綏小綏殺之時也王制言下大綏小綏既殺之時也曲禮國君春田不圍澤大夫不掩羣諸侯在國之禮也王制天子不合圍諸侯不掩羣諸侯從王搜之禮也周官司服凡田冠辨服月令季秋天子乃厲飾蓋周秦之禮異也火田周禮司爟季春出火季秋納火司烜氏中春以木鐸修火禁于國中司馬中春搜田火弊獻禽王制曰昆蟲未蟄不以火田郊特牲曰季春出火為焚也月令仲春之月毋焚山林爾雅曰火田為狩春秋傳曰古之火正或食於心或食於咮以出納火是故咮為鶉火心為大火鄭鑄刑鼎士文伯曰火未出而作火鄭其有災乎仲尼曰火伏而後蟄者畢蓋建辰之月鶉火見於南方則令民出火所謂季春出火是也建戌之月火伏於日下故令民納火所謂季秋納火是也司爟仲春修火禁以火未出而不可以作火故也王制昆蟲未蟄不以火田以火伏而後蟄者畢故也然孟春啓蟄而周禮中春之田有火弊者焚圃草以田可也焚山林以田不可也月令仲春禁焚禮也郊特牲季春出火為焚非禮也春秋之時楚子田使齊侯載燧此火田之所用者歟田禽五牲庖人掌共六畜六獸六禽辨其名物春秋傳言六畜五牲以奉五味昭公鄭司農云六獸麋鹿熊麕野豕兔六禽鴈鶉鷃雉鳩鴿鄭康成謂獸人冬獻狼夏獻麋又內則無熊則六獸當有狼而熊不屬六禽於禽獸及六摰宜為羔豕犢麋雉鴈杜預曰五牲麋鹿狼麏兔考之於詩曰一發五豝一發五豵並驅從兩肩並驅從兩狼言私其豵獻豜于公獸之所同麀鹿麌麌發彼小豝殪此大兕爾雅曰豕生三曰豵牝曰豝內則有鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉兔皆有芼又曰麋鹿魚為菹麕為辟雞野豕為軒兔為宛脾軒辟雞宛脾皆菹類也少儀麋鹿為菹野豕為軒皆聶而不切麕為辟雞兔為宛脾皆聶而切之特內則八珍有狼臅膏則六獸當有狼無熊如康成之說五牲當有野豕非如杜氏之論也射禽之儀馭法曰逐禽左秦詩曰公曰左之則禽之入防虞五豝奉辰牲而御者從左以逐之君從左以射之詩曰悉率左右以燕天子則亦驅左右之禽以趨於右也傳曰自左膘而射之達于右腢為上殺射右耳本次之射左膘達于右骼為下殺靣傷不獻踐毛不獻不成禽不獻禽雖多擇三十焉其餘以與大夫士以習射於澤宮蓋中心而死速者上殺也以為乾豆逺心而死綏者次殺也以待賔客中腸胃汙泡而死尤緩者下殺也以充君庖靣傷不獻為誅降也不成禽不獻為夭夭也擇取三十每禽擇三十而乾豆賔客君庖各十也考之於禮臡醢在豆脯臘在籩則乾物不施於豆矣言乾豆者周官臘人凡祭祀共豆脯薦脯孔頴達謂豆實有先脯之然後漬於理或然禮書卷八十
