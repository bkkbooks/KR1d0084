body:
  text: 禮書巻二十八宋陳祥道撰夏貢五十畮商助七十畮周徹百畮詩曰徹田為糧又曰徹申伯土疆有若謂魯哀公曰盍徹乎曰二吾猶不足王制曰古者公田藉而不税左傳曰穀不過藉以豐財也穀梁曰古者什一藉而不税公羊曰古者什一而藉多乎什一大桀小桀寡乎什一大貉小貉孟子曰夏后氏五十而貢商人七十而助周人百畮而徹其實皆什一也徹者徹也助者藉也龍子曰治地莫善於助莫不善於貢詩曰雨我公田遂及我私惟助為有公田由此觀之雖周亦助也又曰請野九一而助國中什一使自賦校數嵗之中以為常者夏后氏之貢也借民力以治公田者商人之助也兼貢助而通行之者周人之徹也周官載師園廛二十而一近郊十一遠郊二十而三甸稍縣都皆無過十二閭師任農以耕事貢九穀司稼巡野觀稼以年之上下出歛法此周之貢法也詩曰雨我公田遂及我私旅師有耡粟許慎釋耡為助孟子曰九一而助穀梁曰什一藉而不税此周之助法藉而不税則同乎商王制言古者公田藉而不税鄭氏以為商制其貢法以年上下則異乎夏然夏之民耕五十畮而以五畮貢商之民耕七十畮而以七畮助皆什内之一周之民耕百畮以公田十畮徹什外之一孟子言其實皆什一者以其法雖少異而其實不離什一也孟子曰請野九一而助國中什一使自賦九一自地言之也什一自物言之也鄭氏釋匠人謂通其率以什一為正孔頴達之徒申之謂助則九而貢一貢則什一而貢一通率為什一是助之所取者重貢之所取者輕非孟子之意也夏商周之授田其畆數不同何也禹貢於九州之地或言土或言作或言又葢禹平水土之後有土焉而未作有作焉而未又則於是時人功未足以盡地力故家五十畆而已㳂歴商周則田浸闢而法備矣故商七十而助周百畆而徹詩曰信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畆則法略於夏備於周可知劉氏皇氏謂夏之民多家五十畆而貢商之民稀家七十畆而助周之民尤稀家百畆而徹熊氏謂夏政寛簡一夫之地税五十畆商政稍急一夫之地税七十畆周政極煩一夫之地盡税焉而所税皆什一賈公彦謂夏五十而貢據一易之地家二百畆而税百畆也商七十而助據六遂上地百畆萊五十畆而税七十五畆也周百畆而徹據不易之地百畆全税之如四子之言則古之民常多而後世之民愈少古之税常輕而後世之税愈重古之地皆一易而後世之地皆不易其果然哉五溝書曰濬畎澮距川語曰禹盡力乎溝洫遂人夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川匠人廣尺深尺謂之甽田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仭謂之澮専達於川凡溝逆地阞謂之不行水屬不理孫謂之不行梢溝三十里而廣倍凡行奠水磬折以參伍凡為溝必因水勢防必因地勢善溝者水潄之善防者水淫之凡溝防必一日先深之以為式然後可以傳衆力雍氏掌溝瀆澮池之禁凡害於國稼者春令為阱擭溝瀆之利於民者稻人掌稼下地以豬畜水以防止水以溝蕩水以遂均水以列舍水以澮冩水王制曰方百里者為田九十億畆山陵林麓川澤溝瀆城郭宫室涂巷三分去一其餘六十億畆月令季春命有司修和隄防導達溝瀆孟秋完隄防謹壅塞以備水潦八月宿值畢畢好雨郊特牲曰祭防與水庸事也荀卿曰修隄防通溝澮行水潦安水藏以時决塞嵗雖凶旱使農夫有所耘艾司空之事也班固曰后稷始甽田以二耜為耦廣尺深尺長終畮一畮三甽一夫三百甽而播種於甽中亢倉子曰甽欲深以耑畮欲沃以平遂人言五溝之制而始於遂匠人言五溝之制而始於甽則甽非溝也乃播種之地而已一甽三甽一夫三百甽甽從則遂横甽横則遂從遂從則溝横遂横則溝從由溝以達洫由洫以達澮其横從如之春秋傳稱晉人使齊之封内盡東其畆國佐對曰先王疆理天下物土之宜而布其利故詩云我疆我理南東其畆今吾子疆理諸侯而曰盡東其畆而已惟吾子戎車是利無顧土宜其無乃非先王之命者乎葢天下之地勢西北髙而東南下故古者或東其畆或南其畆畆之所嚮溝涂隨之則南東其畆者亦其大致如此而已不必盡然鄭氏曰以南畆圖之遂從溝横洫從澮横九澮而川周其外然川之所流當適地泐非於萬夫之外必有大川圍而匝焉頴達疏詩謂鄭氏所言特設法耳其説是也溝洫之於田野可决而决則無水溢之害可塞而塞則無旱乾之患荀卿曰修隄防通溝洫行水潦安水藏以時决塞則溝洫豈特通水而已哉稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水此又下地之制與遂人匠人之法異也考工記所謂水屬者屬溝洫也所謂梢溝者溝末也自溝末言之謂之梢溝自田端言之謂之田首溝遠而不倍不足以容水水行而不磬折不足以殺其勢觀易坎為弓輪而河亦百里一曲千里一曲一直則溝洫之制磬折可知矣先王之時通九川陂九澤溝洫絡脉布於天下則無適而非水利也及井田廢而阡陌作於是史起引漳以富河内鄭國鑿涇以注關中李冰壅江以灌蜀地畨係引汾以溉蒲阪以至白公之於渭邵信臣之於南陽馬臻之於鏡湖張闓之於新豐塘劉義欣之於芍陂鉗盧李襲稱之於雷陂史臣書之以為異績此特名生於不足耳五涂遂人夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路鄭氏曰徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌其説葢以匠人之制推之也匠人王城經涂九軌環涂七軌野涂五軌環涂以為諸侯經涂野涂以為都經涂由是差之諸侯環涂五軌野涂三軌都之環涂野涂皆三軌則遂人路容三軌道容二軌以至徑容牛馬理或然也匠人曰凡溝必因水勢防必因地勢善溝者水漱之善防者水淫之凡為防廣與崇方其殺三分去一大防外殺葢溝成則涂立涂立則防立遂溝洫澮川雖不同皆謂之溝司險曰五溝是也徑畛涂道路雖不同皆謂之涂司險曰五涂是也然涂不特如此而已亦謂之旅記曰旅樹是也亦謂之行詩曰微行是也爾雅曰宫中衖謂之壺廟中路謂之唐堂途謂之陳一達謂之道路二達謂之岐旁三達謂之劇旁四達謂之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵葢涂莫小於徑莫大於路莫枝於逵書言無有作好遵王之道無有作惡遵王之路以作好之利小作惡之害大故也兎置之詩言在彼中逵在彼中林以中逵之徳顯中林之徳晦故也量人掌天下之涂數皆書而藏之國語司空視涂葢藏其數欲知所達之遠近視之欲察其涂之修否禮書卷二十八
