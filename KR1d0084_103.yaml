body:
  text: 禮書卷一百四宋陳祥道撰洗罍槃匜枓盆士喪盆盥周禮鬱人凡裸事沃盥小祝大祭祀沃尸盥小臣大祭祀朝覲沃王盥御僕大祭祀相盥而登天府凡吉凶之事祖廟之中沃盥士師祀五帝則沃尸及王盥洎鑊水士冠禮設洗直于東榮士昏設洗于阼階東南鄉飲酒鄉射設洗于阼階東南皆水在洗東大射設洗于阼階東南罍水在東燕禮設洗篚于阼階東南罍水在東特牲設洗于阼階東南尸盥匜水實于槃中簞巾在門内之右少牢司宫設罍水于洗東有枓小祝設槃匜與簞巾于西堦東盛水者罍也㪺水者枓也盛棄水者洗也天子諸侯之屋四注故洗當東霤大夫士之屋兩下故洗當東榮水在洗東祖左海也南北以堂深則逺近也公食大夫鄉飲鄉射言洗與水而不及罍大射燕禮言罍水而不及枓少牢兼言罍水有枓互相備矣故鄭氏于少牢言凡設水用罍沃盥用枓禮在此也洗皆在東階士虞設于西階西南反吉禮也篚皆在洗西士虞篚在洗東以洗在西階也然罍洗者臣下之所就熟耳若人君與尸則有槃匜焉公食大夫小臣具槃匜在東堂下士虞匜水錯于槃中南流特牲尸盥匜水實于槃中少牢小祝設槃匜葢人君與尸尊不就洗故設槃匜則匜之用猶罍水也槃之用猶洗也開元禮皇帝皇后行事有槃匜亞獻以下及攝事者無之亦尊君不就洗之義士喪設盆盥于饌東則奠禮未用罍洗歟筥説文曰筥筲也宋魏之間謂箸筩為筲則其制圓而長矣米筥葢亦類此詩曰維筐及筥筐之筥之周禮舍人賔客共其筥米掌客上公米百二十筥侯伯百筥子男八十筥左傳曰筐筥錡釡之器聘禮君使卿歸饔餼賔與上介皆米百筥筥半斛夫人使大夫歸饔餼賔上介米八筐士介六筐筐五斛夫百筥以多為榮而所實少八筐六筐以少為質而所實多則筐大而筥小矣於文筐正而筥圍之則筐方而筥圓矣杜預曰方曰筐圓曰筥天下之物固有同名而異實聘禮記曰四秉曰筥十筥曰稷則秉把也與十藪之秉不同筥穧也與半斛之筥不同篋士冠禮緇布冠缺項以至緇紐紡同篋士喪禮復衣受用箧浴衣盛以箧禮記言入學鼓篋史言亡書三篋則篋所以盛衣亦盛書也鄭氏曰隋方曰篋隋者狹而長也箧亦謂之笈史稱蘇章負笈笲昏禮婦執笲棗栗以見舅又執笲腵修以見姑舅姑没則執笲菜以見廟聘禮釋幣埋之實以笲士喪禮貝三實以笲沐浴巾盛以笲昏禮記曰笲緇被纁裏加于橋鄭氏曰笲竹器而衣者其形葢如今之筥蘆此以漢制况之也舊圖笲揜上於理或然簞笥儀禮士冠士喪實櫛于簞士虞特牲少牢盥以簞巾禮曰凡以簞笥問人者左傳曰吳王以一簞珠問趙孟哀二十年論語孟子簞食漢律令曰簞小筐也鄭氏釋儀禮曰簞笥也説文亦曰簞笥也釋曲禮曰圓曰簞方曰笥簞笥飯器也然書曰衣裳在笥則笥亦盛衣匴士冠禮爵弁皮弁緇布冠各一匴鄭氏曰匴竹器名今之冠箱説文曰匴淥米藪也禮書卷一百四
