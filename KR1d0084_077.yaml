body:
  text: 禮書卷七十八宋陳祥道撰大夫肵俎士肵俎禮記曰肵之為言敬也郊特牲記肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎鄭氏曰立縮順其牲心舌知食味者欲尸之饗此祭是以進之少牢禮心舌載于肵俎心皆安下切上午割勿沒其載于肵俎末在上舌皆切本末亦午割勿沒其載于肵橫之則士之肵俎立舌而不立心大夫之肵俎立心而不立舌士之載縮俎則於俎為縮於人為橫大夫之載橫之則於俎為橫於人為縮特牲尸九飯乃盛肵俎下大夫八飯即盛肵俎則士之肵俎盛於飯後下大夫之肵俎盛於飯間矣士九飯少牢十一飯下大夫亦十一飯肵俎之禮其升心舌則佐食也其設之則阼階西也其羞之則主人也其置之則臘北膚北也特牲主人羞肵俎臘北少牢主人羞肵俎升自阼階置于膚北制之在合亨之前羞之在尸食舉之後尸之舉幹舉骼舉魚舉肩以至舉肺正脊佐食受之加于胙俎而俎釋三箇以備陽厭則神俎之體歸於肵俎多矣士喪禮無肵俎祭殤無肵俎無尸故也士虞禮不以肵俎而以篚尚質故也特牲尸謖佐食徹尸俎有司徹司士歸尸俎士虞出從者奉篚哭從之則與諸臣之自徹者有間歟腸胃膚少儀曰君子不食圂腴鄭康成曰惟燖者有膚則牛羊有腸胃而無膚豕有膚而無腸胃豕雖有膚然四解而未體折無膚豚而未成牲無膚士喪禮豚皆無膚以未成牲故也既夕禮大遣奠少牢四解無膚以未體折故也士虞禮膚祭三取諸左膉上膉脰也鄭康成曰膚脅革肉蓋豕肉之美者不過脅革肉而巳故禮於膚皆謂之倫膚東晉所謂禁臠者豈此類歟公食大夫魚腸胃倫膚若九若十有一下大夫若七若九蓋士一命故其數七小國之卿次國之大夫再命故其數九大國之卿三命故其數十一公食大夫膚與牲皆七而少牢膚與牲體皆九隆於祭禮故也聘禮腸胃與膚不同鼎公食大夫腸與膚不同俎腸胃常在先膚常在後者以腸胃出於牛羊膚出於下牲故也公食大夫腸胃膚皆橫諸俎垂之少牢肵俎腸胃皆及俎拒蓋腸胃之長及俎拒膚則垂之而巳脯周禮臘人掌乾肉凡脯臘膴胖之事內則牛修鹿脯田豕脯麋脯大夫燕食有膾無脯有脯無膾郊特牲曰大饗尚腵修少儀曰其以乘壺酒束修一犬賜人若獻人則陳酒執修以將命先儒謂薄析曰脯捶而施薑桂曰段然則腵猶濁氏之冒脯也食貨志注胃以椒薑腵析而段之修則其體長矣脯之於禮可以為輕可以為重可以用之於前可以羞之於後膳夫凡王祭祀賔客則有俎凡稍食則脯醢而巳冠禮三加有乾肉折俎始醮再醮則脯醢而巳喪禮則大斂卒塗朔月既夕士虞有牲體魚臘之俎小斂則特豚脯醢而巳以脯醢之於魚臘俎為輕故也大饗有腥熟尚段修以禮賔冠禮有牲俎取脯以見母昏禮賔取脯以授從者燕禮賔執脯以賜鍾人又昏禮婦贄腶脯以見姑學者束修以見師以脯之於禮為重故也用之於前則冠禮始醮再醮之類是也羞之於後則籩人加籩之實㮚脯是也蓋脯割之也謂之尹曲禮士虞所謂尹祭是也體之直也謂之脡士虞禮所謂脯四脡是也脡亦作挺鄉飲禮所謂薦脯五挺是也脡亦謂之膱鄉射禮薦臘用籩五膱祭半膱膱長尺二寸是也鄉飲鄉射大夫禮也故五挺士虞士禮也故四挺春秋之時齊侯唁昭公于野井以四挺脯蓋野禮之禮歟曲禮曰以脯修置者左胊右末儀禮俎設于脯醢秉朐在南臘周官獸入于臘人臘人掌乾肉凡田獸之脯臘膴胖之事蓋析而乾之曰脯全而乾之曰臘脯在籩臘在俎脯常先於醢臘常亞於魚禮有薧臘有鮮臘有全臘有胖臘或取以用或不用或取以祭或不祭或在庶羞或不在庶羞或先舉魚後舉臘或先舉臘後舉魚聘禮賔之飪鼎九有魚臘鮮魚鮮臘上介飪鼎七無鮮公食大夫上大夫之俎九有魚臘加鮮魚鮮臘下大夫之俎七無鮮而昏禮臘必用鮮則用鮮者禮之所隆也少牢鼎臘一純特牲士冠昏之類皆用全士喪大斂士虞既夕胖而巳則不用全者禮之所略也昏禮厥明婦饋舅姑特豚無魚臘既夕禮徹巾苞不以魚臘以非正牲故也公食大夫禮魚臘醬湆不祭以預正饌故也若入庶羞故祭公食大夫若不親食魚臘陳於碑內有司徹升羊豕魚三鼎而無臘以在庶羞故也特牲後舉魚以三俎臘皆三舉故也少牢後舉臘以臘魚皆一舉故也夫臘之骨也如牲體卒塗之臘進祗未異於生也少牢之臘進下異於生也其載之也上肩其舉之也以肩鄭氏六體始於正脊終於肩昏禮臘肫髀不升喪禮臘髀亦不升而少牢祝俎髀屬于尻有司徹臘辨無髀則臘之賤髀亦與牲同矣禮器曰大饗其王事歟三牲魚臘四海九州之美味也則天子之臘凡田獸在焉儀禮大夫臘用麋鄭康成曰士臘用兔然特牲臘用獸則茍有獸焉可也孰謂必用兔耶禮書卷七十八
