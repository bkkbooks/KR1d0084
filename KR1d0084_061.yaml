body:
  text: 禮書卷六十二宋陳祥道撰大宗小宗喪服小記别子為祖繼别為宗繼禰者為小宗有五世而遷之宗宗其繼高祖者也是故祖遷於上宗易於下尊祖故敬宗敬宗所以尊祖禰也大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼高祖者五世則遷者也有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也曲禮曰支子不祭祭必告於宗子文王世子曰五廟之孫祖廟未毁雖為庶人冠取妻必告死必赴練祥則告宜弔不弔宜免不免有司罰之至于賵賻承含皆有正焉小記曰支子不祭明其宗也內則曰適子庶子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也若非所獻則不敢以入宗子之門不敢以貴富加於父兄宗族若富則具二牲獻其賢者於宗子夫婦皆齊而敬宗焉終事而后敢私祭曽子問孔子曰宗子雖七十無主婦非宗子雖無主婦可也曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事若宗子有罪居于他國庶子為大夫其祭也祝曰孝子某使介子某執其常事其辭於賔曰宗兄宗弟宗子在他國使某辭曾子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告於墓而后祭於家宗子死稱名不言孝身沒而巳子遊之徒有庶子祭者以此若義也今之祭者不首其義故誣於祭也孔子曰宗子為殤而死庶子弗為後也其吉祭特牲祭殤不舉肺無肵俎無𤣥酒不告利成是謂隂厭凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭昏禮記曰女子許嫁稱字祖廟未毁教于公宫三月若祖廟巳毁則于宗室周禮太宰宗以族得民大宗伯以飲食之禮親宗族兄弟小宗伯掌三族之别以辨親疏其正室皆謂之門子瞽矇掌諷誦詩世奠繫謂帝繫諸侯即大夫世本之屬小史掌邦國之志奠繫世辨昭穆諸子掌國子之倅公卿大夫士之副二儀禮喪服為人後者為其父母報傳曰何以期也不二斬也特重於大宗者降其小宗也為人後者孰後後大宗宗也曷為後大宗尊之統也禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊統上卑者尊統下大宗者尊之統也大宗者收族者也不可以絶故族人以支子後大宗也適子不得後大宗女子子為昆弟之為父後者何以亦期也婦人雖在外必有歸宗曰小宗故服期也丈夫婦人為宗子宗子之母妻傳曰何以服齊衰三月也尊祖也尊祖故敬宗敬宗者尊祖之義也宗子之母在則不為宗子之妻服也大夫為宗子何以服齊衰三月也大夫不敢降其宗也諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别於尊者也若公之子孫有封為國君者則世世祖是人也不祖公子此自尊别於卑者也是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫盡臣諸父昆弟詩曰宗子維城又曰大宗維翰百夫無長不散則亂一族無宗不離則踈先王因族以立宗敬宗以尊祖故吉凶有以相及有無得以相通尊卑有分而不亂親踈有别而不二儀禮所謂不二斬之類貴賤有繫而不間文王世子曰雖為庶人冠取妻必告然後一宗如出乎一族一族如出乎一家一家如出乎一人此禮俗所以刑而人倫所以厚也蓋公子不得禰先君故為别子而繼别者族人宗之為大宗遠雖至於絶屬猶為之服齊衰三月母妻亦然庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而巳小宗高祖之正體其别有四則繼禰者兄弟宗之繼祖者從兄弟宗之繼曾祖者從祖兄弟宗之繼高祖者族兄弟宗之四世則親盡屬絶而不為宗矣然言繼别為宗又言繼别子之所自出者言繼禰為小宗又言宗其繼高祖者則繼别者别子之子也繼别子之所自出者即别子也繼禰者庶子之子也繼高祖者五世之孫也繼禰言其始繼高祖言其終繼别言其宗繼别子之所自出言其祖經言繼别子之所自出而孔頴達言别子之所由出然則别子所由出即國君也其可宗乎榖梁曰燕周之分子也分子即别子也然别子不特公子而巳有來自他邦而為卿大夫者亦謂之别子有起於民庶而為卿大夫者亦謂之别子有小宗而無大宗有大宗而無小宗有無宗亦莫之宗諸侯之公子上不得宗君下未為後世之宗必有以統之故有三者之宗道也君無適昆弟使庶昆弟一人為宗統公子禮如小宗故曰有小宗而無大宗君有適昆弟使之為宗以統公子不復立庶昆弟為宗故曰有大宗而無小宗公子一而巳無公子可宗亦無公子宗之故曰有無宗亦莫之宗儀禮曰都邑之士則知尊禰學士大夫則知尊祖記曰公子之公為其士大夫之庶者宗其大夫之嫡者荀卿曰大夫士有常宗左傳曰大夫有二宗蓋由士以上莫不知尊祖禰知尊祖禰則尊者常宗當其為宗則宗子統族人於外主婦統族婦於內死雖殤也必喪以成人齒雖七十也主婦不可闕居雖異邦也正祭不可舉妻死雖母在也禫不可屈尊與出嫁者不敢降其服賢者不敢干其任貴者不敢擅其祭衆車徒不敢以入其門凡以尊正統而一人之情也惟其疾與不肖然後易之故史朝言孟縶非人也將不列於宗賀循言奸回淫亂則告廟而立其次凡此特義之權耳非其所得巳者也方周之盛時宗族之法行故常棣行葦之美作於上角弓頍辨之刺不聞於下以此治國而國有倫以此繫民而民不散則宗子之於天下豈小補哉及秦用商君之法富民有子則分居貧民有子則出贅由是其流及上雖王公大人亦莫知有敬宗之道浸淫後世襲以為俗而時君所以統馭之者特服紀之律而巳間有糾合宗族一再傳而不散者則人異之以為義門此名生於不足歟辨嫡上子服父三年父以尊降服子朞而長子三年以其傳重也孫服祖朞祖以尊降服孫大功而服適孫朞亦以其傳重也若適子在而適孫死則祖亦服大功以其有適子者無適孫也適子不在而祖死則適孫亦服三年以其無適子者適孫承其服也然則古者父死立適子適子死立適孫上以後先祖下以收族人謂之大宗大宗不可以絶故無子則族人以支子後之凡以尊正統而重適嗣也春秋左氏傳曰太子有母弟則立之無則立長年鈞擇賢義鈞則卜又曰王后無嫡則擇立長年鈞以德德鈞以卜以謂太子死而無後則立嫡子之母弟以其猶出於嫡室也無母弟則立庶長以其不得巳而立妾子之長也立妾子之長則無間於貴賤公羊曰立適以長不以賢立子以貴不以長桓何以貴母貴也何休曰禮嫡夫人無子立右媵子右媵無子立左媵子左媵無子立嫡姪娣子嫡姪娣無子立右媵姪娣子右媵姪娣無子立左媵姪娣子不識何據云然耶夫嫡室所以配君子奉祭祀者也媵與姪娣所以從嫡室廣繼嗣者也故內則以冡子母弟為嫡子書以母弟與王父同其重則太子死而無後立太子之母弟可也均妾庶也而立其母之貴者可乎左氏曰非嫡嗣何必娣之子又曰王不立愛公卿無私蓋言此也禮言為後者四有正體而不傳重嫡子有罪疾是也有傳重而非正體庶孫為後是也有體而不正庶子為後是也有正而不體嫡孫為後是也然傳至嫡孫嫡孫無後則必立嫡孫之弟猶太子之母弟也禮謂族人以支子後之蓋自其無弟者言之也今令文諸王公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曾孫以下准此若然是無嫡孫則舍嫡孫母弟而上取嫡子之兄弟無嫡曽孫則舍嫡曾孫母弟而上取嫡孫之兄弟嫡子之子宜立而不立嫡子之兄弟不宜立而立之是絶正統而厚旁支矣與禮大宗不可絶云不亦異乎辨嫡下木之正出為本旁出為枝子之正出為嫡旁出為庶故伐枝不足以傷木伐其本則木斃矣廢庶不足以傷宗廢其嫡則宗絶矣本固而枝必茂嫡立而庶必寧此天地自然之理也先王知其然於是貴嫡而賤庶使名分正而不亂爭奪息而不作故子生則冡子接以太牢庶子少牢冡子未食而見庶子巳食而見冠則嫡子於阼階庶子於房外死則嫡子斬庶子期其禮之重輕隆殺如此豈有他哉以其傳重與不傳重故也禮曰庶子不祭祖明其宗也又曰庶子不祭禰明其宗也史曰父不祭於支庶之宅君不祭於臣僕之家此嫡庶之分不可不辨也昔公儀仲子舍孫立子而檀弓弔以免司寇惠子舍嫡立庶而子遊弔以麻衰皆重其服以譏之欲其辨嫡庶之分而巳春秋之時宋宣公舍子與夷立弟穆公穆公又舍子馮立與夷而與夷卒於見殺莒紀公黜太子僕愛季他而卒於召禍晉獻公殺世子申生立奚齊而卒以亂晉齊靈公廢太子光立公子牙而卒以亂齊蓋嫡一而巳立之足以尊正統而一人之情庶則衆矣立之則亂正統而啓覬覦之心宋莒齊晉之君不察乎此每每趨禍良可悼也或曰易言大君有命開國承家禮言子以馭其幸則人君之於臣其所以立者無嫡庶之間耳然考之於古魯武公以括與戲見宣王宣王立戲仲山甫曰天子立諸侯而建其少是教逆也王卒立之其後魯人殺懿公而立括則魯之禍宣王為之也古之所謂開國承家者猶之别子為祖也為祖而不為宗則其所立者非為傳襲其先也果使之傳襲其先而不以嫡長則宣王巳事之驗可不鑒哉姓族氏詩曰振振公姓振振公族書曰錫土姓國語曰司商協民姓左氏稱衆仲曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之周語曰伯禹疏川導滯鍾水豐物皇天嘉之祚以天下賜姓曰姒氏曰有夏堯賜禹姓曰姒封之於夏謂其能以嘉祉富生物也祚四嶽國命為侯伯賜姓曰姜氏曰有吕謂其能為禹股肱心膂以養物豐民人也姓非天子不可以賜而氏非諸侯不可以命姓所以繫百世之正統氏所以别子孫之旁出族則氏之所聚而巳然氏亦可以謂之姓故大傳言繫之以姓又言庶姓别於上則氏庶姓一也氏又可以謂之族故羽父為無駭請族隱公命以為展氏則氏族一也蓋别姓則為氏即氏則有族族無不同氏氏有不同族故八元八凱出於高陽氏高辛氏而謂之十六族是氏有不同族也商氏條氏徐氏之類謂之六族陶氏施氏之類謂之七族宋之華氏謂之戴族向氏謂之桓族是族無不同氏也古者或氏於國則齊魯秦吳氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三烏五鹿氏於事則巫乙匠陶而受姓命氏粲然衆矣秦興滅學而周官小史之職於是繫世昭穆失其本宗及漢司馬遷約世本修史記因周譜明世家乃知姓氏之所由出至晉賈弼有姓氏簿狀賈希鏡有姓氏要狀唐李素有肉譜柳冲有姓系録而路敬韋述之徒傳述不一推叙昭穆使不相亂婚姻得之而有别親疏得之而有屬則姓氏之學其可忽哉國語曰教之世為之昭明德而廢幽昏以怵懼其動則姓氏又可以示天下後世之勸戒也禮書卷六十二
