body:
  text: 禮書禮類五通禮之屬提要臣等謹案禮書一百五十卷宋陳祥道撰祥道字用之福州人李豸師友談記稱其許少張榜登科又稱其元祐七年進禮圖儀禮注除館閣校勘明年用為太常博士賜緋衣不旬餘而卒又稱其仕宦二十七年止於宣義郎宋史則作官至祕書省正字然朝公武讀書志載是書亦稱左宣義郎太常博士陳祥道撰與豸所記同豸又稱嘗為禮圖一百五十卷儀禮說六十餘卷內相范公為進之乞送祕閻及太常寺陳振孫書録解題則稱元祐中表上之朝公武則稱朝廷聞之給札繕寫奏御宋史陳𤾉𫝊則稱禮部侍郎趙挺之言𤾉所著樂書二十卷案樂書實二百卷宋史字誤貫穿明備乞援其兄祥道進禮書故事給札則豸振孫所記為確公武朝聞之之說非其實也其中多掊擊鄭學如論廟制引周官家語荀子穀梁傳謂天子皆七廟與康成天子五廟之說異論禘祫謂圜丘自圜丘禘自禘力破康成禘即圜丘之說論禘大於祫並祭及親廟攻康成禘小祫大祭不及親廟之說辨上帝及五帝引掌次文闢康成上帝即五帝之說蓋祥道與陸佃皆王安石客案祥道為王安石之徒見朝公武讀書志祥道論語解條下安石說經既創造新義務異先儒故祥道與佃亦皆排斥舊說佃禮象今不𫝊惟神宗時詳定郊廟禮文諸議今尚載陶山集中大扺多生别解與祥道駁鄭略同蓋一時風氣所趨無庸深詰然宗其大致則貫通經傳縷析條分前圖後說考訂詳悉陳振孫稱其論辨精博間以繪畫唐代諸儒之論近世聶崇義之圖或正其失或補其闕朝公武元祐黨家李豸蘇門賓客皆與王氏之學異趣公武亦稱其書甚精博豸亦稱其禮學通博一時少及則其書固甚為當世所推重不以安石之故廢之矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
