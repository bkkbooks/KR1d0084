body:
  text: 禮書卷八十一宋陳祥道撰大夫廟門之位筮日主人西靣既宿尸主人南靣宗人北靣請期鄭氏曰大夫不西靣者尊於諸官有君道也祭日主人南靣視殺㸑特牲牲㸑在廟門外東南魚臘㸑在其南鼎少牢雍人陳鼎五三鼎在羊鑊西二鼎在豕鑊西鄭氏曰魚臘從羊膚從豕統於牲筮日史東靣受命記曰卜郊于禰宫又曰君致齊於外夫人致齊於內然後㑹於太廟則人君筮與祭日不在廟門矣大夫士與助祭者勢不相遠故於廟門之外以見之士廟門之位筮日及前祭主人西南子姓兄弟立于主人之南西靣北上祭日主人南靣視殺㸑牲㸑在廟門外東靣魚臘㸑在其南鼎北面北上棜在其南南順實獸于其上東首當門也牲在棜西北首東足筮日有司羣執事東靣北上筮者東靣受命前祭衆賔東靣北上宗人祝立于賔西北東靣南上祭日如初特牲筮日主人冠𤣥端即位于門外西靣子姓兄弟立其南西靣北上有司羣執事東靣北上前期三日筮尸如求日之儀前祭之夕主人兄弟即位于門東如初賔及衆賔即位于門西東靣北上宗人祝立于賔西北東靣南上既視壺濯宗人請期祭之日主人視殺立于門外東方南靣既而祝迎尸于門外主人降立于阼階東尸入門左少牢筮日主人朝服于門東既宿尸反為期于廟門之外主人門東南靣宗人北靣請祭期明日主人朝服即位于廟門之外東方南靣宗人西靣北上視刲羊擊豕乃退將祭主人即位于阼階東西靣司宫筵于奧祝出迎尸于廟門之外主人降立于阼階東西靣祝先入門右尸入門左然則士前祭立于廟門者五筮日一也筮尸二也前祭之夕將視濯具揖入三也既視復外位而請期四也祭之日視殺揖入五也大夫前祭立於廟門者四筮日一也筮尸二也既宿尸而請期三也祭之日視殺入四也蓋士遠君而伸故視濯具與視殺異日大夫近君而屈故視濯具與視殺同日然皆視殺於門外而巳天子諸侯其殺與大夫士異其視濯具以異日與士同然天子諸侯門外之禮無所經見郊特牲言作龜於禰宫則不於廟門矣太宰祭祀贊王牲事大司寇大祭祀納亨前王玉藻曰惟君黼裘以誓省則天子之於視濯具未嘗不親也尸次掌次凡祭祀張其旅幕張尸次鄭氏曰旅衆也公卿以下即位所祭祀之門外以待事為之張大幕尸則有幄考之幕人祭祀共其帷幕幄帟綏帷設於旁幕設於上幄則四合如屋者也帟則平帳承塵者也掌次於旅言幕於尸言次則次不特用幕而巳鄭氏謂尸則有幄是也特牲禮迎尸于門外尸入門左少牢禮祝出迎尸于廟門外祝先入門右尸入門左則次設於西孰矣尸次設於西孰則旅幕設東孰矣朝踐饋食禮運曰𤣥酒以祭薦其血毛腥其爼孰其殽醴盞以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫腥其爼謂豚解而腥之及血毛皆所以法於太古也孰其殽謂體解而燜之此以下皆所以法於中古也然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮此謂薦今世之食也體其犬豕牛羊謂分别骨肉之貴賤以為衆俎也正義曰𤣥酒以祭謂朝踐之時薦其血毛亦朝踐時醴盞以獻者朝踐之時用醴饋食之時用盞薦其燔炙謂燔肉炙肝特牲禮主人獻尸賔長以肝從主婦獻尸賔長以燔從則此君薦之用炙夫人薦用燔也退而合亨者前期薦燜既未孰今至饋食乃取嚮爓肉更合亨之令孰擬更薦尸爼惟載右體則左體亦鑊中亨之既熟乃分别骨之貴賤以為衆爼也禮器曰太廟之內敬矣君親牽牲大夫贊幣而從用幣告神殺牲君親制祭夫人薦盎親制祭謂朝事進血膋時所制者制肝洗於鬱鬯以祭於室及王君親割牲夫人薦酒親割謂進牲熟體時正義曰君親制祭夫人薦盎此謂薦殺牲巳畢進血腥之時斷制牲肝冼於鬱鬯入以祭神於室此時夫人薦盎侯伯子男之君朝踐君不獻故夫人薦盎君親割牲夫人薦酒者謂薦孰時君割牲體於時君亦不獻故夫人薦酒制肝洗於鬱鬯約漢法而知也納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位蓋道求而未之得也設祭于堂為祊乎外正義曰羮定詔于堂謂煮肉既熟將迎尸入室乃先以爼盛之告神於堂郊特牲曰周人尚臭既灌然後迎牲致隂氣也蕭合黍稷臭陽達於墻屋故既奠然後焫蕭合羶薌灌謂始獻神也巳乃迎牲於庭殺之天子諸侯之禮也奠謂薦熟時也特牲饋食禮云祝酌奠于鉶南是也詔祝於室坐尸於堂謂朝事時也朝事延尸于户西南靣布主席東靣取牲牌膋燎于爐炭洗肝于鬱鬯而燔之以詔神於室又出以墮於主前主人親制其肝所謂制祭也薦以籩豆至薦熟乃更延主于室之奧尸來升席自北方坐于生北焉用牲於庭升首于室制祭之後升牲首於北牖下直祭祝于主謂薦孰時也祭以熟為正則血腥之屬盡敬心耳祭義曰祭之日君牽牲穆答君卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也二端謂氣也魄也二禮謂朝事與薦黍稷也朝事謂薦血腥時也薦黍稷所謂饋食也周官籩人朝事之籩其實䵄蕡白黑形鹽膴鮑魚鱐饋食之籩其實棗栗桃乾䕩榛實醢人朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡饋食之豆其實葵菹螺醢脾析蠯醢蜃蚔醢豚拍魚醢司尊彛春祠夏禴其朝踐用兩獻尊其再獻用兩象尊秋嘗冬蒸其朝獻用兩著尊其饋獻用兩壺尊凡四時之間祀追享朝享其朝踐用兩大尊其再獻用兩山尊尸入既祼於室然後延之于户西坐于主東南靣行朝踐之禮焉延之于户西所謂坐尸于堂是也坐于主東所謂南鄉北鄉以西方為上是也南靣所謂父南靣子北靣而事之是也是時君出迎牲袒而牽之麗于碑以幣詔之於庭卿大夫袒而毛牛尚耳鸞刀以刲取膟膋而毛血詔於室蕭載膟膋合以黍稷焫於爐其籩實則䵄蕡白黑形鹽膴鮑魚鱐豆實則韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡尊則春祠夏禴用兩犧尊秋嘗冬蒸用兩著尊追享朝享用兩大尊爼則或豚解而腥之或體解而爓之然後詔以羮定焉其禮謂之朝踐亦謂之朝事又謂之朝獻以象朝時之所養也大夫饋食儀士饋食儀天子諸侯饋食之儀見於經者尤略今圖大夫士禮于後賈公彥曰天子諸侯大夫士雖同名饋食仍有少别何者天子諸侯食前仍有饋獻二是饋熟隂厭陽厭尸入室乃獻大夫士則饋熟與黍稷為隂厭陽厭前無饋獻以此為異耳羮定詔於堂然後延主于奧尸坐其北主人拜妥尸而奠爵舉焉此所謂舉斚角詔妥尸少牢禮所謂尸即席坐主人拜妥尸即奠是也其籩實則棗栗桃乾䕩榛實豆實則葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢尊則春祠夏禴用兩象尊秋嘗冬蒸用兩壺尊追享朝享用兩山尊爼則載合享之熟而簠簋之黍稷進焉考之儀禮饋食之儀祝筵几于室中東靣主婦薦兩豆葵菹蝸醢醢在北主人設爼于豆東魚次臘特于爼北主婦設黍稷于爼南西上及兩鉶芼設于豆南南陳祝酌奠于鉶南佐食啓㑹郤于敦南尸挼祭佐食取黍稷肺祭尸尸祭酒鉶佐食爾黍稷于席上設大羮于醢北尸食肺脊主人羞肵爼于臘北九飯告飽主人主婦酳尸加爵周禮籩人加籩之實蓤芡㮚脯蓤芡㮚脯加籩謂尸既食后亞獻尸所加之籩重言之者以其四物為八籩正義曰加籩是尸既食後亞獻尸所加之籩者案內宗掌宗廟之祭祀薦加豆籩以其內宗所薦明主於后又見特牲主婦獻尸云宗婦執兩籩於户外主婦受設於敦南主人獻尸之時不見有設籩之事故知惟主於后也少牢主婦不設籩者以其當日賔尸故也其下大夫不賔尸者亦與士同醢人加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢內宗掌宗廟之祭祀薦加豆籩加爵之豆籩郊特牲曰恆豆之菹水草之和氣也其醢陸産之物也加豆陸産也其醢水物也此謂諸侯也天子朝事之豆有昌本麋臡饋食之豆有葵菹螺醢豚拍魚醢其餘别有雜錯云也明堂位曰爵用玉盞仍雕加以璧散璧角特牲饋食主人主婦酳尸畢長兄弟洗觚為加爵如初儀不及佐食洗致如初無從衆賔長為加爵止大夫士三獻而禮成多止之為加也尸爵止者欲神意之均於在庭春秋傳曰楚子入享於鄭九獻加籩豆六品又季孫宿如晉晉侯享之有加辭曰小國之事大國也得貺不過三爵今豆有加下臣弗堪籩人醢人言朝踐饋食之籩豆則獻饋獻籩豆也言加籩加豆則加爵之豆籩也特牲禮主人主婦既酳尸然後長兄弟衆賔長為加爵則加爵不施於亞獻之節鄭氏釋籩人謂后亞獻尸所加之籩其說誤也明堂位曰獻用玉盞加用璧散璧角特牲禮獻用爵加用觚又獻主人主婦加繫長兄弟衆賔長則加在獻數之外明矣禮書卷八十一
