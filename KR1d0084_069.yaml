body:
  text: 禮書卷七十宋陳祥道撰虞主主制不一今従何休之説吉主練主用栗刻而諡之以辨昭穆周禮守祧掌守先王先公之廟祧鄭氏曰廟謂太祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟司巫祭祀則共匰主杜子春曰匰器名主謂木主也主先匰者共主以匰賈公彦曰以匰器盛主來向祭所大祝取得主匰器即退摯虞決疑云石函中笥以盛主者也禮記曲禮曰措之廟立之主曰帝曽子問曰廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也又曰當七廟五廟無虚主虚主者唯崩薨與君去其國與祫祭於祖為無主耳吾聞諸老耼曰崩薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而後主各反其廟藏諸主於祖廟象有凶事者聚也卒哭成事先祔之祭名也君去其國太宰取羣廟之主以從禮也鬼神依人者也祫祭於祖則祝迎四廟之主主出廟入廟必蹕檀弓曰重主道也商主綴重焉周主重徹焉郊特牲曰直祭祝于左索祭祝于祊坊記曰祭祀之有尸也宗廟之有主也示民之有事也春秋書作僖公主左傳曰凡君卒哭而祔祔而作主特祀於主烝嘗禘于廟公羊曰作僖公主者何為僖公作主也何休曰主狀正方穿中央達四方天子長尺二寸諸侯長二尺主者曷用虞主用桑用桑者取其名與其麤觕所以副孝子之心練主用栗何休曰練埋虞主於兩階之間易用栗也夏后氏以松商人以柏周人以栗松猶容也柏猶迫也栗猶慄也慄謹敬貌士虞記曰桑主不文吉主皆刻而諡之盖為禘祫時别昭穆也周栗者藏主也藏于廟室中質家藏於堂作僖公主譏不時也穀梁曰立主喪主於虞吉主於練作僖公主譏其後也作主壊廟有時日有練焉壊廟正義曰縻信引衛次仲云宗廟主皆用栗右主八寸左主七寸廣厚三寸若祭訖則内於西壁埳中去地六尺一寸右主謂父也左主謂母也何休徐邈范甯皆曰天子尺二寸諸侯一尺狀正方穿中央達四方是與衛氏異也白虎通云藏之西壁其説與衛氏同春秋書躋僖公穀梁曰祫祭者毁廟之主陳于太祖未毁廟之主皆升合祭于太祖左傳曰典司宗祏又曰孔悝反祏於西圃宗祏宗廟中藏主石室正義曰宗祏者於廟之北壁内為石室以藏木主有事則出而祭之既祭納於石室祏字従示神之也鄭氏注士虞禮曰凡祔已復于寢如既祫主反其廟練而後遷廟士之皇祖於卒哭亦反其廟無主則反廟之禮未聞以其幣告之乎許慎五經異義曰大夫士無主大夫結帛依神士結茅為菆大戴禮五經異義公羊説主藏太廟室西壁以備火災魏髙堂隆曰正廟之主各藏太室西壁之中遷主之廟於太祖太室北壁之中漢儀藏主於室中西牆壁埳中去地六尺一寸當祠則設坐於埳下韋𤣥成等議太上孝恵廟皆親盡宜毀太上廟主宜瘞園孝恵主遷於太祖寢園皆無復修奏可漢舊儀曰巳葬收主為木函藏廟太室中西牆壁埳中皇后主長七寸圍九寸在皇帝主右旁髙皇帝主長九寸上林給栗木晉志元帝神主在愍帝之下故有坎室者十也于時續廣太廟故三遷主並還西儲名之曰祧以準逺廟漢元帝時親盡之廟主瘞於園晉尚書符問太廟制度南向七室北向隂室復有七帝后神主應共處七室坎中當别處隂室依禮處上太常賀循上曰按后配尊於帝神主所居宜同東晉元帝江左建廟主眀帝之代有坎室者十也恭帝時廟坎室十八唐㑹要貞觀二十二年許敬宗奏言皇祖𢎞農府君廟應迭毁按舊儀漢丞相韋𤣥成以為毁主瘞埋但萬國尊饗有所従來一旦瘞藏事不允愜晉博士范宣意欲别立廟宇奉征西等主安置其中方之瘞埋頗叶情理然事無典故亦未合儀又議者言毁主藏於天府按天府祥瑞所藏本非斯意今準量去祧之外猶有壇墠祈禱所及竊謂合宜今時廟制與古不同共堂别室西方為首若在西夾之中仍處尊位祈禱則祭未絶祈享方諸舊議情實可安𢎞農府君廟逺親殺詳據舊章禮合迭毁臣等㕘議遷奉神主於夾室本情篤教在理為宏從之開元禮義鑑曰藏主合在何處按五經異義云藏主於廟西壁中備水火之災必在西者長老之處地道尊右鬼神幽隂也又曰藏主何故於室中江都集禮云太祖室北壁中堂上無藏主處故於室中也唐制禮部奏准貞觀故事遷廟之主藏於夾室西壁南北三間第一間代祖室第二間髙宗室第三間中宗室伏以睿宗皇帝祧遷有期夾室西壁三室外無置室處準江都集禮古者遷廟之主藏於太室北壁之中今請於夾室北壁以西為上置睿宗皇帝主石室制從之公羊曰虞主用桑練主用栗穀梁曰喪主於虞吉主於練特左氏曰凡君祔而作主曲禮曰措之廟立之主曰帝然人子之於親不忍一日使無依焉故始死依以重既𦵏依以主重埋則桑主作桑主埋則栗主立豈有既虞卒哭不存其象俟祔而后為之乎然則左氏曲禮之説葢曰作主將以袝廟非祔而後作之也先儒謂既祔主反其寢大夫士無主以幣告然坊記曰喪禮每加以逺荀卿曰喪事動而逺故將喪而既祖柩不可反孰謂將祔而既餞主可反乎重主道也大夫士有重尸神象也大夫士有尸孔悝大夫也去國載祏孰謂大夫士無主乎徐邈王澤之徒皆曰大夫士有主特鄭康成許慎謂大夫士無主主之制不見於經何休曰主狀正方穿中央達四方天子長尺二寸諸侯長一尺桑主不文吉主皆刻而諡之衛次仲曰右主八寸左主七寸廣厚三寸右主父也左主母也漢書儀后主長七寸圍九寸帝主長九寸其制雖不可考然正廟之主各藏其室西壁之中廟遷之主藏於太室北壁之中去地六尺一寸大戴禮五經異義江都集禮傳述皆然葢有所授之也自東漢迄隋唐宗廟之制與古不同而遷主所藏或在西儲或在西夾室其正廟之主雖各藏廟室西壁之中而帝后别為石埳非禮意也按少牢饋食薦嵗事于皇祖必以某妃配某氏故同几共牢一尸而俎豆不兩陳以其夫婦一體故也賀循亦謂后配尊於帝神主所居宜同故東晉眀帝時廟有埳室者十皆帝后共一石室至恭帝時廟為埳室一十八而帝后異室此議者所以譏之也師行載主遷主社主小宗伯若大師則帥有司而立軍社大祝大師設軍社大司馬若大師則執事涖釁主及軍器以血塗主及軍器皆神之肆師用牲于社宗則為位社軍社宗遷主凡師不功則助牽主車大司馬曰若師不功則厭而奉主車也書曰用命賞于祖不用命戮于社衛祝鮀曰君以軍行祓社釁鼓祝奉以従若君行師従卿行旅従祝不出境曽子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載于齊車金路言必有尊也今也取七廟之主以行則失之矣又問曰古者師行無遷主則何主孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而後就舍反必告設奠卒歛幣玉藏諸兩階之間乃出盖貴命也又曰主出入廟必蹕又曰齊桓公亟舉兵作偽主以行及反藏諸祖廟詩傳曰王升舟鼓鐘亞觀臺亞將舟亞宗廟亞孔穎達曰社殺戮與軍將同故名社主為將宗廟則遷主也亞在將舟後文王世子曰族食世降一等其在軍則守於公禰公禰行主也然則師行載遷主則未遷之主不行矣遷主載于齊車則社主亦齊車矣孔穎達曰専社主載於齊車遷主亦載于齊車用命賞于祖則遷主之車在左所以象左宗廟也不用命戮于社則社主之車在右所以象右社稷也師載遷主而武王伐紂載文王之木主者所以成文王之志而已不可以常禮議之也書傳曰將舟亞宗廟亞葢舉宗廟以見社耳先儒以將舟為社主恐不然也社主示也石土類也先儒謂社主石為之葢有所授之也王制曰天子將出宜于社造于禰肆師用牲于社宗皆先社而後祖葢君之出也先祓社后釁祖其行也前社而後祖其止也右社而左祖祖非禰也文王世子謂之公禰者親之也祏左傳曰典司宗祏又曰孔悝反祏於西圃杜預曰宗祏宗廟中藏主石室孔穎達曰宗祏者於廟之北壁内為石室以藏木主有事則出而祭之既祭納於石室祏字従示神之也匰司巫祭祀共匰主説文曰宗廟盛主器也賈公彦曰以匰器盛主來向祭所太祝取得主匰器即退摰虞曰藏主有石函函中笥以盛主然則匰笥類也坫坫者以土為之其别有四記曰反坫出尊語曰邦君為兩君之好有反坫此反爵之坫也記曰崇坫康圭此奠玉之坫也記又曰士於坫一此庋食之坫也士冠禮爵弁皮弁緇布冠各一執以待于西坫南大射將射工遷於下東坫之東南士喪禮牀笫夷衾饌于西坫南既夕禮設棜于東堂下南順齊于坫此堂隅之坫也葢兩君相見於廟尊於兩楹之間而反爵之坫出於尊南故曰出尊鄉飲酒是卿大夫禮尊於房戸間燕禮燕其臣尊於東楹之西皆無坫特兩君相見尊於兩楹間有坫管仲有反坫故孔子譏之又於其南為之崇坫以安玉焉故曰康圭庋食之坫在房堂隅之坫在北陳爾雅曰垝謂之坫郭璞曰坫㙐也北堂之隅之坫也鄉飲鄉射燕禮皆奠爵于篚則反爵於坫特兩君相好之禮也聘禮公受玉于中堂與東楹之間賓出公側授宰玉而不康之于坫葢亦兩君相見之禮也鄭康成改康為亢非也禮書卷七十
