body:
  text: 禮書卷七十三宋陳祥道撰六龜龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之卜師凡卜辨龜之上下左右隂陽以授命龜者而詔相之爾雅十龜一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜龜俯者靈仰者射前弇諸果後弇諸獵左倪不類右倪不若龜䇿傳八龜一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰玉龜凡八名龜龜圖各有文在腹下然則爾雅所謂射即繹屬也鄭氏釋玉藻卜人定龜謂靈射之屬蓋射與繹同不類即靁屬也不若即若屬也天龜俯地龜仰西龜左倪北龜右倪皆其首然也東龜前弇南龜後弇皆其甲然也上仰者也下俯者也左左倪也右右倪也隂後弇也陽前弇也其色則天龜𤣥地龜黃東龜青南龜赤西龜白北龜黑此所謂各以其方之色也樂記曰青黑緣天子之寶龜也公羊傳曰龜青純何休曰龜甲􅏋也千嵗之龜青􅏋然則六龜之色蓋亦視其􅏋而已其長則逸禮天子龜尺二寸龜䇿傳曰龜千嵗乃滿尺二寸諸侯八寸是也禮曰家不寶龜儀禮大夫士祭筮而已則大夫無守龜矣逸禮又言大夫龜六寸誤也凡龜取以秋攻以春鱉人秋獻龜魚月令季夏登龜取黿鄭氏謂月令似誤其藏有室鄭氏曰六龜各異室莊子曰楚有神龜王巾笥而藏之廟堂之上龜䇿傳曰髙廟中有龜室藏內以為神寶其釁有時龜人上春釁龜月令孟冬釁祠龜䇿鄭氏曰上春者夏正建寅之月秦以十月建亥為正欲以嵗首釁龜耳奉之必襲而曳踵執玉龜襲舉前曳踵奠之必端而辨其首倒䇿側龜於君前有誅儀禮或南首或西首是也卜則腹骨灼則四體鄭氏曰卜用龜之腹骨骨近足者部高春骨灼後左夏灼前左秋灼前右冬灼後右而大卜或作或命或貞或陳其事不一蓋凡國大貞卜立君卜大封則視髙作龜喪祭之事輕於大貞則視高命龜國大遷大師輕於喪祭則貞龜凡旅則陳龜而巳考之儀禮卜人奠龜宗人示高乃坐命龜而後卜人坐作龜然則太卜於大祭祀凡喪事命之而不作則作者其屬也國大貞作之而不命者宗伯也貞龜則正之於卜位而不親命也陳龜則陳之於饌所而不卜也禮統曰神龜之象上圜法天下方法地背上有盤法丘山互文交錯以成列宿燋楚焞卜法周禮菙氏掌共燋契以待卜事凡卜以眀火爇燋遂吹其焌契以授卜師遂役之卜師凡卜事揚火以作龜致其墨士喪禮將葬卜日卜人先奠龜于西孰上南首布席楚焞置于燋在龜東宗人立于門西東面南上占者三人在其南北上席于闑西閾外主人北面免絰卜人抱龜燋先奠龜西首燋在北蓋燋炬也龜䇿傳曰上先以造灼龜徐廣曰造音龜契灼龜之木也契謂之焌亦謂之楚焞楚其材也龜策傳曰灼以荆焞其體也鄭氏曰焌讀如戈鐏之鐏則焌之狀可知契其用也焌與焞其名一也契與作其義一也士喪卜葬始則卜人奠龜于西孰上南首楚焞置于燋在龜東以龜奠也既而奠龜西首燋在北以占者在南也掌共燋契謂之菙氏者鄭氏曰燋焌用荆菙之類也卜師揚火以作龜致其墨占人凡卜簭君占體大夫占色史占墨卜人占坼玉藻卜人定龜史定墨君定體書曰惟洛食又曰乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔鄭氏注大卜引洪範所謂曰雨曰霽曰圉曰蟊曰尅蓋其所傳者異也凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言蓋占龜之法體有吉凶色有善惡墨有小大坼有微眀雨霽蒙驛克其兆狀然也君占體然後大夫占色史占墨卜人卜其事序然也書曰體王其無害詩曰爾卜爾筮體無咎言儀禮卒筮示主人主人受視反之筮人還旅占卒進告吉主人先視卦體然後旅占也太卜掌三兆之法有玉兆瓦兆原兆而洪範占者必三人士喪禮占者亦三人先儒以為三人所以占三兆也於義或然然玉藻卜人定龜即占坼也而鄭氏以為定所當用之龜卜師作龜致其墨則後墨也而孔氏以為先墨畫龜乃灼之其說誤也易曰天生神物聖人則之龜䇿傳曰龜千嵗乃遊蓮葉之上蓍百莖共一根其所生獸無虎狼草無毒螫又曰上有搗蓍下有神龜蓍生滿百莖者其下必有神龜守之其上有青雲覆之劉向曰龜千嵗而靈蓍百年而神然則蓍龜皆以久而後可用也龜後為動物而屬乎陽故知象蓍植物而屬乎隂故知數屬乎陽者其長或尺二寸或八寸成之以隂也屬乎隂者其長或九尺或七尺成之以陽也大戴三正記曰天子蓍長九尺諸侯七尺大夫五尺士三尺考之儀禮特牲饋食筮者坐筮少牢饋食筮者立筮鄭氏云卿大夫蓍五尺立筮士之蓍短坐筮由便也推此則天子諸侯之蓍其長如大戴之說信矣周禮上春釁龜相筮月令孟冬則釁龜策周秦之法異也鄭氏曰蓍龜嵗易然龜䇿傳曰夏商欲卜乃取蓍龜已則棄之周室之卜官常寶藏蓍龜則所謂相筮者擇其不可用者而已非嵗易也蓍筮法易曰大衍之數五十其用四十有九京房云五十者謂十月十二辰二十八宿也馬融云易有太極謂北辰也太極生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十有九轉運而用也荀爽曰卦各六爻六八四十八爻加乾坤二卦凡有五十乾初九潛龍勿用故用四十九也鄭康成曰天地之數五十有五以五行氣通凡五行減五大衍又減一故四十九也姚信董過云天地之數五十有五者其六以象六畫之數故減之而用四十九王弼云演天地之數所賴者五十其意以謂萬物之䇿凡萬有一千五百二十其推演天地之數唯用五十䇿其一不用以其虛無非所用也分而為二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五嵗再閏故再扐而後掛又曰四營而成易十有八變而成卦一爻有三變初揲不五則九再揲三揲不四則八九八為多五四為少三者俱多為老隂二者俱少為老陽兩少一多為少隂兩多一少為少陽周禮大卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四簭人掌三易以辨九簭之名一曰巫更二曰巫咸三曰巫式四曰巫日五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環蓋大衍之數五十天地自然之數也虛其一以為本實其四十有九以為用分而為二以象兩隂陽也掛一以象三隂陽與隂陽之中也隂陽變而為四時四時歸奇而為閏天道之變不過四而易之所營亦如之以至十有八變而後成卦則每爻各三變矣三易其經卦皆八其别皆六十有四則卦於三代之前固已重矣揚子曰文王重之為六十四誤也古者占筮之工謂之筮世本曰筮咸作筮商為筮咸後世有神筮季咸蓋祖其名耳九簭之名自巫更巫咸以至巫環或以其人名書或以其法名書非若龜之八命也鄭氏以巫為筮以九筮況八命而已事釋之不可考也簭人凡國之大事先筮而後卜洪範曰汝有大疑謀及卜筮故舜禪禹武王伐紂而卜筮兼用書舜曰龜筮協從武王曰朕夢協朕卜春秋左氏傳曰筮襲於卜武王所用也此所謂大事大疑者也降於此則卜筮不相襲或卜若筮而已然太卜凡小事涖卜則小事亦卜矣記曰大事有時日用卜小事無時日有筮蓋此所謂大事者小事之大者也小事非不用卜以用筮為主耳禮先筮而後卜春秋之時魯桓公卜成季之生晉文公卜逆襄王獻公卜娶驪姬皆先卜而後筮何也物生自幽之乎明故有象而後有數卜筮自眀求乎幽故先筮而後卜後世先卜後筮失之矣蓍韇畫爻木卦板士冠禮筮人執策抽上韇兼執之進受命于主人鄭氏曰韇藏筮之器今時藏弓矢者謂之韇士喪禮筮者東面抽上韇兼執之南面受命特牲筮人取筮于西孰執之東面受命于主人少牢史朝服左執筮右抽上韇兼與筮執之東面受命于主人主人命之史西面于門西抽下韇左執筮右兼執韇次擊筮乃釋韇立筮吉則史韇筮龜之藏有韇蓍之藏亦有韇龜韇以木蓍韇以革未筮則筮者執筮抽上韇以聽命將筮則抽下韇左執筮右兼韇執之以擊筮筮者及筮則釋韇既事則韇筮士冠士喪筮有韇而特牲不言韇少牢言上下韇而士喪不言下韇互備也士冠禮筮與席所卦者具饌于西孰所卦者所以畫地記爻卒筮書卦執以示主人筮人以方寫所得之卦主人受視反之筮人還東面旅占卒進以告士喪誓宅筮人指中卦而筮卦者在左卒筮卦執卦以示命筮者乃旅占特牲饋食筮者即席西南坐卦者在左卒筮寫卦筮者執以示主人少牢饋食筮者立筮卦者在左坐卦以木卒筮乃書卦于木示主人乃退占每爻盡地以記之六爻備書於板筮者常在右卦者常在左大夫以上筮者立卦者坐士以下筮與卦者皆坐卦者始畫爻於地卒書卦以示主人畫爻以木少牢所謂卦以木是也書卦以板少牢所謂卦于板是也古之筮法見於春秋多矣有以前卦統後卦有以後卦斷前卦有兼二卦有止一卦陳侯筮敬仲遇觀之否觀坤下㢲上否坤下乾上變觀之六四為否之九四則是風為天於坤上矣其吉在於觀國之光利用賓于王崔杼筮娶遇困之大過困坎上兑下大過㢲下兑上變困之六三為大過之六三則是夫從風而不可娶矣其凶在於困于石據于蒺藜此以前卦占之也魯桓公筮季友遇大有之乾大有乾上離下變離之六五為乾之九五乾為父為君故曰同復于父敬如君所其吉在于同復于父敬如君所此以後卦占之也畢萬筮仕遇屯之比屯震上坎下比坤上坎下變屯之初九為比之初六其吉在於車從馬足居之兄長之母覆之衆歸之莊叔筮穆子遇眀夷之謙眀夷離下坤上謙艮下坤上變眀夷之初九為謙之初六則是火焚山山敗於人為言敗言為讒其凶在於火焚山山敗於人為言敗言為讒此兼二卦占之也秦筮伐晉遇蠱曰千乘三去三去之餘獲其雄狐晉筮與楚戰遇復曰南國䠞射其元王中厥目此止一卦占之也然禮問卜筮曰義與志與義則可問志則否故以私志而問者兆不必應若魯穆姜居東宫遇艮之隨其繇元享利貞無咎南蒯筮叛遇坤之比其爻黃裳元吉皆卒以凶此又吉凶在人也繫幣占人凡卜筮既事則繫幣以比其命嵗終則計其占之中否杜子春曰繫幣者以帛書其占繫之於龜也鄭康成曰既卜筮史書其命龜之事及兆於䇿繫其禮神之幣而合藏焉書曰王與大夫盡辨啓金縢之書乃得周公所自以為功代武王之說是命龜書然經言凡卜簭繫幣以比其命嵗終則計其占之中否則繫幣於龜策矣當從杜子春之說為正禮書卷七十三
