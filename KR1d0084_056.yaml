body:
  text: 禮書卷五十七宋陳祥道撰節掌節掌守邦節而辨其用以輔王命邦節者珍圭牙璋穀圭琬圭琰圭也王有命則别其節之用以授使者輔王命者執以行為信守邦國者用玉節守都鄙者用角節玉節之制如玉為之以命數為大小角用犀角其制未聞凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之使節使卿大夫聘於天子諸侯行道所執之信也土平地也山多虎平地多人澤多龍以金為節鑄象馬必自以其國所多者於以相別為信明也今漢有銅虎符杜子春云蕩當為帑以函器盛此節或曰英蕩畫函也門關用符節貨賄用璽節道路用旌節皆有期以反節門關司門司關也貨賄者主通貨賄之官謂司市也道路者主五塗之官謂鄉遂大夫也凡民逺出至於邦國邦國之民若來入由門者司門為之節由關者司關為之節其商則司市為之節其以徴令及家徒則鄉遂大夫為之節唯時事而行不出關不用節也變司市言貨賄者璽節主以通貨賄非必由市或資於民家焉變鄉遂言道路者容公邑及小都大都之吏皆主治五塗亦有民也符節者如今宫中諸官詔符也璽節者今之印章也旌節今使者所擁節是也將送者執此節以送行者皆以道里日時課如今郵行有程矣以防容姦擅有所通也凡節有法式藏於掌節凡通逹於天下者必有節以傳輔之必有節言逺行無有不得節而出者也輔之以傳者節為信耳傳説所齎操及所適也無節者有幾則不達圜土內之正義曰角用犀角者案釋獸云犀似豕注云角在鼻上犀角是角中之貴故知不得用玉者當用犀角案小行人都鄙用管節注謂公之子弟及卿大夫之采地之吏也故用管節與此不同彼諸侯采地亦同用管節不異內外也山多虎者謂晉國之類也平地多人者若衛國之類也澤多龍者若鄭國之類也輔之者以函使不損壤也案昭二十九年公在鄆賜公衍羔裘使獻龍輔於齊侯注龍輔玉名所以輔龍節與此別也太史公本紀漢文帝二年九月初與郡國守相為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡國合符符合乃聽受之竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也鄭引之者欲明漢時銅虎符本出於此也小行人達天下之六節山國用虎節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之此謂邦國之節也達之者使之四方亦皆齎法式以齊等之也諸侯使臣行眺聘則以金節授之以為行道之信也虎人龍者自其國象也道路謂鄉遂大夫也都鄙者公之子弟及鄉大夫之采地之吏也凡邦國之民逺出至他邦他邦之民若來入由國門者門人為之節由關者關人為之節其以徵令及家徒鄉遂大夫及采地吏為之節皆使人執節將之以達之亦有期以反節管如今之竹使符也其有商者通之以符節如門關門關者與市聫事節可同也亦所以異於畿內也凡節有天子法式存於國正義曰行人亦是適四方之事言逹天下之六節者據諸侯國而言掌節所云據畿內也虎節人節龍節三者據諸侯使節臣出聘所執旌節符節管節三者據在國所用案掌注變鄉遂言道路者容公邑大夫及小都大都之吏今此旌節中何知不亦容都鄙之吏而以都鄙吏在管節中者彼都鄙用角節文在上當直是都鄙之主此都鄙用管節最在下明都鄙吏在其中若然邦國之中都鄙主及吏同用管節矣云亦所以異於畿內也者畿內貨賄用璽節門關用符節畿外同用符節是異也調人凡和難弗辟則與之瑞節而以執之瑞節琰圭也行人凡其使也必以旌節雖道路有難而不時必達比長若徙于他則為之旌節而行若無授無節惟圜土內之鄉大夫國有大故以旌節輔令則達之大司徒若國有故則制萬民於王門令無節者不行於天下司救凡歲時有天患民病則以節巡國中及郊野以王命施惠布憲正月之吉執旌節以宣布于四方而憲邦之刑禁掌交掌以節與幣巡邦國之諸侯及其萬民之所聚司險若有故則藩塞阻路而止行者惟有節者達之懷方氏達之以節野廬氏凡有爵及有節者至則為之辟周語先王為贄幣瑞節以鎮之敵國賔至關氏以告行理以節逆之八節玉節鄭氏曰玉節之制以玉為之以命數為大小角節鄭氏曰角用犀角其制未聞龍節金為之人節金為之虎節金為之符節管節旌節節之為物或以玉或以角或以金或以竹或用以守或用以使或用以民周官掌節之所掌者八玉節也角節也虎節也人節也龍節也符節也璽節也旌節也小行人之所達者六虎節也人節也龍節也旌節也符節也管節也掌節守邦國者用玉節守都鄙者用角節此用以守者也山國用虎節土國用人節澤國用龍節皆金為之此用以使者也門關用符節貨賄用璽節道路用旌節皆有期以反節此用於使與民者也行人凡其使也必以旌節此使者所執也比長若徙于他則為之旌節以逹之此民所執也析竹為符節全竹為管節小行人有管節而掌節無之者掌節所掌謂之邦節以輔王命則所謂邦國之使節使邦國者所執也鄭氏謂使卿大夫聘於天子諸侯誤也小行人所達謂之天下之節則所謂龍節人節虎節管節邦國都鄙使者所執非王官所掌也掌節無都鄙之使節以使都鄙者無節特以旌節行之也小行人無璽節以其所掌者使節而貨賄之事不預也然節不特八節六節而已典瑞珍圭以徵守以恤凶荒牙璋以起軍旅琬圭以治德以結好琰圭以除慝以易行榖圭以和難以聘女鄭氏皆以為王使之瑞節則珍圭牙璋琬圭琰圭榖圭使者為信於所適者也龍節虎節人節符節旌節行人為信於道路者也調人凡和難弗辟則與之瑞節而以執之此琰圭耳則琰圭不特施於使者民亦與之也書康誥曰越小臣諸節春秋之時宋司馬握節以死司城效節於府人而去司馬牛致其邑與圭而適齊杜預曰圭守邑之信符則守節不特於邦國都鄙雖官府小臣亦有之也考工記牙璋榖圭七寸琬圭琰圭九寸漢竹使符竹箭五枚長五寸然則先王之節其長蓋亦不過於此若夫旌節之制又加長焉觀蘇武之杖節則非以寸計之也漢竹使符銅虎各分其半右留京師左付郡守唐符璽郎凡國有大事則出納符節班其右而藏其左先王之節其班藏蓋亦如此然老子曰執左契不責於人則藏其右者非是英蕩掌節凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之鄭氏曰使節使卿大夫聘於天子諸侯行道所執之節也杜子春蕩當作帑謂以函器盛此節或曰英蕩畫函考之於經禹貢揚州貢篠蕩大射禮蕩在建鼓之間則蕩竹也詩曰二矛重英又曰朱英緑縢則英飾也節之函以竹為之而有飾焉先儒以為畫函其説是也言凡邦國之使節則使邦國者之所執非邦國使者之所執也言皆金也以英蕩輔之則英蕩之輔王命特虎人龍節而巳非輔其它也傳司關凡所達貨賄者則以節傳出之鄭氏曰商或取貨於民間無璽節者至關關為之璽節及傳出之其有璽節亦為之傳傳如今移所過文書節凡通逹於天下者必有節以傳輔之鄭氏曰節為信耳傳説所齎操及所適蓋掌節所謂傳者凡通達於天下之節有傳也司關所謂傳者璽節之傳也漢制門關用傳兩行書繒帛分持其一出入合之豈古之遺制歟文帝十二年除之景帝四年又復之除之於無虞之時復之於有警之後然先王之於天下先事而事先患而慮不為無虞而輕廢不為有警而後設璽周禮掌節貨賄用璽節職金掌凡金玉錫石丹青之戒令受其入征者辨其物之媺惡與其數量揭而璽之左氏曰季武子取卞使公冶問襄公璽書追而與之鄭杜皆曰璽印也漢舊儀曰璽皆白玉螭虎細文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽衛宏漢舊儀曰諸侯玉印黃金槖它鈕文曰璽列侯黃金印龜鈕文曰印丞相將軍黃金印龜鈕文曰章中二千石銀印龜鈕文曰章千石六百石四百石銅印鼻鈕文曰印唐符寶郎武后改符璽郎為符寶郎掌天子八寶及國之符節釋名曰印信也説文曰執政所持信也孫堅得傳國璽方圍四寸上有鈕文盤五龍然則漢天子之璽其方不過四寸諸侯王以下其小又可知也禮書卷五十七
