body:
  text: 禮書卷十九宋陳祥道撰天子佩白玉𤣥組綬諸侯佩山𤣥玉朱組綬大夫佩水蒼玉世子至士佩制亦然特玉與組之色不同周官玉府掌共王之佩玉詩木𤓰曰報之以瓊琚瓊美玉琚佩玉也瓊瑤瓊玖丘中有麻曰貽我佩玖玖石次玉女曰雞鳴曰雜佩以贈之雜佩者珩璜琚瑀衝牙之類有女同車曰佩玉瓊琚佩有琚瑀所以納間渭陽曰瓊瑰玉佩瓊瑰石次玉采芑曰服其命服有瑲葱珩大東曰鞙鞙佩璲公劉曰何以舟之維玉及瑤爾雅曰璲瑞也繸綬也佩衿謂之褑玉藻曰將適公所既服習容觀玉聲乃出揖私朝煇如也古之君子必佩玉右徴角左宫羽君在不佩玉齊則綪結佩而爵韠凡帶必有佩玉惟喪否佩玉有衝牙天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬綬者所以貫佩玉相承受者也一命緼韍幽衡再命赤韍幽衡三命赤韍蔥衡經解曰行步則有環佩之聲左傳曰佩衷之旗又季平子卒陽虎將以璵璠歛仲梁懐曰改步改玉定五年申叔儀曰佩玉蘂兮昭十二年晉語曰白玉之珩六雙珩似磬而小楚語曰楚之白珩猶在乎大戴禮曰下車以佩玉為度上有雙衡下有雙璜衝牙玭珠以納其間琚瑀以雜之説文云淮水中出玭珠荀子賦篇璇玉瑤珠弗知佩也璇亦玉韓詩外傳曰阿谷之隧處子佩璜又曰蠙珠以納其間古之君子必佩玉其制上有折衡下有雙璜中有琚瑀下有衡牙貫之以組綬納之以蠙珠而其色有白蒼赤之辨其聲有角徴宫羽之應其象有仁智禮樂忠信道徳之備禮記曰昔者君子比徳於玉焉温潤而澤仁也縝密以栗知也廉而不劌義也垂之如隊禮也叩之其聲清越以長其中詘然樂也瑕不揜瑜瑜不揜瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也天下莫不貴者道也或結或垂所以著屈伸之理或設或否所以適文質之儀此所以純固之徳不内遷非僻之心無自入也盖衡以平其心璜以中其徳琚欲其有所安牙欲其有所制右徴角所以象事與民左宫羽所以象君與物趨以采薺行以肆夏所以比於樂周還中規折還中矩所以比於禮進則揖之於前退則揚之於後則佩之為物奚適而非道耶盖民為貴君為輕事為先物為後能治民然後能安君能應事然後能生物此所以事與民在所右而物與君在所左也春秋傳曰改步改玉則自天子至士步固不同而玉亦隨異故天子佩白玉公侯佩山𤣥玉大夫佩水蒼玉世子佩瑜玉士佩瓀玫盖玉之貴者莫如白晉以白珩賂秦而楚寳白珩以聞於晉則白玉之貴可知賤者莫如瓀玫山𤣥以象君徳之靜水蒼以象臣職之動山𤣥水蒼其文也瑜與瓀其質也世子佩瑜則士佩瓀矣士佩瓀則世子而上佩堅矣瑜或作礝以其多石故也玫或作珉以其賤故也衡亦作珩韋昭曰珩似磬而小詩曰有蒼蔥衡晉語曰白玉之衡六雙楚語曰楚之白珩猶在乎大戴禮曰上有雙衡玉藻曰一命幽衡再命幽衡三命葱衡韋昭曰珩似磬而小孔頴達曰佩玉上繫於衡下垂三道穿以蠙珠前後下端垂以璜中央下端垂以衝牙觀晉語大戴禮皆言雙珩則珩雙設矣珩貴白而賤幽綬貴𤣥而賤素方叔非止三命而佩葱衡者孔頴達曰玉藻累一命而上於三命自三命以至九命皆葱衡也以理或然何則方叔所乘者路車所服者朱芾則所佩者豈特三命之衡哉爾雅曰青謂之葱褑爾雅曰衿謂之袸佩衿謂之褑則衿衣之小帶也褑佩之衿也鄭氏謂凡佩繫於革帶則繫於革者褑也璜肉倍好謂之璧半璧謂之璜韓詩外傳曰阿谷之女佩璜大戴禮曰下有雙璜璜居前後而牙衝之然後有宫角徴羽之音衝牙玉藻曰佩玉有衝牙鄭氏謂牙居中央以為前後觸皇氏謂衝居中央牙是兩端之璜然璜非牙也當從鄭説琚瑀説文曰珩佩上玉也璜半璧也琚佩玉名瑀玫石次玉也考之於詩曰報之以瓊琚又曰佩玉瓊琚大戴禮曰上有雙衡下有雙璜衡牙玭珠以納其間琚瑀以雜之毛氏詩傳曰雜佩者珩璜瑀衡牙之類則居中央而瑀為之也纂要曰琚瑀所以納間在玉之間今白珠也此不可考禮記曰行步有環佩之聲又孔子佩象環衛南子環佩璆然魯昭公賜仲環而佩之昭四年漢制縌綬之間得施玉環鐍缺環曰鐍盖古者佩玉有環矣禮書卷十九
