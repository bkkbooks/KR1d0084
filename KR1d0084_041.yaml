body:
  text: 禮書卷四十一宋陳祥道撰明堂朝諸侯之位周禮治朝之位孤東面卿大夫西面外朝之位左孤卿右公侯伯子男射人孤東面卿大夫西面皆尚右東西面者皆尚北路門之左右者皆尚中而明堂位諸侯西面諸伯東面則不尚右在門東西者東上則不尚中在西門之外者東面南上則有不尚北何也儀禮諸侯覲於天子壇壝宫於國外上介皆奉其君之旗置於宫尚左公侯伯子男皆就其旗而立位皆東上是朝於國外與朝於國內之禮異也明堂位與壇壝宫相類蓋亦國外之禮然也先王之於夷狄後之而弗先賤之而弗貴故疆以戎索和以舌人食之則委之牲體而坐諸外樂則不使亂雅而陳於門則位夷蠻於東南之門外位戎狄於西北之門外宜矣漢蕭望之欲貴單于於諸侯之上賈誼欲高堂邃宇以壞其腹親酌而手食之以壞其心蓋不知此壇壝宫諸侯覲於天子為宫方三百步四門壇十有二尋深四尺加方明於其上四時朝覲受之於廟此謂時會殷同也宫謂壝土為埓以象墻壁也為宫者於國外春會同則於東方夏會同則於南方秋會同則於西方冬會同則於北方八尺曰尋十有二尋則方九十六尺也深謂高也從上曰深司儀職曰為壇三成猶重也三重者自下差之為三而上有堂焉堂上高二丈四尺上等中等下等每面十二尺方明者上下四方神明之象也上下四方之神者所謂神明也會同而盟明神監之則謂之天之司盟有象者猶宗廟之有主平王巡狩至于方嶽之下諸侯會之亦為此宫以見之司儀職曰將會諸侯則命為壇三成宫旁一門詔王儀南鄉見諸侯也方明者木也方四尺設六色東方青南方赤西方白北方黑上玄下黃設六玉上圭下璧南方璋西方琥北方璜東方圭上介皆奉其君之旗置於宫尚左公侯伯子男皆就其旗而立置於宫者建之豫為其君見王之位也諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上尚左皆建旗公東上侯先伯伯先子子先男而位皆上東方也諸侯入壝門或左或右各就其旗而立王降階南鄉見之三揖土揖庶姓時揖異姓天揖同姓見揖位乃定四傳擯王既揖五者升壇設擯升諸侯以會同之禮其奠瑞玉及享幣公拜於上等侯伯於中等子男於下等擯者每延之升堂致命王受玉撫玉降拜於下等及請事勞皆如覲禮四傳擯者每一位畢擯者以告乃更陳列而升其次公也侯也伯也各一位子男俠門而俱東上亦一位也至庭乃設擯則諸侯初入門王官之伯帥之耳天子乘龍載大斾象日月升龍降龍出拜日於東門之外反祀方明禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外祭天燔柴祭山丘陵升祭川沈祭地瘞司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節出接賔曰擯入贊禮曰相以詔者以禮告王將合諸侯則令為壇三成宫旁一門合諸侯謂有事而會也為壇於國外以命事宫謂壝土以為墻處所謂為壇壝宫也天子春帥諸侯拜日於東郊則為壇於國東夏禮日於南郊則為壇於國南秋禮山川丘陵於西郊則為壇於國西冬禮月四瀆於北郊則為壇於國北既拜禮而還加方明於壇上而祀焉所以教尊卑也覲禮曰諸侯覲於天子為宫方三百步四門壇有十二尋深四尺是也王巡狩殷國而同則其為宫亦如此歟鄭司農云三成三重也爾雅曰丘一成為敦丘再成為陶丘三成為昆侖丘為三重詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓謂王既祀方明諸侯上介皆奉其君之旗置於宫乃詔王升壇諸侯皆就其旗而立諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上王揖之者定其位也庶姓無親者土揖推手小下之也異姓婚姻也時揖平推手也衛將軍文子曰獨居思仁公言言義其聞詩也一日三復白圭之玷是南宫縚之行也夫子信其仁以為異姓故妻之也天揖推手小舉之也及其擯之各以其禮公於上等侯伯於中等子男於下等謂執玉而前見於王也擯之各以其禮者謂擯公者五人侯伯四人子男三人也上等中等下等者謂所奠玉處也壇三成深四尺則一等一尺也壇十有二尋方九十六尺則堂上二丈四尺每等丈二尺與諸侯各於其等奠玉降拜明臣禮也既乃升堂授玉其將幣亦如之將幣享也禮謂以鬱鬯裸之也皆於其等之上掌舍掌王之會同之舍設梐枑再重梐枑謂行馬再重者以周衛有內外别為壇壝宫棘門以戟為門掌次朝日祀五帝則張大次小次設重帟合諸侯亦如之諸侯朝覲會同則張大次小次師氏凡祭祀賔客會同喪紀軍旅王舉則從聽治亦如之使其屬帥四夷之𨽻各以其兵服守王之門外且蹕朝在野外則守內列虎賁氏掌先後王而趨以卒伍軍旅會同亦如之舍則守王間節服氏掌祭祀朝覲衮冕六人維王之太常司兵軍事建車之五兵會同亦如之司戈盾軍旅會同授二車戈盾建乘車之戈盾授旅賁及虎士戈盾及舍設藩盾行則斂之朝覲宗遇之禮行於廟朝會同之禮行於國外國外壝土為宫方三百步旁各一門中為壇而三成壇十有二尋深四尺旁一門則棘門矣壇三成則三重矣十有二尋則方九十六尺矣深四尺則一等一尺矣春宫於東夏宫於南秋宫於西冬宫於北加方明於壇上天子既拜日禮月與山川丘陵則祀方明既祀方明則見諸侯諸侯上介奉其君之旗置於宫尚左左氏曰會有表鄭氏謂諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上公侯先伯伯先子子先男而位皆東上然覲禮不言壇階而鄭氏曰前三階者以其宫四門而位尚左與明堂位相類故也不言侯氏奠玉降拜升拜而鄭氏曰公奠玉於上等降拜於中等侯伯奠玉於中等降拜於下等子男奠玉於下等降拜於地升成拜皆於奠玉之處者以其致命王受之王降拜升拜與覲於廟相類故也掌次王合諸侯張大次小次設重帟重案鄭氏謂大次初往所止居小次即宫待事之處賈公彥謂大次去壝逺小次去壇近其説是也壇域君子所設以行禮者也故去祧有壇凡祭天及日月方望之類皆有壇齊侯為柯之盟有壇公羊曰莊公升壇是也諸侯適鄰國有壇左氏曰襄二十六年先君適四國未嘗不為壇是也大夫士去國為壇位鄉國而哭魯公孫歸父聘還及笙壇帷復命於介是也况王者之會諸侯乎司儀言將合諸侯令為壇則凡巡狩於方嶽之下皆有壇壝宫矣方明木為之六色覲禮方明者木也方四尺設六色東方青南方赤西方白北方黑上玄下黃設六玉上圭下璧南方璋西方琥東方圭北方璜鄭氏曰方明者上下四方神明之象也會同而盟明神監之則謂天之司盟有象者猶宗廟之有主乎六色象其神六玉以禮之上宜以蒼璧下宜以黃琮而不以者則上下之神非天地之至貴者也設玉者刻其木而著之然司盟曰凡邦國有疑會同則掌其盟約之載書及其禮儀北面詔明神左氏曰不協而盟又曰不協之故用昭乞盟於爾大神則凡會同不必皆盟也鄭氏以會同必盟方明之設為盟而巳其説拘矣方明之制方四尺之木設上下四方之色上圭以象天神之制用下璧以象地示之居體東圭而南璋西琥而北璜各象其方而禮之天子拜日禮月與四瀆山川丘陵畢則升壇以祀方明既而退方明以朝諸侯其或盟則復加方明於壇而以載辭告之覲禮於春言拜日於夏秋冬言禮日月與四瀆山川丘陵鄭氏曰變拜言禮者客祀也其説以為春無盟誓不祀方明特拜日以教尊尊而已三時盟誓祀方明豈為盟誓而巳哉言祀與禮蓋互見也漢律厯志引書伊訓曰太甲元年伊尹祀於先王誕資有牧方以冬至越弗與紼同祀先王於方明以配上帝其文與今書不同不可考也禮書卷四十一欽定四庫全書禮書卷四十二宋陳祥道撰盟詛珠盤玉敦周禮司盟掌盟載之法凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之盟萬民之犯命者詛其不信者亦如之有獄訟者則使之盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯玉府若合諸侯則共珠盤玉敦賈公彥曰禮敦盛黍稷今盟無黍稷敦中宜盛血牛耳宜在盤戎右盟則以玉敦辟盟遂役之贊牛耳桃茢封人凡喪紀賔客軍旅大盟飾其牛牲司寇凡邦之大盟約涖以盟書而登之於天府大史內史司會及六官皆受其二而藏之覲禮諸侯覲於天子為宫方三百步四門壇十有二尋深四尺加方明於其上天子乘龍載大旗象日月升龍降龍出拜日於東門之外反祀方明帥諸侯而朝日於東郊所以教尊尊也退而朝諸侯由此二者言之巳祀方明乃以會同之禮見諸侯也凡會同者不協而盟司盟職曰凡邦國有疑會同則掌其盟約之載書及其禮儀北面詔明神既盟則二之言北面詔明神則明神有象者其方明乎及盟時又加於壇上乃以載辭告焉詛祝掌其祝號禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外此謂會同以夏冬秋者也變拜言禮者客祀也禮月於北郊者月太隂之精以為地神也盟神必云日月山川者尚著明也詩曰謂豫不信有如皎日春秋傳曰縱子志之山川神祗其忘諸乎皆用神明為信也祭天燔柴祭山丘陵升祭川沈祭地瘞升沈必隨就祭者也就祭則是謂王巡狩及諸侯之盟祭也郊特牲曰郊之祭也迎長日之至也大報天而主日也宗伯職曰以實柴祀日月星辰則燔柴祭天謂祭日也柴為祭日則祭地瘞者祭月也日月而云天地靈之也王制曰王巡狩至於岱宗柴是王巡狩之盟其神主日也春秋傳曰晉文公為踐土之盟而傳云山川之神是諸侯之盟其神主山川也月者太隂之精上為天使臣道莫貴焉是王官之伯會諸侯而盟其神主月與禮記曰涖牲曰盟又曰周人作會而民始疑會盟也詩曰君子屢盟亂是用長春秋書盟多矣或書盟或書同盟莊十六年二十七年同盟於幽宣十七年同盟於馬陵十五年同盟於戚十八年同盟於虛朾襄三年同盟於雞澤九年同盟於戲二十五年同盟於重丘或書會盟僖十九年會盟於邾或盟於不地文三年公及晉侯盟二年及晉處父盟桓二十一年衛人及狄盟與及而不稱公莊十九年會齊侯宋公云云盟於幽隱元年及宋人盟於宿莊二十二年及齊高傒盟於防僖二十九年夏會王人云云盟於翟泉文二年及晉處父盟十年秋及蘇子盟於女栗襄十五年二月及宋向戌盟於劉左傳叔向曰明王之制再朝而會以示威再會而盟以顯昭明子太叔曰文襄之霸也諸侯有事而會不協而盟荀卿與榖梁曰盟詛不及三王史記平原君適楚毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血而定從於殿上毛遂左手持盤血而右手招十九人曰公相與歃此血於堂下公等録録音祿所謂因人成事者也漢高帝刑白馬以盟先王之時結民以忠信誠慤之心維邦國以比小事大之禮然盟詛之末常不弛於天下使人明則知好惡幽則知信畏然後有同德而無離心則盟詛之輔於教也其可忽哉周禮有盟萬民有盟諸侯有詛萬民之不信有敘國之信用則盟詛固有大小矣司盟若合諸侯則共珠盤玉敦戎右以玉敦辟盟贊牛耳桃茢封人凡賓客軍旅大盟飾牛牲其未殺也飾以文繡其殺也置之于坎加書其上襄二十六年左傳曰宋伊戾將譛太子痤楚客過宋太子野享之伊戾歃用牲加書微之而騁告公曰太子將為亂既與楚客盟矣曲禮曰涖牲曰盟盤以盛耳敦以盛血尸之者執耳左氏哀十七年公會齊侯盟於蒙孟武伯問於高柴曰諸侯盟誰執牛耳季羔曰鄫衍之役吳公子姑曺發陽之役衛石魋武伯曰然則彘也定八年晉師盟衛侯衛人請執牛耳涉他成何曰衛吾溫原也焉得視諸侯將歃涉他捘衛侯之手及捥大者先歃小者亞之哀十三年吳晉爭先國語曰吳先歃晉亞之又晉語宋之盟楚人請先歃霸王之勢在德不在先歃定四年祝鮀曰晉文踐土之盟衛成公弟猶先蔡有玉帛以禮明神哀十二年子貢曰盟有玉帛以奉之有桃茢以祓不祥既盟則以盟書登於天府太史內史司會及六官皆受其二而藏之然則司盟共祈酒脯則既殺以盟於前又用酒脯以祈於後也覲禮諸侯覲天子春拜日秋禮山川丘陵冬禮月與四瀆而繼之以祭天燔柴祭山丘陵升祭川沈祭地瘞鄭氏謂升沈必就祭謂王巡狩也王巡狩之盟其神主日諸侯之盟其神主山川王官之伯會諸侯其神主月歟經言祭天而鄭氏言祭日經言祭地而鄭氏言祭月且方明以象上下四方而經傳凡言主盟者多稱明神司盟北面詔明神左傳僖二十八年王子虎盟諸侯於王庭曰有干此盟明神殛之襄九年子駟子展曰明神不蠲要盟哀十二年子貢曰盟所以周信也明神以要之昭十三年叔向曰昭明於神盟也曰司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖齊語桓公與諸侯飾牲為載以約誓於上下庶神則諸侯之盟非特主山川也鄭氏謂王之盟主日諸侯主山川王官之伯主月其禮無據瑕禽曰平王東遷吾七姓從王王賜之騂旄之盟杜預曰言得重盟不以雞犬蓋騂旄之盟非王賜者不得用也襄十年詛祝掌盟詛類造攻説禬禜之祝號作盟詛之載辭以敘國之信用以質邦國之劑信載辭為辭而載之於䇿坎用牲加書於其上也詩曰出此三物以詛爾斯毛氏曰君以豕臣以犬民以雞左傳曰鄭伯使卒出豭行出犬雞以詛射頴考叔百人為卒二十五人為行書無逸曰否則厥口詛祝鄭氏曰大事曰盟小事曰詛賈公彥曰盟者盟將來詛者詛往過然季武子作三軍盟諸僖閎詛諸五父之衢襄十一年陽虎已丑盟桓子於稷門之內庚寅大詛又盟三桓於周社盟國人於亳社詛於五父之衢定五年六月鄭伯使卒出豭行出犬雞以詛射頴考叔者是盟有繼之以詛詛有不繫於盟則大事必盟而或詛詛以詛往過而或為將來也詩曰出此三物以詛爾斯毛氏曰君以豕臣以犬民以雞蓋以鄭伯使卒與行出此三物辨而等之其詳不可考也周禮左傳天子諸侯之盟皆執牛耳而衛太子蒯瞶與伯姬輿豭以盟蓋下人君之禮也然盟詛皆坎牲加書以告明神其異者盟有執耳歃血既盟有祈而無詛是也春秋之盟有適一時之急而不用牲者若子任割臂以盟莊公華元登楚子反之牀子反懼而與之盟此皆假行其禮而不用牲也春秋之盟或尋或同或乞或要或逃或渝或盟君以大夫或辱人以城下日以長亂莫之或熄皆先王之罪人也桃茢鄭氏曰茢菼帚也説文曰茢苕也古者人君出户則巫覡有事弔臣則桃茢在前開氷則桃弧棘矢以除其災致膳則葷桃茢以辟凶邪膳於君有葷桃茢於大夫去茢於士去葷則盟用桃茢宜矣蓋桃茢凶邪之所畏避者也觀古人度朔之論桃湯之用則桃又過於茢矣聘儀輕財重禮交人之道也聽命逹言使者之事也三輔人語輕財曰聘則聘之為義可知矣古者比年小聘三年大聘小聘曰問大聘曰殷聘殷中也盛也既嵗聘矣中復盛聘此周禮所以言殷相聘春秋傳所以言殷聘禮也周禮又言殷眺曰視殷眺以除天下之慝時問以諭諸侯之志玉人瑑圭璋八寸璧琮八寸以眺聘鄭氏特來曰聘衆來曰眺聘有圭眺有璋蓋眺為除慝而巳故其儀物殺也書於四時之中皆曰殷漢天文志於衡星殷南斗殷中州河濟之間則殷中也易有殷薦儀禮有殷奠傳有殷祭左傳曰祭以特牲殷以少牢公羊曰五年而再殷祭則殷盛也然則周禮所謂殷同殷國以衆來為盛也所謂殷相聘以間聘為中也左傳曰先王之制諸侯之喪士弔大夫送葬惟加好聘享三軍之事於是乎使卿則小聘之問雖不享有獻不及夫人主人不筵几不禮面不升不郊勞其禮如為介三介然則小聘蓋亦卿爾以其與君為禮也鄭氏曰小聘使大夫其説無據聘雖有國者之禮而其下亦有焉故凡聘女曰聘問人曰聘是也春秋書王臣來聘八諸侯之臣來聘二十有五隱七年天王使凡伯來聘僖二十年天王使宰周公來聘或稱名或稱字南季父家父祭叔歸父之類是也或稱弟隱七年桓三年齊侯使其弟年來聘或稱公子或稱公孫襄元年冬衛侯使公孫檦來聘五年夏鄭伯使公子發來聘或稱人莊三十三年荆人來聘或不稱氏文九年楚子使椒來聘十二年秦伯使術來聘襄二十九年吳子使札來聘或不言使莊一十三年祭叔來聘其褒貶輕重各稱其事非可以一端求也榖梁曰聘諸侯非正趙子曰凡言聘則知君使矣曷為又稱君以别乎不當稱使也此説非也凡聘所以通好則天子之於諸侯非不可以行聘也祭叔不言使所以譏其專行諸侯之遣使非不可以稱使也聘大夫之事也稱弟稱子譏之也公羊曰大夫來曰聘仍叔之子譏父老子代也啖子曰凡夷狄朝聘皆稱人禮書卷四十二
