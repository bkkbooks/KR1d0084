body:
  text: 禮書卷八十九宋陳祥道撰祀明堂我將詩序曰祀文王於明堂孝經曰孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝月令季秋上丁命樂正入學習吹為時饗帝是月也大饗帝遍祭五帝曲禮曰大饗不問卜祭五帝於明堂莫適卜也郊特牲曰郊血大饗牲樂記祀乎明堂而民知孝先王之於天尊而逺之故祀於郊而配以祖親而近之故祀於明堂而配以父孝經曰孝莫大於配天又曰郊祀后稷以配天宗祀文王於明堂以配上帝嚴父配天矣又曰配上帝者天則昊天上帝也上帝則五帝與之也明堂不祀昊天上帝不可謂配天五帝不與不可謂配上帝以上帝為昊天上帝耶而周禮以旅上帝對旅四望言之則上帝非一帝也以明堂特祀昊天上帝耶而考工記明堂有五室則五室非一位也祭法曰周人禘嚳而郊稷祖文王而宗武王鄭氏曰禘郊祖宗謂祭祀以配食也其說以為坐五帝於堂上以五人帝及文王配之坐五神於庭中以武王配之然古者祖有功而宗有德謂祖宗其廟耳非謂配於明堂也王肅曰審如鄭說則經當言祖祀文王不言宗祀也凡言宗者尊也周人既祖其廟又祀其宗月令之五人帝五人神所以配食四郊也其與享明堂於經無見又况降五神於庭中降武王以配之豈嚴父之意哉然宗祀文王則成王矣成王不祀武王而祀文王者蓋於是時成王未畢喪武王未立廟故宗祀文王而已此所以言周公其人也詩序曰豐年秋冬報則秋報者季秋之於明堂也冬報者冬至之於郊也先明堂而後郊者禮由內以及外也先嚴父而後祖者禮由親以及尊也明堂之祀於郊為文於廟為質故郊掃地藁秸而已明堂則有堂有筵郊特牲而已明堂則維羊維牛然郊有燔燎而明堂固有升煙漢武帝明堂禮畢燎於堂下古之遺制也由漢及唐或祠太一五帝光武或特祠五帝光武明帝或除五帝之坐同稱昊天上帝晉武帝時議除明堂五帝之坐同稱昊天上帝各設一坐而已後又復五帝位或合祭天地唐武后合祭天地於明堂中宗仍之或配以祖或配以羣祖漢武帝祠明堂髙皇帝對之章帝祠明堂以光武配後又以髙祖太宗世宗中宗世祖顯祖配各一大牢其服也或以衮冕東晉武或以大裘梁禮其獻也或以一獻或以三獻梁朱升曰祀明堂改服大裘又以貴質不應三獻請停三獻止於一獻隋於雩壇行三獻禮抑又明堂之制變易不常與考工之說不同皆一時之制然也祀大神示地示土示之辨詩序曰郊祀天地大宰祀五帝則掌百官之誓戒祀大神示亦如之大宗伯以黃琮禮地注禮地以夏至謂神在崑崙者牲幣各放其器之色凡祀大神享大鬼祭大示帥執事而卜日小宗伯大烖及執事禱祠于上下神示典瑞兩圭有邸以祀地大司樂以六律六同五聲八音六舞大合樂以致鬼神示乃奏大簇歌應鍾舞咸池以祭地示北郊神州之神及社稷凡六樂五變而致介物及土示原隰平地之神凡樂函鍾為宫若樂八變則地示皆出可得而禮矣地示主崑崙大祝辨六號二曰示號若云后土地示凡以神仕者以夏日至致地示物魅玉人兩圭有邸以祀地旅四望孔穎達曰黃琮禮崑崙之示以夏至兩圭祀神州之示宜以七月河圖推象云崑崙東南萬五千里神州孝經緯云祭地示於北郊周禮或言大示或言地示或言土示蓋大示則地之大者地示則凡地之示與焉土示則五土之示而已禮記言兆於南郊就陽位也南郊祀天則北郊祀地矣祀天就陽位則祭地就隂位矣大宗伯以黃琮禮地牲幣各放其器之色而牧人隂祀用黝牲則牲有不同也典瑞兩圭有邸以祀地則玉有不同也大司樂奏太簇歌應鍾以祀地示凡樂函鍾為宫若樂八變地示皆出則樂有不同也蓋先王之於神示求之然後禮禮之然後祀函鍾為宫求之之樂也太簇應鍾祀之之樂也若夫玉之黃琮兩圭牲幣之黃黑蓋祭有不一而牲幣器亦從而異也鄭氏之徒謂夏至於方丘之上祭崑崙之示七月於泰折之壇祭神州之示此惑於讖緯之說不可考也凡以神示者以冬日至致天神人鬼以夏日至致地示物魅致天神而人鬼與之者荀卿所謂郊則并百王於上天而祭之是也郊天合百王則郊地合物魅宜矣鄭氏謂致人鬼於祖廟致物魅於壇墠蓋用祭天地之明日於經無據社后土之辨書曰敢昭告于皇天后土孔曰后土社也周禮大宗伯王大封則先告后土后土土神也黎所食者大祝建邦國先告后土用牲幣后土社神月令中央其神后土后土顓氏之子黎兼為土官左氏曰君戴皇天而履后土又曰共工氏有子曰勾龍為后土古者正祭有常數非正祭者無常時故嵗祭天者四詩序曰春夏祈榖于上帝又曰豐年秋冬報則春祈榖左氏所謂啓蟄而郊是也夏祈榖所謂龍見而雩是也秋報月令所謂秋季大饗帝是也冬報周禮所謂冬日至於地上之圜丘是也凡此正祭也旅類造禱祠之屬非正祭也祭地之禮周禮所謂夏日至於澤中之方丘正祭也禱祠之屬非正祭也然先王親地有社存焉禮曰饗帝於郊祀社於國又曰郊所以明天道社所以神地道又曰郊社所以事上帝又曰明乎郊社之義或以社對帝或以社對郊則祭社乃所以親地也大宗伯以血祭祭社稷又曰大封先告后土大祝大師大㑹同宜于社又曰建邦國先告后土則后土非社矣鄭氏釋大宗伯謂后土土神黎所食者釋月令謂后土黎也釋大祝謂后土社神也既曰土神又曰社神是兩之也書曰敢昭告于皇天后土左氏曰君戴皇天而履后土漢武帝祠后土於汾隂宣帝祠后土於河東而宋梁之時祠地皆謂之后土則古者亦命地示為后土矣然周禮有大示有地示有土示又有后土則所謂后土者非地示也禮書卷八十九
