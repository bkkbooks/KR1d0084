body:
  text: 禮書卷七十六宋陳祥道撰用牲之别周官牧人掌牧六牲以共祭祀之牲牷凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之凡時祀之牲必用牷物凡外祭毁事用尨可也凡祭祀共其犧牲以授充人繫之蓋純謂之牷完謂之犧故禮記言毛以告全左傳言雄雞自斷其尾憚其為犧則牷之純在色犧之完在體也然牷者亦必完犧者亦必純禮凡言牷物其為犧可知也凡言犧牲其為純可知也先儒謂陽祀祀天於南郊及宗廟也隂祀祭地於北郊及社稷也望祀四嶽四瀆也然大宗伯牲幣各放其器之色則天牲以蒼而不以騂地牲以黃而不以黝者蓋騂者陽之盛色陽祀以騂為主而不必皆騂黝者隂之盛色隂祀以黝為主而不必皆黝則牧人所言亦其大率而巳郊特牲之騂犢閟宫之騂犧此祀天之用騂者也旱麓信南山之騂牲閟宫之騂剛洛誥之騂牛此宗廟之用騂者也爾雅曰黃牛黑脣曰犉詩曰殺時犉牡此社稷之用黝者也詩曰來方禋祀以其騂黑則四方有用騂黑者矣孔子曰犁牛之子騂且角山川其舍諸則山川有用騂者矣湯之告天以𤣥牲用夏禮也揚子雲曰𤣥牛騂白其升於廟乎兼三代之禮言之也曲禮曰天子以犧牛諸侯以肥牛大夫以索牛士以羊豕曾子曰諸侯祭牲曰大牢大夫祭牲曰少牢士之祭牲曰特豕無祿者稷食楚屈建曰國君有牛享大夫有羊饋士有豚豕之奠庶人有魚炙之薦射觀父曰天子祀以㑹諸侯祀以大牢卿祀以特牛大夫祀以少牢士祀以特牲庶人祀以魚儀禮大夫饋食以少牢士虞與饋食皆特牲雜記上大夫之虞也少牢卒哭成事附皆大牢下大夫之虞也犆牲卒哭成事附皆少牢然則大夫用牛士用羊豕蓋天子大夫士之禮歟凡此特宗廟用牲之别而巳若夫王之喪祭用馬牲伏瘞用犬牲凡靣禳釁用雞牲以至王之社稷大牢諸侯社稷少牢與夫五祀盟詛雩禜招挭侯禳之類其用牲之别蓋又有等矣先王之於牲以牡為貴而賤其牝以小為貴而賤其大以純為貴而賤其尨以充美為貴而去其疾故書曰敢用𤣥牡詩曰白牡騂剛從以騂牲又曰殺時犉牡此以牡為貴也郊特牲曰牲孕弗食祭帝不用月令仲春祀犧牲無用牝則祭亦有用牝而非所貴也楚語曰郊禘不過角繭栗蒸嘗不過把握記曰天地之牛角繭栗宗廟之牛角握賔客之牛角尺挍人將事于四海山川飾黃駒此以小為貴者也牧人凡外祭毁事用尨可也犬人凡幾弭沈辜用尨可也以用尨為可則不若齊毫之為貴者也牛夜鳴則㾞羊冷毛而毳羶犬赤股而躁臊鳥皫色而沙鳴鬱馬黑脊而般臂螻豕盲視而交睫腥盲視亢鼻也莊周以為不可適河則牛馬犬鳥之疾者其可以祭祀哉此以充美為貴者也書曰文王騂牛一武王騂牛一公羊曰周公白牡魯公騂剛羣公不毛由此觀之廟各一牢矣逸禮毁廟之主昭一牢穆一牢省牲迎牲殺牲之儀太宗伯祀大神享大鬼祭大示宿視滌濯省牲鑊小宗伯大祭祀省牲視滌濯太宰及納亨贊王牲事及祀之日贊玉幣爵之事大司冦及納亨前王祭之日亦如之然則夕牲之禮於宗伯言省牲則就省之也於王言納亨納其所亨而不就省之也鄭氏云納亨者納牲將告殺謂鄉祭之晨既殺以授亨人然祭之晨即祭之日也祭之日王袒牽牲子姓答之卿大夫序從之禮器曰君牽牲大夫贊幣而從明堂位曰君肉袒迎牲于門大夫贊君祭義曰君牽牲穆答君卿大夫序從士執芻君執鸞刀羞嚌樂工奏昭夏封人從而歌舞之及詔於庭而麗于碑則王射之卿大夫袒而毛王執鸞刀以刲焉祭義曰君牽牲既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也禮曰納牲詔於庭詩曰執其鸞刀以啓其毛方是時也不特司徒奉牛宗伯奉雞司馬奉馬羊司寇奉犬司空奉豕而巳小宗伯毛六牲頒之于五官使共奉之又太宰太僕贊其事太宰大僕祭祀贊王牲事則前祭及祭曰皆贊封人供其水藁諸侯則士執芻充人共其互與盆簝國語曰禘郊之事天子必自射其牲然司弓矢凡祭祀共射牲之弓矢則射牲豈特禘郊哉諸侯殺牲之禮蓋與天子同大夫士皆視殺于門外惟其視之而弗親外之無不入所以為卑者之事也漢郊祀志武帝祠地令侍中儒者皮辨縉紳射牛亦先王之遺制歟互盆簝牛人凡祭祀共牛牲之互與其盆簝以待事鄭司農謂互楅衡之屬盆以盛血簝受肉籠也鄭康成謂互若今縣肉格楚茨詩曰或剝或亨或肆或將毛氏曰或陳于牙或齊于肉蓋互牙古字通用祭之日君牽牲入廟門麗于碑卿大夫袒而毛鸞刀以刲盛血以盆受肉以簝然後陳肉於互以授亨人亨之掌舍設梐枑修閭氏掌比國中宿互者互行馬也肉格謂之互蓋其制類此鄭司農以為楅衡之屬非是禮書卷七十六
