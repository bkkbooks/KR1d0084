body:
  text: 禮書卷七十一宋陳祥道撰禘禮祫禮士虞禮曰哀薦祫事始虞謂之祫事者主欲其祫先祖喪服曰都邑之士則知尊禰大夫及學士則知尊祖諸侯及其太祖天子及其始祖之所自出始祖之所自出謂祭天也周禮大宗伯以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王肆獻祼饋食在四時之上則是祫也禘也祫言肆獻禘言饋食互相備也魯禮三年喪畢而祫於太祖眀年春禘於羣廟自爾以後率五年而再殷祭一禘一祫正義云若僖公以三十三年薨至文二年秋八月大事于太廟于禮雖少四月猶是三年而為祫祭此三年喪畢祫于太祖也眀年春禘於羣廟者案僖公八年及宣八年皆有禘則僖公宣公三年春有禘可知以文公二年祫則知僖公宣公二年亦有祫僖公宣公二年既有祫是眀年春禘四年五年六年秋祫是三年祫更加七年八年添前為五年禘故僖公宣公八年皆有禘五年之中一禘一祫司尊彞凡四時之間祀追享朝享祼用虎彞蜼彞皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所胙也鄭司農曰追享朝享謂禘祫也在四時之間故曰間祀鄭氏曰追享謂追祭遷廟之主以事有所請禱朝享謂朝受政於廟春秋傳曰閏月不告朔猶朝于廟大司樂凡樂圜鍾為宫黃鍾為角大簇為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫大簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黃鍾為宫大吕為角太簇為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣鄭氏曰此三者皆禘大祭也詩雍禘太祖也禘大祭也大於四時而小於祫太祖謂文王正義云毛於禘祫其言不明惟閟官傳曰諸侯夏禘則不礿秋祫則不嘗然則天子亦有禘祫蓋亦如鄭三年一祫五年一禘也爾雅曰禘大祭即云繹又祭則禘是宗廟之禘也禘大於四時小於祫然禮宜小者椆大者稀而禮緯言三年一祫五年一禘者以天道三年一閏五年再閏故制禮象之其實禘祫自相距各五年非祫多而禘少也春秋文二年大事于太廟公羊曰大事者何祫也毁廟之主陳於太廟未毁之主皆升合食是合羣廟之主謂之大事昭十五年有事于武宫左傳曰禘於武公是禘祭一廟謂之有事是祫大於禘也玄鳥祀高宗也祀當為祫髙宗崩始合祭於契之廟也古者三年喪畢禘於其廟而後祫祭于太祖眀年春禘于羣廟自此之後五年而再殷祭一禘一祫正義云鄭作魯禮禘祫志其略云魯莊公三十二年秋八月薨閔二年五月而吉禘閔二年春除喪夏四月則祫又却以五月禘此月大祭故譏其速眀當異嵗也魯閔公二年秋八月薨僖二年除喪眀年春禘自此之後乃五年再殷祭六年祫故八年秋七月禘于大廟用致夫人致夫人自有禮因禘事而致哀薑故譏焉魯僖公冬十二月薨文二年秋八月祫絰言八月丁卯大事于太廟躋僖公魯文公十八年春二月薨宣二年除喪而祫眀年春禘六年祫故八年禘絰曰夏六月有事於太廟仲遂卒長發大禘也大禘祭天也禮記曰王者禘其祖之所自出以其祖配之是也正義云王肅謂禘祭宗廟非祭天也禮記王制曰天子犆礿祫禘祫嘗祫蒸天子諸侯之喪畢合先君之主於祖廟後因以為常天子先祫而後時祭諸侯先時祭而後祫魯禮三年喪畢而祫於太祖眀年春禘於羣廟自爾之後五年而再殷祭一祫一禘諸侯礿犆禘一犆一祫嘗祫蒸祫曽子問當七廟五廟無虛主者祫祭於祖為無主耳又曰祫祭於祖則祝迎四廟之主禮運曰魯之郊禘非禮也周公其衰矣眀堂位曰季夏六月以禘禮祀周公於太廟喪服小記曰王者禘其祖之所自出以其祖配之大傳曰禮不王不禘王者禘其祖之所自出以其祖配之郊祀天子諸侯及其太祖大夫士有大事以省於其君于祫及其髙祖學記曰未卜禘不視學遊其志也雜記孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也鄭氏禘祫志云太王王季以上遷主祭於后稷之廟其座位與祫祭同文武以下遷主若穆之遷主祭於文王之廟文王居室之奧東面文王孫成王居文王之東而北面以下穆主直至親盡之祖以次繼而東皆北面無昭主若昭之遷主祭於武王之廟武王亦居室之奧東面其昭孫康王亦居武王之東北面以次亦繼而東直至親盡之祖無穆主也其尸后稷廟中后稷尸一昭穆尸各一文王廟中文王尸一穆尸共一武王廟中武王尸一昭尸共一逸禮稱二尸者據文武之廟及太祖昭穆而言也其實太祖廟三尸也故云獻昭尸如穆尸之禮其五齊自醴齊而下四齊而巳無泛齊酒亦三酒所陳設之處所加之眀水玄酒等一如禘祭於文王之廟無降神之樂大司樂云黃鍾為宫以下等樂云若九變人鬼可得而禮矣鄭氏云人鬼謂后稷也先奏是樂以致其神禮之以玉然後合樂而祭焉則不據文武也其祼尊用雞彞鳥彞司尊彞云春祠夏礿祼用雞彞鳥彞以禘在夏故也朝踐用兩獻尊再獻用兩象尊其迎尸出在堂之時其后稷文武之尸皆南向餘尸主如室中之左右也謂后稷以下昭穆昭西面穆東面文武以下穆主在西東面武王以下昭主在東西面也合樂時作四代之樂其祭禮后稷文王武王廟各一日凡祭之禮質眀行祼謂之農祼繼以朝踐次乃饋熟以下是則每廟各行此禮以其禮煩難可以一日而畢又乖朝踐之義繹祭則同一日馬融王肅皆云禘大祫小鄭玄注二禮以祫大禘小賈逵劉歆則云一祭二名禮無差降杜預曰逸禮記祫于太廟之禮云毁廟之主升合食而立二尸又按韓詩內傳云禘取毁廟之主皆升合食於太祖則禘小於祫也祫則備五齊三酒禘唯四齊三酒祫則備用六代之樂禘則四代而下又無降神之樂以示其闕也後漢光武建安二十六年詔問張純禘祫之禮不施行幾年純奏舊制三年一祫毁廟之主合食髙廟存廟主未嘗合元始中始行禘禮父為昭南嚮子為穆北嚮父子不並坐而孫從王父決疑要注曰始祖東面父南面故曰昭昭眀也子北面故曰穆穆順也禘之為言諦諦諟昭穆尊卑之義以夏四月陽氣在上隂氣在下故正尊卑之義祫以冬十月五穀成熟物備禮成故合聚飲食祖宗廟未定且合祭高廟為常後三年冬祫五年夏禘之時但就陳祭毁廟主而巳謂之殷祭太祖東面惠文武元四帝為昭景宣二帝為穆惠景昭三帝非殷祭時不祭也袁準曰祫及壇墠禘及郊宗石室此所及逺近之殺也大傳曰禮不王不禘諸侯不禘降殺於天子也若禘祫同貫此諸侯亦不得祫也然則禘大而祫小謂祫為殷祭者大於四時皆大祭也博士陳舒表三嵗一閏五年祭八年又殷兩頭如四實不盈三又十一年殷十四年殷凡間含二則十年四殷與禮五年再殷其義合矣博士徐禪春秋左氏傳曰嵗祫及壇墠終禘及郊宗石室許慎稱舊説曰終者謂孝子三年喪終則禘於太廟以致新死者也徐邈議禮五年再殷凡六十分中每三十月殷也大學博士曹述初難云三年之喪其實二十五月則五年何必六十月禮天子特礿三時皆祫禘雖有定年而文無定月按眀堂位云夏六月以禘禮祀周公則今之四月七月至孟獻子禘其祖則今之五月春秋文公二年大事于太廟則今之六月邈答曰五年再殷象閏無取三年喪也祫三時皆可者蓋喪終則吉而祫服終無常故祫隨所遇唯春不祫故曰特礿非殷祀常也禮大事有時日故蒸嘗以時況祫之重無定月乎今據徐邈議每三十月當殷祀唐陸淳曰禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又推尋始祖所出之帝而追祀之以其祖配之者謂於始祖廟祭之而便以始祖配祭也此祭不兼羣廟之主為其疏逺不敢褻狎故也其年數或每年一行或三年一行可知也鄭玄注祭法云禘謂配祭昊天上帝於圜丘也蓋見祭法所説文在郊上謂為郊之最大者故為此説耳祭法所論禘郊祖宗者謂六廟之外永世不絶祭者有四種耳非關配祭也禘之所及最逺故先言之耳何關圜丘哉若實圜丘五經之中何得無一字説處又云祖之所自出謂感生帝之靈威仰也此何妖妄之甚此文出自讖緯始於漢哀平間偽書也故桓談賈逵蔡雍王肅之徒疾之如讐而鄭玄述之通於五經其為誣蠧甚矣或問曰若然則春秋書魯之禘何也答曰成王追寵周公故也故祭統云成王追念周公賜之重祭郊社禘嘗是也仲尼燕居云眀郊社其義也郊禘天子之禮社與嘗諸侯所自有撰禮者見春秋書嘗社以為郊與禘同遂妄意言耳魯之用禘蓋於周公廟而上及文王即周公之所出故也此祭唯得於周公廟為之閔公時遂僣於莊公廟行之亦猶因周公廟有八佾季氏遂用之於私庭也以其不追配故直言莊公而不言莊宫眀用其禮物耳不追配文王也本以夏之孟月為之至孟獻子乃以夏之仲月為之禮雜記云孟獻子曰五月日至可以有事于上帝七月日至可以有事于祖七月而禘獻子為之也今備引諸經書之文證之于左閔二年五月吉禘于莊公譏其不當吉又不當禘于莊僖八年秋七月禘于大廟用致夫人譏其非時之禘又譏致于夫人也左氏云蒸嘗禘于廟又云禘于武宫僖宫襄宫又晉人以寡君之未禘祀時未終喪也又云魯有禘樂賓祭用之禮運云魯之郊禘非禮也周公其衰矣魯郊多失時又於諸公用禘禮也郊特牲曰春禘而秋嘗鄭注禘當為礿眀堂位曰季夏六月以禘禮祀周公於大廟夏之四月祭義曰春禘秋嘗祭統曰春礿夏禘鄭氏云夏商時禮也又曰成王追念周公賜之重祭郊社嘗禘是也仲尼燕居云眀乎郊社之義禘嘗之禮治國其如指諸掌而巳王制云春礿夏禘鄭云商時禮也又云礿則不禘禘則不嘗嘗則不蒸蒸則不礿鄭云虞夏諸侯嵗朝廢一時祭也詩周頌序云雍禘大祖也鄭云禘大於時祭而小於祫又商頌云長發大禘也爾雅云禘大祭也論語曰禘自既灌而往者吾不欲觀之矣國語曰禘郊之牛角繭栗問曰左傳云蒸嘗禘于廟何也答曰此謂見春秋經前後祭祀唯有此三種以為祭名盡於此但據經文不識經意所以云爾又見經中禘于莊公以為諸廟合行之故妄云禘于武宫僖宫襄宫妄引禘文而説祭爾問者曰若禘非時祭之名則禮記諸篇所説其故何也答曰禮記諸篇或孔門後之末流弟子所撰或漢初諸儒私撰之以求購金漢初以金購遺書故儒者私撰禮篇鬻之皆約春秋為之見春秋禘于莊公遂以為時祭之名若非末流弟子及漢初儒者所著不應差互若此也見春秋唯兩度書禘一春一夏閔二年五月吉禘于莊公今之三月僖公八年七月禘于太廟今之五月也所以或謂之春祭或謂之夏祭各自著書不相扶會理可見也而鄭玄不達其意故注郊特牲云禘當為礿祭義與郊特牲同鄭遂不注祭統及王制則云此夏殷時禮也且祭統篇末云成王追念周公賜之重祭郊社嘗禘是也何得云夏殷禮哉遂都不注鄭又見吉禘于莊公禘小於祫見毛詩雍什注儒者通之云三年哀畢小禘于禰五年大祫自此便三年一禘五年一祫若禘不迎羣廟之主何謂之大若迎羣廟之主何得於禰廟迎之又曽子問篇中何得不序引文在下乖謬之甚也且春秋宣八年公羊云大事祫也毁廟之主皆陳於太祖陳者眀素皆藏於太祖廟今但出而陳之也未毁廟之主皆升合食于太祖升者眀自為本廟而來升也禮記曽子問篇云祫祭于太廟祝迎四廟之主眀毁廟之主皆素在太廟故不迎也又云非祫祭則七廟五廟無虛主義與公羊同並無説禘為殷祭處則禘不為殷祭眀矣殷重大之義也問曰若禘非三年喪畢之殷祭則晉人云以寡君之未禘祀何也答曰此左氏之妄也左氏見經文云吉禘于莊公以為喪畢當禘而不知此本魯禮也不合施於它國左氏亦自云魯有禘樂賓祭用之即眀諸國無禘了可知矣是左氏自相違背亦可見矣或曰禘非殷祭則論語云禘自既灌而往者吾不欲觀之矣何也答曰此夫子為大夫時當禘祭而往助祭歎其失禮故云爾也初酌酒灌地以降神之時其禮易行既灌之後至於饋薦則事繁而生懈慢故夫子退而嫌之或人因而問其故夫子不欲指斥君之惡便云不知也言其禮難知也若能知者則於天下大事莫不皆知可如掌中之物言如此者是禘禮至難知以隱其前言非斥之意耳注家不達其意遂妄云既灌之後列尊卑序昭穆為躋僖公故惡之且禘祭之時固當先陳設座位位定之後乃灌以降神郊特牲云既灌然後迎牲眀牲至即殺之以獻何得先祼然後設位乎先儒不達經意相沿致誤皆此類也或難曰夫子所歎若非為逆祀别致虧禮則春秋何不書乎答曰春秋所紀祭祀皆失時及非常變故乃云爾至於懈慢虧失史官如何書乎若如此細故盡書則春秋一年經當數萬言不當如此簡也述祭統者不達此意遂云眀乎郊社之義禘嘗之禮治天下其如指諸掌乎此不達聖人掩君惡之意遂云爾假令達於祭祀亦儀表中一事爾若别無理化之德何能治天下乎此並即文為説不能逺觀大指致此弊耳問者曰王制所云礿則不禘禘則不嘗嘗則不蒸蒸則不礿信如鄭説乎答曰撰此篇者亦緣見春秋中唯有禘蒸嘗三祭謂魯唯行此三祭遂云爾若信如鄭注諸侯每嵗皆朝即逺國來往須厯數時何獨廢一時而已又須往來當在道路如何守國理民乎問者曰眀堂位云季夏六月以禘禮祀周公于太廟又云夏礿秋嘗冬蒸此即以禘為大祭而時祭闕一時義甚眀著也答曰禮篇之中夏礿秋嘗冬蒸庸淺鄙妄此篇為甚故云四代之官魯兼一用之又云君臣未嘗相弒也禮樂刑法未嘗相變也其鄙若此何足徴乎鄭玄不能尋本討原但隨文求義解此禘禮輒有四種其注祭法及小記則云禘是祭天注詩頌則云禘是宗廟之祭小於祫注郊特牲則云禘當為礿注祭統王制則云禘是夏殷之時祭名殊可怪也問曰禘若非圜丘國語云郊禘之牛角繭栗何也答曰凡禘皆及五帝五帝太皥等是也以其功高厯代兆於四郊以祭之比之次於天帝且郊祀稷牛角猶繭栗則太皥之牛不得不爾何足疑哉儒者又以禘祫俱大祭祫則於太廟列羣宫之主禘則於文武廟各近昭穆之主文為穆列武為昭列已毀廟及未毀廟之主各以昭穆分集於文武子謂凡太廟之有祫祭象生有族食之義列昭穆則齒尊卑之義今乃分昭穆各於一廟集之有何理哉又五經中何得無似是之説言不獨無眀文亦無疑似之説若信有此禮五廟七廟有虛主其曽子問篇中何得不該義己上見蓋儒者無以分别禘祫之異強生此義又何怪哉周禮大宗伯以肆獻祼享先王以饋食享先王司尊彞凡四時之間祀追享朝享夫肆獻祼饋食在時享之上追享朝享間於時享之間則追享禘也禘以肆獻祼為主猶生之有饗也朝享祫也祫以饋食為主猶生之有食也古者喪除朝廟合羣祖而祭焉故祫謂之朝享以合羣祖為不足眀年又禘其祖之所自出故禘謂之追享自此五年而再殷祭三年一祫又二年一禘公羊曰五年而再殷祭禮緯曰三年一祫五年一禘考之春秋文二年八月大事于大廟躋僖公公羊曰大事者何祫也穀梁曰大事者何大是事也著祫嘗則僖公之喪畢於文二年十二月八月喪未畢而祫且躋僖公焉非禮也故書大事躋僖公以譏之先儒曰禫而後祫僖公以十二月所少者四月喪畢也閔二年吉禘于莊公公羊曰言吉者未可吉也穀梁曰喪事未畢而舉吉祭故非之也則莊公之喪畢於閔二年而禘必踰年二年而禘非禮也故書吉禘于莊公以譏之此喪除而祫士虞禮曰哀薦祫事虞而欲合於先祖則喪畢之祭莫始於祫也踰年而禘之證也禮記曰未卜禘不視學左傳稱晉人曰寡君之未禘祀此皆喪終踰年之禘也故僖二年除閔之喪八年秋禘于太廟宣二年除文之喪八年夏有事于太廟均八年也其去喪除踰年之禘適五年耳則有事為禘可知此三年禘之證也鄭康成曰魯禮三年喪畢禘于其廟然後祫于太廟眀年春禘于羣廟其言喪畢之祫眀年之禘固合春秋之義其言禘于其廟又禘于羣廟是不知魯之失禮而惑之也左氏曰禘于僖宫武宫襄宫此魯之失禮孔子曰魯之郊禘非禮也周公其衰矣禘之非禮蓋此類歟儀禮曰學士大夫知尊祖矣諸侯及其大祖天子及其始祖之所自出以其祖配之諸侯及其大祖大夫有事省於其君而祫及其高祖是學士大夫知尊祖而巳有時祭而無祫諸侯及其大祖而巳有祫而無禘大夫有事省於其君然後有祫則周公有大勳勞省於成王然後有禘故禮記曰以禘禮祀周公於大廟則禘可施於羣廟哉春秋書吉禘于莊公不特譏禘也兼譏禘于莊公也晉之有禘蓋亦僣耳先王制禮必象天道故月祭象月時祭象時三年之祫象閏五年之禘象再閏而禮數者小稀者大小者祭及近大者追及逺此孔融王肅所以皆言禘大祫小也康成以配祖之禘為圓丘之祭以羣廟之禘為魯之正禮於是謂祫大禘小而始則禘先祫後終則祫先禘後此不經之論也然則禘之年月可推於春秋見於禮記謂魯以六月禘周公魯之六月夏之四月也孟獻子易之以七月日至而用夏之五月君子譏之崔靈恩言禘宜在夏張純言禘以四月其説是也祫之年月經傳無文禮緯與康成謂祫在三年張純謂祫在十月於理或然蓋禘以諦昭穆之尊卑必以四月以其陽上隂下有尊卑之義也祫以合羣祖必以十月以其萬物歸根有合於本之義也然康成又以王制祫禘祫嘗祫蒸為三年之祫而祫無常月殆不然也唐自睿宗以後三年一祫五年一禘各自計然至二十七年凡五禘七祫而禘祫同嵗太常議曰今太廟禘祫兩岐俱下或比年頻合或同嵗再序或一禘之後併為再祫或五年之內驟有三殷求禮經頗為乖失然則五年再殷之制可以不通計乎禘祫下公羊傳曰毁廟之主陳於太祖未毁廟之主皆升合食韓詩傳曰禘取毁廟之主皆升合食皆升合食則未毁廟之主舉矣鄭康成謂禘祭毁廟不及親廟禘祫制云禘不及親廟文武以下毀主依昭穆於文武廟中祭之王季以上於后稷廟中祭之陸淳謂禘祭不兼羣廟為其疏逺不敢褻狎此殆未嘗考之於經也詩頌長發大禘而歌玄王桓撥相土烈烈與夫武王之湯中葉之太甲雍禘太祖太祖后稷也而歌皇考之武王烈考之文王則不及親廟與夫不兼羣廟之説其足信哉祭法曰有虞氏禘黃帝而郊嚳祖高陽而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹商人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王禘非祀天而文在郊上者以其祖之尤逺故也祖宗非皆祀眀堂而文在郊下者以其祖有功宗有德而廟不遷故也虞夏商以質而親親故郊其近而祖其逺嚳顓頊之猶子鯀顓頊之子冥契之六世孫周以文而尊尊故郊其逺而祖其近鄭康成謂虞夏宜郊顓頊商宜郊契其説非也魯語展禽曰有虞氏禘黃帝而祖顓頊郊堯而宗舜夏后氏禘黃帝而祖顓頊郊鯀而宗禹商人禘舜而祖契郊冥而宗湯周人禘嚳而郊稷祖文王而宗武王幕舜後虞思也能帥顓頊者也有虞氏報焉杼杼少康之子能帥禹者也夏后氏報焉上甲微契後八世能帥契者也商人報焉高圉髙圉后稷十世孫大王能帥稷者也周人報焉凡禘郊祖宗報此五者國之祀典也其言虞氏郊宗異於祭法者賈氏曰虞氏之後在夏商為二王後有郊禘祖宗之體是也由此推之國語言商人禘舜亦異於祭法者蓋宋禮歟康成禘祫志曰祫備五齊三酒禘以四齊三酒祫用六代之樂禘以四代賈公彥曰祫十有二獻禘九獻然酒正凡祭祀以法共五齊三酒以實八尊大司樂以六律六同五聲八音八舞大合樂以致鬼神祇乃奏無射歌夾鍾舞大武以享先祖而無禘祫隆殺之辨掌客諸侯長猶且十有再獻則禘先王不容九獻而已彼蓋溺於祫大禘小之説然也國語曰郊禘之牛不過繭栗又曰郊禘之事射牛郊禘之事有全脀又曰天子親春郊禘之盛是禘之禮與郊同而其義則孔子以治天下如指諸掌則祭其有大於此乎爾雅曰禘大祭也則禘為廟祭之大者眀矣或曰以春秋有事為禘而公羊穀梁以大事于太廟為祫則禘非大於祫矣又曾子問王制皆以言祫而不該禘則祫非小於禘矣其故何也春秋言大事所以甚逆祀之非言有事則本下事而巳則有事不必非大事也曽子問兼諸侯而言之故舉祫而已王制之言祫非三年之祫也禮書卷七十一
