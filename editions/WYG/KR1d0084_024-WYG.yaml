  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_024-1a, image: WYG0130/WYG0130-0134c.png}
body:
  text: 禮書卷二十四宋陳祥道撰王及諸侯城郭之制典命上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節上公謂王之三公有徳者加命為二伯二王之後亦為上公國家國之所居謂城方也公之城盖方九里宫方九百步侯伯之城盖方七里宫方七百步子男之城盖方五里宫方五百步量人掌建國之法以分國為九州營國城郭掌固掌脩城郭溝池樹渠之固匠人營國方九里旁三門營謂丈尺其大小天子十二門通十二子國中九經九緯經涂九軌王宫門阿之制五雉宫隅之制七雉城隅之制九雉阿棟也宫隅城隅謂角浮思也雉長三丈髙一丈度髙以髙度廣以廣經涂九軌環涂七軌野涂五軌門阿之制以為都城之制宫隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂詩文王有聲曰築城伊淢作豐伊匹淢淢溝也匹配也箋云方十里曰成淢其溝也廣深各八尺文王受命而猶不自足築豐邑之城大小適與成偶大於諸侯小於天子之制左傳祭仲曰都城過百雉國之害也方丈曰堵三堵曰雉一雉之牆長三丈高一丈侯伯之城方五里徑三百雉故其大都不得過百雉先王之制大都不過三國之一中五之一小九之一今京不度非制也春秋隠七年宣九年定六年皆書城中城孟子曰三里之城七里之郭尚書大傳古者百里之國三十里之遂二十里之郊九里之城三里之宫七十里之國二十里之遂九里之郊三里之城一里之宫五十里之國九里之遂三里之郊一里之城以城為宫𤣥或疑焉周禮匠人營國方九里謂天子城也今大國九里則與天子同春秋傳曰中五之一小九之一以推此説小國大都之城三十三步三分之一非也然則大國七里之城小國三里之城焉為近可也或者天子實十二里城諸侯大國九里次城七里小國五里王城典命上公九命諸侯七命子男五命其國家宫室車旗衣服禮儀皆以九以七以五為節故上公桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就貳車九乘介九人禮九牢其朝位賓主之間九十步侯伯子男各殺以兩城之里數無所經見盖國家之禮宫室車旗衣服之制必眡其命而城則不然觀公侯受城地百里而不以九以七為節則城豈以命數制哉考工記匠人營國方九里王城九里則公七里侯伯五里子男三里矣祭仲曰都城不過百雉雉袤三丈百雉五百步大都不過三國之一鄭伯爵也城千五百步則五里而已然則孟子所謂三里之城七里之郭子男國也鄭康成嘗謂周城九里公七里異議駮云又謂王城十二里公城九里宫方九百步是自戾也詩曰築城伊淢盖言為之城以捍患為之洫以利水而巳鄭氏以城方十里言之是不知考工記所謂成間有洫者非謂成包以洫也井田之制城中之宅率家二畆半而納稼之後上入執宫功則至冬皆入保城矣六鄉之民七萬五千家又士工商在焉則九里之城固不能容然則考工記所言乃王之中城也春秋書城中城説者以為内城内城之外又有郭矣孟子曰三里之城七里之郭而郭數加多於城則王城之郭其廣不特又九里也説文曰郛郭也盖郭有重口之義而郛猶孚甲之於物歟書傳曰古者百里之國三十里之遂二十里之郊九里之城三里之宫七十里之國二十里之遂九里之郊三里之城一里之宫五十里之國九里之遂三里之郊一里之城鄭氏釋聘禮謂周制天子畿内千里逺郊百里以此差之逺郊上公五十里侯伯三十里子男十里近郊各半之其説又與書傳不同皆不可考經涂環涂匠人營國方九里旁三門國中九經九緯經涂九軌左祖右社面朝後市鄭氏曰天子門通十二子經緯之涂皆容方九軌軌謂轍廣乘車六尺六寸旁加七寸凡八尺是為轍廣九軌積七十二尺則此涂十二步也旁加七寸者輻内二寸半輻廣三寸半綆三分寸之二金轄之間三分寸之一盖南北為經東西為緯涂言經緯猶所謂廣輪阡陌也賈公彦曰王城面有三門門有三涂男子由右婦人由左車從中央然男子由右婦人由左車從中央者非謂各由一塗也詩曰宛然左辟此所謂婦人由左王畿詩曰邦畿千里春秋傳曰天子一圻周語曰規方千里以為甸服王制曰千里之内曰甸則天子寰内面五百里中為王域百里為郊二百里為邦甸三百里為邦削四百里為邦縣五百里為邦都郊之内置六鄉七萬五千家而宅田士田賈田近郊官田牛田牧田逺郊任其餘地謂之郊以其與邑交故也邦甸之内置六遂七萬五千家而公邑任其餘地謂之甸以甸法在是故也家削之地所以封大夫與王子弟之尤疏者謂之削以其削於縣都故也邦縣之地所以封卿與王子弟之疏者謂之縣以其係於上故也邦都之地所以封三公與子弟之親者謂之都以其有邑都故也邦甸浸廣矣又無九等之地故餘地為公邑邦削至都又廣矣而三等采地之外其餘亦為公邑公邑有四而載師特曰公邑之田任甸地者言公邑始於此也盖公邑閒田也天子使大夫治之遂人與縣師預焉遂人掌野自百里外至五百里皆曰野縣師掌邦國都鄙謂甸郊里之地域鄭康成謂二百里三百里其大夫如州長四百里五百里其大夫如縣正義或然也然邦甸亦謂之州司馬法二百里曰州是也邦縣亦謂之都載師所謂小都是也邦都亦謂之畺載師所謂畺地是也此周制也周九服侯在畿外夏則五服甸在畿内六鄉六遂一鄉五州二十五黨百二十五族五百閭二千五百比自比長下士以上其官三千五十六鄉之官凡一萬八千三百三十六一遂五縣二十五鄙百二十五鄼五百里二千五百鄰自里宰下士以上其官六百五十六六遂之官凡三千九百三十六惣二萬二千二百七十二人學者固疑財不足以禄之然王畿受天下之財貢六鄉六遂乃軍之所在而邦家之本繫焉是雖禄養之繁先王不以為費也夫鄉以嚮於内遂以遂於外内者謂之民則以禮義為主故鄉大夫待之以教法外者謂之甿則以功事為主故遂大夫齊之以政令鄉官謂之鄉吏而其爵皆加遂一等故鄉大夫鄉州長中大夫黨正下大夫而比長則下士遂官謂之為邑者而其爵皆降鄉一等故遂大夫中大夫縣正下大夫鄙師上士而鄰長則非士鄉學加遂一等故謂之庠庠者養也所以養人材遂學降鄉一等故謂之序序者射也所以教藝事學記曰術有序鄉之所辨有貴賤遂則辨老幼廢疾而已鄉之徴賦有閭師遂則里宰徴斂而已鄉則大祭祀羞牛牲遂則凡祭祀共野牲而已鄉官大喪執纛御匶執斧涖匠師遂官大喪帟幄先道抱磨共丘籠而已鄉稽鄉器遂稽稼器鄉大比以三年遂大比以三嵗三年大比則攷其徳行道藝而興賢者能者三嵗大比則興甿眀其有功者屬其地治者則賢能不待嵗而後眀功事必待嵗而後見凡此鄉遂之辨也然遂之相保相賙相葬相賓不異於鄉鄉之相受相糾不異於遂鄉之田法同於遂遂之軍法同於鄉先王之於家也既以五家為比為鄰積而上之至於萬二千五百家為鄉為遂其於人也既以五人為伍為兩積而上之至於萬二千五百人為軍而又十家為聨禮書卷二十四
