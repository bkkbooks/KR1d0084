body:
  text: 禮書卷十七宋陳祥道撰后褘衣褘衣后祭先王之服也上公如王之服則上公之夫人如后之服禮記言夫人副禕是也魯非上公亦尊其服者以周公之後故也其色𤣥揄狄揄狄后祭先公之服也玉藻曰夫人揄狄雜記曰復夫人税衣揄狄葢三夫人三公之妻及侯伯之夫人皆揄狄也王姬嫁於諸侯車服下王后一等亦揄狄特雉數與三公之妻侯伯之夫人異耳其色青闕狄后祭羣小祀之服玉藻曰君命屈狄喪大記曰復夫人以屈狄皆子男之夫人也其色赤鞠衣月令春天子乃薦鞠衣于先帝葢薦之於祀告将服之以蠶鄭氏曰太皥之屬是也孔穎達曰薦鞠衣者薦於神座以求福祥也司服辨外内命婦之服鞠衣展衣褖衣玉藻曰再命鞠衣鄭氏曰内命婦之服鞠衣九嬪也展衣世婦也褖衣女御也外命婦其夫孤也則服鞠其夫卿大夫也則服展衣其夫士也則服褖衣其色黄無雉餘同褘衣制展衣詩曰其之展也鄭氏曰后見王及賓客服之然則内外命婦之鞠衣展衣褖衣則其助祭之服與其色白無雉餘同褘衣制周禮内小臣掌王后之命正其服位内司服掌王后之六服褘衣揄狄闕狄鞠衣展衣褖衣素沙鄭司農曰褘衣畫衣也祭統曰君卷冕立于阼夫人副褘立于東房揄狄闕狄畫羽飾展衣白衣也喪大記曰復者朝服君以卷夫人以屈狄世婦以襢衣屈者音聲與闕相似襢與展相似皆婦人之服鞠衣黄衣也素沙赤衣也𤣥謂狄當為翟翟雉名伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰摇王后之服刻繒為之形而彩畫之綴於衣以為文章褘衣畫翬者揄翟畫摇者闕翟刻而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄翟祭羣小祀則服闕翟今世有圭衣者盖三翟之遺俗鞠衣黄桑服也色如鞠塵象桑葉始生月今三月薦鞠衣于先帝告桑事展衣以禮見王及賓客之服字當為䄠䄠之言亶亶誠也詩國風曰玼兮玼兮其之翟也下云胡然而天也胡然而帝也言其徳當神明又曰瑳兮瑳兮其之展也下云展如之人兮邦之媛也言其行配君子二者之義與禮合矣雜記曰夫人復税衣揄狄又喪大記曰士妻以縁衣言褖者甚衆字或作税此縁衣者實作褖衣也褖衣御于王之服亦以燕居男子之褖衣黒則是亦黒也六服備於此矣褘揄狄展聲相近縁字之誤也以下推次其色則闕狄赤揄狄青褘衣𤣥婦人尚専一徳無所兼連衣裳不異其色素沙者今之白縳也六服皆袍制以白縳為裏使之張顯今世有沙縠者名出於此辨外内命婦之服鞠衣展衣縁衣素沙内命婦之服鞠衣九嬪也展衣世婦也縁衣女御也外命婦者其夫孤也則服鞠衣其夫卿大夫也則服展衣其夫士也則服縁衣三夫人及公之妻其闕狄以下乎侯伯之夫人揄狄子男之夫人亦闕狄惟二王後褘衣玉藻曰王后褘衣夫人揄狄君命屈狄再命褘衣褘當為鞠一命襢衣士縁衣眀堂位曰夫人副褘立于房中祭義曰夫人副褘立于東房詩曰副笄六珈又曰其之翟也其之展也雜記曰復諸侯以襃衣冕服爵弁服夫人税衣揄狄狄税素沙内子以鞠衣襃衣素沙下大夫以襢衣其餘如士喪大記曰復君以卷夫人以屈狄大夫以𤣥頳世婦以襢衣士以爵弁士妻以税衣九者陽之窮故王之吉服九六者隂之中故后之吉服六王之服九而祭服六后之服六而祭服三以婦人不預天地山川社稷之祭故也内宰大祭祀祼獻則賛而天地無祼内宗外宗掌宗廟之祭祀佐王后而不及外神是不與天地山川社稷之祭也王之服衣裳之色異后之服連衣裳而其色同以婦人之徳本末純一故也鄭氏曰婦人連衣裳不異其色素紗以為裏觀喪服言女子髽衰而不言裳昏禮言女次純衣而不及裳則婦人連衣裳而同色可知王之服襌而無裏后之服裏而不襌以陽成於奇隂成於偶故也爾雅曰伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰摇素質義也青質仁也五色皆備成章禮也有仁義以為質有禮以為文后之徳如此而已然地道尚義故褘衣為上揄狄次之言褘衣則知揄之為翟闕狄周禮謂之闕禮記謂之屈則其制屈於揄褘而已三翟盖皆畫之於衣如王冕服鄭賈之徒謂褖衣黒而象水水生於金故展衣白金生於土故鞠衣黄土生於火故闕狄赤火生於木故揄狄青五色之上則𤣥而已故褘衣𤣥祭先王服褘衣祭先公服揄狄祭羣小祀服闕狄蠶則服鞠衣以禮見王及賓客服展衣燕居及御于王則服縁衣崔靈恩謂王后三翟數皆十二王者之後諸侯夫人三公而下夫人雉數如命數於理或然詩曰其之翟也而繼之以胡然而天胡然而帝則徳當神眀可知矣曰其之展也而繼之以展如之人邦之媛也則行配君子可知矣然謂二翟刻繒畫之綴於衣闕翟刻之而不畫其説無據夫黄者隂之盛色蠶而服之以其帥外内命婦而蠶使天下之嬪婦取中焉后事之盛也白者隂之純色見王及賓客服之以其見王及賓客無事乎飾一於誠焉后禮之懿也黒者隂之正色纁者隂之上達縁則循縁之也燕居及御于王服之以其體貴至正以上達為循縁而已后行之盛也玉藻所謂夫人揄翟君命屈狄再命鞠衣士褖衣者周官司服辨外内命婦之服鞠衣展衣褖衣鄭氏以為内命婦之服鞠衣九嬪也展衣世婦也縁衣女御也外命婦者其夫孤也則鞠衣卿大夫也則展衣士也則縁衣三夫人及公之妻其闕狄以下弁侯伯之夫人揄狄子男之夫人亦闕狄惟二王後褘衣然記言士縁衣則眀婦命眡夫也言君命則眀再命一命非女君也坊記曰大夫不稱君則其妻不稱女君可知葢子男之夫人屈狄侯伯之夫人揄狄公之夫人褘衣公之夫人褘衣記稱夫人副褘是也再命鞠衣則上至於四命可知也鄭氏謂侯伯之夫人揄狄子男之夫人屈狄孤鞠衣卿大夫展衣士褖衣而改褘為鞠其説是也謂三夫人及公闕狄誤矣王制言三公一命衮則三公在朝鷩冕其妻揄狄可知也玉藻言夫人揄狄則三夫人揄狄可知也公之夫人褘衣而眀堂位言魯夫人副褘者魯侯得用衮冕則夫人副褘可知也少牢大夫之妻衣侈袂則其上至后夫人之袂皆侈特士妻褖衣之袂不侈褖衣纁袡素裏色紫無雉餘同褘衣制士褖衣赤袡素裏色紫無雉餘同褘衣爾雅曰赤縁謂之褖内司服言縁衣玉藻言褖衣士喪禮襲服亦言褖衣雜記喪大記之復服言税衣則縁褖税同實而異名也鄭氏釋周禮曰褖衣御于王之服亦以燕居男子褖衣黒是亦黒也釋士喪禮曰黒衣裳亦縁謂之褖褖之言縁也所以表袍也考之士冠陳三服𤣥端皮弁服爵弁服有𤣥端無褖衣士喪陳三服爵弁服皮弁服褖衣有褖衣無𤣥端則褖衣所以當𤣥端也然𤣥端之裳三褖衣連衣裳𤣥端無縁褖衣有縁此其名所以異也子羔之襲繭衣裳與税衣纁袡曽子譏之曰不襲婦服鄭氏曰税衣若𤣥端而連衣裳者也大夫而以纁為之縁非也葢丈夫褖衣縁以赤婦人褖衣縁以纁古文褖為縁鄭氏亦曰褖之言縁而引爾雅赤縁之文以釋士之褖衣則褖衣未嘗無縁也特赤與纁正閒之色異耳賈公彦曰爾雅釋婦人褖衣鄭氏以士之褖衣雖不縁而其名同故引而證之此臆論也士昏禮女次純衣纁袡喪大記曰婦人復不以袡鄭氏曰凡婦人不常施袡之衣盛昏禮為此服耳復衣不以袡眀非常也然純衣褖衣也士妻助祭乃得服之則服純衣猶士之爵弁服也復衣不以袡則眀凡褖衣皆有袡也孰謂袡特為昏禮施哉禮書卷十七
