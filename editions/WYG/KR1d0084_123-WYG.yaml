body:
  text: 禮書卷一百二十四宋陳祥道撰雅周禮笙師掌教舂牘應雅以教裓樂鄭司農云雅狀如漆筩而弇口大二圍長五尺六寸以羊韋之有兩紐疏畫此約漢法云然也鄭康成曰雅中有椎樂記注裓樂裓夏之樂牘應雅教其舂者謂以築地笙師教之則三器在庭可知矣賓醉而出奏裓夏以此三器築地為之行節樂記曰訊疾以雅孔穎達曰舞者訊疾奏此雅器以應之葢樂者正也賓出而舂雅欲其醉而不失正也工舞而奏雅欲其迅疾而不失正也賓出之奏雅有裓樂則工舞之奏雅各以其舞之曲歟壎何人斯蘇公刺暴公之詩也以伯氏吹壎仲氏吹箎託親愛之意而已世本遂謂暴辛公作壎蘇成公作箎譙周譏之宜矣然周謂暴公善壎蘇公善箎不可考也周禮小師掌教壎瞽矇掌播壎爾雅曰大壎謂之嘂廣雅云壎象秤錘以土為之六孔鄭司農釋周禮郭璞釋爾雅其説皆然郭璞又謂鋭上平底大者如鵝子小者如雞子葢壎之大小不同而同於六孔白虎通曰壎坎音也管艮音也壎在十一月陽氣如黄泉之下薰蒸而萌唐樂志曰壎曛也立秋之音萬物將曛黄也舊圖大壎謂之雅壎小者謂之頌壎然壎土也土位在坤而時立秋則唐志之説是而白虎通之説非矣缶爾雅曰盎謂之缶易曰不鼓缶而歌則大耋之嗟凶詩曰坎其擊缶宛丘之下國語曰瓦絲尚宫澠池之㑹秦王謂趙王擊缶李斯曰擊甕扣缶真秦聲也葢缶古之樂器秦尚之劉安曰窮鄉之社扣瓮拊瓶相和而歌自以為樂亦擊缶之類也吕不韋曰堯使􅬣以麋􅛘㝠缶而鼓之此不可考也琴琴操曰伏犧作琴世本曰神農作琴樂記曰舜作五絃之琴以歌南風或曰帝俊生晏龍龍作琴瑟郭璞曰俊即舜也眀堂位曰大琴大瑟中琴中瑟四代之樂器也爾雅曰大瑟謂之灑大琴謂之離白虎通曰琴者禁也禁邪以正人心也樂書曰琴長八尺一寸正度也絃大者為君而居中央商居右旁其餘大小相次不失其序則君臣之位正矣廣雅曰琴長三尺六寸六分象三百六十有六日五絃象五行大絃為君寛和而温小絃為臣清廉不亂騶忌子謂齊威王曰大絃濁以春温者君也小絃廉折以清者臣也文王武王加二絃以合君臣之恩琴操曰廣六寸象六合也又上曰池言其平下曰濱言其服前廣後狹象尊卑上圜下方象天地然琴之大小雖不同不過五絃七絃而已先儒釋爾雅謂大琴二十七絃或作於伏犧或作於神農不可考也其長或八尺一寸或三尺六寸六分葢大琴中琴之辨歟春秋傳穆姜擇美檟自為頌琴杜預謂頌琴猶言雅琴瑟世本曰庖犧作瑟五十絃黄帝使素女鼓之哀不自勝乃破為二十五絃具二均聲或曰朱襄氏之臣士達造五絃琴爾雅曰大瑟謂之灑鄉飲酒禮二人皆左何瑟後首桍越燕禮曰小臣左何瑟面鼓執越樂記曰清廟之瑟朱絃而疏越尚書大傳曰大琴練絃達越大瑟朱絃達越葢越底孔也疏達通之也朱絃練而朱之也葢絲不練則勁而聲清練則熟而聲濁孔小則聲急大則聲遲故越疏以遲其聲然後不至於太急練絲以濁其聲然後不失之太清舊圖雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃其餘四絃謂之番番贏也頌瑟長七尺二寸廣尺八二十五絃盡用之此葢有所傳然也周禮小師掌教絃歌瞽矇掌教琴瑟大司樂雲和之琴瑟冬日至圜丘奏之空桑之琴瑟夏日至方丘奏之龍門之琴瑟宗廟奏之則鼓瑟未嘗無琴也樂記獨言清廟之瑟鄉飲酒燕禮亦獨言瑟者舉其大者故也後世高漸離之擊筑似箏細項蒙恬之造箏漢之琵琶箜篌風俗通曰漢武帝樂人侯調作坎侯釋名曰師延所作晉之阮咸此皆放琴瑟而為之歟易通卦驗冬至日使八能之士鼓黄鍾之瑟瑟用槐長八尺一寸夏至日瑟用桑長五尺五寸槐取其氣上桑取其垂下禮書卷一百二十四
