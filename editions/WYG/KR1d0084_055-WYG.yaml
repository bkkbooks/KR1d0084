  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_055-1a, image: WYG0130/WYG0130-0350a.png}
body:
  text: 禮書卷五十六宋陳祥道撰璧羡袤一尺廣八寸爾雅曰肉倍好謂之璧典瑞璧羡以起度玉人璧羡度尺好三寸以為度鄭司農曰好璧孔也羡徑也鄭康成曰羡不圜之貌延其袤一尺而廣狹焉葢璧圜九寸好三寸延其袤為一尺旁各損半寸則廣八寸矣説文曰人手卻十分動脈為寸口十寸為尺周制寸尺咫尋常仞諸度量皆以人之體為法又曰中婦人手長八寸謂之咫周尺也然則璧羡袤十寸廣八寸同謂之度尺則周制十寸八寸皆為尺矣以十寸之尺起度則十尺為丈十丈為引以八寸之尺起度則八尺為尋倍尋為常故鬴深十寸内方八寸而為嘉量幣長一丈八尺而為制幣凡此皆璧羡縱横之尺然也度心為璧以起之則圍三徑一之制又寓乎其中矣起度於璧羡權起於駔琮樂起於黄鍾之長則先王制器豈徒然哉凡以存天下萬世之法耳瑑圭八寸瑑璋八寸瑑璧八寸瑑琮八寸典瑞曰瑑圭璋璧琮以覜聘玉人曰瑑圭璋八寸璧琮八寸以覜聘又曰瑑琮八寸諸侯以享夫人行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故鄭康成曰五等諸侯享天子用璧享后用琮其大各如其瑞二王之後享用圭璋其於諸侯亦用璧琮耳子男於諸侯則享用琥璜下其瑞也凡二王後諸侯相享之玉大小各降其瑞一等及使卿大夫覜聘亦如之史記樂書曰情好珍善為之瑑磨圭璧以通其意葢玉有朝覲之玉有覜聘之玉有享獻之玉禮於朝覲之玉言其所瑑桓躬信穀蒲是也覜聘之玉言瑑而巳瑑圭璋璧琮以覜聘是也鄭司農曰瑑有圻鄂瑑起若夫享獻之玉諸侯以享天子則不瑑玉人謂璧琮九寸諸侯以享天子是也諸侯以享夫人則瑑玉人謂瑑琮八寸諸侯以享夫人是也覲禮侯氏覲天子三享皆束帛加璧禮器曰束帛加璧尊徳也郊特牲曰束帛加璧往徳也夫諸侯相朝而享夫人以琮聘卿亦享夫人以琮則諸侯享后亦必以琮諸侯享王以璧聘卿享君亦以璧則諸侯相享亦必以璧玉人言璧琮以享天子則后舉矣言瑑琮享夫人則璧舉矣鄭氏曰五等諸侯享天子用璧享后用琮其大各如其瑞皆有庭實以馬若皮用圭璋者二王之後也二王後尊故享用圭璋而特之其於諸侯亦用璧琮耳子男於諸侯則享用琥璜下其瑞也凡二王後諸侯相享之玉大小各降其瑞一等及使卿大夫覜聘亦如之考之聘禮享君以璧而有庭實與馬特行人合六幣言圭以馬璋以皮而圭璋在璧琮之上則圭璋為二王後之禮可知公瑞桓圭九寸諸侯享王亦璧琮九寸諸侯即公也則璧琮各如其瑞可知公侯伯之瑞以圭而享以璧琮下其瑞也子男之瑞以璧而享諸侯亦璧非下其瑞也則享用琥璜可知賈公彦曰子男之臣自享諸侯不得過君葢用琥璜公享夫人瑑琮八寸使卿大夫覜聘亦瑑圭璋璧琮八寸降其瑞一等則諸侯相享之玉大小各降其瑞一等及卿大夫覜聘亦如之可知賈公彦曰直言覜聘亦如之則聘享皆降一等同玉人言諸侯以享而不言公言瑑圭璋璧琮而不及公鄭氏知其為公何也弁師諸侯之繅斿九就公之繅斿也聘禮所以朝天子圭與繅皆九寸公之圭繅也禮之所言舉尊以明卑多矣奚獨玉人然哉聘禮曰凡四器者惟其所寶以聘可也則圭璋璧琮之類惟其所寶者而已此又先王權於禮者也楚薳啟疆曰朝聘有圭享覜有璋葢朝聘之禮嚴於享特聘之禮重於殷覜故圭璋所用如此然諸侯之臣聘后夫人以璋二王之後享王以圭則啟疆之言亦有其大率者也夫圭璋象陰陽之用璧琮象天地之體故天子公侯伯之瑞以圭子男璧聘卿聘以圭享以璧琮又圭璋特達璧琮有幣則圭璋貴於璧琮矣至於禮神各以所象求之此璧琮又重於圭璋合六幣圭以馬璋以皮璧以帛𤣥纁琮以錦琥以繡璜以黼行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼何也昔大王之於狄人事之以皮幣繼之以犬馬終之以珠玉是珠玉重於犬馬犬馬重於皮幣則合圭以馬合璋以皮宜矣繡黼皆陰功也繡則五色之全黼則白黑而巳是繡備於黼也則合琥以繡合璜以黼宜矣婚禮納徵以束帛饗贈送者以束錦聘禮享君夫人以束帛覿以束錦上大夫與下大夫致賔介饔餼皆以束帛賔介儐之以束錦食禮君侑幣以束帛大夫相食以束錦是帛質於錦也則合璧以帛合琮以錦宜矣圭東方也馬動物也璋南方也皮文物也璧天象也天事質故以帛琮地象也地事文故以錦琥西方也萬寶之成莫備於此故以繡璜北方也陰陽之辨莫斷於此故以黼此六幣所以合之之意也皮馬不上堂故圭璋特然則璧琮琥璜皆非特達者歟玉案十有二寸説文曰案几屬玉人曰案有十二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯鄭司農曰案玉案也鄭康成曰玉飾案也夫人王后也記時諸侯僭稱王而夫人之號不別是以同王后於夫人也玉案十二以為列王后以勞諸侯也諸侯皆九列聘大夫皆五列則十有二列者勞二王之後也聘禮夫人使下大夫勞以竹簋方𤣥被纁裏有葢其實棗烝㮚擇則棗㮚實之器乃加於案也然玉人所言皆玉器非玉飾之器則所謂案者非玉飾者也酒正漿人有后夫人致飲于賔客之禮則是賔客之禮王夫人預焉非必記時諸侯夫人與王后同號也環爾雅曰肉好若一謂之環春秋傳曰子見南子環佩璆然又曰魯公賜仲環賜子家子一環一璧又曰宣子有環其一在鄭商左昭十六年晉語夷吾在梁驪姬使奄楚以環釋言荀子曰絶人以玦反絶以環范寗釋穀梁亦曰君賜之環則還賜之玦則徃葢環之為物或施於佩或施於反絶佩環則不佩玦故晉獻公佩申生以金玦所以離之也反絶以環不以玦故晉驪姬使奄楚以環釋言於夷吾將以還之也韋昭曰環還也然環有以金銀為之其制葢與玉環不同毛公釋詩曰后妃羣妾以禮御於君所女史書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之著于左手既御著于右手其言葢有所受也瑗爾雅曰好倍肉謂之瑗説文曰瑗大孔璧人君上除陛以相引荀子曰召人以瑗説者曰周禮珍圭以徴守然則天子以珍圭召諸侯諸侯召臣以瑗考之於禮君召臣以三節一節以走一節以趍天子徴諸侯則以珍圭非諸侯則以瑗歟禮書卷五十六
