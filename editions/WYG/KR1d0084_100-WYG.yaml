front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_100-1a, image: WYG0130/WYG0130-0622c.png}
body:
  text: 禮書卷一百一宋陳祥道撰敦鄭氏曰士喪禮敷啓㑹靣足鄭氏曰靣足執之合兩足間鄉前即敷足非如舊圖然也近代有得古敦於地中亦三尺虞敦玉敦金敦附虞敦虞氏之敦無飾後世飾以金玉廢敦無足無飾周禮玉府若合諸侯則共珠槃玉敦敦槃類珠玉以為飾古者以槃盛血以敦盛食合諸侯者必割牛耳取其血㰱之以盟珠槃以盛牛耳尸盟者執之故書珠為夷鄭司農云夷槃或為珠槃玉敦㰱血玉器九嬪凡祭祀贊玉齍玉齍玉敦受黍稷器后進之而不徹禮記内則曰敦牟非餕莫敢用敦牟黍稷器明堂位有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋皆黍稷器制之異同未聞士昏禮期初昏饌于房黍稷四敦皆葢婦至贊啓㑹郤于敦南對敦于北少牢禮主婦自東房執一金敦黍有葢敦有首者尊者器飾也飾葢象龜者周人禮飾器各以其類龜有上下甲士喪禮廢敦重鬲皆濯廢敦敦無足者所以盛米朔月奠無籩有黍稷用瓦敦有葢當籩位徹朔奠敦啓㑹靣足靣足執之令足間鄉前敦有足則敦之形如今酒敦既夕用器兩敦兩杅槃匜無祭器有燕樂器可也士虞贊設兩樽于俎南特牲禮盛兩敦陳于西堂藉用萑簠簋大夫以下無鏤簋舍人凡祭祀共簠簋實之陳之方曰簠圓曰簋盛黍稷稻梁器正義曰方曰簠圓曰簋皆據外而言案孝經云陳其簠簋注曰内圓外方受斗二升者直據簠而言若簋則内方外圓知皆受斗二升者瓬人云為簋實一觳豆實三而成斛豆四升三豆則斗二升可知但外神用瓦簋宗廟當用之故易損卦云二簋可用享損卦以離㢲為之離為日日圓㢲為木木器圓簋象是用木明矣掌客凡諸侯之禮簠十鼎簋十有二侯伯簠八鼎簋十有二子男簠六鼎簋十有二簠稻梁器也公十簠堂上六西夾東夾各二也侯伯八簋堂上四西夾東夾各二子男六簠堂上二西夾東夾各二簋黍稷器也簋十二者堂上八西夾東夾各二合言鼎簋者牲與黍稷俱食之主也考工記瓬人為簋實一觳崇尺厚半寸豆實三而成觳崇尺豆實四升玉藻朔月少牢五俎四簋朔月四簋則日食梁稻各一簋而已明堂位周之八簋黍稷器樂記簠簋俎豆制度文章禮之器也祭統以四簋黍見其修於廟中也廟中者境内之象也聘禮有司入陳堂上八豆設于戸西西陳皆二以竝東上韭菹其南醯醢屈八簋繼之黍其南稷錯六鉶繼之牛以西羊豕豕南牛以東羊豕兩簠繼之梁在北西夾六豆設于西墉下北上韭菹其東醓醢屈六簋繼之黍其東稷錯四鉶繼之牛以南羊羊東豕豕以北牛兩簠繼之梁在西皆二以並南陳豆有揭豆有玉豆周禮醢人掌四豆之實朝事之豆饋食之豆加豆之實羞豆之實凡祭祀共薦羞之豆實賔客喪紀亦如之九嬪凡祭祀贊后薦徹豆籩内宗掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩外宗掌宗廟之祭祀佐王后薦玉豆眡豆籩掌客凡諸侯之禮豆四十夫人致禮八豆侯伯三十有一夫人致禮八豆子男豆二十有四夫人致禮六豆梓人一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也禮記王制天子諸侯無事則嵗三田一為乾豆禮運體其犬豕牛羊實其簠簋籩豆鉶羮禮器禮有以多為貴者天子之豆二十有六有以少為貴者諸侯相朝無籩豆之薦晏平仲祀其先人豚肩不掩豆郊特牲鼎俎竒而籩豆偶陰陽之義也籩豆之實水土之品也明堂位夏后氏以楬豆殷玉豆周以獻豆楬無異物之飾也獻疏刻之齊人謂無髪為秃楬樂記簠簋俎豆制度文章禮之器也鋪筵席陳尊俎列籩豆以升降為禮者禮之末節也故有司掌之祭統夫祭也者三牲之俎八簋之實美物備矣君執鸞刀羞嚌夫人薦豆此之謂夫婦親之祭統夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足校豆中央直者也執醴授醴之人授夫人以豆則執鐙鐙豆下跗也鄉飲酒六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也燕義士舉旅行酬而后獻庶子俎豆牲體薦羞皆有等差所以明貴賤也聘禮有司堂上八豆設于戸西西陳皆二以並東上韭菹其南醓醢屈西夾六豆設于西墉下北上韭菹其東醓醢屈公食大夫六豆上大夫兩豆士婚四豆士喪毼豆兩既夕四豆士虞四豆特牲兩豆少牢四豆有司徹四豆籩有縢喪祭之籩無縢周禮籩人掌四籩之實籩竹器如豆者其容實皆四升朝事之籩饋食之籩加籩之實羞籩之實凡祭祀共其籩薦羞之實喪事及賔客之事共其薦籩羞籩九嬪凡祭祀贊后薦徹豆籩内宗掌宗廟之祭祀佐王后薦玉豆眂豆籩掌客凡諸侯之禮夫人致禮八籩侯伯夫人致禮八籩子男夫人致禮六籩禮記禮器有以少為貴者諸侯相朝無籩豆之薦郊特牲鼎俎竒而籩豆偶陰陽之義也籩豆之實水土之品也明堂位夫人薦豆籩儀禮士冠禮再醮兩籩栗脯鄉射禮記大夫與則公士為賔薦脯用籩五膱祭半膱横于上膱長尺二寸脯用籩籩宜乾肳也膱猶撓也士喪禮東方之饌兩籩無縢縢緣也考工記瓬人為簋實一觳崇尺豆實三而成觳觳容斗二升也崇尺中繩爾雅木豆謂之豆竹豆謂之籩瓦豆謂之登説文古簋作朹葢簋豆有以瓦為之有以木為之先儒謂宗廟之簋豆用木天地之簋豆用瓦然詩述祀天之禮言于豆于登則祀天有木豆矣儀禮少牢饋食有瓦豆則宗廟有瓦豆矣敦則簋之類簋則簠相須者也士喪禮有瓦敦而簠之有瓦與否不可考也儀禮曰葢執豆又曰簠有葢冪又曰設四敦皆南首則簠簋敦豆登皆有葢而敦之葢有首先儒以為簠簋敦之葢皆象龜形義或然也管仲鏤簋禮以為僭則大夫士之簋刻龜於葢而已非若人君全鏤之也簠内圓外方其實稻梁簋外圓内方其實黍稷周官掌客五等諸侯簠數有差而簋皆十二有簠膳而已簋非為膳焉用簠則簋從用簋則簠或不預是簠尊而簋卑也籩有縢緣其實乾實豆若脰然其實菹醢登則人執而登之其實大羮之湆瓬人簋豆皆崇尺則簠敦籩之崇可知簋實一觳則敦簋之量可知士喪禮敦有足則簠簋有足可知士喪禮敦㑹靣足無足曰廢敦士虞特牲敦有藉虞敦藉以葦席祭敦藉以萑則簠簋籩豆之有藉可知士喪特牲籩有巾士喪兩籩布巾特牲籩巾以綌纁裏公食大夫簠有葢冪則簋敦豆之有巾可知有虞氏曰敦夏曰璉商曰瑚周曰簋夏曰楬豆商曰玉豆周曰獻豆而虞氏之敦在周用之於士大夫故儀禮大夫之祭有敦無簋特牲佐食分簋鉶而先儒以為同姓之士得從周制是也夏后之楬豆在周用之於喪禮故儀禮士喪毼豆兩實葵俎是也毼白也周曰獻豆非不以玉飾也士虞禮獻豆兩亞之則獻豆猶所謂獻尊也周禮玉府有玉敦九嬪有玉齍先儒以玉齍為玉敦豈以其盛黍稷而因名之乎祭統夫人薦豆執校執醴授之執鐙鄭氏謂校豆中直者鐙足下跗然則考工記所謂中縣者校也天子玉敦大夫金敦少牢夫人載金敦則士敦無飾可知魯用彫篹篹籩屬也士喪禮籩無縢則士大夫吉祭之籩有縢無彫可知舊圖簠簋登籩豆皆崇尺二寸而簠簋敦豆皆漆赤中考之於書若作梓材既勤樸斵惟其塗丹臒周語亦曰器無彫鏤儉也先王之器多飾以赤而玉人勺亦珠中則漆而赤中理或然也然崇尺二寸之説與瓬人之制不同是臆論也周官掌客公簠十侯伯簠八子男簠六而簋皆十二公食上大夫之簋八下大夫之簋六聘禮饔餼上大夫之簋二十詩言天子之禮陳饋八簋玉藻言諸侯朔月四簋詩言毎食四簋多於天子公食上大夫之簋與天子之禮同秦臣毎食之簋與諸侯朔食之禮同何也葢聘禮上大夫之簋二十掌客諸侯之簋十二公食上大夫之簋八有所陳者存焉天子八簋則其所食者也公食下大夫六簋則公日食四簋可知日食四簋而朔月亦食四簋此異代之禮也觀周官王之日食用六牲則諸侯日食非止特牲也王鼎十有二物皆有俎則諸侯日與朔食非止三俎與五俎也而玉藻所記一切與周禮不類則異代之禮可知也周官籩人醢人有朝事饋食之籩豆與加籩羞籩加豆羞豆凡二十有六祭祀之籩豆其數如此則饗食之禮豈過是哉禮器所謂天子之豆二十有六是也推此則諸公十有六諸侯十有二上大夫八下大夫六而少牢大夫四豆葢大夫食於公與祭於已者異矣周官掌客上公豆四十侯伯豆三十有二子男豆二十有四而食皆稱之先儒謂豆正羞食庶羞庶羞亦豆也公食下大夫六豆上大夫八豆聘禮致饗餼於上大夫堂上八豆西夾六豆然則禮器之豆數用數也掌客之豆數陳數也春秋之時鄭享楚子加籩豆六品晉享季孫夙有加籩葢古者籩豆有加者皆所以優尊之也豆實菹醢者也而晏子豚肩不掩豆菹醢濡物也而田獵所獲為乾豆者葢豚肩不掩豆譏其用小牲非必以豆實豚也醢臡必乾折然後漬之非謂以豆實乾也鼎俎竒而籩豆偶而鄉飲酒六十者三豆七十者四豆八十者五豆九十者六豆而數不皆偶者此又視年髙下而隆殺之不可以常禮限之也竹簋方聘禮大夫使下大夫以二竹簋方𤣥被纁裏有葢考工記玉人案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯鄭氏謂竹簋方以竹為之實以棗栗乃加于案其説是也玉人言諸侯以見二王之後言夫人以見后則棗栗十有二列以勞二王之後可知也夫人以勞諸侯則后可知也觀酒正漿人有后大夫致飲於賔客之禮是賔客之禮后夫人預之也鄭氏謂夫人王后也記時諸侯僭稱王而夫人之號不別是以同王后於夫人其果然乎謂之簋方則大小長短如簋而方耳舊圖圜其口觚其名則名實不類登登瓦器也儀禮作鐙則登亦金為之其實大羮食禮用之飲酒不用故公食大夫設于醬西鄉飲鄉射燕禮不設也士虞特牲有司徹皆設之少牢不言設者特牲有司徹見之也禮書卷一百一
