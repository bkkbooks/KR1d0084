body:
  text: 禮書卷五十二宋陳祥道撰玉太宰祀五帝賛玉幣爵之事玉幣所以禮神玉與幣各如其方之色祀大神示亦如之享先王亦如之賛玉几玉爵大朝覲㑹同賛玉幣玉獻玉几玉爵玉獻獻國珍異亦執玉以致之小宰凡祭祀賛玉幣玉獻玉几玉爵之事玉府玉齊則共食玉玉是陽精之純者食之以禦水氣鄭司農云王齊當食玉屑若合諸侯則共珠盤玉敦敦盤類珠玉以為飾凡王之獻金玉兵器受而藏之内府凡四方之幣獻金玉齒革入焉諸侯朝聘所獻國珍内宰大祭祀后祼獻則賛瑤爵亦如之祭統曰君執圭瓉裸尸大宗執璋瓉亞裸此大宗亞裸謂夫人不與而攝耳瑤爵謂尸卒食王既酳尸后亞獻之其爵以瑤為飾凡賔客之祼獻瑤爵皆賛瑤爵所以亞圭酬賔也坊記曰陽侯殺穆侯而竊其夫人故大饗廢夫人之禮大宗伯以玉作六瑞以等其邦國王執鎮圭鎮安也所以安四方鎮圭者葢以四鎮之山為瑑飾圭長尺有二寸公執桓圭公二王之後及王之上公雙植謂之桓桓宫室之象以安其上也桓圭葢亦以桓為瑑飾圭長九寸侯執信圭伯執躬圭信當為身聲之誤也身圭躬圭葢皆象以人形為瑑飾文有麤縟耳欲其慎行以保身圭皆長七寸子執糓璧男執蒲璧糓所以養人蒲為席所以安人二者或以糓為飾或以蒲為飾璧皆徑五寸不執圭者木成國也以玉作六器以禮天地四方禮謂始告神時薦於神坐書曰周公植璧秉圭是也以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方此禮天以冬至謂天皇大帝在北極者也禮地以夏至謂神在崑崙者也禮東方以立春為蒼精之帝而大昊句芒食焉禮南方以立夏為赤精之帝而炎帝祝融食焉禮西方以立秋為白精之帝而少昊蓐收食焉禮北方以立冬為黒精之帝而顓頊𤣥㝠食焉禮神者必象其類璧圜象天琮方象地圭鋭象春物初生半圭曰璋象夏物半死琥猛象秋嚴半璧曰璜象冬閉藏地上無物唯天半見皆有牲幣各放其器之色幣以從爵若人飲酒有酬幣正義曰知幣是從爵非禮神者若是禮神當在牲上以其神幣與玉俱設若肆師云立大祀用玉帛牲牷是帛在牲上今在下明非禮神者也云若人飲酒有酬幣者獻尸從爵之幣無文故以生人飲酒之禮况之案聘禮饗時有酬幣明此幣既非禮神之幣則獻尸後酬尸時亦有幣之從爵也凡祀大神享大鬼祭大示宿眂滌濯涖玉鬯省牲鑊奉玉齍詔大號玉禮神之玉也始涖之祭又奉之小宗伯若國大貞則奉玉帛以詔號號神號幣號鄭司農云大貞謂卜立君卜大封凡祭祀賔客以時將瓉果將送也猶奉也祭祀以時奉而授王賔客以時奉而授宗伯肆師之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲正義曰經言立大祀用玉帛牲牷者天神中非直有升烟玉帛牲亦有禮神者也地示中非直有瘞埋玉帛牲亦兼有禮神者也宗廟中無升烟瘞埋直有禮神幣帛與牲又不見有禮神之玉或可以灌圭為禮神之玉亦通一塗立次祀用牲幣者天神日月星辰地示血祭社稷五祀五岳是也宗廟次祀已下與大祀同亦直有禮神幣帛而已天府季冬陳玉以貞來嵗之媺惡問事之正曰貞陳玉陳禮神之玉龜有天地四方則玉有六器者與正義曰夏之季冬将卜筮之時先陳玉以禮神典瑞掌玉瑞玉器之藏人執以見曰瑞禮神曰器王搢大圭執鎮圭繅藉五采五就以朝日公執桓圭侯執信圭伯執躬圭繅皆三采朱白蒼三就子執糓璧男執蒲璧繅皆二采來緑再就以朝覲宗遇㑹同于王諸侯相見亦如之瑑圭璋璧琮繅皆二采一就以頫聘璋以聘后夫人以琮享之也鄭司農云瑑有圻鄂瑑起四圭有邸以祀天旅上帝鄭司農云於中央為璧圭著其四面一玉俱成爾雅曰邸本也圭本著於璧故四圭有邸圭未四出故也𤣥謂祀天夏正郊天也上帝五帝所郊亦有五帝殊言天者尊異之也正義曰夏正郊所感帝兩圭有邸以祀地以旅四望兩圭者以象地數二也僢而同祗祀地謂祀於北郊神州之神正義曰按河圖括地象崑崙東南萬五千里神州是也或解郊用三陽之月神州宜用三隂之月當七月祭也裸圭有瓉以肆先王以裸賔客鄭司農云於圭頭為器可以挹鬯祼祭謂之瓉故詩曰䘏彼玉瓉黄流在中國語謂之鬯圭以肆先王灌先王祭也𤣥謂漢禮瓉槃大五升口徑八寸下有槃口徑一尺圭璧以祀日月星辰圭其邸為壁取殺於上帝璋邸射以祀山川以造贈賔客璋有邸而射取殺於四望珍圭以徵守以恤凶荒杜子春云珍當為鎮故書為鎮以微守者以徴召守國諸侯若今時徴郡守以竹使符也鎮者國之鎮諸侯亦一國之鎮故以鎮圭徵之也凶荒則民有遠志不安其圡故以鎮圭鎮安之𤣥謂珍圭王使之瑞節制大小當與琬琰相依王使人徵諸侯憂凶荒之國則授之執以往致王命焉如今時使者持節矣牙璋以起軍旅以治兵守鄭司農云牙璋瑑以為牙牙齒兵象故以牙璋發兵若今時以銅虎符發兵𤣥謂牙璋亦王使之瑞節兵守用兵所守若齊人戍遂諸侯戍周正義曰漢文帝本紀云二年九月初與郡國守為銅虎符竹使符應劭曰銅虎符從第一至第五國家當發兵遣使者至郡國合符合乃聴受之竹使符皆以竹箭五枝長五寸鐫刻篆書第一至弟五張晏曰以代古圭璋從簡亦使其事也璧羡以起度鄭司農云羡長也此璧徑長尺以起度量玉人職曰璧羡度尺以為度𤣥謂羡不圍之貌葢廣徑八寸袤一尺正義曰減旁一寸以益上下則工下一尺横徑八寸矣糓圭以和難以聘女其飾若栗文然難仇讐和之琬圭以治徳以結好琬圭亦王使之瑞節諸侯有徳王命賜之及諸侯使大夫來聘既而為壇會之使大夫執以命事焉琰圭以易行以除慝琰圭亦王使之瑞節鄭司農云琰圭有鋒芒傷害征伐誅討之象故以易行除慝玉人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之命圭者王所命之圭也朝覲執焉居則守之子守糓璧男守蒲璧不言之者闕耳故書或云命圭五寸謂之躬圭杜子春云當為七寸𤣥謂五寸者璧文之闕亂存焉天子執冒四寸以朝諸侯名玉曰冒者言徳能覆葢天下也四寸者方以尊接卑以小為貴天子用全上公用龍侯用瓉伯用將鄭司農云全純色也龍當謂厖謂雜色𤣥謂全純玉也瓉讀為􅊡􅖸之􅖸龍瓉將皆雜色也卑者下尊以輕重為差玉多則重石多則輕公侯四玉一石伯子男三玉二石正義四曰盈不足術曰玉方寸重七兩石方寸重六兩云公侯玉一石伯子男三玉二石者案禮緯云天子純玉尺二寸公侯九寸四玉一石伯子男三玉二石此注出於彼但此經公與侯異注及彼文公侯同又彼伯子男同七寸皆與此經不同者彼據商法但玉石多少與周同故引之也若然公侯同四玉一石而尾瓉異者葢玉色有别也繼子男執皮帛謂公之孤也見禮次子男贄用束帛而以豹皮表之為飾天子之孤表帛以虎皮天子圭中必必讀如鹿車縪之縪謂以組約其中央為執之以備失墜正義曰聘禮記五等諸侯及聘使所執圭璋皆有繅藉及絢組所以約圭中央恐失墜即此中必之類若然中必尊卑皆有不言諸侯圭舉工以明下可知云讀如鹿車縪之縪者俗讀之也此縪絢組一也四圭尺有二寸以祀天郊天所以禮其神也典瑞曰四圭有邸以祀天旅工帝大圭長三尺杼上終葵首天子服之謂王所搢大圭也或謂之珽終葵椎也為椎於其杼上明無所屈也杼閷也相玉書曰珽玉六寸明自炤也土圭尺有五寸以致日以土地致日度景至不夏日至之景尺有五寸冬日至之景文有三尺土猶度也建邦國以度其地而制其域祼圭尺有二寸有瓉以祀廟瓉如槃其柄用圭有流前注正義曰大祀職之王過大山川大祝用事不言中山川小山川者舉大者而言或史卜祝為之也琬圭九寸而繅以象徳琬猶圜也王使之瑞節也諸侯有徳王命賜之使者執琬圭以致命焉繅藉也琰圭九寸判規以除慝以易行凡圭琰上寸半琰圭琰半以上又半為瑑飾諸侯有為不義使者征之執以為瑞節也除慝誅惡逆也易行去煩苛璧羡度尺好三寸以為度鄭司農云羡經也好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗𤣥謂羙猶延其袤一尺而廣狹焉圭璧五寸以祀日月星辰禮其神也圭其邸為璧取殺於上帝璧琮九寸諸侯以享天子享獻也聘禮享君以璧享夫人以琮穀圭七寸天子以聘女納徵加於束帛大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬射琰出者也勺鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也𤣥謂鼻勺流也凡流皆為龍口也衡謂勺徑也三璋之勺形如圭瓉天子巡守有事山川則用灌焉於大山川則用大璋加文飾也於中山川用中璋殺文飾也於小山川用邊璋半文飾也其祈沈以馬宗祝亦執勺以先之禮王過大山川則大祝用事馬將有事於四海山川則校人飾黄駒正義曰大祝職云過大山川大祝用事不言中山川小山川者舉大者而言或使小祝為之也大璋亦如之諸侯以聘女亦納徵加於束帛也大璋者以大璋之文飾之也亦如之者如邊璋七寸射四寸瑑圭璋八寸璧琮八寸以頫聘瑑文飾也頫視也聘問也衆來曰頫特來曰聘聘禮曰凡四器者惟其所寳以聘可也牙璋中璋七寸射二寸厚寸以起軍旅以治兵守二璋皆有駔牙之飾於琰側先言牙璋有文飾也正義曰軍多用牙璋軍少用中璋牙璋之飾多故先言之駔琮七寸鼻寸有半寸天子以為權以為椎故有鼻兩圭五寸有邸以祀地以旅四望瑑琮八寸諸侯以享夫人案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯璋邸射素功以祀山川以致稍餼邸射剡而出也致稍餼納廩食也鄭司農云素功無文飾也曲禮執主器操幣圭璧則尚左手行不舉足車輪曵踵凡摯天子鬯諸侯圭王制有圭璧金璋不粥於市錦文珠玉成器不粥於市月令春服蒼玉凡所服玉謂冠飾及所佩者之衡璜也夏服赤玉中央服黄玉秋服白玉冬服𤣥玉仲春祀不用犧牲用圭璧更皮幣為季春将選而合騰之也曽子問曰師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行毎舍奠焉而后就舍以脯醢禮神乃敢即安也所告而不以出即埋之反必告設奠卒歛幣玉藏諸兩階之間乃出葢貴命也禮器曰諸侯以圭為瑞家不藏圭言有稱也又曰圭璋特琥璜爵此以少為貴也圭璋特朝聘以為瑞無幣帛也琥璜爵者天子酬諸侯諸侯也相酬以此玉將幣大圭不琢此以素為質也大饗其王事與謂祫祭先王束帛加璧尊徳也郊特牲曰大圭不瑑美其質也灌以圭璋用玉氣也束帛加璧往徳也玉藻曰執玉龜襲執龜玉舉前曵踵蹜蹜如也明堂位曰灌用玉瓉大圭薦用玉豆爵用玉琖加以璧散璧角又曰執玉執龜筴不趍雜記舍者執璧上介賵執圭祭統曰君執圭瓉裸尸大宗執璋瓉亞祼圭瓉璋瓉裸器也以圭璋為柄酌鬱鬯曰祼大宗亞裸君夫人有故攝焉聘義曰致饔餼還圭璋賄贈饗食燕所以明賔客君臣之義也子貢問於孔子曰敢問君子貴玉而賤碈者何也為玉之寡而碈之多與碈石似玉或作玟也孔子曰非為碈之多故賤之也玉之寡故貴之也夫昔者君子比徳於玉焉温潤而澤仁也縝密以栗知也廉而不劌義也垂之如隊禮也叩之其聲清越以長其終詘然樂也瑕不揜瑜瑜不揜瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也圭璋特達徳也天下莫不貴者道也聘禮受命于朝賈人西面坐啟櫝取圭垂繅不起而授宰賈人在官知物賈者繅所以藉圭也其或拜則奠于其上宰執圭屈繅自公左授使者屈繅者歛之禮以相變為敬也自公左賛幣之義使者受圭同面垂繅以受命同面者宰就使者北而並授之既授而君出命矣凡授受者授由其右受由其左也既述命同面授上介述命者循君之言重失誤上介受圭屈繅出授賈人衆介不從賈人将行者在門外北面受享束帛加璧受夫人之聘璋享𤣥纁束帛加琮皆如初享獻也既聘又獻所以厚㤙恵也帛今之璧色繒也夫人亦有聘享者以其與已同體為國小君也其聘用璋取其半圭也君享用璧夫人用琮天地配合之象也圭璋特達瑞也璧琮有加往徳也周禮曰瑑圭璋璧琮以頫聘公側襲受玉于中堂與東楹之間賔出公側授宰玉聘于夫人用璋享用琮如初禮君使卿皮弁還玉于館還之者徳不可取於人相切厲之義也皮弁者始以此服受之不敢不終也禮玉束帛乘皮禮禮聘君也所以報享也亦言玉璧可知也皆如還玉禮使者歸卿進使者使者執圭垂繅北面上介執璋屈繅立于其左此主於反命上介亦随入並立東上反命曰以君命聘于某君某君受幣于某宮某君再拜以享某君某君再拜君亦揖使者進之乃進反命也某君某國名也某宫若言桓宫僖宫也某君再拜謂再拜受也必言此者明彼君敬君已不辱命宰自公左受玉亦於使者之東同面並受也不右使者由使也受上介璋致命亦如之執賄幣以告曰某君使某子賄授宰禮玉亦如之私幣不告亦略卑也聘遭喪主國君薨不賄不禮玉不贈記所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白蒼剡上象天圓地方也九寸三公之圭問諸侯朱綠繅八寸二采再就降於天子也於天子曰朝於諸侯曰問互相備皆𤣥纁繋長尺絢組組無事則繫玉因以為飾皆用五采組上以𤣥下以絳凡四器者唯其所寳以聘可也四器圭璋璧琮上介執圭如重授賔賓執圭入門鞠躬焉如恐失之凡執玉無藉者襲藉謂繅也覲禮至于郊王使人皮弁用璧勞侯氏升受玉使者左還而立侯氏還璧朝以瑞玉有繅侯氏入門右坐奠圭拜坐取圭升王受之玉侯氏降拜升成拜乃出三享皆束帛加璧侯氏升致命王撫玉王不受玉撫之而已輕財也方眀者木也設六玉上圭下璧南方璋西方琥北方璜東方圭記奠圭于繅上崧高詩曰錫爾介圭以作爾寳毛曰寳瑞也箋云圭長尺二寸謂之介圭諸侯之瑞圭自九寸而下韓奕曰以其介圭入覲于王鄭曰貢國所出之寶長發曰受小球大球為下國綴旒箋云湯受小玉謂尺二寸圭也受大玉謂珽也長三尺執圭搢珽以與諸侯會同雲漢曰圭璧既卒寧莫我聴箋云禮神之圭璧又曰盡矣泮水曰來獻其琛舜典曰輯五瑞班瑞于羣后又曰脩五禮五玉三帛二生一死贄如五器卒乃復禹貢揚州厥貢瑤琨雍州厥貢球琳琅玕金縢曰武王有疾周公乃為三壇同墠因大王正季文王請命於天為壇於南方北面周公立焉植璧秉圭乃告大王王季文王璧以禮神植置也置於三王之坐周公秉桓圭以為贄曰爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪顧命越玉五重陳寳𢎞璧琬琰在西序大玉夷玉天球在東序大保承介圭上宗奉同瑁大圭長尺二寸天子守之故奉以奠康王所位同爵名瑁所以冒諸侯圭所以齊瑞信方四寸邪刻之王乃受同瑁王三宿三祭三咤咤奠也上宗曰饗祭必受福替王曰饗福酒正義曰上宗以同酌進王太保受同降盥以異同正義曰祭祀以變為敬秉璋以酢太保以盟手洗異同實酒秉璋以酢祭半圭曰璋臣所奉王已祭太保又祭報祭曰酢授宗人同拜王答拜太保受同祭嚌康王之誥曰賔稱奉圭兼幣曰一二臣衛敢執壤奠周語襄王使召公過及内史過賜晉恵公命晉侯執玉卑拜不稽首王信圭侯所執執天子器則上衡内史過曰執玉卑替其贄也替廢也拜不稽首誣其上也替贄無鎮鎮重也誣王無民魯語長勺之役曹劌問所以戰於莊公公曰余不愛衣食於民不愛牲玉於神魯饑文仲以鬯圭與玉磬如齊告糴仲尼曰古者分同姓以珍玉展親也齊語桓公知諸侯之歸己也故使輕其幣而重其禮故天下諸侯罷馬以為幣縷綦以為奉綦綺文以純緝綦以為藉玉之繅鹿皮四分分散也楚語先王之祀也一純二精一純心純一而絜也二精玉帛也玉足以庇廕嘉穀使無水旱之災則寳之龜足以憲臧否則寳之珠足以禦火災則寳之金足以禦兵亂則寳之晉語公子夷吾居梁二年驪姬使奄楚以環釋言環還也夷吾以白珩六雙納之公子縶重耳及河子犯授公子戴璧公子曰所不與舅氏同心者有如河水沈璧以質質信也左傳桓元年鄭伯以璧假許田莊十八年虢公晉侯朝王王皆賜玉五㲄非禮也雙玉為㲄二十四年哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也僖二年晉以垂棘之璧假道於虞六年許男面縛銜璧見楚子七年申侯有寵於楚文王文王與之璧十一年天王使召武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有二十三年曹共公饋重耳盤飡寘璧焉二十八年楚子玉自為瓊弁玉纓三十年衛侯納玉於王與晉侯皆十㲄文十二年秦伯來聘襄仲辭玉答曰不腆先君之敝器使下臣致諸執事以為瑞節又秦伯以璧祈戰于河宣十年凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使者則告不然則否十五年伯宗曰瑾瑜匿瑕成二年韓厥奉觴加璧以進齊賂晉以紀甗玉磬十七年聲伯夢涉洹或與己瓊瑰食之襄十五年宋人得玉獻諸子罕十八年晉侯伐齊將濟河獻子以朱絲係玉二㲄而禱曰苟捷有功無作神羞十九年公賄荀偃束錦加璧乘馬二十六年宋夫人饋左師錦與馬先之以玉三十年駟帶與子正盟用兩珪質于河昭四年賴子銜璧造於中軍王受其璧五年楚蒍啟疆曰朝聘有珪享覜有璋小有述職大有巡功十六年宣子有環其一在鄭商七年燕人歸燕姬賂以瑤罋玉櫝斚耳不克而還二十有四年王子朝用成周之寶珪于河甲戌津人得諸河上隂不佞以温人南侵拘得玉者取其玉將賣則為石定三年蔡昭侯為兩佩一獻楚昭王蔡侯歸及漢執玉而沈四年子魚曰武王分魯以夏后氏之璜五年季平子卒陽虎將以璵璠歛八年陽虎取寳玉大弓十五年邾隠公來朝執玉髙哀七年子服景伯曰禹合諸侯於塗山執五帛者萬國十三年子服景伯曰王合諸侯朝覲玉帛不同十四年向魋出於魏地公文氏攻之求夏后氏之璜與之他玉十七年殺吕姜髢取其璧冒圭四寸玉人曰天子執冒圭四寸以朝諸侯書曰太保承介圭上宗奉同瑁書大傳曰古者圭必有冒言下之必有冒不敢専達也天子執冒以朝諸侯見則覆之故冒圭者天子所與諸侯為瑞也瑞也者屬也無過行者得復其圭以歸其國有過行者留具圭能改過者復其圭三年圭不復少黜以爵六年圭不復少黜以地九年圭不復而地畢此所謂諸侯之於天子也義則見屬不義則不見屬鄭康成曰冒言徳能覆天下也四寸者以尊接卑以小為貴也孔安國曰冒以齊瑞信方四寸邪刻之孔頴達曰諸侯即位天子賜之命圭首邪鋭則冒當邪刻其廣狹如圭首然冒之以知諸侯之信偽猶今之合符也瑁方四寸則圭首之廣無四寸耳天子以一瑁冒諸侯之圭則公侯伯之圭首廣狹等也瑁冒圭而已璧亦稱瑞其所以齊信未之聞也上覆下謂之冒下冒上亦謂之冒易曰冒天下之道詩曰下土是冒上覆下也説文曰冒地而生農書曰土長冒橛下冒上也瑁圭謂之瑁則覆下而巳四寸所以冒四方邪刻之所以驗羣瑞天子執之以朝諸侯則子男之璧亦在所驗其詳不可考也諸侯之朝天子執瑞圭搢象笏及輯瑞圭而以瑁驗焉葢各執其所搢者禮曰見於天子無説笏是也孔頴達曰冒圭王與諸侯朝覲所執者小球尺二寸大球長三尺王與諸侯盟㑹所執者然詩言受小球大球則小球者蒲璧穀璧之類大球者桓圭躬圭之類而天子授之則非二尺與三尺之圭矣頴達之言非惑於詩𫝊之説歟鎮圭尺二寸有必周禮大宗伯王執鎮圭典瑞王搢大圭執鎮圭繅藉五采五就以朝日又曰鎮圭以徵守以恤凶荒玉人職曰鎮圭尺有二寸天子守之鄭氏曰鎮安也所以安四方鎮圭者葢以四鎮之山為飾崇髙敦厚而萬物附焉山也山之大者四方仰焉四鎮也周官職方氏九州皆有鎮山大司樂有四鎮五嶽鄭氏謂揚州之㑹稽青州之沂山幽州之醫無閭翼州之霍山鎮圭以四鎮為瑑飾於理或然鎮圭尺有二寸則天數也繅藉五采五就備文徳也其用玉全無厖雜也考工記曰天子用全其中有必防失隊也考工記曰天子圭中必鄭氏曰必讀縪縪以組約其中央以備失隊古之飾刀室者謂之珌正固弓者謂之䪐則約圭之中因以為飾而命之曰必亦若是耳鎮圭王執之以朝日使者執之以徵守恤凶荒葢曰能鎮於下然後可以事上能鎮於此然後可以召彼䘏凶荒亦所以鎮之也玉人大琮十有二寸射四寸厚寸是謂内鎮宗后守之則后之内鎮猶王之鎮圭耳鎮圭尺有二寸言其長也内鎮十有二寸言其方也小行人作瑱典瑞作珍故書作鎮或曰鎮圭猶天府所謂玉鎮非四鎮也是亦一説禮書卷五十二
