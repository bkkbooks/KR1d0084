body:
  text: 禮書卷一百八宋陳祥道撰貢士與射射儀曰古者諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與祭其容體不比於禮其節不比於樂而中少者不得與祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰射者射為諸侯也書傳稱諸侯之於天子三年一貢士一適謂之好徳再適謂之賢賢三適謂之有功一不適謂之過再不適謂之敖三不適謂之誣其適則有衣服弓矢秬鬯虎賁之賞其不適則有絀爵之罰漢武紀有司奏類其言亦類於此則貢士與射其來尚矣葢人之賢不肖不能逃於威儀揖讓之間而好惡趍舍常見於行同能偶之際故射於澤宫飾之以禮樂以觀其徳比之以偶以觀其類則人材其有遺乎射樂天子騶虞九節諸侯貍首七節孤卿大夫采蘋五節士采蘩五節射人王射以騶虞九節諸侯射以貍首七節孤卿大夫以采蘋五節士以采蘩五節射儀曰騶虞樂官備也貍首樂㑹時也采蘋樂循法也采蘩樂不失職也儀禮大射郷射皆司射命射者曰不鼓不釋大射奏貍首間若一鄉射奏騶虞間若一又曰歌騶虞若采蘋皆五終鄭氏曰鄉射之鼓五節歌五終所以將八矢一節之間當拾發四節四拾其一節先以聴也然則王之九節五節先以聴諸侯七節三節先以聴尊者先以聴則多卑者先以聴則寡所以優尊者欲其先知之審也然則王射以騶虞大夫士之鄉射亦以騶虞者鄉射之詢衆庶亦欲官備於天子也鄉射合樂大射不合樂者鄉射屬民欲同其意故合樂大射擇士與祭欲嚴其事故不合樂大射之位鄉射之位鄉射於序而用鹿中鄭氏謂士為州長者之禮也然其言射必兼庠序言禮必兼大夫周官鄉大夫有鄉射之禮則鄉射不特士而已大射前二日宰夫戒宰及司馬鄉射不言葢戒與射同日也大射有大射正小射正司射鄉射則有司而已葢皆主人之吏為之也大射設次於東故不適堂西鄉射無次故射者適堂西而已大射負侯者諾則以宫又諾以商鄉射獲者諾聲不絶而已大射獻服不則侯西北三步北靣拜受爵鄉射獻獲者於侯而已以服不士也故獻近於乏鄉人賤也故獻即於侯也大射鍾師以鍾鼓奏裓夏鄉射以鼓裓夏以君尊故有鍾鼓大夫士卑特用鼓也大射度侯道以貍步鄉射則度以躬大射乏西十步北十步鄉射則乏參侯道居侯黨之一西五步此大射鄉射之别也禮書卷一百八
