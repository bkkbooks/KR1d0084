body:
  text: 禮書卷一百十七宋陳祥道撰五聲大司樂以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賓客以說逺人以作動物凡六樂者文之以五聲播之以八音大師掌六律六同以合陰陽之聲皆文之以五聲宮商角徴羽皆播之以八音金石土革絲竹匏木文之者以調五聲使之相次如錦繡之有文章禮記月令孟春之月其音角謂樂器之聲也三分羽益一以生角角數六十四屬木者以其清濁中民之象也春氣和則角聲調孟夏之月其音徴三分宫去一以生徴徴數五十四屬火者以其微清事之象也中央土其音宮聲始屬於宫宮數八十一屬土者以其最濁君之象也季夏之氣和則宮聲調樂記曰君亂則荒其君驕孟秋之月其音商三分徵益一以生商商數七十二屬金者以其濁次宮臣之象也孟冬之月其音羽三分商去一以生羽羽數四十八屬水者以為最清物之象也禮運五聲六律十二管還相為宮學記鼓無當於五聲五聲弗得不和樂記天下大定然後正六律和五聲弦歌詩頌此之謂徳音爾雅釋樂宮謂之重商謂之敏角謂之經徴謂之迭羽謂之栁此五音之别其義未詳管子凡聽徴如負猪豕覺而駭凡聽羽如鳴馬在野凡聽宮如牛鳴窌中凡聽商如離羣羊凡聽角如鷄登木以鳴音疾以清律厯志商之為言章也物成熟可章度也角觸也物觸而出戴芒角也宮中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而繁祉也羽宇也物聚蔵宇覆之也夫聲者中於宮觸於角祉於徴章於商宇於羽故四聲為宮紀也協之五行則角為木五常為仁五事為貌商為金為義為言徴為火為禮為視羽為水為智為聽宮為土為信為思以君臣民事物言之則宮為君商為臣角為民徵為事羽為物唱和有象故言君臣位事之體也史記書宮動脾而和正聖商動脉而和正義角動肝而和正仁徴動心而和正智羽動腎而和正禮聞宮音使人温舒而廣大聞商音使人方正而好義聞角音使人惻隐而愛人聞徴音使人樂善而好施聞羽音使人整齊而好禮孟子曰晏子作君臣相悅之樂曰徴招角招莊子曰孔子歌焱氏之風有其風而無宮角曾子歌商頌而無宮角徴羽五聲生於黄鍾黄鍾為宮而管九寸九之則其數八十一三分宮去一而下生徴其數五十四三分徴益一而上生商其數七十二三分商去一而下生羽其數四十八三分羽益一而上生角其數六十四以上生下皆三生二以下生上皆三生四數多者濁數少者清聲濁者大聲清者細大不踰宮細不踰羽徴之聲又清於角角之聲又清於商其别重敏約留抑先儒日宫音重而尊商音明而敏角音約而易制徴音泛而不留羽音渙散而抑其配土火木金水掦子曰聲生於日則甲巳為角乙庚為商丙辛為徴丁壬為羽戊癸為宮亦所以配五行其象君臣民事物葢土安於四方之中而有以宅人故為宮為君金行於南北之間而有以通物故為商為臣木與隂角而出故為角為民火出無徵有故為徵為事水之翕張因時而已故為羽為物民生於物事生於民君生於事臣生於君物生於臣此五行之相生者也物勝事事勝臣臣勝民民勝君此五行之相勝者也民臣與物為不變而變者君與事而已故五音無變商角羽而有變宫徴也方舜之時琴五絃以寓五音及周增二絃以備七音七音雖始於周而變宮變徴之實古葢有焉時武王代商歲在鶉火月在天駟日在析木辰在斗柄星在天鼋自鶉及駟七列南北之揆七同於是以七音之律昭之故黄鍾為宫大蔟為商姑洗為角林鍾為徴南宫為羽應鍾為變宫蕤賓為變徴此樂所以成也楚王曰先王之祀也六律七事八種又曰天地民四時之務為七事尚書大傳曰聖王廵十有二州論十有二俗定以六律五聲八音七始又曰七始天綂律厯志稱書曰予欲聞六律五聲八音七始詠以出納五言汝聽七者天地四時人之始也鄭康成釋書傳曰七始黄鍾大簇林鍾南呂姑洗應鍾蕤賓觀此則七音由來久矣五音以物言之則徴猶豕之負駭者羽猶馬之鳴野者商猶羊之離羣者角猶鷄之鳴木者宮猶牛之鳴窌者書大傳亦曰禽獸之聲悉關於律以身言之肝音角心音徴脾音宮肺音商腎音羽然一音之變而五者具焉故凡律之為宮者或為徴角商羽為商者或為宮徴羽角更十二律而為六十加二十四之變音而為八十四此六律七音之大致然也故聞宮聲則使人温良而寛大聞商聲則使人方亷而好義聞角聲則使人惻隠而仁愛聞徴聲則使人樂養而好施聞羽聲則使人儉而好禮以宫動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正智羽動腎而和正禮故也則五音其可斯須去身哉祭與佩玉無商音者鄭康成曰大司樂三宫無商祭尚柔剛故不用也楊牧曰周祭天地不用商及二少以商聲剛而二少聲下所以取其正而裁其繁也漢祭天用商而宗廟鬼神畏商之剛故不用趙慎言曰商聲金也周家木徳金能克木作者去之蓋各述其所傳然也八音大司樂以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以說逺人以作動物凡六樂者文之以五聲播之以八音大師掌六律六同以合陰陽之聲皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹播猶掦也掦之以八音乃可得而觀之矣金猶鍾也石磬也土塤也革鼓鼗也絲琴瑟也木柷敔也匏笙也竹管蕭也樂記曰鍾聲鏗鏗以立號號以立横横以立武君子聽鍾聲則思武臣石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立會㑹以聚衆君子聽笙竽蕭管之聲則思畜聚之臣鼓鼙之聲讙讙以立動動以進衆君子聽鼓鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已彼亦有所合之也易及樂春秋說夏至人主與羣臣從八能之士作樂五日今止之非其道也書曰八音在治忽又曰八音克諧無相奪倫國語曰景王将鑄無射而為之大林問之於州鳩對曰琴瑟尚宮鍾尚羽石尚角匏竹利制樂器重者從細重為金石輕者從大輕瓦絲也是以金尚羽石尚角瓦絲尚宮匏竹尚議革木一聲又曰金石以動之絲竹以行之匏以宣之瓦以贊之革木以節之如是而鑄之金磨之石擊之絲木越之匏竹節之鼓而行之以遂八風正西曰兌為金為閶闔風西北曰乾為石為不周正北曰坎為革為廣莫東北曰艮為匏為融風正東曰震為竹為明庶東南曰巽為木為清明正南曰離為絲為景風西南曰坤為瓦為凉風萬物盈於天地之間而若堅若脆若勁若韌若實若虚若沉若浮莫過於金石土革絲木匏竹而天下之音具存矣可以和神人可以作動物非深於樂者其能究此乎葢樂器重者從細輕者從大大不踰宮細不踰羽大細之中則角而已金重者也故尚羽瓦絲輕者也故尚宮石輕於金而重於瓦絲故尚角匏竹無大細之從故尚議革木無清濁之變故一聲此八音所以直八卦而遂八風也葢主朔易者坎也故其音革而風廣莫為果蓏者艮也故其音匏而風融風震為竹故其音竹而風明庶巽為木故其音木而風清明兌為金故其音金而風閶闔乾為玉故其音石而風不周瓦土器也故坤音瓦而風凉蠶火精也故離音絲而風景風以方言之金石則土類也西凝之方也故三者在西匏竹則木類也東生之方也故三者在東絲成於夏故在南革成於冬故在北小胥之序八音先之以金石土中之以革絲後之以匏竹木葢西者聲之方虚者聲之本故音始於西而終於東西則先金石而後土者陰逆推其所始也東則先匏竹而後木者陽順序其所生也革絲居南北之正而先革而後絲亦先虚之意歟記曰鍾聲鏗鏗以立號號以立横横以立武石聲磬磬以立辨辨以致死絲聲哀哀以立亷亷以立志竹聲濫濫以立㑹㑹以聚衆鼓聲讙讙以立動動以進衆葢竹聲濫石聲清濫則立㑹以阜財清則立辨以死節絲聲哀鼓聲讙哀則立亷以制行讙則立動以致功鍾聲不讙不哀不清鏗鏘以立號足以肅衆横而不屈足以立武此所以聽之有合也魏明帝曰金音鏗鏗以立横横以勁武故金音正則人思武矣石聲硜硜以立别别以致死故石音正則人思守節矣絲音哀哀以立亷亷以立志絲音正則人將立操矣竹音濫濫以立㑹㑹以聚衆竹音正則人思和洽矣土音濁濁以立太太以含育土音正則人思寛厚矣革音讙讙以進衆革音正則人思毅勇矣匏音啾啾以立清清以忠志匏音正則人思愛恭矣木音直直以立正正以寡欲木音正則人思潔已矣十二律上下相生圖黄鍾下生林鍾上生太蔟下生南呂上生姑洗下生應鍾上生蕤賓上生大呂下生夷則上生夾鍾下生無射上生中呂下生十二律左右相生圖無射上九夷則九五蕤賔九四姑洗九三太簇九二黄鍾初九中呂上六夾鍾六五大呂六四應鍾六三南呂六四林鍾初六律管管說附大司樂以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賓客以說逺人以作動物六律合陽聲也六同合陰聲也此十二者以銅為管轉而相生黄鍾為首其長九寸各因而三分之上生者益一分下生者去一也國語曰律以立鈞出度也古之神瞽考中聲而量之以制度律鈞鍾言以中聲定律以律立鍾之均乃分樂而序之以祭以享以祀乃奏黄鍾歌大呂舞雲門以祀天神以黄鍾之鍾大呂之聲為均者黄鍾陽聲之首大呂為之合也乃奏太簇歌應鍾舞咸池以祀地示太簇陽聲第二應鍾為之合乃奏姑洗歌南呂舞大磬以祀四望姑洗陽聲第三南呂為之合乃奏蕤賓歌函鍾舞大夏以祭山川蕤賓陽聲第四函鍾為之合乃奏夷則歌小呂舞大濩以享先妣夷則陽聲第伍小呂為之合乃奏無射歌夾鍾舞大武以享先祖無射陽聲之下也夾鍾為之合夾鍾一名圜鍾也凡樂圜鍾為宮黄鍾為角太簇為徴姑洗為羽冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宮太簇為角姑洗為徴南呂為羽夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黄鍾為宮大呂為角大簇為徴應鍾為羽於宗廟之中奏之若樂九變則人鬼可得而禮矣圜鍾夾鍾也夾鍾生於房心之氣房心為大辰天帝之明堂函鍾林鍾也林鍾生於末之氣未坤之位或曰天社在東井輿鬼之外天社地神也黄鍾生於虚危之氣虚危為宗廟以此三者為宮用聲類求之天宮夾鍾陰聲其相生從數其陽無射無射上生中吕中吕與地宫同位不用也中吕上生黄鍾黄鍾下生林鍾地宫又不用林鍾上生太簇下生南吕南吕與無射同位又不用南呂上生姑洗地宮林鍾林鍾上生太簇太簇下生南呂南呂上生姑洗人宮黄鍾黄鍾下生林鍾林鍾地宮又辟之林鍾上生太簇太簇下生南呂南呂與天宮之陽同位又辟之南呂上生姑洗南呂之合又辟之姑洗下生應鍾應鍾上生蕤賔蕤賔地宮林鍾之陽也又辟之蕤賔上生大呂凡五聲宮之所生濁者為角清者為徵羽此樂無商者祭尚柔商堅剛也太師掌六律六同以合陰陽之聲陽聲黄鍾太簇姑洗蕤賓夷則無射陰聲大呂應鍾南呂函鍾小呂夾鍾皆文之以五聲宮商角徴羽皆播之以八音金石土革絲木匏竹以合陰陽之聲者聲之陰陽各有合也黄鍾子之氣也十一月建焉而辰在星紀大呂丑之氣也十二月建焉而辰在𤣥枵大簇寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木姑洗辰之氣也三月建焉而辰在大梁南呂酉之氣也八月建焉而辰在夀星蕤賓午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中呂已之氣也四月建焉而辰在實沉無射戍之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以陰陽六體為之黄鍾初九也下生林鍾之初六林鍾又上生太簇之九二太簇又下生南呂之六二南呂又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又上生大呂之六四大呂又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中呂之上六同位者象夫妻異位者象子母所謂律取妻而呂生子也黄鍾長九寸其實一籥下生者三分去一上生者三分益一五下六上乃一終矣大呂長八寸二百四十三分寸之一百四太簇長八寸夾鍾長七寸一千一百八十七分寸之千七十五姑洗長七寸九分寸之一中呂長六寸萬九千六百八十三分寸之萬二千九百七十四蕤賔長六寸八十一分寸之二十六林鍾長六寸夷則長五寸七百二十九分寸之四百五六十一南呂長五寸三分寸之一無射長四寸六千五百十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十以六徳為之本以六律為之音典同掌六律之和以辨天地四方陰陽之聲以為樂器陽聲屬天陰聲屬地天地之聲布於四方為作也故書同作銅鄭司農云陽律以竹為管陰律以銅為管竹陽也銅陰也各順其性凡十二律故太師職曰執同律以聽軍聲謂律述氣者也同助陽軍氣與之同也故皆以銅為焉凡為樂器以十有二律為之數度以十有二聲為之齊量禮記王制命典禮考時月定日同律月令孟春律中太簇律候氣之管以銅為之中猶應也孟春氣至則太簇之律應謂吹亥也仲春夾鍾季春姑洗孟夏中呂仲夏蕤賓季夏林鍾中央律黄鍾之宮孟秋夷則仲秋南呂季秋無射孟冬應鍾仲冬黄鍾季冬大呂禮運曰五聲六律十二管還相為宮更相為宮凡六十也樂記曰八風從律而不姦天下大定正六律和五聲弦歌詩頌此之謂徳音國語曰景王将鑄無射問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀紀之以三平之以六成於十二天之道也夫六中之色也故名之黄鍾所以宣養六氣九徳也由是第之一曰太簇所以金奏贊陽出滯也三曰姑洗所以修潔百物考神納賓也四曰蕤賓所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無貳也六曰無射所以宣布哲人之令徳示民軌儀也為之六間以揚沈伏而黜散越也元間大呂助宣物也二間夾鍾出四隙之細也三間中呂宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南呂贊陽秀也六間應鍾均和器用俾應復也律呂不易無姦物也細鈞有鍾無鎛昭其大也大鈞有鎛無鍾甚大無鎛鳴其細也大昭小鳴和之道也和平則久久固則純純明則終終復則樂所以成政也律厯志黄鍾黄者中之色君之服也鍾者種也大呂呂旅也言陰大呂助黄鍾宣氣而牙物也太簇簇奏也言陽氣大奏地而逹物也夾鍾言陰夾助太簇宣四方之氣而出種物也姑洗洗潔也言陽氣洗物辜潔之也中呂言陰微始起未成著於其中旅助姑洗宣氣齊物也蕤賓蕤繼也賓導也言陽始導陰氣使繼養物也林鍾林君也言隂氣受任助蕤賓君主種物使長大茂盛也夷則則法也言陽氣正法度而使陰氣夷當傷之物也南呂南任也言陰氣旅助夷則任成萬物也無射射厭也言陽氣究物而使陰氣畢剥落之終而復始亡厭已也應鍾言陰氣應無射該蔵萬物而雜陽閡種也先王因天地陰陽之氣而辨十有二辰因十有二辰而生十有二律綂之以三故黄鍾綂天林鍾綂地太簇綂人所以象三才生之以八故黄鍾生林鍾林鍾生太簇太簇生南呂之類所以象八風律左旋而生呂則為同位所以象夫婦呂右轉而生律則為異位所以象子母六上所以象天之六氣五下所以象地之五行天陽也有六氣六甲地陰也有五味五子腑陽也其數六臓陰也其數五此天地陰陽之中氣者也其長短有度其多寡有數黄鍾九寸林鍾六寸太簇八寸此三統也皆全寸而無餘分大呂八寸二百四十三分寸之一百四夾鍾長七寸一千一百八十七分寸之千七十五姑洗長七寸九分寸之一中呂長六寸萬九千六百八十三分寸之萬二千九百七十四蕤賓長六寸八十一分寸之二十六夷則長五寸七百三十九分寸之四百五十一南呂長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十其輕重有權其損益有宜度起黄鍾之長以子穀秬黍中者一黍之廣度之九十分黄鍾之長一為一分十分為寸量起黄鍾之籥以子穀秬黍中者千有二百寔其籥合籥為合權起黄鍾之重一籥容千二百黍重十二銖両之為両始於黄鍾終於中呂黄鍾太簇姑洗損陽以生陰林鍾南呂應鍾益陰以生陽蕤賓夷則無射又益陽以生陰大呂夾鍾中呂又損陰以生陽何則黄鍾至太簇陽之陽也林鍾至應鍾陰之陰也陽之陽陰之陰則陽息陰消之時故陽常下生而有餘隂常上生而不足蕤賓至無射則陰之陽也大呂至仲呂則陽之陰也陰之陽陽之陰則陽消陰息之時故陽常上生而不足陰常下生而有餘然則自子午以左皆上生子午以右皆下生矣鄭康成以黄鍾三律為下生以蕤賓三律為上生其說是也班固則類以律為下生呂為上生誤矣書曰聲依永律和聲則律非五聲不能辨聲非十二聲不能和五聲非變則不能盡故一律之中莫不具五聲五聲之外有所謂二變黄鍾為宮則林鍾為徴太簇為商南呂為羽姑洗為角應鍾為變宮蕤賓為變徴林鍾為宮太簇為徴南呂為商姑洗為羽應鍾為角蕤賔為變宮黄鍾為變徴以至十律之為宮餘律之為商角徴羽為二變旋之為十二宮折之為八十四聲類皆五位為五音第之至六為變宮又第之至七為變徴及八然後宮復旋矣此六律之大致也京房之徒推而蔓之至於三百六十以直三百六十日不可考也律之相生始於黄鍾終於中呂而十二律畢矣房之法中呂上生執始執始下生去滅上下相生終於南事而為六十律宋錢樂之推至三百律梁博士沈重為鍾律義曰易以三百六十䇿當期之日此律厯之數也淮南子曰一律而生五音十二律而生六十音用而六之故三百六十音乃重淮南京房之術求之得三百六十律國語曰黄鍾所以宣養六氣九徳也太簇所以金奏贊陽出滯也姑洗所以修潔百物考神納賓也蕤賓所以安靖神人獻酬交酢也夷則所以詠歌九則平民無貳也無射所以宣布哲人令徳示民軌儀也大呂助宣氣也夾鍾出四隙之細也仲呂宣中氣也林鍾和展百事俾莫不任肅純恪也南呂贊陽秀也應鍾均和器用俾應復也又曰武王夜陳未畢而雨以夷則之上宮畢所以藩屏民則也以黄鍾之下宮布戎於牧之野所以厲六師也以太簇之下宮布令於商以無射之上宮布憲施令於百姓觀此則十二律之名義略可見矣然陽盡變以造始故毎律異名陰體常以效法故止於三鍾三呂而已則鍾者物所聚也呂者物所正也夾鍾亦謂之圜鍾函鍾亦謂之林鍾南呂亦謂之南事中呂亦謂之小呂不待此也六律亦謂之六始六吕亦謂之六間亦謂之六同蓋圜鍾以春主規言之也林鍾以夏芘物言之也南事則隂之所成者事而已小吕則隂之所萌者小而已律所以述隂陽也始所以始六陰也呂其體也間其位也同其情也然皆述陰陽而己故皆謂之十二律也月令十三月皆言律中某律特中央曰律中黄鍾之宮者葢四時本於中央十二律本於黄鍾五聲本於宮中央無正律故取黄鍾之宮為聲律之本焉量中黄鍾之宮亦此意也管律管以竹若玉若銅為之傳曰黄帝令伶倫斷嶰谷之竹制十二筩以分律又曰黄帝作律以玉為琯又曰西王母獻舜昭華之玉琯漢章帝時零陵文學奚景於泠道舜祠下得白玉琯晉武帝時汲郡盜𤼵魏襄王冢得玉律鄭衆釋周官典同陽律竹管陰律銅管竹陽也銅陰也各順其性鄭康成曰律述氣同即陽皆以銅為之漢制亦用銅劉歆曰銅自名也所以同天下齊風俗也銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形有似於士君子之行是以用焉東漢以玉律十二候氣於殿中以竹律六十候氣於靈臺葢竹與銅玉其質雖殊其逹氣和聲一也故始於竹而玉銅預焉班固漢志以黄鍾九三之法起十二律之周徑空孔三分三天之數也圍九分終天之數也孟康於是謂林鍾長六寸圍六分太簇長八寸圍八分後漢安豐王珍用孟康之說作十二律林鍾空圍六分太簇圍八分不合黄鍾商徴之聲此康之失非固之妄也觀司馬彪鄭康成以至鄭譯何妥之徒謂凡律俱三分圍九分其說與固相合此所謂善言律者也均伶州鳩對周景王曰律所以立均出度也韋昭謂其制以木長七寸繫之以絲以均鍾音以出大小清濁之度漢大予樂官有之宋均曰長八尺而施弦其詳不可考也後世京房之準房之律準如琴長丈三弦隠間九尺以應黄鍾之律九寸中央弦下有盡之分寸以為六十律晉之十二笛梁之四通皆所以考律和聲亦古者立均之類歟定律之器始於管終於鍾次於均移於笛衍於通禮書卷一百十七
