  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_023-1a, image: WYG0130/WYG0130-0129c.png}
body:
  text: 禮書卷二十三宋陳祥道撰天子韍色朱而體直其繪龍火山上有頸肩旁與上有紕下有純中有紃紕不至下五寸繪去上五寸則中二尺矣鄭氏曰直謂四角直無圜殺孔頴達曰禮圖天子韠制形如要鼔今㕘驗不附人情諸侯韍諸侯在國則未朝王則赤韍其體前後方其繪火山頸肩紕純紃與天子同鄭氏曰前後方謂殺四角使之方變於天子也所殺者去上下各五寸孔頴達曰方則殺也所殺之處以物補飾之使方變於天子然考工記曰大琮十有二寸射四寸地體方而四隅有維則射四寸者其隅也韍之前後方盖亦類此所以異於天子直也毛氏釋詩曰韍天子純朱諸侯黄朱考之禮周尚赤而尊黄彜纁裳赤黄馬黄朱舄金舄則韍固有黄朱者矣大夫韍詩曰三百赤韍則大夫之韍其色赤其體前方後挫角其繪山此助祭冕服之韍也若祭於己則朝服用素韍士韎韐士前後正鄭氏曰士賤與君同不嫌也正直方之間語也天子之士則直諸侯之士則方孔頴逹曰正不衺也直而不衺謂之正方而不衺亦謂之正考之説文士無芾有韐制如榼缺四角缺四角則與前方後挫者不同所以其體正也士缺上下諸侯方而不挫天子直而不挫天子直而不方此尊卑之辨也素韠爵韠詩曰朱芾斯皇三百赤芾赤芾金舄赤芾在股庶見素韠兮箋祥祭朝服素韠易曰朱紱方來困于赤紱玉藻曰韠君朱大夫素士爵韋此𤣥端服之韠也韠必象裳色天子諸侯𤣥端朱裳大夫素裳士𤣥裳黄裳雜裳圜殺直天子直公侯前後方殺四角使之方變於天子大夫前方後挫角圜其上角者變於君也韠以下為前以上為後士前後正士賤與君同不嫌也正直方之間語也天子之士則直諸侯之士則方韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸又曰一命緼紱再命赤韍三命赤韍此𤣥冕爵弁服之韠尊祭服異其名耳又曰齊則綪結佩而爵韠眀堂位曰有虞氏服韍夏后氏山商火周龍章雜記曰韠長三尺下廣二尺上廣一尺㑹去上五寸紕以爵韋六寸不至下五寸純以素紃以五采鄭氏曰㑹謂上領縫也領之所用盖與紕同在旁曰紕在下曰純素生白也絀六寸者中執之表裏各三寸也純紕所不至者五寸與㑹去上同紃施諸縫中若今時絛也詩曰韎韐有奭箋云此諸侯世子也除三年之喪服士服而來未遇爵命之時有征伐之事天子使代卿士将六軍而出士冠禮爵弁服韎韐鄭氏曰韎韐縕韍也士緼韍而幽衡合韋為之染以毛蒐因以名焉今齊人名蒨為韎韐皮弁服素韠𤣥端爵韠特牲饋食其服皆朝服𤣥端緇韠唯尸祝佐食𤣥端𤣥裳黄裳雜裳可也皆爵韠緇韠者下大夫之服左傳曰衮冕黻珽昭其度也杜預曰黻韋韠鄭康成曰古者田漁而食之衣其皮先知蔽前後知蔽後後王易之以布帛而獨存其蔽前者不忘本也爾雅曰蔽膝謂之襜釋名曰韠蔽也所以蔽前也婦人蔽膝亦如之也是知韠之作也在衣之先其服也在衣之後其色則視裳而已禮記言君朱大夫素士爵韋者祭服之韠也盖君祭以冕服冕服𤣥衣纁裳故朱韠大夫祭以朝服緇衣素裳故素韠士祭以𤣥端𤣥端𤣥裳黄裳雜裳可也故爵韠周官典命公侯伯之士一命而士之助祭以爵弁弁而祭公爵弁纁裳故緼韍緼赤黄之間色所謂一命緼韍是也公侯伯之卿三命大夫再命而卿大夫助祭聘王以𤣥冕司服孤之服自希冕而下鄭氏以為卿大夫之服自𤣥冕而下鄭氏以為助祭聘王之服盖孤希冕祭於公弁而祭於己卿大夫𤣥冕祭於公冠而祭於己𤣥冕纁裳故赤韍所謂再命三命赤韍是也韠之為物以其茀前則曰韍以其一巾足矣故曰韠以色則曰緼以緼質則曰韎韐古人謂蒨為茅蒐謂茅蒐為韎韐考之士冠禮於皮弁𤣥端皆言韠特於爵弁言韎韐詩於素韠言韠於朱芾赤芾乃言芾是韠者芾之通稱而芾與韎韐異其名所以尊祭服也君韠雖以朱而諸侯朝王亦赤芾詩曰赤芾在股赤芾金舄是也士雖以爵凡君子之齊服皆爵韠記曰齊則綪結佩而爵韠是也采芑言方叔之將兵韍亦以朱瞻彼洛矣言作六師而韍以韎韐者盖兵事韋弁服韋弁服纁裳故貴者以朱芾卑者以韎韐韎韐即所謂緼韍也韠長三尺所以象三才頸五寸所以象五行下廣二尺象地也上廣一尺象天也㑹去上五寸紕以爵韋六寸不至下五寸純以素紃以五采㑹猶書所謂作㑹也紕裨其上與旁也純縁其下也去㑹與純合五寸則其中餘二尺也紕六寸則表裏各三寸也天子之韠直其㑹龍火與山公侯前後方其㑹火以下大夫前方後挫角其㑹山而已鄭氏謂山取其仁火取其眀龍取其變天子備焉諸侯火而下卿大夫山士韍韋以禮推之周人多以近世之禮待貴者逺世之禮待卑者則鄭氏之説是也周以虞庠為小學以夏序商學為大學以商人棺槨葬長殤以夏之堲周葬中殤以虞氏之瓦棺葬無服之殤皆待卑者以質略也然韠自頸肩而下則其身也鄭氏以其身之五寸為領而㑹為領縫是肩在領上矣衣之上韠猶尊上𤣥酒爼上生魚也鄭氏謂衣之上韠者執事以蔽裳為敬與不忘其本之説戾矣古者喪服用韠無所經見詩曰庶見素韠是祥祭有韠也劉熈曰韠以蔽前婦人蔽膝亦如之唐志婦人蔽膝皆如其夫是婦人有韠也荀子曰共艾畢説者曰蒼白之韋是罪人有韠也及戰國連兵韍非兵飾去之眀帝復制韍天子赤皮蔽膝魏晉以來用絳紗為之故字或作紱徐廣車服儀制云邪幅朱色詩曰赤芾在股邪幅在下左氏曰帶裳幅舄内則曰偪屨著綦綦屨繫也鄭康成謂偪束其脛自足至膝故曰在下盖以幅帛邪纒於足故謂之邪幅邪幅所以自偪束也故謂之偪偪即縢約之也故漢謂之行縢内則男子事父母有偪詩諸侯朝天子有邪偪則凡行皆有偪特婦人不用焉故内則婦事舅姑無偪禮書卷二十三
