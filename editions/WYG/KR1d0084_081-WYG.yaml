body:
  text: 禮書卷八十二宋陳祥道撰三詔禮曰納牲詔於庭血毛詔於室羮定詔於堂又曰詔祝於室迎尸於堂用牲於庭升首於室又曰血毛告幽全之物也蓋尸入則祼既祼則迎牲牲入則用幣於庭以告其將殺禮器所謂君牽牲大夫贊幣從是也既殺則薦血毛於室以告其幽全國語所謂毛以告物血以告殺是也及薦爓於堂又用羮以告其飪禮器所謂堂事交乎階是也凡此皆朝踐之節也儀禮大夫士無祼禮故殺牲而後迎牲迎牲而後迎尸天子諸侯有祼禮故迎尸而後迎牲鄭氏曰迎牲之時坐尸於堂西南靣坐主於堂西東靣祝乃燎膟膋於爐君親制祭然後升牲首於北牖下至薦熟乃更延主於室之奥尸坐于主北然祭統曰所使為尸者於祭者子行也父北靣而事之則尸之在堂固南靣矣特牲少牢皆坐尸於室西東靣則尸之在室西東面矣鄭氏曰延主于室之奥尸坐于主北其説或然其言堂上坐主於西東靣是象神者與神異嚮無是理也焫蕭周禮甸師祭祀共蕭茅詩曰取蕭祭脂又曰取其血膋郊特牲曰蕭合黍稷臭陽達於墻屋故既奠然後焫蕭合羶薌鄭氏曰奠謂薦熟時也特牲饋食所云祝酌奠于鉶南是也蕭染以脂合黍稷燒之祭義曰二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也薦黍稷肝肺首心見間以俠甒加以鬱鬯以報魄也鄭氏曰二端謂氣也魄也二禮謂朝事與薦黍稷也朝事謂薦血腥時也薦黍稷所謂饋食也見及間皆當為覸字之誤也羶當為馨聲之誤也爾雅曰蕭荻也李廵曰荻一名蕭陸機云今人所謂荻蒿者是也或云牛尾蒿似白蒿白葉莖麤科生多者數十莖可作燭有氣故祭祀以脂爇之為香許慎以為艾蒿非也鬱合鬯臭隂達於淵泉以形魄歸于地而求諸隂也蕭合黍稷臭陽達於墻屋以魂氣歸于天而求諸陽也祭祀君與夫人所以自盡者也故君灌以圭夫人灌以璋君迎牲夫人奠盎記言灌以圭璋用玉氣也既灌然後迎牲既奠然後焫蕭是迎牲奠盎皆在既灌之後而焫蕭又在既奠之後則灌求神之始也而焫蕭次之迎牲奠盎事神之始也而獻薦次之祭義曰君牽牲夫人奠盎君獻尸夫人薦豆求諸隂而事之猶以為未又求諸陽而致曲焉則神其不格乎設燔燎羶薌見以蕭光則羶膟膋之氣也薌黍稷之氣也曲禮黍曰薌合粱曰薌箕蕭合膟膋黍稷而燔燎之在朝事之節而朝事之初有迎牲奠盎之禮則祭義郊特牲之文雖殊其事一也蓋迎牲而刲之則血毛告於室以示其幽全膟膋焫於堂以達其臭氣而羮定之所詔又在其後不然不足謂之尚臭也鄭康成以祭義所言為廟事之焫蕭以郊特牲所言為饋食之焫蕭改羶為馨茅苴茅旌禹貢荆州厥貢包匭菁茅匭匝也茅以縮酒易曰藉用白茅无咎繫辭曰茅之為物薄而用可重也苟錯諸地而可矣藉之用茅何咎之有周禮甸師祭祀共蕭茅鄭大夫云束茅立之祭前沃酒滲下去若神飲之故謂縮滲也故齊桓責楚不貢包茅無以縮酒𤣥謂茅以共祭之苴亦以縮酒苴以藉祭縮酒泲酒也醴齊縮酌鄉師大祭祀羞牛牲共茅蒩鄭大夫謂祭前藉也𤣥謂蒩士虞禮所謂苴刌茅長五寸束之是也祝設于几東席上命佐食取黍稷于苴三取膚祭如初此所以承祭既祭蓋東而去之守祧云既祭藏其隋是與司巫祭祀共蒩館蒩之言藉也祭食有當藉者館所以承蒩謂若今筐也共蒩以筐大祝取其蒩陳之器則退也士虞禮曰苴刌茅長五寸實于篚饌于西坫上又曰祝盥取蒩降洗之升入設于几東席上東縮正義曰西坫者堂西南隅謂之坫士虞禮設席於奥神靣右几縮縱也據神靣為正東西設之故言東縮引之者據苴是藉祭之物司尊彞醴齊縮酌醴齊尤濁和以明酌滓之以茅縮去滓也醢人茆菹麇臡鄭大夫讀茆為茅茅菹茅初生男巫掌望祀望衍授號旁招以茆禮記曰縮酌用茅明酌也士虞禮苴刌茅長五寸束之實于篚饌于西坫上苴猶藉也又曰祝升取苴降洗之升入設于几東席上東縮又曰祝饗命佐食佐食許諾鉤袒取黍稷祭于苴三取膚祭祭如初鉤袒令擐衣也苴所以藉祭也孝子始將納尸以事其親為神疑於其位設苴以定之耳或曰苴主道也則特牲少牢當有主象而無何乎正義曰鄭意以苴為藉祭非主道也若然此據文有尸而言將納尸有苴案下記文無尸者亦有苴又特牲少牢吉祭無苴案司巫祭祀共蒩常祀亦有苴者以天子諸侯尊者禮備故吉祭亦有菹記既饗祭于苴左傳齊侯以諸侯之師伐楚曰爾貢包茅不入王祭不共無以縮酒公羊傳曰鄭伯左執茅旌茅旌祀宗廟所用迎道神指䕶祭者斷曰藉不斷曰旌詩曰野有死麕白茅包之野有死鹿白茅純束又曰白茅菅兮又曰晝爾于茅宵爾索綯晉語曰置茅蕝設表望史記曰一茅三脊茅之為物柔順潔白可以施於禮者也故古者藉祭縮酒之類皆用焉禹貢荆州包匭菁茅甸師祭祀共蕭茅鄉師大祭祀共茅蒩司巫祭祀共蒩館則茅有貢於方國者有共於甸師者甸師之茅有入之鄉師有入之司巫則鄉師之所共者大祭祀也司巫之所共者凡祭祀也賈公彦曰甸師共茅與司巫司巫為苴以共之此據祭宗廟也甸師氏送茅與鄉師謂祭天也孔子曰苟錯諸地而可矣藉之用茅何咎之有則茅不特藉祭而巳士虞禮苴刌茅長五寸束之實于篚饌于西坫上祝升取苴降洗之升入設于几東席上東縮佐食取黍稷祭于苴三取膚祭祭如初此特藉祭者也司尊彛醴齊縮酌記曰縮酌用茅明酌也縮然後酌則其縮不必束而立之祭前鄭大夫謂束而立之祭前沃酒其上酒滲而下若神飲鄭康成謂將納尸以事其親為神起於其位故設苴以定之其說皆不可考男巫望祀望衍旁招以茅國語置茅蕝設表望公羊曰鄭伯左執茅旌何休謂斷之曰藉不斷曰旌宗廟之中以迎道神指䕶祭者然則茅之所用豈一端哉故可以冪鼎可以御柩雜記或菹以為豆實或包以通問好或索綯以備民用此茅所以可重也士虞有苴特牲少牢吉祭無苴而司巫祭祀共蒩館則凡王祭祀有苴矣賈公彦謂天子諸侯尊者禮備於理或然後世祭有翟葢茅旌之類道布周禮司巫祭祀則共匰主及道布及蒩館杜子春曰道布新布三尺也或曰布者以為席也鄭康成曰道布者為神所設巾中霤禮曰以功布為道布屬几葢神位藉之以席設之以布謂之道布為道神故也禮書卷八十二
