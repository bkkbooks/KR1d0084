  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_060-1a, image: WYG0130/WYG0130-0380a.png}
body:
  text: 禮書卷六十一宋陳祥道撰士昏贄鴈帛有衣被之仁皮有炳蔚之文故孤執之羔有跪乳之禮有羣而不黨之義故卿執之進必以時行必以序鴈也故大夫執之交有時别有倫被文以相質死分而不變者雉也故士執之可畜而不散遷者鶩也故庻人執之可畜而不違時者鷄也故工商執之士相見禮於雉左頭奉之於鴈飾之以布維之以索如執雉於羔飾之以布四維之結于面左頭如麛執之蓋執禽者必左首雉必左首而無飾維鴈有飾維而亦左首鴈之飾與羔同而維與羔異羔四維而結于靣鄭氏謂繫聨四足交出背上於胸前結之是也士執雉而昏禮用鴈以贄不用死且攝盛故也觀其所乗者墨車所冠者爵弁女衣必纁袡領必顈黼腊必用鮮魚必用鮒則其攝盛可知鄭氏謂鴈順隂陽徃來故昏禮用焉誤也詩曰雝雝鳴鴈旭日始旦士如歸妻迨氷未冸亦謂用鴈士禮也賈公彦曰昏禮無問尊卑皆用鴈蓋附㑹鄭氏而為之説歟士雉腒士相見之禮冬用雉夏用腒雉不飾以布以士卑也不維以索以用死也用死與士死制同意用腒與夏行腒䐹同意臣之於君奠贄而不授所以尊之也自敵以下授贄而不奠所以交之也壻之見舅用臣見君之禮鄭氏謂壻有子道不敢授也贄雉也蓋壻之親迎稱賔則贄以鴈三月然後稱壻故贄以雉鶩鷄童子贄周禮庻人執鶩工商執鷄禮記言庶人匹鄭氏曰匹當為鶩然鶩之為物有馴擾而無散遷其謂之匹可也内則曰舒鳬翠爾雅曰舒鳬鶩李廵曰鶩鴨也野曰鳬家曰鶩然則庻人執鶩非鳬也士相見禮庶人見於君不為容進退走孟子曰庻人不傳質為臣則庶人見君無贄矣鶩之為贄特施於下其君者也工商亦然昔闕黨童子將命孔子譏之以欲速成范匄謀晉軍文子責之以何知蓋童子之禮衣不裳屨不絇服不緦聽事不麻立則在北坐則在隅見先生則從之而不竝有事走而不趨及冠然後奠贄于君遂以贄見於鄉大夫鄉先生是未冠不預乎禮也然或賢與多聞不可不進以成人之事故又有童子之贄焉其制與成人同所以優其徳其委與成人異所以卑其年野外軍中贄纓拾矢周官掌客在野在外殺禮曲禮曰野外軍中無贄以纓拾矢可也蓋君子之為禮不以在野在軍而或廢亦不以物不足而求備故以纓拾矢各適其宜而已然不若備物之為善故曰以纓拾矢可也婦人贄笲昏禮婦見舅姑執笲棗栗自門入升自西階進拜奠于席舅坐撫之婦降階受笲腵脩升拜奠于席姑坐舉以授人蓋棗取其赤心榛栗堅實脯脩取其正治士昏禮不言椇榛特牲少牢大夫士之祭亦棗栗而巳特籩人有棗栗又有榛實蓋具椇榛棗栗者盛禮也魯荘公使宗婦覿用幣左氏曰男贄大者玉帛小者禽鳥以章物也女贄不過椇榛棗栗以告䖍也公羊曰宗婦曷用棗栗云乎腵脩云乎蓋棗栗陽也故贄於舅脯脩隂也故贄於姑聘禮夫人使下大夫勞以二竹簋方其實棗蒸栗擇兼執之以進賔受栗大夫二手授栗玉人案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯然則婦人之用棗栗豈特為贄而巳哉禮書卷六十一
