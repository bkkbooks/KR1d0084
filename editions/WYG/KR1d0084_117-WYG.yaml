body:
  text: 禮書卷一百十八宋陳祥道撰天地辰建旋轉圖合陰陽之聲附太師掌六律六同以合陰陽之聲陽聲黄鍾太簇姑洗蕤賔夷則無射陰聲大呂應鍾南呂函鍾小呂夾鍾葢日月所㑹在天而右轉辰者日月所㑹也謂之辰則㑹之時謂之次則㑹之所謂之宿以其宿於此謂之房以其集於此其實一也斗柄所建在地而左旋轉旋雖殊而交錯貿見如表裏然故子合於丑寅合於亥辰合於酉午合於未甲合於己戌合於卯黄鍾子之氣十一月建焉辰在星紀大呂丑之氣十二月建焉辰在𤣥枵太簇寅之氣正月建焉辰在娵訾應鍾亥之氣十月建焉辰在析木姑洗辰之氣三月建焉辰在大梁南呂酉之氣八月建焉辰在壽星蕤賓午之氣五月建焉辰在鶉首林鍾未之氣六月建焉辰在鶉火夷則申之氣七月建焉辰在鶉尾中呂已之氣四月建焉辰在實沈無射戍之氣九月建焉辰在大火夾鍾卯之氣二月建焉辰在降婁故大司樂奏黄鍾歌大呂以祀天神奏太簇歌應鍾以祭地祗奏姑洗歌南呂以祀四望奏蕤賓歌函鍾以祭山川奏夷則歌小呂以享先妣奏無射歌夾鍾以享先祖皆即其所合者用之也唐之祭社下奏太簇上歌黄鍾趙慎言曰大簇陽也位在寅應鍾陰也位在亥故斗建亥則日月會於寅斗建寅則日月㑹於亥是知聖人之制取合於陰陽歌奏之儀用符於交會今之祭祀上下歌奏俱是陽律有乖古法請改黄鍾為應鍾均此所謂知合聲也祀祭享神祗鬼之律大司樂所以序圜鍾為宮黄鍾為角太簇為徴姑洗為羽此律之相次者也函鍾為宮太簇為角姑洗為徴南呂為羽此律之相生者也黄鍾為宫大呂為角太簇為徴應鍾為羽此律之相合者也天尚道故取諸相次者而相次者道之自然也地尚功故取諸相生者而相生者功之所致也人尚情故取諸相合者而相合者情之所感也先儒謂夾鍾生於房心之氣房心天帝之明堂故為天宮林鍾生於未之氣未坤之位故為地宫黄鍾生於虚危之氣虚危為宗廟故為人宮此說是也葢天帝之明堂東南方也帝與萬物相見於是出焉坤之位西南方也物於是致養焉宗廟北方也物於是蔵焉其為三宮宜矣然言天宮不用中呂林鍾南呂無射人宮避林鍾南呂姑洗蕤賔不用者卑之也避之者尊之也以謂天宮不用地宮之律人宮避天宮之律然則人宮用黄鍾孰謂避天地之律耶登歌下管明堂位曰以禘禮祀周公於太廟登歌清廟下管象文王世子曰天子養老登歌清廟下管象祭統曰夫太嘗禘升歌清廟下而管象天子之樂也康周公故賜魯也仲尼燕居曰兩君相見升歌清廟下而管象則天子之祭祀養老饗諸侯諸侯之相見魯之嘗禘皆升歌下管貴人聲也歌清廟示徳也管象示事也徳莫盛於文王之清廟事莫先於文王之象清者徳之潔而非任也象者事之始而未形也維清奏象而言文王之典肇禋季札見舞象而言美哉猶有憾則象為文王之詩明矣鄭氏以為武王詩誤矣然晉享穆叔歌文王之詩穆叔以文王為兩君相見之樂則諸侯相見歌文王而不歌清廟也孔子謂諸侯相見歌清廟者葢二王後諸侯之長禮然也書曰下管鼗鼓周官小師教簫管笙師教竽笙塤籥簫箎篴管大司樂祀天神有孤竹之管祭地示有孫竹之管詩曰嘒嘒管聲管磬鏘鏘簫管備舉則管之用重於笙矣鄭氏曰管併兩竹而吹之故鄉飲鄉射燕禮皆以管配歌特大射将祭擇士之禮乃用管焉則祭享而管象宜矣然鄉飲燕禮有歌笙與間而後合樂鄉射有合樂而無歌笙與間大射有歌而無間笙有管而無合樂歌必鹿鳴之三間歌必魚麗之三笙必南陔之三間笙必由庚之三合樂必周南召南之三大射之歌止於鹿鳴而管止於新宮何也左傳昭公二十五年宋公享叔孫昭子賦新宮鹿鳴之三忠臣之事也南陔白華孝子之事也華黍則物之豐而已此笙歌所以異也魚麗雖物也以之告神明故兼嘉魚之與賢有臺之得賢而歌之由庚崇丘由儀則物之遂而已此間笙歌所以異也葢鹿鳴之三魚麗之三所以象宗廟朝廷之治故歌之堂上南陔之三由庚之三所以象庶民萬物之治故奏之堂下特周南召南之三正始之道王化之基故歌與八音合奏焉然風可施於鄉而燕禮亦用於國小雅可施於國而飲酒亦用於鄉者葢禮盛者可以進取禮輕者可以下逮故用之鄉人者可用之邦國用之邦國者可用之鄉人也鄉射志於射而已故止合樂大射主於擇士而已故歌止於鹿鳴此所以與鄉飲燕禮異也然則大司樂祀天神祭地示則有歌歌應鍾祭地示而致天神地示則無歌小師大祭祀大饗登歌而小祭祀小樂事則不登歌何也致天神地示無歌猶大神之不祼也小祭祀小樂事不登歌猶小祭祀不興舞也房中樂燕禮若與四方之賓燕有房中之樂鄭氏曰絃歌周南召南之詩不用鍾磬謂之房中者后夫人之所誦諷以事其君子也周禮笙師教縵樂燕樂之鍾磬鄭氏曰燕樂房中之樂所謂陰聲也詩曰右招我由房毛詩曰房中之樂漢書曰漢有房中祀樂髙祖唐山夫人所作也周有房中樂至秦名曰壽人高祖樂楚聲故房中樂楚聲也房中之樂見於燕禮與漢書而毛氏以詩招我由房為房中之樂鄭氏以磬師之燕樂為房中之樂又謂弦歌周南召南而不用鐘磬之節后夫人之所諷誦以事君子也葢周南召南后夫人之事而漢房中樂乃夫人之所作則弦歌周南召南之說理其然也闗雎之詩曰鍾鼓樂之而周禮教燕樂以磬師則房中之樂非不用鍾磬也鄭氏言不用鍾磬又言教以磬師是自惑也賈公彦曰房中樂以祭祀則有鍾磬以燕則無鍾磬此不可考毛萇侯芭孫毓皆云有鍾磬王肅言無鍾磬與鄭氏同陳統曰婦人尚柔以靜為體不宜用鍾磬隋牛洪修房中之樂遂採蕭統之說據以為證禮書卷一百十八
