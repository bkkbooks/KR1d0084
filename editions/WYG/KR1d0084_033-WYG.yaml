body:
  text: 禮書卷三十三宋陳祥道撰力政大司徒大軍旅大田役以旗致萬民遂人若起野役則以遂之旗致民大夫以旟致民鄉師凡四時之田及期以司徒之大旗致衆庶鄭氏曰司徒致衆庶者以熊虎之旗此又以之眀為司徒致之大夫致衆當以鳥隼之旟賈氏曰大司徒既是卿官尋常建旜在軍建熊虎鄉師既是大夫官尋常建物在旜下明在軍當以鳥隼之旟在熊虎之下小宰以官府之八成經邦治一曰聴政役以比居鄭司農云政謂軍政役謂發兵起徒役比居謂伍籍也大司徒大軍旅大田役以旗致萬民而治其徒庶之政令小司徒上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羨唯田與追胥竭作凡國之大事致民大故致餘子鄭司農云餘子謂羨也𤣥謂餘子卿大夫之子當守於王宫者也大軍旅帥其衆庶小軍旅巡役治其政令大喪帥邦役治其政教鄉師大役則帥民徒而至治其政令既役則受州里之役要以考司空之辟以逆其役事鄉大夫之職以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舎者國中貴者賢者能者服公事老者疾者皆舎以嵗時入其書國中城郭中也晚賦税而早免之以其所居復多役少野早賦税而晚免之以其復少役多鄭司農云征之者給公上事也舍者謂有復除舍不收役事也貴者謂若今宗室及闗内侯皆復也服公事者謂若今吏有復除也老者謂若今八十九十復羡卒也疾者謂若今廢不可事者復之𤣥謂入其書者言於大司徒鄉師大役則帥民徒而至治其政令州長若國作民而師田行役之事則帥而致之掌其戒令與其賞罰黨正凡作民而師田行役則以其法治其政事族師若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰縣師若將有軍旅㑹同田役之戒則受法于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至遂人若起野役則令各帥其所治之民而以遂之大旗致之凡事致野役而師田作野民帥而至掌其政治禁令遂師作役事則聴其治訟鄙師凡作民則掌其戒令以時數其衆庶察其媺惡而誅賞縣正若將用野民師田行役移執事則帥而至治其政令稍人若有㑹同師田行役之事則以縣師之法作其司徒輂輦帥而以至治其政令以聴於司馬鄼長若作其民而用之則以旗鼓兵革帥而至大司馬簡稽鄉民以用邦國凡令賦以地與民制之上地食者三之二其民可用者家三人中地食者半其民可用者二家五人下地食者三之一其民可用者家二人大役與慮事屬其植受其要以待考而誅賞鄭司農云植謂部曲將吏故宋城春秋傳曰華元為植巡功屬謂聚㑹之也要者簿書也均人凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政王制曰用民之力嵗不過三日司空興事任力凡使民任老者之事食壯者之食五十不從力政六十不與服戎八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政祭義曰五十不為甸徒論語曰使民如承大祭孟子曰有布縷之征有粟米之征有力役之征君子用其一緩其二用其二而民有殍用其三而父子離詩大東曰東國困於役北山曰役使不均古者府史胥徒有常職而民不與焉其所與者軍旅田役而已故任之以地之媺惡辨之以國野之逺近均之以嵗之上下小司徒上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人此任之以地也鄉大夫國中自七尺以及六十野自六尺以及六十有五皆征之此辨之以國野也均人凡均力政以嵗上下豐年則公旬用三日中年則公旬用二日無年則公旬用一日凶札則無力役此均之以嵗也上地食七人中地食六人下地食五人而任之者僅半而已盖以下養上則不足以上養下則有餘故凡起徒役又無過家一人所謂施從其厚事舉其中與食壯者之食任老者之事同意七尺六尺征之以其才六十六十有五舍之以其齒國中近而役多故晚征而早舍野逺而役少故早征而晚舍欲使勞逸輕重均而已與近郊什一逺郊二十而三甸稍縣都無過十二同意力政有征於鄉有征於司徒征於司徒則公用之也故豐年公旬用三日則是嵗用二十七日中年公旬用二日則是嵗用十有八日無年公旬用一日則是嵗用九日而已以均力政在嵗成之後惟用於冬之一時故也其作之也在鄉則族師以鼓鐸旗物帥而至大司徒以鄉之大旗致之在遂則鄼長以旗鼓兵革帥而至遂人以遂之大旗致之葢鄉百家為族遂百家為鄼百家然後致之以旗鼓則下於百家者非必旗鼓也司徒之於六鄉遂人之於六遂以鄉遂之大旗致之則族帥鄼長之旗非大旗也鄉有鄉官致之遂有遂官致之至於邦國都鄙甸稍郊里之地縣師又備旗鼓兵器致之則所統有其人所㑹有其地所治有其法此所以如臂使指而無不率從也其不役者國中貴者賢者能者服公事者老者疾者皆舍又八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之喪三年不從政齊衰大功之喪三月不從政將徙於諸侯者三月不從政自諸侯徙家朞不從政然則役之義也舍之仁也義故民忘其勞仁故民悦其徳此所以北山不均之刺不作於下而餘力之頌日聞於上也後世踐更之法雖丞相之子不免戍邊非所謂舍貴者也絳之老人辱在泥塗非所謂舍老者也豈可與議先王之法哉周禮均人無年之力政猶至九日王制用民之力嵗不過三日非周禮也卿大夫國野之役至於六十六十有五王制曰五十不從力政祭義曰五十不為甸徒亦非周制也然六十不與服戎恐周亦然班超傳曰古者十五授兵六十還之韓詩説三十受兵六十還兵其受兵早晚雖殊其六十還兵一也方伯連帥之職周官六卿分職各率其屬以倡九牧周禮太宰乃施典于邦國而建其牧立其監設其叅傳其五陳其殷置其輔以侯伯有功徳者加命作州長謂之牧所謂八命作牧者監謂公侯伯子男各監一國又曰牧以地得民大宗伯曰八命作牧謂侯伯有功徳者加命得専征伐於諸侯鄭司農云一州之牧王之三公亦八命九命作伯上公有功徳者加命為二伯得征五侯九伯者鄭司農云長諸侯為方伯大司馬建牧立監以維邦國職方氏凡邦國大小相維王設其牧掌交諭九牧之維詩旄丘序曰衛侯不能修方伯連帥之職芃芃黍苗曰四國有王郇伯勞之曲禮五官之長曰伯是也職方其擯於天子也曰天子之吏天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君九州之長入天子之國曰牧每一州之中天子選諸侯之賢者以為之牧也天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君牧尊於大國之君而謂之叔父辟二伯也亦以此為尊禮或損之而盆謂此類也外自其國之外九州之中曰侯者本爵也二王之後不為牧其在東夷北狄西戎南蠻雖大曰子謂九州之外長也天子亦選其諸侯之賢者以為之子猶牧也入天子之國曰子天子亦謂之子雖有侯伯之地本爵亦無過子是以同名曰子於内自稱曰不穀於外自稱曰王老王制千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下為左右曰二伯左傳曰五侯九伯汝實征之州二百一十國伯一人州二百一十國伯一人伯州二百一十國伯一人州二百一十國伯一人州二百一十國伯一人州二百一十國伯一人伯州二百一十國伯一人州二百一十國伯一人州七之而為卒卒三十國一正則州七正矣卒三之而為連連十國一帥則州二十一帥矣連二之而為屬屬五國一長則州四十二長矣八州八伯五十六正百六十八帥三百三十六長古之官有常名有異名内而為比長閭師族師黨正州長鄉大夫此常名也及任以師田之事則為軍將師帥旅師卒長兩司馬公司馬此異名也外而為公侯伯子男此常名也及寓以連屬之法則為屬長連帥卒正州伯此異名也屬則繫其人連則結其衆以其民之衆足以禦卒然之變故謂之卒以其地之廣有達于重川之逺故謂之州屬有長則足以長五國而已未足以率十國之衆故連有帥帥足以率十國而已未足以正三十國之衆故卒有正正足以正三十國而已未足以長二百一十國故州有伯則為人長者才也帥人者智也正人者義也長人者仁也易曰體仁足以長人則外之八伯内之二伯皆以其能體仁故也盖王者有分土無分民建萬國所以分其土親諸侯所以合其人不分其土則其守不専不合其人則其勢不一王制言凡九州千七百七十三國分其土也繼之以才伯連帥之法合其人也周官大司馬比小事大以和邦國職方氏凡邦國大小相維者此也古者什伍之法於州鄉則聨其民於師田則聨其徒於宿衛則聨其官故能以中國為一人而無内患為屬連卒州以聨其國為長帥正伯以聨其人故能以天下為一家而無外虞然不惟其官惟其人則法行而事舉詩曰四國有王郇伯勞之是也非其人則法雖存而事廢詩序曰衛侯不能修方伯連帥之職公羊傳曰下無賢方伯是也方伯連帥之職周道故書與周禮伯皆稱牧者盖自内言之則屈於二伯故稱牧周官大宗伯八命作牧曲禮九州之長入天子之國曰牧是也自外言之則伸於諸侯故稱伯王制謂方伯之國是也虞十二州則十二牧夏九牧左氏曰夏之方有徳也貢金九牧周九州則九伯而王制言八州八伯則王畿之内不建伯焉鄭氏以為商制是也然周牧伯之名見於經傳多矣連帥特見於詩序若夫五國之屬於經無聞左傳曰晉侯享公請屬鄫豈周所謂連屬歟公羊傳曰自陜以東周公主之自陜以西召公主之書曰畢公率東方諸侯入應門右太保率西方諸侯入應門左此所謂九命作伯者也與商所謂天子之老二人一矣周有九伯則畿内盖亦設牧而太宰言施典于邦國設其牧者以牧之所設主為邦國故也康成釋詩謂周之制使伯佐牧盖以傳所謂五侯者五牧也九伯者佐侯之伯也孔頴達申之以為一牧之下二伯然質之於商州伯之下無二佐則周州牧之下無二伯軍制大國三軍三萬七千七百五十人次國二軍二萬五千人小國一軍萬二千五百人周官大司馬主六軍大國三軍次國二軍小國一軍春秋傳曰成國不過半天子之軍諸侯之大者三軍可也盖天子六軍而將之以六卿大國三軍而將之以三卿周三等之國以地言之公侯百里大國也伯七十里次國也子男五十里小國也以國家宫室車旗禮儀言之上公以九為一節大國也侯伯以七為節次國也子男以五為節小國也然軍之多寡係地之廣狹而公侯之田皆百里則皆三軍矣魯於周為侯而地方百里頌稱公徒三萬此大國三軍之數也春秋襄十一年作三軍昭五年舍中軍則魯之三軍盖嘗變於僖公之後至襄而復作至昭而又舍也左氏曰季武子作三軍三分公室而各有其一杜預曰魯本無中軍惟上下二軍皆屬於公有事三卿更帥以征伐季氏欲専其民人故假立中軍公羊曰三軍者何三卿也何譏爾古者上卿下卿上士下士何休曰襄公委任强臣乃盆司馬作中卿官踰王制故譏之穀梁曰古者天子六師諸侯一軍作三軍非正也啖氏曰天子六軍大國三之一小國半大國數不必常所以示稱國語曰季武子為三軍季孫穆子曰不可今我小侯也處大國之間繕貢賦以共從者猶懼有討若為元侯之所以怒大國無乃不可乎弗從遂作中軍自是齊楚伐討魯襄昭皆如楚由此觀之魯於春秋之時尊事齊楚為不暇則其國次國而已不宜復作三軍作三軍非正也故春秋書作以譏之作猶作僖公主之類也及舍中軍以起於禮又書以正之公羊曰舍中軍復古也穀梁曰復正也其説是也然穀梁言天子六師諸侯一軍啖氏言天子六軍大國三之一小國半大國其制與周禮不合是臆説耳春秋之時王命曲沃伯以一軍為晉侯莊十六年其後晉作三行以増上中下而當六軍則世衰禮廢大夫僭諸侯諸侯僭天子不足怪也羨卒小司徒上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羨唯田與追胥竭作凡國之大事致民大故致餘子鄭司農云餘子謂羡也𤣥謂餘子卿大夫之子當守王宫者賈公彦曰此謂六卿之内上劑致甿一人為正卒其餘皆為羨卒若六遂之内以下劑致甿一人為正卒一人為羨卒其餘皆為餘夫饒逺故也遂人以下劑致甿以下劑為率謂可任者家二人賈公彦曰六卿上劑致民六遂下劑致甿六卿上地無業六遂上地有業是其異也鄉大夫老者皆舍鄭司農云老者若今八十九十復羨卒也公劉詩曰其軍三單箋云邰后稷上公之封大國之制三軍以其餘卒為羨今公劉遷於􅃎民始從之丁夫適滿三軍之數單者無羨卒也古者國有遊倅田有餘夫軍有羨卒皆所以副其正也六卿以三劑致民上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羨則一人為正卒餘可任者皆羡卒也六遂以下劑致民上地可任家三人中地可任二家五人而皆以下地二人任之則一人為正卒一人為羨卒其餘不預所以優野人也惟田與追胥竭作鄉遂皆然以田獵禽獸人所同欲追伺盜賊人所同惡故也羨卒亦謂之餘子則餘子自私言之羨卒自公言之故也詩曰其軍三單先儒謂公劉始遷於豳無羨卒是也禮書卷三十三
