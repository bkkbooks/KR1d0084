body:
  text: 禮書卷一百三十二宋陳祥道換旗熊虎為旗司常熊虎為旗師都建旗大司馬軍吏載旗考工記熊旗六斿以象伐鄭氏曰伐屬白虎宿與參連體而六星故六斿然九旗亦旗猶王侯皆謂之侯五溝皆謂之溝五涂皆謂之涂八法皆謂之法也周禮言旗言大旗言旗物言旌旗言旗鼔則旗與大旗云者熊虎之旗也旗物旌旗旗鼓云者有非熊虎之旗也故鄉邑以旗物及田之前期致民則以司徒之大旗鄼長之作民以鼓遂之起野役致民則以遂之大旗然則熊虎之旗豈卑者所得而有耶致民則以旗既至則弊之故司常曰致民置旗弊之大司馬曰質眀弊旗誅後至者葢設而致之使之一於所視至而弊之使之一於所聴也旗之所用不特軍旅田獵野役之事而已凡祭祀各建軍旅㑹同賓客亦如之蓋衆之所視聴各建以一之也而田獵有虞人有虞旗有虞旌何也山虞掌山林之政令山林者獸之所集故有虞旗以致禽澤虞掌國澤之政令澤者禽之所集故有虞旌以屬禽熊虎之旗葢皆六斿先儒以為遂大夫四命四斿卿大夫六命六斿不可考也其杠之長短則有差矣鄭氏曰山虞之旗其仞數則短是也先王之於旗分之采物而禮意存焉後世秦於四時各有所旂月令春青旂夏赤旂中央黄秋白冬黒鄭有蝥弧晉有螽旗以至吴王之建肥胡武之靈旃田蚡之曲旃後漢之雲䍐皆一時之觀美而已豈古制哉旟鳥隼為旟司常曰鳥隼為旟爾雅曰錯革鳥曰旟朱雀與隼輈人曰鳥旟七斿以象鶉火然司常之大閲州里建旟司馬之兵百官載旟何也軍法行前朱鳥後𤣥武左青龍右白虎招搖在上急繕其怒則諸侯載交龍之旂於左軍吏載熊虎之旗於右百官載鳥隼之旟於前郊野載龜虵之旐於後王載太常於其中而加髙焉此所謂招摇在上也然則州里建旟者州里之常百官載旟者一時之事軍國之容固不同耳干旄曰孑子干旗蓋州里之臣也太常而下五旗皆畫則旟畫鳥隼信矣郭璞釋爾雅謂旟剥鳥皮毛置之竿頭即禮記載鴻及鳴鳶其説非是也旐龜虵為旐司常龜虵為旐考工記龜虵四斿以象營室爾雅曰緇廣充幅長尋曰旐司常又曰縣鄙建旐大司馬曰郊野載旐葢田役軍旅王之事也雖命數不同而同於四斿其所辨異者有名號存焉先儒謂縣正四斿鄙師三斿其説無據詩曰孑子干旄孑子干旟孑子干旌又曰設此旐矣建彼旄矣又曰建旐設旄爾雅曰注干首曰旄注旄首曰旌孟子曰羽旄之美左傳范宣子假羽旄於齊而弗歸齊人始貳襄十四年晉人假羽旄於鄭定四年眀日斾之賈公彦曰太常而下干首皆有旄羽葢干首注以旄旄首注以旌則羽毛所以為旗飾也旗皆有羽旄而全羽之旞析羽之旌又為旗焉此所以道車斿車之所載澤虞之所建與夫飾旗者異矣書曰右建白旄以麾樂師小舞有旄舞旄人掌教散舞旄舞傳曰葛天氏之樂三人操牛尾捉足而歌八闋爾雅曰旄謂之藣山海有獸如牛四節有旄此旄牛也荀卿曰西海則有文旄班固地里志秦西近卭莋有旄西方之産也其尾可以飾旗亦可以飾舞旜鄭氏曰通帛為大赤従周正色孤卿不畫言奉王之政教而已物鄭氏曰雜帛者以帛素飾其側白殷之正色大夫士雜帛言以先王正道佐職也司常通帛為旜雜帛為物爾雅因章曰旃左氏曰亡大斾之左旃又曰分康叔以少帛綪茷旃旌葢旃大赤也物少帛也旃為大飾故孤卿建之物為少帛故士建之左傳旜而鼓杜氏曰旃也爾雅曰緇廣充幅長尋為旐是旗旟而上其色赤而不緇其幅長而不特尋也旜物之斿經無其説周禮典命自上公至士其車旗各眡其命之數而行人上公建常九斿侯伯七斿子男五斿皆以命數為節然即王之孤卿六命大夫四命公侯伯之孤四命卿三命大夫再命士一命子男之卿再命其大夫一命旜物之斿葢亦稱是與旂旗旟旐之斿有常數者異也先儒以為旜物斾如燕尾此不可考聘禮卿載旜禮也既夕士載旜攝也禮書卷一百三十二
