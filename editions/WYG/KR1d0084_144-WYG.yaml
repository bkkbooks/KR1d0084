body:
  text: 禮書卷一百四十五宋陳祥道撰帷裳巾車王后重翟厭翟安車皆有容葢詩曰漸車帷裳鄭司農曰容謂襜車山東謂之裳帷或曰童容其上有葢旁垂而下謂之襜故士昏禮婦車有裧雜記曰輤有裧鄭康成謂裧鼈甲邊縁也然容裧幃皆帷裳之異名也古者婦人車飾以此後世男子之車有之非禮也故郭賀褰帷君子取焉茀簟茀翟茀茀車蔽也詩曰簟茀朱鞹簟茀魚服翟茀以朝翟雉也簟方丈蓆也衛夫人之車以翟茀齊襄公方叔之車以簟茀此婦人男子車蔽之别也爾雅曰輿革前謂之鞎乎恩後謂之茀竹前謂之禦後謂之蔽鞎以革鞔軾者也茀以革鞔後戸者也禦則簟衣軾所以禦前蔽則以簟衣後戶所以蔽後鞎與茀皆革為之詩所謂朱鞹是也禦與蔽皆竹為之詩所謂簟茀是也王之喪車始喪木車蒲蔽卒哭素車棼蔽既練薻車薻蔽大祥駹車雚蔽禫漆車藩蔽車氏謂蔽車旁禦風塵者藩蔽漆席為之然則禫車之蔽猶且漆之則吉車之蔽其飾又可知矣車之前後兩旁莫不有蔽爾雅言其前後鄭氏言其兩旁各舉其略故也漢詔二千石朱兩轓六百石朱左轓則轓者蔽也扄邲之戰晉人以廣隊不能進楚人惎之脱扄西京賦曰旗不脱扄杜預曰扄兵闌也孔穎達曰扄横木也蓋横木車前以約所載之兵器則扄可脱之材矣觀戶扄謂之扄鼎扄亦謂之扄則車扄亦然輔詩曰無棄爾輔員于爾輻左傳曰輔車相依孔穎達曰輔者可脱之物如今人縳杖於輻以助車也輴禹之四載曰舟車輴樏輴以行泥亦曰毳曰蕝樏以行山亦曰橋曰䠱輂今參酌禮經有輴制於此書曰予乘四載隨山刋木孔安國曰水乗舟陸乗車泥乗輴丑輪山乗樏方追河渠書曰泥行蹈毳山行即橋去喬溝洫志曰泥行乗毳山行則􅵉尸子曰山行乗樏泥行乗蕝徐廣曰橋一作輂輂直轅車也孟康曰毳形如箕擿行泥上應劭曰􅵉或作樏人所引也如淳曰􅵉以鐵如錐施之履下以行山然周禮大軍旅㑹同鄉師治其輂輦説文曰輂大車駕馬則非山乗者也書曰予乗四載則所乗非所履者也考之於禮士載柩以輁軸大夫以上載車以輴先儒謂輁狀如長牀穿桯前後著金而關軸焉大夫諸侯以上有四周謂之輴又曰輴之形狀庳下而寛廣然則泥行乗輴蓋亦如長牀然也禮書卷一百四十五
