  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_047-1a, image: WYG0130/WYG0130-0289a.png}
body:
  text: 禮書卷四十八宋陳祥道撰漆几文貝雕玉周禮司几筵五几莫貴於玉几書之四几莫貴於華玉几則玉几者華玉几也王設几於左右優至尊也諸侯而下或設之左或設之右適事之宜也諸侯祭祀席右几筵國賔左几則祭祀隂事也故右之筵國賔陽事也故左之士虞禮布席于室中東面右几少牢祝設几于筵上右之有司徹尸奠几于筵上左之卒􅅪而厭祭設右几鄭氏謂生人陽長左鬼神隂長右是也然鬼神雖長右而長右不必皆鬼神故甸役亦右几以甸役隂事故也鄭氏以甸役右几為貉祭然經言甸役而不言甸役之祭鄭氏之說其果然乎司几筵吉事變几凶事仍几葢吉事尚文而几必變凶事尚質而几常仍故也孔安國以書之仍几為因生時之几不改作誤矣詩曰肆筵設席授几有緝御昏禮主人拂几授校校几足聘禮宰夫奉兩端以進公於序端受宰几攝之一手受之以授賔賔進訝受賔以兩手於几兩端執之有司徹主人降受宰几二手横執以授尸尸二手横于手間則席常設於賔未至之前几常授於行禮之際其將授也必拂曲禮曰進几杖者拂之士昏禮主人拂几鄭氏曰外拂之也聘禮公東南鄉外拂几三宰内拂几三葢於敵以下外拂於尊者内拂皆拂之三其授之也必拜送其受也必拜答執之或横或中攝授之或受其足或受于手間其避拜送也或以几辟昏聘禮皆以几有辟以賔卑故也或不以几辟有司徹不云以几辟者尊尸也其敬父母不傳内則父母枕几不傳其謀於長者必操以從是皆稱情以為文故也禮王大朝覲大饗射凡封國命諸侯祀先王酢席皆玉几諸侯祭祀彫几酢席筵國賔彤几凡甸役漆几鄭氏謂諸侯朝者彫几聘者彤几聘者孤彤几卿大夫其漆几歟然禮於祭祀言彫几而朝者不與於國賔言彤几則無間於孤卿大夫不知鄭氏何據云然耶馬融曰几長三尺阮諶曰几長五尺髙二尺舊圖几兩端赤中央黑葢各述其所傳然也覲禮天子設斧扆左右玉几司几筵大朝覲大饗射封國命諸侯王位設黼依左右玉几几所憑以安者也王於朝覲㑹同立而不坐曲禮曰天子當依而立曰覲當宁而立曰朝明堂位曰天子負斧扆而立非有所憑也然必設几者鄭氏釋太宰謂立而設几優至尊也荀卿曰周公負扆而坐諸侯趨走堂下得非所傳聞者異歟儀禮昏聘公食大夫皆有几冠禮醴賔鄉飲酒鄉射及燕賔無几皆輕重之别也䘮或同時在殯則每敦異几鄭氏曰敦讀曰燾燾履也及祭則同几生事鬼事之别也几不特施於行禮而已燕居亦有焉士䘮禮所謂燕几是也不特施於燕居而已田役軍旅亦有焉周禮甸役右漆几春秋之時智伯在軍投之以几是也晉伐偪陽城荀偃士匄請班師智伯怒投之以几出於其間不特所憑以安而已死者用之拘足尸與嫁者或用以乘車士䘮禮綴足用燕几曲禮尸必式乘必以几昏禮婦乘以几是也學校王制曰有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序商人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊又曰天子命之教然後為學小學在公宮南之左太學在郊天子曰辟廱諸侯曰頖宮又曰耆老皆朝于庠文王世子曰春夏學干戈秋冬學羽籥皆於東序春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠學記曰古之教者黨有庠術有序國有學文王世子曰凡祭與養老乞言合語之禮皆小樂正詔之於東序凡語于郊者於成均以及取爵於上尊天子視學大昕鼔徵有司卒事適東序明堂位曰米廩有虞氏之庠也序夏后氏之序也瞽宗商學也頖宮周學也禮器曰魯人將有事于上帝必先有事於頖宫祭義曰祀三老五更於太學所以教諸侯之弟祀先賢於西學所以教諸侯之徳西學周小學也又曰天子設四學當入學而太子齒四學謂周四郊之虞庠也鄉飲酒賔迎于庠門之外孟子曰夏曰校殷曰序周曰庠詩曰鎬京辟廱又曰於樂辟廱又曰思樂泮水又曰子衿刺學校廢也周禮州長春秋以禮㑹民射于州序黨正以禮屬民飲酒于序大司樂掌成均之法以治建國之學政而合國之子弟凡有道者有徳者使教焉死則以為樂祖祭於瞽宗又曰春合諸學秋合諸射賈誼曰帝入東學上親而貴仁則親疎有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學尚賢而貴徳則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不踰矣帝入太學承師問道退習而考於太傅太傅罰其不則而正其不及董仲舒曰成均五帝之學書大傳曰古之帝王必立大學小學使公卿之大子元士大夫之子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故小師取小學之賢者登之大學大師取大學之賢者登之天子周四代學辟廱在國虞庠在國之西郊今圖辟廱之制如此魯四代學記曰小學在公宮南之左大學在郊又曰魯人將有事於上帝必先有事於泮宮則頖宮在郊太學也虞庠在公宮南之右小學也白虎通曰諸侯曰頖宮半者象璜也獨南面禮儀之方有水耳其説是也鄭康成曰頖班也非是諸侯學頖宮在郊四代之學虞則上庠下庠夏則東序西序商則右學左學周則東膠虞庠而周則又有辟廱成均瞽宗之名則上庠東序右學東膠大學也故國老於之養焉下庠西序左學虞庠小學也故庶老於之養焉記曰天子設四學葢周之制也周之辟廱即成均也東膠即東序也瞽宗即右學也葢以其明之以法和之以道則曰辟廱鄭氏釋王制謂辟明也廱和也所以明和天下毛氏釋詩謂水旋丘如璧以節觀者故曰辟廱孔穎達曰禮注觧其義詩注解其形以其成其虧均其過不及則曰成均以習射事則曰序以紏徳行則曰膠以樂祖在焉則曰瞽宗以居右焉則曰右學葢周之學成均居中其左東序其右瞽宗此大學也虞庠在國之西郊則小學也記曰天子視學命有司行事祭先師先聖焉卒事遂適東序設三老五更之席又曰食三老五更於太學所以教諸侯之弟祀先賢於西學所以教諸侯之徳夫天子視學則成均也命有司行事祭先師先聖焉即祀先賢於西學也祀先賢於西學則祭於瞽宗也有司卒事適東序設三老五更之席即養國老於東膠也養國老於東膠即祀三老五更於大學也然則商之右學在周謂之西學亦謂之瞽宗夏之東序在周謂之東膠亦謂之太學葢夏學上東而下西商學上右而下左周之所存特其上者耳則右學東序葢與成均並建於一丘之上而已由是觀之成均頒學政右學祀樂祖東序養老更右學東序不特存其制而已又因其所上之方而位之也夫諸侯之學小學在内大學在外故王制言小學在公宮南之左大學在郊以其選士由内以升於外然後達于京故也天子之學小學居外大學居内故文王世子言凡語于郊者於成均取爵於上尊以其選士由外以升於内然後達于朝故也明堂位曰米廩有虞氏之庠也序夏后氏之序也瞽宗商學也頖宮周學也頖宮則泮水也其制半於辟廱而水葢闕於北方也諸侯樂懸闕其南而泮水闕其北者闕南而存北所以便其觀也闕北而示南所以便人之觀也頖宫大學也魯之大學在郊故將有事於上帝則於之先有事焉然則序與瞽宗葢亦設於頖宮之左右而米廩其公宮南之小學歟孟子曰夏曰校殷曰序周曰庠何也孟子因論井地而及此則校庠序者鄉學也鄉飲酒主人迎賔于庠門之外鄉簡不帥耆老皆朝于庠則庠鄉學名也周官州長㑹民射于州序黨正屬民飲酒于序則序亦鄉學名也鄭人之所欲毀者謂之鄉校則校亦鄉學名也然鄉曰庠記言黨有庠州曰序記言遂有序何也古之致仕者教子弟於閭塾之基則家有塾云者非家塾也合二十五家而教之於閭塾謂之家有塾則合五黨而教之鄉庠謂之黨有庠可也周禮遂官各降鄉官一等則遂之學亦降鄉一等矣降鄉一等而謂之州長其爵與遂大夫同則遂之學其名與州序同可也周之時干戈羽籥在東序絃誦與禮在瞽宗書在上庠以言學者之事始乎書立乎禮成乎樂而舞又樂之成焉故大司樂言樂徳樂語而終於樂舞樂師言樂成告備而終於臯舞孟子言仁義禮樂之實而終於不知手之舞之記言詩言志歌咏聲而終於舞動容此舞之所以為樂之成也由小學之書以進於瞽宗之禮樂由瞽宗之禮樂而成之以東序之舞則周之教法可知矣漢明帝時視辟廱冠帶搢紳之人圜橋門而觀者葢億萬計則周人辟廱之制宜亦然也白虎通曰辟者壁也圜以法天外圜内方明徳當圜行當方考之於禮鬴簋錢之類皆外圜内方圜而函方隂陽之義也然則白虎通辟廱之論葢有所受耳董仲舒以成均為五帝之學大戴賈誼有帝入五學之説鄭康成謂周有四郊之虞庠王肅謂辟廱即明堂耳此皆不可考也禮書卷四十八
