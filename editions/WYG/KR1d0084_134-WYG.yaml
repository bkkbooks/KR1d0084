body:
  text: 禮書卷一百三十五宋陳祥道撰車制古者服牛乗馬引重致逺以利天下則車之作尚矣或曰黄帝作軒冕不可攷也車之制象天以為蓋象地以為輿象斗以為杠轂象二十八星以為葢弓象日月以為輪輻前載而後户前軌而後軫旁輢而首以較下軸而銜以轐對人者謂之轛車如舟者謂之軸揉而相迎者謂之牙輈之曲中謂之前疾軛之土平謂之衡衡之材與輿之下木皆曰任以其力任於此也轂之端與輢之下木皆曰軹以其旁止於此也軫可以名輿可以名車達常可以名部軫前横木可以名輅此又因一材而通名之也其為車也有長轂者有短轂者有杼輪者有侔輪者有反輮者有仄輮者有兩輪者有四輪者有有輻者有無輻者有曲轅者有直轅者輦直轅有一轅者有兩轅者有直輿者有曲輿者鈎車曲輿有廣箱者有方箱者有重較者有單較者或駕以馬或駕以牛或輓以人或飾以物或飾以漆或樸以素要皆因宜以為之制稱事以為之文也然禮有屈伸名有抑揚故論其任重則雖庶人之牛車亦與大夫同稱大車論其等威則雖諸侯之正路於王門曰偏駕而已五路玉路鄭氏曰玉路金路象路以玉金象飾諸末革路輓之以革而漆之無他飾木路不輓以革漆之而已金路象路革路木路路大也玉路金路象路以金玉象飾之也革路輓而漆之木路漆之而不鞔則有飾者皆鞔而漆鞔而漆者無飾也玉路錫樊纓十有再就金路鉤樊纓九就象路朱樊纓七就革路龍勒條纓五就木路前樊鵠纓者錫在顱鉤在頷朱者勒之色龍者勒之飾詩言鏤錫左傳言錫鸞和鈴昭其聲也莊周言齊之以月題錫白金也鏤其文也月題其象也則錫象月而鏤之又昭其聲也詩言鉤膺采芑曰鉤膺鞗革韓奕曰鉤膺鏤錫則鉤在膺前赤金為之爾雅曰轡頭謂之革詩曰鞗革金厄儀禮士纓轡貝勒夫諸侯之鞗革有金厄毛義曰厄烏蠋也士之勒有貝飾則王之革路有龍勒宜矣巾車行人言樊纓禮記左傳皆作繁纓繁纓十有再就九就七就五就之别此左傳所謂游纓昭其數也杜預曰纓在馬膺前如索羣則纓非鞅也樊然為鞅之飾耳杜子春謂故書鵠或為結則前樊結纓者無就而結之爾條則不結則條纓垂而長者也然則錫也鉤也朱也龍勒也玉金象革四路蓋皆有之采芑言方叔之車鉤膺鞗革韓奕言韓侯之車鉤膺鏤錫夫方叔在征則革路矣而有鉤膺釋詩者謂方叔乗金路然金路以封同姓而方叔不必同姓又非就封其於師中宜乗革路韓侯就封則象路矣而有鏤錫是錫不特施於玉路而鉤不特施於金路也以此觀之則禮所謂錫也鉤也朱也龍勒也條也各舉其一互相備也若夫木車則質而已故前樊結纓前樊結纓則結其前而非全結也巾車言五者之飾皆其首面頷膺之著者也故不及腹帶鄭康成以樊為鞶帶之鞶又以龍為尨條為絛前為剪非也纓蓋用組為之與冠纓同五采一匝為就與圭繅冕旒之就同鄭司農以士喪馬纓三就為削革三重康成謂樊纓以五采罽飾之又謂金路無錫有鉤鵠纓就數與革路同殆不然也禮曰丹漆雕㡬之美素車之乗詩曰路車有奭毛氏曰奭赤貌路車之飾皆丹漆矣然禮言玉路以祀又言素車之乗葢王之祀天自國至大次則乗玉路自大次以升壇則乗素車猶之聴祭報以皮弁及祭則服大裘冕也巾車金路以賓同姓以封象路以朝異姓以封革路以即戎以封四衛木路以田以封蕃國言同姓以封而不言以封同姓言異姓以封而不言以封異姓則嫌以賓獨賓同姓以朝獨朝異姓故也然同姓一異姓二以異姓對庶姓則庶姓非異姓也司儀土揖庶姓時揖異姓孔子以南宫縚為異姓則異姓姻也庶姓非姻也以異姓對同姓則庶姓亦異姓而已故巾車金路封同姓象路封異姓禮記於侯牧同姓謂之伯父叔父異姓謂之伯舅叔舅凡此所謂異姓者庶姓預之也同姓亦曰内姓異姓亦曰外姓左傳曰同姓選親外姓選舊宣十二年王行五路先後之儀綴路金路也孔安國曰太路王綴路金先路象次路革木也大路玉路次路木路次路革路先路象路書曰大輅在賓階面綴輅在阼階面先輅在左塾之前次輅在右塾之前禮器曰大路繁纓一就次路繁纓七就郊特牲曰大路繁纓一就先路三就次路五就然則周官馭玉路者謂之大馭則玉路謂之大路獨周為然若夫商之大輅則木路而已春秋傳與荀卿曰大路越席禮器與郊社牲曰大路繁纓一就眀堂位曰大路商路也孔子曰乗殷之輅皆木路也然禮器與郊特牲言大路繁纓一就則同其言次路繁纓五就七就則不同者先王之路降殺以兩反此而加多焉葢亦以兩而已大路一就先路三就則次路有五就七就者矣書言次路以兼革木二路則商之次路五就七就庸豈一車耶鄭氏以七就為誤是過論也夫綴路金路也以其綴於玉路故也先路象路也以其行道之所先故也次路革路木路也以其次於象路故也周官典路若有大祭祀則出路大喪大賓客亦如之凡㑹同軍旅弔于四方以路従盖王之行也乗玉路而先之以象路次之以革路木路而金路綴於玉路之後觀書先路在左塾之前而居西次路在右塾之前而居東春秋之時鄭侯以先路三命之服賜子展以次路再命之服賜子産魯以先路三命之服賜晉三帥以一命之服賜司馬輿師以下則先路固貴於次路矣孔安國亦以先路為象路葢亦有所受之也諸侯有先路後路亦有大路樂記亦曰大路天子之路所以贈諸侯雜記諸侯之賵有乗黄大路相禭以後路與冕服先路與褎衣葢諸侯之大路則金路謂之大路猶熊侯謂之大夫侯春秋傳稱王賜晉文公以大路之服僖二十八年祝鮀言先王分魯衛晉以大路定四年王賜鄭子僑以大路襄十五年王賜叔孫豹以大路襄二十四年杜氏以賜魯衛晉之大路皆金路賜穆叔子僑之大路當是革木二路此不可考禮書卷一百三十五
