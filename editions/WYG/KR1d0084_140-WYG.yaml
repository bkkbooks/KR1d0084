body:
  text: 禮書卷一百四十一宋陳祥道撰輨轄輨或作斡音管説文曰轂耑沓也轄或作牽説文曰車鍵盖輨以冒轂轄以制軸二者皆金為之考工記曰弓長六尺謂之庇軹鄭氏謂六尺之弓加部廣凡丈二尺六寸有宇曲之減可覆軹不及斡軸輈人軸有三理一者以為媺也二者以為乆也三者以為利也無節則媺堅刃則乆滑緻則利其圍一尺三寸五分則五分其軫間以其一為之軸圍是也其長八尺有奇觀轍廣八尺則軸之長可知矣易曰輿脱輹説文曰輹軸縳也輪軔一名泥枝車者也輪人為輪斬三材必以其時轂也者以為利轉也輻也者以為直指也牙也者以為固抱也故察車自輪始欲其樸屬而微至不樸屬無以為完久也不微至無以為戚速也兵車乗車之輪六尺有六寸田車之輪六尺有三寸行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是搏以行石也是故輪雖敝不甐於鑿凡楺牙外不廉而内不㭫旁不腫謂之用火之善是故規之以眡其圜也萬之以眡其匡也縣之以眡其輻之直也水之以眡其平沈之均也量其藪以黍以眡其同也權之以眡其輕重之侔也葢輪之制視馬以為之高下視地以為之厚薄兵車乗車駕國馬田車駕田馬國之輈深四尺有七寸故二車之輪皆六尺有六寸田馬之輈深四尺故田車之輪六尺有三寸行澤者必削其踐也故杼之然後塗不附行山者必等其上下故侔之然後鑿不甐不特此也行澤者欲短轂行山者欲長轂行澤者仄輮行山者反輮其行也有輔傳所謂輔車相依是也詩曰其車既載乃棄爾輔孔穎達曰輔是可脱之物葢如今人縛枚於輻者也其止也有軔説文所謂柅是也轂以火則隂陽齊牙以火則内外旁善輻輪以水則平沉均藪以黍則廣深同可規可萭可水可縣可量可權謂之國工則車所任者在輪而已觀輪扁之斵輪徐而弗甘疾而弗苦得之於手應之於心扁不能以語其子其子不能得之於扁則輪之難其工可知矣萭之以眡其匡鄭氏謂等為萭蔞以運輪上輪中萭蔞則不匡刺賈公彦謂今車近萭蔞於輪之旁置之輪上輪轉一匝不高不下則知其不匡然記言眡其匡非眡其不匡也輿人圜者中規方者中矩立者中縣衡者中水則輪之可規可萭可水可縣亦若是爾萭故書作矩葢有部逹常桯弓衣絃葢柄之材三而部厚一寸達常長二尺桯楹長八尺達常上貫部而下入桯總一丈矣人長八尺而弓有宇曲之咸亦八尺此所以立乗而不蔽目也桯圍倍達常部圍三桯徑六寸而鑿深二寸有半則對深五寸而不傷達常矣部厚一寸鑿廣四枚一分為枚鑿上二枚鑿下四枚則鑿下用力為多而可以固弓矣鑿上二枚鑿下四枚其外也上下俱四枚其内也故下直二枚其内題則漸削矣故鑿端一枚如此則鑿之外廣内狹下正上低而弓勢可得而仰也弓馬六尺二尺近部短而平四尺趨宇長而橈此所謂三分弓長而楺其一也近部者謂之股其圍一寸六分趨宇者謂之爪其圍一寸十五分寸之一此所謂三分其股圍去一以為爪圍也葢弓二十有八所以象星也部杠所以象斗也斗為天之杠轂有衣以冒之有紘以維之弗冒紘横馳壠畮而不隊乃國工也巾車及葬執葢従車持旌道右王下以葢従春秋傳言若敖射楚子汰輈而貫笠轂宣四年杜預曰兵車無葢尊者則一人執笠依轂而立然則兵車固與乗車異矣鄭氏謂乗車無葢禮所謂潦車其葢車歟然既夕禮乗車載旌道車載朝服藁車載簑笠則賤者禦雨之具而已孰謂乗車道車無葢也藁非良車也潦備水潦者也既夕禮藁車或作潦車則自車言之曰藁自其用言之曰潦其實一也藁車散車而已非可以當木路也賈公彦曰藁車於天子當木路誤矣昔齊侯賜敝無存犀軒直葢宣帝賜黄霸車葢特高二尺後漢列侯伏熊軾皂葢則春秋之時固有曲葢漢之時不特皂葢而已弓弓謂之轑輻亦謂之轑轍廣謂之軹轂末亦謂之軓轂下謂之軹輢下亦謂之軹此異物而同名也輿可謂之車亦可謂之軫達常可謂之部軫前横木可謂之輅説文此因物而通名也禮書卷一百四十一
