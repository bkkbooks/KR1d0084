body:
  text: 禮書卷一百三十九宋陳祥道撰車戰之法古者之用兵也險野人為主易野車為主則險野非不用車而主於人易野非不用人而主於車車之於戰動則足以衝突止則足以營衛將卒有所芘兵械衣裘有所齎詩曰君子所依小人所腓則車之為利大矣昔周伐鄭有魚麗之陳先偏後伍伍承彌縫桓八年邲之戰楚君之戎分為二廣廣有一卒卒偏之兩宣十二年楚巫臣使於吳以兩之一卒適吳舍偏兩之一焉成七年考之周禮五伍為兩四兩為卒司馬法二十五人為兩百人為卒卒兩則人也偏則車也杜預以十五乗為大偏九乗為小偏其尤大者又有二十五乗之偏則周魚麗之偏二十五乗之偏也楚二廣之偏十五乗之偏也巫臣所舍之偏九乗之偏也先偏後伍伍従其偏也卒偏之兩兩従其偏也先其車足以當敵後其人足以待變則古者車戰之法略可知也或者謂晉人以什共車必克房琯以車戰取敗遂以為用車不若用人與騎之愈是不知晉人之克非什之利用什之幸也房琯之敗非車之不利用車之罪也古者教民以射御為藝君子以射御為能故孔子曰吾執射乎執御乎詩稱叔段之多才則曰叔善射忌又良御忌古人相率以給御如此則登車而不能御㕘乗而不能射者鮮矣房琯之用車有是人乎不然巫臣教吳以乗車而能取勝於楚何也戎車之制不可以考姑倣小戎以見之輂周禮鄉師大軍旅㑹同正治其徒役與其輂輦鄭氏曰輂駕馬輦挽人行所以載任器止所以為營衛説文曰輂大車駕馬也其轅直輦荀卿曰輦輿就馬則輦在人駕在馬也説文曰輦輓車也従車従㚘在前引之也司馬法曰夏后氏謂輦曰余車二十人而輦商曰胡奴十八人而輦周曰輜輦十五人而輦一斧一斤一鑿一梩一鋤周輦加二板二築孔穎達曰輦謂之輜亦謂之重故晉楚之戰楚重至於邲則重輜重也説文曰輜一名軿前後蔽也葢蔽前後以載物謂之輜車所載者重車所挽以人謂之輦其實一也詩曰我車我輦左傳曰秦堇父輦重如役襄十年左皆輜輦也兵法曰無輜重則亡官渡之戰魏武用許攸之計爇袁紹之輜重而敗之則輜重尤在所慎也故輦以人巾車王后有輦此従容於宮中者也安車安車坐乗老者與婦人所乗者也巾車王后有安車彫面鷖總曲禮大夫七十而致仕若不得謝乗安車書傳曰致仕者以朝乗車輲輪庾蔚曰漢世駕一馬而坐乗然王后之安車四馬而老者之安車葢亦四馬駕一馬而坐乗漢禮然也漢武帝之召枚乘明帝之詔李躬皆以安車後漢輿服志有五安五立而安車輪皆朱班重才二轂兩轄驛車周禮行人掌邦國傳遽之小事爾雅曰驛遽傳也春秋之時楚子乗驛伐庸文十六年晉人以傳召伯宗成五年鄭商人弦高使遽告於鄭僖三十三年皆傳車也郭璞曰傳車驛馬之名奇車曲禮曰國君不乗奇車鄭氏曰奇車獵衣之屬漢之時趙后以軡獵車迎曽孫桓帝禁臣下乗衣車則軡律不衣而曲輿衣車衣之如鼈而長然奇車不特此也鄭氏舉其類而已禮曰車不中度不鬻於市況國君之所乗者乎禮書卷一百三十九
