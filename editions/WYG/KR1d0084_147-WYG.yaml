body:
  text: 禮書卷一百四十八宋陳祥道撰喪期易繫辭曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數書稱堯之殂落百姓如喪考妣三載四海遏密八音而喪服精麤之制於經無見然則有喪無期有期無服皆心喪而已後世漸文故為冠絰衰裳帶屨以飾之於是有斬齊功緦袒免之等三年期九月七月三月之别然後情文稱而恩義立矣葢喪服之制上取象於天下取法於地中取則於人故再期之喪三年期之喪二年九月七月之喪三時五月之喪二時三月之喪一時逺者象閏近者象時則凡在天地之間者有變易矣此喪服所以立中制節也孔子曰子生三年然後免於父母之懐則三年之喪固孝子之所以自盡也宰予欲短之曰舊穀既沒新穀既升鑚燧改火期已久矣而孔子非之則至親不可以期斷也荀卿與三年問皆謂至親以期斷而以三年為加隆如此則是期為喪之盡而三年為禮之加也與孔子之説戾矣禮曰太古冠布齊則緇之鄭氏謂冠即白布冠今喪冠也然則太古之冠吉凶同色其服又可知也衣服升數斬衰正服三升義服三升有半冠六升受衰六升冠七升齊服降服四升正服五升義服六升冠七升受衰七升冠八升大功降服七升正服八升義服九升冠十升受衰十升冠十一升小功降服十升正服十二升義十三升緦麻十五升抽其半小功緦麻冠升同無受舊説斬衰正服三升義服三升有半冠六升受衰六升冠七升齊衰降服衰四升冠七升受衰七升冠八升父為母伸三年服正服衰五升冠八升受衰八升冠九升父在比服期義服衰六升冠九升受衰九升冠十升大功降服衰七升冠十升受衰十升冠十一升正服衰八升冠十升受衰十升冠十一升義服衰九升冠十一升受衰十二升冠十二升小功降服十升冠升同無受正服十一升冠升同無受義服十二升冠升同無受緦麻十五升抽其半十五升千二百縷抽其半六百縷縷之細如麻朝服而數則半之喪服曰有事其縷無事其緦同冠升同無受服有降有正有義而其别有升數其變有有受無受八十一縷為升或言八十縷為宗布簏者升數少細者升數多鄭氏改升為登不必然也大夫已上虞卒哭異月故既虞則受士虞卒哭同月故卒哭即受間傳於喪服斬衰少一等而無三升有半齊衰多二等而有五升六升大功多一等而有七升小功多一等而有十二升葢斬衰三升正服也三升有半義服也齊衰四升降服也五升正服也六升義服也大功七升降服也八升正服也九升義服也小功十升降服也十一升正服也十二升義服也齊衰大功之冠其受也緦麻小功之衰其冠也則大功以上以其冠為受而冠衰升數異小功以下以其衰為冠而衰冠升數同喪服斬衰三升三升有半其冠同六升以其冠為受受冠七升則始喪衰異而冠同及受則冠衰皆同是喪之别尤嚴於衰而衰之别尤嚴於始也由是推之齊衰四升冠七升受冠八升則四升五升六升之衰其冠同七升受則衰同七升冠同八升矣大功八升若九升小功十升若十一升葢大功用小功之衰為冠小功用大功之冠為衰則大功七升八升九升而冠同十升受衰同十升而冠同十一升此喪服重輕之節然也何則喪服斬衰備舉義正齊衰舉上大功舉中下小功舉上中其文錯出互見則斬衰二衰同冠而齊衰大功可知矣斬衰二受同冠衰而齊衰大功又可知矣先儒以齊衰正服而下冠受之説不見於經於是謂正服衰五升冠八升受衰八升義服衰六升冠九升受衰九升冠十升冠大功降服衰七升冠十升受衰十升冠十一升正服衰八升冠十升受衰十升冠十一升義服九升冠十一升受衰十一升冠十二升自大功降服以上之冠去衰常三等受冠去衰常一等大功正服義服之冠去衰二等受冠去衰亦一等其銖銖而第之可謂詳矣然與斬衰之例不同以為不同耶至大功降正又異衰同冠而二受亦同冠衰是其説自惑也考之於經冕弁尊而衣服卑尊者常少卑者常多故王之大裘衮服同冕后之三翟同副弔服三衰同弁絰降義正之三衰同冠乃禮意也服重者冠衰相逺服輕者冠衰相近至輕者冠衰同故斬衰之冠去衰三等齊衰之冠去衰一等小功緦之冠與衰同等此禮之差也斬衰制斬衰先斬布而後製故言斬衰者斬先衰疏衰先製而後緝故言疏衰者衰先齊春秋傳曰斬然在衰絰之中雜記曰三年之喪如斬期之喪如剡則斬者其痛甚剡其哀殺也齊衰不杖章傳曰父母長子妻服斬母不服斬而亦云斬者以其服三年而并言之也喪禮齊衰而下各有降正義之三服斬衰則正義二服而已齊衰月數不斬衰則一於三年而已斬衰皆絞帶菅屨特公卿大夫之衆臣為其君布帶繩屨以其厭於天子諸侯故也曽子曰哭泣之哀齊斬之情饘粥之食孟子曰三年之喪齊疏之服飦粥之食自天子達於庶人三代共之雜記曰端衰喪車無等則父母之服貴賤一也然雜記又曰大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母之為大夫者之喪服如士服春秋之時齊晏桓子卒襄十七年左晏嬰麤縗斬苴絰帶杖菅屨食粥居倚廬寝苫枕草其老曰非丈夫之禮也曰唯卿為大夫鄭氏曰此平仲之謙也言已非大夫故為父服士服耳麤衰斬者其縷齊斬之間謂縷如三升半不緝也斬衰以三升為正微細焉則屬於麤然則士與大夫為父服異者有麤衰斬枕草矣其為母五升縷而四升為兄弟六升縷而五升乎大功已下大夫士服同此葢周衰禮變而齊之服於是有等故大夫以尊而伸服斬衰枕草士以卑而屈服齊衰枕草而已禮記或記先王或記末世其可以末世之事而論先王之時哉鄭氏以此為真先王之禮宜乎王肅之所攻也齊衰制疏者麤也斬衰固麤矣不曰疏者麤不足以言之也竹笄不言惡櫛笄言惡笄與此同意齊衰言麤大功小功言功緦麻言緦則小功漸著而緦又加密矣疏屨亦謂之疏者此猶周禮所謂疏材之疏異乎疏衰之疏也父在為母期父卒為母三年皆疏衰齊則父卒猶以餘尊所厭得伸三年而不得伸斬也若父喪未除而母卒不特餘尊在焉猶服期而不得三年也内則曰女子二十而嫁有故二十三而嫁鄭氏曰故謂父母之喪言二十三而嫁非止一喪也何則二十而服父喪未闋而服母三年則是二十四而嫁矣服父而已再期而大祥則是二十二而嫁矣以是知其父喪未闋猶為母期也子雖為母期猶心喪三年傳曰父必三年而後娶達子之志則子之心喪可知矣晉叔向曰王者三年之喪二謂太子與穆后也王為后期而云三年喪者達子之志也先儒謂父在為母齊衰五升冠八升既虞受衰八升冠九升父卒為母齊衰四升冠七升既虞受衰七升冠八升喪服記曰齊衰四升冠七升間傳亦曰為母既虞受衰七升葢自父卒言之其説是也喪服祥禫月日朞之喪十三月大祥十五月禫而祥禫間月則三年之喪二十五月大祥二十七月禫而祥禫間月可知也聘禮士中曰禽二雙學記中年考校小記中一以上而祔玉藻士中武皆以中為間則士虞間傳所謂中月者其為間月可知也戴徳喪服變除禮二十五月大祥二十七月而禫鄭氏據以為説葢得之矣王肅之徒以記云三年之喪二十五月而畢又云祥而縞是月禫徙月樂祥之日鼓素琴夫子既祥三日而彈琴十日而成笙歌魯人朝祥而暮歌孔子曰踰月則善於是謂二十五月大祥其月為禫二十六月作樂是不知所謂是月樂者所以𤼵下文而不繫於上也語曰子於是日哭則不歌而文無所繫孰謂是月禫云者乃祥月乎果禫在祥月應曰月中而禫不可謂之中月也孟獻子禫縣而不樂然則所謂徙月樂者以備縣也若彈琴瑟笙歌間作而不縣既祥為之可也春秋文公二年冬公子遂如齊納幣僖公之喪至文公二年冬適二十六月左氏曰納幣禮也而公羊議其喪娶則公羊亦以三年之喪二十七月而除與鄭氏之説合矣然則喪大記云禫而從御吉祭而復寢間傳云大祥居復寢間何也孔穎達曰大祥去堊室復殯宫之寢則禫而復寢者復平居之寢也禮書卷一百四十八
