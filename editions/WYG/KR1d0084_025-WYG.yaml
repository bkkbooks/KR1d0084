front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_025-1a, image: WYG0130/WYG0130-0140a.png}
body:
  text: 禮書卷二十五宋陳祥道撰都鄙之制太宰以八則治都鄙都之所居曰鄙都鄙公卿大夫之采邑王子弟所食邑周召毛􅆅畢原之屬在畿内者也以九賦斂財賄四曰家削之賦五曰邦縣之賦六曰邦都之賦家削三百里邦縣四百里邦都五百里以九兩繫邦國之民二曰長以貴得民六曰主以利得民鄭司農曰主謂公卿大夫世世食采不絶民税薄利之𤣥謂利如上思利民之利謂以政教利之正月之吉始和布治于邦國都鄙乃施則于都鄙而建其長立其兩設其伍宰夫掌治法以攷百官府羣都縣鄙之治乘其財用之出入羣都謂采邑也司會掌邦之六典八法八則之貳以逆邦國都鄙官府之治司裘王大射則共虎侯熊侯豹侯諸侯則共熊侯豹侯大夫則共麋侯諸侯謂三公及王子弟封於畿内者卿大夫亦皆有采地焉其将祀其先祖與羣臣射以擇之大司徒辨其邦國都鄙之數制其畿疆而溝樹之設其社稷之壝而樹之田主凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮都鄙王子弟公卿大夫采地其界曰都鄙所居也王制曰天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三此葢夏時采地周未聞矣一易之地家二百畮再易之地家三百畮小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事此謂造都鄙也采地制井田異於鄉遂重立國小司徒為經之立其五溝五涂之界其制似井之字因取名焉井田之法備於一同今止於都者采地食者皆四之一其制三等百里之國凡四都一都之田税入於王五十里之國凡四縣一縣之田税入於王二十五里之國凡四甸一甸之田税入於王封人凡封國設其社稷之壝封其四疆造都邑之封域亦如之載師以家邑之田任稍地以小都之田任縣地以大都之田任畺地縣師掌邦國都鄙稍甸郊里之地域遺人以縣都之委積以待凶荒掌節守邦國者用玉節守都鄙者用角節大宗伯乃頒祀于邦國都家鄉邑典命王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宮室車旗衣服禮儀亦如之大祝頒祭號于邦國都鄙都宗人都謂王子弟所封及公卿所食邑掌都祭祀之禮凡都祭祀致福于國家宗人家謂大夫所食采邑掌家祭祀之禮凡祭祀致福量人營國城郭營后宮量市朝道巷門渠造都邑亦如之掌固凡國都之境有溝樹之固郊亦如之方士掌都家聴其獄訟之辭小行人逹天下之六節都鄙用管節以竹為之朝大夫掌都家之國治平理其來文書於朝者日朝以聴國事故以告其君長國事故天子之事當施於都家者也告其君長使知而行之國有政令則令其朝大夫使以告其都家之吏凡都家之治於國者必因其朝大夫然後聴之惟大事弗因凡都家之治有不及者則誅其朝大夫在軍旅則誅其有司匠人王宫門阿之制五雉宮隅之制七雉城隅之制九雉經涂九軌環涂七軌野涂五軌門阿之制以為都城之制宮隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂王制曰天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸凡天子之縣内百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以禄士以為閒田天子之縣内諸侯禄也選賢置之於位其國禄之如諸侯不得世外諸侯嗣也有功封之使之世爵諸侯世子世國大夫不世爵使以徳爵以功謂縣内及列國諸侯為天子大夫者不世爵而世禄辟賢也諸侯之大夫不世爵禄禮運曰天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫孟子曰天子之卿受地視侯大夫受地視伯元士受地視子男先王之建都鄙以處子弟公卿大夫大者百里其次七十里其下五十里而其外有封疆溝樹之固其内有城郭市朝社稷宗廟之别使之朝夕涖事王朝而退食於家其家不出王城而都鄙乃在三百里以至五百里之内此猶民之㕓里在國而授田在鄉也鄭武公為周司徒其詩曰適子之館兮還予授子之粲兮鄭氏謂還在采邑之都然列職於朝常徃返乎數百里之逺則是在途之日多而在朝之日鮮也鄭氏之説其果然乎采邑謂之都鄙者都以其有邑都也鄙以其在國之鄙也臣之於君猶月之於日月近日則其明缺逺日則其明全臣近君則其勢屈逺君則其勢伸故外諸侯世内諸侯則禄而已外諸侯曰君内諸侯則曰長曰主而已其城制不以宮隅而以門阿其經涂不以環涂而以野涂其鄉不設三而立兩其射侯不射三而射二其守節不以玉而以角其達節不以金而以竹則其邑謂之都鄙宜矣然有社稷臣民其實國也故亦曰縣内之國與内諸侯都鄙三等之制書曰列爵惟五分土惟三畿内之臣其列爵與諸侯異其受地與諸侯同故孟子曰天子之卿受地視侯大夫受地視伯元士受地視子男然周禮上公九命侯伯七命子男五命王之三公八命卿六命其大夫四命而士不言命葢上士三命中士再命下士一命也以八命之公六命之卿其地視九命之公侯以四命之大夫其地視七命之伯以三命之元士其地視五命之子男葢在内者卑其命而禄必視其外則名有所屈而實有所養在外者崇命而禄大異乎内則名有所伸而實有所守也載師士田任近郊之地家邑之田任稍地小都之田任縣地大都之田任畺地此所謂視侯伯子男者也士之受田寡矣而近地為可容故任之於近郊公卿大夫之田多矣非逺地不可故任之於縣畺此周采地之别也鄭氏釋大司徒以王制縣内之數為夏之采地周則未聞釋小司徒又曰采地百里之國凡四都五十里之國凡四縣二十五里凡四甸孔穎逹謂家邑采地各二十五里在三百里内小都各受五十里在四百里内大都各受百里在五百里内既曰周之采地未聞又曰采地二十五里之國凡四甸其言不特異於孟子又自戾也夏商采地之制王制曰天子之田方千里公侯方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸又曰天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以禄士以為閒田天子之元士不與又曰天子之縣内方千里者為方百里者百封方百里者九其餘方百里者九十一又封方七十里者二十一為方百里者十方十里者二十九其餘方百里者八十方十里者七十一又封方五十里者六十三為方百里者十五方十里者七十五其餘方百里者六十四方十里者九十六鄭氏曰畿内大國九者三公之田三為有致仕者副之為六也其餘三待封王之子弟次國二十一者卿之田六亦為有致仕者副之為十二又三為三孤之田其餘六亦以待封王之子弟小國六十三大夫之田二十七亦為有致仕者副之為五十四其餘九亦以待封王之子弟三孤之田不副者以其無職佐公論道耳雖其致仕猶可即而謀焉然則王制言王臣采邑之所視與孟子之説不同其為夏商之法固可知矣鄭氏以王制前所言為商制後所言為夏制不可考也周禮載師宅田任近郊之地家邑小都大都之田乃在三百里至五百里之地以近而狹者禄致仕之臣逺而廣者禄公卿大夫及子弟則是致仕之臣其禄少公卿大夫及子弟其禄多也鄭氏謂三等采邑皆有致仕之田與公卿大夫子弟地相埒恐先王之法不然鄉遂都鄙三等之地上地中地下地大司徒凡造都鄙不易之地家百畮一易之地家二百畮再易之地家三百畮小司徒均六鄉之土地上地家七人中地家六人下地家五人遂人辨野之土地上地夫一廛田百畮萊五十畮餘夫亦如之中地夫一廛田百畮萊百畮餘夫亦如之下地夫一廛田百畮萊二百畮餘夫亦如之大司馬凡令賦以地與民制之上地食者三之二中地食者半下地食者三之一禮記王制上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庻人在官者其禄以是為差孟子曰上農夫食九人上次食八人中食七人中次食六人下食五人爾雅曰田一嵗曰菑二嵗曰新田三嵗曰畬班固曰嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田士工商家受田五口乃當農夫一人此平土可以為法者也若山林藪澤原陵淳鹵之地各以肥磽多少為差然則周禮於都鄙言易不易者地事也於鄉所食者地利也於遂言田萊者地力也都鄙以政為主故以地事言之鄉以人為主故以地利言之遂以地為主故以地力言之司馬之令賦則欲知其地之厚薄食之多寡故亦以地利言之其實一也惟遂人上地有萊五十畮為異於鄉與都鄙以鄉之地狹於遂而都鄙之地又輕於遂故也然周禮上地家七人而王制孟子則上食九人其次八人中地家六人而王制孟子則中食七人其次六人下地家五人而王制孟子下食亦五人者葢先王之於民養之欲其富保之欲其庶故家七人者必授以九人之上地家六人者授以七人之中地下地則以地稱人而已凡欲下地之民生齒之蕃以及中上者而後慊此富而庶之術也小司徒井牧其田野春秋之時楚蒍掩書土田之事井衍沃牧隰皋大率二牧而當一井則三家受六夫之地與不易一易再易之法同也漢趙過教民治田一畮三甽嵗易其處謂之代田與一易再易之意同也觀禹貢之田上上以至下下凡九等蒍掩别楚地自土田以至衍沃亦九等書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃以授子木而周禮所言上中下地三等而已葢總其大致然也鄭氏謂自二人以至於十為九等七六五者為其中如此則是二人三人四人下地之三等也五人六人七人中地之三等也八人九人十人上地之三等也孟子王制舉上中地而不及下周禮舉中地而不及上下然周禮言上地中地下地而孟子王制或言上次下次或言上中下是九等之地在其中矣孰謂各舉其偏哉遂人三等之田萊大司馬三等之軍賦其言上中下地與司徒三等之地同禮書卷二十五
