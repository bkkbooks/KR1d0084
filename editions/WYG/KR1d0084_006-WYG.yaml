body:
  text: 禮書卷六宋陳祥道撰皮弁縫中貫玉以為飾其衣用布十五升而裳素積司服眡朝則皮弁服視朝視内外朝之事皮弁之服十五升白布衣積素以為裳王受諸侯朝覲於廟則衮冕弁師王之皮弁會五采玉璂象邸玉笄故書會作䯤鄭司農云讀如馬會之會謂以五采束髪也𤣥謂會讀如大會之會會縫中也璂讀如薄借綦之綦綦結也皮弁之縫中每貫結五采玉十二以為飾謂之綦詩云會弁如星又曰其弁伊綦是也邸下柢也以象骨為之諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令韋弁皮弁則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉三采掌皮掌秋歛皮冬歛革春獻之遂以式法頒皮革于百工士冠禮皮弁服素積緇帶素韠此為君視朔之服也皮弁者以白鹿皮為冠象上古也積猶辟也以素為裳辟蹙其要中皮弁之衣用布亦十五升其色象焉皮弁笄爵弁笄緇組紘纁邊同箧賔受皮弁右執項左執前進周弁殷冔夏收弁名出於槃大也言所以自光大也三王共皮弁素積質不變聘禮賔皮弁聘服皮弁者朝聘主相尊敬也諸侯視朝皮弁服公側受宰玉裼降立玉藻曰裘之裼也見美也又曰麛裘青豻褎絞衣以裼之論語曰素衣麛裘皮弁時或素衣其裘同可知也君使卿韋弁歸饔餼五牢變皮弁服韋弁敬也韋弁韎韋之弁兵服也而服之者皮弁同類取相近耳其服葢韎布以為衣而素裳君使卿皮弁還玉于館玉圭也君子於玉比徳焉以之聘重徳也還之者徳不可取於人相切厲之義也覲禮至於郊王使人皮弁用璧勞侯氏亦皮弁迎于帷門之外再拜士喪禮陳襲事于房中爵弁服純衣皮弁服詩淇澳曰㑹弁如星皮弁所以會髮箋云㑹謂弁之縫中飾之以玉皪皪而處狀似星也天子之朝服皮弁以日視朝鳲鳩其弁伊騏箋云騏當作􅋒以玉為之頍弁有頍者弁實維伊何箋云禮天子諸侯朝服以宴天子之朝皮弁以日視朝賔之初筵側弁之俄屢舞傞傞禮記檀弓周人弁而塟商人冔而塟曽子問諸侯相見皮弁禮運冕弁兵革蔵於私家非禮也郊特牲祭之日王皮弁以聽祭報示民嚴上也皮弁素服而祭素服以送終也玉藻天子皮弁以日視朝遂以食三王共皮弁素積諸侯皮弁以聽朔於太廟皮弁下天子也君衣狐白裘錦衣以裼之天子狐白之上衣皮弁服與明堂位朱干玉戚冕而舞大武皮弁素積裼而舞大夏小記諸侯弔必皮弁錫衰學記大學始教皮弁祭菜示敬道也皮弁天子之朝服也祭菜禮先聖先師雜記大夫卜宅與塟曰有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮弁有司占人也麻衣白布深衣而著衰焉及布帶緇布冠此服非純吉亦非純凶皮弁則純吉之尤者也子羔之襲也皮弁一爵弁一孔子曰尸弁冕而出卿大夫士皆下之祭義君皮弁素積朔月月半君廵牲古者天子諸侯必有公桑蠶室大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入于蠶室書曰王與大夫盡弁以啓金縢之書四人綦弁執戈上刃夾兩階戺綦文鹿子皮弁亦士後漢輿服志委貌冠皮弁冠同制長七寸髙四寸制如覆柸前髙廣後卑鋭所謂夏之母追商之章甫者也委貌以皁絹為之皮弁以鹿皮為之行大射禮於辟雍公卿諸侯大夫行禮者冠委貌衣𤣥端素裳執事者冠皮弁衣緇麻衣皁領袖下素裳所謂皮弁素積者周禮弁師王之皮弁㑹五采玉璂象邸玉笄諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之儀禮士冠爵弁服纁裳純衣緇帶皮弁笄爵弁笄緇組紘纁邊同篋賓受皮弁右執項左執前鄭康成曰皮弁者以白鹿皮為之葢皮弁存毛順物性而制之文質具焉韋弁去毛違物性而又染之文而已凡在下者為是基可以託宿者為邸玉璂則縫中貫玉而施於下者也象邸則下柢用象而託以皮者也爾雅邸謂之柢賈公彦曰邸下柢也謂於弁内項上以象骨為柢然謂之柢不特施於項上魏䑓訪議曰邸以象骨周縁弁下根柢然則魏武所作弁抵或古之遺制歟諸侯及孤卿大夫之韋弁皮弁各以其等為之鄭康成曰侯伯璂飾七子男璂飾五玉亦三采孤璂飾四三命之卿璂飾三再命大夫璂飾二玉亦二采於理或然推此則公之玉九天子之五十有二又可知也詩曰㑹弁如星言其玉也説文引詩䯤弁如星謂骨擿之可會髮者此不可據又曰其弁伊騏書曰綦弁執戈言其文也毛氏曰騏文也孔安國曰綦文鹿子皮説文綦蒼艾色葢綦者隂陽之雜故禮以綦組纓為士之齋冠綦組綬為世子佩詩以綦巾為女巾皆其未成徳者之服也則士弁以綦宜矣弁師言卿大夫之冕弁各以其等為之則士弁無玉飾康成讀玉璂為綦以綦為結是臆説也記曰三王共皮弁素積語曰素衣麑裘則素衣其衣也素積其裳也士冠禮皮弁素積緇帶禮記雜帶君朱綠大夫𤣥華士緇辟則士之皮弁緇帶與君大夫皮弁之帶異矣士冠禮皮弁笄爵弁笄緇組紘纁邊弁師王朱紘禮記天子朱紘諸侯青紘則士皮弁緇組紘與天子諸侯皮弁之紘亦異矣葢皮弁天子以視朝以宴詩曰側弁之俄以聽祭報以舞大夏諸侯以聽朔以巡牲以卜夫人世婦以迎王之郊勞以待聘賔卿大夫以王命勞侯氏以聘於鄰國以卜宅士以冠學士以釋菜凡大夫士之朔月皆皮弁服則皮弁之所施者衆矣葢人為者多變自然者不易皮弁因其自然而已此所以三王共皮弁素積而周天子至士共用之也然喪服小記諸侯弔必皮弁錫衰郊特牲大蜡皮弁素服葛帶榛杖以送終則弁雖與吉禮同而服與吉服不同韋弁爵弁鄭云冕之次也其色赤而微黒如爵頭然用三十升布為之亦長尺六寸廣八寸前圓後方無旒而前後平周禮司服凡兵事韋弁服韋弁以韎韋為弁又以為衣裳春秋傳曰晉郤至衣韎韋之跗注是也今時五伯緹衣古兵服之遺色弁師諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令韋弁皮弁則諸侯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采聘禮君使卿韋弁歸饔餼變皮弁服韋弁敬也其服葢韎布以為衣而素裳夕夫人使下大夫韋弁歸禮荀子曰士韋弁士冠禮爵弁服纁裳純衣緇帶韎韐此君與祭之服雜記曰士弁而祭於公爵弁者冕之次其色赤而微黒如爵頭然或謂之緅其布三十升皮弁笄爵弁笄緇組紘纁邊同箧爵弁皮弁緇布冠各一匴昏禮主人爵弁纁裳緇袘書曰二人雀弁執惠立于畢門之内爵韋弁禮記檀弓天子之哭諸侯也爵弁絰䊷衣雜記大夫冕而祭於公弁而祭於已士弁而祭於公冠而祭於已弁爵弁也冠𤣥冠也祭於公助君祭也大夫爵弁而祭于已唯孤爾士弁而親迎然則士弁而祭於已可也子羔之襲也皮弁一爵弁一公襲爵弁二成廟則釁之其禮祝宗人宰夫雍人皆爵弁純衣喪大記復士以爵弁後漢輿服志爵弁一名冕廣八寸長尺二寸如爵形前小後大繒其上似爵頭色有收特笄所謂夏收商冔者也弁師諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之司服凡兵事韋弁服聘禮君使卿韋弁歸饔餼鄭氏釋周禮謂以韎韋為衣裳春秋傳曰晉郤至衣韎韋之跗注是也釋聘禮謂韎布以為衣而素裳既曰韎韋為衣又曰韎布為衣既曰韎韋為裳又曰素裳葢以軍國之容不同故也然賈服之徒謂韎韋之跗注者袴屬於足跗也袴屬於足跗則非衣也詩於兵服曰制彼裳衣與子同袍與子同裳載是常服春秋傳曰袀服振振則兵事上下同服矣詳不可知也或曰周禮有韋弁無爵弁書與冠禮禮記有爵弁無韋弁士之服止於爵弁而荀卿曰士韋弁孔安國曰雀韋弁也劉熙釋名亦曰以爵韋為之謂之韋弁則爵弁即韋弁耳觀弁師司服韋弁先於皮弁書雀弁先於綦弁孔安國曰綦弁皮弁也士冠禮次加皮弁三加爵弁而以爵弁為尊聘禮主卿贊禮服皮弁及歸饔餼服韋弁而以韋為敬則皮弁之上非韋弁則爵弁耳此所以疑其為一物也爵弁士之祭服而王服之者王哭諸侯服爵弁而即戎服之弁士冠禮爵弁服纁裳純衣緇帶昏禮主人爵弁纁裳緇袘檀弓天子哭諸侯爵弁䊷衣書二人雀弁執惠立于畢門之内雜記復諸侯以褎衣冕服爵弁服子羔之襲皮弁一爵弁一𤣥冕一釁廟祝宗人宰夫雍人皆爵弁純衣則爵弁雖士之祭服而天子諸侯大夫皆服之鄭氏謂爵弁冕之次制如冕但無繅耳其布三十升然古文弁象形則其制上鋭若合手然非如冕也韋其質也爵其色也其笄紘玉飾各以其等為之如皮弁制鄭氏釋士冠禮謂爵弁赤而微黒如爵頭然則赤多黒少矣釋巾車又曰雀飾黒多赤少然雀之色固赤多而黒少鄭氏為之二説是自惑也其言韋弁赤亦無據裳裳有纁有素黃有𤣥有雜纁裳緇袘明衣之裳縓縁其餘推此可知易曰黃帝堯舜垂衣裳而天下治葢取諸乾坤詩綠衣曰綠衣黃裳終南曰君子至止黻衣繡裳七月曰八月載績載𤣥載黃我朱孔陽為公子裳祭服𤣥衣纁裳九罭曰我覯之子衮衣繡裳東山曰制彼裳衣勿士行枚裳衣兵服也曲禮童子不衣裘裳大夫士去國素衣素裳玉藻曰衣正色裳間色特牲曰三王共皮弁素積以素為裳辟蹙其要中書曰王麻冕黼裳卿士邦君麻冕蟻裳太保太史太宗皆麻冕彤裳蟻色𤣥彤纁也士冠禮主人𤣥冠朝服𤣥冠委貌也朝服者十五升布衣而素裳也衣不言色者與冠同也爵弁服纁裳純衣皮弁服素積𤣥端𤣥裳黃裳雜裳可也𤣥端即朝服之衣易其裳耳上士𤣥裳中士黃裳下士雜裳者前𤣥後黃易曰夫𤣥黃者天地之雜也天𤣥而地黄昏禮主人爵弁纁裳緇袘袘縁也特牲饋食禮及筮日主人冠端𤣥特牲記其服皆朝服𤣥冠緇帶緇韠唯尸祝佐食𤣥端𤣥裳黃裳雜裳可也皆爵韠喪服凡衰外削幅裳内削幅幅三袧袧者謂辟兩側空中央也祭服朝服辟積無數凡裳前三幅後四幅也若齊裳内衰外齊緝也凡五服之衰一斬四緝緝裳者内展之緝衰者外展之爾雅曰裳削幅謂之襆削殺其幅深衣之裳明衣裳見明衣門深衣裳見深衣門深衣之裳十有二幅短母見膚長母被土喪服裳内削幅幅三袧士喪記明衣有前後裳不辟長及觳鄭氏曰袧者辟兩側空中央也祭服朝服辟積無數凡裳前三幅後四幅賈公彦曰前為陽後為隂前三後四象隂陽也然則明衣裳不辟喪裳三袧則吉裳不特三袧而已明衣長及觳則凡裳不特及觳而已明衣有前後裳則凡裳前三後四以象隂陽可知也明衣裳縓綼緆緇純士昏禮爵弁纁裳緇袘曲禮素衣素裳素冠徹縁則凡裳有縁可知也玉藻曰衣正色裳間色然冕服𤣥衣纁裳皮弁服素衣素裳諸侯朝服緇衣素裳士爵弁服緇衣纁裳𤣥端服有𤣥裳黃裳雜裳𤣥端服惟三裳而已士昏禮使者𤣥端鄭氏曰有司緇裳無據深衣長衣裳之色同三翟三衣亦衣裳之色同緇衣非正色也黃素之裳非間色也葢衣之𤣥緇所以象天道裳之黃所以象地徳素隂之正也亦可以為裳纁陽之間也不可以為衣是衣之色常尊裳之色常卑非必衣色皆正裳色皆間也記且云爾者豈非以𤣥為天之正色纁非地之正色乎書言王麻冕黼裳卿士邦君皆麻冕蟻裳太保太史太宗皆麻冕彤裳孔安國曰蟻裳𤣥彤裳纁詩曰毳衣如璊又曰載𤣥載黃我朱孔陽為公子裳葢裳以纁為主纁赤黃色以土無正位必託於火故也若夫𤣥裳素裳之類各象其事而服之孔頴達曰書之卿士邦君非執事者也故𤣥裳太保太史太宗執事者也故彤裳其説是也爾雅曰裳削幅謂之襆郭氏曰削殺其幅深衣之裳然喪服裳亦削幅其不削幅者帷裳而已孔子曰非帷裳必殺之詩曰斬車帷裳雜記曰緇布裳帷則車與捾之飾音曰帷裳孰謂深衣之裳乃削幅耶禮書卷六
