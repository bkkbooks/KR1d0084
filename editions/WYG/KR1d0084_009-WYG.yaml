  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_009-1a, image: WYG0130/WYG0130-0055c.png}
body:
  text: 禮書卷九宋陳祥道撰天子始冠之冠𤣥冠朱組纓諸侯始冠之冠緇布冠續緌玉藻曰𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也鄭氏曰皆始冠之冠考之於禮始冠緇布冠自諸侯下達則諸侯所以異於大夫士者繢緌耳天子始冠不以緇布而以𤣥冠然其子則猶士而已以天下無生而貴也唐志天子始冠緇布冠五梁非古也𤣥冠朱組纓則緌可知也緇布冠繢緌則纓可知也朱以著正陽之色繢以備五采之文五采雖美不若正陽之純純其飾所以異也國語委貌有笄士冠禮緇布冠無笄則天子始冠之冠有笄諸侯始冠之冠無笄明矣家語大戴禮公冠四加𤣥冕賈公彦謂天子宜五加衮冕觀成王加元服其頌曰去㓜志心衮職則五加衮冕可知諸侯齊冠𤣥冠丹組纓士齊冠𤣥冠綦組纓綦蒼艾色周官司服其齊服有𤣥端素端記曰太古冠布齊則緇之又曰齊之𤣥也以隂幽思也又曰齊𤣥而養又曰𤣥冕齊戒鬼神隂陽也又曰𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也荀卿曰端衣𤣥裳絻而乘路者志不在於食葷葢太古之齊冠以緇周之齊冠以𤣥天子齊則𤣥冕而端𤣥所謂絻而乘路是也諸侯而下𤣥冠𤣥端而巳所謂𤣥冠丹組纓𤣥冠綦組纓是也然則諸侯與士之齊則同而尊卑之分則異同故皆𤣥冠以一其誠異故組纓朱色以辨其等諸侯丹組纓則陽而已以其純於徳故也士綦組纓則隂陽雜矣以其不純於徳故也說文綦作綥綦蒼艾色也詩以綦巾為女巾書與詩以騏弁為士弁禮以綦組為世子之佩綬皆徳未成者之禮也孔子佩象環而綦組纓綬則其義異此矣天子諸侯大夫齊祭異服特天子𤣥冕以祭羣小祀其冕葢與齊同而其異者𤣥服𤣥端而已士之齊祭一於冠端𤣥其冠葢與朝服之冠同其異者組纓之色而已然則武王端冕以奉丹書則天子齋而端冕信矣諸侯昏禮𤣥冕齊戒魏文侯端冕聽古樂則昏以𤣥冕攝盛也魏文侯之端冕非攝盛則僣也鄭康成釋旅賁謂㑹同賓容王亦齊服服衮釋冕司服以齊服𤣥端為士禮此說非是子姓冠縞冠𤣥武其制厭國語言帥其子姓及國子姓詩言振振公姓喪大記言子姓立于西方玉藻言縞冠𤣥武子姓之冠葢孫之傳姓謂之子姓子姓之於大父母服綦而已縞冠𤣥武以父之喪未終而子不敢純吉故也以縞為之則無緌可知既祥冠縞冠素紕其制厭無緌玉藻曰縞冠素紕既祥之冠也喪服小記曰除成䘮者其祭也朝服縞冠雜記曰祥主人之除也於夕為期朝服又曰既祥雖不當縞者必縞然後反服問傳曰大祥素縞麻衣則是大祥之祭縞冠朝服而有嚮於吉既祥則素縞麻衣而未忘乎哀則祥與既祥之冠同而其服異禮書卷九
