  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_090-1a, image: WYG0130/WYG0130-0567a.png}
body:
  text: 禮書卷九十一宋陳祥道撰表貉詩曰是類是禡爾雅曰類禡師祭也禮記禡於所征之地公羊曰甲午祠兵小宗伯凡王之㑹同軍旅甸役之禱祠肄儀為位肆師凡四時之大田獵祭表貉則為位貉讀為十百之百於所立表之處為師祭造軍法者禱氣勢之増倍也其師葢蚩尤或曰黄帝甸祝掌四時之田表貉之祝號大司馬中春教振旅有司表貉誓民鼓遂圍禁中冬教大閲既陳乃設驅逆之車有司表貉于陳前漢書稱髙祖祠黄帝蚩尤於沛庭先儒或以蚩尤為天子或以為庶人其詳不可以考然管仲稱蚩尤作劔㦸史記稱黄帝與蚩尤戰於版泉葢軍法之興始於此也故後世祭之周官言貉詩與禮記爾雅言禡其實一也貉之祭葢使有司為之而立表於陳前肆師為位甸祝掌祝號既事然後誓衆而師田焉周官所謂表禡誓民是也古者將射則祭侯將卜則祭先卜將用火則祭爟將用馬則祭馬祖然則將師田而貉祭者不特為禱而已也唐制禡祭為壇壝設瘞塪皇帝齋於行宫從官齋於軍幕置甲胄弓矢於神座之側建矟於神座之後而牲幣犧象皆有儀度然古人祭於立表之處則無壇壝其置甲胄弓矢於神座之側建矟於神座之後理或有之司几筵甸役則設熊席右漆几鄭氏以為祭貉之禮誤也四望書曰望于山川至于岱宗柴望秩于山川又曰柴望大告武成詩曰時邁巡狩告祭柴望禮記曰至于岱宗柴而望祀山川周禮小宗伯祀五帝于四郊四望四類亦如之大宗伯國有大故則旅上帝及四望典瑞兩圭有邸以祀地旅四望璋邸射以祀山川司服毳冕以祀四望山川大司樂奏姑洗歌南吕舞大磬以祀四望奏㽔賔歌函鍾舞大夏以祭山川男巫掌望祀望衍旁招以茅牧人望祀各以其方之色牲毛之大祝國將有祀于四望則前祝春秋魯僖公免牲猶三望左氏曰望郊之細也宣公不郊而望左氏曰望郊之屬也公羊曰天子有方望之事無所不通三望者何泰山河海也楚昭王曰三代命祀祭不越望哀公六年江漢睢漳楚之望也禍福之至不過是也寡人雖不敏河非所獲罪也韓宣子謂子産曰寡君寢疾並走羣望昭七年周共王有寵子五人無適立焉乃有大事于羣望昭七年晉語成王盟諸侯于岐陽楚為荆蠻置茆蕝設望表與鮮卑守燎三正記郊後必有望天子四望達於四方魯三望泰山河海而已書曰海岱及淮為徐州諸侯之望皆其境内之名山大川也望雖以名山大川為主而其實兼上下之神故詩於柴望言懷柔百神及河喬嶽周禮於望皆言祀而不言祭又典瑞四望與山川異玉大司樂四望與山川異樂左氏曰望郊之細也又曰望郊之屬也公羊曰方望之事無所不通則望兼上下之神可知矣鄭司農釋大宗伯曰四望日月星海杜預釋左傳曰望祀分野之星及封内山川許慎曰四望日月星辰河海大山其説葢有所受之也鄭康成釋大宗伯曰四望五嶽四瀆釋大司樂又兼之以司中司命風師雨師釋舞師又以四望為四方其言異同不可考也望之禮有二而其用不一男巫掌望祀望衍鄭氏讀衍為延謂望祀有牲與粢盛望衍用幣致神而已然鄭氏於大祝衍祭亦以為延祭禮文殘缺不可考也望祀或設於郊天之後或設於巡狩之方或旅於大故之時則望有常有不常之祀也崔靈恩謂四望之祭嵗各有四不知何據然也望祀其兆四郊其牲各放其方之色其樂姑洗南吕大㲈其玉兩圭有邸其服毳冕其位茆以辨之而植表於其中周禮所謂旁招以茆晉語所謂置茆蕝設表望是也白虎通謂周公祭泰山以召公為尸其言雖無經見要之宗廟之尸用同姓非宗廟之尸用異姓祭四方周禮大司馬春祭社秋祀祊舞師教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀詩曰以我犧羊以社以方又曰方社不暮古者言社必及方則社為民祈方為民報祈在春報在秋詩言來方禋祀明堂位言春社秋省則秋省歛而因祀焉此所謂來方禋祀也鄭康成釋曲禮謂四方五官之神東勾芒南祝融與黎西蓐收北𤣥㝠釋舞師謂四方四望也康成從先鄭之説釋大宗伯謂四方百物八蜡也然鬯人四方在山川之下大司樂四望在山川之上則四方非四望也舞師教羽舞帥而舞四方之祭祀鼓人凡祭祀百物之神鼓兵帗舞者則四方非百物也五官之説亦不可考大司馬於社言祭則地示也於礿烝言享則人鬼也於方言祀葢兼上下之神也祀之之禮其位四郊其鬯蜃尊鬯人凡山川四方用蜃其舞皇舞舞師教羽舞帥而舞四方之祭祀其牲體則疈之其牲色則各以其方之色而已詩曰以我犧羊以社以方周禮小司徒小祭祀共牛牲則四方之祭不特用羊而已詩言犧羊者孔穎達言犧以見純明非特羊也穎達之言則是謂犧為純誤矣禮書卷九十一
