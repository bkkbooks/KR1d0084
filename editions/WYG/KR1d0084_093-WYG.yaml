body:
  text: 禮書卷九十四宋陳祥道撰釋奠室中行禮王制出征執有罪反釋奠于學以訊馘告釋菜奠幣禮先師也文王世子凡學春官釋奠于其先師秋冬亦如之不言夏夏從春可知也釋奠者設薦饌酒奠而已無迎師以下之事凡始立學者必釋奠于先聖先師及行事必以幣凡釋奠者必有合也有國故則否合者當與鄰國合也凡大合樂必遂養老大合學為春入學舍采合舞秋頒學合聲於是時也天子則視學焉遂養老者謂用其明日也始立學者既興器用幣興當為釁然後釋菜菜芹藻之屬不舞不授器釋菜禮輕也釋奠則舞舞則授器司馬之屬司兵司戈司盾祭祀授舞者兵也乃退儐于東序一獻無介語可也釋菜于虞庠則儐賔于東序天子視學大昕鼓徵乃命有司行事興秩節祭先師先聖焉有司卒事反命始之養也適東序釋奠于先老周禮凡有道有徳者使教焉死則以為樂祖祭於瞽宗大祝大㑹同造于廟宜于社過大山川則用事焉反行舍奠曽子問曰凡告必用制幣反亦如之甸祝舍奠于祖廟襧亦如之賈出彦曰非時而祭曰奠以其不立尸奠之為言停停饌具而已聘禮賔朝服釋幣于襧又釋幣于行遂受命上介釋幣亦如之釋幣于門乃至于禰筵几于室薦脯醢觴酒陳主人酌進奠一獻言陳者將復有次也先薦後酌祭禮也行釋幣反釋奠略出謹入也席于阼薦脯醢三獻魏齊王釋奠于辟雍以太牢祠孔子以顔回配宋文帝時釋奠裴松之議應舞六佾宜設軒懸之樂牲牢器幣悉依上公齊武帝時喻希議用宋元嘉故事北齊將講於天子講畢以一太牢釋奠孔子配以顔回列軒懸樂六佾春秋二仲嘗行其禮毎月朔祭酒領博士以下及國子諸學生以上太學四門博士升堂助教以下太學諸生階下拜孔聖揖顔回日出行事其郡學立孔顔廟博士以下亦毎月朝隋制國子寺毎嵗四仲月上丁釋奠于先聖先師唐武徳中國子學立周公孔子廟各一所四時致祭初以博士為祭主許敬宗奏曰晉宋以降時有親行而學官為主今請國學釋奠令國子祭酒為初獻祠稱皇帝謹遣司業亞獻博士終獻州學刺史初獻上佐亞獻博士終獻縣學令初獻丞亞獻主簿及尉通為終獻貞觀中太宗幸國子學觀釋奠永崇二年皇太子親行釋奠之禮開元十一年春秋釋奠用牲牢其屬縣用酒脯而已後釋奠文宣王始用宫縣之樂後勅文宣王廟春秋釋奠宜令攝三公行禮劉瑗奏准故事釋奠之日羣官道俗等皆合赴監觀禮奠者陳而奠之也鄭氏曰釋奠者設薦饌酌奠而已無迎尸以下事賈公彦曰奠之為言停停饌具而已考之儀禮聘賔歸至于禰薦脯醢觴酒陳陳者所以奠之也則釋奠設薦饌酌奠而已可知也特牲饋食奠觶於尸未至之前則釋奠無迎尸可知也古者釋奠或施於山川或施於廟社或施於學周官大祝大㑹同造于廟宜于社過大山川則用事焉反行舍奠甸祝舍奠于祖廟禰亦如之此施於山川廟社者也大司樂凡有道者有徳者使教焉死則以為樂祖祭於瞽宗文王世子凡學春官釋奠于先師秋冬亦如之凡始立學者必釋奠于先聖先師及行事必以幣凡釋奠者必有合也天子視學大昕鼓徵乃命有司行事興秩節祭先聖先師焉有司卒事反命適東序釋奠于先老王制出征執有罪反釋奠于學以訊馘告此施於學者也山川廟社之祭不止於釋奠學之祭釋奠而已賈公彦曰非時而祭曰奠此為山川廟社而言之也學之釋奠則有常時者有非時者文王世子凡學春官釋奠于先聖先師秋冬亦如之鄭氏曰不言夏夏從春可知此常時之釋奠也凡始立學天子視學出征執有罪反以訊馘告必釋奠焉此非時之釋奠也釋奠之禮有牲幣有合樂有獻酬大祝造于廟宜于社過大山川則用事反則釋奠此告祭也曾子問曰凡告必用牲幣文王世子凡始立學釋奠行事必以幣此釋奠有牲幣之證也文王世子凡釋奠者必有合也此釋奠有合樂之證也聘禮觴酒陳席于阼薦脯醢三獻一人舉爵獻從者行酬乃出此釋奠有獻酬之證也然山川廟社之釋奠皆有牲幣學之釋奠非始立學則不必有幣也學之釋奠有合樂則山川廟社不必有合也聘賔釋奠有三獻則天子諸侯之於山川廟社不止三獻也凡始立學與天子視學釋奠于先聖先師四時則釋奠先師而已文王世子謂春釋奠于先師鄭氏釋王制亦謂釋奠禮先師其説是也然鄭氏以王制之釋奠謂釋菜奠幣以文王世子之釋奠者必有合為與鄭國合孔頴達以學記之釋菜為釋奠其説誤也釋菜周禮大胥春入學舍菜合舞鄭司農云古者士見於君以雉為摰見於師以菜為摰菜直為蔬食菜羮之菜鄭康成云舍即䆁也始入學必舍菜禮先師也菜蘋藻之屬占夢季冬乃舍萌于四方以贈惡夢舍萌猶釋菜也儀禮士婚禮若舅姑既沒則婦入三月乃奠菜以篚祭菜葢用堇席于廟奥東靣右几席于北方南靣祝盥婦盥于門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜于皇舅某子婦拜扱地坐奠菜于几東席上還又拜如初婦降堂取笲菜入祝曰某氏來婦敢告于皇姑某氏奠菜于席如初禮婦出祝闔牖户詩采蘩曰于以采蘩于沼于沚于以用之公侯之事于以采蘩南澗之中于以用之公侯之宫采蘋于以采蘋南澗之濵于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釡于以奠之宗室牖下左傳苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汚行潦之水可薦於鬼神可羞於王公禮記月令仲春上丁命樂正習舞釋菜文王世子始立學者既興器用幣興當為釁然後釋菜不舞不授器乃退儐于東序一獻無介語可也學記皮弁祭菜示敬道也喪大記大夫既殯而君徃焉巫止于門外祝代之先君釋菜于門内周禮大胥春入學舍菜合舞學記皮弁祭菜示敬道也月令仲春上丁命樂正習舞釋菜文王世子始立學者既興器用幣然後釋菜不舞不授器乃退儐于東序一獻無介語可也然則釋菜之禮猶摰也婦見舅姑其摰也棗栗腶修若没而廟見則釋菜弟子見師其摰也束修若禮于先師則釋菜大胥舍菜合舞而文王世子釋菜不舞不授器者以釋奠既舞故也士喪禮君視歛釋菜入門喪大記大夫士既殯而君往焉釋菜于門内占夢季冬乃舍萌于四方舍萌釋菜也則釋菜之禮豈特子弟之見先師婦之廟見而已哉婚禮奠菜席于廟奥東面右几席于北方南靣祝盥婦盥于門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜于皇舅某子婦拜扱地坐奠菜于几東席上還又拜如初婦降堂取笲菜入祝曰某氏來婦敢告于皇姑某氏奠菜于席如初禮記曰笲緇被纁裏加于橋葢婦菜盛以笲笲飾以緇被纁裏加之于橋橋設于門外婦盥執笲以入坐奠于東几上然則弟子之見先師其儀葢此類歟鄭氏謂婚禮奠菜葢用堇入學釋奠蘋藻之屬始立學釋菜芹藻之屬葢以泮宫有芹藻子事父母有堇荁故有是説也菜之為摰則菜而已采蘋教成之祭毛氏謂牲用魚芼之用蘋藻則詩所謂湘之者芼之也與釋菜異矣五祀春祀戸夏祀竈季夏祀中霤秋祀門冬祀井禮記曲禮天子祭天地祭四方祭山川祭五祀嵗徧諸侯方祀祭山川祭五祀嵗徧大夫祭五祀嵗徧士祭其先五祀戸竈中霤門行也此葢殷時祭也祭法曰天子立七祀諸侯立五祀大夫立三祀士立二祀謂周制也王制大夫祭五祀五祀謂司命也中霤也門也行也厲也此祭謂大夫有地者其無地祭三耳月令孟春其祀戸祭先脾春陽氣出祀之於户内陽也祀之先祭脾者春為陽中於藏直脾脾為尊凡祭五祀於廟用特牲有主有尸皆先設席于奥祀戸之禮南靣設主於戸内之西乃制脾及腎為爼奠于主北又設盛于爼西祭黍稷祭肉祭醴此三祭肉脾一腎再既祭徹之更陳鼎爼設饌于筵前迎尸略如祭宗廟之儀孟夏其祀竈祭先肺夏陽氣盛熱於外祀之於竈從熱類也祀之先祭肺者陽位在上肺為尊也竈在廟門外之東祀竈之禮先席於門亦既祭徹之更陳鼎爼設饌於筵前迎尸如祀户之禮中央土其祀中霤祭先心中霤猶中室也土主中央而神在室古者複宂是以名室為霤云祀之先祭心者五臟之次心次肺至此心為尊也祀中霤之禮設主牖下乃制心又肺肝為爼其祭肉心肺肝各一他皆如祀户之禮孟秋其祀門祭先肝秋隂氣出祀之於門外陰也祀之先祭肝者秋為隂中於藏直肝肝為尊也祀門之僼北靣設主于門左樞乃制肝及肺心為爼奠於主南又設盛于爼東其他皆如祭竈之禮孟冬其祀行祭先腎冬陰氣盛寒于水祀之于行從辟除之類也祀之先祭腎者陰位在下腎亦在下腎為尊也在廟門外之西為較壤厚二寸廣五尺輪四尺祀行之禮北靣設主于軷上乃制腎及脾為爼奠于主南又設盛于爼東祭肉腎一脾再其他皆如祀門之禮是月也天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀五祀門戸中霤竈行也或言祈年或言大割或言臘互文曾子問曰君薨而世子生太宰命祝史以名徧告于五祀山川天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啓至于反哭五祀之祭不行已葬而祭祝畢獻而已既𦵏彌吉畢獻祝而後止郊社亦然惟當禘宗廟俟吉也禮運曰降于五祀之謂制度又曰禮行五祀正法則也家主中霤國主社郊特牲云三獻文謂社稷五祀也祭法曰王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戸曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立戸或立竈此非大神所祈報大事者也小神居人之間司察小過作譴告者爾樂記明則有禮樂幽則有鬼神鬼神謂此與司命主督察三命中霤主室堂居處門戸主出入行主道路行作厲主殺罰竈主飲食之事明堂月令春曰其祀戸祭先脾夏曰其祀竈祭先肺中央曰其祀中霤祭先心秋曰其祀門祭先肝冬曰其祀行祭先腎聘禮曰使者出釋幣于行歸釋幣于門士喪禮曰疾病禱于五祀司命與厲其時不著今時民家或春秋祠司命行神山神門戸竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山為之謬乎春秋傳曰鬼有所歸乃不為厲周禮大宗伯以血祭祭社稷五祀鄭司農云五祀五色之帝于王者宫中曰五祀𤣥謂此五祀者五宫之神在四郊四時迎五行之氣於四郊而祭五徳之帝亦食此神馬少昊氏之子曰重為勾芒食於木該為蓐収食於金修及熙為𤣥㝠食於水顓頊氏子曰黎為祝融后土食於火土司服祭社稷祈于五祀則絺冕小祝大喪分禱五祀王七祀祀五者司命大厲平生出入不以告小子珥于社稷祈于五祀儀禮既夕既疾病乃行禱于五祀五祀博言之士二祀曰門曰行聘禮賔釋幣于行歸釋幣于門荀子曰五祀執薦者百人侍西房鄭云五祀祭五徳之帝或曰禘祫蒸嘗及大祫後漢志國家亦有五祀之祭其禮簡於社稷云劉昭曰五祀門戸井竈中霤江都集禮載白虎通云戸祭脾竈祭肺中霤祭心門祭肝井祭腎者脾土也春木旺故以勝祭之即如是終冬腎六月心非所勝也以心土位在中央至尊故祭心者五岳之尊者也故祭之水最卑不得食所勝制也五祀見於周禮禮記儀禮雜出於史傳多矣特祭法以司命泰厲為七祀而左傳昭二十五年家語五帝篇則以五祀為重該修熈黎句龍之五官月令以五祀為門行戸竈中霤白虎通劉昭范􅁮髙堂隆之徒以五祀為門井戸竈中霤鄭氏釋大宗伯之五祀則用左傳家語之説釋小祝之五祀用月令之説釋王制之五祀則用祭法之説而荀卿謂五祀執薦者百人侍西房侍西房則五祀固非四方之五官侍必百人則五祀固非門戸之類然則所謂五祀者其名雖同其祭各有所主也七祀之制不見他經鄭氏以七祀為周制五祀為商制然周官雖天子亦止於五祀儀禮雖士亦傳五祀則五祀無尊卑隆殺之數矣祭法自七祀推而下之至於適士二祀庶人一祀非周禮也然禮所言五祀葢皆門戸之類而已門戸人所資以出入者也中霤人所資以居者也竈井人所資以養者也先王之於五者不特所資如此而又事有所本制度有所興此所以祀而報之也中霤土之所用事故祀於中央竈火之所用事故祀於夏井水之所用事故祀於冬戸在内而竒陽也故祀於春門在外而偶陰也故祀於秋兩漢魏晉之立五祀井皆與焉特隋唐參用月令祭法之説五祀祭行及李林甫之徒復修月令冬亦祀井而不祀行然則行神亦特軷於始行而已非先王冬日之常祀也考之於禮五祀之牲羊牲小司徒小祭祀共牛牲凡祭五祀於廟有主有尸觀月令臘先祖五祀同時則五祀祭於廟可知也曾子問既殯而祭五祀尸入三飯則五祀有尸可知也既殯而祭不酳不酢則凡祭五祀固有侑酳與酢矣老婦之祭先儒以為竈配則五祀固有配矣先儒又謂卿以上宗廟有主五祀亦有主矣大夫以下宗廟無主五祀亦如之然大夫之廟未嘗無主五祀有主與否不可考也禮書卷九十四
