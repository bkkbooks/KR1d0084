body:
  text: 禮書卷八十五宋陳祥道撰祼書曰王入太室祼小宰凡祭祀賛玉幣爵之事祼將之事將送也祼送送祼謂賛王酌爵鬯以獻尸謂之祼言灌也明不為飲主以祭祀唯人道宗廟有祼天地大神至尊不祼莫稱焉凡鬱鬯受祭祭之啐之奠之凡賔客賛祼内宰大祭祀后祼獻則賛瑶爵亦如之謂祭宗廟王既祼而出迎牲后乃從後祼凡賔客之祼獻瑶爵皆賛謂王同姓及二王之後來朝覲為賔客者祼之大宗伯大祭祀王后不與則攝而薦豆籩徹大賔客則攝而載祼小宗伯凡祭祀賔客以時將瓉祼肆師凡祭祀及祼築鬻大賔客涖筵几築鬻賛祼將鬱人凡祭祀賔客之祼事和鬱鬯以實彛而陳之凡祼玉濯之陳之以贊祼事詔祼將之儀與其節及塟共其祼器遂埋之司尊彛春祠夏禴祼用鷄彛鳥彛秋嘗冬烝祼用斝彛黄彛行人公再祼而酢侯伯子男一祼而酢再祼再飲公也酢報飲王也大國之孤以酒禮之以酒禮之者謂齊酒也和之不用鬱鬯耳禮器曰諸侯相朝灌用鬱鬯無籩豆之薦郊特牲曰諸侯為賔灌用鬱鬯商人尚聲臭味未成滌蕩其聲樂三闋然後迎牲周人尚臭灌用鬯臭既灌然後迎牲又曰祼用圭璋用玉氣也祭統曰獻之屬莫重於祼投壺當飲者皆跪奉觴曰賜灌勝者跪曰敬養文王詩曰厥作祼將常服黼冔論語曰禘自既灌而徃者吾不欲觀之矣商人尊神而交神於明故先樂而求諸陽周人尊禮而辨神於幽故先祼而求諸隂書曰王入太室祼祭統曰君執圭瓚祼尸則尸入太室以圭瓚酌鬱鬯祼之后又以璋瓚酌鬱鬯亞祼其祼尸也如祼賔客則王與后自灌之矣鄭氏釋小宰謂王酌鬱鬯以獻尸尸受祭之啐之奠之然尸神象也神受而自灌非禮意也鄭氏又謂宗廟有祼天地大神至尊不祼考之於禮典瑞祼圭有瓚以肆先王以祼賔客玉人祼圭尺有二寸有瓚以祀廟又鬯人秬鬯之所用則社廟山川四方而巳是祼不施於天地也然大宗伯凡祀大神享大鬼祭大示涖玉鬯表記曰親耕粢盛秬鬯以事上帝蓋祀天有鬯者陳之而巳非必祼也行人曰公再祼侯伯子男一祼諸侯有祼而卿無祼則以酒禮之而巳祭統所謂獻之屬莫重於祼者此也大宗伯賔客則攝而載祼謂攝后耳鄭氏謂君無酌臣之禮宗伯代王祼其説誤也鬯人共秬鬯鬱人和鬱鬯則鬱人和鬯人之鬯而鬯人不用鬱也賈公彦謂山川外十二神用秬鬯而不用鬱於理或然十二獻九獻禮器曰有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門内壺君尊瓦甒此以小為貴凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散五獻子男之饗禮也壺大一石瓦甒五斗缶大小未之聞也一獻質謂祭羣小祀三獻文謂祭社稷五祀五獻察察明也謂祭四望山川也七獻神謂祭先公郊特牲郊血大饗腥三獻爓一獻熟大饗君三重席而酢焉言諸侯相饗獻酢禮敵也三獻之介君専席而酢焉此降尊以就卑也三獻大夫來聘主君饗燕之以為賔賔為敬敬則徹重席而受酢也専猶單也樂記先王為酒禮一獻之禮賔主百拜一獻士飲酒之禮祭統尸飲五君洗玉爵獻卿尸飲七以瑤爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等也尸飲五謂酳尸五獻也大夫士祭三獻而獻賔正義曰此據備九獻之禮者至主人酳尸故尸飲五也凡祭二獻祼用鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸此等皆尸飲之故云尸飲五於此之時以獻卿之後乃主婦酳尸酳尸畢賔長獻尸是尸飲七也乃瑶爵獻大夫是正九獻禮畢初二祼不飲故云尸飲七自此以後長賔長兄弟更為加爵尸又飲二是并前尸飲九主人乃散爵獻士及羣有司也此謂上公故以酳尸之一獻為尸飲五也若侯伯七獻朝踐饋食時各一獻食訖酳尸但尸飲三也子男五獻食訖酳尸尸飲一也云大夫士祭三獻而獻賔者欲明諸侯獻賔時節與大夫士獻賔不同知大夫士祭三獻賔者特牲禮文下大夫不賔尸與士同亦三獻而獻賔知者有司徹文其上大夫別行賔尸之禮與此異也祭統曰古者必賜爵禄於太廟一獻君降命之一獻酳尸也周禮司尊彛掌六尊六彛之位春祠夏禴祼用鷄彛鳥彛皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬蒸祼用斝彛黄彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也祼如獻尸后亞祼朝踐謂薦豆腥酌醴始行祭事后於是薦朝事之豆籩既又酌獻其變朝踐為朝獻者尊相因也朝獻謂尸卒食王酳之再獻者王酳尸之後后酌亞獻諸臣為賔又次后酌盎齊備卒食三獻也於后亞獻内宗薦加豆籩其變再獻為饋獻者亦尊相因饋獻謂薦熟時后於是薦饋食之豆籩此凡九酌王及后各四諸臣一祭之正也以今祭禮特牲少牢言之二祼為奠而尸七矣王可以獻諸臣祭統曰尸飲五君洗玉爵獻卿是其差也明堂位曰灌用玉瓉大圭爵用玉琖加用璧角璧散又鬱人職曰受舉斝之卒爵而飲之則王酳尸以玉爵也王酳尸用玉爵而再獻者用璧用璧散可知也先儒謂大祫十有二獻四時與禘九獻上公亦九獻侯伯七獻周官掌客諸侯長十有再獻行人上公再祼饗禮九獻侯伯一祼七獻子男一祼五獻諸侯之卿各下其君二等以下及其大夫士皆如之及禮器有五獻之尊郊特牲有三獻之介則饗賔祀神之獻數固不異矣然祫雖大於時祭而禘又大於祫宜亦十二獻先儒以禘小於祫非也行人上公再祼而祼不預於九獻侯伯子男一祼而祼亦不預於七獻五獻則先儒以二祼在九獻之内非也司尊彛朝踐用兩尊皆有罍饋食用兩尊皆有罍籩人醢人有朝踐之籩豆有饋食之籩豆有加籩加豆則朝踐王獻后亞之諸臣之所昨三獻也饋食王獻后亞之諸臣之所昨六獻也酳尸三九獻加爵不與焉此宗廟九獻之禮也夫卒食必有酳曽子問言侑酳是侑食然後有酳也樂記言執醬而饋執爵而酳是饋食然後有酳也特牲少牢之祭皆曰饋食而獻皆曰酳尸則大夫士無朝獻饋獻之禮特酳尸於饋食之後而巳然士禮主人主婦賔三獻又加爵三長兄弟賔長利獻之也下大夫主人主婦賔又獻又加爵二賔長與利獻之也上大夫特主人主婦賔三獻而巳蓋士與下大夫無賔尸故有加爵上大夫有賔尸故無加爵天子諸侯有繹祭又有加爵記所以隆於尊者也春秋之時楚子入享於鄭九獻加籩豆六品季孫宿如晋晉侯享之有加辭曰小國之事大國也得貺不過三爵今豆有加下臣弗堪則加豈卑者之所預乎士與下大夫有加其代賔尸可知也周官朝事饋食之籩豆后薦之加爵之籩豆内宗薦之則加以璧散璧角亦諸臣獻之可知也卑者獻以散士之飲禮止於一獻而祭有三獻者攝盛也士加爵三而下大夫加爵二者厭降也書曰太保秉璋以酢孔安國謂祭報曰酢蓋獻始事也酢成事也諸臣之於禮成之而巳故獻皆曰酢一獻三獻七獻之辨禮器曰一獻質三獻文五獻察七獻神郊特牲曰郊血大饗腥三獻爓一獻孰鄭氏謂一獻祭羣小祀三獻祭社稷五祀五獻祭四望山川七獻祭先公其説以為王祭羣小祀以𤣥冕一章之服故一獻祭社稷以希冕三章之服故三獻祭四望山川則毳冕五章故五獻享先公則鷩冕七章故七獻然周禮大祀次祀小祀見於肆師大祭中祭小祭見於酒正則大宗伯所辨天地五帝先王之類大祀也社稷五祀五嶽之類中祀也四方百物之類小祀也大祀獻多小祀獻寡則社稷所獻宜加於山川也先王祭服各有象類則希冕三章以祭社稷者非卑之於山川也以社稷之所上止於利人故服粉米以稱之則獻數不繫於服章矣且賔客之禮士一獻士冠禮一獻卿大夫三獻郊特牲三獻之介子男五獻禮器五獻之尊門外缶門内壺昭元年左傳曰魯具五獻之籩豆趙孟辭焉則大國之卿亦五獻侯伯七獻上公九獻而王饗諸侯自子男五獻以至諸侯長十有再獻皆服鷩冕七章而巳孰謂獻數必繫於服章哉鄭氏以三獻為祭社稷五祀五獻為祭四望山川誤矣羣小祀則四方百物之類也其牲色厖牧人凡外祭毁事用厖可也其牲體疈辜大宗伯以疈辜祭四方百物其祼器用散鬯人凡疈辜蓋用散云其舞兵舞帗舞或不興舞鼓人凡祭百物之神鼓兵舞帗舞者舞師凡小祭祀則不興舞山川四望則其兆位各因其郊與其方小宗伯兆五帝於四郊四望亦如之山川丘陵墳衍各因其方其牲各因其方之色祼則用蜃玉則兩圭有邸與璋邸射兩圭有邸以旅四望璋邸射以祀山川舞則兵舞與羽舞奏姑洗歌南吕舞大㲈四望奏蕤賔歌函鍾舞大夏山川社稷則共黝牲其祭血祼以大罍鼓以靈鼓舞以帗舞奏太蔟歌應鍾舞咸池其禮樂辨異如此則獻數不同宜矣蓋禮畧故質禮加故文察則其事地也察矣神則其事祖也神矣一獻孰則於人情為近故曰質三獻爓則於人情漸逺故曰文三獻爓則五獻其血乎禮所謂血祭社稷是也飯數曲禮曰三飯主人延客食胾禮器曰天子一食諸侯再大夫三食力無數玉藻曰飯飱者三飯也論語曰亞飯干適楚三飯繚適蔡四飯缺適秦士婚禮三飯卒食特牲禮尸三飯告飽祝侑之如初鄭云不復飯者三三者士之禮大成也少牢禮尸三飯又食胾又食舉腊肩又食舉牢骼又食告飽又曰皇尸未實侑尸又食舉牢肩尸不飯主人拜侑尸又三飯膳夫以樂侑食大司樂王大食三侑皆令奏鐘鼓詩曰以妥以侑荀卿曰三嗅之不食大戴史記曰三侑之不食鄭康成曰食大名小數曰飯士九飯大夫十一飯其餘有十三飯十五飯賈公彦曰一告謂之一飯士三飯即告飽而侑大夫七飯告飽而侑諸侯九飯而侑天子十一飯而侑孔頴達曰天子一食諸侯再大夫三與儀禮不同此據食畢更加飯告飽之數也禮有以多為貴故特牲士祭尸九飯少牢大夫祭尸十一飯有以少為貴故禮器天子一食諸侯再大夫士三蓋一食即一飯也士九飯大夫十一飯則飯以九與十一而又加者也正飯致其隆故貴多加飯嫌於凟故貴少此飯禮所以不同也鄭氏曰士九飯大夫十一飯其餘有十三飯十五飯而賈公彦謂十三飯諸侯禮十五飯天子禮理或然也飯必告飽而告飽必侑侑禮有拜以致其敬有辭以道其勤有樂以樂其心特牲尸告飽祝侑主人拜少牢尸告飽主人拜侑此拜以致其敬也少牢祝侑曰皇尸未實侑此辭以道其勤也大祝逆尸令鐘鼓侑亦如之此樂以樂其心也然特牲三飯告飽而侑少牢七飯告飽而侑則九飯三侑飯寡而侑多十一飯再侑飯多而侑寡者蓋禮殺者儀蹙故告飽速而侑多禮隆者儀紓故告飽遲而侑少此侑禮所以不同也賈公彦謂諸侯九飯而侑天子十一飯而侑理或然也然以論語考之毎飯異樂毎樂異工則侑固多矣而特牲少牢尸飯止於三侑再侑大司樂王大食三侑者蓋有每飯之侑有終食之侑每飯之侑一工而巳終食之侑有禮之大者也故荀卿言三嗅之不食大戴史記亦言三侑之不食此皆指其大者論之也古者之於賔客如祭祀禮而祼獻之數未嘗不同則天子而下其飯數宜與尸食無異矣大司樂王大食三侑皆令奏鐘鼓則凡非大食無鐘鼓歟禮書卷八十五
