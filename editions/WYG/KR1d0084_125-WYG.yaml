  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_125-1a, image: WYG0130/WYG0130-0750c.png}
body:
  text: 禮書卷一百二十六宋陳祥道撰箎周禮笙師掌教龡箎爾雅大箎謂之沂孫炎曰沂悲也釋名曰箎啼也若嬰兒啼也郭璞曰箎以竹為之長尺四寸圍三寸一孔上出寸三分名翹横吹之小者尺二寸廣雅曰八孔鄭司農曰七孔不可考也後世有胡箎沈約曰胡箎出於胡吹非雅器也篴周禮笙師掌教篴杜子春曰竹篴五孔馬融笛賦稱此器出於羌笛舊四孔京房加一孔以備五音又風俗通曰漢武帝時邱仲作笛長尺四寸然漢以前固有笛矣但尺四寸者邱仲所作耳後世有長笛世傳蔡邕避難江南宿於柯庭之館仰盻竹椽曰是良竹也取以為笛奇聲獨絶一説邕經㑹稽高遷亭見屋椽竹東間第十六奇為笛取用果有聲有短笛今樂府短笛尺有咫有横笛小箎也梁横吹曲曰下馬吹横笛有義觜笛如横笛而加觜西凉樂也有七孔者今大樂雅笛七孔有八空者今有横笛八空皆適一時之造然也笛一作篴箎一作䶵籥眀堂位曰上鼔葦籥伊耆氏之樂也周禮笙師掌教籥籥師掌教國子舞羽吹籥籥章掌教土鼓吹􅃎籥蓋籥三孔主中聲而上下之律吕於是乎生命之曰籥以黍籥之法在是故也羽舞皆執籥以聲音之本在是故也詩曰左手執籥春秋書仲遂卒于垂壬午猶繹方入去籥公羊曰去其有聲者置其無聲者則吹籥而舞可知爾雅曰大籥謂之産其中謂之仲其小謂之箹廣雅曰籥七孔毛萇曰籥六孔鄭康成曰籥如笛三孔郭璞曰籥三孔而短當従郭鄭之説為之正也管書曰下管鼗鼓周禮小師掌教籥管瞽矇掌播簫管笙師掌吹竽笙壎籥簫管大司樂圜丘孤竹管方丘孫竹管宗廟隂竹管燕禮大射皆下管新宫禮記曰下管象詩曰磬管將將簫管備舉爾雅曰大管謂之簥其中謂之篞小者謂之篎鄭司農曰管如箎六孔説文亦曰管六孔十二月之音鄭康成曰管如笛而小併兩而吹之今大予樂官有焉廣雅云管象簫長尺圍寸八孔無底夫併兩而吹之固象簫矣管或作琯則古者之管有以玉為之也傳稱西王母獻玉琯簧詩曰吹笙鼔簧又曰並坐鼓簧又曰左執簧又曰巧言如簧記曰女媧之笙簧觀此宜若簧非笙也先儒皆以為笙中之簧其説拘矣漢武内傳鼔振靈之簧神仙傳王遙有五舌竹簧然經無眀説豈亦古之遺制歟禮書卷一百二十六
