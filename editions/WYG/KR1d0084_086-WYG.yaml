body:
  text: 禮書卷八十七宋陳祥道撰祭日祊明日祊楚茨之詩曰祝祭于祊祀事孔明祊門内也箋云孝子不知神之所在故愽求之平生門内之旁待賔客之處祀禮於是甚明正義曰釋宫云閍謂之門李巡曰閍廟門名孫炎曰詩云祝祭于祊祊謂廟門也彼直言門知門内者以正祭之禮不宜出廟門也而郊特牲云直祭祝于主注云直正也謂薦熟時也祭以熟為正又曰索祭祝於祊注云廟門外曰祊又注祊之禮宜於廟門外之西室與此不同者以彼祊祭對正祭是明日之名又彼記又稱祊之於東方為失明在西方與繹具在門故禮器曰為祊於外祭統曰而出於祊對設祭於堂為正是亦明日之繹故皆在門外與此不同以廟門為之祊知内外皆有祊稱也明此祊廟門之名其内得有待賔客之處者聘禮公食大夫皆行事於廟其待之迎於大門之内則天子之禮焉其迎諸侯之臣或於廟門内也繹祭之祊在廟門外之西北正祭之祊或在廟門内之西天子迎賔在門東此祭當在門西大率繫之門内為待賔客之處也絲衣詩曰繹賔尸也繹又祭也天子諸侯曰繹以祭之明日卿大夫曰賔尸與祭同日正義曰繹又祭釋天文李巡曰繹名曰復祭曰又祭知天子諸侯同名曰繹以祭之明日者宣八年六月辛巳有事于太廟仲遂卒于垂壬午猶繹魯為諸侯用祭之明日則天子之禮同名曰繹故知天子亦以祭之明日也故公羊傳曰繹者何祭之明日也知卿大夫曰賔尸者今少牢饋食禮者卿大夫之祭禮也其下篇有司徹云若不賔尸注云不賔尸謂下大夫也以言若不賔尸是有賔尸者有司徹所行即賔尸之禮是卿大夫曰賔尸案其禮非異日之事故知與祭同日然則天子諸侯謂之繹卿大夫謂之賔尸是繹與賔尸事不同矣而此序云繹賔尸者繹祭之禮主為賔事此尸但天子諸侯禮大異日為之別為立名謂之繹言其尋繹昨日卿大夫禮小同日為之不別立名直云祊指其事謂之賔尸耳此序言繹者是祭之名賔尸是此祭之事故特詳其文也周曰商謂之肜者因繹又祭遂引釋文以明異代之禮別也彼云周曰繹商曰肜孫炎曰肜者亦相尋不絶之意尚書有髙宗肜日是其事也禮器言設祭于堂為祊乎外故曰於彼乎於此乎設祭之饌於堂人君禮然祊祭明日之繹祭也謂之祊者於廟門之旁因名焉其祭之禮既設祭於室而事尸於堂孝子求神非一處也周禮曰夏后氏世室門堂三之二室三之二詩頌絲衣曰自堂徂基正義曰設祭于堂謂薦腥爓之時設此所薦饌在於堂為祊乎外祊謂明日繹祭在廟門之旁謂之祊言為此祊祭在於廟門外之西也又此云為祊乎外稱祭故知明曰繹祭也郊特牲云索祭祝于祊不云外故鄭彼注不云明日繹祭云謂之祊者于廟門外之旁因名焉者以釋宫云廟門之祊今曰繹祭在廟門外之西旁因以廟門為稱故云因名焉其祭之禮既設祭於室而事尸於堂者以正祭設薦在室故繹祭亦設饌在室案有司徹上大夫賔尸坐尸侑於堂酌而獻尸故知人君亦祭亦事尸於堂也但卿大夫賔尸禮略不設祭於室又不在廟門異於君也云夏后氏世室門堂三之二室三之一者證廟門之旁有室有堂也又引頌絲衣之篇者證繹祭在堂事尸也郊特牲孔子曰繹之於庫門内祊之於東方失之矣直祭祝于主索祭祝于祊不知神之所在於彼乎於此乎或諸逺人乎祭于祊尚曰求諸逺者與祊之為言倞也直正也祭以薦熟為正言薦熟正祭之時祝官以祝辭告于主若儀禮少牢敢用柔毛剛鬛用薦嵗事于皇祖某是也索求也廣博求神非但在廟又為求祭祝官行祭在於祊也祊謂廟門祭于廟門凡祊有二種一是正祭之時既設祭於廟又求神於廟門之内詩楚茨云祝祭于祊注云祊門内平生待賔客之處與祭同日也二是明日繹祭之時設饌於廟門外西室亦謂之祊即上文云祊之于東方注祊之禮宜于廟門外之西室是也今此索祭于祊當是正祭日之祊矣知者禮器云為祊乎外以其稱外故注云祊祭明日之繹祭鄭又注上直云廟門曰祊亦不外是據正祭日祊也故下云肵之為言敬也相饗之也嘏長也大也血毛告幽全之物是皆據正祭之日明此祊亦正祭日祭義曰孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愉愉乎其忠也勿勿諸其欲其饗之也詩曰明發不寐有懷二人文王之謂也祭之明日明發不寐饗而致之又從而思之奠盎設盎齊之奠也此時君牽牲將薦毛血君獻尸而夫人薦豆謂繹也儐尸主人獻尸主婦自東房薦韭菹醢祭之明日謂繹日也言繹之夜不寐疏謂繹日也者以其先云君獻尸後云夫人薦豆故故知繹日也引有司徹之文者證儐尸之時先獻後薦上大夫儐尸即天子諸侯之繹也祭統曰詔祝於室而出于祊此交神明之道也謂祝官以言詔告祝請其尸於室求之而出于祊者謂明日繹祭而出廟門旁廟求神於門外之旁神明難測不可一處之或門旁不敢定是與神明交接之道書髙宗肜日祭之明日又祭春秋書辛巳有事于太廟仲遂卒于垂壬午猶繹穀梁曰繹者祭之明日之享賔也公羊曰繹者何祭之明日也家語衛莊公變宗廟易市朝髙子問於孔子曰周禮繹祭於祊祊在廟門之西今衛君更之如之何孔子曰繹之於庫門内祊之於東方失之矣爾雅曰閍謂之門李巡張炎曰祊廟門也繹又祭也夏曰復胙商曰胙周曰繹禮有正祭之祊有繹祭之祊於祊求諸逺者也祊於西尊其右也詩云以徃烝嘗或剝或烹或肆或將而繼之以祝祭于祊此正祭之祊也禮言設祭於堂為祊乎外家語言繹祭於祊此繹祭之祊也正祭之祊位於門内之西室故毛氏釋詩以祊為門内繹祭之祊位於門外之西室故鄭氏釋郊特牲以祊於門外葢祊其位也繹其祭也賔尸其事也繹祭謂之祊而祭之祊不謂之繹繹之名特施於天子諸侯賔尸之名亦施於卿大夫鄭氏以卿大夫賔尸在堂故謂祊於門外之西室繹又於其堂孔穎達申之云求神在室接尸在堂於義或然卿大夫有賔尸則正祭無加爵無陽厭下大夫士無賔尸故正祭有加爵有陽厭必於明日春秋書辛巳有事於太廟壬午猶繹穀梁曰繹者祭之明日之享公羊曰繹者何祭之明日是也賔尸則祭日而已儀禮有司徹掃堂攝酒迎尸而賔之是也繹於明日則異牲詩曰自羊徂牛是也賔尸於祭日則用正祭之牲而已有司徹燅音尋尸爼是也葢正祭重而主於禮神繹輕而主於禮尸重故省牲視具在宗伯輕故使士焉則絲衣其紑載弁俅俅者士而爵弁絲衣者也主於禮神故在室主於禮尸故在堂則自堂徂基掃堂設筵者皆堂上之事也考之儀禮大夫正祭不迎尸而賔尸迎之正祭有祝而賔尸有侑正祭先薦後獻賔尸先獻後薦正祭之鼎五賔尸之鼎三正祭之牲體進下賔尸之牲體進腠正祭之魚縮載賔尸之魚横載正祭主人獻尸而尸酢之於獻祝佐食之前賔尸主人獻尸而尸酢之於獻侑之後凡此皆與正祭不同則主人迎尸尸後酢主人所以伸主人也先獻後薦而進下所以醉飽尸也其飲至於無筭其罰至於兕觥則繹祭可知矣拜儀上禮曰拜服也稽首服之甚也拜稽顙哀戚之至隠也稽顙隠之甚也荀卿曰平衡曰拜下衡曰稽首至地曰稽顙許慎曰頓下首也然則書稱拜手稽首則拜手手拜也稽首首至地也荀卿所謂下衡曰稽首是也稽顙則首至地矣荀卿所謂至地曰稽顙是也太祝言禮之重者則先稽首而繼之以頓首空首振動言禮之輕者則先竒拜而繼之以褒拜肅拜則頓首空首振動重禮之漸殺者也褒拜肅拜輕禮之尤殺者也然則稽首拜手而稽畱焉頓首則首頓於手而巳空首不至於手空其首而已竒拜一拜也儀禮鄉飲鄉射聘禮士相見凡禮之殺者皆一拜是也肅拜俯其手而肅之也婦人與介者之拜也少儀曰婦人雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜然則所謂手拜者手至地也士婚禮婦拜扱地是也褒拜介於一拜肅拜之間則禮固殺矣其詳不可考也記曰大夫之臣不稽首避君也孟武伯曰非天子寡君無所稽首知武子曰天子在君稽首寡君懼矣是稽首者諸侯於天子大夫士於其君之禮也然君於臣有所稽首書稱太甲稽首於伊尹成王稽首於周公是也大夫於非其君亦有所稽首儀禮公勞賔賔再拜稽首勞介介再拜稽首是也葢君子行禮於其所敬者無所不用其至則君稽首於其臣者尊徳也大夫士稽首於非其君者尊主人也春秋之時晉穆嬴抱太子頓首於趙宣子魯季平子頓首於叔孫則頓首非施於尊考之禮也鄭氏謂稽首頭至地頓首頭叩地空首頭至手褒讀為報再拜也又引書曰王動色變為振動之拜比不可考拜儀下檀弓曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也三年之喪吾從其至者又曰晉獻公之喪秦穆公使人弔公子重耳稽顙而不拜哭而起起而不私穆公曰夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也又曰拜稽顙哀戚之至隠也稽顙隠之甚也喪服小記曰為父母長子稽顙大夫弔之雖緦必稽顙婦人為夫與長子稽顙其餘則否孔穎達曰重服稽顙而後拜賔期以下拜賔而後稽顙少儀曰婦人吉事雖君賜肅拜為喪主則不手拜肅拜拜低頭手拜手至地婦人以肅拜為正凶事乃手拜為喪主不手拜者為夫與長子當稽顙也其餘亦手拜而已或曰為喪主則不手拜肅拜也雜記為妻父母在不杖不稽顙母在不稽顙者其贈也拜母在於贈拜得稽顙則父在贈拜不稽顙弔者含者禭者入皆子拜稽顙又曰三年之喪以其喪拜非三年之喪以吉拜稽顙而後拜曰喪拜拜而後稽顙曰吉拜又曰廐焚孔子拜鄉人為火者拜之士一大夫再亦相弔之道也喪大記小歛男奉尸夷于堂降拜降拜拜賔也君拜寄公國賔士大夫拜卿大夫於位於士旁三拜夫人亦拜寄公夫人於堂上大夫内子士妻特拜命婦汜拜衆賔于堂上其無女主則男主拜女賔于寢門内其無男主則女子拜賔于阼階下子幼則以衰抱之人為之拜喪有無後無無主又曰君弔於大夫士君退主人送于門外拜稽顙迎不拜拜送者拜送為君之答已也夫人弔於大夫士主人出迎于門外夫人入升堂即位主婦降自西階拜稽顙于下夫人退主婦送于門内拜稽顙主人送于門外不拜奔喪大夫哭諸侯不敢拜賔謂大夫士使列於國凡奔喪有大夫至拜之成踊而后襲於士襲而后拜之問喪曰稽顙觸地無容士喪禮既小歛主人拜賔大夫特拜士旅之即位踊賔主人出拜送于門外君弔哭主人哭拜稽顙成踊出賔出主人哭拜送三耳之喪稽顙而後拜所謂喪拜也期以下之喪拜而後稽顙所謂吉拜也葢拜則致敬於人稽顙則致哀於已拜而後稽顙頽乎其順也以其先致敬故也稽顙而後拜頎乎其至也考工記輈欲頎典鄭司農曰頎讀為懇葢古字頎懇通用以其先致哀故也孔子之時禮廢滋久天下不知後稽顙之為重而或以輕為重是猶不知拜下之為禮拜上之為泰而或以泰為禮故孔子救拜之弊則曰吾從其至者救泰之弊則曰吾從下凡欲禮之明於天下而巳喪之稽顙猶稽首也禮非至尊不稽首則喪非至重不稽顙矣然有非至重而稽顙者非以其至親則以弔者之尊也故謂妻稽顙以至親也大夫弔之雖緦必稽首以弔者之尊也婦人移天於夫而傳重於長子故雖父母不稽顙所稽顙者為夫與長子而已以所受於此者重則所報於彼者殺也然士喪禮於三年之喪拜稽顙喪大記雜記皆言拜稽顙此謂拜必稽顙非拜而後稽顙也晉獻公之喪秦穆公弔公子重耳重耳稽顙而不拜穆公曰稽顙而不拜未為後也故不成拜國語曰重耳拜而不稽顙誤矣禮書卷八十七
