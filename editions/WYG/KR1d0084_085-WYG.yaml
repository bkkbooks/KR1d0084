  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_085-1a, image: WYG0130/WYG0130-0540a.png}
body:
  text: 禮書卷八十六宋陳祥道撰大夫餕禮天子諸侯餕禮見於經尤畧今圖大夫士餕禮于後士餕禮特牲禮尸謖佐食徹尸爼爼出于廟門徹庻羞設于西序下為將餕去之筵對席佐食分簋鉶宗人遣舉奠及長兄弟與立于西階下東靣北上祝命嘗食􅅪者舉奠許諾升入東靣長兄弟對之皆坐佐食授舉各一膚主人西靣再拜祝曰􅅪有以也兩􅅪奠舉于爼許諾皆答拜若是者三皆取舉祭食祭舉及食祭鉶食舉卒食主人降洗爵宰贊一爵主人升酌酳上􅅪拜受爵主人答拜酳下􅅪亦如之主人拜祝曰􅅪有與也如初儀兩􅅪執爵拜祭酒卒爵拜主人答拜兩􅅪皆降實爵于篚上􅅪洗爵升酌酢主人主人拜受爵上􅅪即位坐答拜主人坐祭卒爵拜上􅅪答拜受爵降實于篚主人出立于户外西靣祝命徹阼俎豆籩設于東序下少牢禮尸謖佐食徹肵俎降設于堂下阼階南司宫設對席乃四人􅅪上佐食盥升下佐食對之賔長二人備司士進一敦黍于上佐食又進一敦黍于上佐食又進一敦黍于下佐食皆右之于席上資黍于羊俎兩端兩下是餕司士乃辨舉􅅪者皆祭黍祭舉主人西靣三拜􅅪者􅅪者奠舉于爼皆答拜皆反取舉司士進一鉶于上􅅪又進一鉶于次􅅪又進二豆湆于兩下乃皆食食舉卒食主人洗一爵升酌以授上􅅪贊者洗三爵酌主受于户内以授次􅅪若是以辨皆不拜受爵主人西靣三拜􅅪者􅅪者奠爵皆答拜皆祭酒卒爵奠爵皆拜主人答一拜􅅪者三人興出上􅅪止主人受上􅅪爵酌以酢于户内西靣坐奠爵拜上􅅪答拜坐祭酒啐酒上􅅪親嘏曰主人受祭之福胡壽保建家室主人興坐奠爵拜執爵以興坐卒爵拜上􅅪答拜上􅅪興出主人送乃退文王世子曰其祭餕獻受爵則以上嗣禮記曰餕者祭之末也尸亦餕鬼神之餘也惠術也可以觀政矣故尸君與卿四人餕君起大夫六人餕臣餕君之餘也大夫起士八人餕賤餕貴之餘也士起各執其具以出陳于堂下百官進徹之下餕上之餘也百官進而餕鄭改進為餕升凡餕之道毎變以衆所以别貴賤之等而興施惠之象也是故以四簋黍見其修於廟中也廟中者境内之象也祭禮利成則尸謖尸謖則命􅅪士􅅪舉奠與長兄弟則上􅅪下􅅪二人而巳故一簋一鉶所謂佐食分簋鉶是也上大夫之􅅪上佐食下佐食賔長二人則上􅅪次􅅪四人而巳故兩鉶二豆所謂司士進一敦黍于上佐食又進一敦黍于上佐食又進一敦黍于下佐食資黍于羊俎兩端兩下是􅅪司士進一鉶于上􅅪又進二豆于兩下是也然則諸侯以四簋黍則每變以衆其分而資之可知矣􅅪之簋大夫倍士諸侯倍大夫毎進不過以兩孔頴達謂諸侯之祭六簋留二以為陽厭不可考也天子諸侯之􅅪自君以至百官而煇胞翟閽之吏皆與焉以明惠周於境内也大夫之餕二佐食二賔長而巳以明惠及於其臣也士之餕舉奠與長兄弟而巳以明惠止於其親也蓋餕筵於室中就神位也用尸之簋鉶施神惠也其禮則降與俟命而後升祭舉祭鉶然後食拜酳祭酒而後飯其位則上􅅪東靣下􅅪不酢而先降上􅅪酢而後出餕之大畧也然士􅅪於其舉也戒之曰􅅪有以也於其酳也戒之曰􅅪有與也而大夫之􅅪不戒士􅅪受爵皆拜而大夫之􅅪受爵不拜大夫之上􅅪不親酢而親嘏士之上􅅪親酢而不嘏何也大夫之􅅪不戒以其非舉奠也受爵不拜以其非貴者也上􅅪不親酢以其親嘏也士之上􅅪不嘏此其降於大夫歟脤膰蜃器致福大宗伯以脤膰親兄弟之國行人歸脤交諸侯之福春秋書天王使石尚來歸脤公羊曰石尚者何天子之士也脤者何也爼實也腥曰脤熟曰膰何休曰禮諸侯朝天子助祭於宗廟然後受爼實魯不助祭而歸之故譏穀梁曰脤者何祭肉也生曰脤熟曰膰石尚士也天子之大夫不名石尚欲書春秋諫曰乆矣周之不行禮於魯也請行脤貴復正也左氏稱劉康公成肅公㑹晉侯伐秦成子受脤于社不敬劉子曰國之大事在祀與戎祀有執膰戎有受脤神之大節也成十三年杜氏曰脤祭社之肉盛以脤噐王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯下拜登受僖公九年宋成公如楚還入鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉孔子曰非祭肉不拜祭肉不出三日出三日不食之矣孟子曰孔子於魯膰肉不至不稅冕而行周禮膳夫祭祀之致福者受而膳之都宗人凡都祭祀致福于國家宗人凡祭祀致福少儀曰為人祭曰致福為巳祭而致膳於君子曰膳祔練曰告凡膳告於君子主人展之以授使者于阼階之南南靣再拜稽首送反命主人又再拜稽首其禮太牢則以牛左肩臂臑折九个少牢則以羊左肩七个犆豕則以豕左肩五个玉藻曰膳於君有葷桃茢於大夫去茢於士去葷楊子曰秦用事四帝而天下不匡反致文武昨腥曰脤熟曰膰蜃以盛之也周禮掌蜃祭祀共蜃器膰燔以熟之也周禮大宗伯以血祭祭社稷五祀以饋食享先王是社稷主腥故謂之脤宗廟主熟故謂之燔春秋傳曰祀有執膰戎有受脤是也兄弟之國親也故兼脤膰以賜之諸侯之國疎也故歸脤而巳大宗伯以脤膰親兄弟之國行人歸脤以交諸侯之福是也然天子交福於諸侯而諸侯有致福于天子致福亦謂之致膳少儀曰為人祭曰致福為巳祭而致膳於君子曰膳祔練曰告致膳以肩不以􅈩貴其前也肩以左不以右右以祭也少儀凡膳告於君子太牢則以牛左肩臂臑折九个少牢則以羊左肩七个犆豖則以豖左肩五个用葷桃茢祓不祥也玉藻曰膳於君有葷桃茢於大夫去茢於士去葷拜送拜反重其禮也凡膳告於君子主人展以授使者于阼階之南靣再拜稽首送反命主人又再拜稽首受而膳之同其福也春秋書天王使石尚來歸脤穀梁曰石尚欲書春秋請行脤貴復正也考之春秋天子之大夫稱官若字士稱名石尚士也故名之行脤雖正然諸侯非助祭而歸之則祭肉其能均乎何休謂魯不助祭而歸之故譏其說是也玉藻言膳於君大夫士者致福之膳也非致福之膳則無事於桃茢鄭氏以膳為凡美食誤也致福致膳吉禮也祔練之胙則曰吉而巳顔淵之喪饋祥肉孔子彈琴而後食此吉肉也禮書卷八十六
