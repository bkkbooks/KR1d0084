  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_038-1a, image: WYG0130/WYG0130-0227a.png}
body:
  text: 禮書卷三十八宋陳祥道撰天子三朝諸侯三朝附外朝治朝内朝周禮宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位治朝在路門之外其位司士掌焉司士掌正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上此王日視朝於路門外之位司士擯孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右大僕前王入退朝皆退王入路門也王入路門内朝朝者皆退反其官府治處也大僕掌正王之服位王眡朝則前正位而退入亦如之前正位而退道王王既立退居路門左待朝畢建路鼓于大寝之門外而掌其政以待逹窮者與遽令聞鼓聲則速逆御僕與御庶子王眡燕朝則正位掌擯相王不眡朝則辭於三公及孤卿小司宼之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君外朝朝在雉門之外者也其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司宼擯以叙進而問焉以衆輔志而弊謀朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石逹窮民焉鄭司農云王有五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門一曰畢門外朝在路門外内朝在路門内𤣥謂檀弓曰魯荘公之䘮既葬而絰不入庫門言其除䘮而反由外来是庫門在雉門外必矣如是王五門雉門為中門雉門設兩觀與今之宫門同閽人譏出入者窮民葢不得入也周天子諸侯皆有三朝外朝一内朝二内朝之在路門内者或謂之燕朝凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之匠人左祖右社靣朝後市市朝一夫各方百步内有九室九嬪居焉外有九室九卿朝焉内路寝之裏也外路門之表也曲禮曰天子當依而立諸侯北靣而見天子曰覲天子當宁而立諸公東靣諸侯西靣曰朝文王世子曰其朝于公内朝則東靣北上臣有貴者以齒内朝路寝庭其在外朝則以官司士為之外朝路寝門之外庭又曰公族朝于内朝内親也雖有貴者以齒明父子也外朝以官體異姓也玉藻曰朝服以日視朝於内朝此内朝路寢門外之正朝也天子諸侯皆三朝朝辨色始入入應門也君日出而視之退適路寢聴政使人視大夫大夫退然後適小寢釋服小寢燕寢也魯語曰公父文伯之母如季氏康子在其朝自其外朝也與之言弗應從之及寢門弗應而入康子辭於朝而入見曰肥也不得聞命無乃罪乎曰子弗聞乎天子及諸侯合民事於外朝合神事於内朝神事祭祀也内朝在路門内也自卿以下合官職於外朝外朝君之公朝也合家事於内朝家大夫内朝家朝也寢門之内婦人治其業焉上下同之夫外朝子将業君之官職焉内朝子将庀季氏之政焉皆非吾所敢言也周官太僕掌燕朝之服位宰夫掌治朝之法司士掌朝儀之位朝士掌外朝之法文王世子公族朝於内朝庶子掌之其在外朝司士掌之玉藻朝服以日視朝於内朝退適路寝聴政然則文王世子與玉藻所謂朝者諸侯之朝也葢天子庫門之外外朝也朝士掌之路門之外治朝也宰夫司士掌之路寝燕朝也大僕掌之諸侯亦有路寝有外朝則文王世子所謂内朝者玉藻所謂路寢也玉藻所謂内朝者文王世子所謂外朝也玉藻於路寢之外言内朝則又有外朝明矣諸侯内朝司士掌之其官與天子同燕朝庶子掌之其官與天子異魯語曰天子及諸侯合民事於外朝合神事於内朝自卿以下合官職於外朝合家事於内朝然則卿大夫亦二朝也王燕朝之位雖大僕掌之然其位之所辨不可以考文王世子曰公族朝于内朝東靣北上臣有貴者以齒則王之燕朝宜亦然也大僕建路鼓于大寢之門外傳稱堯設敢諌之鼓禹設敢規之鞀乃周建路鼓之意而掌其政以待逹窮者與遽令鄭氏曰路寝門外則内朝之中葢窮者逹其情於外朝之肺石朝士又達窮者之情於内朝之路鼓遽令傳遽之令也行人掌邦國傳遽之小事則遽令非行人之所掌者而已鄭康成以公食大夫拜賜于朝不言賔入聘禮以柩造朝不言䘮入則謂諸侯之朝在大門外然大門外則經涂耳非朝位也眡朝退朝之禮玉藻曰朝辨色始入君日出而視之退適路寢聴政使人視大夫大夫退然後適小寢釋服則朝辨色始入所以防微日出而視之所以優尊詩曰夜嚮晨言觀其旅臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也葢尊者體盤卑者體蹙體蹙者常先體盤者常後故視學衆至然後天子至燕禮設賓筵然後設公席則朝禮臣入然後君視之皆優尊之道也然朝以先為勤以後為逸退以先為逸以後為勤朝而臣先於君所以明分守退而君後於臣所以防怠荒此所以使人視大夫大夫退然後適小寢釋服也然則公卿諸侯之朝王其有先後乎詩云三事大夫莫肯夙夜邦君諸侯莫肯朝夕夫夙先於朝夜後於夕則公卿朝常先至夕常後退諸侯朝常後至夕常後退卿大夫二朝國語敬姜謂季康子曰自卿以下合官職於外朝合家事於内朝又曰外朝子将業君之官職焉内朝子将庀季氏之政焉則卿以下有二朝矣韋昭謂外朝君之公朝内朝家朝非是王后夫人朝左氏曰齊侯使華免殺國佐于内宫之朝則后夫人治家事於内猶天子諸侯治邦事於内故内宮亦有朝禮書卷三十八
