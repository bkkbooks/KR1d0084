front:
  text: 欽定四庫全書禮書卷二十七
  hash: sha256:903f2e68e65bc0dc500160abf6abdcbf546269fd321146f322c21018ddc34912
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_027-1a, image: WYG0130/WYG0130-0159a.png}
body:
  text: 宋陳祥道撰廛廬周禮遂人上地中地下地皆夫一廛載師以廛里任國中之地又曰宅不毛者有里布詩曰中田有廬疆埸有𤓰又曰亟其乘屋孟子曰五畮之宅樹之以桑又曰五畮之宅樹墻下以桑五母雞二母彘穀梁曰古者公田為居井竈葱韮盡取焉班固曰井方一里是為九夫八家共之各受私田百畮公田十畮是為八百八十畮餘二十畮以為廬舍又曰還廬樹桑菜茹有畦𤓰瓠果蓏殖於疆場在野曰廬在邑曰里何休曰一夫一婦受田百畮公田十畮廬舍二畮半凡為田一頃十二畮半八家而九頃共為一井故曰井田夫一廛者國中之居也載師以廛里任國中之地所謂在邑曰里是也廬者田中之居也所謂廬舍二畮半是也何休范甯趙岐皆云廬二畮半廬舍二畮半而廛亦二畮半則五畮之宅合在野在邑言之耳其在邑則春出於野詩曰亟其乘屋其始播百穀同我婦子饁彼南畮是也其在野則冬入於邑詩曰我稼既同上入執宫功嗟我婦子曰為改嵗入此室處是也考之於禮鄉師巡國及野以施恵鄉大夫辨國中之可任舍者鄉士掌國中之獄則六鄉之民莫不廛里於國中矣廛里所以奠居而廬舍特其宿息之地而已觀遺人言十里有廬詩言廬旅荘周言蘧廬則田之有廬亦若此耳然詩又曰胡取禾三百廛兮揚子曰有田一廬田亦謂之廛者據一夫所受而統言之也餘夫田二十五畮周禮遂人以疆予任甿謂疆予者民有餘力復予之田若餘夫然上地夫一廛田百畮萊五十畮餘夫亦如之中地夫一廛田百畮萊百畮餘夫亦如之下地夫一廛田百畮萊二百畮餘夫亦如之户計一夫一婦而賦之田其一户有數口者餘夫亦受此田也載芟詩曰侯疆侯以箋疆有餘力者周禮曰以疆予任氓孟子曰餘夫二十五畮班固曰嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田農民户一人已受田其家衆男為餘夫衆亦以口受田如此賈公彦以先儒之説與孟子不同謂比餘夫是年二十九以下未有妻受口田故二十五畮若三十有妻則受夫田百畮故鄭注内則云三十受田給征役鄉大夫注亦云有夫有婦乃成家何休亦云一夫一婦受井田百畮先王之於民受地雖均百畮然其子弟之衆或食不足而力有餘則又以餘夫任之此詩所謂侯疆禮所謂以疆予任甿者也然餘夫之田不過二十五畮以其家既受田百畮而又以百畮予之則彼力有所不逮矣故其田四分農夫之一而已禮言上地田百畮萊半之中地二十五畮萊亦二十五畮下地二十五畮萊五十畮則所謂如之者如田萊之多寡而已非謂餘夫亦受百畮之田如正農夫也班固謂其家衆男亦以口受田如此鄭司農謂户計一夫一婦而賦之餘夫亦受此田其説與孟子不合賈公彦之徒遂謂餘夫三十有妻者受百畮二十九已下未有妻者受田二十五畮是附㑹之論也賞田載師賞田任遠郊之地廛里場圃宅田土田賈田官田牛田賞田牧田九者亦通受一夫焉則半農人也定受田十二萬家賈公彦曰農人相通各受二夫之地受一夫故云半農人遠郊二十而三司勲凡有功者銘書於王之太常祭於大烝司勲詔之大功司勲藏其貳掌地之政令政令謂役賦凡賞無常輕重眡功凡頒賞地三之一食鄭司農曰不以美田為采邑𤣥謂賞地之税三分計税王食其一二全入於臣惟加田無國正凡賞無常輕重眂功則賞田無多少之限矣凡頒賞地三之一食則賞田無上中之壤矣賞田任遠郊遠郊二十而三則賞田非止什一之税矣鄭氏謂載師自廛里以至賞田牧田九者通受一夫半農人焉定田十二萬家以為九者之地亦有不易一易再易相通而各受一夫九萬夫為四萬五千加以六鄉七萬五千夫為十二萬夫此特言其大致然也賞田無上中之壤庸有不易再易之辨乎古者任地之法常以養民為重故臺榭不奪穡地而牧馬必在坰野則賞地三之一食其税二十而三鄭司農謂不以美田為采邑葢以此也後世賞賜常重於養民故春秋之時或予虢公以酒泉荘二十二年或予濤塗以虎牢僖四年或賜公孫免餘以六十邑襄二十七年或賜陳桓子以髙唐昭十年或賜晉以陽樊温原攢茅僖二十三年或賜耏班以門之征文十一年豈先王賞功之意哉加田司勲惟加田無國正加田既賞之又加賜以田所以厚恩也鄭司農國正謂税也禄田亦有給公家之賦貢獨加賞之田無正耳賈公彦曰加田是加恩厚又不税入天子凡大夫士賜地有四種大夫已上有采家邑任稍地之等是也又有賞田及加田圭田是有四種加田無國征者無税入天子法其民出税入圭則有之但加田未知所在或可與賞田同處以其任田近郊加田在遠郊可知晉語曰公食貢大夫食邑士食田庶人食力工商食官皂隸食職官宰食加官宰家臣也加大夫之加田先王之於功臣也以車服不足以旌之故有賞田以賞田又不足以稱之故有加田賞田二十而三則有國正矣加田無國正則正於鄉者容有之也何則王制論秀士升於司徒者不征於鄉升於學者不征於司徒則秀士升於司徒者無鄉征周官諸子國有大事則帥國子而致於太子司馬弗正凡國征不及則國子正於太子者無國正又均人言力政有公甸用之法則役於鄉者非公用之也以此推之凡有田里者正於鄉也又正於國加田無國正則正於鄉而已此所以優功也禮書巻二十七
