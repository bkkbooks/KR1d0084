body:
  text: 禮書卷六十八宋陳祥道撰壇墠祭法言王立七廟一壇一墠去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯五廟一壇一墠去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去壇為鬼大夫三廟二壇顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇顯考無廟有禱焉為壇祭之去壇為鬼官師一廟王考無廟而祭之去王考為鬼鄭氏曰天子諸侯為壇墠祈禱謂後遷在祧者也既事則反其主於祧鬼亦在祧顧逺之於無事祫乃祭之爾唯天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾凡鬼者薦而不祭國語曰壇場之所祭法言天子至士立廟之制多與禮異其言壇墠等威之辨理或有之葢先王之於祖有仁以盡其愛有義以斷其恩近則月祭逺則享嘗在祧無寢去祧無廟此以義處仁也去祧為壇去壇為墠壇墠之設為其無廟而不忍忘焉此以仁行義也葢禱祈則出其主於壇墠而祭之既事則復其主於廟而藏之惟禘祫與載之出疆然後在祭告之列其他不預也大夫士之無禘祫禮之節然爾鄭氏謂大夫士無木主誤也其言凡鬼薦而不祭賈氏申之謂大夫之鬼薦於太祖壇士之鬼薦之於廟此尤無據不遷之廟父昭子穆而有常數者禮也祖功宗徳而無定法者義也故周於三昭三穆之外而有文武之廟魯於二昭二穆之外而有魯公之世室觀春秋傳稱襄王致文武胙於齊侯史記稱顯王致文武胙於秦孝公方是時文武固已逺矣襄王顯王猶且祀之則其廟不毁可知矣家語左傳稱孔子在陳聞魯廟火曰其桓僖乎以為桓僖親盡無大功徳而魯不毁故天災之其言雖涉於怪而理或有焉若然則魯公之室在所不毁可知矣王舜中劉歆王肅韓退之之徒皆謂天子祖徳宗功之廟不在七世之列特鄭康成以周禮守祧有八人小記王者立四廟則謂周制七廟文武為二祧親廟四而已是不知周公制禮之時文武尚為近廟其所以宗之之禮特起於後代也果所以宗之者在七廟内使繼世祖先間有豐功盛徳不下文武復在可宗之列則親廟又益殺乎理必不然祭法曰逺廟為祧則祧者兆也天子以五世六世之祖為祧所謂有二祧是也諸侯以始為祧所謂先君之祧是也鄭氏以祧為超去之超誤矣既曰超矣又以文武為不毁之祧何耶眀堂位曰魯公之廟文世室武公之廟武世室然武公之於魯徇宣王立庶之非以階魯國攻殺之禍而豐功懿徳不著於世自武至閔其廟已在可遷之列矣春秋成公六年二月立武宫昭十五年有事於武宫左氏曰季文子以鞌之戰立武宫公羊曰武宫者何武公也立者不宜立也葢武宫立於成公之時厯襄及昭積世不毁故史記得以大之欲以比周之文武也王者立四廟喪服小記曰王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之何也韋𤣥成曰王者禘其祖所自出以其祖配之而立四廟言始受命而王祭天以其祖配不為立廟親盡也然則𤣥成以禘為祭天固不足信以立四廟為始受命而王者於理或然葢始受命而王者不必備事七世故立四廟止於高祖而已其上親盡不祭可也庶子王亦如之者禮為人後者為父母期公子為後為其母於子祭於孫否葢為人後者雖受重於所後而不廢父母期公子為後雖受重於君母而不廢其母祭則庶子為王雖有正統之七廟其可輒廢祖考之祭乎於是自立四廟以視始受命而王者所以著其不忘本也昔漢宣帝以従孫繼昭帝患昭穆之體一也於是立悼皇考廟以當一代之穆而王舜中劉歆以為孝宣以兄孫繼統為孝昭後考廟固不當立累世奉之是兩統二父也然宣帝以悼皇考當一代之穆固不合禮若特立廟乃庶子王之所當立者謂不當立誤矣廟位周官小宗伯禮記祭義皆曰建國之神位右社稷左宗廟考工記匠人營國左祖右社葢宗廟陽也故居左社稷隂也故居右何休曰質家右宗廟上親親文家右社稷上尊尊無據隂故社稷皆北嚮陽故宗廟皆南嚮君祭社南嚮於北牖下而亳社亦北牖則社稷北嚮可知廟所以象王之朝而朝必南面則廟皆南嚮可知聘禮賓入大門内公揖入每門每曲揖然後及祖廟司儀諸公相為賓及將幣三揖三讓每門止一相然後及廟賈公彦曰賓大門東行至廟考之於禮諸侯之廟在闕門内先儒皆謂在大門内其間有每門者諸侯五廟祖廟位居中東二昭廟西二穆廟各有門門之旁有牆牆之中夾通門則祖廟以西閤門者三東行而厯三門及至祖廟則廟皆南嚮矣廟皆南嚮而昭南面穆北面者禘祫之位也晉孫毓曰宗廟之制外為都宫内各有寢廟别為門垣太祖在北左昭右穆次而南葢其所傳聞者異也禮書卷六十八
