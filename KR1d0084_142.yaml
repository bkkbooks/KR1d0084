body:
  text: 禮書卷一百四十三宋陳祥道撰輈輈車轅也詩曰梁輈則梁衡也輈持衡者也輈從軌前微曲而上至衡則下而句之輈縱而衡橫縱者若輈橫者若梁此所以謂之梁輈也輈人國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸鄭氏謂國馬種戎齊道也高八尺田馬七尺駑馬六尺兵車乘車軹崇三尺有三寸加軫與轐七寸田車軹崇三尺一寸半駑馬之車軹崇三尺加軫與轐四寸輈之減也率七寸馬之殺也率一尺軹與軫轐之殺也率寸半則兵車乘車軫轐四尺加以四尺七寸之輈為八尺七寸矣田車軫轐三尺七寸加以四尺之輈為七尺七寸矣駑馬之車軫轐三尺四寸加以三尺三寸之輈為六尺七寸矣三等之馬各下其輈七寸則七寸為衡頸之間也輈之身丈四尺四寸軌前十尺與隧四尺四寸則丈四尺四寸也前為頸後為踵頸以持衡踵以承軫近踵以當兔當兔之圉大於持衡持衡之圍大於承軫故十分其輈之長以其一為當兔之圍則圍尺四寸有奇矣三分其兔圍去一以為頸圍則圍九寸有竒矣五分其頸圍去一以為踵圍則圍七寸有奇矣凡此大其兔以稱任正小其頸以便馬不大不小以當軫然後固也記曰良輈環灂自伏兔不至軓七寸軓中有灂謂之國輈蓋輈有膠筋之被而其漆不止於軓然後用力均亦足以為觀美也觀秦小戎之輈五束之以革而其束厯録然後古之輈飾可知隂板詩曰隂靷鋈續毛氏曰隂掩軌也劉熙釋名曰隂䕃也橫側車前所以䕃荃也靷以皮為之繫於隂板所以引車也左傳稱郵無恤曰兩靷將絶吾能止之駕而乘材兩靷皆絶哀二年靷止於兩則驂馬引之而已鋈續鄭氏曰白金飾續靷之環是也衡任輪人為車輪崇車廣衡長參如一謂之參稱輈人為輈五分其輈之長以其一為衡任之圍衡任兩軌之間則衡長六尺有六寸衡任之圍一尺三寸五分寸之一而其長與輪崇車廣等衡圍與軸圍等矣詩曰兩服上襄兩驂鴈行兩服齊首兩驂如手則服馬兩在前驂馬兩亞之在前者頸當衡亞之者不與焉春秋傳曰如驂之有靳者兩服也說文謂轅專持衡曰軌軛下曲曰軥軛軥曰䡣平昆左傳稱庾公差遣衛獻公射兩軥而還襄十四年則軌在轅專衡在軛上軛軥䡣在衡下而軛與軥䡣一物也衡上有采以為飾詩曰錯衡是也軛上有鐶以貫轡爾雅曰載轡謂之轙是也說文轙亦作䡾前疾行人上公賓主之間九十步立當車軹侯伯七十步立當前疾子男五十步立當衡前疾之位在軹之前衡之後鄭氏謂轅前下胡垂柱地者是也觀輈人國馬之輈深四尺有七寸則軾前曲中乃前疾也禮書卷一百四十三
