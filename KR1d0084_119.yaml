body:
  text: 禮書卷一百二十宋陳祥道撰大磬後長二律尺八寸博九寸厚二寸弦者兩頭相望者也兩弦之間三尺三寸七分半前長三律二尺七寸博六厚三寸先儒曰磬立秋之音禹貢泗濱浮磬葢以土少而水多故其聲和潤也秦刻嶧山以頌曰刻此樂石顔師古曰嶧山近泗水秦取泗濱石銘之故曰樂石山海經云小華之山其隂多磬石又曰鳥危之山其陽多磬唐人多用華元石為磬爾雅曰大磬謂之毊郭璞曰形似犂錧以玉石為之眀堂位曰叔之離磬葢編則雜雜則特叔之離磬特縣之磬也大戴禮曰縣一磬而堂特則堂上亦有特縣磬矣世本曰無句作磬垂作鍾書曰垂之竹矢葢叔與無句非二人垂之為工非一技皇氏謂無句叔之别名其説或然考工記磬氏為磬倨句一矩有半鄭氏曰必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度耳正義曰假令句股各一今以一尺五寸觸兩弦其句股之形即磬之句折殺也其博為一股為二鼓為三三分其股博去一以為鼓博三分其鼓博以其一為之厚葢鍾圓中規磬方中矩則倨句一矩有半觸其弦也其博為一股疑一律也股為二後長二律也鼓為三前長三律也此樂經云股非所擊也短而博鼓其所擊也長而狹鄭司農云股磬之上大者鼓其下小者康成云股外面鼓内面則擊者為前而在内不擊者為後而在外内者在下外者在上其小大長短雖殊而其厚均也黄鍾之磬股鼔皆厚二寸則餘推之可知矣編鍾編磬周禮鍾師掌金奏眡瞭掌擊頌磬笙磬賓射奏其鍾鼓磬師掌教擊磬擊編鍾鄭氏曰教眡瞭也磬亦編於鍾言之者鍾有不編不編者鍾師擊之然則所謂不編者十二辰零鍾也豈惟十二零鍾哉堂上一磬一鍾葢亦不編國語曰蘧蒢蒙璆先儒曰璆玉磬也古人之磬亦有不縣而䝉戴者此不可考鎛周禮鎛師掌金奏之鼓國語伶州鳩曰細鈞有鍾無鎛昭其大也大鈞有鎛無鍾甚大無鎛鳴其細也葢細鈞角徴也大鈞宫商也細必和之以大故有鍾無鎛大必和之以細故有鎛無鍾則鎛小鍾耳韋昭釋國語杜預釋左傳皆以鎛為小鍾晉語曰鄭伯嘉納女樂及實鏄左氏曰鄭伯嘉納魯之寳鍾又曰鄭人貽晉侯歌鍾二肆及其鎛磬杜氏謂鏄小鍾也鄭康成曰鏄如鍾而大孫炎許慎沈約之徒亦以為大鏄然爾雅大鍾謂之鏞不謂之鎛又儀禮鎛従薄與鉞鎛之鎛同則鎛為小鍾之説於理或然錞梓人曰外骨内骨郤行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以為雕琢鄭氏曰刻畫祭器博庶物也考之舊圖及今圖凡宗廟之器必狀蟲魚鳥獸之形葢其所傳者尚矣不然非所謂博物也今擇其可取者存之周禮小師掌六樂之聲節與其和鄭氏曰和即錞于也鼓人掌教六鼔四金之音聲以節聲樂以和軍旅以正田役以金錞和鼔以金鐲節鼓以金鐃止鼓以金鐸通鼓葢錞聲淳鐲聲濁鐃聲高鐸聲眀聲淳則有所合故於鼓倡而和之聲濁則有所制故於鼓行而節之聲髙則有所辨故於鼓退而止之聲明則有所交故於鼓作而通之考之於禮大司馬中春教振旅王及諸侯軍將師帥皆執鼓卒長執鐃兩司馬執鐸公司馬執鐲中冬教大閲鼔人三鼓司馬振鐸車徒皆作鼓行鳴鐲車徒皆行三鼔摝鐸車徒皆坐又三鼔振鐸及止如初乃鼔車馳徒走徒三戒車三發徒三刺乃鼔退鳴鐃且卻遂以狩田是鐸之於鼔所以通之於其中及其退也去鐲而鳴鐃錞之於兵雖無經見國語曰戰以錞于丁寧儆其民也又黄池之㑹呉王親鳴鍾鼔丁寧錞于振鐸則兵法固用錞矣春秋傳曰有鍾鼔曰伐則古之用兵蓋亦有鍾矣鄭康成曰錞圜如碓頭上大下小樂作鳴之與鼔相應漢大予樂有之杜祐曰錞于古禮器也宋時廣漢什邡人段祖以錞于獻始興王鑑其制髙三尺六寸圍二尺四寸圜如筩也色黒甚薄上有銅馬以繩縣馬令去地尺餘灌之以水又以器盛水於下以芒當心跪注錞于以手震芒則其聲如雷後周平蜀得之斛斯徴觀曰錞于也唐李仲樂圖縣以龍格今太常作伏虎于其上若武舞入則兩工對舉一人隨撞之其縣以虡則設於熊羆按十二枚鳴以和鼔鐲鼔人以金鐲節鼓司馬職公司馬執鐲軍行鳴鐲詩曰鉦人伐鼔國語曰鼓丁寧春秋傳曰射汰輈而著於丁寧説文曰鐲鉦也韋昭曰丁寧鉦也然則鉦也丁寧也皆鐲之異名鄭康成曰鐲如小鍾軍行鳴之以為鼔節鐃鄭康成曰鐃如鈴無舌有秉執而鳴之以止鼔説文曰鉦鐃也鐃小鉦也似鈴柄中上下通樂記曰始奏以文則登歌清廟之類也復亂以武則下管象之類也鄭氏以文為鼓武為鐃豈其然乎金鐸木鐸鼔人以金鐸通鼔司馬職曰兩司馬執鐸又曰三鼔摝鐸三鼔振鐸司馬法曰鼓聲不過閶鼙聲不過閶鐸聲不過琅鄭康成許慎皆曰鐸大鈴也蓋鐸有金鐸有木鐸金鐸舌以金木鐸舌以木金鐸振武事若司馬之振鐸摝鐸揜上振之謂之摝黄池之㑹官師振鐸是也木鐸振文事若書禮所言狥以木鐸是也小宰狥以木鐸鄉師以木鐸狥于市朝樂記曰天子夾振之鄭氏謂王與大將夾舞者振鐸以為節鐸雖用之於樂然非王與大將振之也晉荀氏得趙人牛鐸然後能諧樂則古人之為鐸鐲鐃錞施於聲律皆有當也今大樂有二種鐸以道武舞木為柄者謂之單頭鐸金為柄而兩鐸相屬者謂之雙頭鐸非古也禮書卷一百二十
