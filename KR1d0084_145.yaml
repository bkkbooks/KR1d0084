body:
  text: 禮書卷一百四十六宋陳祥道撰乘車將車卒車祥車曠左所以虛神位也乘君之乘車不曠左不敢虛君位也左必式不敢安君位也蓋乘車之禮君處左車右處右僕處中故造車者必慎於左考工記所謂終日馳騁左不揵是也乘車者不敢曠左戎右所謂㑹同充革車是也器物不敢措之於左月令所謂載耒耜于參保介之御間是也後世魏公子虛左以迎侯生秦王虛左以迎太后皆古之遺制耳此特乘車為然若兵車則馭者在左戎右在右將帥居中昔晉伐齊郤克將中軍解張御鄭緩為右郤克傷矢流血及屨鼓音未絶曰余病矣解張曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病夫郤克傷矢而未絶鼓音則將在鼓下矣解張傷手而血殷左輪則御在車左矣然此將帥所乘也若士卒所乘則左人持弓右人持矛中人御故書戒左不攻于左右不攻于右御非馬之正言左右而又言御則御在中可知也左傳稱秦師過周北門左右免胄而下言左右下則御在中不下可知也僖三十三年楚樂伯曰致師者左射以菆是左人持弓也宣十二年欒針為晉侯右曰寡君使針持矛焉成十六年衛太子為簡子右禱曰蒯聵不敢自佚備持矛焉是右人持矛也哀二年蓋御無定位右有常處故將帥車則御在左士卒車則御居中右人之持矛雖將帥士卒之車不同而所居常在右所職常持矛也凡此皆三人乘車之法也大僕凡軍旅田役贊王鼓王之乘車有御與戎右又有大僕則駟乘矣春秋之時侯叔夏御莊叔綿房甥為右富父終生駟乘杜預曰駟乘四人乘車虎幦羔幦韓奕詩曰鞹鞃淺懱毛氏曰淺虎皮淺毛也懱覆式也玉藻曰君羔幦虎犆鄭氏曰幦覆衣也犆緣也此君齊車之飾大夫齊車鹿幦豹犆朝車士齊車鹿幦豹犆少儀曰御負良綏申之面拖諸幦曲禮曰大夫士去國素簚周禮巾車王之喪車五乘木車大䄙疏飾素車大䄙素飾薻車鹿淺䄙革飾駹車然䄙髤飾漆車犴䄙雀飾既夕禮主人乘惡車白狗幦荀卿曰絲末彌龍所以養威也春秋傳曰齊侯魯侯㑹于野井以幦為席許慎曰幦䰍巾也幦者冪也王之吉幦於經無見而喪之木車素車犬䄙薻車鹿淺幦駹車然䄙漆車犴䄙諸侯覲王之車虎淺幦而齊車羔幦虎犆大夫齊車朝車鹿幦豹犆士齊車亦鹿幦豹犆而喪車白狗幦大夫士去國素幦然王之五幦皆有飾則諸侯之虎犆大夫士之豹犆蓋其飾也幦若席然施諸軾上其禮有等其用有辨則虎以其威猛而有義也羔以其不黨跪乳而有禮也鹿以其善接其類而有仁也豹之於虎其為威小矣齊於朝其為禮異矣故諸侯覲王虎淺幦齊則羔幦虎飾而已士之齊車鹿幦豹飾則朝車之幦與飾不以鹿豹而大夫齊車朝車皆鹿幦豹飾者屈於君故也王於始宅宗之時以守先王之所傳者為貴故䄙用犬喪則與人辨稍吉則與人接其接之淺矣故䄙用鹿淺禮書卷一百四十六
