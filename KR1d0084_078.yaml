body:
  text: 禮書卷七十九宋陳祥道撰魚月盈則魚腦盈月虧則魚腦虧特牲少牢尸俎魚皆十有五取盈數於三五故也若夫飲食之禮則不然公食大夫魚與腸胃倫膚若九若十有一下大夫若七若五則一命之魚七再命九三命十有一特天子諸侯魚數不見於經先儒謂諸侯十有一天子十有五理或然也士昏禮魚十有四攝盛也其加不至十有五者貴偶也然魚之在俎或縮或橫或右首或左首或進首或進尾或進鬐脊也或進腴或右鬐則右首左首者於俎為縮於人為橫進首進尾者於俎為橫於人為縮公食大夫魚縮俎寢右進鬐士喪卒塗之奠左首進鬐士虞亦進鬐少牢右首進腴蓋鬐者體之所在腴者氣之所聚體雖貴右人之飲食貴體鬼神之祭貴氣也公食與少牢皆右首而喪禮左首反吉故也少牢進腴公食進鬐而喪奠與虞進鬐未異於生故也儀禮大夫士祭皆薧魚周禮漁人凡祭祀共其魚之鮮薧曲禮曰薧魚曰商祭鮮魚曰脡祭少儀曰進濡魚者進尾先儒謂天子諸侯之禮備薧濡其説是也魚之為物冬則潛而趨陽乎下故腴美夏則躍而趨陽乎上故鬐美冬右腴夏右鬐此又所尚在時與公食大夫少牢之所進者異矣然儀禮魚皆縮於俎而少牢獻祝魚一橫載之有司徹尸俎五魚橫載之侑主人皆一魚亦橫載之蓋少牢祝俎所載非一物也故橫之有司徹之橫載鄭康成曰彌變於神是也有司徹尸侑主人之魚皆加膴祭於其上少儀亦曰祭膴蓋膴大也公食大夫禮士羞庶羞皆有大則膴者特為大臠以備祭者也士虞用鱄鮒少牢魚用鮒蓋大夫用鮒士虞或鱄或鮒也漁人春獻王鮪潛之詩季冬薦魚春獻鮪月令季冬乃命魚師始漁天子親往乃嘗先薦寢廟魯語曰古者大寒降土蟄發水虞於是乎講罛罶取魚嘗之則大寒降者季冬薦魚之時也土蟄發者春獻鮪之時也此特薦其新者而巳然王於凡祭祀奚適而不用魚哉以非正牲故其俎在牲體之下鱐庖人夏行腒鱐鄭司農曰腒乾雉鱐乾魚鄭康成曰腒鱐膜而乾內饔掌共羞修刑膴胖骨鱐以待共膳漁人辨魚物為鮮薧以供王膳羞凡祭祀賔客喪紀共其魚之鮮薧籩人朝事之籩其實膴鮑魚鱐鄭康成曰鮑者於􅟺室中糗乾之出於江淮也鱐者析乾之出東海王者備物近者腥之逺者乾之因其宜也曲禮曰薧魚曰商祭鄭氏曰商猶量也然薧魚曰鱐鱐曰商祭則鱐與商豈揫斂之謂歟籩人朝事之籩膴鮑魚鱐加籩之實蓤芡栗脯則籩之所薦先魚而後脯矣膴內饔掌共羞修刑膴胖骨鱐鄭司農曰刑膴謂夾脊肉鄭康成曰刑鉶羮也膴䐑肉大臠所以祭者外饔掌外祭祀之割亨共其脯修刑膴凡賔客之飱饔饗食亦如之籩人朝事之籩其實膴鮑魚鱐鄭氏曰膴䐑生魚為大臠今燕人膾魚方寸切其腴以啖所貴公食大夫禮庶羞皆有大有司徹主人亦一魚加膴祭於其上少儀羞濡魚者進尾冬右腴夏右鬐祭膴鄭氏曰謂刳魚腹也膴讀如卑蓋䐑肉之大臠亦曰膴所以祭其在俎則加于魚肉之上在籩加于鮑鱐之上粢盛肆師表齍盛告潔鄭氏曰故書表為剽剽表皆謂徽識也甸師掌帥其屬而耕耨王藉以時入之以供粢盛粢稷也為穀長是以名在器曰盛周禮九嬪凡祭祀贊玉齍玉齍玉敦受黍稷器後進之閭師凡庶民不耕者無盛盛黍稷也廩人大祭祀則共接盛接讀為一極再祭之極極以授舂人舂之大祭祀之穀藉田之收藏於神倉者也舍人凡祭祀共簠簋實之陳之舂人掌共米物祭祀共其齍盛之米􅐪人掌凡祭祀共盛大宗伯凡祀大神享大鬼祭大示涖玉鬯省牲鑊奉玉齍玉禮神之玉也始涖之祭又奉之小宗伯辨六齍之名物與其用使六宫之人共奉之黍稷稻粱麥苽大祭祀祭之日逆齍省鑊肆師祭之日表齍盛告潔故書表為剽剽表皆謂徽識也太祝五曰齍號為黍稷皆有名號也曲禮曰黍曰薌合粱曰薌萁稻曰嘉蔬月令季秋乃命冡宰農事備收舉五穀之要藏帝藉之收於神倉祗敬必飭郊特牲曰惟社丘乘共粢盛祭義天子為藉千畝諸侯百畝以為醴酪粢盛祭統曰八簋之實生民詩曰誕我祀如何或舂或揄或簸或蹂釋之叟叟蒸之浮浮揄抒臼釋淅米也蹂之言潤也又曰吉蠲為饎大饎是承春秋書御廪災穀梁曰三宫米而藏之御廪范氏曰夫人親舂公羊曰周公盛盛新穀也魯公燾燾者冒故以新羣公廩廩者連新於陳上財令半相連爾楚語曰天子郊禘之事王后必自舂其粢諸侯宗廟之事夫人必自舂其盛桓二年左傳曰粢食不鑿昭其儉也周語曰廩於藉之東南鍾而藏之晉語曰日入監九御使潔奉郊禘之粢盛詩曰彼疏斯稗鄭氏曰疏糲米也米之率糲十稗九鑿八侍御七九章算術粟率五十糲米三十稗二十七鑿二十四御二十一言粟五斗為米二斗四升細者窮於御也爾雅釋草云粢稷也郭璞云今江東呼粟為粢孔頴逹曰小宗伯辨六粢是諸穀亦名粢天子藉于南郊正陽之方也廪於藉東南長生之地也舂人祭祀共粢盛之米楚語曰天子親舂郊禘之盛又曰天子郊禘之事王后必自舂其粢諸侯宗廟之事夫人必自舂其盛穀粱曰三宫米而藏之御廪蓋祭祀之禮貴於出力以致養故王耕藉后獻種夫人親桑君卜三宫夫人世婦之吉者蠶于蠶室夫婦相成以盡志力而後可以交於鬼神則舂盛固所以自盡也然王耕藉不過三推夫人繅絲不過三盆則舂盛之禮蓋亦如此然後舂人卒其事以共之也黍稷曰粢在器曰盛周禮或言齍或言盛或言齍盛大宗伯奉玉齍小宗伯辨六齍逆齍大祝齍號之類此言齍而不及盛也閭師不耕者無盛廪人共接盛饌人共盛之類此言盛而不及齍也甸師共齍盛舂人共齍盛之米小宗伯表粢盛此兼言齍盛也其言各有所當非苟異耳齍盛共之以甸師舂之以舂人􅐪之以􅐪人實之以舍人奉之以大宗伯逆之以小宗伯然後立之以表而六宫之人共奉之鄭氏曰表為徽識蓋各書其號以辨異之也九嬪贊玉齍者玉敦也大宗伯奉玉齍者玉與齍也廩人之接盛施於大祭祀而巳接猶曽子問接祭之接也鄭氏改以為扱非是禮書卷七十九
