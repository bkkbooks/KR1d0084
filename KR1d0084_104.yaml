body:
  text: 禮書卷一百五宋陳祥道撰射儀周禮司裘云王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射者為祭祀射王將有郊廟之事以射擇諸侯及羣臣與邦國所貢之士可以與祭者射者可以觀德行其容體比於禮其節比於樂而中多者得與於祭諸侯謂三公及王子弟封於畿內者卿大夫亦皆有采地焉其將祀其先祖亦與羣臣射以擇之凡大射各於其射宫侯者其所射也以虎熊豹麋之皮飾其側又方制之以為􅙯謂之鵠著于侯中所謂皮侯王之大射虎侯王所自射也熊侯諸侯所自射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射馬凡此侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十參七十干五十逺尊得伸可同耳所射正謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯鄭司農云鵠鵠毛也方十尺曰侯四尺曰鵠二尺曰正四寸曰質𤣥謂侯中之大小取數於侯道鄉射記曰弓二寸以為侯中則九十弓者侯中廣丈八尺七十弓者侯中廣丈四尺五十弓者侯中廣一丈尊卑異等此數明矣考工記曰梓人為侯廣與崇方三分其廣而鵠居一焉然則侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺六寸大半寸侯中一丈者鵠方三尺三寸少半寸謂之鵠者取名於鳱鵠鳱鵠小鳥而難中是以中之為雋亦取鵠之言較較者直也射所以直已志用虎熊豹麋之皮示能服猛討迷惑者射者大禮故取義衆也司徒云六藝禮樂射御書數鄉大夫之職曰退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞鄉師黨共射器州長春秋以禮射民射于州序保氏養國子以道乃教之六藝三曰五射白矢參連剡注襄尺井儀也司几筵凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几司服王饗射則鷩冕大司樂大射王出入令奏王夏及射令奏騶虞詔諸侯以弓矢舞樂師凡射王以騶虞為節同射儀燕射帥射夫以弓矢舞大師大射帥瞽而歌射節鍾師九射王奏騶虞笙師凡祭祀饗射共其鍾笙之樂鏄師凡祭祀鼓其金奏之樂饗食賔射亦如之車僕大射共三乏司常凡射共獲旌射人以射法治射儀王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘩五節二正若王大射則以貍步張三侯王射則令去侯射法王射之禮治射儀謂肆之也鄭司農云三侯虎熊豹也客者乏也待獲者所蔽也九節析羽九重設於長杠也正所射也詩云終日射侯不出正兮二侯熊豹也犴侯犴者獸名也獸有貙犴熊虎𤣥云三侯者五正三正二正之侯也二侯者三正二正之侯也一侯者二正而已此皆與賔射於朝之禮也考工記梓人職曰張五采之侯則逺國屬逺國謂諸侯來朝者也五采之侯即五正之侯也正之言正也射者內志正則能中焉畫五正之侯中朱次白次蒼次黃𤣥居外三正損𤣥黃二正去白蒼而畫以朱緑其外之廣皆居侯中三分之一中二尺今儒家云四尺曰正二尺曰鵠鵠乃用皮其大如正此說失之矣大射禮犴作干讀如宜犴宜獄之犴犴胡犬也士與士射則以犴皮飾侯下大夫也大夫以上與賔射飾侯以雲氣用米各如其正九節七節五節者奏樂以為射節之差言節者容侯道之數也樂記曰明乎其節之志不失其事則功成而德行立鄭司農云貍步謂一舉足為一步於今為半步𤣥謂貍善搏者也行則止而擬度馬其發必獲是以量侯道者法之也侯道各以弓為度九節者九十弓七節者七十弓五節者五十弓弓之下制長六尺大射禮曰大侯九十參七十干五十是也三侯者司裘所共虎侯熊侯豹侯也列國之君大射亦張三侯數與天子同大侯熊侯也參讀為糝糝雜者豹鵠而麋飾下天子大夫也諸子秋合諸射以考其藝而進退之大僕王射則贊王弓矢繕人掌詔王射贊弓矢之事梓人為侯廣與崇方叄分其廣而鵠居一焉上兩箇與其身三下兩箇半之上綱與下綱出舌尋縜寸焉張皮侯而棲鵠則春以功張五采之侯則逺國屬張獸侯則王以息燕禮記曲禮君使士射不能則辭以疾言曰某有負薪之憂王制命鄉簡不帥教者以告耆老皆朝于庠元日習射上功凡執技論力適四方裸股肱决射御季秋司徒搢撲北靣誓之天子乃厲飾執弓矢以獵月令令獵為射孟冬天子乃命將帥講武習射御角力郊特牲孔子曰射之以樂也何以聽何以射孔子曰士使之射不能則辭以疾縣弧之義也內則子生男子設弧於門左成童舞象學射御少儀侍射則約矢侍投則擁矢樂記武王克殷散軍而郊射左射貍首右射騶虞而貫革之射息也射義古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮其節天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂㑹時也采蘋者樂循法也采蘩者樂不失職也孔子射於矍相之圃蓋觀者如堵墻射至司馬使子路執弓矢出延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半入者半又使公罔之裘序㸃揚觶而語公罔之裘揚觶而語曰幼壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序㸃又揚觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋㢙有存者孔子曰射者何以射何以聽循聲而發發而不失正鵠者其惟賢者乎若夫不肖之人則彼將安能以中書益稷曰侯以明之太甲曰若虞機張往省括于度則釋盤庚上子告汝于難若射之有志詩車攻决拾既佽弓矢既調射夫既同助我舉柴賔之初筵大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵古者祈子帶弓韣生子縣桑弧其成童也教以射其貢之也試以射則射宣君子之所可忽耶然則弧矢之作始於黃帝易曰弦木為弧剡木為矢世本曰黃帝之臣揮作弓夷牟作矢侯以明之見於虞書至周弓之別有六矢之別有八侯之別有三皮侯五采侯獸侯侯之別有三則大射賔射燕射之侯也士無大射而有賔射燕射庶人無賔射燕射特有主皮之射而已周官司裘於王共虎侯熊侯豹侯設其鵠諸侯熊侯豹侯卿大夫共麋侯皆設其鵠此大射之侯也梓人所謂張皮侯而棲鵠則春以功是也射人以射法治射儀王射三侯五正諸侯射三侯三正孤卿射大夫一侯二正士射犴侯二正此賔射之侯也梓人所謂張五采之侯則逺國屬是也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以麋豕此燕射之侯也梓人所謂張獸侯以息燕是也大射之侯用虎熊豹麋之皮節其側而中又制皮以為鵠賔射之侯亦虎熊豹麋之皮飾其側而中畫五色朱白蒼黃𤣥以為正燕射之侯則畫熊麋虎豹鹿豕之形以象鵠此三射之别也然司裘諸侯熊侯豹侯則畿內諸侯大射之禮也畿外諸侯大侯參侯干侯故大射禮量人巾車張三侯大侯之崇見鵠於參參見鵠於干干不及地武是也司裘不言犴侯以士無大射故也不言參侯以畿外非司裘所共故也射人言士犴侯二正則王三侯之為虎熊豹諸侯二侯之為熊豹大夫之侯亦為麋可知也蓋大射以鵠則猶賔射之有正也賔射有皮則猶大射之飾其側也大射側中皆皮故曰皮侯賔射側皮而中五采故曰五采之侯則司裘射人之三侯二侯一侯其側則同而所異者中而已鄭司農釋射人曰三侯熊虎豹二侯熊豹是也鄭康成曰三侯五正三正二正之侯二侯三正二正之侯一侯二正而巳其說非也蓋王三侯皆五正諸侯二侯皆三正經言王五正康成謂有三正二正經言諸侯三正康成謂有二正可乎夫天子諸侯所尚者威孤卿大夫所尚者才士所尚者志威以服猛為事而虎熊豹皆猛獸也故天子大射之侯以虎熊豹才以除害為職而麋害榖者也故大夫大射之侯以麋士以有事四方為能以勝夷狄之守為善而犴胡犬也故士賔射之侯以犴然燕射天子降以熊諸侯降以麋大夫止用虎豹士用鹿豕者息燕勞功則禮殺於祭祀賔客故天子諸侯殺其威然後能下下孤卿大夫隆其才然後能衛上大夫隆其才以至於威士隆其志以至於才則燕之為禮所以異乎大射賔射之嚴分守也麋鹿類也豕亦害物者也春秋以冬多麋為災詩以町疃鹿場為患禮記以食田豕為虎之功此麋鹿豕之不可不除也然則畿外諸侯大射以大侯參侯干侯何也大侯熊侯也參侯麋侯也干侯犴侯也諸侯三侯熊為上故曰大侯大夫麋侯參於天子諸侯之侯為三故曰參侯天子得以兼諸侯之侯故有熊侯諸侯得以兼大夫士之侯故有麋侯犴侯康成以參為糝謂糝侯豹鵠而麋飾以大夫用虎豹不忘上下相犯士用鹿豕不忘君臣相養非射禮之意也鵠取名於鳱鵠正取名於題肩皆鳥之捷黠難中者故以中為雋焉其義則鵠者直也正也直巳正志然後能中故記曰不失正鵠者其惟賢者乎毛氏曰二尺曰正的質也鄭衆馬融釋周禮皆曰十尺曰侯四尺曰鵠二尺曰正四寸曰質王肅亦曰二尺曰正四寸曰質又引爾雅曰射侯皮謂之侯侯中謂之鵠鵠中謂之正正方二尺也正中謂之𣙗七尺也𣙗周質也肅以爾雅故改質為六寸賈逵釋周禮曰四尺曰正正五重鵠在其內而方二尺鄭衆馬融王肅則以正在鵠內賈逵則以鵠在正內二者之說皆無所據要之大射之侯棲鵠賔射之侯設正燕射之侯畫獸以象正鵠而已考工記梓人為侯廣與崇方三分其廣鵠居一焉由是言之則賔射之侯亦三分其廣正居一也蓋弓二寸以為中虎侯九十弓則侯中丈八尺鵠方六尺熊侯七十弓則侯中丈四尺鵠方四尺六寸有竒豹侯麋侯五十弓則侯中一丈鵠方三尺三寸有竒鄭衆馬融之徒以四尺曰鵠誤也侯制大射量人量侯道以貍步大侯九十參七十干五十鄉射記侯道五十弓弓二寸以為侯中倍中以為躬倍躬以為左右舌下舌半上舌夫王之虎侯謂之大侯諸侯熊侯亦謂之大侯諸侯大侯九十參七十干五十則天子虎九十弓熊七十弓豹五十弓可知豹五十弓則麋亦五十弓可知先儒謂弓之下制六尺則九十弓者五十四丈七十弓者四十二丈五十弓者三十丈弓二寸以為侯中則九十弓者中丈八尺七十弓者中丈四尺五十弓者中十尺侯中廣崇方則五十弓之侯用布五幅長丈則中之布方丈矣倍中以為躬則上躬下躬各二丈矣倍躬以為左右舌下舌半上舌則上左右舌布四丈而出躬各一丈下左右舌布三丈而出躬各五尺矣鄭氏謂半者半其出於躬是也鄉射記曰侯道五十弓射人若王大射則以貍步張三侯大射量人以貍步量侯道蓋貍善搏者也行則止而擬度焉其發必獲大射擇士欲其能擬度而獲也故以貍步非大射則弓而已弓之下制六尺貍再舉足亦六尺其為步同其所用異也古者制度取於身而器用生於類故侯道生於弓而侯中亦生於弓弓二寸以為侯中步中以為弓倍躬以為左右舌下舌半上舌而侯道之逺侯中之廣者雖不止此然十弓者侯道之所始也故五十弓之侯其上則象人八尺之臂五八四十而用布四丈其下則象人六尺之足五六三十而用布三丈中其身也上下其躬也躬之左右出者舌也持舌者綱也籠綱者縜也其不及地者武而已則下綱其足也武其足迹也中人之迹二尺二寸則侯之制度取於身可謂備矣天子虎侯熊侯豹侯禮記郊特牲曰卜之日王立子澤親聽誓命儀禮大射畢公入鷔禮記言王之出於澤儀禮言公之出於澤則天子澤宫西郊小學也諸侯澤宫郊之大學也鄉射記曰於郊則閭中此諸侯郊射之中也司裘天子大射三侯虎侯侯道九十弓侯中丈八尺鵠方六尺熊侯侯道七十弓侯中丈四尺鵠方四尺六寸有竒豹侯侯道五十弓侯中十尺鵠方三尺三寸有竒鄭氏謂王之大射王射虎侯諸侯助祭者射熊侯卿大夫士助祭者射豹侯其說蓋以大射禮公射大侯大夫射參士射干而知之也天子諸侯與其臣大射賔射皆異侯而燕射與其臣則同侯蓋異侯所以辨其等同侯所以一其歡也凡侯靣北西方謂之左其張而未射也不繫左下綱中掩束之及射則說束遂繫左下綱禮書卷一百五
