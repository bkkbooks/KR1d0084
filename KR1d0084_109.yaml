body:
  text: 禮書卷一百十宋陳祥道撰鹿中中者前跪髹赤黒色兕中皮樹中閭中虎中鄉射記曰君國中射則皮樹中謂城中燕射也皮樹獸名今文皮樹繁豎張鎰禮啚曰皮樹人靣於郊則閭中於郊謂大射也大射於太學王制曰大學在郊閭獸名如驢一角或曰閭如驢跋蹄周書曰北唐戎以閭於竟則虎中謂與鄰國君射也大夫兕中兕獸名似牛一角士鹿中謂小國之州長惟君有射于國中臣不習武事於君側鹿中髤前足跪鑿背容八筭釋獲者奉之先首前足跪者象教擾之獸受負也賈公彦曰國中燕在寢故也大射公入鷔從外來入此云於郊故知大射在郊也諸侯大射於大學天子大射於虞庠小學跂踶已上山海經文周書見於國語也於竟與鄰國君射賔射也以君有送賔之事因送則射也天子諸侯皆燕射在國又天子賔射在朝亦在國大夫士燕射賔射不在國大夫亦得行大射雖無郊學亦不得在國是以孔子為鄉射射於矍相之圃是其一隅也鹿屈前足以受負若今駞受負則四足俱屈之類也鄉射未旅司射請射乃命弟子納射器乃納射器皆在堂西弓矢決拾旌中籌楅豐也三耦卒射司射請釋獲於賔賔許降西靣立于所設中之東北靣命釋獲者設中遂視之釋獲者執鹿中一人執筭以從之鹿中射於榭也於庠當兕中釋獲者坐設中南當楅西當西序東靣興受筭坐實八筭于中横委其餘於中西南末興共而俟司射遂進由堂下北靣命曰不貫不釋貫猶中也不中正不釋筭也釋獲者坐取中之八筭改實八筭於中興執而俟執所取筭乃射若中則釋獲者坐而釋獲毎一箇釋一筭上射於右下射於左若有餘筭則反委之委之合於中西又取中之八筭改實八筭于中興執而俟既射遂釋西階西立于中南北靣視筭釋獲者東靣於中西坐先數右獲二筭為純卒委其餘于中西興共而俟大射三爵既備司射適西階前東靣命有司納射器君之弓矢適東堂賔之弓矢與中籌豐皆止于西堂下總衆弓矢楅皆適次而俟三耦卒射司射命釋獲者設中東靣退大史實八筭於中司射適階西北靣視筭釋獲者東靣于中西坐先數右獲二筭為純卒委其餘于其中西興共而俟皮樹儀禮或作繁竪其狀人靣葢人靣而能竪者也閭如驢一角而跂蹄兕如牛一角而青色爾雅曰兕似牛郭璞曰一角青色重千觔説文曰兕如野牛有毛其皮堅厚可以制鎧交州記曰兕出九徳一角角長三尺餘形如馬鞭柄君國中射則皮樹中於郊則閭中於竟則虎中大夫射則兕中士則鹿中鹿中髤前足跪鑿背容八筭則皮樹虎兕之制葢亦然也惟君有射於國中而燕射大射賔射異中大夫士射必於郊而燕射賔射同中君射則始納於西堂下繼又總之以適次大夫士射則納於堂西而已此尊卑之辨也其奉之也先首其設之也必坐其位則南當福西當西序其嚮則東面籌雖八十所容者八筭而已上射之筭釋於右下射之筭釋於左則賔主之黨辨矣二筭為純一筭為竒則勝負之黨辨矣鄉射用鹿中而投壺亦鹿中投壺輕於射禮故用中之下者而已籌籌長尺有握握素鄭氏曰握本所持處素刋之也鄉射記前籌八十長尺有握握素握布四指指一寸則籌尺有四寸矣公羊傳田膚寸而合投壺曰室中布五扶先儒謂側手為膚鋪四指為扶則握與膚扶一矣握素刋其本也鄉籌八十而中實止於八者籌八十以十耦計之也一人四矢皆中則用八筭焉射未必皆中而必備八筭者不敢期人之不中也毎一耦射中考一箇釋一筭上射於右下射於左有餘筭則反之葢釋獲者取八筭於中執之改實八筭以待後中既釋獲委於其中西又取執而改實焉故中之所容常八筭乏如曲屏風無足郷射獲者既爵司馬受爵獲者執其薦使人執俎從之辟設于乏南遷設薦俎就乏明已所得禮周禮射人王三侯三獲三容諸侯二侯二獲二容卿大夫一侯一獲一容士豻侯一獲一容服不氏射則贊張侯以旌居乏而待獲儀禮鄉射乏參侯道居侯黨之一西五步容謂之乏侯道五十步此乏去侯北十步西三丈大射設乏西十北十凡乏用韋前射三日張侯設乏欲使有事者豫志焉鄉射將射司馬命獲者倚旌于侯中射者升履物司馬南揚弓命去侯獲者執旌許諾聲不絶以至於乏坐東靣偃旌興而俟及射獲者坐而獲舉旌以宫偃旌以商獲而未釋獲既射獻獲者于侯負侯拜受爵遂使人執俎從之辟設于乏南大射獻服不亦如之正靣北乏靣南故文反正為乏侯各有獲獲各有容故王三侯三獲三容諸侯二侯二獲二容卿大夫士一侯一獲一容容革為之鄉射三侯道居侯黨之一西五步大射西十北十謂之乏乏以矢力乏於此也謂之容以獲者所厞也爾雅曰容謂之防郭璞曰如小曲屏唱射者所以自防容與防皆乏之異名也拾朱極决繕人掌王之用弓弩矢箙矰戈决拾詩曰决拾既佽又曰童子佩韘鄉射曰襜决遂大射又曰設决朱極三士喪禮决用正王棘若擇棘組繫纊極二内則曰佩决捍葢决著於右巨指以鈎絃者也極著於右三指以釋絃者也食指中指無名指拾著於左臂以遂絃者也大射朱極三士喪禮纊極二則生者以朱韋所以致飾而三以致其用也死者以纊所以復質而二以明其不用也鄭氏釋周禮謂士决用棘則天子用象骨與釋大射曰决以象骨為之遂以韋為之賈公彦曰大夫以骨不必以大象葢皆推士禮而揆之也拾亦謂之遂儀禮所謂襜決遂是也亦謂之捍内則所謂决捍是也極亦謂之韘所謂佩韘是也鄭康成曰韘之言沓所以驅沓手指儀禮鄉射記大夫與士射襜薰襦燕禮記君射襜朱襦葢大夫與士射士則以拾蔽膚大夫則歛衣而已君與大夫射大夫以拾蔽膚君則歛衣而已鄭氏謂拾所以蔽膚歛衣者此也曲禮曰野外軍中無摰以纓拾矢可也則拾亦可以為摰與禮書卷一百十
