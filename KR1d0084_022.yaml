body:
  text: 禮書卷二十二宋陳祥道撰刀柄飾以木削刀合六成規考工記曰三分其金而錫居一謂之太刃之齊五分其金而錫居二謂之削殺矢之齊又曰築氏為削長尺博寸合六而成規桃氏為刃鄭氏曰刃刀劍之屬削今之書刀詩曰鞞琫容刀書曰赤刀大訓孔安國曰赤刀赤刃削少儀曰刀郤刃授穎削授拊鄭氏曰穎環也拊把也釋名曰刀到也其末曰鋒若鋒刺之利也其本曰環形似環也然則直而本環者刀也曲而本不環者削也鸞刀詩曰執其鸞刀以啓其毛記曰割刀之用鸞刀之貴貴其義也聲和而後斷也又曰鸞刀以刲公羊傳曰鄭伯右執鸞刀以逆楚王毛氏曰鸞刀刀有鸞者割中節也孔穎達曰鸞即鈴也謂刀環有鈴其聲中節何休曰鸞刀宗廟割切之刀環有和鋒有鸞考之詩禮曰和鸞雍雍曰登車聞和鸞之聲有鸞必有和鸞在前和在後詩有言鸞鑣有言八鸞則和可知有言和鈴則鸞可知然則何休言鸞刀之制蓋有所授耳夫和非斷則牽斷非和則劌故天以秋肅物而和之以兑聖人以義制物而和之以仁鸞刀以和濟割亦此意也易曰利物足以和義說文鸞赤神之精赤色五采雞形鳴中五音劒考工記桃氏為劒臘廣二寸有半寸兩從半之以其臘廣為之莖圍長倍之中其莖設其後三分其臘廣去一以為首廣而圍之身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之蓋劍柄之名六後夾古協反一作缺鼻莖鐔首也劒刃之名三臘脊鍔也所握者為夾中於夾者曰莖其旁鼻曰鐔釋名曰帶所貫尋也設其下而大之者為後圜其上以接刃者為首兩刃為臘其中髙者為脊其末殺者為鍔鍔亦謂之鋒鼻亦謂之彘字林云亦謂之珥博雅劒珥為之鐔上制九鋝下制五鋝鋝六兩大半兩此劒之大略然也少儀曰僕者右帶劒樂記曰武王克商裨冕搢笏而虎賁之士說劒家語曰子路拔劒而舞莊子曰孔子使子路去其危冠解其長劒春秋傳曰衛渾良夫袒裘不釋劒而食太子數三罪而殺之則古者車僕勇力之士帶劒其服冕辨以行禮者佩玉而已至秦始皇乃冠冕帶劒漢禮自天子及百官皆佩劒魏氏唯朝服佩之晉氏又以木代之唐亦有焉蓋承秦漢之制然也春秋繁露曰劒之在左青龍象也刀之在右白虎象也則古之佩劒者必左而少儀右帶劒者蓋車上之位君在左車右僕居中居中而右帶劒避君也劒櫝夫襓劒衣少儀曰劒則啓櫝蓋襲之加夫襓與劒焉莊子曰千越之劒柙而藏之則櫝劒柙也夫襓劒衣凡藏玉與筮策者曰櫝藏弓矢者曰韥而劒室亦謂之櫝以其有所容故也又謂之柙以其有所撿故也藏虎兕者亦曰柙夫襓博雅作衭襓蓋進劒者左首而加於衭襓之上則左首者尊其首也加於夫襓之上不敢褻也纓曲禮曰女子許嫁纓內則曰婦事舅姑襟纓男女未冠笄者雞初鳴襟纓皆佩容臭詩曰親結其縭士婚禮女嫁母施襟結帨爾雅曰婦人之褘謂之縭縭緌也又曰襟謂之袸郭璞曰縭香纓也褘邪交落帶繫於體又曰袸衣小帶也蓋纓帶曰襟婚禮所謂施襟是也帶結而垂曰縭爾雅所謂縭緌是也鄭氏曰襟猶結也則詩所謂親結其縭為襟纓可知也孔穎達之徒以詩言結縭禮言結帨則曰縭帨巾也然詩言紼纚維之爾雅作紼縭亦曰縭緌也則縭非帨巾矣內則男女事父母婦事舅姑皆有纓以佩容臭則與女子許嫁之纓不同鄭氏曰婦人有纓示有繫屬誤矣何則許嫁已纓將嫁無所復施既嫁夫說之矣無所復用則事舅姑之襟纓非許嫁之纓也鄭氏曰許嫁之纓蓋以五采為之然則事父母舅姑之纓亦五采歟縏袠內則婦事舅姑佩針管線纊施縏袠鄭氏曰縏小囊也縏袠言施眀為針管線纊有之內司服后之喪共凡內具之物鄭氏曰內具縏袠之屬也熊氏曰袠刺也刺袠而為縏囊故曰縏袠然則士婚禮所謂襟鞶者蓋此也鄭氏以襟鞶為盛帨巾之屬然內則左佩帨巾右佩縏袠而帨巾不聞有鞶唐志婦人帨巾亦不施鞶禮書卷二十二
