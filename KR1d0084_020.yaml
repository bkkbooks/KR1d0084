front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_020-1a, image: WYG0130/WYG0130-0114c.png}
body:
  text: 禮書卷二十宋陳祥道撰組綬天子𤣥諸侯朱大夫純世子綦士緼玉藻天子佩白玉而𤣥組綬諸侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬鄭氏曰綬者所以貫佩玉相承受也純當為緇詩曰青青子佩毛氏曰士佩瓀珉玉而青組綬爾雅曰璲瑞也繸綬也漢志曰縌者佩璲也然則組綬之佩謂之綬以其貫玉相承受也謂之璲以其貫璲玉也謂之縌以其貫玉相迎也其飾天子𤣥諸侯朱大夫純世子綦士緼𤣥者道也朱者事也蒼白者徳之雜赤黄者事之雜純則素而巳此天子至士佩綬之辨也鄭氏以大夫純綬為緇綬毛氏以青為士佩豈其所傳者異歟禮紳韠結三齊特佩綬之長無所經見漢制貴者縌長三尺二寸卑者縌長三尺古者之佩盖亦類此然秦以采組連結於璲光眀章表轉相結受故謂之綬漢承秦制加之以雙印佩刀之飾天子黄赤綬四采黄赤绀縹淳黄圭長丈九尺九寸五百首諸侯王赤綬四采赤黄縹紺淳赤圭長二丈一尺三百首諸國貴人相國皆緑綬三采緑紫紺淳緑圭長二丈一尺二百四十首公侯將軍紫綬二采紫白淳紫圭長丈七尺百八十首九卿中二千石一千石青綬三采青白紅淳青圭長丈七尺百二十首千石六百石黒綬三采青赤紺淳青圭長丈六尺八十首四百石三百石長同四百石三百石二百石黄綬淳黄圭一采長丈五尺六十首百石青绀綸一采宛轉繆織長丈二尺凡先合單紡為一系四系為一扶五扶為一首五首成一丈丈采淳為一圭首多者系細少者系麤皆廣尺六寸唐制天子白玉雙佩黒組大雙綬黒質黒黄赤白縹緑為純廣一尺長二丈四尺五百首紛廣二寸四分長六尺四寸色如綬又有小雙綬長二尺六寸色如大綬而首半之皇太子瑜玉雙佩朱組雙大綬朱質赤白縹紺為純長一丈八尺廣九寸三百二十首紛長六尺四寸廣二寸四分色如大綬羣臣一品衮冕山𤣥玉佩緑綟綬緑質緑紫黄赤色為純長一丈八尺廣九寸二百四十首二品鷩冕佩水蒼玉紫綬紫質紫黄赤為純長一丈六尺廣八寸一百八十首三品毳冕紫綬如二品自三品以下皆青綬青質青白紅為純長一丈四尺廣七寸一百四十首五品𤣥冕黒綬紺質青紺為純長一丈二尺廣六寸一百二十首進賢冠紛長六尺四寸廣四寸色如其綬逺游冠纁朱綬朱質赤黄縹绀為純長一丈八尺廣九寸二百四十首然大綬之飾於古無有特後世之制也玭珠玉府共王之服玉佩玉珠玉大戴禮曰玭珠以納其間韓詩傳亦曰蠙珠以納其間蠙者蚌也玭即蠙也然荀卿賦曰璇玉瑤珠弗之佩也謂之瑤珠則以玉為珠非蚌珠也謂之蠙珠盖其狀若蚌珠然象環五寸爾雅曰肉好若一謂之環玉藻曰天子佩象環五寸而綦組綬家語稱孔子之喪公西赤掌殯葬焉襲衣十一稱佩象環而綦組綬夫孔子其服也鄉其冕也從衆以為大夫也不敢舍車而徒以無臣也不敢為有臣而葬然佩不以大夫之水蒼玉而以象綬不以大夫之純而以綦者孔子制行有從衆者有違衆者要適於義而已考之於禮象次於玉象路次玉路象笏次玉笏綦下於純則象環綦綬聖人之謙徳也婦人佩竹竿詩曰佩玉之儺有女同車詩曰佩玉瓊琚衛之南子環佩璆然阿谷之女佩璜而澣皆婦人佩也其等衰不可以考或亦眡其夫而為之度歟漢制太皇太后皇太后皇后綬與乘輿同公主綬與諸侯王同唐制亦皇后佩綬如天子公主王妃佩綬同諸王然其所謂綬者非古綬制也綪結佩玉藻曰齊則綪結佩鄭氏曰綪屈也結又屈之思神靈不在事也盖齊所以致精眀之徳佩既結矣又從而屈之不以徴角宫羽之聲散其志也況敢聴樂乎儀禮之陳服器有順有䋫順則直䋫則屈故士喪禮陳襲事于房中西領南上不綪陳衣于房南領西上綪士虞禮曰器西南上綪既夕禮乃奠豆南上綪爼二南上不綪鄭氏曰綪讀為䋫䋫屈也江沔之間謂縈收繩索為䋫男子事佩左五右六婦人事佩左五右六詩芄蘭曰童子佩觽童子佩韘瞻彼洛矣曰鞞琫有珌公劉曰鞞琫容刀内則曰子事父母左佩紛帨刀礪小觿金燧右佩玦捍管遰大觿木燧婦事舅姑如事父母左佩紛帨刀礪小觿金燧右佩箴管線纊施縏袠大觿木燧詩曰無感我帨兮又曰佩其象揥士昏禮毋施衿結帨玉藻曰君在不佩玉左結佩右設佩鄭氏曰世子出所處而君在焉則去徳佩而設事佩結其左者若於事未有能焉古者有徳佩有事佩徳佩則左右皆玉事佩則左紛帨右玦捍之類左佩皆有五右佩皆六以左陽而奇右隂而偶故也左佩者小右佩者大以左手足不如右强故也先設事佩次加徳佩以事成而下徳成而上故也詩言佩觿佩韘乃言容兮遂兮是先設事佩後設徳佩也君在不設佩左結佩右設佩居則設佩朝則結佩鄭氏以為世子之禮是也臣於君所佩必垂委而相必鳴玉是與世子之禮異也考之内則男女未冠笄衿纓佩容臭而已則佩者成人之服也衛詩以恵公驕而無禮故譏以童子佩觿童子佩韘以言無成人之徳而服成人之服也子衿詩曰青青子佩盖亦指成人者言禮書卷二十
