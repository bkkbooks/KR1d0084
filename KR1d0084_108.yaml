body:
  text: 禮書卷一百九宋陳祥道撰祭侯禮射人祭侯則為位鄭氏曰祭侯獻服不服不以祭侯為位為服不受獻之位也鄉射司馬洗爵升實之以降獻獲者于侯薦脯醢設折俎俎與薦皆三祭獲者負侯北靣拜受爵司馬西靣拜送爵獲者執爵使人執其薦與俎從之適右個設薦俎籩在東豆在西俎當在北獲者南靣坐左執爵祭脯醢執爵興取肺坐祭遂祭酒興適左個中皆如之左個之西北三步東靣設薦俎獲者薦右東靣立飲不拜既爵司馬受爵奠于篚復位飲獲者執其薦使執俎從之辟設于乏南獲者負侯而俟鄉射記曰獲者之俎折脊脅肺臑東方謂之右個大射司宫尊俟于服不之東北兩獻酒東靣南上設洗于尊西北篚在南東肆實一散于篚司馬正洗散遂實之獻服不服不侯西北三步北靣拜受爵至服不復負侯而俟祭侯獻獲者獲者以祭侯獲者北靣拜受爵乃適右個左個中南靣而祭侯終則左個之西北三步東靣而卒爵其祝辭則天子之禮曰惟若寧侯母或若女不寧侯不屬于王所故抗而射女强飲强食詒女曾孫諸侯百福諸侯以下之祝不可考也其薦俎則鄉射大射薦有脯醢俎有折脊脅肺臑天子之禮不可考也其籩豆之設則籩在東豆在西俎當在北其祭則獲者執其薦使人整俎從之設于乏南然後負侯而士卒爵不就乏者明其享侯之餘也既祭薦俎設于乏南而不於左個之三步者即其所有事之位也獲者北靣受爵司馬西靣拜送爵不北靣者避正主也獲者左執爵右祭薦俎而不奠爵者不備禮也鄉射獲者以鄉人大射以服不鄉射獲者負侯受爵大射服不俟西北三步受爵尊卑異也然射人祭侯為位則三祭與獲者受爵之位也鄉射記獲者之俎皆有祭則脊脅肺臑皆有大以祭也鄭氏謂位者獲者受爵之位皆有祭皆獲者也祭祭肺者也其說拘矣皆有祭與公食大夫庶羞皆有大少儀魚皆有膴同楅鄉射主楅猶楅也所以揚笴齊矢也兩端為龍首中央為蛇身髹赤黑漆韋當鄉射記注云直心背之晢當以丹韋為之鄉射記曰楅長如笴博三寸厚寸有半龍首其中蛇交韋當楅髹橫而奉之南靣坐而奠之南北當洗鄉射司射既請射降自西階階前西靣命子弟納射器射器弓矢决拾旌中籌楅豐乃納射器皆在堂西三耦卒射司馬降自西階北靣命弟子設楅乃設楅于中庭南當洗東肆東肆統於賔弟子取矢北靣坐委于楅北括司馬當楅南北靣坐左右撫矢而乘之手撫而四數分之也既射弟子退楅獲者退中與算大射司射請射有司總衆弓矢楅皆適次而俟三耦卒射小臣師設楅既設楅小臣坐委矢于楅楅北括司馬師坐乘之三耦既拾取矢捆之齊等之也卒射小臣師退楅巾車量人解左下綱鄉射記曰楅長如笴博三寸厚寸半龍首其中蛇交韋當髹之蓋兩端龍首所以限矢也其中蛇交所以安矢也韋當所以分矢也鄭氏曰司馬左右撫矢而乘之分委於當賈公彥曰未分則總委於當既分則四四在旁大射三耦既拾取矢捆之所以齊矢也夫楅之楅矢蓋猶福衡之楅牛考之於禮奉楅者坐奠委矢者坐委乘矢者坐撫取束矢者坐脫則楅卑而無足可知舊圖楅有足誤矣物以丹為黑度尺而午鄉射記射自楹間物長如笴其間容弓距隨長武序則物當棟堂則物當楣鄉射司射升當揖豫則鉤楹內堂則由楹外當左物北靣揖鉤楹繞楹而東也左物下也及物揖左足履物不方足還視侯中俯正足方猶并也又曰上射揖下射並行皆當其物北靣揖及物揖皆左足履物還視侯中合足而俟乃射又曰司馬升自西階鉤楹自右物之後立于物間西南靣揖弓命取矢乃出于左物之南還其後降自西階大射既三獻有司納射器工人士與梓人升自北階兩楹之間疏數容弓若丹若墨度尺而午射正蒞之一從一橫曰午謂畫物也卒畫自北階下司弓掃所畫物燕禮君與射則為下射樂作而後就物既發則小臣受弓以授弓人上射退于物一笴既發則答君而俟答對也物者則之所自出也射之所履不過乎物故位謂之物左為下物右為上物其畫也若丹若墨其設也兩楹之間於序則當棟於堂則當楣弓長六尺而兩楹之間容弓笴長三尺而物如笴武長尺有二寸而距隨長武一縱一橫縱長而橫短此所謂度尺而午也前足至物之左端後足合而隨之此所謂距隨也凡射及物則揖履物則先左足先左足以正其位還視侯中以審其的然後俯正而侯此所謂以志正體直可以祈中矣禮書卷一百九
