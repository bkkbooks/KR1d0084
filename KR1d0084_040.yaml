body:
  text: 禮書卷四十宋陳祥道撰湯沐之邑王制曰方伯為朝天子皆有湯沐之邑於天子之縣内視元士給齊戒潔清之田浴用湯沐用潘春秋桓二年鄭伯以璧假許田左氏曰鄭人請復祀周公卒易祊田三月鄭伯以璧假許田為周公祊故也榖梁曰假不言以言以非假也非假而曰假諱易地許田地者魯朝宿之邑也邴者鄭伯之所受命而祭泰山之邑用見魯之不朝於周而鄭之不祭泰山也泰山非鄭境内從天王廵狩受命而祭也公羊曰許田者何魯朝宿之邑也諸侯時朝乎天子天子郊諸侯皆有朝宿之邑此魯朝宿之邑也則曷為謂之許田諱取周田也曷為謂之許近許也此邑也其稱田何田多邑少稱田邑多田少稱邑諸侯來朝當有所住止故賜邑於逺郊其實天子地諸侯不得專也桓公專以與鄭背叛當誅故深諱之若暫假借定四年召陵之㑹衛祝鮀私於萇𢎞曰衛取於有閻之土以共王職有閻衛所受朝宿邑取於相土之東都以㑹王之東蒐為湯沐邑周本紀曰鄭怨桓王與魯易許田許田天子之用事泰山田也魏公子傳公子無忌留趙趙王以鄗為公子湯沐邑湯沐朝宿之邑也不曰朝宿而曰湯沐者齋戒以見君也古者諸侯於王畿有朝宿之邑泰山有湯沐之邑王制曰方伯為朝天子皆有湯沐之邑於縣内視元士則凡非方伯其邑不得視元士也不然諸侯湯沐之邑多矣盡王畿其足以容之乎許田魯侯湯沐之邑也祊鄭伯從祭泰山湯沐之邑也邑非諸侯之所得專魯鄭專而易之此春秋所以譏也昔祝鮀盛稱魯衛晋國之封而衛有湯沐之邑則湯沐之邑豈諸侯之所均也漢諸侯皆有邸於京師武帝令諸侯各治邸泰山下葢先王之遺制也先王之時湯沐邑皆有所賦漢初民無葢藏高祖於是省禁輕租自天子以至封君湯沐邑皆各為私奉養不領於天子之經費見食貨志夏世室堂修二七廣四修一五室三四歩四三尺九階四旁兩夾窻白盛門堂三之二室三之一商重屋堂修七尋堂崇三尺四阿重屋與夏世室同而其屋兩重耳周明堂度九尺之筵南北七筵堂崇一筵五室凡室二筵考工記曰夏后氏世室堂修二七廣四修一五室三四歩四三尺九階四旁兩夾窻白盛門堂三之二室三之一殷人重屋堂修七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵鄭氏曰世室宗廟也重屋者王宫正堂若大寢也明堂者明政教之堂此三者或舉宗廟或舉王寢或舉明堂互言之以明其同制月令孟春天子居青陽左个青陽左个大寢東堂北徧仲春居青陽太廟東堂當大室季春居青陽右个東堂南徧孟夏居明堂左个大寢南堂東徧也仲夏居明堂太廟明堂云廟南堂當大室也季夏居明堂右个南堂西徧也中央居太廟太室中央室也孟秋居總章左个大寢西堂南徧仲秋居總章太廟西堂當大室也季秋居總章右个西堂北徧孟冬居𤣥堂左个北堂西徧也仲冬居𤣥堂太廟北堂當太室季冬居𤣥堂右个北堂西徧明堂位昔者周公朝諸侯于明堂之位天子負斧依南嚮而立三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西面之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世告至此周公明堂之位也明堂者明諸侯之尊卑也又曰太廟天子明堂詩曰我將祀文王於明堂孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝月令季秋大饗帝唐月令九月大享於明堂樂記祀乎明堂而民知孝祭義祀乎明堂所以敎諸侯之孝也玉藻曰天子聴朔於南門之外閏月則闔門左扉立于其中南門謂國門也天子廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聴朔焉卒事反宿路寢亦如之閏月非常月也聴其朔於明堂門中還處路寢門終月左傳曰勇則害上不登於明堂孟子稱齊宣王問曰人皆謂我毁明堂毁諸已乎孟子曰夫明堂者王者之堂也王欲行王政則勿毁之矣家語曰孔子觀於明堂觀四門墉有堯舜桀紂之象各有善惡之狀廢興之誡荀子强國篇曰雖為之築明堂於塞外而朝諸侯使殆可也孔頴達曰孝經緯云明堂在國之陽又異義淳于登說明堂在三里之外七里之内故知南門亦謂國城南門也在國之陽丙巳之地三里之外七里之内水木用事交於東北木火用事交於東南火土用事交於中央金土用事交於西南金水用事交於西北周人明堂五室帝一室大戴禮盛徳篇云明堂九室室有四户八牕三十六户七十二牖葢之以茅上圜下方其外水名辟雍明堂月令說曰堂髙三丈東西九仞南北七筵九室十二堂四户八牗宫三百歩在近郊三十里又云堂方百四十四尺坤之䇿也屋圜徑二百一十六尺乾之策也太廟明堂方三十六丈通天屋徑九丈隂陽九六之變且圜葢方載六九之道也八闥以象八卦九室以象九州十二宫以應十二辰三十六户七十二牖以四户八牖乘九十之數也户皆外設而不閉示天下不藏也通天屋高八十一尺黄鍾九九之實也二十八柱列於四方亦七宿之象也堂高三尺以應三統四鄉五色各象其行外博二十四丈以應節氣也又戴徳云明堂辟雍是一物周禮孝經説以明堂為文王廟左傳魯僖公五年既視朝遂登觀䑓服氏云人君入太廟視朔天子曰靈䑓諸侯曰觀䑓在明堂之中文公二年服氏云明堂祖廟並與鄭説不同鄭注玉藻云天子廟及路寢皆如明堂制即鄭意以為三者名異而同制云小學在公宫之左大學在郊即云天子曰辟雍是學不得與明堂同為一物又天子宗廟在雉門之外孝經緯云明堂在國之陽玉藻又云聴朔於南門之外是明堂與宗廟别處不得為一也蔡邕明堂章句云明堂者天子太廟所以宗祀周謂明堂東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室人君南面故主以明堂為名在其五堂之中央皆曰太廟饗射養老教學選士皆於其中故言其正室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四時之學則曰大學取其周水圜如璧則曰辟雍雖各異名而事實一也袁准正論明堂宗廟太學事義同各有所為而代之儒者合為一體取詩書放逸之文經典相似之語推而致之考之人情失之逺矣宗廟之中人所致敬幽隐清淨鬼神所居而使衆學處焉饗射於中人鬼慢黷死生交錯囚俘截耳瘡痍流血以干鬼神非其理也茅茨采椽至質之物建日月乘玉輅以處其中非其類也夫宗廟鬼神之居而祭天於人鬼之室非其處也王者五門宗廟在一門之内若在廟而張三侯又辟雍在内人物衆多非宗廟之中所能容也如准所論與鄭義合或以周時徳澤洽和蒿茂以為宫柱名蒿宫此天子之路寢也吕氏春秋曰茅茨蒿柱土階三等漢武帝封泰山泰山東北阯有古時明堂處儉不敝上欲理明堂奉高旁未曉制度濟南公玉帶上黄帝時明堂圖其制中有一殿四面無壁以茅葢通水水圜宫垣為複道上有樓從西南入名崑崙天子從之以拜祀上從之隋無明堂而季秋大享嘗寓雩壇唐高祖太宗時寓于圜丘貞觀中禮部尚書豆盧寛國子助教劉伯莊議從崑崙道上層以祭天下層以布政而太子中允孔頴逹以為非侍中魏徵以謂五室重屋上圜下方上以祭天下以布政自前世儒者所言雖異而為如此者多同至於高下廣狹丈尺之制可以因事制宜也秘書監顔師古曰周書叙明堂有應門雉門之制以此知為王者之常居爾其青陽總章𤣥堂太廟左右个皆路寢之名也文王居明堂之偏帶弓韣禮高禖九門磔禳國有酒以合三族推其事皆與月令合則皆在路寢也大戴禮曰在近郊又曰文王之廟也此奚足以取信哉且門有臯庫豈得施於郊野謂宜近在宫中徵及師古等皆當世名儒其論止於此高宗時改元總章分萬年置明堂縣示欲必立之而議者紛然或以為五室或以為九室而高宗依兩議以帟幕為之與公卿臨觀而議益不一乃下詔率意班其制度至取象黄琮琮上設鴟尾其言益不經而明堂亦不能立至則天始毁東都乾元殿以其地立明堂制度淫侈無復可觀皆不足紀其後火焚之既而又復立開元五年𤣥宗遣將作大匠康䛒素毁之䛒素以為勞人乃去其上層易以真瓦而迄唐之世季秋大饗皆寓圜丘明堂之名見於周頌孝經左傳孟子荀卿考工記禮記家語其制不見於經特考工記曰夏后氏世室堂修二七廣四修一五室三四歩四三尺九階四旁兩夾窻白盛門堂三之二室三之一商人重屋修七尋堂崇三尺四阿重屋周人明堂度九尺之筵凡室二筵此三代明堂之别也南北為修東西為廣夏堂修二七則十四歩也其廣益以四分修之一則十七歩有半也室三四歩四角室各三歩也四三尺則東西益廣各三尺而中四尺也以此計之南北室各一丈八尺與大室二丈四尺則六丈也東西室亦一丈八尺而各益三尺大室亦二丈四尺而益四尺則七丈也門堂三之二以堂修之十四歩三分取二而南北九歩二尺矣堂廣十七歩者半三分取二而東南十一歩四尺矣夏世室商重屋周明堂則制漸文矣夏度以步商度以尋周度以筵則堂漸廣矣夏言堂修廣而不言崇商言堂修而不言廣言四阿而不言室周言堂修廣崇而不言四阿其言葢皆互備鄭康成曰夏堂崇一尺商堂廣九尋理或然也月令中央太室東青陽南明堂西總章北𤣥堂皆分左右个與太廟則五室十二堂矣明堂位前中階阼階賔階旁四門而南門之外又有應門則南三階東西北各二階而為九階矣考工記五室九階葢木室於東北火室於東南金室於西南水室於西北土室於中央其外别之以十二堂通之以九階環之以四門而南門之外加以應門此明堂之大略也大戴禮白虎通韓嬰公玉帶淳于登桓譚鄭康成蔡邕之徒其論明堂多矣特淳于登以為在國之陽三里之外七里之内其説葢有所傳然也何則聴朔必於明堂而玉藻曰聴朔於南門之外則明堂在國之南可知成王之朝諸侯四夷之君咸列四門之外而朝寢之間有是制乎則明堂在國之外可知然大戴謂九室三十六户七十二牖上圜下方公玉帶謂為一殿居中覆之以茅環之以水設之以複道通之以樓鄭康成謂明堂太廟路寢異實同制康成以春秋書世室屋壞明堂位稱魯公之廟文世室武公之堂武世室則以考工記所謂世室為廟重屋為寢或舉王寢或舉明堂互言之蔡邕謂明堂太廟辟雍同實異名其豈然哉諸侯之廟見於公食大夫有東西房東西夾而巳天子路寢見於書亦東西房東西夾又東序西序東堂西堂而巳則太廟路寢無五室十二堂矣謂之明堂太廟路寢異實同制非也宗廟居雉門之内而教學飲射於其中則莫之容處學者於鬼神之宫享天神於人鬼之室則失之瀆袁准嘗攻之矣則謂之明堂太廟辟雍同實異名非也彼葢以魯之太廟有天子明堂之飾晉之明堂有功臣登享之事乃有同實異實之論是不知諸侯有太廟無明堂特魯放其制晉放其名也四時之氣春為青陽夏為朱明秋為白藏冬為𤣥英則青者春之色春者陽之中故春堂名之總者物之聚章者文之成故秋堂名之明者萬物之相見𤣥者萬物之復本故冬夏之堂名之左右之堂曰个以其介於四隅故也中之堂曰太廟以其大享在焉故也古者鬼神所在皆謂之廟書與士虞以嬪宫為廟則大享在焉謂之太廟可也明堂之作不始於周公而武王之時有之記曰祀乎明堂而民知孝是也不特建之於内而外之四岳亦有之孟子之時齊有泰山之明堂是也荀子强國篇曰雖為之築明堂於塞外而堂朝諸侯使殆可也漢有奉高明月令言明堂之制則然其言四時乘異路載異旂衣異衣用異器則非也明堂位言朝諸侯於明堂則然其言周公踐天子之阼負扆而受朝則非也何則王者迎五氣則於東南西北之四郊禮六神則以蒼黄青赤白𤣥之牲玉象四時以廵岳順閏月以居門而天地之間罔不欽若則十二月之異堂聴朔不為過也若夫車旂之辨見於巾車司常衣冠之等見於弁師司服皆無四時之異禮運曰五色十二衣旋相為質郎顗曰王者隨天自春徂夏改青服絳非古制也書曰周公位冡宰正百工詩序曰周公既成洛邑朝諸侯乃率以祀文王葢成王宅憂周公位冡宰而百工總巳以聴焉及既成洛邑輔成王以朝諸侯詩序言朝諸侯乃率以祀文王則朝不在廟而在明堂可知也若曰周公代之而受朝則誤矣且周公之東征也稱王命然後徃其居東也俟王察已然後復則周公事成王如此孰謂敢代之乎代之之説始於荀卿盛於漢儒於是以復子明辟為還政之事以誕保文武受命惟七年為還政之時是皆不知書者也禮書卷四十
