body:
  text: 禮書卷八十三宋陳祥道撰隂厭陽厭隂厭陽厭特牲禮主婦薦豆設敦鉶主人及佐食宗人設鼎俎祝洗酌奠于鉶南主人再拜然後祝出迎尸少牢亦薦豆設敦設鼎俎祝酌奠主人再拜然後祝出迎尸則未迎尸之前隂厭也有司徹卒𧃊有司官徹饋饌于室中西北隅南靣如饋之設右几厞用席納一尊于室中則尸謖之後陽厭也鄭氏曰陽厭殺無𤣥酒隂厭西南奧陽厭西北漏奧室之暗故曰隂漏室之白故曰陽隂厭席東靣陽厭席南靣禮記曰攝主不厭祭又曰祭殤必厭蓋弗成人也祭成喪而無尸是殤之也成人之後雖婚而無子孫與未成人同又曰宗子為殤而死庶子弗為後也祭殤不舉無胙俎無𤣥酒不告利成是謂隂厭凡殤與無後者祭於宗子之家當室之白尊于東房是謂陽厭蓋祭殤之禮有於隂厭之者有於陽厭之者鄭康成曰祭適殤於廟之奧謂之隂厭王子公子祭適殤於其黨之廟大夫以下祭殤於廟子之家皆當室之白謂之陽厭是宗子而殤有隂厭無陽厭庶子之適為凡殤有陽厭無隂厭若夫成人之祭迎尸之前設奠於奧謂之隂厭尸謖之後改饌於西北隅謂之陽厭儀禮特牲有隂厭有陽厭少牢有隂厭無陽厭蓋天子諸侯上大夫正祭有隂厭繹祭有陽厭下大夫與士無賔尸之繹則隂厭陽厭設於祭之日而巳庶子攝祭不厭鄭氏以為不陽厭者以曽子問先言不厭而繼之以不旅不假不綏祭不配皆逆陳其祭末者則不厭為陽厭可知也夫尸所以象神也厭所以飫神也殤之有厭為其無尸故也正祭有厭為其尸不存故也上大夫而上正祭無陽厭不敢遽飫之也攝祭無陽厭不敢飫之也適殤有隂厭則其禮詳庶殤有陽厭則其禮略觀隂厭尊有𤣥酒陽厭納一尊而巳隂厭備鼎爼陽厭爼釋三個而巳特牲禮則陽厭之略可知也綏祭尸主人主婦皆挼祭士虞尸右執奠特牲尸左執觶則右手隨祭也祭皆於豆間既祭守祧藏之周官大祝隋釁令鍾鼓小祝大祭祀贊隋守祧既祭藏其隋儀禮士虞祝命佐食隋祭佐食取黍稷肺祭授尸特牲祝命尸挼祭之尸取菹擩于醓祭于豆間佐食授主人挼祭主婦則佐食挼祭主婦撫之少牢尸受肺與黍同祭于豆間主人佑受佐食綏祭坐祭之主婦亦受佐食綏祭祭之禮記特牲曰祭黍稷加肺報隂也曾子問曰攝主不厭不綏鄭康成謂下祭曰隋則隋與春秋傳所謂隋成之隋同周官與士虞作隋少牢與禮記作綏特牲作挼其實一也隋祭所以祭鬼神之物猶生者之飲食必祭也其物黍稷與肺其樂鍾鼓贊之以祝祭之以佐食藏之以守祧儀禮有司曰司宮婦掃祭先儒謂掃豆間之祭埋之西階東而尸與主人主婦皆有是禮則尸既舉奠而綏祭祭神食也主人受祚而綏祭尸食也少牢主婦受祭於佐食而祭之特牲主婦祭以佐食而撫之以士卑而禮簡故也攝主不綏士虞無尸不綏以攝與尸非備文故也周人所祭莫先於肺天子諸侯或隋於堂上或隋於室中固不可考要之皆先祭肺而巳鄭康成以禮記云詔祝於室坐尸於堂前謂朝事延尸於户西南靣布主席東靣取牲膟膋燎于爐炭洗肝于鬱鬯而燔之入以詔神於室又出以隋于主前主人親制其肺所謂制祭也其說無據受嘏禮運曰修其祝嘏正義曰祝以主人之辭饗神嘏謂祝以尸之辭致福而嘏主人祝以孝告嘏以慈告天子祭天地諸侯祭社稷祝嘏莫敢易其常古祝嘏辭說藏於宗祝巫史非禮也宣祝嘏辭說郊特牲嘏長也大也曾子問攝主不厭祭不旅不假不綏祭不配假當作嘏不嘏避正主也周禮膳夫凡王祭祀賔客食徹王之胙爼正義曰胙爼若特牲少牢主人受尸酢尸東西靣主人爼於席前尸酢禮亦然司几筵凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几祀先王昨席亦如之昨讀如酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於是席王於户內諸臣致爵乃設席正義曰知席王在户內者約特牲主人受酢時在户內之東西靣也鬱人大祭祀與量人受舉斚之卒爵而飲之儀禮特牲饋食尸九飯主人酳尸祝酌授尸尸以酢主人主人拜受角尸拜送主人退佐食受挼祭主人坐左執角受祭祭之祭酒啐酒進聽嘏佐食摶黍稷授祝祝受尸尸受以菹豆執以親嘏主人主人左執角再拜稽首受復位尸懷之實于左袂挂于季指卒角拜尸答拜主人出寫嗇于房祝以籩受實于左袂挂祛以小指者便卒角也變黍言嗇因事託戒欲其重稼嗇也主婦酌亞獻尸尸酌如主人儀賔三獻如初少牢饋食禮尸十二飯主人酳尸祝酌授尸尸酢主人上佐食以綏祭二佐食各取黍于一敦上佐食兼受摶之以授尸尸執以命祝卒命祝祝受以東北靣于户西以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉壽萬年勿替引之主人坐奠爵興再拜稽首興受黍坐振祭嚌之尸懷之實于左𬒮挂于季指執爵以興坐卒爵執爵以興坐奠爵拜尸答拜執爵以興出宰夫以籩受嗇黍主人嘗之納諸內書王受同瑁三宿三祭三咤王受瑁為主受同以祭禮成于三故酌者實三爵於王三進爵三祭酒三奠爵上宗曰饗祭必受福讃王曰饗福酒太保盥以異同秉璋以酢半圭曰璋臣所奉王巳祭太保又祭報祭曰酢太保受同祭嚌太保既拜而祭既祭受福嚌至齒則王亦至齒王言饗太保言嚌互相備詩天保君曰卜爾萬壽無疆神之弔矣詒爾多福楚茨工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式梁天監五年明山賔議請郊廟受福唯皇帝再拜明上靈降祚臣下不敢同也詔依其議唐開元開寶禮及儀注熙寧祀儀天子親祠而亞終獻飲福有司攝事而太尉飲福受祚祝以孝告其辭說則少牢饋食祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歲事于皇祖伯某以某妃配某氏尚饗之類是也嘏以慈告其辭說則少牢饋食祝曰皇尸命工祝承致多福無疆于女孝孫來汝孝孫來與賚同鄭氏作釐使女受祿于天宜稼于田眉壽萬年勿替引之之類也其儀則士禮佐食摶黍授祝祝授尸尸受以菹豆執以親嘏主人左執角再拜稽首受復位尸懷之實于左袂挂于季指卒角拜尸答拜主人出寫嗇于房祝以籩受大夫禮二佐食各取黍于一敦上佐食兼受摶之以授尸尸執以命祝祝受以東北靣于户西以嘏于主人主人坐奠爵興再拜稽首興受黍坐振祭嚌之尸懷之實于左𬒮挂于季指執報爵以興坐卒爵拜尸答拜執爵以興出宰夫以籩受嗇黍主人嘗之納內蓋士賤而禮簡故佐食摶黍授祝祝授尸尸執而親嘏之大夫貴而禮繁故佐食兼受二敦黍摶之以授尸尸執以命祝嘏之士執角受之尸懷而不嘗大夫奠爵受之坐祭嚌之乃尸懷之而又嘗其實于左𬒮所以便執爵也以𬒮挂于季指所以便卒爵也其受皆於主人酳尸之後而主婦亞獻賔三獻不與焉特授尸酢爵而巳曾子問攝主不嘏以明福在主人非攝者所可受也梁明山賔議請郊廟受福惟皇帝再拜明上靈降祚臣不敢同也其言頗合禮意唐開元開寶禮天子親祠而亞終獻飲福有司攝事而太尉飲福然受尸酢爵謂之飲酢可也謂之飲福非也以為飲福非古遂廢受酢之禮此又全失獻酢往來之道也古者受福雖在皇尸飯酳之後然主人受酢受福皆同時其後繼之以亞獻終獻加爵無嫌乎受福太蚤也今親祠儀注亞獻終獻行禮巳訖然後禮官前導皇帝飲福受胙而亞獻終獻無復與於酢爵恐非禮意禮書卷八十三
