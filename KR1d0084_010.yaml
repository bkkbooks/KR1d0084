body:
  text: 禮書卷十宋陳祥道撰惰游冠縞冠素紕其制厭垂緌五寸玉藻曰縞冠素紕垂緌五寸惰游之士也玉藻縞冠素紕既祥之冠也小記曰除成喪者其祭也朝服縞冠葢士之失位曰喪人其服飾則素衣其相見則弔惰游失業之士也縞冠素紕垂緌五寸宜矣先王之於民縣正趨其稼事而賞罰之載師凡宅不毛者有里布田不耕者出屋粟無職事者出夫家之征閭師不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰夫旌之以賞困之以罰阨之以禁亦已至矣又垂緌五寸所以深激而勸之也周官司宼以野刑上功紏力士師有野禁漢世有田律然則縞冠素紕垂緌五寸葢野刑之類也不齒冠𤣥冠縞武周禮大司冦以圜土聚教罷民凡害人者寘之圜土而施職事焉以明刑恥之其能改者反于中國不齒三年其不能改而出圜土者殺司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舎中罪二年而舎下罪一年而舎其不能改而出圜土者殺雖三年不齒不齒者不得以年次列於平民王制將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉屏之逺方西方曰棘東方曰寄終身不齒玉藻曰𤣥冠縞武不齒之服也惰游之責輕於不齒縞冠素紕垂緌五寸重於𤣥冠縞武惰游之辱則重而不齒之辱則輕何也葢惰游者一時之過不齒之辱不特一時而已苟變惰游以趨職事則縞冠垂緌棄之可也若夫𤣥冠縞武或服之終身或服之三年先王豈忍重其辱於悠久哉然則以重馭暫義也以輕馭久仁也義故民畏其威仁故民懐其徳夫是孰不勵業而遷善乎子姓之縞冠𤣥武則凶其上不齒之𤣥冠縞武則凶其下凶其上以父之有服故也凶其下以下之自貽故也大白冠其制厭不緌喪禮成服布冠小祥練布冠大祥縞冠布冠春秋傳所謂大白之冠是也縞冠詩所謂素冠是也雜記曰喪冠條屬以别吉凶又曰大白冠緇布之冠不㽔委武𤣥冠而後㽔是條屬則不委武不委武則不㽔委武𤣥縞而後㽔則玉藻所謂大帛不緌者乃雜記所謂大白也鄭氏以帛為白於說是也黄冠黄衣記曰皮弁素服而祭素服以送終也葛帯榛杖喪殺也黄衣黄冠而祭息田夫也野夫黄衣黄冠草服也然則皮弁素服而祭者蜡祭四方百物也黄衣黄冠而祭者臘先祖五祀也蜡以息老物故服送終之服而以皮弁素服葛帯榛杖臘以息民故服田夫之服而以黄衣黄冠然周禮司服王祭羣小祀則𤣥冕鄭氏曰羣小祀林澤墳衍四方百物之屬也大宗伯以疈辜祭四方百物鄭氏曰四方百物碟禳及蜡祭也王於蜡服𤣥冕而有素服與黄冠者葢執事者之服歟史記堯有黄收漢有黄頭郎葢黄收冕也黄頭賤者之㡌也深衣鄭氏云用五十升布鍜濯灰治葢以雜記朝服十五升深衣其類也故云然王制曰有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老商人冔而祭縞衣而養老周人冕而祭𤣥衣而養老凡養老之服皆其時與羣臣燕之服玉藻曰諸侯夕深衣祭牢肉又曰朝𤣥端夕深衣深衣三袪謂大夫士也縫齊倍要衽當旁袂可以回肘長中繼揜尺其為長衣中衣則繼袂揜一尺若今襃矣深衣則縁而已袷二寸曲領也袪尺二寸袂口也縁廣半寸飾邊也檀弓曰將軍文子之喪既除喪而後越人来弔主人深衣練冠待于廟曽子問喪車在塗而壻之父母死女改服布深衣縞總深衣曰古者深衣葢有制度以應規矩繩權衡短母見膚長母被土續衽鉤邊要縫半下袼之髙下可以運肘袂之長短反詘之及肘帯下母厭髀上母厭脅當無骨者制十有二幅以應十有二月袂圜以應規曲袷如矩以應方袷交領也古者方領如今小兒衣領負繩及踝以應直下齊如權衡以應平故規者行舉手以為容負繩抱方者以直其正方其義也故易曰坤六二之動直以方也下齊如權衡者以安志而平心也五法已施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂縁純邊廣各寸半雜記大夫卜宅與葬日有司麻衣布衰麻衣布深衣而著哀焉此服非純吉亦非純凶也詩曰麻衣如雪鄭氏曰麻衣深衣諸侯之朝服夕則深衣間傳曰大祥素縞麻麻衣十五升布深衣也喪服記公子為其母練冠麻衣縓縁麻衣者如小功布深衣為之制衰裳變服是也鄭氏曰續衽鉤邊者鉤讀如鳥喙必鉤之鉤鉤邊若今曲裾也曲袷者祫交領也古者方領如今小児衣領孔頴達曰領廣二寸方折為之嚮下交垂鄭云似擁咽若今小児衣領但方折之也以其方領謂抱方漢江充傳曰充衣紗縠禪衣曲裾後垂交輸如淳曰交輸割正幅使一頭狹若燕尾垂之兩旁見於後是禮深衣續衽鉤邊蘇林曰交輸如今新婦袍上挂全幅繒角割名曰交輸裁也廣川惠王傳曰姬榮愛為廣川王去刺方領繡服䖍回如今小児郤襲衣也頸下施衿領正方直晉灼曰今之婦人直領也繍為方領上刺作黼黻衣王莾傳曰有人著赤繢方領上服也馬援𫝊曰朱勃衣方領能矩步頸下施衿領正方學者之服晉及隋唐天子冠通天冠白假帯方心曲領深衣視肘以為袂殺袂以為袪三袪以為要倍要以縫齊丈四尺七寸續衽鉤邊則曲而當旁前後交合矣縁廣寸半則純緆表裏共三寸矣袂圜以應天袷方繩直以應地幅十二以應時及其歸也要在安志平心而巳此所以下齊如權衡以應平也具父母大父母純以繢備五采以為樂也具父母純以青體少陽以致敬也孤子純以素存凶飾以致哀也先儒謂無父母有祖父母亦純以青孤子純以素小功純以縓則大祥縁以布吉時夕服縁以采矣虞夏商周養老皆以燕服又周大夫士之於私朝朝𤣥端夕深衣庶人吉服深衣而已則深衣在虞為燕服在周以為夕與喪服以至大夫士庶人皆服焉此所謂可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也葢文事則有冕弁服武事則有韋弁服而深衣次之先儒以善衣為朝祭之服葢舉一端明之也然則深衣所以異於餘服者餘服上衣下裳而不相連深衣則衣裳連矣餘服幅前三後四深衣則十二幅矣餘服之帯三分帯下紳居二焉由帯以下四尺五寸深衣之帯則當無骨者矣爾雅曰裳削幅謂之襆郭氏曰削殺其幅深衣之裳然喪裳亦削幅則凡裳皆然不特深衣而已深衣曲袷如矩則其領方而巳鄭氏謂如小児衣領服䖍釋漢書謂如小兒郃襲衣而後世遂制方心曲領加於衣上非古制也長衣制如深衣其袂長玉藻言深衣袂可以回肘長中繼揜尺其為長衣中衣則繼袂揜一尺若今襃矣深衣則縁而已雜記大夫筮宅則史練冠長衣以筮占者朝服謂下大夫若士也筮史筮人也長衣深衣之純以素也長衣綀冠純凶服也朝服純吉服也聘禮遭喪將命于大夫主人長衣練冠以受遭主國喪大夫攝主人長衣素純布衣也去哀易冠不以純凶接純吉也鄭氏禮記目録云深衣連衣裳而純之以采者有表則謂之中孔頴達曰中衣之制與深衣同其異者中衣之袖小長耳玉藻言深衣之制而間以長中繼揜尺深衣與長中同制異飾連裳方袷直繩旁衽以至裳十二幅要三袪縫齊倍要之類此其所同也深衣之純以采若素長衣之純素而已中衣之飾繡黼丹朱而與長衣又繼揜尺焉所謂揜尺者幅廣二尺二寸以半幅繼袂之末揜餘一尺長衣之揜以布中衣揜或素若布各象其衣然也若深之則縁而巳此其所異也葢以其衣裳邃焉故謂之深衣以其袪襃長焉故謂之長衣以其有表而在中焉故謂之中衣聘禮遭君夫人世子之喪將命于大夫主人長衣練冠以受喪服小記大夫士筮宅史練冠長衣以筮則聘禮不以凶服接吉而筮不以吉服卜凶是長衣所施趨於凶而非純凶也禮書卷十
