body:
  text: 禮書卷九十九宋陳祥道撰觥觥亦作觥詩卷耳七月桑扈絲衣言兕觥則觥角爵也周官閭胥掌其比觥撻罰之事小胥觥其不敬者則觥罰爵也先儒謂其受七升以兕角為之無兕則刻木為之如兕角然其用則饗燕鄉飲賔尸皆有之七月言朋酒斯饗稱彼兕觥春秋之時衛侯饗晉成叔而寧惠子歌兕觥其觩則饗有觥也鄭人燕趙孟穆叔子皮而舉兕爵是燕有觥也閭胥掌比觥是鄉飲有觥也絲衣言兕觥是賔尸有觥也蓋燕禮鄉飲酒大夫之饗皆有旅酬無算爵于是時也用觥龍勺疏勺蒲勺彛巾以畫布而勺有飾明堂位曰灌尊龍勺疏勺蒲勺是也尊巾以疏布而勺無飾禮器曰犧尊樿杓以素為貴是也樿白理木也與喪士素勺異矣龍勺刻之以龍也疏勺刻而疏之也蒲勺刻之以蒲也疏勺蓋與疏七疏屏疏渠眉之象同蒲勺蓋與蒲璧之象同龍水畜也疏水道也蒲水物也勺所以㪺齊酒明水故其飾如此考工記曰梓人為飲器勺一升爵一升儀禮加勺于尊皆南枋則杓者北靣也每尊皆加勺則尊不共勺也鄭康成曰蒲勺如鳬頭不可考也斗詩大東曰維北有斗不可以挹酒漿又曰維北有斗西柄之揭行葦曰酒醴維醹酌以大斗毛氏曰大斗長三尺正義曰長三尺謂其柄也漢禮器制度注勺五升徑六寸長三尺是也蓋從大器挹之于樽用此勺耳其在樽中不當用如此之長勺也蓋斗亦謂之勺勺非斗也勺挹于樽彛而注諸爵瓚斗挹于大器而注諸尊彛舊圖樽受五斗斗實五升勺柄長二尺四寸斗柄長三尺蓋其所傳者尚矣史記曰趙襄子令工人作為金斗長其尾可以擊人與代王飲厨人進斟因反斗以擊代王殺之此又非先王之所謂斗鼐鼎鼒鉶鼎之器于象為備易曰鼎象也鼎之齊于金為多六分其金而錫居一謂之鍾鼎之齊下有足上有耳有冪以覆之有鉉以舉之説文冪以木橫其鼎耳而舉之周禮廟門客大鼎七個即易玉鉉也冪冪狄切冪茅為之長則束其本短則編其中扃木為之大者廟門容七個小者闈門容三個考工記詩稱鼐鼎及鼒爾雅曰鼎絶大者謂之鼐圜弇上者謂之鼒附耳外謂之釴欵足謂之鬲士虞禮有上鼎中鼎下鼎有司徹司馬舉羊鼎司士舉豕鼎魚鼎則鼎之體有大小侈弇之別而其用有牛羊豕魚之異天子諸侯有牛鼎後漢書曰函牛之鼎大夫有羊鼎士豕鼎魚鼎而已上得兼下下不得兼上則鼐鼎特王有之也周官膳夫王曰一舉鼎十有二掌客諸侯之禮鼎皆十二聘禮賔之飱饔皆飪一牢鼎九而飱腥一牢鼎七饔腥二牢鼎二七上介飱饔皆飪一牢鼎七而饔腥一牢鼎七衆介飱少牢飪鼎五大夫少牢五鼎士特牲喪禮三鼎既夕五鼎而掌客聘禮諸侯與卿之鼎過于王之數士既夕之鼎過于特牲之制何也聘禮陳鼎也王之日舉食鼎也特牲庸禮也既夕斯須禮也然所謂陪鼎羞鼎皆鉶鼎也鉶鼎所以實羮者也亨人祭祀賔客共鉶羹鉶羮所以具五味也其芼則藿牛苦羊薇豕也其臭則膷牛臐羊膮豕也自羮言之曰鉶羮自器言之曰鉶鼎以其陪正鼎曰陪鼎以其為庶羞曰羞鼎其實一也王日食九鼎而陪鼎三公食大夫七鼎而鉶鼎四宰夫設四鉶于豆南掌客土公鉶四十有二侯伯鉶二十有八子男鉶十有八聘禮之賔飱饔之羞鼎皆三上介飱饔之羞亦三少牢佐食設羊鉶豕鉶特牲正婦設兩鉶然公食大夫之鉶多于王日食者以公食者衆故也聘介之鉶同於賔者以王鼎殺故也周官亨人掌共鼎鑊以給水火之齊少牢爨在廟外之東三鼎在羊鑊之西二鼎在豕鑊之西然則牲體皆亨於鑊然後肉脀之鼎而羮納之鉶登大羮在登則鑊者釡錡之總名也舊圖天子之鼎飾以黃金諸侯飾以金容一斛大夫羊鼎飾以銅容五斗士豕鼎設以鐵容三斗而牛羊豕鼎各狀其首於足上若然魚鼎臘鼎豈皆狀以魚臘乎所謂飾以金與銅鐵而容一斛與五斗三斗蓋以後世之鼎言之也士喪禮陳鼎于寢門外西靣士虞陳鼎于門外之右北靣鼎入設于西階前東靣特牲陳鼎于門外北靣鼎入當阼階東靣則鼎固有靣矣其詳不可得而知禮書卷九十九
