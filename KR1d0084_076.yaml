body:
  text: 禮書卷七十七宋陳祥道撰骨體周禮王之牲事冡宰太僕賛之太宰及納亨賛王牲事太僕祭祀賛王牲事五官共奉之内饔外饔割亨之内饔凡宗廟之祭祀掌割亨之事外饔掌外祭祀之割亨司士帥其屬而割羞司士凡祭祀帥其屬而割羞爼豆諸子正其牲體蓋司士掌羣臣之版諸子掌國子之倅則凡預祭者皆在所掌故割羞正體繫之夫肱骨三肩臂臑也股骨三肫亦作膞音純胳亦作骼觳也既夕前後掌長及觳脊骨三正脊脡脊横脊也脅骨三代脅長脅特牲又曰幹脰脅也正脊之前則膉也亦謂之脰肫之上則髀也然則左右肱之肩臂臑與左右股之肫賂觳而為十有二脊骨三與左右脅骨六而為九二觳正祭不薦於神尸主人之爼兩髀不升於主人主婦之俎膉不升於吉祭之俎士虞祝俎髀脰則祭之所用者去脾膉而二十有一去二觳而為十九矣國語曰禘郊之事則有全脀王公立飫有房脀親戚燕飲有殽脀則全脀豚解也房脀體解也殽齊骨折也士喪禮特豚四鬄去蹄兩胉脅也脊既夕鼎實羊左胖亦如之然則四鬄者殊左右肩髀而為四又兩胉一脊而為七此所謂豚解也士喪禮畧豚解而巳至虞然後豚解體解兼有焉若夫正祭則天子諸侯有豚解體解禮運曰腥其俎孰其殽體其犬豕牛羊腥其俎謂豚解而腥之為七體執其殽謂解之爓之為二十一體大夫士有體解無豚解以其無朝踐獻腥之禮故也儀禮有言合升有言升左胖有言升右胖者士冠禮特豚載合升喪禮大歛亦豚合升則豚於吉㐫之禮皆合升也用成牲者然後升其胖豚合升則髀亦升矣士喪禮載兩髀于兩端是也升其胖則去髀矣既夕禮實羊豕左胖髀不升是也既夕升羊豕左胖士虞升左胖公食大夫鄉射記少牢皆升右胖特牲尸俎右肩蓋禮以右為貴而喪以左為上觀吉禮魚寢右䘮禮魚左首則䘮之反吉可知矣少牢尸俎羊豕體十一侑羊體四豕體三主人羊豕體各二主婦無豕體而羊體三侑則左肩而巳特牲尸之牲體九祝三主人與主婦五佐食三賔一長兄弟及宗人折其餘如佐食俎衆賔而下皆殽脀尸脊無中脅無前此尊卑之辨也祭統曰商人貴髀周人貴肩以周人之禮觀之脅貴中而賤兩端特牲食幹鄭云長脅骨貴右而賤左貴前而賤後貴上而賤下貴上則祭不升髀以在體以左後故也賤下而苞取下體者以脛骨可以乆藏故也貴前而祭不用膉者以非體之正故也士䘮禮歛奠之俎載兩髀于兩端兩肩亞兩胉亞脊肺在中少牢肩臂臑膊胳在兩端脊脅肺肩在上則俎之有上下猶牲體之有前後也肩臂臑在上端則膊胳在下端矣喪奠兩髀于兩端此喪事質猶用商禮故也特牲尸俎正脊二骨長脅二骨阼俎亦正脊二骨長脅二骨少牢脊三脅三背二骨以並蓋骨臂臑膊賂之骨不折所折者脊脅也脊二以並多為貴故也少牢脊則先正脊脅則先脰脅以屈而䋫之故也士虞禮尸舉魚腊俎俎釋三箇特牲佐食盛胙俎俎釋三箇則士虞釋三箇者不盡人之歡也特牲釋三箇者將以改饌陽厭也少儀凡膳告於君子太牢以牛左肩臂臑折九箇少牢以羊左肩七箇犆豕以左肩五箇膳以肩不以膊者貴其前也肩以左不以右者右以祭也血腥爓熟禮記曰有虞氏之祭也尚用氣血腥爓用氣也商人臭味未成滌蕩其聲周人尚臭則自器至於臭其禮浸文矣又曰郊血大饗腥三獻爓一獻熟則自血至於熟其誠浸殺矣蓋宗廟之祭始則以神事焉故以腥終則以人飬焉故以熟則坐尸於堂血毛詔於室乃腥其俎熟其殽進於尸主之前以行朝踐焉鄭康成謂腥者豚解而腥之以法於上古熟者體解而爓之以法於中古是也及退而合亨體其犬豕牛羊設饌於堂延尸主以入室於是遷堂上之饌進於尸主之前以行饋食焉鄭康成謂薦今世之食是也特牲少牢有饋食無朝踐故有體解無豚解惟士䘮士虞有豚解七體鄭康成謂豚解者解前後脛脊脅是也祭義曰爓祭腥而退則爓祭固巳體矣禮運曰退而合亨體其犬豕牛羊者非體解也辨其體以陳之俎也楚茨之詩曰或剥或亨或肆或將則剥者解之也肆者陳之俎也然楚茨先言執爨而繼之以或燔或炙鳬鷖先言爾殽而終之以燔炙芬芬禮運亦先言熟其殽然後繼之以薦其燔炙周禮量人制從獻脯燔之數量特牲主人獻尸賔長以肝從主婦獻尸賔長以燔從是燔以肉炙以肝燔炙在血腥爓熟之後非祭之所先也謂之從獻非獻之正味也故制之不在司士而在量人獻之不在主人而在賔特祭義言建設朝事燔燎羶薌繼之以薦黍稷羞肺肝加以鬱鬯而鄭氏謂朝事君親制祭則親制其肝洗鬱鬯而燔之以詔神於室又出以墮於主前然則主人用肝之禮又與從獻者異矣舉肺祭肺儀禮少牢舉肺祭肺三皆切之則舉肺一者尸之所先食者也故刲離之而不切祭肺三者尸與主人主婦之所祭者也故切之而不刲離舉肺亦謂之離肺亦謂之嚌肺祭肺亦謂刌肺亦謂之切肺則離與刌以所制名之也嚌與切以所用名之也祭肺祭而不嚌舉肺嚌而必祭祭肺三皆在尸俎而舉肺各於其俎故儀禮尸俎阼俎以至主婦佐食賔長兄弟宗人衆賔及衆兄弟内賔宗婦公有司之俎皆離肺一則祭肺三者施於尸主人主婦之挼祭也皆離肺一者自尸至公有司食之也少儀曰牛羊之肺離而不提心離而不提心則絶而祭之故挩手則刌而祭者不挩手矣祭以右手見鄉射凡祭必於脯醢之豆間特公食大夫有司徹祭於上豆之間以豆數多故也祭之尚肺周禮而巳若有虞氏則祭首夏后氏則祭心商則祭肝以時異則禮異也周之尚肺特宗廟賔客飲食之間而巳若五祀則户先脾中霤先心門先肝以事異則禮異也士冠有嚌肺而鄉飲鄉射燕禮之類皆有離肺而無祭肺婚禮有離肺又有祭肺鬼神隂陽之意也特牲饋食先祭肺後祭肝祝亦祭肺後祭肝則祭肺非不祭肝也以肺為主耳由是推之夏商非不祭肺也以心與肝為主而巳禮書卷七十七
