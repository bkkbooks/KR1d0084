body:
  text: 禮書卷一百宋陳祥道撰束冪茅為之束其本飾以朱編冪茅為之編其中飾以朱大扃飾以朱小扃飾以朱公食大夫禮甸人陳鼎設扃冪若束若編考工記曰廟門容大扃七箇闈門容小扃三箇説文曰扃外門之閑也葢鼎扃之制取象於門扃而廟門之度取數於鼎扃取數於鼎扃則鼎之出入有容矣大扃牛鼎之扃也小扃羊豕鼎之扃也鄭氏謂牛鼎之扃長三尺膷鼎之扃長二尺然膷鼎乃牛鼎之陪者也以小扃為膷鼎之扃而不以為羊豕鼎之扃者以其長止二尺故也扃謂之鉉亦謂之鼏易稱玉鉉金鉉説文曰鼎以横木貫耳而舉之則木其質也金玉其飾也冪茅為之長者束本短者編中陳鼎必於門外舉之則去冪然後入既入則抽扃然後加匕疏布巾白色畫布巾畫斧周官冪人祭祀以疏布巾冪八尊以畫布巾冪六彛葢八尊以獻及於天地故巾疏而不畫六彛以祼施於宗廟故巾畫而不疏冪人言疏布巾則畫用精者可知言畫布巾則疏之不畫可知巾以覆為用象天之體畫必以黼天事武也鄭氏曰周尚武畫黼其用文徳則黻可又曰畫者畫其雲氣歟此皆不可考也燕禮公尊冪用綌若錫大射冪用錫若絺士喪冪用功布士虞冪用絺鄉飲酒士昏特牲冪皆用綌少牢合尊皆有冪葢亦用綌以鄉飲酒知之葢人君尊也故燕與大射之冪用葛若錫冬夏異也人臣卑也故鄉飲昏喪祭之幕用葛而巳冬夏同也然士冠禮禮賔贊禮禮婦聘禮禮賔皆用醴而無幕以醴質故也醮用酒亦無冪從禮子之質故也燕禮君尊有冪方壺圜壺無冪卑屈於尊故也昏禮尊於室内有冪尊於房戸外無冪賤屈於貴故也若夫鄉飲舉則無所屈焉故皆有冪大射之禮冪綴諸箭則異於他冪矣籩豆巾纁裏兼巾特牲籩巾以絡纁裏士昏醯醬二豆菹醢四豆兼巾之士喪籩豆用布巾士昏笲緇被纁裏聘禮竹簋方𤣥被纁裏有司徹簠有葢冪然則冪巾不特施於尊彛而巳簠簋籩豆皆有之也冪人凡王巾皆黼則諸侯大夫士之巾不畫黼矣四代之俎有虞氏梡色朱而淺四足皆直夏后氏嶡色朱形與前同加以横距商椇色白四足曲下有横距周房俎明堂位曰俎有虞氏以梡夏后氏以嶡商以椇周以房俎葢斷木為梡横距為嶡椇之木多橈房之制有戸閾虞氏之俎斷木四足而已夏氏之俎加横距焉商曲其足若椇然周又設下跗於兩端若房然是商之横距與夏同而曲其足與三代異周之下跗與三代異而直其足與虞夏同詩言大房傳言房烝此房俎也少牢禮言俎距此横距也其高下修廣無文舊圖謂高二尺四寸廣尺二寸不可考也莊周曰加肩尻于雕俎之上唐褚遂良曰禹雕其俎士喪禮有素俎葢雕俎始於禹而後世用之於吉凶者文質於是異矣牲體之在鼎曰脀在俎曰載魚載則縮肉載則衡鼎俎貴竒籩豆貴偶竒以象陽偶以象陰觀聘禮有牛羊豕魚腊腸胃膚鮮魚腊之九鼎膷臐膮之三鼎少牢五鼎五俎特牲三鼎三俎而肵俎非正俎周官膳夫鼎十有二陪鼎非正鼎玉藻諸侯日食三俎朔月五俎則鼎俎竒可知矣然有司徹有六俎者葢尸也侑也主人也主婦也各一俎司馬之羞羊湆也司士之羞豕湆也各一俎俎列而陳之則貴竒散而用之雖偶可也禮書卷一百
