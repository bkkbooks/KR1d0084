body:
  text: 禮書卷一百二十九宋陳祥道撰文舞武舞之位舞之始也發於所樂之極其用也常在諸樂之後是以周官樂師樂成告備然後詔來瞽皋舞春秋之時季札厯觀樂歌然後及於象武韶夏之舞在詩序則舞蹈後於嗟歎永歌在樂記則動容後於志詠聲在孟子則舞蹈後於樂之實以舞者所樂之極故也夫舞有文有武有大有小司樂以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武皆舞之大者也樂師教國子小舞有帗舞羽舞皇舞旄舞旄舞氂牛尾也傳曰葛天氏之樂三人操牛尾而歌八闕其流風與干舞人舞此舞之小者也大舞有其章而無其儀小舞有其儀而無其章大夏而上文舞也其執以羽大濩而下武舞也其執以干則大舞必用小舞之儀小舞不用大舞之章也大胥以六樂之會正舞位小胥巡舞列蓋位者鄼也正之所以辨其序列者佾也巡之所以肅其慢春秋之時鄭伯享王遍及六舞王子頺享五大夫樂及遍舞則合舞之禮東西蓋有辨先後蓋有序矣考之於經舞干羽于兩階則文舞于東階武舞于西階武舞常在先文舞常在後何則書言舞干羽則先干而後羽樂記言及干戚羽旄謂之樂則先干戚而後羽旄郊特牲眀堂位祭統皆言朱干玉戚冕而舞大武皮辨素積裼而舞大夏則先大武而後大夏詩簡兮言碩人俁俁公庭萬舞乃言左手執籥右手秉翟則先萬舞而後籥翟漢之樂亦先武德之舞而後文始之舞唐之樂亦先七德之舞而後九功之舞然則古人之舞皆先武後文蓋曰武以威衆而平難文以附衆而守成平難常在先守成常在後唐太宗謂封德彞曰朕雖以武功興終以文德綏海內謂文容不如蹈厲斯過矣觀此則古人舞序先後之意可見矣何休釋公羊萬舞之説以為象武王以萬人伐紂孔安國釋書以舞干羽為文舞失之矣商頌曰萬舞有奕則萬舞豈始武王哉公羊曰萬舞干舞也楚令尹子元振萬文夫人曰先君以是舞也習戎備則萬為武舞可知矣然非始于武王賈公彥曰武舞有四表大濩而上應亦四表於理或然春秋傳曰舞師題以旌夏蓋若今太樂以纛與旌引二舞者歟文舞武舞之飾禮曰朱干玉戚冕而舞大武皮辨素積裼而舞大夏蓋周之興也功莫大於武功樂莫重於武舞故舞大武以祭服之冕舞大夏則朝服之皮辨而已干所以自蔽戚所以待敵朱干白金以飾其背記曰朱干設錫是也玉戚剝玉以飾其柄楚工尹路曰剝圭以為鏚柲是也舞武而執干戚則舞夏執籥翟矣舞夏而裼則武舞襲蓋朱所以象事玉所以象德武以自蔽者為主而待敵者非德也故其宣布著見以為事者欲自蔽而已至於持以待敵者溫純之德爾此武舞之道也籥所以為聲翟所以為文聲由陽來故執籥於左文由隂作故秉翟於右此文舞之道也天子之樂如此而魯有之康周公故也世衰禮廢魯不特用於周公之廟而羣廟亦用焉故子家駒譏之昭公謂子家駒曰吾何僣哉不特用於魯之羣廟而諸侯之廟亦用焉故郊特牲譏之郊特牲曰朱干設錫而舞大武諸侯之僣禮也以至八佾作於季氏之庭萬舞振於文夫人之側則先王之樂掃地可知矣祭統曰朱干玉戚以舞大武八佾以舞大夏公羊曰朱干玉戚以舞大夏八佾以舞大武蓋公羊所傳者誤也然朱干玉戚之舞國君躬與焉祭統曰君執干戚就舞位冕而總干率其羣臣以樂皇尸帗舞羽舞皇舞旄舞鼓人曰凡祭祀百物之神鼓兵舞帗舞者舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之祭祀樂師教小舞又有旄舞人舞蓋帗舞裂五采繒為之先儒曰析五采繒如漢靈星舞子所持者也羽舞析衆羽為之皇舞以皇羽為之旄舞以氂牛尾為之采繒之飾盛於衆羽衆羽之飾盛於皇羽皇羽盛於旄干則執之而無飾人則手舞之而無執樂師先之以帗舞羽舞次之以皇舞旄舞而後之以干舞人舞以飾之隆殺為序故也人君有山川為之阻固然後可以保社稷保社稷然後可以有事於四方有事於四方然後可以待變事舞師先干舞以祀山川帗舞以祀社稷羽舞以祀四方皇舞以舞旱暵之事以事之先後為序故也鄭司農曰社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人舞鄭康成曰四方以羽宗廟以人山川以干旱暵以皇然古者之於大祭祀有備樂必有備舞春秋書有事于大廟萬入去籥則宗廟用干與羽矣若夫散而用之則有所不備故山川以干社稷以帗四方以羽旱暵以皇然則司農康成之論不知何據然也旄人掌教夷樂凡祭祀賓客舞其燕樂眀堂位以禘禮祀周公而納夷蠻之樂于太廟則宗廟亦以旄也然司兵祭祀授舞者兵司戈盾祭祀授旅賁殳故士戈盾授舞者兵亦如之大司樂大射詔諸侯以弓矢舞樂師帥射夫以弓矢舞則兵舞不特以干而已然則鄉大夫鄉射之禮五物詢衆庶而終之以興舞蓋以弓矢舞歟然舞者所樂之極而樂之盛者也以其為樂之極故樂成而後詔舞以其為樂之盛故小祭祀不與焉舞師凡小祭祀不興舞文王世子曰既釁器用幣然後釋菜不舞禮書卷一百二十九
