body:
  text: 禮書卷七十五宋陳祥道撰牧牲官牧人掌牧六牲凡祭祀共其犧牲以授充人繫之牛人掌養國之公牛凡祭祀共其享牛求牛以授職人而芻之鄭司農云享牛前祭一日之牛也求牛禱於鬼神所求福之牛也共謂享獻也獻神之牛謂所以祭者也求終也終事之牛謂所以繹之也稿人掌豢祭祀之犬祭義曰古者天子諸侯必有養獸之官及歲時齋戒沭浴而躬朝之犧牲祭牲必於是取之敬之至也羊人若牧人無牲則受布于司馬使其賈買牲而共之卜牲卜免牲禮記曰君召牛納而視之擇其毛而卜之吉然後養之郊特牲曰帝牛不吉以為稷牛公羊傳曰養牲必養二卜帝牲不吉則扳稷牲而卜之僖三十一年夏四月四卜郊不從乃免牲成七年正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛不郊襄七年夏四月三卜郊不從乃免牲穀梁曰卜免牲者吉則免之不吉則否全曰牲傷曰牛未牲曰牛其牛一也其所以為牛者異有變而不郊故卜免牛也巳牛矣其尚卜免之何也嘗置之上帝矣故卜而後免之不敢専也卜之不吉則如之何不免安置之繫而待六月上甲始他牲然後左右之又曰免牲者為之緇衣纁裳有司玄端奉送至于南郊免牛亦然公羊亦曰免牲禮也免牛非禮也免牛何以非禮傷者曰牛蓋君子之於鬼神也無非卜用故擇牲必不敢專取也免牲必卜不敢専去也在牧為牛在滌為牲在滌而或傷之則不成牲也故以在牧名之養牲楅衡附周禮牛人凡祭祀共其享牛求牛以授職人而芻之肆師大祭祀展犧牲繫于牢頒于職人充人掌繫祭祀之牲祀五帝則繫于牢芻之三月享先王亦如之凡散祭祀之牲繫于國門使養之散祭祀謂司中司命山川之屬司門凡祭祀之牛繫焉監門養之牛人凡牲不繫者共奉之謂非時而祭祀者封人凡祭祀飾其牛牲設其楅衡置其絼共其水稿飾謂刷治潔清之也鄭司農云楅衡所以楅持牛也絼著牛鼻繩所以牽牛者今時謂之雉古者名同皆謂夕牲時也玄謂楅設於角衡設於鼻如椵狀也詩閟宫曰秋而載嘗夏而楅衡毛曰楅衡設牛角以楅之也鄭氏曰楅衡其牛角為其觸抵人也禮記曰三日繫七日戒三日宿慎之至也又曰犧牲不粥於市牲死則埋之月令仲秋之月乃命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗郊特牲曰帝牛必在滌三月稷牛惟具所以别事天神與人鬼也祭義曰擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲所以致力孝之至也公羊曰帝牲在于滌三月何休曰滌宫名養帝牲三牢之處也謂之滌者取其蕩滌潔清三牢者各主一月取三月一時足以充其大牲國語楚昭王問於觀射父曰芻豢幾何對曰逺不過三月近不過浹日逺謂三牲近謂雞鶩之屬浹日十二日也唐郊祀録凡祭祀之牲大祀在滌九十日中祀三十日小祀十日一月在外牢二月在中牢三月在明牢史記莊周謂楚使者曰子獨不見郊祭之犧牛乎養食之數嵗衣以丈繡以入太廟當是之時雖欲為孤豚豈可得乎郊祀志注漢祭天養牛五歲周官封人凡祭祀飾其牛牲設其楅衡置其絼詩曰秋而載嘗夏而楅衡毛氏曰楅持牛也絼著牛鼻以牽者鄭康成曰楅設於角衡設於鼻又曰楅衡其牛角為其觸抵人也蓋楅衡以木為之橫設於角則楅幅其角猶射以楅幅其矢也絼則少儀祭統所謂紖也少儀牛則執紖祭統及迎牲君執紖康成於詩合楅衡以為一於禮離楅衡以為二是自惑也郊特牲曰帝牛不吉以為稷牛稷牛惟具牛人凡祭祀共其享牛求牛以授職人而芻之蓋牛有卜而後用者有用而不必卜者享牛卜而後用求牛具而不必卜求牛猶曲禮所謂牽牛春秋傳所謂牽牛馬也以職授人而芻之則職人者充人司門之類也大祭祀之牛授之充人祀五帝則繫于牢芻之三月享先王亦如之肆師大祭祀展犧牲繫于牢是也散祭祀之牛授之司門充人凡散祭祀之牲繫于國門使人養之司門祭祀之牛牲繫焉監門養之是也楚昭王問於觀射父曰芻豢幾何對曰遠不過三月近不過浹日則先王繫牲不必皆三月矣唐郊祀録凡祭祀之牲大祀在滌九十日中祀三十日小祀十日理或然也莊周言郊牛食之數歲漢之郊牛養之五歲此非禮之禮也然則稷牛惟具而先王之牛必卜何也稷祀於郊則屈而不伸故用求牛而與帝牛異先王享于廟則伸而無屈故用享牛而與帝牛同古者之於牲也視之則召見之則下於歲時則齊戒沭浴以朝之於朔望則皮辨素積以巡之牽之必親殺之必射割之必袒以為不如是不足以致嚴於鬼神然見而下之夏商之禮耳周官齊右凡有牲事則前馬道右王式則下前馬則周人於齊牛式而不下也三牢養馬謂之間養牛謂之牢間以防之牢以固之各象其性而制之也然牢不特施之於牛而巳羊之所在亦曰牢禮凡言少牢是也豕之所在亦曰牢所處三牢各主一月唐制一月在外牢二月在中牢三月在明牢其言蓋有所受也飾牲周禮封人飾其牛牲小子凡沈辜侯禳飾其牲羊人凡祭祀飾羔挍人飾幣馬執撲而從之凡將事于四海山川飾黃駒曲禮曰飾羔鴈者以繢莊周曰犧牛衣以文繡漢儀夕牲被以絳然則羊人飾羔曲禮所謂飾以繢也挍人飾黃駒猶傳所謂文馬也羊人掌羊挍人掌馬其飾羔馬宜矣封人非掌牛而飾牛者牛土畜也封人掌設王之社㙺封樹而疆之則飾土事也使飾土事者飾土畜因其類也小子凡沈辜侯禳飾其牲則凡牲無不飾矣鄭氏以飾為刷治潔清之然則刷治潔清之非所謂飾禮書卷七十五
