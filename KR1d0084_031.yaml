body:
  text: 禮書卷三十一宋陳祥道撰千乘之國大司馬凡令賦以地與民制之司馬法甸方八里出長轂一乘又成方十里出長轂一乘古者或以甸為乘或以乘為甸以甸為乘稍人掌丘乘之政令禮記惟社丘乘粢盛是也以乘為甸春秋衛良夫乘衷甸兩牡是也蓋乘者甸之賦甸者乘之地甸方八里據地言之成方十里兼溝涂言之其實一也易曰震驚百里王制曰公侯之田方百里孟子曰諸侯不百里不足以守宗廟之典籍周公封於魯太公封於齊地非不足而儉於百里春秋傳曰列國一同明堂位曰魯革車千乘坊記曰制國不過千乘語曰道千乘之國蓋諸侯地不過百里車不過千乘以開方之法計之方十里者為方一里者百方百里者為方一里者萬方一里者百其賦十乘方一里者萬則其賦千乘然賦雖至於千乘而兵不過三軍三軍五百里乘而已則五百乘三鄉之所出也千乘闔境之所出也何則鄉萬二千五百家合三鄉則三萬七千五百家凡起徒役無過家一人則三軍為三萬七千五百人矣司馬法兵車一乘甲士三人步卒七十二人合七十五人則一卒所餘在後車矣後卒復以五十人合一十五人為一車士卒則所餘五十人又在後車矣凡三卒而車四乘三旅而車二十乘三師而車百乘三軍而車五百乘由此推之天子六軍則車千乘矣此車人參兩以相聨糾之法也詩曰公車千乘又曰公徒三萬則千乘之賦豈特三軍而已哉鄭氏據司馬法井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人十成為終終千井三千家革車十乘士百人徒二百人十終為同同萬井三萬家革車百乘士千人徒二千人率十家出一人之役百家出千人之役賈公彥遂以此為畿內之法以甸出長轂一乘甲士三人步卒七十二人為邦國之法然周官之於調役其寡也家出一人其多也起餘子與竭作未聞十家出一人之役百家出十人之役也賈公彥言出軍之法先六鄉次六遂次公邑都鄙乃徵兵於諸侯不止則諸侯闔境出焉所謂千乘之賦也然先王之於天下大則有方伯小則有連帥其待卒應變如身之使臂臂之使指各適其事之逺近而已方伯連率所不能克然後鄉遂之士應之周官曰王之大事諸侯左傳曰五侯九伯汝實征之又曰諸侯敵王所愾則出軍之法顧豈先虛其內以實其外哉馬融曰千乘之賦其地千成居地方三百一十六里有竒惟公侯之封乃能容之其說蓋惑周禮也公五百里侯四百里之制不知周禮之所言者乃附庸諸侯附庸周禮大司徒諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者三之一諸伯之地封疆方三百里其食者三之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一鄭司農云其地但為正四方耳其食者半公所食租稅得其半耳其半皆附庸小國也屬天子三之一者亦然故魯頌曰錫之山川土田附庸奄有龜䝉遂荒大東至于海邦論語曰季氏將伐顓㬰孔子曰先王以為東䝉主且在邦域之中是社稷之臣此非七十里所能容然則方五百里四百里合於魯頌論語之言諸易食者四之一適方五十里獨此與今五經家說合耳𤣥謂其食者半參之一四之一者土均均邦國地貢輕重之等其率之也公之地以一易侯伯之地以再易子男之地以三易必足其國禮俗喪紀祭祀之用方貢其餘若今度支經用餘為司農穀矣大國貢重正之也小國貢輕字之也凡諸侯為牧正帥長及有德者乃有附庸為其有祿者當取焉公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同進則取焉退則歸焉魯於周法不得有附庸以大言之也附庸二十四言得兼此四等矣職方氏凡邦國千里封公以方五百里則四公方四百里則六侯方三百則七伯方二百里則二十五子方百里則百男以周知天下方千里者為方百里者百以方三百里之積以九約之得十一有竒云七伯者字之誤也周九州之界方七千里七七四十九方千里者四十九其一為畿內餘四十八八州各有方千里者六周公變商湯之制雖小國地皆方百里是每事言則者設法也設法者以待有功而大其封一州之中以其千里封公則可四又以其千里封侯則可六又以其千里封伯則可十一又以其千里封子則可二十五又以其千里封男則可百公侯伯子男亦不是過也州二百一十國以男備其數馬其餘以為附庸禮記曰王者之制祿爵公侯伯子男凡五等公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子之元士視附庸不合謂不期㑹也小城曰附庸以國事附於大國未能以其名通也此制商所因夏爵三等之制也商有鬼侯梅伯春秋變周之文從商之質合伯子男以為一則商爵三等者公侯伯也箕畿內謂之子周武王初定天下更立五等之爵增以子男而猶因商之地以九州之界尚狹也周公攝政致太平斥大九州之界制禮成武王之意封王者之後為公及有功之諸侯大者地方五百里其次侯四百里其次伯二百里其次子二百里其次男百里所因商之諸侯亦以功黜陟之其不合者皆益之地為百里焉是以周世有爵尊而國小爵卑而國大者唯天子畿內不增以祿羣臣不主為治民凡四海之內九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以祿士以為閒田凡九州千七百七十三國天子之元士諸侯之附庸不與又曰成王以周公為有勳勞於天下是以封周公於曲阜地方七百里革車千乘曲阜魯地上公之封方五百里加魯以四等之附庸方百里者二十四并五五二十五積四十九開方之得七百里魯頌曰乃命魯公俾侯于東錫之山川土田附庸又曰泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同論語曰昔者顓㬰先王以為東蒙主且在邦域之中是社稷之臣也諸公五百里諸侯四百里諸伯三百里諸子二百里諸男一百里書言舜之受禪曰輯五瑞修五玉復五器言武王之政由舊曰列爵惟五分土惟三則自唐至周五等之爵一也鄭氏釋王制謂商因夏爵有公侯伯而無子男以微子箕子為畿內之爵公羊釋春秋謂春秋變周從商合伯子男皆從子鄭忽出奔衛公羊曰忽何以名春秋伯子男一也辭無所貶何休曰春秋改周之文從商之質合伯子男為一辭無所貶皆從子豈其然哉夫列爵惟五所以稱其德分土惟三所以等其功德異而功有所同故公侯之地同於百里子男之地同於五十里地同而附庸有所異故諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方百里蓋三等之地正封也五等之附庸廣封也正封則尺地莫非其土一民莫非其臣尊者嫌於盛而無所屈卑者嫌於削而無所立故公之地必下而從侯男之地必上而從子至於廣封則欲上之政令有所統而不煩下之職貢有所附而不費又非諸侯得以擅之也而尊者不嫌於太多卑者不嫌於太寡故公之地必五百里而異於侯男之地止百里而異於子也民功曰庸先儒以庸為城朝㑹曰合謂之附庸以其有所附然後有功於民也謂之不能五十里不合於天子以其才不足以當五十里則不足以特達於上也古者天子之地象日月諸侯之地象雷震則周官所謂五百里以至百里為兼附庸明矣鄭康成以大司徒之所言者為正封則曰公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同魯於周法不得有附庸故言錫之而附庸二十四此說非也既曰侯附庸九同魯侯爵也不得有附庸何耶詩曰錫之山川土田附庸奄有龜蒙遂荒大東記曰地方七百里此所謂錫之也圭田五十畝王制曰夫圭田無征夫猶治也征稅也孟子曰卿以下必有圭田治圭田者不稅所以厚下也此則周禮之士田以任近郊之地稅什一周禮載師以士田賈田任近郊之地士讀為仕仕者亦受田所謂圭田也孟子曰卿以下必有圭田圭田五十畝餘夫二十五畝又曰惟士無田則亦不祭絀士無圭田孔穎達曰夫猶治也卿以下皆以治此圭田公家不稅其物必云圭者圭潔白也言卿大夫德行潔白乃與之田此商禮也商政寬緩厚重賢人故不稅之周則兼通士稅之故周禮士田以任近郊之地稅什一後魏有公田隋文帝時有公廨田唐凡京諸司有公廨田諸京官諸州有職分田士虞禮曰圭為哀薦之饗詩之吉蠲或作吉圭則圭田潔白也惟士無田則亦不祭則圭田所以共祭也卿以下有圭田猶天子諸侯之有藉也圭田無征所以厚賢也鄭氏以周禮士田為圭田以圭田無征為商制而改士為仕其說無據孟子言九一而助繼之以圭田五十畝餘夫二十五畝者圭田祿外之田也餘夫夫外之田也祿外之田半百畝夫外之田又半之此自百畝而差之然也古者自卿士達於圭田同等欲各致其誠敬而已後世職分田以貴賤制之非禮意也禮書卷三十一
