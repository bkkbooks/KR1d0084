  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0084_WYG_012-1a, image: WYG0130/WYG0130-0072c.png}
body:
  text: 禮書卷十二宋陳祥道撰裘制周禮司裘掌為大裘以供王祀天之服大裘黑羔裘服以祀天示質中秋獻良裘王乃行羽物良善也良裘王所服也季秋獻功裘以待頒賜功裘人功微粗謂狐青麛裘之屬鄭司農云功裘卿大夫之服也又曰大喪廞裘飾皮車皮車遣卓之革路故書廞為淫鄭氏云淫裘陳裘也凡邦之皮事掌之嵗終則會唯王之裘與其皮事不會司服祀昊天上帝則服大裘而冕大裘羔裘也又曰郊祀裘冕二人執戈送逆尸從車裘大裘也記曰童子不衣裘裳曽子襲裘而弔子遊裼裘而弔曽子指子遊而示人曰夫夫也為習於禮者如之何其裼裘而弔也主人既小斂袒括髮子遊趨而出襲裘帶絰而入曽子曰我過矣我過矣夫夫是也夫子曰始死羔裘玄冠者易之而已羔裘玄冠不以弔不以吉服弔喪練鹿裘衡長袪袪裼之可也裼表裘也有袪而裼之晏子一狐裘三十年月令孟冬天子始裘內則男子二十而冠可以衣裘帛玉藻惟君黼裘以誓省大裘非古也大裘羔裘也黼裘以羔與狐白雜為黼文也省當為獮君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹褒玄綃衣以裼之麛裘青犴褒絞衣以裼之羔裘豹飾緇衣以裼之狐裘黃衣以裼之錦衣狐裘諸侯之服也犬羊之裘不裼不文飾也不裼裘之裼也見美也服之襲也充美也弔則襲不盡飾也君在則裼盡飾也無事則裼弗敢充也童子不裘不帛禮不盛服不充故大裘不裼學記曰良冶之子必學為裘喪大記弔者襲裘加武帶絰與主人拾踊詩羔羊曰羔羊之皮素絲五紽紽數也古者素絲以英裘羔羊之革素絲五緎緎縫也羔羊之縫素絲五總總數也旄丘責衛伯也狐裘蒙戎匪車不東鄭羔裘刺朝也羔裘如濡洵直且侯羔裘豹飾孔武有力羔裘晏兮三英粲兮三英三德也晉羔裘刺時也羔裘豹袪自我人居居箋羔裘豹袪在位卿大夫之服羔裘豹褒自我人究究蒹葭曰君子至止錦衣狐裘毛曰狐裘朝廷之服檜羔裘曰羔裘逍遙狐裘以朝羔裘翺翔狐裘在堂羔裘如膏日出有曜豳七月一之日取彼狐狸為公子裘都人士曰彼都人士狐裘黃黃大東曰舟人之子熊羆是裘毛曰舟舟楫之人鄭曰舟當作周裘當作求家語大裘以黼之論語曰羔裘玄冠不以弔緇衣羔裘素衣麑裘黃衣狐裘褻裘長短右袂狐狢之厚以居又曰公西華乘肥馬衣輕裘又曰衣敝緼袍與衣狐狢者立而不恥者其由也歟子路曰願車馬衣輕裘荀子曰若挈裘領詘五指而頓之順者不可勝數也淮南子曰夏之不被裘非愛之也燠有餘於適也冬之不用翣非簡之也清有餘於適也左傳曰東郭書晢幘而貍製又曰臧之狐敗我於狐駘又曰蔡昭侯如楚持羔裘二又曰渾良夫紫衣狐裘列子曰榮啓期被裘帶索林類底春被裘拾遺穗又曰北國之人鞨巾而裘中國之人冠冕而裳黼裘鄭氏曰以羔與狐白雜為黼文周禮獻皮以掌皮攻皮以裘氏獻裘以司裘司裘為大裘以共王祀天之服中秋獻良裘季秋獻功裘鄭氏曰良裘因其良時而用之所謂黼裘與功裘人功微粗謂狐青麛裘之屬黼裘以羔與狐白雜為黼文然則良裘其質美功裘其功多艮裘非特黼裘而功裘非特狐青麛裘古者行禮之裘必以羔與麛燕居之裘必以狐與貉故詩以羔裘逍遙狐裘以朝刺不自強於政治則黼裘不雜以狐白矣惟君黼裘以誓省後世有用大裘故記者譏之曰非古也何則祀天尚道故以大裘誓省尚義故以黼裘誓則前期十日太宰帥執事卜日遂戒是也省則前祭一日大宰及執事視滌濯宗伯大祭祀省牲視滌濯是也司寇大祭祀納享前王郊特牲卜之日王立于澤親聽誓命則王於誓省皆與之也先王制禮盥重於既薦幣貴於未將則禮常嚴於未然之前祭祀治官以治之刑官以蒞之則義常肅於行禮之際則黼裘以誓省宜矣家語合大裘黼裘為一則曰大裘黼之以象天鄭氏改省為獮則曰黼裘以誓獮田然大裘純色無白黑之文獮田在秋非用裘之日二者之説誤矣羔裘黑羔裘王大裘以祀天諸侯羔裘以朝先儒皆曰黑羔裘也蓋羔取其有禮羣而不黨乳而必跪贄之不鳴殺之不號黑取其合道以道行禮以禮成道固先王之所尚也然大裘尚質羔裘有文故詩曰羔羊之皮素絲五紽羔羊之革素絲五緎羔羊之縫素絲五總毛氏曰古者素絲以英裘紽總數也爾雅曰緎縫也孫炎曰緎界也蓋羔裘以素絲為組施於縫中以為英飾其界有緎有殺有縫其别有紽其聚為總而又飾之以豹此所以與大裘異也羔裘豹飾狐青裘豹褒麛裘青犴褎何也豹取其武而有文青犴取其仁而能守武而有文諸侯視朝之事也仁而能守天子視朝之事也狐青以燕居褒亦以豹則武而有文亦非燕居之所可忘也詩曰羔裘豹飾孔武有力又曰羔裘豹袪自我人居居其託物同而意異者義德一也善用之則為武不善用之則為暴夫言豈一端而已哉先儒謂凡裘天子諸侯用全其臣則褎飾異焉然天子諸侯之用全特狐白裘而已欲其純白之傋也至於麛裘羔裘則上下之所同非無飾也若曰裘以用全為貴則狐黃之裘無異褎犬羊之裘無異飾而賤者或服之何耶麛裘青犴褎犴胡犬也爾雅曰鹿牡麚牝塵其子麛麛即麑也詩曰呦呦鹿鳴食野之蘋又曰鹿斯之奔維足伎伎則鹿之為物善接其類而麛尤出於天性故先王取焉玉藻曰麛裘青犴褎絞衣以裼之孔子曰素衣麑裘鄭氏釋聘禮曰麑裘皮辨然則皮辨素積而麑裘素衣以裼之則絞衣素衣也鄭氏釋禮記又曰絞蒼黃之色其説無據記曰裘之裼也見美也服之襲也充美也則袒而見裘曰裼掩而充裘曰襲素衣麑裘則麑裘之上素衣其正服也緇衣羔裘則羔裘之上緇衣其正服也黃衣狐裘錦衣狐裘蓋亦若此鄭氏崔靈恩之徒以為袒而有衣曰裼若然裘之上有裼衣裼衣之上又有正服則是裼襲在衣不在裘而經言裼裘襲裘何耶檀弓曰練練衣黃裏縓緣鹿裘衡長袪袪裼之可也其裼之也亦裼受服以見鹿裘之美而已鄭氏曰鹿裘之裼亦用絞乎是鄭氏亦自疑而不必其説也詩曰衣錦尚褧蓋惟錦加絅以惡文著餘衣固不然也昔衛侯戒渾良夫食良犬紫衣狐裘至袒裘而食則所袒者紫衣耳哀十七年未聞紫衣之外復有衣也鹿裘長袪禮記練鹿裘衡長袪袪裼之可也列子曰孔子見榮啓期行乎郕之野鹿裘素帶啓期之服固不足論練用鹿裘何也禮始喪則居廬自屏既練則可以接物鹿善接其類者也故裘用焉周禮既練乘薻車鹿淺䄙與此同義鹿裘袪裼之則裼其袪而已非若餘衣之袒也鄭氏曰有袪而裼之備飾也鹿裘亦用絞乎理不然也禮書卷十二
