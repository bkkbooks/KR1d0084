body:
  text: 禮書卷六十四宋陳祥道撰冠周禮大宗伯以冠昏之禮親成男女黨正凡其黨之昏冠教其禮事禮記曲禮曰男子二十冠而字女子許嫁笄而字曽子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰內喪則廢外喪則冠而不醴徹饌而歸即位而哭如冠者未至則廢如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠除喪不改冠乎孔子曰天子賜諸侯大夫冕辨服於太廟歸設奠服賜服於斯乎有冠醮無冠醴父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而後饗冠者郊特牲曰冠義始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也委貌周道也章甫殷道也毋追夏后氏之道也周辨殷冔夏收三王共皮辨素積無大夫冠禮而有其昏禮古者五十而后爵何大夫冠禮之有諸侯之有冠禮夏之末造也天子之元子猶士也天下無生而貴者也內則男女未冠笄者雞初鳴咸盥漱櫛縰拂髦總角二十冠始學禮可以衣裘帛舞大夏惇行孝弟博學不教內而不出玉藻始冠緇布冠自諸侯下達冠而敝之可也𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也皆始冠之冠也小記曰丈夫冠而不為殤雜記大功之未可以冠子可以嫁子父小功之未可以冠子可以嫁子可以取婦已雖小功既卒哭可以冠取妻下殤之小功則不可此皆謂可用吉禮之時父大功卒哭而可以冠子嫁子小功卒哭而可以取婦已大功卒哭而可以冠子小功卒哭而可以取妻必偕祭乃行也下殤小功齊衰之親除喪而後可以為昏禮凡冠者其時當冠則因喪而冠之也冠義曰冠者禮之始也是故古者聖王重冠筮日筮賓所以敬冠事敬冠事所以重禮重禮所以為國本也故冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之成人之道也古者重冠重冠故行之於廟詩甫田曰婉兮孌兮總角丱兮未幾見兮突而辨兮加冠為成人也儀禮士冠禮筮于廟門若不吉則筮逺日如初儀逺日旬之外也前期三日筮賓如來日之儀厥眀夕為期于廟門之外擯者請期宰告曰質眀行事夙興設洗陳服側尊一甒醴在服北主人迎賓乃行三加之禮既冠乃醴賓以一獻之禮酬賓束帛儷皮賓出主人送于外門外晉語云趙文子冠冠謂以士禮始冠見欒武子武子曰美哉昔吾逮事莊主華則榮矣實之不知請務實乎見中行宣子宣子曰美哉惜也吾老矣見范文子文子曰而今可以戒矣夫賢者寵至而益戒不足者為寵驕見郤駒伯駒伯曰美哉然而壯不若老者多矣見韓獻子獻子曰戒之此謂成人成人在始與善始與善善進善不善蔑由至矣始與不善不善進不善善亦蔑由至矣如草木之産也各以其物人之有冠猶宫室之有牆屋也糞除而巳又何加焉見智武子武子曰成子之文宣子之忠其可忘乎見溫季子季子曰誰之不如可以求之左氏襄九年晉侯與諸侯伐鄭還公送晉侯晉侯以公宴于河上問公年季武子對曰㑹于沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣武子曰君冠必以祼享之禮行之享祭先君以金石之樂節之以先君之祧處之請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鍾磬焉禮也又曰豈如辨髦而因以敝之成二年楚救齊蔡景公為左許靈公為右二君弱皆强冠之荀子曰天子諸侯十九而冠冠而聽治其教至也賈公彥曰書金縢云王與大夫盡辨是時成王年十五云與大夫盡辨則知天子亦十二而冠矣又大戴禮云文王十三生伯邑考左傳云冠而生子禮也是商之諸侯亦十二而冠若夏之天子諸侯與商天子亦十二而冠可知若天子之子則亦十二而冠故禮記祭法云王下祭殤五又禮記檀弓云君之適長殤車三乘是年十九已下皆為殤故二十乃冠矣士既三加為大夫早冠者亦依士禮三加若天子諸侯禮則多矣故大戴禮公冠篇云公冠四加者緇布皮辨爵辨後加𤣥冕天子亦四加後當加衮冕矣案下文天子元子猶士天下無生而貴者則天子之子雖早冠亦用士禮而冠案家語冠頌云王太子之冠則天子元子亦擬諸侯四加若然諸侯之子不得四加與三加可知孔穎達釋冠義云諸侯尚四加則天子亦當五加衮冕也家語冠頌邾隱公既即位將冠使大夫因孟懿子問禮於孔子子曰其禮如世子之冠冠於阼者以著代也醮於客位加其有成三加彌尊導喻其志冠而字之敬其名也雖天子之元子猶士也其禮無變天下無生而貴者故也行冠事必於祖廟以祼享之禮以將之以金石之樂節之所以自卑而尊先祖示不敢擅懿子曰天子未冠即位長亦冠也孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有懿子曰然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也巳人君無所殊也懿子曰今邾君之冠非禮也孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉天子冠者武王沒成王年十有三而嗣立周公居冢宰攝政以治天下眀年夏六月既葬冠成王而朝于祖以見諸侯示有君也周公命祝雍作頌曰祝王辭達而勿多祝雍辭曰使王近於民逺於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王幼志服衮職欽若昊天六合是式率爾祖考永永無極此周公之制也懿子曰諸侯之冠其所以為賓主何也孔子曰公冠則以卿為賓無介公自為主迎賓揖升自阼立于席北其醴也則如士饗之以三獻之禮既醴降自阼諸侯非公而自為主者其所以異皆降自西階𤣥端與皮辨異朝服素韠公冠四加𤣥冕祭其酬幣于賓則束帛乘馬王太子庶子之冠擬焉皆天子自為主其禮與士無變饗食賓也皆同懿子曰始冠必加緇布之冠何也孔子曰示不忘古太古冠布齊則緇之其緌也吾未之聞今則冠而弊之可也漢孝惠即位四年而冠十七即位孝昭即位十年加元服八嵗即位五行志曰上加元服冠禮曰成王冠周公使祝雍曰辭達而勿多也祝雍曰近於民逺於年逺於佞近於義嗇於時惠於財任賢使能博物記曰孝昭帝冠辭曰陛下摛顯先帝之光耀以承皇天之嘉祿欽奉仲春之吉辰普専大道之郊域秉率百福之休靈始加昭眀之元服推逺沖孺之幼志藴積文武之就德肅勤高祖之清廟六合之內靡不䝉德永永與天無極獻帝傳曰興平元年正月甲子帝加元服司徒淳于嘉為賓加賜𤣥纁駟馬貴人公主卿司隸城門五挍及侍中尚書給事黃門侍郎各一人為太子舍人也獻帝起居注曰建安十八年正月壬子濟北王加冠戶外以見父母給事黃門侍郎劉贍兼侍中假貂蟬如濟北王給之冠者禮之始事之重也古者尊重事故筮日筮賓行之於廟冠之於阼醮於客位祝之以成德字之以伯仲見於母母拜之見於兄弟兄弟拜之所以責之為人子為人弟為人臣為人少之禮為子而孝為弟而悌為臣而忠為少而順然後可以為人可以為人然後可以治人則冠禮其可不重歟二十而冠士禮也天子諸侯則十二而冠故春秋傳曰十二年謂一終一星終也國君十五而生子冠而生子禮也考之經傳文王十三而生伯邑考成王十五而辨則十二而冠可知荀卿天子諸侯十九而冠失之矣小記曰大夫冠而不為殤則大夫不待五十而爵者亦不待二十而冠豈天子諸侯之冠特先士禮一嵗哉士禮始加緇布不忘本也次加皮辨朝服也三加爵辨祭服也不忘本然後能事君能事君然後能事神所謂三加彌尊喻其志者如是而已若夫諸侯則始緇布冠繢緌次加皮辨三加爵辨四加𤣥冕天子則始加𤣥冠朱組纓次加皮辨三加爵辨四加𤣥冕五加衮冕矣郊特牲言𤣥冠朱組纓天子之冠緇布繢緌詩侯之冠鄭氏皆以為始冠之冠家語稱成王冠祝雍辭曰去幼志服衮職而賈公彥孔穎逹皆言天子當加衮冕則始終之所加與士異也家語曰王太子之冠亦擬諸侯四加則天子五加可知矣諸侯四則其子三加可知矣王太子四加而禮記言天子之元子猶士者非謂加數也儀禮士冠無祼享之禮無金石之樂而季武子曰君冠必祼享之禮行之金石之樂節之而家語之說亦然此蓋國君之禮歟國君自冠有享禮大夫士自冠亦然曽子問曰父沒而冠則已冠掃地而祭於禰士冠筮日之儀士冠禮筮于廟門主人𤣥冠朝服緇帶素韠即位于門東西面有司如主人服即位于西方東面北上筮與席所卦者具饌于西孰布席于門中闑西閾外西面筮人執策抽上韇兼執之進受命于主人宰自右少退贊命筮人許諾右還即席坐西面卦者在左卒筮書卦執似示主人主人受視反之筮人還東面旅占卒進告吉若不吉則筮逺日如初儀徹筮席宗人告事畢然則筮必於廟尊其親也廟必於禰親其親也士筮於門而不於堂避其君也筮必面西求諸隂也卦者必居筮之左上其北也聘禮君受聘于先君之祧卿受問于祖廟士冠士昏皆止言廟則凡言廟者禰廟也記曰凡行事受於禰廟是也若諸侯則冠於祖廟左氏曰以先君之祧處之是也少牢筮旬有一日若不吉則及逺日又筮日如初特牲士冠不言旬有一日而特牲若不吉則筮近日者以士筮旬內大夫以上筮旬外也特牲筮祭同服𤣥端少牢筮與祭同朝服而士冠主人筮日服朝服冠日服𤣥端者特牲少牢祭事也筮不可尊於先祖故同服士冠非祭事也筮可尊於子孫故異服也天子諸侯筮於廟堂大夫士筮於廟門此尊卑之辨耳鄭氏謂筮不於堂嫌筮之靈由廟神其說誤也陳服設筵及加冠之儀服陳于房東領上北贊者立于房西面上南醴設于房尊篚籩豆上南冠辨執于西坫南上東主人立于東序面西賓立于西序面東冠者未冠既冠面南即席加冠面西醴之西南其降而見毋面北其始也賓揖冠者即筵坐贊者坐櫛設纚賓降與升正纚降受辨進容祝而冠之既冠揖之適房服其服又揖之即筵坐櫛纚祝加如初蓋賓盥所以致潔降盥降受冠辨所以致敬始加受冠降一等執者升一等再加降二等三加降三等以服彌尊故降彌下也始祝棄爾幼志順爾成德再祝敬爾威儀淑慎爾德三祝兄弟具在以成厥德以順成德然後慎德慎德然後能成德也禮記曰五十以伯仲周道然也冠禮既冠而字之曰伯某甫仲叔季者唯其所當賈公彥曰殷質二十為字之時兼伯仲叔季呼之周文二十為字之時未呼伯仲至五十乃加而呼之其說是也孤子冠孤子則父兄戒宿冠之日主人紒而迎賓拜揖讓立于序端皆如冠主禮於阼凡拜北面于阼階上賓亦北面于西階上答拜若殺則舉鼎陳于門外直東孰北面然則孤子戒宿以父兄而迎拜揖讓不以父兄者以戒宿者非冠日之事冠日迎拜揖讓者冠日之事若殺則舉鼎陳于門外鄭氏曰孤子得申禮盛之父在有鼎不陳於門外賈公彥曰凡陳鼎在外者賓客之禮也在內者家私之禮也父在陳鼎不於門外是在外者為盛也庶子冠庶子則冠于房外南面遂醮焉鄭氏曰房外謂尊東也不於阼階非代也不醮於客位成而不尊也觀此則孤子之冠雖不言醮位其醮於客位可知醴醮士冠禮側尊一甒醴在服北有篚實勺觶角柶脯醢南上徹皮辨冠櫛筵入于户西南面贊者洗于房中側酌醴加柶覆之面葉賓揖冠者就筵筵西南面賓受醴于户東加柶面枋筵前北面冠者筵西拜受觶賓東面答拜薦脯醢冠者即筵坐左執觶右祭脯醢以柶祭醴三興筵末坐啐醴建柶興降筵坐奠觶拜執觶興賓答拜冠者奠觶于薦東降筵北面坐取脯降自西階適東壁北面見于母若不醴則醮用酒尊于房户之間兩甒有禁𤣥酒在西加勺南枋洗有篚在西南順始加醮用脯醢賓降取爵于篚辭降如初卒洗升酌冠者拜受賓答拜如初冠者升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒降筵拜賓答拜冠者奠爵于薦東立于筵西徹薦爵筵尊不徹加皮辨如初儀再醮攝酒其他皆如初加爵辨如初儀三醮有乾肉折俎嚌之其他皆如初若不醴謂國有舊俗可行聖人用焉不改者也曲禮曰君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而宿行之是爾而無酬酢曰醮醮亦當為醴正義曰自此已上說周禮冠子之法自此已下至取籩脯以降如初說夏商冠子之法云若不醴則醮用酒者案上文適子冠於阼三加訖一醴於客位是周法今云若不醴則醮用酒非周法故知先王法鄭解無酬酢曰醮案曲禮云長者舉未釂鄭注云盡爵曰釂是醮不専於無酬酢者若然醴亦無酬酢不為醮名者但醴大古之物自然質無酬酢此醮用酒酒本有酬酢故無酬酢得名醮也記曰醮於客位加有成也醮夏商之禮士昏禮贊醴婦舅姑共饗婦以一獻之禮庶婦則使醮之醴側尊一甒無禁無𤣥酒設于房中而醴冠者於三加之後每加必祝故醴辭祝辭三其薦則脯醢而巳醮尊兩甒有禁𤣥酒設于房戶之西而醮冠者於每加之後而母加不祝故醮辭三無祝辭其薦則始醮脯醢再醮設酒其他如初再醮有乾肉折俎嚌之若殺特豚載合升始醮如初再醮兩豆葵菹螺醢兩籩栗脯三醮加俎嚌之如初嚌胏而醴用觶醮用爵醴尊之篚亦在房醮之篚則在庭醴則贊者酌受賓賓不親酌故無升降醮則賓親酌酒洗爵故有升降蓋冠必用醴若不用醴則醮焉以醴者太古之物故其禮簡所以示質酒者後世之味故其禮煩所以示文故適子用醴庶子用醮適婦有醴與饗庶婦使人醮之不饗諸侯大夫受賜服於天子歸設奠服賜服於斯乎有冠醮無冠醴是醮輕於醴也士冠若不醴則醮者則冠適子或醴或醮惟其所用耳記曰醮於客位此適子之醮也鄭氏遂以醴為周法醮為夏商法此不可考特牲少牢牲皆用右胖鄉飲鄉射主人牲用右體少儀大牢少牢則以左肩為歸胙右肩以祭特牲士虞喪祭反吉用左則周之吉禮皆用右也鄭氏釋特豚合升之文謂凡牲皆用左胖不知何據云然醴賓既冠乃醴賓以一獻之禮酬賓束帛儷皮贊者皆與贊冠者為介蓋君子之於人勞之必有以禮之故昏禮饗送者鄉飲司正祭禮賓尸冠禮醴賓其義一也士醴賓以一獻之禮公醴賓則三獻之禮故家語曰以鄉為賓其禮則如士以三獻之禮也禮書卷六十四
