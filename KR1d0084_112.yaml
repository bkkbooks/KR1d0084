body:
  text: 禮書卷一百十三宋陳祥道撰矰矢茀矢七分四在前三在後則其行高故用於弋射恆矢痺矢八分四在前四在後則其行平故用諸散射枉矢潔矢兵矢也亦可施於田故鄭氏以矢人之兵矢田矢為枉矢潔矢是也鍭矢與茀矢異殺矢與鏃矢同故鄭氏以矢人之茀矢為殺矢以殺矢為茀矢也詩曰四鍭如樹爾雅曰金鏃剪羽謂之鍭骨鏃不剪羽謂之志則金鏃不特鍭矢有之茀矢以上皆然故鏃謂之鍭也君子志於中而不志於殺故禮射習射之矢皆謂之志也射必剪羽尚疾也志不剪羽尚舒也尚疾則以金鏃而必其入尚舒則以骨鏃而防其傷若夫明弓矢則以金者骨鏃以骨者無鏃長羽者短衛衛羽也既夕禮曰翭矢一乘骨鏃短衛志矢一乘軒輖中亦短衛是也書及左傳言賜諸侯皆彤弓一彤矢百周官司寇入束矢于朝鄭氏亦謂其百箇與則古之束矢皆百也詩曰束矢其搜毛氏謂五十為束者荀卿曰魏氏武卒衣三屬之甲操十二石之弩負矢五十箇則弩一而矢五十也弩一而矢五十弓一而矢百兵法重弓以備毁折則百矢分而二之理固然也司弓矢言六弓四弩而繼之以八矢則八矢皆弓弩之所用也鄭氏曰枉矢殺矢矰矢恆矢弓所用也潔矢鍭矢茀矢痺矢弩所用也四弩皆利攻守與戰而痺矢用諸散射又既夕禮有弓無弩而有鏃矢無弩而有鏃矢則鄭氏之說誤矣矢箙藁人弓六物為三等弩四物亦如之矢八物為三等箙亦如之弓與弩異用矢與箙相須言弓必及弩猶司尊彛之有罍也言矢必及箙猶司尊彛之言彛有舟也彛舟則尊有禁可知矢有箙則弓有韣可知弓與弩有三等矢箙亦三等則箙之長短視矢為之也田弋用籠箙箙竹為之則凡非籠箙皆皮也詩曰象弭魚服陸機謂魚服魚獸也然所謂魚服者魚皮之堅者皆可為之不必魚獸而已陸璣曰東海魚獸如豕背班而腹青其為弓鞬矢箙風雨作潮至毛則盡起雨霽潮還毛復如故春秋傳曰夫人魚軒服䖍亦名魚獸也司弓矢中秋獻矢箙蓋皮以秋堅也司弓矢田獵充籠箙矢共矰矢矰矢不在箙蓋欲其繳之不紊也既夕禮薦于管詩曰抑釋弸忌左傳曰公徒執冰而踞方言曰藏箭為韥丸則管弸韥丸皆箙名也史稱韓延夀東郡負䪍則䪍亦承矢者歟鏃鏃刃鏃砮骲矢人為矢夾其陰陽以設其比夾其比以設其羽三分其羽以設其刃刃長寸圍寸鋌十之重三垸夫矢五分其長而羽其一藁長三尺則羽六寸矣三分其羽以設其刃羽長六寸則刃二寸矣記言刃長寸鄭康成謂二寸其說是也鋌則金之入藁者也垸之多寡於經無見鄭司農以為量名不可考也詩曰四鍭如樹爾雅曰金鏃剪羽謂之鏃骨鏃不剪羽謂之志郭璞曰金鏃金錍箭也骨鏃金骨骲也方言曰箭關東謂之矢關西謂之箭江淮之間曰鍭鍭四鎌曰拘腸曰鎌曰羊頭廣長而薄鎌曰錍亦謂之耙小長而二孔曰錍音卑爐二孔蓋若冒頓之鳴鏑然也亦謂錍箭說文曰鏑矢鋒也禹貢荆梁貢砮孔安國曰石砮石中矢鏃者魯語曰仲尼在陳有隼集于庭而死楛矢貫之石砮其長有咫仲尼曰此肅慎氏之矢也魏志挹婁國矢用楛青石為鏃然則鏃之材有三金石骨是也鏃之名非一鏃鏑錍耙砮是也金鏃謂之鏃而近射田獵之矢獨曰鏃矢枉潔殺鍭矰茀之鏃皆有齊而考工記於殺矢獨有齊者五分其金而錫居二謂之削殺矢之齊鏃矢以鏃為節殺矢用金為多故也矢括儀禮矢在弓下比括書曰若虞機張往省括于度則釋魯語曰銘其括曰肅慎之貢矢詩曰舍拔則獲考工記曰夾其羽而設其比家語曰括而羽之鏃而礪之又曰後矢之括猶銜弦列子曰後鏃中前括然則括也拔也比也皆矢末也矢以鏃為首以括為末弓矢之括居藁兩旁弩矢之括居藁上下括或作筈先儒謂㑹也與矢相㑹禮書卷一百十三
