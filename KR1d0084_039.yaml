body:
  text: 禮書卷三十九宋陳祥道撰六服朝覲之禮曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝諸侯春見曰朝受摯於朝受享於廟生氣文也秋見曰覲一受之於廟殺氣質也朝者位於内朝而序進覲者位於廟門外而序入王南面立於依宁而受焉夏宗依春冬遇依秋春秋時齊侯言魯昭公以遇禮相見取易畧也覲禮今存朝宗遇禮今亡諸候未及期相見曰遇相見於卻地曰㑹王制曰天子無事與諸侯相見曰朝考禮正刑一徳以尊于天子郊特牲曰朝覲大夫之私覿非禮也大夫執圭而使所以申信也不敢私覿所以致敬也而庭實私覿何為乎諸侯之庭又曰覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下凡自稱天子曰予一人伯曰天子之力臣諸侯之於天子曰某土之守臣某其在邉邑曰某屏之臣明堂位曰昔者周公朝諸侯于明堂之位天子負斧依南鄉而立三公中階之前北面東上諸侯之位阼階之東西面北上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上丸采之國應門之外北面東上四塞世告至此周公明堂之位也明堂也者明諸侯之尊卑也樂記曰朝覲然後諸侯知所以臣經解曰朝覲之禮所以明君臣之義也聘覲之禮廢則君臣之義失諸侯之行惡而倍畔侵陵之敗起矣中庸曰朝聘以時厚徃而薄來所以懐諸侯也詩蓼蕭澤及四海也既見君子我心冩兮逺國之君朝見於天子也既見君子鞗革沖沖和鸞雝雝萬福攸同諸侯燕見天子天子必乗車迎于門湛露天子燕諸侯也諸侯朝覲㑹同天子與之燕所以示慈惠車攻赤芾金舄㑹同有繹繹陳也庭燎曰夜如何其夜未央庭燎之光君子至止鸞聲將將君子謂諸侯也沔水曰沔彼流水朝宗于海嗟我兄弟邦人諸友莫肯念亂誰無父母諸友謂諸侯也女自姿聴不朝無肯念此於禮法為亂者雨無正曰三事大夫莫肯夙夜邦君諸侯莫肯朝夕采菽刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徵㑹之而無信義君子見㣲而思古焉采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乗馬菀栁刺幽王也暴虐無親而刑罸不中諸侯皆不欲朝韓奕尹吉甫美宣王也能錫命諸侯韓侯入覲以其介圭入覲于王清廟周公既成雒邑朝諸侯率以祀文王焉烈文成王即政諸侯助祭也臣工諸侯助祭遣於廟也振鷺二王之後來助祭也載見諸侯始見乎武王廟也有客㣲子來見祖廟也長發曰受小球大球為下國綴旒受小共大共為下國駿龎殷武曰莫敢不來享莫敢不來王大宰大朝覲㑹同質玉幣玉几玉獻玉爵大宗伯以賓禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同此六禮者以諸侯見王為文六服之内四方以時分來或朝春或宗夏或覲秋或遇冬名殊禮異更遞而徧朝猶朝也欲其尊王覲之言勤也欲其勤王之事遇偶也欲其若不期而俱至時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而㑹不協而盟是也殷猶衆也十二嵗王如不巡狩則六服盡王朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如巡狩殷見四方四時分來終嵗則徧司几筵凡大朝覲王位設黼依依前南嚮設筦筵紛純加繅席畫純加次席黼純左右玉几左右有几優至尊也典瑞公執桓圭候執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同于王行人春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政邦畿方千里其外五百里謂之侯服嵗一見其貢祀物甸服二嵗一見其貢嬪物男服三嵗一見其貢器物采服四嵗一見其貢服物衞服五嵗一見其貢材物要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寳為摯周官之制因地以辨服因服以制朝因朝以入貢則逺者不疏邇者不數不疏者不至於懈不數者不至於罷矣侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見則侯服每嵗朝甸服二嵗朝男服三嵗朝采服四嵗朝衛服五嵗朝要服六嵗朝而要服朝之嵗五服盡朝於京師則侯服更六見甸服更四見元年三年四年六年男元年三年六年采元年四年六年衛元年五年六年各二見矣書曰六年五服一朝而不及要服者以其當朝之年而不數之也又六年王乃時巡則從王巡狩各㑹于方岳矣晉叔向曰明王之制嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明先儒以為間朝在三年再朝在六年再㑹在十二年而再朝再㑹之年適與書合則叔向以為明王之制乃周制也然周三年一朝男服之禮耳叔向之言特為男服而發何耶考之周禮諸侯春入貢秋獻功此之謂嵗聘服之見有嵗方之見有時此之謂間朝朝有常嵗而㑹盟無常期故有事而㑹不協而盟司盟邦國有疑㑹同以掌其盟約之載則固疏於朝而盟又疏於㑹此所以言再朝而㑹再㑹而盟非謂㑹必六年盟必十二年也然則六年盡朝於京師與有事而㑹者異矣大宗伯殷頫曰視鄭氏謂殷覜者一服朝之嵗以朝者少諸侯使卿以大禮衆聘焉一服朝在元年七年十一年賈公彦謂甸服二年四年六年八年十年朝男服三年六年九年朝采服四年八年朝衛服五年十年朝而元年七年十一年甸侯采衛皆不朝矣故知一服朝在元年七年十一年也然觀康王即位大保率西方諸侯入應門左畢公率東方諸侯入應門右各執壤奠咸進陳戒則天下諸侯莫不盡朝矣自此侯服嵗一見甸服二嵗一見以至三嵗四嵗五嵗六嵗一見者皆以元年為始未聞元年獨一服朝也又行人云殷覜以除邦國之慝葢邦國有慝諸侯乃使其臣行衆覜之禮則衆覜亦無常期此鄭賈立説之誤也朝覲冕服司服享先公饗射則鷩冕鄭氏曰饗倉賔客與諸侯同凡兵事韋弁服眡朝則皮弁服鄭氏曰王受諸侯朝覲於廟則衮冕賈公彦曰覲禮天子兖冕春夏受贄在朝則皮弁服其受享於廟同用衮冕節服氏掌祭祀朝覲衮冕六人維王之太常鄭氏曰服衮冕者從王服也諸侯則四人其服亦如之行人上公之禮桓圭九寸繅藉九寸冕服九章朝位賓主之間九十歩廟中將幣三享諸侯執信圭諸伯執躬圭繅藉七寸冕服七章朝位賔主之間七十步廟中將幣三享諸子執榖璧諸侯執蒲璧五寸繅藉五寸冕服五章朝位賔主之間五十步廟中將幣三享射人三公執璧孤執皮帛諸侯在朝則北面書曰康王既尸大子遂告諸侯諸侯入應門奉圭奠幣羣公既聴命趨出王釋冕覲禮侯氏禆冕釋幣于禰天子衮冕負斧依又曰諸侯覲于天子為宫三百步天子乗龍載大旗象日月升龍降龍出拜日於東門之外反祀方明鄭氏引朝事儀曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭乗大路建大常十有二旒樊纓十有二就貳車十有二乗帥諸侯而朝日於東郊所以教尊尊也退而朝諸侯曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝曽子問稱孔子曰諸侯適天子必告于祖奠于禰冕而出視朝鄭氏曰諸侯朝天子必禆冕為將廟受也古者諸侯將適於王則禆冕而出眡朝至湯沐之邑則齋戒以入見而王駕齋馬乗齋車以其等為送逆之節其致敬朝事如此則侯氏禆冕王衮冕奚間於朝與廟哉曲禮曰天子當依而立諸侯北面而見曰覲天子當宁而立諸公東面諸侯西面曰朝鄭氏謂春朝受摰於朝受享於廟生氣文也秋覲一受之於廟殺氣質也夏宗依春冬遇依夏又以覲禮王服衮冕司服王眡朝皮弁服則謂受朝於廟則冕服受朝於朝則皮弁然皮弁服王日眡朝之禮非受諸侯朝覲之服也行人之職統言朝覲之禮上公冕服九章侯伯冕服七章子男冕服五章而繼之以廟中將幣則未將幣之前受朝於朝未聞不以冕服也又節服氏掌祭祀朝覲衮冕六人維王之太常維王之太常者從王之服而春朝秋覲皆然孰謂王之在朝與廟其服異耶或曰冕服祭服也施之於廟則可施於朝廷則不可是不然大車詩言周大夫聴男女之訟則服毳衣禮諸侯親迎則𤣥冕王養老則冕而總干耕藉則冕而秉耒是祭服有不施於廟也又司服王饗射則鷩冕射人三公北面執璧孤東面執皮帛卿西面執羔大夫西面執鴈諸侯在朝則亦北面鄭氏謂饗射饗食賓客與諸侯射也射人不言士者此與諸侯之賓射士不與也然則與諸侯之賓射固在朝矣王鷩冕三公執璧則毳冕而諸侯亦冕服可知射於朝以冕服則受朝於朝亦冕服可知康王既尸天子諸侯入應門奉圭以進既事王乃釋冕此在朝冕服之事也漢制百官賀正月天子服通天冠張衡東京賦曰冠通天佩玉璽韋彤曰通天冠朝㑹之正服猶古之皮弁也自晉以來天子郊祀天地明堂宗廟元㑹臨軒介幘通天冠平冕冕皂表朱緑裏加於通天冠上衣畫而裳繡為日月星辰十二章自此元日受朝始用祭服梁及隋唐因之葢古者受朝未嘗不以祭服漢失其制至晉以來諸儒考正乃復舊典本朝之制亦然近者元㑹用漢儀服通天冠絳紗袍恐非古也諸侯朝天子送逆之節賓主之間行人上公之禮其朝位賓主之間九十步侯伯之禮其朝位賓主之間七十步子男之禮其朝位賓主之間五十步皆廟中將幣三享齋僕朝覲宗遇皆乘金路其法儀各以其等為車送迎之節郊特牲曰覲禮下堂而見諸侯自夷王始也葢春朝夏宗秋覲冬遇其送迎之禮雖同然朝宗於朝以春夏者萬物交際之時故諸公東面諸侯西面諸侯西面以象生氣之文而王於堂下見之所以通上下之志也覲遇於廟以秋冬者萬物分辨之時故諸侯一於北面以象殺氣之質而王於堂上見之所以正君臣之分也夷王當覲而下堂故記者譏之賈公彦孔頴逹之徒於是謂秋覲無送逆之禮其言與齋僕不合非所信也諸侯貢享之禮夏書曰禹别九州任土作貢衮州厥貢漆絲厥篚織文青州厥貢鹽絺海物惟錯岱畎絲枲鉛松恠石厥篚檿絲徐州厥貢惟土五色羽畎夏翟嶧陽孤桐泗濱浮磬淮夷蠙蛛暨魚厥篚𤣥纎縞揚州厥貢惟金三品瑤琨篠蕩齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢荆州厥貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹惟箘簵楛包匭菁茅厥篚𤣥纁璣組九江納錫大龜豫州厥貢漆枲絺紵厥篚纎纊錫貢磬錯梁州厥貢璆鐡銀鏤砮磬熊羆狐貍織皮雍州厥貢球琳琅玕五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米五百里侯服五百里綏服五百里要服五百里荒服洛誥曰享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享周禮太宰以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢大朝覲㑹同贊玉幣玉獻玉幣諸侯享幣也其合亦如小行人所合六幣玉獻獻國珍異亦執玉以致之小宰執邦之九貢九賦九式之貳以均財節邦用太府掌九貢九賦九功之貳凡邦國之貢以待弔用司㑹以九貢之法致邦國之財用内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用土均以均地貢大司馬施貢分職以任邦國職方氏制其貢各以其所有行人公侯伯子男之禮廟中皆將幣三享行人邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里曰采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢材物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寳為摯小行人令諸侯春入貢秋獻功王親受之合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼考工記璧琮九寸諸侯以享天子曲禮曰五官致貢曰享貢功也享獻也致其嵗終于王謂之獻太宰嵗終令百官府受其㑹聴其政事詔王廢置五官之長曰伯是職方王制曰千里之内曰甸千里之外曰采曰流九州之内地取其美物以當穀税郊特牲曰旅幣無方所以别土地之宜而節逺邇之期也龜為前列先知也以鍾次之以和居參之也虎豹之皮示服猛也束帛加璧徃徳也禮器曰大饗其王事歟三牲魚腊四海九州之美味也籩豆之薦四時之和氣也内金示和也束帛加璧尊徳也龜為前外先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也詩殷武曰莫敢不來享長發曰受小球大球為下國綴旒受小共大共為下國駿龎泮水詩曰憬彼淮夷來獻其琛元龜象齒大賂南金覲禮侯氏入門右坐奠圭再拜稽首擯者謁侯氏坐取圭升致命王受之玉侯氏降堦東北面再拜稽首擯者延之曰升升成拜乃出四享皆束帛加璧庭實唯國所有四當為三初享或用馬或用虎豹之皮其次享三牲魚腊籩豆之實龜也金也丹漆絲纊竹箭也其餘無常貨此地物非一國所能有分為三享皆以璧帛致之奉束帛匹馬卓上九馬隨之中庭西上奠幣再拜稽首擯者曰予一人將受之侯氏升致命王撫玉候氏降自西階東面援宰幣西階前再拜稽首以馬出授人九馬隨之事畢王不受玉撫之而已輕財也春秋傳曰天子班貢輕重以列列尊貢重周之制也卑而貢重甸服也采邑有賦而無貢邦國有貢而無賦周官太宰以九賦歛財賄有家削邦縣邦都之賦以九貢致邦國之用有祀嬪器幣材貨服斿物之貢其制地貢在大司徒其施邦國之貢在大司馬其物則職方氏揚州之金錫荆州之丹銀青州蒲魚雍州玉石之類是也其用則太府以家削之賦待匪頒邦縣之賦待幣帛邦都之賦待祭祀邦國之貢待弔用是也然邦國有嵗之常貢有因朝而貢嵗之常貢則春入貢是也因朝而貢則侯服嵗一見其貢祀物之類是也二者之禮雖殊其玉帛庭實之設葢亦相類考之覲禮侯氏入門右坐奠圭再拜擯者謁侯氏坐取圭升致命王受之玉侯氏降拜升成拜乃出三享皆束帛加璧庭實唯國所有奉束帛匹馬卓上九馬隨之中庭西上奠幣再拜候氏升致命王撫玉侯氏降自西階東面授宰幣西階前再拜以馬出授人九馬隨之禮記言龜為前列先知也金次之示和也然後繼之以丹漆絲纊又聘禮夕幣之儀馬則北面奠幣于其前及見主君賓奉束帛加璧享庭實皮則攝之毛在内賓致命張皮凡庭實左先皮馬相間可知也賓之幣唯馬出其餘皆東由此推之侯氏奉玉帛以升庭實旅百先龜决金次丹漆絲纊馬在其南若皮則居馬之位而王特撫玉而已以示致方物者臣之職而不有其物者王之道也禹貢八州有貢惟冀州無貢以畿内王之所專特歛其賦而已非所謂貢也王制曰千里之内曰甸千里之外曰采曰流鄭氏謂甸者服治田出穀税采者九州之地采其美物以當穀税是也周禮太宰序九貢之物先祀貢嬪貢而繼之以器幣材貨服斿物之貢行人序九服之貢亦先祀物嬪物而繼之以器服材貨之物者候服貢祀物上先而下後也甸服貢嬪物内先而外後也男服貢器物采服貢服物以器服作治之功多而責近以詳也衞服貢材物要服貢貨物以材貨作治之功少而責逺以畧也材貨邦用所通服則王身所獨太宰退服在材貨之後此又著其先所養而後其所自養也幣斿物六服所共貢者也以幣繼嬪器之後以斿物繼貨物之後事之序也行人無幣斿物貢者以其所共貢者不可六服言之也賈公彦曰太宰言嵗之常貢故有幣行人因朝而貢三享之中已有幣矣故不及幣此説非也鄭康成於太宰以器貢為銀鐡石磬丹漆而與鄭注異於行人以器貢為尊彛之屬而與鄭注同於大宰以材貢為杶榦栝柏篠蕩於行人以材貢為八材是自惑也古者邦國致貢不必元日班固東都賦曰春王三朝㑹同漢宫天子受四海之徒籍膺萬國之珍貢唐禮正至朝㑹户部陳諸州貢物禮部陳諸蕃貢物而議者以此為周官春入貢之禮是附㑹之論也禮書卷三十九
