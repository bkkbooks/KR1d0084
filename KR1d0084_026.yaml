body:
  text: 禮書卷二十六宋陳祥道撰尺十寸之尺八寸之尺家語曰布指知寸布手知尺投壺記曰籌室中五扶堂上七扶公羊傳曰膚寸而合鄭氏曰鋪四指曰扶一指按寸何休曰側手為膚按指為寸扶即膚耳然則寸尺之度取諸身也漢律厯志曰一黍之廣為分十分為寸十寸為尺然則寸尺之廣又取諸物也先王制法近取諸身遠取諸物足以考信而無疑焉然後尺寸之度起矣則指尺之與黍尺一也黍有巨細故尺有長短先儒以黍之巨者積而為寸則與膚指不合於是有指黍二尺之辨謂圭壁之屬用指尺冠冕尊彞之屬用黍尺豈其然乎周禮典瑞壁羡以起度考工記壁羡度尺好三寸以為度壁徑九寸羡而長之從十寸廣八寸同謂之度尺則周之法十寸八寸皆為尺也考工記於按言十有二寸於鎮圭言尺有二寸此十寸尺之證也說文曰咫八寸周尺也王制曰周尺八尺為步今以周六尺四寸為步六尺四寸乃八尺爾此八寸尺之證也餘見黼斛同隋書所載歷代之尺至有一十五種蓋古尺既廢後世長短異同之論遂不一也步六尺為步單穆公曰目之察度也不過步武之間荀卿曰立視前六尺而大之六六三十六三丈六尺然則荀卿所謂六尺者步也單穆公所謂步者六尺也故司馬法曰六尺為步步百為畝班固論建步立畝亦祖之以為說則古者以六尺為步明矣王制言古者以周尺八尺為步今以周六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分然六尺四寸者十寸之尺也十寸之尺六尺四寸乃八寸之尺八尺也其步數與荀卿之說不同蓋各述其所𫝊然也畝步百為畝夫畝百為夫屋夫三為屋井屋三為井邑四井為邑丘四邑為丘甸四丘為甸方八里凡六十四井五百七十六夫之地成甸旁加一里為溝洫則為十里之成凡百百井九百夫之地以五百七十六夫出稅餘三二十四夫治溝洫縣四甸為縣方十六里旁加為三十里都四縣為都方三十二里旁加為四十里通四都方八十里旁加十里則方百里為同同十成成百井則同一萬井九萬夫之地井田之法備於此也成司馬法曰井十為通通十為成成十為終終十為同井十為通則九十夫之地三分去一止六十夫又有不易一易再易三為率三夫受六夫之地惟三十家終成十為終九千夫之地同終十為同方百里然考工記十里為成百里為同則同十成也司馬法則十成為終十終為同者先儒謂終者據同一畔終頭為言然則十成為終其地也十終為同其畔也虞書禹曰濬畎澮距川小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事此謂造都鄙也采地制井田異於鄉遂重立國小司徒為經之立其五溝五塗之界其制似井之字因取名焉鄭司農云井牧者春秋傳所謂井衍沃收隰皋者也𤣥謂隰皋之地九夫為牧二牧而當一井今造都鄙授民田有不易有一易有再易通率二而當一是之謂井牧昔夏少康在虞思有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣九夫為井者方一里九夫所治之田也此制小司徒經之匠人為之溝洫相包乃成耳邑丘之屬相連比以出田稅溝洫為除水害四井為邑方二里四邑為丘方四里四丘為甸甸之言乘也讀如乘甸之甸方八里旁加一里則方十里為一成積百井九百夫其中六十四井五百七十六夫出田稅三十六井三百二十四夫治洫四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也積萬井九萬夫其四千九十六井三萬六千八百六十四夫出田稅二千三百四井一萬七百三十六夫治洫三千六百井三萬二千四百夫治澮井田之法備於一同今止於都者采地食者皆四之一其制三等百里之國凡四都一都之田稅入於王五十里之國凡四縣一縣之田稅入於王二十五里之國凡四甸一甸之田稅入於王地事謂農牧衡虞也貢謂九榖山澤之材也賦謂出車徒給繇役也司馬法曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人十成為終終千井三千家革車十乘士百人徒二百人十終為同同方百里萬井三萬家革車百乘士千人徒二千人遂人辨其野之土上地中地下地以頒田里上地夫一廛田百畝萊五十畝餘夫亦如之中地夫一廛田百畝萊二百畝餘夫亦如之凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也萬夫者方三十三里少半里九而方一同以南畝圖之則遂從溝橫洫從澮橫九澮而川周其外焉去山陵林麓川澤溝瀆城郭宫室涂巷三分之制其餘如此以至於畿則中雖有都鄙遂人盡主其地匠人為溝洫主通利田間之水道耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅎌田首倍之廣二尺深二尺謂之遂古者耜一金兩人併發之其壟中曰􅎌􅎌上曰伐伐之言發也􅎌畎也今之耜岐頭兩金象古之耦也田一夫之所佃百畝方百步地遂者夫間小溝遂上亦有徑九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮此畿內采地之制九夫為井井者方一里九夫所治之田也采地制井田異於鄉遂及公邑三夫為屋屋其也一井之中三屋九夫三三相其以出賦稅共治溝也方十里為成成中容一甸甸方八里出田稅緣邊一里治洫方百里為同同中容四都六十四成方八十里出田稅緣邊十里治澮采地者在三百里四百里五百里之中載師職曰園塵二十而一近郊什一遠郊二十而三甸稍縣都皆無過十二謂田稅也皆就夫稅之輕近重遠耳滕文公問為國於孟子孟子曰夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一徹者徹也助者藉也龍子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常文公又問井田孟子曰請野九一而助國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝死徒無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後治私事所以别野人也又曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也魯哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也春秋宣十五年秋初稅畝傳曰非禮也穀出不過藉以豐財也此數者世人謂之錯而疑焉以載師職及司馬法論之周制畿內用夏之貢法稅夫無公田以詩春秋論語孟子論之周制邦國用商之助法制公田不稅夫貢者自治其所受田貢其稅榖助者借民之力以治公田又使收斂焉畿內用貢法者鄉遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯専一國之政為其貪暴稅民無藝周之畿內稅有輕重諸侯謂之徹者通其率以什一為正孟子云野九夫而稅一國中什一是邦國亦異外內之法耳圭之言圭潔也周謂之士田鄭司農說以春秋傳曰有田一成又曰列國一同王制方一里者為田九百畝方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝方千里者為方百里者百為田九萬億畝凡四海之內斷長補短方三千里為田八十萬億一萬億畝方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分詩信彼南山維禹甸之畇畇原隰曽孫田之甸治也箋云禹治而丘甸之我疆我理南東其畝中田有廬疆埸有瓜是剝是菹甫田曰倬彼甫田歲取十千箋云甫之言丈夫也明乎彼太古之時以文夫稅田也嵗取十千於井田之法則一成之數也九夫為井井稅一夫其田百畝井十為通通稅十夫其田千畝通十為成成稅百夫其田萬畝欲見其數從井通起故言十千上地穀畝一種文王有聲曰築城伊淢作豐伊匹淢成溝也匹配也箋曰方十里曰成淢其溝也廣深各八尺駿發爾私終三十里亦服爾耕十千維耦私民田也言上欲富其民而讓於下欲民之大發其私田耳終三十里言各極其望也箋云駿疾也發伐也亦大服事也使民疾耕發其私田竟三十里者一部一吏主之於是民大事耕其私田萬耦同時舉也周禮曰凡治野田夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路計此萬夫之地方三十里少半里也耜廣五寸二耜為耦一川之間萬夫故有萬耦耕言三十里者舉其成數春秋宣十五年初稅畝左傳曰非禮也穀出不過藉民耕百畝公田十畝借氏力治之稅不遇此成元年作丘甲周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重斂故書哀十二年用田賦左傳曰季孫欲以田賦丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉左傳又曰楚蒍掩為司馬書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰皋井衍沃襄二十五年又曰昔夏后少康在虞思有田一成有衆一旅公羊曰初稅畝初者何始也稅畝者何履畝而稅也何以書譏始履畝而稅也古者什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣何休曰聖人制井田之法而口分之一夫婦受田百畝以養父母妻子五口為一家公田十畝即所謂什一而稅也廬舍二畝半凡為田一頃十二畝半八家而九頃共為一井故曰井田廬舍在內貴人也公田次之重公也私田在外賤私也井田之義一曰無泄地氣二曰無費一家三曰同風俗四曰合巧拙五曰通財貨因井田以為市故俗語曰市井種穀不得種一以備災害田中不得有樹還廬舍種桑荻雜菜畜五母雞兩母豕瓜果種疆畔女壬蠶織老者得衣帛馬得食肉焉死者得葬焉多於五口名曰餘夫餘夫以率受田二十五畝十井共出兵車一乘司空謹别田之髙下善惡分為三品上田一嵗一墾中田二嵗一墾下田三嵗一墾肥饒不得獨樂磽確不得獨苦故三年一换土易居財均力平兵車素定是謂均民力彊國家在田曰廬在邑曰里一里八十户八家共一巷中里為挍室選其耆老有髙德者名曰父老其有辨護伉健者為里正皆受倍田得乘馬父老此三老孝悌官屬里正此庶人在官之吏民春夏出田秋冬入保城郭田作之時春父老及里正旦開門坐孰上晏出後時者不得出莫不持樵者不得入五穀畢入民皆居宅里正趨緝績女同巷相從夜績至於夜中故女功一月得四十五日作從十月盡正月止哀十二年用田賦公羊曰譏始用田賦也田謂一井之田賦者斂取其財物也言用田賦者若今漢家斂民錢以田為率矣不言井者城郭里巷亦有井嫌悉賦之禮稅民公田不過什一軍賦十井不過一乘哀公外慕强矣空盡國儲故復用田賦過什一穀梁曰初稅畝者始也古者什一藉而不稅初稅畝非正也古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民初稅畝者非公之去公田而履畝十取一也以公之與民為已悉矣古者公田為居井竈葱韭盡取焉成元年作丘甲公羊曰丘甲何以書譏何譏爾譏始丘使也四井為邑四邑為丘甲鎧也譏始使丘民作鎧也穀梁曰作丘甲周禮九夫為井四井為邑四邑為丘丘為甲也兵甲國之事也丘作甲非正也丘作甲之為非正何也古者立國家百官具農工皆有職以事上古者四民有士民有商民有農民有工民夫甲非人人之所能為也丘作甲非正也用田賦古者九夫為井十六井為丘丘賦之法因其田財通共出馬一匹牛三頭今別其田及家財各出此賦言用者非所宜用而用古者公田什一用田賦非正也古者五口之家受田百畝為官田十畝是為私得其什而官稅其一故曰什一周謂之徹商謂之助夏為之貢其實一也皆通法也今乃棄中乎之法而田財並賦言其賦民甚矣孟子曰夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一也詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也又曰請野九一而助國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝鄉田同井出入相反守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事此所以别野人也前漢志曰理民之道地著為本故必建步立畝正其經界六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍出入相友守望相助疾病相救民是以和睦而教化齊同力役生産可得而平也民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自受其處農民户一人已受田其家衆男為餘夫亦以口受田如此士農工商家受田五口乃當農夫一人此謂平土可以為法者也若山林藪澤原陵淳鹵之地各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十一以上上所强也種穀必雜五種以備災害田中不得有樹用妨五穀力耕數耘收穫如寇盜之至還廬樹桑菜茹有畦瓜瓠果蓏殖於疆場雞豚狗彘毋失其時女修蠶織則五十可以衣帛七十可以食肉在野曰廬在邑曰里春將出民里胥平旦坐於右孰鄰長坐於左孰畢出然後歸夕亦如之入者必持薪樵輕重相分班白不提挈冬民既入婦人同巷相從夜績女工一月得四十五日周室既衰暴君汚吏慢其經界繇役橫作政令不信上下相詐公田不治故魯宣公初稅畝春秋譏焉李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畝治田勤謹則畝益三升不勤則損亦如之地方百里之增減輒為粟百八十萬石矣武帝末年以趙過為搜粟都尉過能為代田一畝一甽嵗代其處故曰代田古法也后稷始甽田以二耜為耦廣尺深尺曰甽長終畝一畝三甽一夫三百甽而播種於甽中苗生葉以上稍耨隴草因隤其土以附苗根故其詩曰或耘或耔黍稷薿薿藝除草也耔附根也言苗稍壯每耨輒附根比盛暑隴盡而根深能風與旱故薿薿而盛也其耕耘下種田器皆有便巧率十二夫為田一井一屋故畝五頃用耦犁二牛三人一嵗之收常過縵田畝一斛以上善者倍之過使教田太常三輔大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛亡以趨澤故平都令光教過以人挽犂過奏光以為丞教民相與庸挽犂率多人者田日三十畝少者十三畝以故田多墾闢書曰濬畎澮距川詩曰惟禹甸之語曰禹盡力乎溝洫春秋傳曰少康之在虞思有田一成有衆一旅則井田溝洫之制尚矣周官小司徒經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事以令貢賦遂人凡治野夫間有遂遂工有徑十夫有溝溝工有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿考工記匠人為溝洫廣尺深尺謂之甽田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為成成十為通通十為終終十為同蓋三屋為井井方一里九夫四井為邑邑方二里三十六夫十六井為丘丘四百里百四十四夫六十四井為甸甸方八里五百七十六夫二百五十六井為縣縣方十六里二千三百四夫一千二十四井為都都方三十二里九千二百一十六夫鄭康成以小司徒有邑甸縣都之别而其名與采邑同匠人有甽遂溝洫澮之制而多寡與遂人異故言采地制井田鄉遂公邑制溝洫又謂鄉遂公邑之吏或促民以公使不得恤其私諸侯専國之政或恣為貪暴稅民無藝故畿內用夏貢邦國用商助賈公彥之徒遂以載師自國中園廛以至甸稍縣都皆無過十二是鄉遂及四等公邑皆用貢而無助以明鄉遂特為溝洫而已然先王之為井田也使所飲同井所食同田所居同廛所服同事出入相反守望相助疾病相扶持鄉遂六軍之所寓庸豈各授之田而不為井法乎大田之詩言曾孫來止而歌雨我公田遂及我私噫嘻之詩言春夏祈榖于上帝而歌駿發爾私終三十里亦復爾耕十千維耦周官遂人言興鋤旅師有鋤粟此鄉遂井田之事也鄭氏以鄉遂無井田而又以遂人之法釋詩以一井之法釋旅師是自戾也孟子曰鄉田同井請野九一而助則鄉遂之為井田可知矣載師之所徵賦非一夫受田之法而甸稍縣都皆無過十二則采地有不為井田可知矣井田之制方里而井八家皆私百畝其中為公田而廬舍在焉公田八十畝而家治十畝廬舍二十畝而家二畝半廬舍在內貴人也公田次之重公也私田在外賤私也民年二十受田六十歸田而任之也有期强者有所加豫罷者有所罰辱而勸之也有法此民所以樂事勸功而無憾於養生送死也先生之時上以仁撫下下以義事上以仁撫下故先民而後公則駿發爾私是也以義事工故先公而後已則雨我公田遂及我私是也又私田稼不善則非吏公田稼不善則非民庸有鄉遂公邑之吏促民以公使不恤其私者乎小司徒九夫為井匠人亦九夫為井井間有溝自井地言之也遂人十夫有溝兼溝涂言之也然遂人百夫有洫而匠人十里為成成間有洫則九百夫之地遂人千夫有澮而匠人百里為同同間有澮則九萬夫之地其不同何耶成間有洫非一成之地包以一洫而已謂其間有洫也同間有澮非一同之地包以一澮而已謂其間有澮也成與同地之廣者也洫與澮溝之大者也於成舉洫於同舉澮亦其大略云爾春秋之時楚蒍掩為政井衍沃牧隰皋而小司徒井其田野則取名於縣都而已觀二百一十國謂之州五黨亦謂之州萬二千五百家謂之遂一夫之間亦謂之遂王畿謂之縣五鄙亦謂之縣縣都之名豈特施於采邑哉然則鄉之井地謂之縣都可也禮書卷二十六
