body:
  text: 禮書卷九十二宋陳祥道撰社稷王社周禮內宰凡建國佐后立市祭之以陰禮鄭司農云祭之以陰禮者市中之社先后所立社也大司徒設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野社稷后土及田正之神壝壇與堳埓田主田神后土田正之所依也詩人謂之田祖所宜木謂若松柏栗也若以松為社者則名松社之野以别方靣小司徒凡建邦國立其社稷正其畿疆之封幾九畿封人掌設王之社壝為畿封而樹之壝謂壇及堳埓也畿上有封若今時界矣不言稷者稷社之細也凡封國設其社稷之壝封其四疆封國建諸侯立其國之封造都邑之封域者亦如之令社稷之職將祭之時令諸有職事於社稷者也郊特牲曰唯為社事單出里唯為社田國人畢作唯為社丘乘共粢盛所以報本反始也鼓人以靈鼓鼓社祭社祭祭地示也州長若以嵗時祭州社則屬其民而讀法舞師掌教帗舞帥而舞社稷之祭祀牧人陰祀用黝牲毛之陰祀祭地北郊及社稷媒氏凡男女之陰訟聽之于勝國之社其附于刑者歸之于士勝國亡國也亡國之社奄其上而棧其下使無所通大宗伯以血祭祭社稷陰祀自血起貴氣臭也社稷土穀之神有德者配食焉共工氏之子曰勾龍食於社有厲山氏之子曰柱食於稷湯遷之而祀棄王大封則先告后土后土土神也黎所食者小宗伯掌建國之神位右社稷左宗廟凡天地之大烖類社稷宗廟則為位禱祈禮輕類者依其正體而為之若大師則帥有司而立軍社奉主車肆師次祀用牲幣𤣥謂次祀又有社稷凡師甸用牲于社宗則為位社軍社也宗遷主也封于大神社及方嶽也凡師不功則助牽主車社之日涖卜來嵗之稼社祭土取財焉鬯人凡祭祀社壝用大罍司服祭社稷五祀則希冕大司樂乃奏太簇歌應鍾舞咸池以祭地示地示所祭於北郊謂神州之神及社稷大祝國有大故天灾彌祀社稷禱祠大師宜于社設軍社鄭司農曰設軍社以春秋傳曰所謂軍以師行袚社釁鼓祝奉以從者也及軍歸獻子社則前祝大㑹同宜于社建邦國先告后土用牲幣后土社神也大社有寇戎之事則保郊祀于社鄭司農云謂保守郊祭諸祀及社無令寇侵犯之喪祝掌勝國邑之社稷之祝號以祭祀禱祠焉勝國邑所誅討者社稷者若亳社是矣存之者重神也蓋奄其上而棧其下為北牖大司馬中春教振旅以祭社祭社者土方施生也若師有功則左執律右秉鉞以先愷樂獻于社兵樂曰愷獻于社獻功于社也若師不功則厭而奉主車奉猶送也送主歸于廟與社量人營車之壘舍量其市朝州涂軍社之所里軍社社主在軍者里居也小子掌珥于社稷珥社稷以牲頭祭珥者釁禮之事也用羽牲曰珥珥社稷謂始成其宫兆也大司寇大軍旅涖戮于社社謂社主在軍者也鄭司農云書曰用命賞于祖不用命戮于社士師若祭勝國之社稷則為之尸匠人營國左祖右社曲禮曰國君去其國曰奈何去社稷也又曰國君死社稷又曰問國君之年長則曰能從宗廟社稷之事矣幼則曰未能從宗廟社稷之事也王制諸侯祭社稷月令仲春擇元日命民社社后土也使民祀焉神其農業也祀社日用甲季冬命太史次諸侯之列賦之犧牲以共皇天上帝社稷寢廟之祀曽子問曰諸侯適天子命祝史告社稷宗廟山川禮運曰命降于社之謂殽地謂教令田社下者也社土地之主也周禮以土㑹之法辨五地之物生又曰祀社於國所以列地利又曰禮行於社而百貨可極焉禮器曰社稷山川之事鬼神之祭體也天地人之別體也又曰三獻爓三獻祭社稷五祀郊特牲曰郊特牲而社稷太牢又曰社稷土而主陰氣也君南嚮於北牖下答陰之義也牆謂之墉北墉社內北牆日用甲用日之始也天子大社必受霜露風雨以達天地之氣也大社王為羣姓所立是故喪國之社屋之不受天陽也薄社北牖使陰明也絶其陽通其陰而己亳社殷社殷始都亳社所以神地之道地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤國主社示本也中霤亦土神也唯為社事單出里唯為社田國人畢作唯社丘乘共粢盛所以報本反始也單出里皆往祭社君親誓社以習軍旅明堂位曰春社秋省大傳曰牧之野武王之大事既事而退柴於上帝祈於社祭法曰王為羣姓立社曰大社王自立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社羣衆也大夫以下謂下至庶人也大夫不得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰唯為社事單出里厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社祭義建國之神位右社稷左宗廟注云周尚左中庸郊社之禮所以事上帝社祭地神不言后土省文天子社稷皆太牢諸侯社稷皆少牢祭統崇事宗廟社稷則子孫順孝泰誓曰宜于冢土祭社日宜冢土社也泰誓下曰郊社不修甫田曰以我齊明與我犧羊以社以方社后神也秋祭社與四方為五綿詩曰乃立冡土戎醜攸行冡土大社也起大事動大衆必先有事乎社而後出謂之宜大社者出大衆將所告而行也春秋傳日脣宜社之肉雲漢曰祈年孔夙方社不暮載芟春藉田而祈社稷良耜秋報社稷左傳莊公二十五年六月辛未朔日有食之鼓用牲于社非常也非常鼓之日唯正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝秋大水鼓用牲于社于門亦非常也凡天災有幣無牲非日月之眚不鼓文十五年六月辛丑朔日有食之鼓用牲于社非禮也得常鼓之月而於社用牲為非禮日有食之天子不舉伐鼓于社諸侯用幣于社社尊於諸侯故請救而不敢責之伐鼓于朝退自責哀七年魯以邾子益來獻于亳社以其亡國與殷同論語哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗孔子曰成事不說遂事不諫既往不咎孟子曰民為貴社稷次之君為輕諸侯危社稷則變置旱乾水溢則變置社稷荀子曰社祭社稷祭稷正義曰社稷之義先儒所解不同鄭康成之說以社為五土總神稷為原隰之神勾龍有平水土之功配社祀之稷有播種之功配稷祀之鄭必以為此說者案郊特牲云社祭土而主陰氣又云社所以神地之道又禮運云命降于社之謂殽地又王制云祭天地社稷為越紼而行事據此諸文故知社即地神稷是社之細別別名曰稷稷乃原隰所生故以稷為原隰之神若賈逵馬融王肅之徒以社祭勾龍稷祭后稷皆人鬼也非地神故聖證論王肅難鄭云禮運云祀於郊所以定天位祀社於國所以列地利社若是地應云定地位而言列地利故知社非地也為鄭學者馬昭之等通之云天體無形故須云定位地體有形不須云定位故唯云列地利肅又難鄭云祭天牛角繭栗而用特牲祭社牛角尺而用太牢又祭天地大裘而冕祭社稷絺冕又唯天子令庶民祭社社若是地神庶民豈得祭地乎為鄭學者通之而云以天神至尊而簡質事之故牛角繭栗而用特牲服大裘天地至尊天子至貴天子祭社是地之别體有功於人報其載養之功故用太牢貶降於天故角尺也祭用絺冕取其陰類庶人蒙其社功故亦祭之非是方澤神州之地也肅又難鄭云召誥用牲于郊牛二明后稷配天故知二牲也又云社于新邑牛一羊一豕一明知唯祭勾龍更無配祭之人為鄭學者通之云是后稷與天尊卑既别不敢同天牲勾龍是上公之神社是地示之別尊卑不甚懸絶故云配同牲也肅又難鄭云后稷配天孝經有配天明文后稷不稱天也祭法及昭二十九年傳曰勾龍能平水土故祀以為社不云祀以配社明知社即勾龍也為鄭學者通之云后稷非能與天同功唯尊祖配之故不得稱天勾龍與社同功故得云祀以為社而得稱社也肅又難云春秋說伐鼓于社責上公不云責地示明社是上公也又月令云仲春命民社鄭注云社后土也孝經注云社后土也勾龍為后土鄭既云社后土則勾龍也是鄭自相違反為鄭學者通之云伐鼓責上公者以日食臣侵君之象故以責上公言之勾龍為后土之官其地神亦名后土故左傳曰君戴皇天而履后土地稱后土與勾龍稱后土名同而無異也鄭注云后土者謂地神也非謂勾龍故中庸云郊社之禮注云社祭地神又鼓人云以靈鼓鼓社祭注云社祭祭地示也是社為地示也社所以祭五土之示稷所以祭五榖之神五榖之神而命之稷以其首種先成而長五榖故也稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利而養人故也祭必有配而社配以勾龍共工氏之子稷配以柱厲山氏之子商之時又易柱以棄以其功利足以侔社稷故也周官大司徒辨其邦國都鄙之數設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野封人掌設王之社壝為畿封而樹之凡封國設其社稷之壝祭法王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社自為立社曰侯社士大夫以下成羣立社曰置社蓋王社侯社國中之土示而巳無預農事故不置稷大社國社則農之祈報在焉故皆有稷先儒謂王社或建於大社之西或建於藉田然國語王藉則司空除壇農正陳藉禮而厯代所祭先農而已不聞祭社也故詩曰春藉田而祈社稷非謂社稷建於藉田也其言王社建於大社之西於義或然西漢及魏有官社無官稷晉之時有帝社無帝稷類皆二社一稷魏博士孔朝之論議者紛然或欲合二社以為一或欲異二社之所向齊武帝議帝社南向大社及稷東向是雖違經悖禮然亦二社同設於國中未聞藉田有之也穀梁曰天子親耕故立社為藉而報此說非也果王社為藉而設必有稷也蓋王與諸侯之社皆三其二社所以盡祈報之誠其勝國之社所以示鑒戒之理王之大社則土五色而冒以黃夏之時徐州厥貢惟土五色孔安國以社言之是也諸侯之國社則受其方色之土於天子而苴以茅漢之時有受青土赤土蔡雍以茅社言之是也其位則中門之右社主陰故也其壝則北靣社嚮陰故也其飾則不屋記所謂大社必受霜露風雨以達天地之氣是也其表則木傳所謂夏以松商以柏周以栗是也其方廣則五丈韓詩外傳其主則石為之先儒謂石地類也左傳言擁社抱社主也其列則社東而稷西先儒之說蓋有所受之也先王之祭社稷春有祈秋有報孟冬大割祠月令大割祠于公社春祈而歌載芟秋報而歌良耜此祭之常者也凡天地大烖之類祭小宗伯大故天烖之彌祀大祝君行有宜宫成有衈此祭之不常者也祭之常者用甲其它則惟吉而已祭之牲以太牢其遇天烖則用幣而已考之於禮王之祭也南靣其服也絺冕其牲用黝其祭血祭其樽大罍用大罍而鬯人掌之則有鬯裸可知其樂應鍾其舞帗舞其鼓靈鼓凡皆因其物以致其義非夫深知禮樂之情者孰與此哉先儒有以王社有稷壝原隰為稷神有以勾龍為社而非配社柱為稷而非配稷後世又有以夏禹為社配有以戍亥為社日有以先農為帝社有以太稷為稷社皆臆論也祭法曰諸侯為百姓立社曰國社諸侯自為立社曰侯社王制曰天子社稷皆大牢諸侯社稷皆少牢郊特牲曰家主中霤國主社示本也曽子問曰諸侯之祭社稷爼豆既陳白虎通曰天子社廣五丈諸侯半之其色東方青南方赤西方白北方黑冒以黃土史表曰諸侯王始封者必受土於天子之社歸立之以為國社以嵗時祠之天子之國有大社故將封於東方取青土封於南方取赤土封於西方取白土封於北方取黑土封於上方取黃土裸以白茅封以為社此始受封於天子者也蔡雍獨斷曰天子大社封諸侯者皆取土苞白茅授之以立社於其國故謂之授茅土立社漢惟皇子封為王者得茅土其他功臣以户數租入為節不受茅土召誥用牲於社牛一羊一豕一漢制郡縣祭社皆羊豕尚書無逸篇大社唯松東社唯柏南社唯梓西社唯栗北社唯槐諸侯有侯社國社亡國社與天子同其祭用少牢與天子異先儒謂天子社廣五丈諸侯半之天子社五色冒以黃而諸侯受土各以其方之色亦冒以黃其言雖不經見然五者土數黃土色則天子社廣五丈冒以黃信矣諸侯之禮常半天子天子六軍諸侯三軍天子六卿諸侯二卿天子六宫諸侯三宫天子辟雍諸侯泮宫天子之馬十二間諸侯之馬六間則社半五丈信矣禹貢徐州貢土五色土五色以為社則大社五色諸侯受土各以其方之色信矣古者立社皆有木以表之故大司徒設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野語曰夏后氏以松殷人以柏周人以栗後世宋有櫟社豐有枌榆社先儒謂諸侯社皆立樹又為主以象其神大夫以下但各以地之所宜木立之於義或然大夫社祭法曰大夫以下成羣立社曰置社鄭氏曰羣衆也大夫以下謂下至庶人也大夫不得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰唯為社事單出里正義曰皇氏曰天子諸侯祭社則用藉田之榖大夫以下無藉田若祭社則丘乘之民共之示民出力也故曰唯社丘乘共粢盛正義曰天子諸侯大夫皆有稷故鄭注司徒田主田神后土田正之所依也田正則稷神者也大夫以下其社之大者則二千五百家為之周禮所謂州社是也其小則二十五家亦為之左傳所謂書社千社是也左傳昭二十五年齊侯致千社於魯哀十五年齊人與衛地自濟以西禚媚杏以南書社五百杜氏二十五家為一社鄭氏謂百家以上共立一社若今時里社此以漢制明古也周禮六鄉之內族祭酺黨祭禜雖百家以上亦不祭社特州然後祭之者黨祭族非不祭也姑以別社禜酺之等差耳禮曰唯為社事單出里唯為社田國人竭作唯社丘乘共粢盛蓋單出里則家出一人畢作則羡卒盡起丘乘共粢盛則牢醴亦在所共皇氏曰大夫以下無藉田祭社則丘乘之民共之其說是也左傳有清丘之社月令仲春命民社先儒以謂自秦以下民始得立社然禮言大夫以下則民社不始於秦大夫以下社亳社禮記郊特牲曰天子大社必受霜露風雨以達天地之氣也是故喪國之社屋之不受天陽也薄社北牖使陰明也絶其陽通其陰而已亳社商之社商始都亳正義曰風雨至則萬物生霜露降則萬物成故不為屋以受霜露風雨媒氏凡男女之陰訟聽之于勝國之社勝國亡國也亡國之社奄其上棧其下使無所通就之以聽陰訟之情明不當宣露其罪喪祝掌勝國邑之祝號以祭祀禱祠焉小司寇若祭勝國之社稷則為之尸以刑官為尸略之也左氏襄三十年左傳曰鳥鳴于亳社如曰嘻嘻甲午宋大灾又曰間于兩社亳社大社也又曰平子伐莒取郠獻俘始用人於亳社哀四年書亳社灾七年魯以邾子益獻于亳社以其亡國與殷同公羊曰亳社者何亡國之社也社者封也其言灾何亡國之社蓋掩其上而柴其下亳社灾記異也戒社者先王所以威示教戒諸侯使事上也榖梁曰亳亡國也亡國之社以為宗廟屏戒也立亳之社於廟之外以為屏蔽取其不得通天人君瞻之而致戒心其屋亡國之社不得達上也白虎通曰王者諸侯必有誡社者何示有存亡也明為善者得之為惡者失之五行志曰亳社灾董仲舒劉向以為亡國之社所以為戒也韓詩傳曰亡國之社以戒諸侯人之戒在於桃殳孔子謂魯哀公曰君出魯之四門以望魯之四郊亡國之墟必有數焉君以此思懼則懼將焉不至然則公子諸侯必有勝國之社其意亦若此也記言天子大社繼之以亡國之社屋之天子之亳社也春秋書亳社灾魯之亳社也左傳曰鳴于亳社宋之亳社也社必有稷小司寇祭勝國之社稷則為尸是也位必在左春秋傳所謂間于兩社是也掩上棧下不受天陽設於北牖使陰明焉以其不能生成萬物而趍於幽也男女之訟於此聽者以其當隱蔽而不敢褻也祭之而刑官為尸者以其滅亡刑之類也宗廟之制天子外屏諸侯內屏不容以亡國之社為之榖梁以亡國之社為廟屏此不可考孔穎達曰亡國之社或在廟或在庫門內之東是穎達亦疑榖梁之說市社內宰凡建國佐后立市設其次置其叙正其肆陳其貨賄出其慶量淳制祭之以陰禮鄭司農云祭之以陰禮者市中之社先後所當立也鄭康成曰陰禮婦人之祭禮然則祭市之社其禮與凡社異矣社主周禮小宗伯若大師則帥有司而立軍社奉主車春秋傳曰軍行袚社釁鼓祝奉以從鄭氏曰社之主蓋用石為之唐神龍中議立社主韋叔夏等引吕氏春秋及鄭𤣥義以為社主用石又後魏天平中太社石主遷于社宫是社主用石矣又檢舊社主長一尺六寸方一尺七寸在禮無文按韓詩外傳云天子大社方五丈諸侯半之蓋以五是土數故壇方五丈其社主凖五數長五尺唯陰之二數方二尺剡其上以象物生方其下以體地體埋其半以根在土中而本未均也蓋石地類也先儒謂社主石為之其長不過尺五寸其短以寸計之唐之時舊主一尺六寸方一尺六寸蓋有所傳然也而議者謂宜長五尺方二尺埋其半於土中此臆論也古者天子諸侯有載社之禮而陳侯嘗擁社以見鄭子展襄二十五年左果埋其半則不可迎而載果石長五尺方二尺則不可取而擁禮書卷九十二
